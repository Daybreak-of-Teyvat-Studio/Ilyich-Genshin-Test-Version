 # 65. 召开抗深渊战争会议  country_event = {  id = NAT_Event.65 }
 NAT_ABY_POWER:"深渊侵蚀扩散"
 NAT_NAT_POWER:"深渊侵蚀消失"
 NAT_ABY_POWER_desc:"漆黑的深渊力量自地脉深处翻涌而出，持续啃噬着夜神之国的根基，圣火的光芒因侵蚀日渐黯淡，各部族的领地接连出现深渊界门，魔物肆虐于火山与峡谷之间。纳塔的地脉正被逐步深渊化，大灵的力量不断衰弱，还魂诗的庇佑濒临失效，这片火与竞逐的盟地，正一步步坠入永恒的黑暗。§Y深渊侵蚀度：§!§R[?NAT-ABY-Index]§!。"
 NAT_NAT_POWER_desc:"肆虐的深渊力量彻底消散，被污染的地脉重归澄澈，夜神之国的裂痕缓缓愈合，圣火再度焕发出炽烈的光芒。深渊界门尽数闭合，魔物的嘶吼归于沉寂，各部族的土地恢复了往日的生机，大灵的庇佑重新笼罩纳塔，火之国度的荣光，在烈焰中再度绽放。§Y深渊侵蚀度：§!§R[?NAT-ABY-Index]§!。"
 NAT_decisions-01:"深渊侵蚀中"
 NAT_decisions-01_desc:"深渊对纳塔的侵蚀贯穿千年，始于葬火之战时尼伯龙根引入深渊力量，致使纳塔地脉遭严重破坏，成为提瓦特深渊侵蚀最严重的国家。深渊不仅污染土地，催生巴窟纳瓦等具有时间性污染的魔物，还侵入夜神之国，读取灵魂记忆并制造深渊界门，导致还魂诗失效。火龙王修库特尔曾受其影响发狂，奥奇卡纳塔水利工程中劳工因深渊力量幻觉频发、伤亡惨重。如今纳塔地脉已濒临全面深渊化，距离毁灭仅剩一年，深渊本体古斯托特更化形火龙王发起总攻，成为纳塔最致命的威胁。"

