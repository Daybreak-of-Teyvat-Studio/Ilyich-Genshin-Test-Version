﻿l_simp_chinese:

####国策####

FOM_focus_tree: "梅堡革命公社国策树"
FOM_Pioneer_social_experiment: "先锋社会实验"
FOM_Pioneer_social_experiment_desc: "梅洛彼得堡，枫丹有“罪”之人的流放之地，可水神、水龙王、谕示裁定枢机，并没有为枫丹人带来公正。如果法律只是服务统治的道具，那么我们就不是有罪之人。\n\n得益于梅洛彼得堡遗世独立的地理位置和自成体系的经济体制，莱欧斯利可以从零开始建立一套完全摆脱外部剥削的制度。理想状态下，每个人都可以获得自由、平等。但这毕竟是一场实验..."
FOM_Convene_the_Autonomous_Committee: "召开自治委员会"
FOM_Convene_the_Autonomous_Committee_desc: "自治委员会是我们独立后建立的机构之一，旨在统筹协调我们各个公社之间的政策。我们将把它打造成一个处理日常事务的全民大会，这对维系公社的正常运转至关重要。"
FOM_Establish_Revolutionary_Committee: "组建革命委员会"
FOM_Establish_Revolutionary_Committee_desc: "尽管我们将的目标是带给全枫丹人自由，但我们都清楚的意识到，自由不是神、贵族或外邦人的赏赐之物，自由需要靠我们争取。\n\n因此，我们必须建立一套成体系的指挥系统，一个能保护革命的军事团队，指挥官们将由选举产生，这样的军官也实际上是民兵的代表，我们也能够变相地听到全体民兵对当前安全问题的看法。"
FOM_Integrate_the_commune_court: "产能数据统计"
FOM_Integrate_the_commune_court_desc: "我们的公社采用特殊的分权制，这意味着每个公社工业机械的数量和质量都由其自身的生产能力决定，这将导致有些公社的产能无法满足生产需求。\n\n我们将重新统计各个区域的生产能力，从而制定更符合实际的生产目标。"
FOM_Production_capacity_statistics: "整合公社法庭"
FOM_Production_capacity_statistics_desc: "旧律法只为保护私有财产而存在。我们不需要高高在上的法官，我们需要由各街区、各车间选出的代表，根据公社的共同利益来裁决纠纷。正义，必须从沫芒宫和歌剧院的石柱下回到人民手中。"
FOM_Vanguard_Defender: "先锋主义卫士"
FOM_Vanguard_Defender_desc: "我们需要一支不仅勇敢，而且拥有坚定信念的骨干力量。他们将是革命的利刃与坚盾，在最危险的战线冲锋，并确保我们的理想不会在第一个胜利后就变质。他们是活的教条，行走的信念。"
FOM_Temporary_resource_allocation: "临时资源分配"
FOM_Temporary_resource_allocation_desc: "梅洛彼得堡的资源有限，为了革命的胜利，我们必须建立严格的配给制：每一块面包，每一颗螺丝，都必须用于支撑革命。这不是公平，而是生存的需要。"
FOM_Reform_of_the_concession_voucher_system: "特许券制度改革"
FOM_Reform_of_the_concession_voucher_system_desc: "特许券是我们得以摆脱贵族统治的经济制度，然而它却出于愚人众之手，为了防止经济控制权掌握在外人手里，我们必须对其进行改革。\n\n现在，它们将获得新的意义——它们是劳动的证据，是换取生活物资的凭证，而非投机敛财的工具。我们正在一张废纸上，书写新经济的序章。"
FOM_Correct_the_concept_of_superiority_and_inferiority: "纠正贵贱观念"
FOM_Correct_the_concept_of_superiority_and_inferiority_desc: "五百年的谎言必须被粉碎。没有人生来高贵，也没有人生来低贱。通过宣传、教育与集体劳动，我们必须根除这种思想的毒瘤，让每个枫丹人都能昂起头，认识到自身的价值与力量。"
FOM_Persist_in_the_Exile_Legion: "坚持流放者军团"
FOM_Persist_in_the_Exile_Legion_desc: "他们曾是囚犯，被旧秩序抛弃。但我们绝大部分人民的罪行，都是枫丹廷的欲加之罪。因此，我们这些无辜之人最清楚自己为什么而战。\n\n现在，他们将用战斗为自己正名。不信任的目光依然存在，但我们不能抛弃这些最坚定的战士。他们的赎“罪”之路，由罪恶的鲜血铺就。"
FOM_Allow_reformers_enlist_in_the_military: "允许改造者入伍"
FOM_Allow_reformers_enlist_in_the_military_desc: "即使是旧贵族的仆从，只要愿意放下武器，接受我们的理念，也能获得为新枫丹奋斗的机会。\n\n这既是仁慈的，也是实用的——我们需要每一个能拿枪的人，也需要瓦解敌人的士气。"
FOM_Economic_shackles: "经济枷锁"
FOM_Economic_shackles_desc: "切断与敌人的一切贸易！让封锁的绞索慢慢收紧。他们的奢侈品换不来面包，而我们的工厂能生产炮弹。让经济战为我们赢得时间，让敌人在孤立中腐朽。"
FOM_Balancing_conflicts_within_the_community: "平衡社团矛盾"
FOM_Balancing_conflicts_within_the_community_desc: "激进的理想主义者，保守的实用主义者，还有疯狂的复仇主义者…革命阵营并非铁板一块。需要高超的手腕与坚定的原则，引导他们看向共同的敌人，而非彼此的内斗。"
FOM_enemy_in_sight: "眼前之敌"
FOM_enemy_in_sight_desc: "贵族压迫是我们起义的原因，但不要被远方的威胁分散注意力，贵族和我们之间还有着至冬人的屏障，不不...他们当然不是枫丹人，也许他们同我们一样遭受了不公，但他们选择将命运交给外邦，而我们会将命运攥在手中。\n\n集中我们所有的力量，给予这具寒冬的傀儡最后一击。"
FOM_external_crisis: "外部危机"
FOM_external_crisis_desc: "至冬的“特工”和须弥的“佣兵”正在我们的边境徘徊，像秃鹫等待着分享猎物。我们必须向世界表明，枫丹的革命不是又一块可以随意分割的蛋糕，而是一座即将喷发的火山。"
FOM_Summarize_the_lessons_of_the_uprising: "总结起义教训"
FOM_Summarize_the_lessons_of_the_uprising_desc: "胜利的喜悦麻痹了许多人。但现在，必须冷静下来复盘。我们的组织度、后勤、情报工作……弱点在鲜血中被暴露无遗。只有正视这些教训，才能避免下一场战斗付出更惨痛的代价。"
FOM_Launch_strike_at_the_bottom_of_Fengdan: "发动枫丹底层罢工"
FOM_Launch_strike_at_the_bottom_of_Fengdan_desc: "让枫丹廷的心脏停止跳动！组织仍在敌人控制下的工人、仆役、职员，进行总罢工。瘫痪他们的工厂，扰乱他们的生活。让贵族们在死寂的城市中，聆听革命逼近的脚步声。"
FOM_Distinguish_between_gangs_and_revolutions: "区分帮派与革命"
FOM_Distinguish_between_gangs_and_revolutions_desc: "刺玫会的确为底层人提供了帮助，但刺玫会身后那些帮会的忠诚仅限于利益。\n\n我们必须小心，不能让革命的崇高目标被地头蛇的江湖习气所腐蚀，革命不是换一个收保护费的人。"
FOM_Axiom_will_eventually_have_a_day_of_defense: "公理终有辩诉日"
FOM_Axiom_will_eventually_have_a_day_of_defense_desc: "口号与宣言的时间已经过去。现在，刺刀与炮弹是唯一的语言。集结我们所有的军团，翻过芒索斯这座区分优劣的大山。是时候为枫丹廷，赋予全新的历史意义了。"
FOM_Upgrade_to_winter_equipment: "改造至冬装备"
FOM_Upgrade_to_winter_equipment_desc: "缴获的至冬武器精良却复杂。我们的工程师正日夜不停地将它们“枫丹化”——简化工序，适应我们的弹药标准。让敌人的投资，成为我们胜利的基石。"
FOM_Rules_of_Urban_Warfare: "城市作战规则"
FOM_Rules_of_Urban_Warfare_desc: "沫芒宫不是最后的战场。接下来的每一座城市，都可能变成街垒战与狙击手的泥潭。我们必须研究新的战术，如何在熟悉的家乡进行最残酷的战斗，并最小化我们同胞的伤亡。"
FOM_The_crime_of_innocence: "无罪之罪"
FOM_The_crime_of_innocence_desc: "枫丹的法律不可靠，枫丹的罪恶不绝对，枫丹的人们不在乎真相，所有人都只是想让这台法律机器运行下去而已，梅洛彼得堡的罪人，只不过是这台名为公正的机器运行下去的燃料。\n\n枫丹的政治忠诚和市民团结，完全基于不断地制造不可接触的绝对他者，并把他们排出正常的系统之外。欧庇克莱歌剧院需要梅洛彼得堡，而枫丹也永远需要罪人。\n\n只不过，这罪人本是枫丹廷的无罪之人，这罪名便是枫丹人的无罪之罪。"
FOM_Professionalized_Commune_Armed_Forces: "职业化公社武装"
FOM_Professionalized_Commune_Armed_Forces_desc: "热情无法永远赢得战争。是时候将勇敢的民兵转变为纪律严明的职业军队了。建立军官团，统一训练大纲。我们要用专业的暴力，去终结所有反革命的幻想。"
FOM_Standard_weapon_design: "制式武器设计"
FOM_Standard_weapon_design_desc: "最近，我们部队的后勤人员已经开始叫苦连天了。因为战士们使用的武器来路不一：有从敌人手上缴获的、地下作坊自制的，还有从国外走私的...为了让后续的战斗不至于被这点小问题阻碍，我们是时候设计制造属于自己部队的武器了。"
FOM_advancing_by_waterway: "利用水道进军"
FOM_advancing_by_waterway_desc: "我们的敌人在占领区的每座城市都布下了重防，妄图以此迟滞我们进军的步伐。为此，我们最好的策略便是出奇制胜，从大多数被他们忽视的下水道进军，把尖刀直插他们的心脏！"
FOM_Inspire_hope_and_strength: "鼓舞希望和力量"
FOM_Inspire_hope_and_strength_desc: "战争是漫长的黑暗。我们需要不断的宣传、集会和胜利的消息，来点燃人民心中的火焰。告诉他们，每一次牺牲都不是徒劳，黎明的光线已在地平线上显现。"
FOM_Commitment_joy_and_happiness: "承诺喜悦和幸福"
FOM_Commitment_joy_and_happiness_desc: "我们不能只承诺苦难与牺牲。我们要向人民描绘战后的蓝图：一个没有压迫，孩子能安心上学，老人能安度晚年的社会。未来的幸福，值得我们此刻奋战到底。"
FOM_Fengdan_Revolutionary_New_Army: "枫丹革命新军"
FOM_Fengdan_Revolutionary_New_Army_desc: "这不是一支为钱卖命的佣兵，也不是叛乱的乌合之众。这是一支有理想、有纪律、为公民而战的新型军队。它的每一个细胞都浸透着我们的理念，它是我们理想的具现化。"
FOM_Block_Bailu_District: "封锁白露区"
FOM_Block_Bailu_District_desc: "切断白露区和枫丹城区的联系，让南方的敌人首尾不能相应，任何试图穿越封锁线的同情者都将被视作叛徒——革命不允许有模糊的边界。"
FOM_Song_of_Freedom: "自由颂"
FOM_Song_of_Freedom_desc: "♫让我们远离奴役♫\n♫让我们远离监牢♫\n♫世间再也没有特权♫"
FOM_The_sins_will_be_repaid_in_time: "罪业终有报偿时"
FOM_The_sins_will_be_repaid_in_time_desc: "在枫丹的每一个角落，都还有人在受苦。我们的革命军队将继续前进，直到沫芒宫飘扬的旗帜，插遍枫丹的每一寸土地，将自由带给每一个人。"
FOM_Promotion_of_the_special_coupon_system: "特许券制度推广"
FOM_Promotion_of_the_special_coupon_system_desc: ""
FOM_Resource_Allocation_Plan: "资源统筹计划"
FOM_Resource_Allocation_Plan_desc: "战争结束了，但配给制不能立刻取消。我们必须像指挥军队一样指挥经济，将每一份钢铁、每一滴能源都投入到最关键的复兴建设中。这是非常时期的必要手段，为了更长远的富足。"
FOM_Demand_Production_Act: "需求生产法案"
FOM_Demand_Production_Act_desc: "改变以利润为导向的生产模式。工厂不再为库存生产，而是严格根据人民的基本生活需求与国家的建设计划来开工。先保证人人有面包，再考虑蛋糕的花样。"
FOM_Merleau_Peterborough_model: "梅洛彼得堡模式"
FOM_Merleau_Peterborough_model_desc: "将那座水下堡垒的管理原则推广至全国：绝对服从、高效生产、以劳动换取生存资料。这套系统在战争中证明了其价值，它能确保秩序与产量。但我们必须警惕，当“囚犯”的概念扩展到整个社会时，自由又该被置于何处？"
FOM_The_Heritage_of_Fengdan_Academy_of_Sciences: "枫丹科学院的遗产"
FOM_The_Heritage_of_Fengdan_Academy_of_Sciences_desc: "清理科学院的旧档案，甄别哪些技术能为人民所用。那些曾被贵族用于享乐和压迫的发明，必须在工程师和工人的手中，转化为建设新家园的工具。"
FOM_Industrialization_of_Grey_River: "灰河工业化"
FOM_Industrialization_of_Grey_River_desc: "将灰河地区从单纯的居民区改造为新的工业中心。利用其人力与区位优势，建立一批中小型民用工厂，让机器轰鸣声成为这里新的背景音。"
FOM_Agricultural_Reform_in_Baishong_Town: "白淞镇农业改革"
FOM_Agricultural_Reform_in_Baishong_Town_desc: "白淞镇附近的土地算是枫丹比较肥沃的土地，但因匪患和涨水已经让此处的沃土荒废已久，现在我们需要将土地收回国有，分配给无地的农民组成生产合作社。推广现代农业技术，让枫丹的粮仓不再受制于任何外部势力。"
FOM_Energy_independence: "能源自主"
FOM_Energy_independence_desc: "我们不能永远依赖外界的能源输入。加大对荒芒能量、水利发电和新兴晶石技术的投入，实现能源自给自足。这是经济独立，乃至国家独立的基石。"
FOM_Trust_technocrats: "信任技术官僚"
FOM_Trust_technocrats_desc: "管理国家的重心从意识形态狂热转向了冰冷的效率。一批精通数学和工程的“技术官僚”被提拔到关键岗位。他们用图表和模型优化一切，从物流路线到工人作息。社会运转得更顺畅了，但也失去了早期的那种理想主义温度。"
FOM_food_rationing: "口粮配给"
FOM_food_rationing_desc: "物资依然紧缺。公平，在此刻意味着严格的配给。确保每个公民都能获得维持生命与劳动的基本口粮，这是新政权对人民最基础的承诺。"
FOM_Breaking_free_from_dependent_economy: "摆脱依附性经济"
FOM_Breaking_free_from_dependent_economy_desc: "停止为贵族服务的经济，逐步减少对外邦工业制成品与资本的依赖。建立我们自己的完整工业体系，哪怕初期粗糙笨重。经济上的附庸，终将导致政治上的不独立。"
FOM_brand_new_life: "全新生活"
FOM_brand_new_life_desc: "当工厂开始生产留声机、当社区中心响起音乐、当孩子们能安心在学校读书时，人民才会真正相信，他们奋斗的目标不仅仅是生存，而是一种值得为之奋斗的、有尊严的“好生活”。"
FOM_Fengdan_Revolutionary_Guard: "新枫丹模范军"
FOM_Fengdan_Revolutionary_Guard_desc: "从战火中淬炼出的最坚定的军团，将被授予“革命卫队”的称号。他们不仅是国防的基石，更是革命理想的活丰碑，负责对内镇压一切反革命苗头，对外抵御任何入侵之敌。"
FOM_Semi-automated_warfare: "半自动化作战"
FOM_Semi-automated_warfare_desc: "大力发展由发条机关构成的无人/少人作战单位。将它们投入最危险、最重复的战斗岗位，以保存我们最宝贵的人力资源。战争的形式，正在被技术重塑。"
FOM_The_concept_of_citizen_revolution: "公民革命理念"
FOM_The_concept_of_citizen_revolution_desc: "在军队中深入开展政治教育。让每一位士兵都明白他们为何而战——不是为了军饷或荣耀，而是为了保卫他们亲手参与建设的、属于全体人民的新枫丹。"
FOM_Clockwork_Mechanism_Corps: "发条机关兵团"
FOM_Clockwork_Mechanism_Corps_desc: "钢铁与齿轮不知恐惧，永不疲惫。我们将组建由发条机关构成的成建制兵团，它们将组成阵线最坚固的盾，发起最无情的冲击。战争正在进入一个新的时代，而我们，将是时代的引领者。"
FOM_Advantages_of_the_Water_Country: "水之国的优势"
FOM_Advantages_of_the_Water_Country_desc: "枫丹作为水上国度，当然要由枫丹来定义水上作战的最高标准。舰船、潜水器、两栖作战部队，让枫丹的疆域由海洋来定义和守护。"
FOM_Obligatory_Combat_Contract: "义务作战契约"
FOM_Obligatory_Combat_Contract_desc: "以法律形式确立公民的国防义务。和平时期进行定期民兵训练，战时则迅速动员。让潜在的敌人清楚，入侵枫丹意味着要与一个全民皆兵的国度作战。"
FOM_Optimization_of_Wasteland_Energy: "荒芒能量优化"
FOM_Optimization_of_Wasteland_Energy_desc: "成立专项小组，研究如何将荒芒能量更高效、更稳定地应用于军事领域。无论是为单兵武器供能，还是驱动大型战争机械，这都是可能改变战争规则的领域。"
FOM_Xue_from_the_Rock_Country: "岩之国的学说"
FOM_Xue_from_the_Rock_Country_desc: "由于枫丹的地理位置和战略前景，我们的陆军的地位远不如空军和海军，但我们当然不能完全忽视。\n\n我们的陆军将使用部分小而精的特殊编制，作为随时驰援各地的特种部队，并引入璃月坚固的防御思想，建立大量的本土防御部队。"
FOM_All-terrain_training_method: "全地形训练法"
FOM_All-terrain_training_method_desc: "针对枫丹独特的水域、城市和山地进行极限训练。我们的士兵必须比任何人都更熟悉如何在每一种地形上战斗和取胜。"
FOM_Fault_repair_measures: "故障维修措施"
FOM_Fault_repair_measures_desc: "再先进的装备也会故障。建立一套从前线到后方的快速维护与零件补给体系，其重要性不亚于研发新武器。让我们的军队始终保持最高的战备率。"
FOM_Experience_of_the_Wind_Country: "风之国的经验"
FOM_Experience_of_the_Wind_Country_desc: "研究并发展快速打击与空中机动战术。建立一支能够迅速响应、跨区域部署的空中力量，掌握战场主动权，在敌人最脆弱的时刻给予致命一击。"
FOM_Support_and_Guarantee_Principle: "支援保障原则"
FOM_Support_and_Guarantee_Principle_desc: "人类会饥饿、疲倦，武器会磨损、消耗。而我们极其重视每一个士兵的健康和生命。所以，确立“后勤优先”的建军思想，建立专业的工兵、医疗和运输部队。一场战争的胜利，不仅取决于前线士兵的勇气，更取决于后方支援体系的效率。"
FOM_Steel_with_a_will: "拥有意志的钢铁"
FOM_Steel_with_a_will_desc: "通过严苛的训练与坚定的信仰，将每一位士兵都锻造成不屈的战士。当装备不如人时，意志是最后的壁垒；当装备领先时，意志则是碾压一切的重锤。"
FOM_The_Threat_of_the_Ice_Kingdom: "冰之国的威胁"
FOM_The_Threat_of_the_Ice_Kingdom_desc: "以最危险的假想敌为蓝本，进行军事建设和演习。针对须弥炎热潮湿的雨林和干燥的沙漠环境，开发专门的反制战术与装备。\n时刻准备着。"
FOM_having_an_iron_will: "拥有钢铁的意志"
FOM_having_an_iron_will_desc: "通过严苛的训练与坚定的信仰，将每一位士兵都锻造成不屈的战士。当装备不如人时，意志是最后的壁垒；当装备领先时，意志则是碾压一切的重锤。"
FOM_Armed_up: "武装起来"
FOM_Armed_up_desc: "革命已胜，但刀枪不可入鞘。如今的武装，不再是仓促分发猎枪，而是将制式步枪交到职业士兵手中；不再是依靠一腔热血，而是在统一的参谋部指挥下进行系统训练。这支军队，是捍卫革命果实的钢铁堡垒，是新生枫丹意志的延伸。让所有潜在的敌人看清：枫丹的人民，不仅拥有战斗的意志，更拥有了赢得一切战争的专业力量。"
FOM_The_Fontaine_Revolution: "枫丹大革命"
FOM_The_Fontaine_Revolution_desc: "革命不只是战胜敌人，更重要的是战胜一种制度，战胜一种自古以来的成见。断头台落下的是贵族的头颅，但更要斩断的是深植于人心的奴性。我们不仅要摧毁沫芒宫的高墙，更要推倒那堵将人分为三六九等的无形之墙。当最后一个贵族被赶下台时，真正的革命才刚刚开始——它将在每个枫丹人的灵魂深处打响。"
FOM_Salvation_for_the_Steadfast_and_Suffering: "予贞苦者以拯赎"
FOM_Salvation_for_the_Steadfast_and_Suffering_desc: "白淞镇、灰河、梅洛彼得堡……枫丹的穷苦人民太多了。他们经历了预言危机的恐惧，又在贵族的“优化运动”和内战中失去家人与居所。许多人已经无法继续生存下去，食不果腹，衣不蔽体。革命胜利的意义，绝不仅仅是推翻旧政权，更在于让这些被遗忘的人重新站起来。政府必须调拨粮食、搭建临时住所、设立医疗点，并组织就业培训，帮助他们走出困境。这不是施舍，而是对他们在革命中所付出代价的应有回报。"
FOM_Establish_the_Labor_Council: "创立劳工委员会"
FOM_Establish_the_Labor_Council_desc: "底层劳工是革命最坚定的支持者，但在旧秩序下，他们的声音从未被听见。建立一个服务于底层劳工的组织，让各地的人民能够通过它发出自己的诉求，也便于革命政府及时发现和解决他们的困难。劳工委员会将选举产生代表，参与工厂的管理、工资的协商以及劳动条件的改善。这不仅是经济上的赋权，更是政治上的启蒙。当每一个劳动者都意识到自己是国家的主人，枫丹的革命才算真正落地。"
FOM_Comfort_for_the_Innocent: "予无罪者以念抚"
FOM_Comfort_for_the_Innocent_desc: "旧枫丹的法律是贵族手中的工具——贫穷即是罪，反抗即是罪，出身卑微甚至仅仅因为一些谋生手段，就会被投入梅洛彼得堡。无数无辜者被定罪，无数受害者得不到申冤。现在，我们必须建立一套真正公平的法律，废除所有基于出身和财富的特权条款，重新审理那些被冤枉的案件。告慰遭受旧法迫害的人们，不是用仇恨，而是用正义。一部新法典，将成为枫丹新社会最坚实的基石。"
FOM_Convene_the_Electoral_Assembly: "召开选举大会"
FOM_Convene_the_Electoral_Assembly_desc: "我们将在法律界和议会中举行选举，选出那些有能力、有意愿制定公正法律的人。选举不是形式，而是让不同阶层的代表坐在一起，讨论什么是真正的公平。法官、律师、学者、工人代表——他们将在同一张桌子上辩论，起草属于新枫丹的法律体系。这注定是一场漫长的争论，但只有经过这样的争论，法律才能获得人民的认同。"
FOM_Terror_for_the_Evildoers: "予行恶者以惩惧" 
FOM_Terror_for_the_Evildoers_desc: "委员会在决定旧贵族命运时几乎没有分歧——他们犯下的罪行足以判处最严厉的惩罚。但当话题转向傀儡女王芙宁娜时，分歧出现了。有人主张她是被迫的，应当赦免；有人坚持她作为旧政权的象征，必须处决以儆效尤；也有人提出放逐。革命不能只凭义愤行事，对芙宁娜的处理将定义这场革命的面孔。是宽恕，还是清算？委员会必须做出一个经得起历史检验的决定。"
FOM_Organize_the_Revolutionary_Patrol: "组织革命纠察队"
FOM_Organize_the_Revolutionary_Patrol_desc: "枫丹大革命的胜利来得摧枯拉朽，但其中有一部分原因，是大量商会、帮派、盗匪投机加入了革命队伍。他们带来了武器和人力，也带来了旧习气和私利。如今新枫丹容不下这些蛀虫——他们渗透进议会，试图将革命成果变为新的敛财工具。我们必须组织革命纠察队，审查每一位议员的背景，清除那些与旧势力勾结或利用革命谋私的人。纯洁队伍，比扩大队伍更加艰难，也更加必要。"
FOM_Set_the_Revolutionary_Course: "敲定革命方向"
FOM_Set_the_Revolutionary_Course_desc: "重建和整肃取得了不小的成果，议会正常运转，生产逐渐恢复。但接下来的路该怎么走？是继续强化领袖的权力，以效率换取稳定？还是转向集体领导，以民主换取长治久安？不同的派系提出了不同的方案，争论激烈而真诚。敲定革命方向，意味着要在一张白纸上画出枫丹未来的轮廓。这一步走错了，所有的牺牲都可能付诸东流。"
FOM_Avant_garde_Council: "先锋议会"
FOM_Avant_garde_Council_desc: "一个没有领袖的议会该如何运转？提瓦特没有哪个国家尝试过这样的制度。我们将开创历史的先河，设立由各选区直接选举产生的先锋议会，内阁成员由议会选举产生，对议会负责，而非对某个人负责。决策需要辩论、投票和妥协，效率或许会降低，但每一个重大决定都将拥有更广泛的民意基础。我们也要承担探索的代价——争吵、僵局、甚至错误的决策。但这是通往真正民主的唯一道路。"
FOM_Truth_Seeking_as_Our_Duty: "以求真为职守"
FOM_Truth_Seeking_as_Our_Duty_desc: "夏洛蒂曾经用笔和相机记录贵族的罪行，如今她被赋予了更重要的使命——监督新政府的每一个角落。求真，不是对权力的敌视，而是对权力的负责。议会派要求所有公职人员的财务申报、决策记录、会议纪要都必须对公众开放，接受媒体与民众的双重检验。守职，意味着每一个岗位都不是谋私的工具，而是服务人民的职责。一支独立于行政体系的监察团队将定期发布报告，揭露效率低下、资源浪费和潜在的腐败苗头。这不会让所有人高兴，但会让更多人安心。"
FOM_Independence_as_Our_Prerequisite: "以独立为先决"
FOM_Independence_as_Our_Prerequisite_desc: "监督者不能由被监督者任命。议会派上台后的第一项制度设计，就是确保监察机构的独立性——其经费直接由议会拨付，人事任免须经跨党派委员会批准，监察长不得由任何现任行政官员兼任。独立，不是为了让监察者拥有特权，而是为了避免“既当运动员又当裁判员”的荒唐局面。只有在先决条件得到保障的前提下，求真守职才不会沦为一句空话。那些曾被贵族收买的监管机构，将在新的制度框架下彻底改造。枫丹的法治，从独立开始。"
FOM_The_Redeeming_Angel_of_Fontaine: "枫丹赎罪天使"
FOM_The_Redeeming_Angel_of_Fontaine_desc: "梅洛彼得堡的医务室，曾是这座海底监狱里唯一永远亮着灯的地方。希格雯，那个长着小小羽翼的美露莘，在那里照顾过看守，也照顾过犯人——不分昼夜，不问来处。她用一杯热饮抚平巡夜者的惊惧，用一份温热的饭菜唤醒晕厥者的希望。在暗无天日的海底，她是所有人的“太阳”。\n如今，革命胜利后的枫丹需要一位新的内阁领袖。先锋议会将目光投向了这位从未参与权力争夺的护士长。希格雯的赎罪，从来不是因为自己犯下过什么罪行——她只是用无差别的善意，为这座国度背负了太多被忽视的伤痛。但美露莘能否理解人类政治的复杂？她可能需要时间，需要身边有经验丰富的顾问，也需要枫丹人给她足够的耐心。赎罪天使若走上政坛，她带来的不会是权谋与算计，而是那份在医务室里从未熄灭的、温热的亮光。"
FOM_Duke_Protector: "护国公爵"
FOM_Duke_Protector_desc: "内战结束后，一些部下曾以“枫丹必须有一位国王”为由，劝说莱欧斯利戴上王冠。他们认为只有强权才能稳定局势。莱欧斯利拒绝了，他见证了权力集中如何腐蚀人心。但他也承认，一个完全分散的民主，在百废待兴的枫丹可能陷入无尽的争吵与低效。于是，他选择了一条中间道路——接受“护国公爵”的称号，以强人的姿态统筹枫丹的重建方向，同时承诺：这只是暂时的。他将统治，直到人民有能力治理他们自己。那一天何时到来？没有人知道，包括他自己。"
FOM_Chains_for_the_Arrogant_and_Brutal: "予骄暴者以镣锁"
FOM_Chains_for_the_Arrogant_and_Brutal_desc: "革命胜利的果实，还没来得及捂热，就已经有人伸手去抢。一些功臣仗着在内战中的功劳，要求分得更大的权力、更多的财产。一些小团体打着“彻底革命”的旗号，主张对旧贵族和所谓“不纯者”进行更加激进的报复。这些行为表面上是忠诚，实则是将革命变成新一轮的利益分配。如果不加限制，枫丹将从一个牢笼跳入另一个牢笼。\n对骄横者加以约束，对暴戾者加以锁链。必要时，逮捕他们。革命可不是分赃大会。"
FOM_Mercy_for_the_Wronged: "予冤诉者以怜恕"
FOM_Mercy_for_the_Wronged_desc: "刺玫会、壁炉之家，这些组织曾与梅洛彼得堡的军队交过手，流过血，彼此都有难以抚平的伤痕。但他们反抗贵族暴政的精神，是值得肯定的。莱欧斯利主张，不应将所有曾经的对手都打入“反革命”的标签。经过系统的思想教育后，那些愿意接受先锋主义、愿意为枫丹建设出力的人，应当被给予机会。将他们安置到对应的岗位上——技术、医疗、教育、治安——既能发挥他们的专长，也能化解旧日的仇恨。"
FOM_Condemnation_for_the_Greedy_and_Treacherous: "予婪诈者以谴罚"
FOM_Condemnation_for_the_Greedy_and_Treacherous_desc: "许多地方官员仍在报告中掺入水分，虚报重建进度，瞒报民众不满。这些谄媚与欺诈的行为，会让枫丹的重建建立在虚假的数字之上，最终导致决策失误、资源错配。莱欧斯利下令成立专门审计机构，对所有地方报告进行核查。凡是弄虚作假者，轻则撤职，重则移送法庭。诚实，是一个新国家最廉价的防线，也是一道一旦失守就难以重建的防线。"
FOM_Revolutionary_Guard: "革命卫队"
FOM_Revolutionary_Guard_desc: "军团革命委员会——这个在内战期间为梅洛彼得堡立下赫赫战功的军事组织，如今成了枫丹最不稳定的火药桶。他们不信任议会的争吵，不信任民主的效率，更不信任那些曾经的敌人如今竟能进入政府。他们主张对贵族采取最极端的报复——不仅仅是首恶，还包括所有曾为贵族服务过的人。在一次深夜的突袭中，军革委占领了先锋议会大楼，软禁了莱欧斯利和大多数议员。枫丹的天空，再次笼罩在暴力的阴影下。"
FOM_Arrest_the_Council_Faction: "逮捕议会派"
FOM_Arrest_the_Council_Faction_desc: "军革委的政变之后，枫丹陷入了一场新的恐怖。夏洛蒂、希格雯、娜维娅等有一定民主主张的议会派核心成员相继被捕。夏洛蒂被指控“利用舆论干扰革命方向”，娜维娅则被指控“包庇刺玫会中的投机分子”。逮捕令一张接一张地签发，不需要证据，只需要“政治上的怀疑”。枫丹街头的混乱日益严重——有人欢呼这是“第二次革命”，有人恐惧地闭门不出。议会派的被捕，不仅是对个人的迫害，更是对民主制度的公然践踏。梅洛彼得堡的枪声，曾为自由而鸣；如今，同样的枪声，却在扼杀自由。"
FOM_Execute_the_Counter_Revolutionaries: "处决反革命"
FOM_Execute_the_Counter_Revolutionaries_desc: "军革委派出革命卫队，在全枫丹范围内对贵族残党展开残酷报复——但“贵族残党”的定义被无限扩大。曾是贵族府邸的仆人，被捕；曾与贵族有生意往来的商人，被捕；甚至仅仅是有人举报“说过同情贵族的话”，也会在深夜被从家中拖走。大批次地处决在欧庇克莱歌剧院前的广场上进行，每一次铡刀落下，都伴随着欢呼与哭泣的交织。军革委宣称这是“彻底的净化”，但越来越多的人开始低声质问：革命，究竟要杀死多少人，才算成功？"
FOM_Red_Cassiodoro: "红色卡西奥多"
FOM_Red_Cassiodoro_desc: "远在柔灯港的逐影庭没有忽视枫丹的近况，克洛琳德率领一支精锐的逐影猎人小队，迅速而精准地终结了军革委的统治，解救了莱欧斯利、娜维娅等被逮捕的先锋议会成员。而后，大批逐影庭部队接管了枫丹廷的城区和乡镇并展开戒严，枫丹的秩序得以恢复。"
FOM_Fontaine_Marches_On: "枫丹继续前进"
FOM_Fontaine_Marches_On_desc: "无论经历过怎样的争论、分歧甚至风暴，枫丹终究没有停下脚步。有人跌倒，有人牺牲，有人迷失，但更多的人仍在前行。莱欧斯利站在沫芒宫的窗前，望着晨曦中逐渐苏醒的城市。那些废墟正在被清理，那些伤口正在被缝合，那些关于自由与正义的理想，仍在每一个劳动者的手中传递。革命的列车或许曾偏离轨道，但它终究驶回了人民选择的方向。枫丹不会忘记走过的弯路，也不会被过去的伤痛困住。它将继续前进——向着一个尚未完全抵达、但值得为之奋斗的明天。"
FOM_look_around: "环顾四周"
FOM_look_around_desc: "内战的尘埃已然落定。是时候冷静地审视我们所在的世界了。至冬的使节在港口徘徊，须弥的士兵控制着我们的历史遗迹，而纳塔的佣兵则在边境线上待价而沽。枫丹不再是一座孤岛，我们必须看清邻居们是怀着善意，还是藏着匕首。"
FOM_Stand_together_with_allies_through_thick_and_thin: "与友邦共进退"
FOM_Stand_together_with_allies_through_thick_and_thin_desc: "在革命的黑暗中曾向我们伸出援手的力量，值得一份回报。与璃月的朋友们签订正式的互助条约，这不是感性的选择，而是对投资与风险的冷静清算。我们偿还债务，并期待未来的红利。"
FOM_A_secluded_corner_of_the_sea: "海上偏安一隅"
FOM_A_secluded_corner_of_the_sea_desc: "我们拥有提瓦特最复杂的水道与最坚固的水下堡垒。或许，最好的策略是暂时远离大陆的纷争，专注于海洋。让舰队成为移动的国界，在深海中积蓄力量，等待一个更有利的介入时机。"
FOM_Forward_Alliance: "前进同盟"
FOM_Forward_Alliance_desc: "我们将加入璃月同志主导的同盟，我们将维护双方的区域稳定与革命成果。即便这意味着我们的命运与盟友捆绑，但团结起来的人民是无法战胜的。"
FOM_Far_distance_and_close_range_defense: "远交近防"
FOM_Far_distance_and_close_range_defense_desc: "与没有直接利益冲突的远方势力（如稻妻、蒙德）建立联系，以牵制我们邻近的对手。这是一场精妙的平衡游戏，利用距离和利益的差异，为我们争取最大的战略空间。"
FOM_border_threat: "边界威胁"
FOM_border_threat_desc: "无论我们多么渴望和平，威胁总是存在的。须弥……内战期间窃取了我们的南方领土。\n\n我们必须明确最主要的威胁，并将国家资源向对应的边境倾斜。猜疑是国际关系的基调。"
FOM_The_interests_of_all_Teyvat_people: "全提瓦特人的利益"
FOM_The_interests_of_all_Teyvat_people_desc: "枫丹的革命不应止于国境。我们的理想——或者说，我们的“模式”——是一种可以输出的商品。支持各国的进步力量，利用我们的情报网络与宣传机器。让枫丹的影响力，随着潮汐渗透到世界的每一个角落。"



####################################################################
#事件
FOM_civil_war.100.t: "暗流涌动"
FOM_civil_war.100.desc: "信使穿梭于塔拉塔海谷之间，而枫丹廷以北，芒索斯以南的陆地上，南北双方都在前线部署了数量可观的军队。无论和平或是暴力，我们都将统一枫丹，为这片破碎的高海之地带来安宁。枫丹的命运，紧紧地掌握在你的手中..."
FOM_civil_war.100.a: "做好准备..."

FOM_civil_war.200.t: "长久以后"
FOM_civil_war.200.desc: "经过度日如年的战争岁月，我们终于迎来了和平。重建房屋，修补衣物，弥合伤口...犒赏或是分赃，由我们的政治架构决定。战时，我们的组织也许能搁置争议。战后，各个派系必定会提出自己的诉求。"
FOM_civil_war.200.a: "接下来是..."



FOM.1.t: "最伟大的实验"
FOM.1.desc: "袖珍潜艇靠岸了，莱欧斯利把拳套收进舱底，身体却像是被雨水浸透的帆布一样，沉甸甸地不愿动弹。细雨落在芒索斯山东北岸的碎石滩上，将灰白色的岩石染成深色。他望着人群沿着泥泞的小路慢慢向临时营地走去——那些从梅洛彼得堡跟来的面孔，还带着些许监狱里的铁锈味，有些则是从南方逃难而来的“不够体面的人”。一丝不易察觉的微笑掠过他的嘴角。这一切，总能让他感到某种近乎残忍的欣慰。成百上千的人，不分男女，都加入了这场枫丹从未有过的实验——先锋主义运动。莱欧斯利坐在那里，看着，看着，看着。从梅洛彼得堡到芒索斯山东岸，这段航程说长不长，却仿佛驶入了另一个世界，让他觉得如梦似幻，好似一个旁观者。\n“公爵。”一只手按在船舷上，把莱欧斯利从静滞中唤醒。他转过头，像个孩子一样笑起来。希格雯一手扶着船沿，微微歪着头看着他：“你准备好了吗？”\n莱欧斯利耸耸肩。他确信自己已经准备好面对这些人发表演讲了。每次演讲，他都希望能在这片潮湿的土壤里埋下一颗种子——不用太多，只要有一片菜园，他就能养活整个枫丹。尽管一切都那么平常，但还是有些不对劲。一种说不上来的滞涩感，像雨滴顺着领口滑进脊背。\n“你又在想事情了。”希格雯换了个重心，把另一只手里的医疗箱搁在膝盖上，“在梅洛彼得堡的时候，好像已经没有你不知道的事情了…但现在你却看起来很迷茫。”她把目光从莱欧斯利身上移开，望向那些正回头张望的人群。两人沉默地坐着，雨水打在船篷上，发出细密的声响。希格雯深吸一口气，雨水顺着她小小的羽翼滑落：“那些无家可归的人更迷茫，我能治好他们的身体，可只有你能治好他们的心。”\n莱欧斯利看着这个和他相伴多年的、依旧有着孩子样貌的护士长，用最稚嫩的语气，说出最引他深思的话。她一般是对的，莱欧斯利咕哝了一声，从座位上站起来，跨过船舷，踏上芒索斯山东岸的碎石滩。"
FOM.1.a: "“别让他们等久了，希格雯。”"

FOM.2.t: "武装起来，公民们！"
FOM.2.desc: ""
FOM.2.a: ""

FOM.3.t: "拥立新君？"
FOM.3.desc: "莱欧斯利推开沫芒宫会议室的门时，空气像一块被拧干的布。所有人的脊背都是僵的，目光在他与桌面之间来回跳闪，像是刚刚经历过一场争吵，又像是在讨论一桩针对某人的合谋。“怎么了？你们看起来都很严肃。”稀稀拉拉的椅子声伴随着绝大多数议员坐回了座位，但还有几个人站着。\n夏洛蒂开口了：“因为是很严重的问题，我们才来找你。”\n“哦？”莱欧斯利走到长桌一端，没有坐下，“那说说看。”\n杜吉耶向前探了探身子，檐帽会的头领沉下声音说：“这个国家需要一个国王。”\n话没说完，莱欧斯利闭上了眼睛。他转身，一拳砸在身后的墙面上。石膏发出一声闷响，几条细纹从指节下蔓延开。几个正在发呆的议会成员猛地抬起头，目光被钉在那只仍按在墙上的拳头上。沉默。大约五秒。“国家应该由议会来统治。”莱欧斯利睁开眼睛，转过身，声音压得很低，“我再次重复这个观点。”\n“那谁来统治议会？”杜吉耶没有退缩。\n“人民人民人民！”莱欧斯利重复地吼出这个词。\n杜吉耶摇了摇头：“这不切实际。今天我们来，是代表议会来的——要选你当国王。”\n莱欧斯利的目光从杜吉耶身上移开，扫过会议桌两侧。娜维娅轻微地摇了摇头，那动作几乎看不清。希格雯安静地坐着，两只手交叠在膝盖上，那双美露莘的眼睛里没有赞同也没有反对。最后，他的目光落回杜吉耶。“选举我？”莱欧斯利的嘴角慢慢咧开，然后突然歇斯底里地大笑起来，“当枫丹的国王？”他一边笑，一边绕过桌子，走向娜维娅。“枫丹的莱欧斯利国王！”莱欧斯利右手轻碰了一下娜维娅，左手指向自己，笑声还没有停，“娜维娅小姐，你告诉我，你面前的这个人像国王吗？呵呵……这个疲倦的、监狱里的罪犯，言行举止都粗鲁不堪的狱卒——你们看我什么地方像国王的样子？”\n“只有你才有能力统治这个国家。”杜吉耶的声音从背后追上来。\n莱欧斯利慢慢直起腰，转过身。他的脸上没有笑意了。“以枫丹的名义，”莱欧斯利的每个字都像是从牙缝里挤出来的，“难道我们推翻了贵族的统治，就为了偷走他们傀儡的王冠吗？那顶精致的王冠——毫无价值的废物。你们该给它找个合适的脑袋戴上去，让它来演小丑娱乐大家，让它来充当你们的国王。但绝不是我。”\n杜吉耶没有被这气势压住。他的语气甚至更加平稳了：“权力应该是绝对的。否则就不能被称之为权力。”\n“我革命并不是为了权力。”莱欧斯利向杜吉耶走近一步，“难道这点你还不明白吗？”又是一步。“杜吉耶，你听好我的话。虽然你是我最亲密的战友之一——”莱欧斯利停下脚步，与杜吉耶之间只隔着一张椅子的距离。“但如果你想利用我达到自己的目地，我发誓我把你的头插在长矛上！”"
FOM.3.a: "公爵头也不回地撞开了会议室的门"

FOM.4.t: "审判水神"
FOM.4.desc: "庭审已持续三日，今天是定审的日子。梅洛彼得堡的钢铁穹顶下，革命法庭的壁灯将每个人的影子拉得又长又扭曲。芙宁娜站在被告席上，一如既往地挺直脊背，像她五百年来在欧庇克莱歌剧院舞台上所做的那样——只是这一次，没有剧本，没有观众席上的喝彩，只有几个法官和旁听们沉默的注视。\n莱欧斯利坐在旁听席的阴影里，没有参与辩论。他的手搭在座椅扶手上，指尖无意识地敲击着冰冷的金属。他听着检察官历数贵族统治时期的罪状：城市优化运动的死难者、被清洗的白淞镇……每一项都有据可查，每一项都鲜血淋漓。\n但问题在于——她是自愿的吗？莱欧斯利的目光落在芙宁娜的侧脸上。她被捕后几乎没有辩解，只是按照程序回答了每一个问题。那些关于贵族议会如何命令她签署法令、如何要求她在晚宴上露面、如何用她的名义发动战争的证词，冷静得不像一个即将被审判的人。她像是在陈述一件与自己无关的往事。\n“她被迫成为女王，这是有目共睹的事实。”一位法官摘下眼镜，声音疲惫，“那些法令她若不签，贵族就会换一个更顺从的傀儡。她在那张王座上坐了多久，就被囚禁了多久。”\n“那又如何？”旁听席的部分公民已经沉不住气了，“她是贵族的象征！只要她还活着，枫丹的旧势力就有旗号可打！她如果真的在意平民，就应该宁死不屈。再说了，预言危机时期的她怎么毫无作为？”带头发言的人把矛头从法官转向芙宁娜。“我的家人都溶解在白淞镇了，我的朋友也死在了前线，这些帐全算在你头上！芙宁娜！”\n法庭里陷入短暂的沉默，没人注意到芙宁娜脸上一闪而过的委屈和伤心。中立派的发言人咳嗽一声，翻开笔记本：“我们可以考虑放逐。将她交给愿意接收的邻国——璃月、蒙德，或者更远的稻妻。只要她离开枫丹的领土，不再以任何形式卷入枫丹政治...”\n“不如让她留下来。”梅堡的护士长希格雯出人意料地发言了。“如果芙宁娜小姐真像她所说的，是被迫的。那我们可以给她一次改过自新的机会，尝试改造她，对她进行再教育，让她能像其他枫丹公民那样生活。“\n莱欧斯利的手指停住了，他的目光与芙宁娜短暂交汇。那个曾尊为神明、又被迫扮演女王的女孩——正平静地望着法官席，像是在等待一份早已预料到的判决。她不是水神，也不是女王了。她只是一个被历史的浪潮卷到礁石上的溺水者。莱欧斯利缓缓开口，声音不大，却足以让整个法庭安静下来。“投票吧。”\n他没有说出自己的意见。历史会记住今天，而他也知道，无论哪一种选择——处决、放逐、留下——都不会让所有人满意。没过多久，法官站起来宣布审判结果。"
FOM.4.a: "卫兵，带她去露景泉刑场..."
FOM.4.b: "芙宁娜女士，请即刻收拾行李前往柔灯港"
FOM.4.c: "公民芙宁娜，请去梅洛彼得堡监舍区报道"

FOM.5.t: "公社忙碌的一天"
FOM.5.desc: "弗洛朗靠在椅子上，阅读报告、与来访的公社代表谈判，忙碌的一天就这么过去了。\n在刺玫会当了这些年的参谋之后，如果说他有什么感慨，那就是跟着娜维娅小姐、迈勒斯、西尔弗解决具体问题容易，自己坐下来治理一片土地难上加难。人们都觉得，让枫丹各地的居民拥有自己的公社，并把治理地方的权力交给他们，会让生活更加轻松。但事实似乎并非如此。弗洛朗的临时办公室总是吵个不停，每次讨论到他能从议会那边争取多少重建物资、他需要从白淞镇抽调多少人手去修复水道，他和各个街区的代表就开始没完没了地发生冲突。在他和他受命服务的人民之间，似乎进行着一场持续不断的拉锯战。\n他的桌子上放着一堆地图和文件，关于那些在内战中被贵族炮火夷平的街区。弗洛朗叹了口气，从椅子上坐起来，拿起绘有排水管道分布图的旧图纸。从废墟上重建一个公社谈何容易，而将它融入枫丹廷那个更大的政治框架则更加困难。这项任务需要大量的文书工作，而他还不得不因此和一位坚持要先修港口的老街长又吵了一架。而且，这片土地上满是希望“自治”的声音——不是那种在先锋议会框架下的自治，而是想关起门来自己过日子的那种。\n他可以选择简单易行的手段：一条命令下去，由刺玫会的老班底直接管理每一条街道的物资分配和劳役征派。这样效率会高很多，争吵会少很多。他也可以选择在晚些时候举行公社选举，让居民自己选出代表来决定先修港口还是先修水道——但这样做肯定会让重建进度拖慢，而且选举出来的代表未必会配合上级的规划。\n弗洛朗揉揉眼睛，思考着该怎么办。"
FOM.5.a: "至少普通人真的有话语权了"

FOM.6.t: "解散议会"
FOM.6.desc: "大厅里座无虚席，杜吉耶正站在发言席上，声音带着某种不容置疑的节奏：“本议会讨论过部分议员在国家治理上存在的经济问题。我提议，应该赋予议会成员更多的权力，维持现有秩序，再继续管理三年。”\n莱欧斯利悄悄在大厅后面不显眼的位置坐下来。没有人注意到他的入席。娜维娅站起来，椅子发出刺耳的摩擦声：“任何人都不应该凭借自己的职位谋取利益。如果议会还记得对国家的责任的话，那么应该终止本议会，重选新议会。”\n科尔特立刻接话：“没必要再重选议会……”三四个人同时开口，声音叠在一起，像一锅煮沸的粥。有人拍桌子，有人指着对面骂，有人冷笑。议会逐渐混乱成一片菜市场。莱欧斯利站起身，走过议席之间的走廊，向剧院的舞台走去。靴子踩在石板上的声音被嘈杂淹没，但议员们还是一个个转过头来，看见了他。嘈杂像退潮一样，从剧场后方开始，一层一层地熄灭，最后只剩下前排排几个还在争执的声音，被旁边的人拉住了袖子。莱欧斯利没有入席，而是站在舞台上，审视着议会中的人。\n“议会中央，请允许我向在座的各位发言。可以吗？”舞台上的议会重要成员面面相觑，而后纷纷点头。莱欧斯利的每一个字都像是从胸腔里挤出来的，带着一种沉甸甸的疲惫。“诸位，尊敬的议员们。我一生的梦想，就是能建立一个自由的议会，让人民享有权利，它应是所有人都能参与的、开放的议会。内战结束时，我把这个伟大的任务交给了在座的各位。我对你们寄予厚望：编写出完美的法律，服务于人民的政府。”他的目光从杜吉耶移到科尔特，从科尔特移到其他成员，然后扫过整个大厅。“但是，我不得不承认，你们的行为，让我很失望。你们没有为伟大的人民带来公正与和平。我看到的是贪污腐败、拉帮结派、愤懑不满。我还看到这个国家的敌人，在你们的庇护下肆意妄为。从一开始，这就不是一个公正的政府。你们从未真正代表过人民的利益。”\n他的语气逐渐激昂，像一把被重新烧红的刀。“难道你们不是人民选的吗？你们坐在议会的大楼里，难道不该代表人民的利益吗？在这两年里，议会做了什么？什么都没做。这样的议会，有什么必要苟延残喘？一个不接受批评的议会，比那群专制的贵族，要更有害于人民。”莱欧斯利转过身，一脚踹翻了杜吉耶面前的桌子。文件、墨水瓶、茶杯散落一地。“你们这些酒鬼、骗子、大恶棍、皮条客，自私自利、包藏祸心的政客们！你们以为管理一个国家的事务，能像管理妓院一样随心所欲吗？你们这群社会渣滓！人民选举你们，真是巨大的错误。我宣布从现在起，议会解散！耶尔米尼队长，把他们轰出去！”梅洛彼得堡的狱卒列队进入歌剧院。黑色的制服像一道移动的墙，从走廊两侧向议席合拢。议员们被从座位上拽起来，有人还在喊：“这是军事独裁！”“暴君！”\n莱欧斯利站在舞台上，看着他们被一个个带出歌剧院。脚步声、骂声、靴子磕在石板上的回声，渐渐远去。大厅里只剩下几个熟面孔。莱欧斯利转向他们。他的声音不再愤怒。像是一个在暴风雨中走了太远的人，终于看见了屋檐。“我要让国家恢复尊严，让世人得到幸福。我要让我的国民充满信心，成为世界的楷模。我要从黑暗和蒙昧中拯救每个人的灵魂。我要为所有国民修建学校，我要制定一部真正公正的法律。枫丹必定强大，因为它得到了人民的眷顾。人民会伴着我们前进。”\n他的声音越来越小，随后瘫坐在舞台中央那把议长的椅子上，像是被抽走了所有骨头。椅子太大，他坐进去，显得空荡荡的。“以枫丹的名义发誓，”他低声说，几乎是自言自语，“我来管理这个国家。我保证让它繁荣昌盛。”"
FOM.6.a: "没有人鼓掌，只有风翻动着没被带走的文件"

FOM.7.t: "迷途之人"
FOM.7.desc: "莱欧斯利已经有段时间没回到梅洛彼得堡的办公室了，毕竟大部分事务要在沫芒宫解决，他现在是枫丹的护国公爵，而不仅仅是在一个水下堡垒做公爵。希格雯说由于她在水下有许多病人没有痊愈，还得再待上一段时间，公爵便决定把自己以前的两层办公室借给护士长。狱卒将几个用于装文件的大箱子搬进屋后，便沉默着离开了办公室，莱欧斯利把大衣挂在门口，一转身却看见一道人影在二楼楼梯口躲躲闪闪。\n“谁在那？”莱欧斯利一边质问，一边警惕地靠近楼梯。一个神色慌张的男人看到办公室只有莱欧斯利一个人，才从二楼慢慢走下来，那人穿着一件褪色的工装外套，帽子压得很低。“你是费索勒，对吧？”那人的脸色刷地白了。他没有否认，也没有承认，只是用一双充满惊惧和警觉的眼睛盯着莱欧斯利。他嘴唇微张，似乎想说什么，但却什么也没说。恐惧在喉咙里打了个结，又咽了回去。“你怎么了？为什么躲在这？”\n“公爵大人…我有很重要的情报。但是在这里说…不安全。”费索勒的喉结上下滚动了一下，“檐帽会有问题，我是逃出来的...”檐帽会，杜吉耶一年多前创建的组织，那个在议会里一直要权的杜吉耶...莱欧斯利本来只是来拿旧文件的。但费索勒的出现，像一颗石子投进了平静的水面。\n“你运气不错。”莱欧斯利转身走向文件箱，掀开其中一个空箱的盖子。“进去。”费索勒犹豫了一下，明白了公爵的意思后猫腰钻了进去，莱欧斯利盖上箱盖。片刻后，两名狱卒推着手推车走到门前，莱欧斯利若无其事地指挥他们将那几个大箱子抬上车，连同那个装有费索勒的箱子一起向外转运。费索勒蜷缩在黑暗中，听着狱卒偶尔的交谈声、铁门一开一合的沉重回响。在推车上颠簸了大约二十分钟，费索勒感到自己的箱子正在被抬下推车，而后盖子从外面被掀开。刺眼的灯光照进箱子，费索勒眯上眼睛。“这是情报部门的安全屋，你可以说了。”\n视力逐渐恢复后，费索勒从箱子里爬出来，腿有点发软。“公爵大人……我是逃出来的，从檐帽会。前段时间杜吉耶不知道从哪弄来了一颗会发出黑色宝石，能让人回忆痛苦、失去意识，然后他将那宝石的液体，注入檐帽会里所有不服从他的成员脑中，那些受罚者全都精神崩溃，沦为绝对服从的奴隶或者丧失行为能力。”\n“除了你，还有多少人想逃？”\n“很多。”费索勒咬紧了牙关。“但他们不敢。杜吉耶在每个成员心里都种下了恐惧，用那个黑色宝石。”\n“黑色宝石。”莱欧斯利其实早已对杜吉耶产生过怀疑。这个檐帽会的会长曾劝他做枫丹国王，而后又在议会拼命攫取权力。莱欧斯利暗中庆幸自己的选择没有如他所愿，。这家伙这么做果然有问题。“你暂时住在这里，情报部门的人会定期给安全屋补充食物，等到这一切结束，我再把你带出来。”"
FOM.7.a: "费索勒拼命点头"

FOM.8.t: "摆布之罪"
FOM.8.desc: "“我非常愤怒。”杜吉耶的声音在梅堡某处秘密集会的小广场上回荡，像一头在笼子里踱步的野兽。他目光扫过台下那些戴着帽子的、不敢与他对视的人。“直到现在，檐帽会依然有蔑视规则的人。费索勒和阿维斯，一个叛逃一个泄密。”杜吉耶目光转向被锁在刑具上的阿维斯。“叛徒该付出什么代价，我要你们每个人都看到。”杜吉耶走向阿维斯。从手术台上拿起那根细长的空心针，在灯光下转了转。“我会把针刺进你的脑袋，再把创痛之水滴进去。我要让你们知道，我的规则，就是至高无上的铁律！”\n“够了。”莱欧斯利从广场东侧的入口走进来，狱卒和执律庭的警员也紧随其后。“你的张狂，让我反胃。”\n杜吉耶没有放下针。“又是你，莱欧斯利。梅堡胜利的成果有那么多，分我一点又怎么了？”\n“看来你搞不懂分享和分赃的区别。”莱欧斯利走向杜吉耶，步伐不快。周围的檐帽会成员像被风吹开的落叶一样，纷纷向外面逃去。“而且——你吃相太难看了。”\n“你少装什么正义之人。”杜吉耶的声音里多了一种咬牙切齿的味道，“而且你不会忘了吧？梅堡里都是罪人，都是做过坏事、为人不齿的烂货。这帮人受到什么惩罚，都是罪有应得！”\n“很遗憾，我从没像你一样，把他们视为货币。”他伸出手，指向那些正在逃散的檐帽会成员。“梅堡是囚禁之地，亦是重生之地。他们可以就此沉沦，也可以寻求救赎。肉体虽然受限，但精神始终是自由的。”他的目光转向被锁住的阿维斯。“他们也许曾有过错，但也是有血有肉的人。反省了过去之后，未来要何去何从。选择权应在他们之手。”莱欧斯利再次向杜吉耶迈出一步。他的声音不高，但每个字都像是从冰层下面凿出来的。“可你，正在用恐惧杀死他们的精神。让他们成为再也无法思考的奴隶。还说这是他们罪有应得？”他的目光直直地钉在杜吉耶脸上。“你算什么东西！”\n杜吉耶的脸扭曲了一下，然后突然爆发出一阵歇斯底里的笑声。“莱欧斯利，你太年轻了。你不会真以为先锋主义是什么好体制吧？不，它不是，现在不是，未来也不可能是。”他的声音越来越高，像是在对所有人布道。“没人会因为你的施舍记得你的好。你想统治人民，只能用恐惧。这才是枫丹的原罪，人性的原罪！”杜吉耶突然掏出一把铳枪，枪声炸响。莱欧斯利没有闪避。他的右手在身前画了一个弧线，一层冰墙在他面前凭空凝结——子弹嵌在冰里，像被冻住的虫子。\n“如果你认为恐惧能统治一切，那就让我感受到恐惧吧。”莱欧斯利穿过碎裂的冰屑向他走来，步伐不紧不慢，像猎人在雨中散步。杜吉耶的枪口开始发抖。然后他猛地转向阿维斯。莱欧斯利一个箭步瞬移到了杜吉耶面前。一只手抓住了枪管，另一只手掐住了杜吉耶的脖子。枪管在他手中发出令人牙酸的金属扭曲声。杜吉耶的脸涨得通红，双手徒劳地抓着莱欧斯利的手腕。“这么怕我，枪口都不敢对准我了？”\n“我警告你…新枫丹法律禁止私刑和折磨…而且我还是个议员！作为护国公爵，你必须...”莱欧斯利把他摔在地上，然后俯下身。\n“对公民权利来说，法无禁止即可为。而你们这些议员，法无授权即禁止。既然你违反了，就不受枫丹法律保护了。把他带走！”看着杜吉耶，他想起了那对收养他的夫妇，他想起了杜吉耶在议会里攫取权力、劝自己戴上王冠时的样子。他们是一类人。利用谎言满足私欲，从来不在乎别人的一生。\n但莱欧斯利在乎。从杀死那对夫妻被送到梅堡，到带着遭受不公的枫丹人民反抗贵族，再到现在，清除带着旧时代思想、混进革命队伍的虫豸。莱欧斯利的每个选择都将他带到了此刻..."
FOM.8.a: "将革命进行到底！"

