 # BOX1

 AI_MESSAGE_category1_MES1_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 治理的技艺真是令人大开眼界，竟能将自己的国度拱手相让，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]。此等「功绩」，当载入史册。"
 AI_MESSAGE_category1_MES2_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 呵呵，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的执政官们，莫非是从丘丘人营地中选拔的？"
 AI_MESSAGE_category1_MES3_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 还需多加研习治国方略与兵法典籍，[?global.trashtalk_other_country_tag_box1.GetAdjective]的雏鸟。"
 AI_MESSAGE_category1_MES4_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 将 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的阵线彻底瓦解，吾心中竟泛起一丝不必要的恻隐。"
 AI_MESSAGE_category1_MES5_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 或许这治国理政、纵横捭阖之事，对尔等而言太过艰深，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]。不如归去，经营些酒馆生意更为妥当。"
 AI_MESSAGE_category1_MES6_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 吾很怀疑，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的军队出征前，可曾认真校阅过方阵？庸碌之辈。"
 AI_MESSAGE_category1_MES7_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 看呐，这大片丰饶的 [?global.trashtalk_other_country_tag_box1.GetAdjective] 土地已归于吾之麾下。看来旧主并不懂得珍惜地脉的馈赠。"
 AI_MESSAGE_category1_MES8_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 喂，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]，下次不妨让你们的士兵举起武器？因为方才，吾只见他们奔逃的背影。"
 AI_MESSAGE_category1_MES9_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的臣民为何哀泣？因为他们所信奉的旗帜，已被吾等碾入尘土。"
 AI_MESSAGE_category1_MES10_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 疆土得以舒展，子民得以安栖，此等快意，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 你可明了？"
 #restrict to war declaring?
 AI_MESSAGE_category2_MES1_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 吾之兵锋所向，将如雷暴席卷，荡平尔等一切壁垒，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]！"
 #restrict to winning?
 AI_MESSAGE_category2_MES2_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 假以时日，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的街巷之中，将只流传吾 [?global.trashtalk_own_country_tag_box1.GetAdjective] 的史诗与歌谣。" #both
 AI_MESSAGE_category2_MES3_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 且看这 [?global.trashtalk_other_country_tag_box1.GetAdjective] 的散兵游勇，竟妄想挑战吾麾下历经百战的 [?global.trashtalk_own_country_tag_box1.GetAdjective] 精锐。若非结局注定，此情此景倒颇具讽刺意味。"
 AI_MESSAGE_category2_MES4_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 这…便是你所谓的战争吗，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]？在吾看来，与清扫路上扎脚的碎石无异。"
 AI_MESSAGE_category2_MES5_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 好生维护尔等那些 [?global.trashtalk_other_country_tag_box1.GetAdjective] 作坊，不久之后，它们将为我锻造军械。"
 AI_MESSAGE_category2_MES6_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 可曾听见，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]？那是吾之重靴，踏碎尔等国境线的回响。"
 AI_MESSAGE_category2_MES7_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 嘿，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]，若你的将领懂得结阵而战，而非如惊兽般四散，或许战报会好看些？"
 AI_MESSAGE_category2_MES9_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 此时节，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的风光倒别有一番韵味。吾的将士们正将此景，当作胜利的犒赏。"
 #winning and lightly losing?
 AI_MESSAGE_category2_MES8_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 噗，瞧啊，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 竟摆出迎战的姿态！犹如驱使一群草史莱姆，冲击层岩巨渊的磐石。"
 AI_MESSAGE_category2_MES10_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 尽早呈上降书吧，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]！徒劳的挣扎，只会平添无谓的伤亡。"
 #Country loses
 AI_MESSAGE_category3_MES1_BOX1:1"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 定然是借用了深渊的邪力！此等战果，绝非堂堂正正之师所能取得！"
 AI_MESSAGE_category3_MES2_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 此战有失公允！[?global.trashtalk_other_country_tag_box1.GetAdjective] 的军士个个犹如得到神明赐福，而吾 [?global.trashtalk_own_country_tag_box1.GetAdjective] 的勇士却似被削弱的凡人！"
 AI_MESSAGE_category3_MES3_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 哼，世间尚有无数秘境待探，名迹待访，谁愿在此等无聊琐事上纠缠不休。"
 AI_MESSAGE_category3_MES4_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 若非盟约之人愚钝如山中古岩，而敌寇又似能窥见命运丝线，吾之高洁军团，岂会败于 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 此等伎俩！"
 AI_MESSAGE_category3_MES5_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 一段混杂着愤怒与古老咒文的嘶吼…此等耻辱 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 吾以永恒之名义起誓，绝不再与汝为伍！！！"
 AI_MESSAGE_category3_MES6_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 此番，是尔等赢了，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]。来日方长，望能有场更为对等的较量。"
 AI_MESSAGE_category3_MES7_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 唉，一次关键之地的地脉异常，便让大势倾颓。无怪乎最终败给了 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]。"
 AI_MESSAGE_category3_MES8_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 噢？莫非是近来的星象暗中庇护了 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName]？否则，这理应是一场更为公平的对决！"
 AI_MESSAGE_category3_MES9_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 遥想旧日诸神并立的时代，战争法则更为直接纯粹。若依彼时规矩，[?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 绝无可能以这般取巧的方式取胜。"
 AI_MESSAGE_category3_MES10_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 是啊，关键的命运节点上，幸运未曾站在吾这一边。故而有了与 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 的此番败绩。可惜，再精妙的筹谋，在无常的时运前也显得苍白。"
 #Complaining about own allies
 AI_MESSAGE_category4_MES1_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 诸位见证者，请铭记 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 今日之背弃盟约、自毁长城之举。"
 AI_MESSAGE_category4_MES2_BOX1:0"[?global.trashtalk_own_country_tag_box1.GetFlag][?global.trashtalk_own_country_tag_box1.GetLeader]: 能否将这 [?global.trashtalk_other_country_tag_box1.GetNonIdeologyName] 从盟约中除名？时至今日，即便是雇佣一队镀金旅团，也比这般盟友可靠得多。"

 # BOX2

 AI_MESSAGE_category1_MES1_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 统御的智慧竟能沦落至此，心甘情愿将国土与权柄尽数奉上，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]。此等「功业」，足以为七国的史家提供绝妙的讽刺素材。"
 AI_MESSAGE_category1_MES2_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 呵…[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 枢密院的诸位，其谋略莫非是向丘丘暴徒学来的？"
 AI_MESSAGE_category1_MES3_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 看来，你对军阵之道与元素调配一窍不通，[?global.trashtalk_other_country_tag_box2.GetAdjective]的雏鸟。还是先从辨认地图上的地脉流向开始吧。"
 AI_MESSAGE_category1_MES4_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 眼见 [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 的防线如劣质陶器般破碎，连吾这般心性，也感到一阵索然无味。"
 AI_MESSAGE_category1_MES5_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 执掌国运、权衡利害，看来并非汝等所长，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]。不如卸下冠冕，去码头经营货船，或是在璃月港吆喝生意，或许更能发挥尔等的才能。"
 AI_MESSAGE_category1_MES6_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 吾甚为怀疑，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 的军团出征前，可曾进行过哪怕一次像样的协同演练？散漫无序，与盗宝团的劫掠队别无二致。"
 AI_MESSAGE_category1_MES7_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 看这辽阔富庶的 [?global.trashtalk_other_country_tag_box2.GetAdjective] 疆域，连同其中流淌的地脉恩惠，如今皆归入吾之版图。旧主无能，守不住此等眷顾。"
 AI_MESSAGE_category1_MES8_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 听着，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]，下次交锋前，至少教会你的士卒，将弩箭对准敌人而非天空。方才那漫无目的的箭雨，着实令人捧腹。"
 AI_MESSAGE_category1_MES9_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 境内为何哀鸿遍野？因为他们所仰望的旗帜与律法，已在吾等的意志下化为历史尘埃。"
 AI_MESSAGE_category1_MES10_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 为吾之子民开辟新的家园，引导地脉的祝福泽被四方，诚为乐事。[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]，汝可明白其中意味？"
 AI_MESSAGE_category2_MES1_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 吾之征伐，将如涤荡四方的元素潮汐，将尔等苦心经营的一切壁垒与荣光，彻底湮灭，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]！"
 AI_MESSAGE_category2_MES2_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 要不了多久，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 的市井巷陌间，孩童的童谣、诗人的篇章、史官的记述，将尽数沐浴在吾 [?global.trashtalk_own_country_tag_box2.GetAdjective] 的荣光之下。"
 AI_MESSAGE_category2_MES3_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 看看这群 [?global.trashtalk_other_country_tag_box2.GetAdjective] 的乌合之众，竟妄想阻挡吾历经魔神战争遗泽洗礼的 [?global.trashtalk_own_country_tag_box2.GetAdjective] 军团。若非结局早已写定，这盲目的反抗倒也称得上一出…悲喜剧。"
 AI_MESSAGE_category2_MES4_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 这就是你倾尽国库准备的全面战争？[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]。在吾眼中，其价值尚不如清理一处遗迹守卫盘踞的废墟。"
 AI_MESSAGE_category2_MES5_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 好生看管尔等那些 [?global.trashtalk_other_country_tag_box2.GetAdjective] 锻造工坊，维持炉火旺盛。待吾接手，它们铸出的利刃与坚甲，将指向更遥远的疆界。"
 AI_MESSAGE_category2_MES6_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 侧耳倾听，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]。这风中震颤的，是尔等关隘崩毁、界碑倾覆的哀鸣，亦是吾之凯歌的前奏。"
 AI_MESSAGE_category2_MES7_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 喂，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]，若你的指挥官懂得依据元素环境布阵，而非像受惊的骗骗花般缩入地底，这场游戏或许还能让吾的魔导军团稍微认真些。"
 AI_MESSAGE_category2_MES8_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 噗…快瞧，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 竟试图布下战阵！其阵列之荒唐，犹如驱使一群风史莱姆，去撼动孤云阁的定海神针。"
 AI_MESSAGE_category2_MES9_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 此时，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 的山水景致倒也别具一格。吾的远征军已将此地风光，视为战利品中颇具雅趣的一部分。"
 AI_MESSAGE_category2_MES10_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 识时务些，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]，速递降表。无谓的顽抗，不过是在这本将归于和平的土地上，徒增新的伤痕与悼亡诗篇。"
 AI_MESSAGE_category3_MES1_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 定然是沟通了深渊的污秽之力！此等悖逆常理之战果，绝非现世之军伍与谋略所能达成！"
 AI_MESSAGE_category3_MES2_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 何其不公！[?global.trashtalk_other_country_tag_box2.GetAdjective] 的兵卒个个宛如蒙受元素龙王加护，势不可挡；而吾 [?global.trashtalk_own_country_tag_box2.GetAdjective] 的忠勇之士，却似承受了磨损的诅咒，力不从心！"
 AI_MESSAGE_category3_MES3_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 哼，提瓦特广袤无垠，埋藏着无数失落的秘境与远古谜题，谁会将心力长久虚掷于这等毫无荣耀与美感的纷争泥沼。"
 AI_MESSAGE_category3_MES4_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 若非所谓盟约者，其心智堪比沉眠于层岩巨渊之下的古老岩偶；而对面的敌酋，却仿佛能预读元素潮汐的涨落。吾运筹帷幄的 [?global.trashtalk_own_country_tag_box2.GetAdjective] 雄师，竟会折戟于 [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 此等诡道！"
 AI_MESSAGE_category3_MES5_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 混杂着狂暴元素力与晦涩龙语的怒啸…奇耻大辱…[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]！吾以世界之法则起誓，吾之国度与尔等，自此命运之线永不相交！！！"
 AI_MESSAGE_category3_MES6_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 此次，是汝等棋高一着，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]。时光长河漫漫，期待下一次，是在更为公正的天平之上，再见分晓。"
