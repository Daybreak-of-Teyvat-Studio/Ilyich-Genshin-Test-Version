#纳塔 MOD 剧本优化说明
#本次优化严格遵循《原神》官方纳塔设定，基于六大部族（沃陆之邦、回声之子、流泉之众、悬木人、花羽会、烟谜主）核心设定重构剧本，严格保持 80 个国策、80 个事件、30 个决议、30 个理念的数量不变，核心优化方向如下：
#核心矛盾强化：深度植入部族间的历史恩怨、权力博弈、自治与统一的路线冲突，加入火神权威与部族议会的政治斗争、人龙关系的派系争议、主战与主和的路线对立，大幅提升内部政治玩法的深度。
#史诗感与贴合度：完全贴合纳塔官方剧情线（希巴拉克屠龙、奥奇坎暴政、五百年前坎瑞亚灾厄、烬寂海深渊威胁、归火圣夜巡礼、古名传承），所有代码内容与本地化文本均匹配原神世界观，摒弃非官方原创设定。
#可玩性提升：国策树加入多分支路线选择（温和调解 / 强硬整合、传统守护 / 技术革新、深渊清剿 / 内部维稳），事件加入多选项分支，决议提供丰富的内政操作空间，不同选择将触发不同的部族反应、属性增益与剧情走向。
#代码规范修正：修复原代码中 HOI4 语法不规范问题，完善国策前置条件、国策树层级结构，补全触发逻辑，确保 MOD 可正常运行，同时强化各系统间的联动性。

 #国策

 # 阶段1：六大部族的博弈（1-10）
 NAT_Call_Tribal_Council:"召集部族议会"
 NAT_Call_Tribal_Council_desc:"赤红火山平原上，六部族的旌旗在热风中考验。旅者以火神玛薇卡的名义，向沃陆之邦的农酋、回声之子的锻主、流泉之众的航首、悬木人的崖主、花羽会的鹰主、烟谜主的巫首发出召集令。议事篝火在源火城旧址熊熊燃起，映照着部族间世代累积的裂隙与对统一的微弱希冀。这不是一场简单的会面，而是纳塔打破割据的序章——唯有让散佚的部族声量汇入同一片火焰，才能让纷争的大地听见统一的回响，让源火的意志穿透割据的迷雾，为后续的盟约奠定根基。"

 NAT_Win_Warlords_Alliance:"缔结军阀同盟"
 NAT_Win_Warlords_Alliance_desc:"议会的言辞终究难定乾坤，部族首领们的桀骜需要利益与荣耀双重羁绊。旅者穿梭于各部首领之间，以公平的资源分配许诺沃陆之邦，以燃素锻造秘方拉拢回声之子，以商路垄断权和解流泉之众。当各部族的精锐战士列队站在同一面火焰旗帜下，当沃陆的铁骑、回声的锻炉、流泉的船帆皆为同盟注脚，这份脆弱却珍贵的盟约便成了压制内部分裂的基石。火焰的同盟终将烧尽隔阂的荆棘，让统一的火种在猜忌与试探中生根发芽，为纳塔走出割据泥潭铺就第一步。"

 NAT_Pacify_Volu_Bang:"安抚沃陆之邦"
 NAT_Pacify_Volu_Bang_desc:"沃陆之邦世代扎根火山沃土，以耕种颗粒果、驯养家畜为生，却因与邻部的水源纷争而躁动不安。旅者亲赴其领地，踏着火山灰覆盖的田埂，与部族农酋立下火神誓约：重新划分火渠灌溉范围，以国家名义保障粮价稳定。当沃陆农人放下刀剑重拾农具，当被争夺的火渠重新流淌着滋养作物的泉水，这片土地便重回纳塔粮仓的本色。千百年的农耕传统在和平中复苏，金黄的颗粒果铺满火山谷地，为统一的纳塔筑牢最坚实的生计根基，让火山的馈赠真正滋养每一位子民。"

 NAT_Woo_Echo_Sons:"笼络回声之子"
 NAT_Woo_Echo_Sons_desc:"回声之子隐居于峡谷工坊，执掌提瓦特最精湛的熔岩锻造之术，他们的锻炉能熔铸出附着火焰之力的兵刃。旅者携带着从图兰圣城遗址找到的古老锻模，造访部族的核心工坊，允诺以烬寂海开采的高纯度燃素为薪，助其革新锻造技艺。当滚烫的铁水在改良后的熔炉中再度奔流，当第一批熔铸了燃素结晶的长剑列成阵列，回声之子的锻主便率全族宣誓效忠。他们的工坊自此化作纳塔军事力量的核心熔炉，为统一之路源源不断地熔铸坚甲利刃，让火焰的锋芒震慑所有割据势力。"

 NAT_Reconcile_Spring_Folk:"调和流泉之众"
 NAT_Reconcile_Spring_Folk_desc:"流泉之众依循烬寂海的支流而居，是纳塔唯一掌控海上商路的部族，他们的商船曾穿梭于七国港口。往昔的部族隔阂让他们紧闭贸易闸门，导致纳塔物资匮乏。旅者溯流而上，登上流泉之众的旗舰，以平等的贸易协定与和解诚意化解积怨：开放纳塔内陆市场，换取其商路对国家的开放。当悬挂着火焰旗帜的商船重新穿越熔岩海岸的水道，当香料、矿石与粮食的交易在港口再度繁盛，流泉之众的船帆便成了纳塔对外联结的纽带，让火焰的热情随商路涌向提瓦特的每一个角落。"

 NAT_Bind_Hanging_Tree_Clan:"联结悬木人部族"
 NAT_Bind_Hanging_Tree_Clan_desc:"悬木人栖身于火山峭壁间的巨木之上，他们攀爬峭壁如履平地，精通山地作战与速建工事之术，是纳塔边境天然的守护者。旅者亲自攀越灼热的岩壁，在部族的巨木聚落中与崖主立誓：保留其部族自治权，国家将投入资源改善山地聚落的生存条件，换其全力戍守边境。当悬木人的藤梯与栈道联结起各座山隘，当部族斥候游走于边境的每一寸土地，纳塔的山地防线便固若金汤。部族与国家的纽带如巨木根系般深扎岩壁，为统一的纳塔筑牢最坚固的边境屏障，抵御外部势力与深渊魔物的觊觎。"

 NAT_Win_Feather_Guild:"争取花羽会支持"
 NAT_Win_Feather_Guild_desc:"花羽会的驭鹰者是纳塔天空的主宰，他们驾驭着翼龙翱翔于火山上空，视野能覆盖纳塔的每一寸土地，传承着古纳塔最精湛的空战技艺。旅者献上由回声之子精心锻造的精雕鹰哨，承诺在火山高地为其修建御风塔楼，改善驭鹰与训练条件，赢得了花羽会的全力支持。当雄鹰载着信使穿梭于各部族领空，当尘封的空战典籍被重新研习，花羽会的羽翼便成了纳塔的眼睛与翅膀。统一的号令借鹰翼传遍火山原野，让每一片土地都能即时听见火神的召唤，让割据势力再无隐匿之地。"

 NAT_Appease_Smoke_Mystics:"安抚烟谜主部族"
 NAT_Appease_Smoke_Mystics_desc:"烟谜主深居烬寂海边缘的迷雾沼泽，掌握着纳塔最古老的密仪与情报之术，他们能从燃烧的草药烟雾中窥见未来端倪，从地脉波动中感知危险。旅者摒弃杂念，踏入部族的迷雾祭坛，以最虔诚的姿态聆听巫首的千年箴言，应允将全力保护其密仪传承不受外界干扰。当烟谜主的密探悄悄潜入各方领地，当迷雾化作遮蔽纳塔战略意图的天然屏障，这个神秘部族便成了旅者掌控全局的暗线。他们的情报让旅者总能先发制人，他们的密仪能驱散深渊带来的精神侵蚀，为统一之路扫清所有未知的阴霾。"

 NAT_Mediate_Tribal_Border_Disputes:"调解部族边境争端"
 NAT_Mediate_Tribal_Border_Disputes_desc:"经年的割据让六部族的边境线布满血与火的纠葛，每一寸火山灰覆盖的土地都可能成为争斗的导火索，水源、矿藏、狩猎场的争夺从未停歇。旅者化身火神的调停者，踏遍所有争端边境，以古纳塔流传的决斗传统为依据，让争议双方派出勇士公平竞技，胜者获得资源控制权，败者亦能得到国家的补偿。当边境的烽烟渐渐散去，当战士们放下指向同胞的刀剑，纳塔的土地终于不再被内部战火割裂。统一的版图在一次次和解中初见轮廓，火焰的和平终于降临这片饱经纷争的故土。"

 NAT_Establish_Great_Fire_Pact:"订立大炎之约"
 NAT_Establish_Great_Fire_Pact_desc:"六部族的代表齐聚火山中枢的源火祭坛，篝火燃烧至最旺盛的时刻，映照着每张写满郑重的脸庞。旅者高举从图兰圣城寻回的源火权杖，以火神玛薇卡的名义宣读大炎之约：六部族共尊火神为精神领袖，共享国家资源，共御外侮与深渊威胁，在保持部族文化自治的同时，接受国家的统一治理。这份契约被镌刻在巨大的熔岩石碑上，矗立在祭坛中央，成为纳塔统一的永恒基石。当所有部族首领按下血印，散佚的火种终于汇成燎原之势，纳塔的统一进程自此迈出决定性一步，源火的意志终将照亮整片赤色大地。"

 # 阶段2：火神的权柄与议会（11-20）
 NAT_Mavuika_s_Will_Declaration:"宣告玛薇卡之意志"
 NAT_Mavuika_s_Will_Declaration_desc:"大炎之约的墨迹尚未干透，旅者便登上火山之巅的圣火台，以火神玛薇卡的名义，向全体纳塔子民宣告她的神圣意志：纳塔当结束分裂，重拾古名传承的荣耀，团结所有力量直面烬寂海深处的深渊阴影。赤红的宣言随着热风传遍火山原野，玛薇卡的火焰图腾被刻满每一座部族祭坛，祭司们吟诵着古老的祷文，让火神的意志深入每一位子民的骨髓。这份意志是凝聚人心的号角，亦是对分裂势力的终极警示——火神的目光始终注视着这片土地，统一之路不容阻挡，任何妄图分裂纳塔的势力，都将被源火的烈焰吞噬。"

 NAT_Reform_Tribal_Parliament:"改革部族议会"
 NAT_Reform_Tribal_Parliament_desc:"旧有的部族议会仍残留着割据时代的烙印，权力分配不均，决策效率低下，难以适应统一后的治理需求。旅者大刀阔斧地重塑议会架构，赋予六部族平等的代表席位，确保每个部族的声音都能被听见，同时设立火神直辖的议事席位，平衡部族自治与国家集权的关系。当新的议事规则取代陈旧陋习，当议会的决议能顺畅传达到每一个部族的角落，纳塔的政治体系便从混乱走向有序。这份改革将分散的部族意志，锻造成统一的国家意志，让火神的律法通过议会的运作，真正扎根于每一寸纳塔土地。"

 NAT_Strengthen_Fire_God_Authority:"强化火神权威"
 NAT_Strengthen_Fire_God_Authority_desc:"玛薇卡的荣光曾因长期割据而日渐黯淡，部分部族对火神的信仰流于形式，甚至有势力借部族自治之名挑战神圣权威。旅者以雷霆手段整肃乱象，将火神圣徽立于每座城池的最高处，规定每月初一为全民祭祀日，让火神律法成为纳塔不可逾越的唯一准则。对违抗火神意志的分裂分子予以严惩，对虔诚的信仰者给予嘉奖。当祭祀火神的仪式重新成为纳塔社会的核心传统，当玛薇卡的名字被每一位子民虔诚传颂，火神的权威便如喷发的火山般不可撼动，成为抵御内部分裂与外部侵蚀的最强护盾。"

 NAT_Codify_Ancient_Name_System:"编纂古名传承体系"
 NAT_Codify_Ancient_Name_System_desc:"五百年前的坎瑞亚灾厄，让纳塔珍贵的古名传承几近断绝，许多承载着英雄意志与部族记忆的古名被遗忘在历史尘埃中。旅者召集烟谜主的资深学者与花羽会的史官，踏遍纳塔的山山水水，从火山岩刻、古老歌谣与部族族谱中，打捞起遗失的古名，编纂成《纳塔古名大典》。每一个古名都承载着一段厚重的历史：屠龙英雄希巴拉克的勇猛、盗火者库库尔坎的智慧、反抗暴政的奥奇坎的复杂。当这些名字重新被纳塔人呼唤，当古名所代表的精神被代代传承，纳塔的民族魂便彻底觉醒，成为凝聚人心的精神纽带。"

 NAT_Suppress_Separatist_Forces:"镇压分离主义势力"
 NAT_Suppress_Separatist_Forces_desc:"部分顽固的部族长老无法接受权力被削弱，躲在烬寂海的迷雾中暗中勾结，煽动不明真相的族人发动叛乱，妄图重燃割据战火，破坏来之不易的统一进程。旅者早已通过烟谜主的情报网络掌握其动向，果断调遣悬木人的山地精锐与回声之子的重装部队，以雷霆之势围剿叛乱据点。当叛乱首领被押至源火祭坛受审，当反叛的烽烟被源火的烈焰彻底扑灭，分裂言论再无容身之地。纳塔的内部终于再无动摇统一的暗流，所有子民都深刻明白，分裂只会带来毁灭，唯有团结才能让纳塔存续。"

 NAT_Honor_Heroes_Of_The_Calamity:"缅怀灾厄中的英雄"
 NAT_Honor_Heroes_Of_The_Calamity_desc:"五百年前，坎瑞亚灾厄席卷提瓦特，深渊魔物如潮水般涌入纳塔，无数勇士为了守护部族与家园，毅然拿起武器冲向战场，最终长眠于赤色大地。旅者下令在火山中枢修建宏伟的英雄祭坛，以火神之名追封所有无名英雄，将他们的事迹编撰成歌谣，由花羽会的驭鹰者传唱至纳塔的每一个角落。每当祭祀之日，子民们都会为英雄祭坛献上火焰之花，缅怀那些为守护家园而牺牲的先辈。这份深切的缅怀，化作了纳塔人抵御深渊的无尽勇气，让每一位后人都铭记，如今的和平与统一，皆是英雄们用鲜血铸就。"

 NAT_Redress_Ocican_Tyranny_Injustice:"昭雪奥奇坎暴政冤屈"
 NAT_Redress_Ocican_Tyranny_Injustice_desc:"奥奇坎的暴政曾是纳塔历史上的一段黑暗岁月，这位半人半龙的统治者在希巴拉克牺牲后陷入暴虐，给无数部族带来深重灾难，也让许多忠良蒙冤受辱，部族间的仇恨就此埋下。旅者深知历史的积怨会阻碍统一的脚步，于是下令重启尘封的审判记录，深入调查当年的冤案，为所有蒙冤者洗清罪名，恢复名誉。同时将奥奇坎的罪行与晚年为封印深渊而自我牺牲的真相一同刻入熔岩碑，让后人全面认识这位复杂的历史人物。当冤屈得以昭雪，当仇恨的种子被善意消解，纳塔的部族们真正放下了过往的芥蒂，不再被历史的阴影束缚前行的脚步。"

 NAT_Redress_Ocican_Tyranny_Injustice-B:"昭雪奥奇坎暴政冤屈"
 NAT_Redress_Ocican_Tyranny_Injustice-B_desc:"奥奇坎的暴政曾是纳塔历史上的一段黑暗岁月，这位半人半龙的统治者在希巴拉克牺牲后陷入暴虐，给无数部族带来深重灾难，也让许多忠良蒙冤受辱，部族间的仇恨就此埋下。旅者深知历史的积怨会阻碍统一的脚步，于是下令重启尘封的审判记录，深入调查当年的冤案，为所有蒙冤者洗清罪名，恢复名誉。同时将奥奇坎的罪行与晚年为封印深渊而自我牺牲的真相一同刻入熔岩碑，让后人全面认识这位复杂的历史人物。当冤屈得以昭雪，当仇恨的种子被善意消解，纳塔的部族们真正放下了过往的芥蒂，不再被历史的阴影束缚前行的脚步。"

 NAT_Establish_Duel_Mediation_System:"建立决斗调停体系"
 NAT_Establish_Duel_Mediation_System_desc:"纳塔的决斗传统源远流长，本是解决争端、彰显荣耀的神圣方式，却在割据时代逐渐沦为私斗的借口，造成无数无谓的牺牲。旅者以古纳塔的决斗法典为蓝本，建立起官方的决斗调停体系：只有经部族议会或国家认可的重大争端，方可通过决斗解决，且决斗过程必须有火神祭司在场见证，禁止任何阴谋诡计与偷袭行为。当决斗重新回归荣耀的本质，当所有争端都能以有序、公平的方式化解，纳塔内部便少了许多因私怨引发的流血冲突。这份体系将野性的决斗传统，转化为维护社会秩序的利器，让荣耀与规则在纳塔大地上共生共荣。"

 NAT_Unite_Tribal_Law_Code:"统一部族法典"
 NAT_Unite_Tribal_Law_Code_desc:"六部族在长期的割据中形成了各自的律法体系，奖惩标准不一，治理模式各异，导致纳塔统一后出现诸多治理难题，子民们无所适从。旅者召集各部族最资深的律法学者，在火神律法的基础上，融合每个部族的优秀传统，编纂出一部统一的《纳塔法典》。这部刻在数十块巨大熔岩石板上的法典，明确了子民的权利与义务、犯罪的惩处标准、资源的分配规则，涵盖了社会生活的方方面面。当《纳塔法典》被矗立在每座城镇的中心广场，当所有子民都遵循同一套准则生活，纳塔的社会便从混乱走向有序，这部统一的律法，也成为纳塔成为真正统一国家的法理基石。"

 NAT_Mavuika_s_Oath_To_Natlan:"玛薇卡的纳塔之誓"
 NAT_Mavuika_s_Oath_To_Natlan_desc:"内部的纷争渐渐平息，统一的律法已然成型，纳塔的根基愈发稳固。旅者登上火山之巅的源火祭坛，以火神玛薇卡的名义，向全体纳塔子民立下神圣的纳塔之誓：玛薇卡将永远守护这片赤色大地与她的子民，赐予他们抵御深渊侵蚀的勇气与力量，让纳塔的火焰永远燃烧，让古名的荣光重新回归提瓦特。誓言在山谷间久久回荡，声震四野，玛薇卡的火焰权杖指向天空，赤红色的火雨缓缓洒落大地，滋养着每一寸土地。纳塔子民皆俯首宣誓，愿为守护家园付出一切，这份神圣的誓言，成为纳塔走向新生的精神图腾，源火自此在纳塔的土地上永不熄灭。"

 # 阶段3：炉心与源火的秘辛（21-30）
 NAT_Explore_Turan_Sacred_City:"探索图兰圣城"
 NAT_Explore_Turan_Sacred_City_desc:"玛薇卡的纳塔之誓响彻大地，统一后的纳塔终于有力量探寻尘封的秘密。旅者将目光投向火山腹地的图兰圣城——那是古纳塔源火的诞生之地，是火龙王修库特尔曾经的居所，藏着人龙共生的古老秘密与燃素技术的核心奥秘。旅者组建了一支由烟谜主祭司、花羽会驭鹰者与回声之子工匠组成的探险队，配备最精良的装备，踏入这座被熔岩与时间尘封的圣城遗迹。脚下的每一块石板都镌刻着远古的符文，墙壁上的壁画描绘着人龙共处的繁荣景象，源火的脉动在深处隐隐回响，每一步探索都在揭开纳塔起源的神秘面纱，为掌握源火秘辛、制衡深渊威胁埋下重要伏笔。"

 NAT_Study_Phyton_Technology:"研习燃素技术"
 NAT_Study_Phyton_Technology_desc:"图兰圣城的遗迹深处，大量记载着燃素技术的古老石板重见天日——这是古纳塔驱动炉心、锻造神器的核心技艺，也是龙族文明的巅峰成就。旅者立刻召集回声之子的顶尖锻造大师与烟谜主的资深学者，成立专门的研究机构，夜以继日地破译燃素熔炼、储存与应用的密语。经过无数次试验，他们终于掌握了燃素的提纯工艺与稳定应用技术，对纳塔的工业体系进行全面革新。当燃素驱动的熔炉在各大工坊轰鸣作响，当燃素能量为纳塔带来前所未有的生产效率，源火的力量便从虚无的信仰化作了实实在在的生产力，为纳塔的崛起筑牢了坚实的工业根基。"

 NAT_Dragon_Human_Relationship_Policy:"制定人龙关系国策"
 NAT_Dragon_Human_Relationship_Policy_desc:"图兰圣城的壁画清晰揭示了古纳塔人龙共生的繁荣过往，而五百年前的灾厄却让这份深厚羁绊破裂，龙族躲入烬寂海深处，人类对龙族也充满猜忌。旅者深知龙族的力量对抵御深渊至关重要，于是力排众议，制定了全新的人龙和解国策：开放火山谷地中最肥沃的区域供龙族栖息，禁止任何人类伤害龙族，定期向龙族提供必要的物资，以源火祭坛的名义与龙族缔结和平盟约。当龙族的咆哮不再带着敌意，当人龙战士并肩巡视边境，当龙族的元素力量与人类的燃素技术相互融合，这份跨越千年的和解，让纳塔重拾了古早的强大力量，龙焰与源火交织，成为抵御深渊的双重坚盾。"

 NAT_Source_Fire_Heart_Guard:"守护源火之心"
 NAT_Source_Fire_Heart_Guard_desc:"源火之心是纳塔的能量核心，藏于图兰圣城最深处的火山熔核之中，它不仅是纳塔所有燃素能量的源头，更是维系纳塔地脉稳定的关键，自然也成了深渊势力最觊觎的目标。旅者深知源火之心的重要性，调遣纳塔最精锐的悬木人卫士与花羽会驭鹰者，在源火之心周边修建起层层叠叠的熔岩要塞，布设由烟谜主祭司加持的燃素结界。要塞的墙壁由坚固的火山岩砌成，布满了燃素喷射口与防御工事，空中有驭鹰者日夜巡逻，地面有卫士严密守卫。当守卫的战旗在熔核旁猎猎作响，当每一寸土地都布下防御的火网，源火之心便如铜墙铁壁般不可侵犯，纳塔的核心力量绝不容深渊染指。"

 NAT_Elemental_Furnace_Construction:"建造元素熔炉"
 NAT_Elemental_Furnace_Construction_desc:"燃素技术的突破性进展，让建造传说中的元素熔炉成为可能——这是一种能将源火能量转化为全域可用能源的巨型建筑，也是古纳塔文明的标志性成就。旅者调集流泉之众的顶级工匠与回声之子的锻造大师，耗费数年时间，在火山中枢动工修建这座宏伟巨构。元素熔炉的炉体由最坚硬的龙鳞岩与燃素合金打造，内部布满了精密的符文回路，能高效吸收并转化源火能量。当熔炉的烟囱喷出赤红烈焰，当源火能量顺着特制的火渠流遍纳塔的每一座城池、工坊与居所，纳塔的工业生产与民生水平实现了质的飞跃，彻底迈入了源火驱动的新纪元。"

 NAT_Win_Dragon_Sages_Support:"争取龙贤支持"
 NAT_Win_Dragon_Sages_Support_desc:"龙贤是古龙部族中的智慧长者，他们活了数千年，见证了提瓦特的沧桑变迁，掌握着最古老的元素知识、深渊的秘密以及人龙共生的真谛。旅者携带从图兰圣城寻回的龙族古物，亲自造访烬寂海深处的龙巢，以最谦卑的姿态请求龙贤的支持。旅者向龙贤阐述了纳塔面临的深渊威胁，展现了人类与龙族和解的诚意，承诺将永远守护龙族的栖息地。龙贤们被旅者的决心与诚意打动，同意将龙族的古老知识传授给纳塔的学者，派遣龙族技师协助人类改良燃素技术。当龙贤的智慧融入纳塔的研究体系，纳塔的科研速度一日千里，深渊的神秘面纱被层层揭开。"

 NAT_Suppress_Anti_Dragon_Extremists:"镇压反龙极端分子"
 NAT_Suppress_Anti_Dragon_Extremists_desc:"尽管人龙和解的国策带来了诸多益处，但仍有部分极端部族固守着人龙对立的陈旧执念，将龙族视为灾厄的根源，暗中破坏人龙盟约，袭击龙族的栖息地，甚至策划暗杀龙族使者。这些极端分子的行为不仅可能引发龙族的报复，更会让纳塔失去抵御深渊的重要盟友。旅者果断出动国家情报机构与精锐部队，全面清剿反龙分子的秘密据点，公开宣讲人龙共生的古纳塔历史与和平带来的好处，扭转部分子民的偏激认知。当反龙的言论被彻底肃清，当人龙和解的理念深入人心，纳塔内部再无割裂的隐患，龙焰与源火终于能真正并肩作战，共同守护这片赤色大地。"

 NAT_Ancient_Dragon_Forge_Restoration:"修复古龙锻炉"
 NAT_Ancient_Dragon_Forge_Restoration_desc:"在龙贤的指引下，旅者找到了沉眠于火山最深处的古龙锻炉——这是古纳塔时期人龙合力建造的神器级锻炉，能借助龙焰与源火的双重力量，熔铸出克制深渊魔物的神兵利器，却因千年岁月的侵蚀而破败不堪。旅者调集纳塔所有的顶级锻造大师与工匠，以回声之子最精湛的锻造术修复炉体，以烟谜主的秘仪重新激活燃素核心，邀请龙族技师协助校准龙焰导入装置。当这座传奇锻炉重新喷出炽热的龙焰与源火，当第一柄融着龙鳞与燃素的长剑被锻造出来，纳塔的军队便拥有了直面深渊魔物的底气，源火与龙焰的力量完美融合，终成破敌的绝世之刃。"

 NAT_Seal_Abyss_Rifts_In_Volcano:"封印火山深渊裂隙"
 NAT_Seal_Abyss_Rifts_In_Volcano_desc:"烬寂海的深渊力量日益强盛，开始从火山地带的地脉裂隙中不断渗透，污染着周边的土地与水源，蛊惑人心，催生魔物。旅者率领由人龙战士、祭司与工匠组成的联合队伍，赶赴每一处深渊裂隙所在地，以龙贤传授的古老封印之术，结合烟谜主的净化密仪与燃素的净化之力，对深渊裂隙进行全面封堵。工匠们用龙鳞岩与燃素合金打造坚固的封印模块，祭司们吟诵祷文驱散深渊能量，战士们则负责清剿已经涌现的魔物。当最后一道裂隙被熔岩与龙鳞封印，当深渊的低语彻底消失在火山风中，纳塔的腹地终于摆脱了深渊的直接侵蚀，为纳塔赢得了休养生息、积蓄力量的宝贵时间。"

 NAT_Master_Secret_Source_Technology:"掌握源火秘艺"
 NAT_Master_Secret_Source_Technology_desc:"古龙锻炉的成功重启与深渊裂隙的全面封印，让纳塔的学者与工匠们终于触碰到了源火的核心秘艺——这是一种能将深渊能量反向转化为源火能量的禁忌之术，也是古纳塔抵御深渊的终极手段。旅者整合了所有研究成果，将烟谜主的密仪、龙贤的古老智慧、回声之子的锻造技术与现代的燃素理论融为一体，成立了专门的秘艺研究机构。经过无数次的试验与改良，纳塔终于彻底掌握了这门源火秘艺，不仅能将少量捕获的深渊能量转化为无害的源火，还能在武器与防具上铭刻反制深渊的符文。当源火秘艺被全面应用于纳塔的工业、军事与防御体系，纳塔真正拥有了与深渊正面抗衡的资本。"

 # 阶段4：决斗法典与荣花演武（31-40）
 NAT_Establish_Duel_Code:"建立决斗法典"
 NAT_Establish_Duel_Code_desc:"纳塔的决斗传统虽历史悠久，却缺乏统一的规范，导致时常出现违规决斗、恶意伤人的事件。源火秘艺的掌握让纳塔有了更坚实的基础，旅者决定正式建立统一的决斗法典，让决斗成为维护荣耀、解决争端的正式途径。法典详细规定了决斗的发起条件、参与资格、武器限制、场地要求与胜负判定标准，明确禁止偷袭、使用毒器等卑劣手段，确立了‘点到即止、尊重对手’的决斗精神。法典还规定，重大决斗需在神圣的决斗竞技场举行，由火神祭司担任公证人，确保决斗的公平与神圣。当这部凝聚着纳塔荣耀精神的决斗法典正式颁布，决斗便从单纯的武力较量，升华为承载着纳塔文化与信仰的重要仪式。"

 NAT_Build_Sacred_Duel_Arena:"修建神圣决斗竞技场"
 NAT_Build_Sacred_Duel_Arena_desc:"决斗法典的建立需要配套的场地，旅者下令在源火城的中心区域，修建一座宏伟的神圣决斗竞技场，作为举办重大决斗与仪式的专属场所。竞技场的设计融合了六部族的建筑风格：沃陆之邦的夯土基座、回声之子的燃素照明、流泉之众的水道降温、悬木人的藤编看台、花羽会的鹰徽装饰、烟谜主的符文结界。竞技场的中央是由龙鳞岩铺成的决斗场地，四周环绕着阶梯式看台，能容纳数万观众，顶部设有可开启的穹顶，方便观众欣赏决斗的同时，也能让阳光与星光洒满场地。当这座气势恢宏的竞技场落成，每一场在这里举行的决斗都充满了神圣感与仪式感，成为纳塔最受瞩目的文化盛事。"

 NAT_Hold_Glorious_Flower_Martial_Arts:"举办荣花演武"
 NAT_Hold_Glorious_Flower_Martial_Arts_desc:"为了检验纳塔战士的实力，弘扬决斗文化，凝聚部族向心力，旅者决定举办首届荣花演武盛典——这是一场面向全体纳塔勇士的决斗盛会，也是纳塔最隆重的体育与军事节日。演武盛典为期七天，设有单人决斗、团队对抗、武器专精等多个项目，来自六部族的勇士们齐聚神圣决斗竞技场，各展所长，一较高下。演武过程中不设生死局，胜负仅以技巧与勇气判定，获胜者将获得由火神亲自授予的‘荣花勇士’称号与特制的燃素武器。当竞技场中欢呼声、呐喊声此起彼伏，当勇士们的招式行云流水，纳塔的尚武精神被推向顶峰，年轻一代的战士也在这场盛典中汲取经验，成长为守护家园的新生力量。"

 NAT_Standardize_Honor_Duel_Rules:"规范荣誉决斗规则"
 NAT_Standardize_Honor_Duel_Rules_desc:"荣花演武的成功举办，让旅者意识到荣誉决斗在纳塔社会中的重要性，但仍有部分细节规则需要完善。旅者召集六部族的决斗大师与律法学者，对荣誉决斗的规则进行进一步规范：明确荣誉决斗的发起只能是为了捍卫个人或部族的荣誉，禁止因私人恩怨或利益冲突发起决斗；决斗前需签订正式协议，明确决斗的目的与后果；决斗过程中需有三名以上的公证人在场，确保全程公平公正；败者需坦然接受结果，胜者不得赶尽杀绝。这些细致的规则让荣誉决斗更加规范化、神圣化，既保留了纳塔人崇尚勇武的传统，又避免了不必要的伤亡与冲突，让荣誉与规则在决斗中完美平衡。"

 NAT_Establish_Duel_Champion_System:"建立决斗冠军体系"
 NAT_Establish_Duel_Champion_System_desc:"随着决斗文化的日益繁荣，建立一套完善的决斗冠军体系被提上日程。旅者下令设立‘纳塔首席决斗冠军’‘部族决斗冠军’‘武器专精冠军’等多个头衔，形成层次分明的冠军体系。首席决斗冠军需在每三年举办一次的全国决斗大赛中脱颖而出，不仅要具备超强的决斗技巧，还需拥有高尚的品德与强烈的家国情怀，将成为纳塔的精神象征之一，负责传授决斗技艺、主持重大决斗仪式。部族决斗冠军则负责本部族的决斗文化传承与勇士训练。当这套冠军体系正式确立，纳塔的决斗文化有了明确的发展方向，勇士们也有了更清晰的奋斗目标，决斗不再是单纯的较量，更成为了传承荣耀、守护家园的重要途径。"

 NAT_Duel_Training_Camp_System:"决斗训练营体系"
 NAT_Duel_Training_Camp_System_desc:"为了让更多纳塔子民掌握决斗技巧，提升全民的军事素养，以应对潜在的深渊威胁，旅者决定在全国范围内建立决斗训练营体系。每个部族设立一座主力训练营，由部族决斗冠军担任教官，传授基础的格斗技巧、武器使用、战术配合与决斗规则。训练营对所有成年纳塔子民开放，无论男女老少，都能免费接受训练，优秀者将被选拔进入国家精英训练营，接受更专业的指导。这些训练营不仅是培养决斗勇士的场所，更是传播纳塔文化、凝聚民族精神的重要载体。当训练有素的子民遍布纳塔的每一个角落，哪怕深渊突然来袭，每一寸土地都能涌现出守护家园的勇士。"

 NAT_Duel_Training_Camp_System-B:"决斗训练营体系II"
 NAT_Duel_Training_Camp_System_desc-B:"为了让更多纳塔子民掌握决斗技巧，提升全民的军事素养，以应对潜在的深渊威胁，旅者决定在全国范围内建立决斗训练营体系。每个部族设立一座主力训练营，由部族决斗冠军担任教官，传授基础的格斗技巧、武器使用、战术配合与决斗规则。训练营对所有成年纳塔子民开放，无论男女老少，都能免费接受训练，优秀者将被选拔进入国家精英训练营，接受更专业的指导。这些训练营不仅是培养决斗勇士的场所，更是传播纳塔文化、凝聚民族精神的重要载体。当训练有素的子民遍布纳塔的每一个角落，哪怕深渊突然来袭，每一寸土地都能涌现出守护家园的勇士。"

 NAT_Hold_Fire_Return_Sacred_Night_Pilgrimage:"举办归火圣夜巡礼"
 NAT_Hold_Fire_Return_Sacred_Night_Pilgrimage_desc:"归火圣夜是纳塔最神圣的传统节日，传说这一夜，火神玛薇卡的力量最为强盛，逝去英雄的魂灵会重返人间，守护他们深爱的家园。旅者决定恢复并升级归火圣夜巡礼，将其与决斗文化相结合，打造一场兼具信仰、文化与军事意义的盛大活动。巡礼当晚，纳塔子民手持燃素灯笼，从各地出发，前往源火祭坛集结，沿途需经过多个试炼关卡，考验参与者的勇气、智慧与决斗技巧。到达源火祭坛后，将举行隆重的祭祀仪式与冠军决斗表演，祭司们会为所有参与者赐下火神的祝福。当燃素灯笼的光芒照亮整个山谷，当英雄的魂灵与现世的子民在火光中相遇，纳塔的民族凝聚力与信仰力量被推向顶峰。"

 NAT_Duel_Resolve_Tribal_Conflicts:"以决斗解决部族冲突"
 NAT_Duel_Resolve_Tribal_Conflicts_desc:"尽管纳塔已经统一，但部族间仍会因资源分配、边境划分等问题产生摩擦，若处理不当，极易引发新的冲突。旅者决定将决斗文化进一步应用于部族关系调节，规定部族间的非原则性冲突，可通过派出代表进行决斗的方式解决，决斗的胜负即为冲突的最终结果，双方必须无条件遵守。这种方式既保留了部族的荣誉与尊严，又避免了大规模的流血冲突，符合纳塔人崇尚勇武与公平的传统。当部族代表在神圣决斗竞技场上公平较量，当所有部族都认可这种冲突解决方式，纳塔的内部关系愈发和谐，部族间的羁绊也在一次次公平的决斗中愈发深厚，真正实现了‘以武止戈、以勇促和’。"

 NAT_Flame_Blessing_For_Duel_Warriors:"为决斗勇士赋予火焰祝福"
 NAT_Flame_Blessing_For_Duel_Warriors:"决斗勇士是纳塔荣耀的象征，也是守护家园的中坚力量。旅者决定在每次重大决斗或军事行动前，为优秀的决斗勇士赋予火焰祝福，这是纳塔最高级别的荣誉之一。祝福仪式在源火祭坛举行，由首席火神祭司主持，祭司们吟诵古老的祷文，将源火的神圣能量注入勇士的武器与铠甲，使其具备更强的威力与防御力，同时也象征着火神与勇士同在。获得火焰祝福的勇士，不仅在实力上得到提升，更将成为全体纳塔子民的榜样，肩负着传承荣耀、守护家园的重任。当这些沐浴着火焰祝福的勇士踏上决斗场或战场，他们的每一次挥剑都带着源火的力量，每一次冲锋都承载着纳塔的希望。"

 NAT_Ultimate_Duel_Of_Heroes:"英雄的终极决斗"
 NAT_Ultimate_Duel_Of_Heroes_desc:"随着纳塔的日益强盛与深渊威胁的加剧，一场汇聚全纳塔最顶尖勇士的终极决斗被提上日程。这不是一场为了争夺胜负的较量，而是一场展现纳塔最高决斗技艺、凝聚全民意志、向深渊宣告决心的史诗级盛会。来自六部族的冠军勇士齐聚神圣决斗竞技场，在数万子民与火神祭司的见证下，展开一场场惊心动魄的对决。决斗过程中，勇士们将各自的决斗技巧、部族传承与源火力量发挥到极致，每一招每一式都充满了力量与美感。最终的胜利者将被授予‘纳塔第一勇士’的至高称号，成为对抗深渊的先锋领袖。当终极决斗的最后一剑落下，全场爆发出雷鸣般的欢呼，纳塔的尚武精神与团结意志达到顶峰，所有子民都坚信，他们必将战胜深渊，守护家园。"

 # 阶段5：部族的整合与裂痕（41-50）
 NAT_Promote_Natlan_National_Identity:"推广纳塔民族认同"
 NAT_Promote_Natlan_National_Identity_desc:"尽管纳塔已经实现了政治上的统一，但部分子民的部族认同感仍强于国家认同感，这成为了影响纳塔长远发展的潜在隐患。旅者决定启动大规模的纳塔民族认同推广计划，通过教育、文化、仪式等多种方式，强化全体子民的国家意识。在学校中开设纳塔历史与文化课程，让孩子们从小了解纳塔的统一历程与英雄事迹；在全国范围内举办纳塔文化节，展示六部族的优秀文化，同时突出共同的民族特质；将归火圣夜巡礼、荣花演武等活动打造为全民参与的国家节日。当‘我是纳塔人’的信念深深扎根于每一位子民的心中，当六部族的文化融入统一的纳塔文明，纳塔的民族凝聚力将前所未有的强大，成为抵御内部分裂与外部威胁的最坚实屏障。"

 NAT_Integrate_Tribal_Resource_System:"整合部族资源体系"
 NAT_Integrate_Tribal_Resource_System_desc:"统一之前，六部族各自掌控着不同的资源，沃陆之邦的粮食、回声之子的矿产、流泉之众的水产、悬木人的木材、花羽会的禽畜、烟谜主的草药，资源分配不均，浪费严重，极大地制约了纳塔的发展。旅者下令整合全国的资源体系，成立专门的资源管理机构，对各类资源进行统一勘探、开采、分配与调度。根据各地的资源禀赋与发展需求，合理规划生产布局，让沃陆之邦的粮食供应全国，回声之子的矿产优先供应军工，流泉之众的水产保障沿海与内陆的需求。这种统一的资源调配体系，彻底打破了部族间的资源壁垒，实现了资源的优化配置，极大地提升了纳塔的生产效率与综合国力，为后续的发展奠定了坚实的物质基础。"

 NAT_Unify_Tribal_Military_Forces:"统一部族军事力量"
 NAT_Unify_Tribal_Military_Forces_desc:"统一之前，六部族各自拥有独立的武装力量，编制混乱，装备不一，战术各异，难以形成有效的作战合力，面对深渊威胁时更是力不从心。旅者决定对全国的军事力量进行全面统一整合，将各部族的武装改编为国家军队的不同兵种：沃陆之邦的战士改编为步兵，回声之子的工匠组建军工部队，流泉之众的水手组建海军，悬木人的勇士组建山地部队，花羽会的驭鹰者组建空军，烟谜主的祭司组建特殊支援部队。同时统一编制、统一装备、统一训练、统一指挥，制定标准化的战术手册。当这支整合后的国家军队正式形成战斗力，纳塔的军事力量实现了质的飞跃，能够快速响应任何方向的威胁，成为守护纳塔的钢铁长城。"

 NAT_Autonomy_Policy_For_Loyal_Tribes:"忠诚部族的自治政策"
 NAT_Autonomy_Policy_For_Loyal_Tribes_desc:"在纳塔的统一进程中，许多部族始终坚定地支持国家统一，为平息叛乱、抵御深渊做出了重要贡献。为了表彰这些忠诚部族的功绩，同时尊重其独特的文化与传统，旅者制定了专门的自治政策：给予忠诚部族一定的地方治理权，允许其保留部分部族习俗与传统仪式，在资源分配上给予适当倾斜，部族的优秀人才优先进入国家管理层。这种自治政策既保障了部族的利益与文化传承，又维护了国家的统一与稳定，实现了‘统一性与多样性’的完美平衡。当忠诚部族感受到国家的尊重与关怀，他们对国家的归属感与忠诚度进一步提升，成为维护纳塔统一的核心力量。"

 NAT_Establish_Unified_Taxation_System:"建立统一税收体系"
 NAT_Establish_Unified_Taxation_System_desc:"统一之前，六部族各自实行不同的税收制度，税率不一，税种混乱，征管方式各异，不仅加重了子民的负担，也导致国家财政收入不稳定。旅者下令建立全国统一的税收体系，根据各地的经济发展水平与资源禀赋，制定公平合理的税率，明确税种与征收范围，设立专门的税收征管机构，规范征管流程。税收收入统一纳入国家财政，主要用于国防建设、基础设施修建、民生改善与文化传承。统一的税收体系不仅理顺了国家的财政秩序，保障了稳定的财政收入，还极大地减轻了子民的负担，提升了政府的公信力，让纳塔的治理体系更加完善。"

 NAT_Suppress_Rebellious_Tribal_Elders:"镇压叛乱部族长老"
 NAT_Suppress_Rebellious_Tribal_Elders_desc:"尽管大多数部族都支持国家统一，但仍有少数顽固的部族长老，贪恋过去的特权，无法接受权力的丧失，暗中勾结外部势力，煽动部族民众发动叛乱，妄图分裂国家。这些叛乱分子的行为严重威胁到了纳塔的统一与稳定，必须予以坚决镇压。旅者依靠统一后的国家军队与烟谜主的情报网络，迅速锁定叛乱分子的据点，采取精准打击的方式，快速平定叛乱，抓获首恶分子。对于参与叛乱的普通民众，采取教育与感化相结合的方式，让他们认识到分裂的危害；对于顽固的叛乱首领，则依法予以严惩。这场镇压行动彻底清除了纳塔内部的分裂隐患，让所有子民都明白，分裂国家的行为必将受到严厉惩罚，统一的纳塔不容分裂。"

 NAT_Suppress_Rebellious_Tribal_Elders-B:"镇压叛乱部族长老II"
 NAT_Suppress_Rebellious_Tribal_Elders-B_desc:"尽管大多数部族都支持国家统一，但仍有少数顽固的部族长老，贪恋过去的特权，无法接受权力的丧失，暗中勾结外部势力，煽动部族民众发动叛乱，妄图分裂国家。这些叛乱分子的行为严重威胁到了纳塔的统一与稳定，必须予以坚决镇压。旅者依靠统一后的国家军队与烟谜主的情报网络，迅速锁定叛乱分子的据点，采取精准打击的方式，快速平定叛乱，抓获首恶分子。对于参与叛乱的普通民众，采取教育与感化相结合的方式，让他们认识到分裂的危害；对于顽固的叛乱首领，则依法予以严惩。这场镇压行动彻底清除了纳塔内部的分裂隐患，让所有子民都明白，分裂国家的行为必将受到严厉惩罚，统一的纳塔不容分裂。"

 NAT_Unify_Cultural_And_Educational_System:"统一文化教育体系"
 NAT_Unify_Cultural_And_Educational_System_desc:"六部族在长期的发展中形成了各自独特的文化与教育模式，虽然丰富了纳塔的文化内涵，但也造成了文化认同的差异与教育水平的不均衡。旅者决定统一全国的文化教育体系，组织学者编写统一的教材，将纳塔的历史、文化、价值观、法律与决斗传统纳入教学内容，在全国范围内推广标准化的教育模式，建立从基础教育到高等教育的完整体系。同时设立文化保护机构，在保护六部族优秀传统文化的基础上，推动文化的融合与创新，形成统一的纳塔文化认同。当统一的文化教育体系在全国范围内普及，纳塔的教育水平得到全面提升，子民的文化认同感与国家归属感也进一步增强。"

 NAT_Establish_Natlan_Unified_Law:"制定纳塔统一律法"
 NAT_Establish_Natlan_Unified_Law_desc:"尽管之前已经统一了部族法典，但随着纳塔社会的发展与变化，新的问题与矛盾不断涌现，原有的法典已经难以适应新的形势。旅者下令组织全国最顶尖的律法学者、部族长老与政府官员，在原有法典的基础上，结合纳塔的社会现实与发展需求，制定一部更加完善、全面的纳塔统一律法。这部新的律法涵盖了民事、刑事、行政、军事、经济等各个方面，明确了各类行为的规范与奖惩标准，强调‘法律面前人人平等’，既尊重部族传统，又适应现代社会的发展。当这部统一律法正式颁布实施，纳塔的治理彻底步入法治化轨道，社会秩序更加稳定，子民的权利与利益得到更好的保障，纳塔成为了一个真正意义上的法治国家。"

 NAT_Integrate_Tribal_Guard_Forces:"整合部族护卫力量"
 NAT_Integrate_Tribal_Guard_Forces_desc:"统一之后，各部族仍保留着一定规模的护卫力量，主要负责本部族的治安与防御。这些护卫力量虽然在维护地方治安方面发挥了一定作用，但也存在装备落后、训练不足、指挥不一的问题，难以应对大规模的治安事件或突发威胁。旅者决定将全国的部族护卫力量进行整合，改编为国家警察与地方防卫部队，统一配备装备，统一进行训练，统一接受指挥。国家警察主要负责日常的治安管理、犯罪打击与公共安全维护；地方防卫部队则负责协助正规军进行边境防御、灾害救援与内部维稳。这种整合不仅提升了地方治安与防御能力，也进一步强化了国家对地方的管控，让纳塔的安全体系更加完善。"

 NAT_All_Tribes_Unification_Declaration:"全部族统一宣言"
 NAT_All_Tribes_Unification_Declaration_desc:"经过多年的努力，纳塔在政治、经济、军事、文化、法律等各个方面都实现了彻底的统一，六部族真正融合为一个不可分割的整体。旅者选择在源火祭坛举行盛大的全部族统一宣言仪式，邀请六部族的所有首领、长老、勇士与代表参加，提瓦特其他六国也派遣使节出席见证。仪式上，旅者庄严宣读《纳塔全部族统一宣言》，回顾纳塔的统一历程，阐述纳塔的发展理念与未来愿景，承诺将永远守护这片土地与所有子民，抵御深渊威胁，重振古纳塔的荣耀。当宣言的最后一个字落下，源火祭坛喷出冲天的火焰，六部族的旗帜与纳塔的国家旗帜一同升起，全场响起雷鸣般的欢呼与掌声。这一刻，纳塔真正实现了万火归一，成为提瓦特大陆上一个强大而统一的国家。"

 # 阶段6：燃素军工与龙骸锻造（51-60）
 NAT_Establish_Phyton_Weapon_Research:"建立燃素武器研究所"
 NAT_Establish_Phyton_Weapon_Research_desc:"全部族统一之后，纳塔面临的深渊威胁愈发严峻，传统的武器装备已经难以应对深渊魔物的强大力量。旅者决定集中全国的科研力量与资源，建立专门的燃素武器研究所，专注于研发以燃素为核心的新型武器装备。研究所汇聚了回声之子的锻造大师、烟谜主的符文专家、龙贤的元素学者与纳塔的顶尖科学家，他们通力合作，深入研究燃素的特性与应用，开发出一系列具有强大威力的燃素武器：能喷射高温火焰的燃素喷射器、能爆炸产生冲击波的燃素炸弹、能铭刻反深渊符文的燃素长剑、能发射燃素能量弹的远程武器等。这些新型武器的研发，让纳塔的军事实力得到了质的飞跃，为抵御深渊威胁提供了强大的技术支撑。"

 NAT_Flame_Enchantment_Forge_Expansion:"扩建火焰附魔锻坊"
 NAT_Flame_Enchantment_Forge_Expansion_desc:"燃素武器的研发成功，需要大规模的生产能力作为支撑。旅者下令扩建全国的火焰附魔锻坊，在原有锻坊的基础上，增加新的生产车间，引进先进的燃素熔炼与锻造设备，培训更多的专业工匠。扩建后的火焰附魔锻坊采用流水线生产模式，能高效地生产各类燃素武器与铠甲，同时引入龙骸锻造技术，将龙鳞、龙骨与燃素合金相结合，打造出更加坚固、锋利的装备。这些锻坊不仅能满足纳塔军队的装备需求，还能为盟友提供部分武器支援，成为纳塔军工体系的核心力量。当火焰附魔锻坊的炉火日夜不熄，当一批批先进的武器装备源源不断地输送到军队，纳塔抵御深渊的底气愈发充足。"

 NAT_Dragon_Bone_Armor_Development:"研发龙骨装甲"
 NAT_Dragon_Bone_Armor_Development_desc:"深渊魔物的攻击越来越强大，普通的铠甲已经难以保护士兵的安全。旅者下令启动龙骨装甲研发计划，利用龙族提供的龙骸材料，结合燃素技术与符文附魔，打造具有超强防护力与反深渊能力的新型装甲。研发团队经过无数次试验，终于找到了龙骸与燃素合金的最佳融合比例，通过特殊的锻造工艺与符文铭刻，让龙骨装甲具备了极高的物理防御与魔法防御能力，能有效抵御深渊魔物的利爪、尖牙与黑暗能量侵蚀。同时，装甲的设计兼顾了防护性与灵活性，不会影响士兵的战斗动作。当第一批龙骨装甲列装部队，士兵们的生存能力大幅提升，在与深渊魔物的战斗中更加勇往直前。"

 NAT_Expansion_Of_Volcano_Industrial_Zone:"扩建火山工业区"
 NAT_Expansion_Of_Volcano_Industrial_Zone_desc:"火山地带丰富的燃素资源与地热能源，使其成为纳塔工业发展的核心区域。全部族统一后，纳塔的工业需求急剧增加，原有的火山工业区已经难以满足生产需要。旅者下令大规模扩建火山工业区，将周边的山谷与平原纳入规划范围，新建大量的民用工厂、军工厂、科研机构与配套设施。工业区内采用最先进的燃素能源供应系统，实现了能源的高效利用与零污染排放，同时修建了完善的交通网络，方便原材料与产品的运输。扩建后的火山工业区成为了提瓦特大陆上最先进的工业区之一，不仅能满足纳塔的民生与军事需求，还能通过贸易向其他国家出口工业产品，为纳塔带来丰厚的经济收益。"

 NAT_Mobile_Warfare_Tactics_Innovation:"革新机动战术"
 NAT_Mobile_Warfare_Tactics_Innovation_desc:"随着燃素技术的发展与新型武器装备的列装，纳塔军队的作战方式也需要进行相应的革新。旅者下令成立战术研究小组，由经验丰富的军事将领、龙贤与战术专家组成，结合纳塔的地形特点与军队优势，研发全新的机动战术体系。这套战术体系以燃素驱动的装甲车、摩托车与飞行器为核心，强调快速部署、迂回包抄、集中优势兵力打击敌人弱点，同时充分利用纳塔的山地、森林与海岸地形，开展灵活多变的游击战与运动战。当这套机动战术体系在军队中全面推广，纳塔军队的作战效率与战斗力大幅提升，能够快速应对战场上的各种突发情况，在与深渊魔物的战斗中占据主动地位。"

 NAT_Flame_Artillery_Development:"研发火焰火炮"
 NAT_Flame_Artillery_Development_desc:"在大规模的战争中，火炮是决定战局的关键武器。旅者下令研发具有纳塔特色的火焰火炮，将燃素技术与传统火炮相结合，打造出威力强大的新型火炮系统。火焰火炮以高纯度燃素为弹药，能发射高温火焰弹、爆炸弹与穿甲弹等多种弹药，射程远、威力大、精度高，既能对地面目标进行毁灭性打击，也能对空中目标进行有效拦截。研发团队还为火炮配备了先进的瞄准系统与机动底盘，使其具备了快速转移阵地与精准打击的能力。当第一批火焰火炮列装部队，纳塔军队的火力支援能力得到了质的飞跃，在攻城略地、边境防御与大规模会战中发挥了至关重要的作用，成为抵御深渊魔物大规模进攻的利器。"

 NAT_Flame_Artillery_Development-B:"研发火焰火炮II"
 NAT_Flame_Artillery_Development_desc-B:"在大规模的战争中，火炮是决定战局的关键武器。旅者下令研发具有纳塔特色的火焰火炮，将燃素技术与传统火炮相结合，打造出威力强大的新型火炮系统。火焰火炮以高纯度燃素为弹药，能发射高温火焰弹、爆炸弹与穿甲弹等多种弹药，射程远、威力大、精度高，既能对地面目标进行毁灭性打击，也能对空中目标进行有效拦截。研发团队还为火炮配备了先进的瞄准系统与机动底盘，使其具备了快速转移阵地与精准打击的能力。当第一批火焰火炮列装部队，纳塔军队的火力支援能力得到了质的飞跃，在攻城略地、边境防御与大规模会战中发挥了至关重要的作用，成为抵御深渊魔物大规模进攻的利器。"

 NAT_Naval_Forge_Construction:"建设海军锻坊"
 NAT_Naval_Forge_Construction_desc:"纳塔拥有漫长的海岸线与丰富的海洋资源，海军的建设对于保卫海疆、保障海上贸易通道安全至关重要。旅者下令在流泉之众的主要港口建设大型海军锻坊，专门负责海军舰艇与舰载武器的研发与生产。海军锻坊采用先进的船坞与锻造设备，结合燃素技术与龙骸材料，打造出一系列先进的海军舰艇：高速灵活的燃素驱逐舰、火力强大的燃素巡洋舰、能搭载飞行器的航空母舰、专门用于反潜与反深渊魔物的特种舰艇等。这些先进的舰艇不仅具备强大的作战能力，还能适应海洋环境的复杂变化，有效抵御深渊魔物对海洋的侵蚀。当纳塔海军正式形成战斗力，纳塔的海疆得到了有效守护，海上贸易通道也更加安全。"

 NAT_Aviation_Industry_Expansion:"扩建航空工业"
 NAT_Aviation_Industry_Expansion_desc:"空中力量在现代战争中具有不可替代的作用，能够快速部署、侦察敌情、打击敌人纵深目标。旅者决定扩建纳塔的航空工业，在花羽会的聚居地附近建设大型航空工厂与机场，研发与生产各类飞行器。航空工业采用燃素发动机技术，结合轻量化材料与空气动力学设计，打造出一系列先进的飞行器：用于侦察与通信的轻型侦察机、用于空中格斗的战斗机、用于对地攻击的轰炸机、用于运输与救援的运输机等。这些飞行器具备航程远、速度快、机动性强的特点，能在各种复杂的气象条件下执行任务。当纳塔的空军部队正式组建完成，纳塔实现了陆、海、空三维立体作战体系的全覆盖，在与深渊的对抗中占据了绝对的空中优势。"

 NAT_Elite_Flame_Warrior_Training:"精锐火焰战士训练"
 NAT_Elite_Flame_Warrior_Training_desc:"面对日益强大的深渊威胁，纳塔需要一支精锐的特种部队，能够执行最危险、最艰巨的任务。旅者下令启动精锐火焰战士训练计划，从全国军队中选拔最优秀的士兵，进入专门的精英训练营接受严格的训练。训练内容包括高强度的体能训练、精湛的武器使用技巧、先进的战术配合、深渊魔物的特性研究、燃素能量的直接运用等多个方面，由最优秀的军事将领、决斗冠军与龙贤亲自授课。经过数年的艰苦训练，这些士兵成为了具备超强战斗力、意志力与忠诚度的精锐火焰战士，他们能够熟练运用各类燃素武器与战术，在深渊最前线与强大的魔物展开殊死搏斗，成为守护纳塔的最后一道防线。"

 NAT_Military_Industry_Modernization:"军事工业现代化"
 NAT_Military_Industry_Modernization_desc:"经过一系列的研发与建设，纳塔的军事工业已经具备了一定的规模，但与应对深渊的终极威胁相比，仍有提升空间。旅者决定启动军事工业现代化计划，对全国的军工体系进行全面升级。引入最先进的生产技术与管理模式，实现军工生产的自动化、智能化与标准化；加强科研与生产的结合，建立从研发到生产、装备、维护的完整产业链；加大对军工人才的培养与引进力度，打造一支高素质的军工人才队伍；加强与龙族的技术合作，吸收龙族的先进工艺与知识。当军事工业现代化计划完成，纳塔的军工生产能力、研发水平与装备质量实现了全面提升，能够快速、高效地生产出各类先进的武器装备，当前文件内容过长，豆包只阅读了前 2%。

 # 阶段7：深渊的低语与烬寂海的阴影（61-70）
 NAT_Investigate_Abyss_Infiltration:"调查深渊渗透"
 NAT_Investigate_Abyss_Infiltration_desc:"随着纳塔的强盛，烬寂海深处的深渊势力愈发躁动，其渗透已悄然蔓延至纳塔的城镇与部族。部分子民被深渊低语蛊惑，沦为魔物的傀儡，地脉中也出现了异常的黑暗能量波动。旅者下令启动全国范围的深渊渗透调查，由烟谜主祭司感知地脉异常，情报机构追踪可疑人员，龙贤协助分析深渊能量特性。调查队深入烬寂海边缘的迷雾沼泽、废弃矿洞与古老遗迹，揭露深渊通过祭祀仪式、黑暗低语、能量污染三种方式渗透的真相。唯有摸清深渊的渗透路径与手段，才能制定精准的反制策略，守护纳塔的纯净与安宁。"

 NAT_Strengthen_Night_God_Realm_Protection:"强化夜神之国防护"
 NAT_Strengthen_Night_God_Realm_Protection_desc:"夜神之国是纳塔魂灵的归宿，也是抵御深渊侵蚀的精神屏障，更是还魂诗奇迹的源头。近期，深渊能量试图突破夜神之国的边界，污染地脉与魂灵，若此处失守，纳塔将失去最根本的精神依托。旅者率领祭司团与龙贤前往夜神之国，以源火能量加固地脉屏障，用烟谜主的净化密仪驱散黑暗能量，在天钉周边布设燃素符文阵。同时选拔精锐卫士驻守夜神之国入口，禁止无关人员进入，确保魂灵的安宁与地脉的纯净。当夜神之国的防护体系全面强化，深渊的黑暗再难侵入，纳塔的精神根基愈发稳固。"

 NAT_Clean_Up_Abyss_Cult_Forces:"清剿深渊邪教势力"
 NAT_Clean_Up_Abyss_Cult_Forces_desc:"调查发现，深渊渗透的核心载体是秘密蔓延的深渊邪教，这些邪教徒以‘获得黑暗力量’为诱饵，蛊惑意志薄弱的子民，举行邪恶祭祀，唤醒深渊魔物，严重威胁纳塔的安全。旅者下令展开全国性的深渊邪教清剿行动，由国家军队、警察与部族护卫力量协同作战，根据情报机构提供的线索，精准打击邪教据点。在清剿过程中，一方面以强大的武力摧毁邪教巢穴，严惩邪教首领；另一方面通过宣传与教育，揭露邪教的欺骗性与危害性，唤醒被蛊惑的子民。当最后一个邪教据点被捣毁，深渊在纳塔内部的传播渠道被彻底切断，子民们对深渊的警惕性与抵抗力大幅提升。"

 NAT_The_Shadow_Of_The_Embersea:"烬寂海的阴影"
 NAT_The_Shadow_Of_The_Embersea_desc:"烬寂海是纳塔西侧的天然屏障，也是深渊势力聚集的核心区域，五百年前的坎瑞亚灾厄让这片海域沦为黑暗的温床，魔物在深海中滋生，黑暗能量不断溢出。近期，烬寂海的黑暗阴影愈发浓重，魔物频繁袭击沿海村落与商船，甚至试图冲破海岸防线。旅者下令加强烬寂海沿岸的防御，在关键港口与海湾修建坚固的海防要塞，部署火焰火炮与燃素喷射器，组建专门的海防舰队与海岸巡逻队。同时组织探险队深入烬寂海浅海区域，绘制魔物分布图，寻找深渊能量的源头，为后续的主动出击做准备。当海岸防线固若金汤，纳塔的海疆便能抵御住深渊阴影的侵蚀。"

 NAT_Hold_War_Council_Against_Abyss:"召开抗渊战争会议"
 NAT_Hold_War_Council_Against_Abyss_desc:"深渊的威胁已迫在眉睫，单纯的防御难以长久，必须制定全面的抗渊战略。旅者召集六部族首领、军事将领、龙贤、祭司与学者，在源火城召开最高规格的抗渊战争会议。会议上，各方代表深入分析了深渊的实力、渗透方式与核心目标，制定了‘防御稳固、精准清剿、主动反击、联合盟友’的总体战略。明确了各部族与军队的职责分工，规划了物资储备、兵力部署、科研攻关的具体方案，确立了以纳塔为主导、联合龙族与提瓦特盟友的抗渊联盟框架。当抗渊战争会议圆满结束，纳塔上下达成统一共识，所有力量都朝着‘战胜深渊’的共同目标汇聚，一场正义的卫国战争即将打响。"

 NAT_Unite_Dragon_Alliance_Against_Abyss:"联合龙族抗渊同盟"
 NAT_Unite_Dragon_Alliance_Against_Abyss_desc:"龙族与纳塔唇齿相依，深渊的扩张同样威胁着龙族的生存空间。在抗渊战争会议后，旅者亲自前往龙巢，与龙族首领正式缔结联合抗渊同盟。双方约定：纳塔为龙族提供安全的栖息地与必要的物资支持，龙族派遣精锐龙战士加入纳塔军队，共享元素力量与深渊知识，协同作战，共同抵御深渊威胁。同盟成立后，龙战士与纳塔士兵混编训练，龙族技师协助改良武器装备，龙贤与纳塔学者共同研发抗渊技术。当龙焰与源火交织，当人龙战士并肩冲锋，纳塔的抗渊力量得到了质的飞跃，成为提瓦特大陆上最强大的抗渊核心。"

 NAT_Unite_Dragon_Alliance_Against_Abyss-B:"联合龙族抗渊同盟II"
 NAT_Unite_Dragon_Alliance_Against_Abyss_desc-B:"龙族与纳塔唇齿相依，深渊的扩张同样威胁着龙族的生存空间。在抗渊战争会议后，旅者亲自前往龙巢，与龙族首领正式缔结联合抗渊同盟。双方约定：纳塔为龙族提供安全的栖息地与必要的物资支持，龙族派遣精锐龙战士加入纳塔军队，共享元素力量与深渊知识，协同作战，共同抵御深渊威胁。同盟成立后，龙战士与纳塔士兵混编训练，龙族技师协助改良武器装备，龙贤与纳塔学者共同研发抗渊技术。当龙焰与源火交织，当人龙战士并肩冲锋，纳塔的抗渊力量得到了质的飞跃，成为提瓦特大陆上最强大的抗渊核心。"

 NAT_Repair_Sealing_Needle_Of_Shadow:"修复缝影针封印"
 NAT_Repair_Sealing_Needle_Of_Shadow_desc:"缝影针是纳塔古老的抗渊神器，以固态燃素为核心，刻录着反深渊符文，遍布纳塔各地，钉住被污染的地脉，封堵深渊裂隙。历经千年岁月与深渊侵蚀，许多缝影针的封印力量已经衰减，部分甚至破损断裂，失去了封印效果。旅者下令启动缝影针修复计划，组织由工匠、祭司与龙贤组成的修复团队，携带高纯度燃素与符文材料，奔赴全国各地的缝影针所在地。修复团队不仅修补破损的针体，还重新铭刻强化后的反深渊符文，注入源火与龙焰能量，提升封印强度。当所有缝影针的封印全部修复，纳塔的地脉重新稳定，深渊能量难以再通过裂隙渗透，抗渊的防御体系更加完善。"

 NAT_Develop_Abyss_Resistance_Technology:"研发抗渊抗性技术"
 NAT_Develop_Abyss_Resistance_Technology_desc:"深渊魔物的黑暗能量具有强烈的侵蚀性，不仅能伤害肉体，还能污染精神与装备，给纳塔军队造成了巨大的伤亡。旅者下令集中科研力量，研发专门的抗渊抗性技术，重点突破三个方向：一是研发抗渊药剂，通过提取燃素精华与龙族鳞片中的有效成分，中和深渊侵蚀；二是改良装备附魔，在武器与铠甲上铭刻更强的反深渊符文，抵御黑暗能量；三是训练士兵的精神抗性，通过冥想、祭祀与模拟对抗，提升士兵抵御深渊低语的意志力。当抗渊抗性技术研发成功并全面应用，纳塔士兵在与深渊魔物的战斗中，生存能力与作战效率大幅提升，再也不必畏惧深渊能量的侵蚀。"

 NAT_Heroes_Memorial_For_Calamity:"灾厄英雄纪念碑"
 NAT_Heroes_Memorial_For_Calamity_desc:"在与深渊的长期抗争中，无数纳塔勇士献出了宝贵的生命，他们用鲜血与牺牲守护了家园，值得永远铭记。旅者下令在源火城的核心区域，修建宏伟的灾厄英雄纪念碑，纪念所有在抗渊战争中牺牲的英雄。纪念碑以黑色黑曜石为基座，上面镌刻着每一位英雄的名字与事迹，顶部矗立着手持燃素长剑、仰望天空的英雄雕像，雕像内部注入了源火能量，日夜散发着温暖的光芒。每年的灾厄纪念日，纳塔子民都会来到纪念碑前献上鲜花与祭品，缅怀英雄的功绩，传承他们的勇气与精神。这座纪念碑不仅是对英雄的告慰，更是凝聚纳塔人心、激发抗渊斗志的精神象征。"

 NAT_Mavuika_s_Abyss_Burning_Oath:"玛薇卡的焚渊誓言"
 NAT_Mavuika_s_Abyss_Burning_Oath_desc:"抗渊准备已全部就绪，纳塔即将对深渊发起全面反击。旅者登上源火祭坛，以火神玛薇卡的名义，向全体纳塔子民、龙族盟友与提瓦特大陆立下焚渊誓言：‘以源火之名，以古名之荣，以英雄之魂，吾等必将焚尽深渊黑暗，守护纳塔每一寸土地，守护提瓦特每一份光明。纵使战至最后一兵一卒，纵使付出一切代价，也绝不退缩，绝不屈服！’誓言响彻云霄，源火祭坛喷出冲天的火焰，染红了整片天空。纳塔子民与龙族战士齐声高呼，响应誓言，抗渊的斗志被彻底点燃。这份神圣的誓言，成为了纳塔抗渊战争的精神旗帜，指引着所有正义的力量，向着深渊发起最后的冲锋。"

 # 阶段8：万火归一与纳塔的新生（71-80）
 NAT_The_Great_Unity_Of_All_Fires:"万火归一"
 NAT_The_Great_Unity_Of_All_Fires_desc:"焚渊誓言立下之后，纳塔迎来了真正的‘万火归一’——不仅是六部族的彻底融合，更是人心、信仰、力量的完全凝聚。曾经的部族隔阂彻底消失，所有子民都以‘纳塔人’为荣；源火与龙焰完美交融，成为抗渊的最强力量；古老的传统与现代的技术相互成就，让纳塔的文明达到新的高度。旅者在源火城举行盛大的万火归一庆典，点燃象征六部族的六簇火焰，最终汇入中央的源火圣火，象征着纳塔的所有力量凝聚成一股不可阻挡的洪流。当万火归一的光芒照亮整片赤色大地，纳塔真正成为了一个团结、强大、不可分割的整体，具备了战胜一切敌人的底气与信心。"

 NAT_Establish_Diplomatic_Relations_With_Liyue:"与璃月建立外交关系"
 NAT_Establish_Diplomatic_Relations_With_Liyue_desc:"纳塔的崛起与抗渊决心，引起了提瓦特各国的关注。璃月作为提瓦特的商业中心与军事强国，有着丰富的抗灾经验与强大的经济实力，与纳塔建立友好关系，对双方都有着重要意义。旅者派遣外交使团前往璃月港，携带纳塔特有的燃素工艺品、火山宝石与龙鳞特产，表达建立外交关系的诚意。璃月港的岩王帝君与七星认可了纳塔的实力与诚意，双方正式签订外交协定，建立大使级外交关系，开展贸易往来、技术交流与军事合作。璃月为纳塔提供经济援助与商业渠道，纳塔则与璃月共享抗渊情报与燃素技术，双方的联盟成为提瓦特抗渊的重要支柱。"

 NAT_Teyvat_Flame_Diplomacy_Initiative:"提瓦特火焰外交倡议"
 NAT_Teyvat_Flame_Diplomacy_Initiative_desc:"与璃月建交的成功，让旅者看到了联合提瓦特各国共同抗渊的希望。旅者发起‘提瓦特火焰外交倡议’，以‘团结抗渊、互利共赢’为核心，向蒙德、稻妻、须弥、枫丹、至冬六国发出外交邀请，邀请各国派遣代表前往纳塔参加外交峰会。峰会上，旅者阐述了深渊对提瓦特的共同威胁，分享了纳塔的抗渊经验与技术成果，提出了建立提瓦特抗渊联盟的构想。通过真诚的沟通与协商，纳塔与各国达成了广泛共识，签订了贸易、技术、军事等多项合作协议，建立了常态化的情报共享与联合军演机制。火焰外交倡议的成功，让纳塔成为提瓦特抗渊联盟的核心，也让纳塔的影响力传遍整个提瓦特。"

 NAT_Alliance_With_Mondstadt_And_Inazuma:"与蒙德、稻妻结盟"
 NAT_Alliance_With_Mondstadt_And_Inazuma_desc:"在提瓦特火焰外交峰会上，蒙德的自由之风与稻妻的雷电之力，与纳塔的源火能量形成了互补。蒙德拥有强大的骑兵与空军，稻妻有着精湛的锻造技术与海军实力，与两国建立紧密的军事联盟，能极大提升纳塔的抗渊战力。旅者与蒙德的西风骑士团团长、稻妻的幕府将军签订三方同盟条约：战时相互支援，共享军事基地与后勤保障；和平时期开展联合训练与技术交流，共同研发抗渊武器装备。同盟成立后，蒙德的骑兵与纳塔的步兵协同作战，稻妻的战舰与纳塔的海军并肩巡防，三方的力量相互融合，形成了覆盖陆、海、空的立体抗渊防线，成为提瓦特抗渊联盟的中坚力量。"

 NAT_Sumeru_Academic_And_Industrial_Cooperation:"须弥学术与工业合作"
 NAT_Sumeru_Academic_And_Industrial_Cooperation_desc:"须弥是提瓦特的学术中心，拥有最丰富的知识储备与最顶尖的科研机构，其在元素魔法、地脉研究与生物科技方面的成就，对纳塔的抗渊战争与工业发展有着重要的借鉴意义。旅者与须弥的教令院签订学术与工业合作协议，建立联合科研机构，共同研究深渊的本质、地脉的奥秘与燃素的深层应用；互派学者与留学生，交流知识与技术；合作建设工业项目，将须弥的学术成果转化为实际生产力，提升双方的工业水平与抗渊能力。通过与须弥的深度合作，纳塔的科研速度与工业实力实现了跨越式提升，抗渊技术也取得了多项重大突破。"

 NAT_Eternal_Flame_Legion_Establishment:"建立永恒火焰军团"
 NAT_Eternal_Flame_Legion_Establishment_desc:"为了应对大规模的抗渊战争，同时履行对提瓦特抗渊联盟的承诺，旅者决定建立一支专门的跨国抗渊部队——永恒火焰军团。军团以纳塔的精锐火焰战士为核心，吸纳来自璃月、蒙德、稻妻、须弥等国的优秀士兵，配备最先进的燃素武器、龙骨装甲与抗渊装备，由纳塔的军事将领与各国的军事专家共同指挥。军团的使命是在提瓦特各地打击深渊势力，支援受深渊侵袭的国家，保护重要的地脉节点与遗迹。当永恒火焰军团正式组建完成，在源火城举行盛大的誓师大会后，便奔赴提瓦特各地的抗渊前线，成为守护提瓦特和平的‘火焰利剑’。"

 NAT_Natlan_Industrial_Renaissance:"纳塔工业复兴"
 NAT_Natlan_Industrial_Renaissance_desc:"在与各国的合作与自身的努力下，纳塔迎来了全面的工业复兴。以火山工业区为核心，纳塔建立了完善的工业体系，涵盖民用工业、军事工业、能源工业、材料工业等多个领域。民用工业能满足全国子民的生活需求，生产出各类高质量的日用品、农具与建筑材料；军事工业能高效生产先进的武器装备与防御设施，为抗渊战争提供坚实保障；能源工业以燃素为核心，实现了能源的自给自足与对外输出；材料工业研发出多种新型合金与复合材料，推动了技术的持续进步。工业复兴不仅让纳塔的经济实力大幅提升，民生水平显著改善，更让纳塔成为提瓦特工业强国之一，为抗渊战争与长远发展奠定了坚实的物质基础。"

 NAT_Fontaine_And_Snezhnaya_Diplomatic_Outreach:"枫丹与至冬外交拓展"
 NAT_Fontaine_And_Snezhnaya_Diplomatic_Outreach_desc:"枫丹以精密的机械技术与公正的律法体系闻名，至冬则拥有强大的军事力量与先进的冰元素技术，与两国建立友好关系，能进一步完善提瓦特抗渊联盟的布局。旅者派遣外交使团分别前往枫丹与至冬，开展外交拓展。与枫丹达成机械技术与律法体系的交流合作，引入枫丹的精密机械制造技术，完善纳塔的工业标准与律法体系；与至冬建立军事互信与技术合作，共享抗渊情报与战术经验，学习至冬的冰元素应用技术，与纳塔的燃素技术形成互补。通过与枫丹、至冬的外交拓展，提瓦特抗渊联盟的覆盖范围进一步扩大，各国的力量相互补充，形成了全方位、多层次的抗渊合作格局。"

 NAT_Mavuika_s_Eternal_Flame_Blessing:"玛薇卡的永恒火焰祝福"
 NAT_Mavuika_s_Eternal_Flame_Blessing_desc:"纳塔的繁荣与抗渊的节节胜利，离不开火神玛薇卡的庇佑。在纳塔工业复兴、外交圆满、联盟稳固之际，旅者前往源火祭坛，举行盛大的祭祀仪式，祈求玛薇卡的永恒火焰祝福。仪式上，祭司们吟诵着古老的祷文，源火祭坛喷出纯净的金色火焰，笼罩着整个源火城。玛薇卡的意志通过火焰传递：‘吾之子民，汝等以团结与勇气守护家园，以智慧与正义赢得尊重，吾将赐予永恒火焰祝福，愿源火永燃，纳塔永存！’这份祝福让纳塔的源火能量更加纯净强大，子民的意志力与生命力得到提升，武器装备的威力也进一步增强。永恒火焰的祝福，成为纳塔最珍贵的精神财富与力量源泉。"

 NAT_Glory_Of_Natlan_The_Land_Of_Burning_Fires:"燃烧之地纳塔的荣耀"
 NAT_Glory_Of_Natlan_The_Land_Of_Burning_Fires_desc:"历经数百年的纷争与抗争，纳塔终于迎来了属于自己的荣耀。曾经分裂的部族实现了真正的万火归一，曾经的深渊威胁被有效遏制，纳塔成为了提瓦特大陆上强大、繁荣、团结的国家。在提瓦特抗渊联盟中，纳塔是核心力量；在国际舞台上，纳塔的声音被广泛尊重；在文明发展上，纳塔实现了传统与现代的完美融合。源火的光芒照亮了整片赤色大地，古名的荣耀得以重振，英雄的精神代代传承，人龙共生的佳话传遍提瓦特。纳塔，这片燃烧之地，不再是被深渊威胁的边缘国度，而是守护提瓦特和平的坚强堡垒，是文明繁荣的典范，是所有纳塔人骄傲与自豪的源泉。这份荣耀，将永远铭刻在提瓦特的历史长河中，与源火一同永恒燃烧。"



 # 纳塔国家理念 Localisation（30个）



 # 纳塔Ideas本地化文本
 NAT_Mavuika_Eternal_Authority:"火神永恒权柄"
 NAT_Mavuika_Eternal_Authority_desc:"这是纳塔不灭之火玛薇卡执掌的至高权柄，传承自初代火神希巴拉克的炎之威仪，在圣火永燃的盟地昭彰万代。火神以焚净之炎护佑部族，以不灭意志凝聚众心，令六大部族俯首归心，政权威权自固。在这份权柄加持下，纳塔战士的战心如圣火炽烈，威权与战魂相融，成为对抗深渊最坚实的精神支柱，让火之国度的意志永不折损。"

 NAT_Volu_Bang_Fertility_Oath:"沃陆之邦丰饶誓约"
 NAT_Volu_Bang_Fertility_Oath_desc:"沃陆之邦与突角龙共生的千年誓约，凝萃着火山余灰赠予纳塔的大地恩宠。这片丰藏的沃野上，金穗随热风翻涌，农桑深耕的硕果滋养着万千族民，工坊的锤鸣与田垄的稻香交织成歌。丰饶的誓约让沃土迸发无尽生机，农产满仓、工坊兴盛、人力不竭，成为纳塔对抗深渊的粮秣与人力根基，让大地的馈赠化作守护盟地的力量。"

 NAT_Echo_Sons_Forging_Heritage:"回声之子锻火传承"
 NAT_Echo_Sons_Forging_Heritage_desc:"回声之子与嵴锋龙相守的锻火传承，是纳塔最炽烈的匠艺荣光。自锻火英雄伊葵始，这份传承便将燃素熔入锻冶，让硫磺支脉的晶火淬炼出最坚韧的兵器。峡谷间的锻炉永燃，匠人们以古龙的燃素锻造之法，敲打出破深渊的利刃、御黑暗的甲胄，炼火的智慧更让陆上兵器的研究步步精进，每一件锻品都是对抗深渊的锋刃。"

 NAT_Spring_Folk_Trade_Waterway:"流泉之众通商航道"
 NAT_Spring_Folk_Trade_Waterway_desc:"流泉之众与鳍游龙共生的通商航道，是纳塔连通四方的水韵脉络。温泉之乡的流水绕着溶水域蜿蜒，商船随碧波行遍提瓦特的海岸，帆影与泉声相映，贸易的繁华让流泉之地成为纳塔的通商枢纽。这份航道的荣光让贸易效率倍增，造船工坊的技艺愈发精湛，航船的速度如游龙逐浪，让火之国度的商路成为汇聚资源、对抗深渊的纽带。"

 NAT_Hanging_Tree_Clan_Fortification:"悬木人天堑工事"
 NAT_Hanging_Tree_Clan_Fortification_desc:"悬木人与匿叶龙共筑的天堑工事，是纳塔踞石山上的天险屏障。先祖以绳索钩爪将巨木悬于崖壁，造就了易守难攻的聚落，这份筑造的智慧代代相传，让纳塔的工事如磐石般坚固。悬木人的匠艺让建筑拔地而起，防线的突破与防御皆臻化境，每一处工事都藏着匿叶龙的隐秘与悬木人的坚韧，成为抵御深渊入侵的铜墙铁壁。"

 NAT_Feather_Guild_Air_Supremacy:"花羽会空翼制霸"
 NAT_Feather_Guild_Air_Supremacy_desc:"花羽会与绒翼龙共舞的空翼制霸，是纳塔天际的焰色荣光。部族勇士与绒翼龙一同翱翔于翘枝崖的天际，翼影如流云遮蔽长空，空战的技艺在风与火的淬炼中愈发精湛。造翼工坊的锤鸣日夜不息，空战的攻势如鹰击长空，每一次振翅都凝聚着花羽会的勇毅，让纳塔的天际成为无人能侵的领域，深渊的暗影再难从长空降临。"

 NAT_Smoke_Mystics_Mystic_Ritual:"烟谜主谜烟秘仪"
 NAT_Smoke_Mystics_Mystic_Ritual_desc:"烟谜主与暝视龙相守的谜烟秘仪，是纳塔最神秘的夜域智慧。镜璧山的迷烟缭绕，祭司们以灵谜涂鸦沟通夜神之国，以暝视之能窥探深渊的踪迹，谜烟的秘仪让情报的收集如影随形。这份源自夜神的智慧，让反谍与谍报的技艺臻于化境，情报机关的效率倍增，迷烟如网，将深渊的阴谋与外来的窥探尽数笼罩。"

 NAT_Ancient_Name_Inheritance_System:"古名传承体系"
 NAT_Ancient_Name_Inheritance_System_desc:"纳塔代代相承的古名体系，是英雄荣光的不朽延续。自希巴拉克的时代始，黑曜石羽毛上的燃素刻录，将英雄的事迹与精神凝为古名，大灵的选择让英雄的意志在族民间传递。这份传承让纳塔的民族之魂愈发炽烈，战士们以古名为誓，在战场中淬炼勇毅，战心如圣火永燃，每一个古名都代表着一份对抗深渊的不朽信念。"

 NAT_Fire_Return_Sacred_Night_Pilgrimage:"归火圣夜巡礼"
 NAT_Fire_Return_Sacred_Night_Pilgrimage:"归火圣夜巡礼"
 NAT_Fire_Return_Sacred_Night_Pilgrimage_desc:"纳塔最盛大的归火圣夜巡礼，是圣火竞技场的焰色狂欢，更是火之国度的精神图腾。族民们以武会友，角逐之焰汇聚成圣火的薪柴，让圣火永燃以抵御深渊。巡礼的荣光让纳塔的民心凝聚，社会安定如磐，战士们的战心被角逐的烈焰点燃，万千族民皆愿为守护盟地奔赴战场，人力如潮，战魂如炽。"

 NAT_Phyton_Technology_Innovation:"燃素技术革新"
 NAT_Phyton_Technology_Innovation_desc:"纳塔源火孕育的燃素技术革新，是古龙智慧与人类匠艺的完美交融。自火龙王修库特尔以燃素驱动机械始，这份源自源火的力量便不断进化，人类汲取古龙的智慧，让燃素融入工业、科研的每一个角落。技术的革新让工业效率倍增，工坊的产出节节攀升，科研的脚步愈发迅疾，燃素的烈焰成为推动纳塔发展、对抗深渊的核心动力。"

 NAT_Dragon_Human_Symbiosis_Covenant:"人龙共生盟约"
 NAT_Dragon_Human_Symbiosis_Covenant_desc:"纳塔跨越千年的人龙共生盟约，是火之国度最珍贵的羁绊。自盗火者开启人龙共处的篇章，六大部族各与龙众相守，龙的力量与人类的智慧相融，成为纳塔独有的荣光。这份盟约让火之国度的民心安定，战士们借龙的勇毅让陆上攻势愈发凌厉，军事科技在人龙智慧的碰撞中不断精进，人龙同心，共御深渊。"

 NAT_Duel_Code_Glory:"决斗法典荣光"
 NAT_Duel_Code_Glory_desc:"纳塔刻入骨血的决斗法典荣光，是火之民族的勇毅象征。从圣火竞技场的角逐到对抗深渊的战场，纳塔战士皆以决斗法典为准则，以勇力定胜负，以荣光铸战魂。这份法典让战士们的士气如烈焰升腾，战场的历练让战技愈发精湛，战心被荣光点燃，每一次冲锋都带着决斗者的无畏，让深渊的暗影在勇毅的攻势下节节败退。"

 NAT_Night_God_Realm_Protection:"夜神之国守护"
 NAT_Night_God_Realm_Protection_desc:"纳塔地脉所系的夜神之国守护，是大灵与族民的生死羁绊。夜神以地脉为基，以大灵为引，守护着纳塔人的魂灵，也为现世的盟地筑起无形的屏障。这份守护让火之国度的民心安定，反谍的防线如夜域般隐秘，驻守的战士如磐石般坚定，夜神之国的微光穿透迷烟，成为抵御深渊侵蚀、守护族民魂灵的最后屏障。"

 NAT_Fire_Stealer_Wisdom_Heritage:"盗火者智慧传承"
 NAT_Fire_Stealer_Wisdom_Heritage_desc:"盗火者库库尔坎留予纳塔的智慧传承，是古龙智慧照亮人类文明的火种。这位贤龙偷来圣火，教人类以燃素之法，更将古龙的科研智慧代代相传，流泉的浮土静界仍藏着他的智慧结晶。这份传承让纳塔的科研脚步一日千里，工业效率倍增，实验室中不断诞生对抗深渊的智慧成果，圣火的微光终成照亮黑暗的炬火。"

 NAT_Embersea_Abyss_Defense_Line:"烬寂海深渊防线"
 NAT_Embersea_Abyss_Defense_Line_desc:"纳塔西境的烬寂海深渊防线，是血与火铸就的抗暗屏障。这片由特诺切与桑哈杰的牺牲造就的荒原，埋着无数英雄的英魂，纳塔人以燃素与巨石筑起防线，将深渊的暗影阻隔在西境之外。防线的筑造如疾风骤雨，陆上防御坚不可摧，英雄的英魂让战士们的战争疲惫消散，每一寸防线都写着纳塔人对抗深渊的决绝。"

 NAT_Dragon_Bone_Military_Forging:"龙骨军工锻造"
 NAT_Dragon_Bone_Military_Forging_desc:"纳塔独有的龙骨军工锻造，是古龙遗骨与燃素熔铸的战争荣光。自万杰鲁取龙骨铸剑始，纳塔的匠人们便知晓龙骨的坚韧，以燃素淬炼古龙遗骨，打造出最坚硬的甲胄、最锐利的火炮。这份锻造之法让陆上兵器的护甲坚不可摧，火炮的品质愈发精良，军工工坊的锤鸣日夜不息，龙骨的力量成为对抗深渊的硬核底气。"

 NAT_Great_Tribal_Unity_Oath:"部族大团结誓言"
 NAT_Great_Tribal_Unity_Oath_desc:"纳塔六大部族的大团结誓言，是火之国度凝沙成塔的精神内核。自希巴拉克建立人龙大联盟始，六大部族便放下纷争，以圣火为誓，同心共御深渊。这份誓言让纳塔的民心凝聚，政权威权自固，族民们同心协力，让民生的消耗悄然降低，每一个部族的力量汇聚成河，成为对抗深渊、守护盟地的磅礴之力。"

 NAT_Glorious_Flower_Martial_Arts_Ceremony:"荣花演武盛典"
 NAT_Glorious_Flower_Martial_Arts_Ceremony_desc:"纳塔的荣花演武盛典，是六大部族以武会友、切磋技艺的盛会。自纳博尔为救龙伙伴开启演武始，这份盛典便成为纳塔战士淬炼战技的舞台，圣火竞技场的烈焰中，战士们各展所长，砥砺前行。演武的荣光让战士们的战技飞速精进，陆上攻势愈发凌厉，兵员的招募如潮而至，每一次演武都为对抗深渊培育出更勇猛的战士。"

 NAT_Great_Spirit_Soul_Blessing:"大灵的魂灵庇佑"
 NAT_Great_Spirit_Soul_Blessing_desc:"夜神之国的大灵予纳塔的魂灵庇佑，是跨越生死的守护羁绊。六大部族的大灵以图腾为形，守护着纳塔人的魂灵，让牺牲的战士魂归夜域，让现世的族民得到魂灵的滋养。这份庇佑让纳塔的民生消耗悄然降低，社会安定如磐，人力的恢复如春风化雨，大灵的微光萦绕在每一个纳塔人身旁，成为对抗深渊的精神慰藉。"

 NAT_Secret_Source_Automaton_Military_Application:"秘源机兵军工应用"
 NAT_Secret_Source_Automaton_Military_Application_desc:"纳塔古龙遗泽的秘源机兵军工应用，是秘源技术与军事工业的完美融合。自火龙王以燃素驱动秘源机兵始，这份古龙的机关智慧便被人类汲取，寻捕械、构型械等秘源机兵成为对抗深渊的利器。机兵的军工应用让各类兵器的生产效率倍增，陆上防线的突破能力愈发强劲，摩托化装备的造艺愈发精湛，秘源的力量成为对抗深渊的机械利刃。"

 NAT_Abyss_Resistance_Tactics_System:"抗深渊战术体系"
 NAT_Abyss_Resistance_Tactics_System_desc:"纳塔千百年对抗深渊淬炼的战术体系，是血与火的实战智慧结晶。从初代火神希巴拉克的巡夜者战争，到玛薇卡的狩夜者战争，纳塔人不断摸索深渊的弱点，打造出专属的抗暗战术。这份体系让战士们的战场伤亡大幅降低，陆上防御坚不可摧，情报机关的效率倍增，每一个战术都凝聚着纳塔人对抗深渊的实战经验。"

 NAT_Xibarak_Hero_Legacy:"希巴拉克英雄遗产"
 NAT_Xibarak_Hero_Legacy_desc:"初代火神希巴拉克留予纳塔的英雄遗产，是火之国度的精神根基。这位人类英雄击穿火龙王的眼瞳，于源火中重生为火神，建立人龙大联盟，定下对抗深渊的规则。他的遗产让纳塔的政权威权自固，民族之魂愈发炽烈，战士们的战心被英雄的荣光点燃，每一个纳塔人都以希巴拉克为榜样，为守护盟地奋勇向前。"

 NAT_Ocikan_Tyranny_Injustice_Redress:"奥奇坎历史冤案平反"
 NAT_Ocikan_Tyranny_Injustice_Redress_desc:"纳塔为奥奇坎平反的历史冤案，是火之国度对真相的追寻与对过往的和解。这位半人半龙的谋主，因对希巴拉克的执念陷入暴虐，却也以自身之躯封印深渊，他的一生充满争议，终得沉冤昭雪。冤案的平反让纳塔的民心安定，政治力量愈发充沛，与四方的邦交愈发和睦，纳塔人以包容的心态面对过往，更坚定地走向对抗深渊的未来。"

 NAT_Volcano_Industrial_Zone_Expansion:"火山工业区扩建"
 NAT_Volcano_Industrial_Zone_Expansion_desc:"纳塔图兰大火山周边的工业区扩建，是源火恩宠与工业发展的相融。火山的地热与燃素为工业提供了无尽动力，工坊沿着火山麓拔地而起，民用与军工工坊交织成纳塔的工业核心。工业区的扩建让民用工坊的产出倍增，军工工坊的造艺愈发精湛，工业效率节节攀升，火山的烈焰成为推动纳塔工业发展、对抗深渊的动力源泉。"

 NAT_Natlan_National_Identity_Construction:"纳塔民族认同构建"
 NAT_Natlan_National_Identity_Construction_desc:"纳塔千百年的民族认同构建，是火之民族的精神凝萃。从人龙相争到人龙共生，从部族纷争到六族同心，纳塔人以火为图腾，以圣火为信仰，形成了独有的民族认同。这份认同让纳塔的民族之魂愈发炽烈，社会安定如磐，外交的话语权愈发厚重，每一个纳塔人都以身为火之民族为荣，同心共御深渊，守护盟地。"

 NAT_Soul_Return_Poem_Oath:"还魂诗的誓约"
 NAT_Soul_Return_Poem_Oath_desc:"纳塔跨越生死的还魂诗誓约，是死之执政予火之国度的生死羁绊。希巴拉克借死之执政的力量定下还魂诗，让牺牲的战士魂归现世，继续对抗深渊。这份誓约让战士们的士气如烈焰升腾，战场的伤亡大幅降低，战心被生死不弃的羁绊点燃，每一句还魂诗都凝聚着纳塔人对抗深渊的决绝，让牺牲不再是终点，而是再战的开端。"

 NAT_Flame_Flow_Pool_Esoterica:"流炎之池秘传"
 NAT_Flame_Flow_Pool_Esoterica:"流炎之池秘传"
 NAT_Flame_Flow_Pool_Esoterica_desc:"纳塔图兰圣城流炎之池的秘传，是火龙王修库特尔留予族裔的智识瑰宝。古龙曾浸泡流炎之池，从海量燃素中汲取智识，这份秘传被人类习得，成为科研与工业的智慧源泉。流炎之池的智识让纳塔的科研脚步一日千里，实验室的数量不断增加，工业效率倍增，燃素中的智识成为推动纳塔发展、对抗深渊的智慧之光。"

 NAT_Shadow_Sealing_Needle_Reinforcement:"缝影针封印加固"
 NAT_Shadow_Sealing_Needle_Reinforcement_desc:"纳塔回声之子的缝影针封印加固，是对抗深渊的上古屏障。昔日陶奥鲁以大灵之力铸就缝影针，钉住火山大王的臂膀，更封印着深渊的暗影，这份封印的智慧代代相传。缝影针的加固让陆上防御坚不可摧，驻守的战士如磐石般坚定，社会安定如磐，每一根缝影针都凝聚着大灵与族民的力量，成为阻隔深渊的上古枷锁。"

 NAT_Six_Heroes_Heroic_Legacy:"六英杰英雄传承"
 NAT_Six_Heroes_Heroic_Legacy_desc:"纳塔五百年前的六英杰英雄传承，是火之国度的勇毅丰碑。特诺切集结六大部族的英雄，于烬寂海与深渊浴血奋战，他们的英魂与事迹被刻入古名，代代相传。这份传承让战士们的陆上攻势愈发凌厉，战技在英雄的荣光中飞速精进，特种部队的战力大幅提升，六英杰的勇毅成为纳塔人对抗深渊的不朽榜样。"

 NAT_Great_Unity_Of_All_Fires_Glory:"万火归一的荣光"
 NAT_Great_Unity_Of_All_Fires_Glory_desc:"纳塔终焉的万火归一荣光，是火之国度所有力量的极致凝聚。六大部族同心，人龙共生携手，古名的荣光、圣火的威仪、大灵的庇佑，所有的火焰汇聚成一束焚净一切黑暗的烈焰。这份荣光让纳塔的政权威权登峰造极，社会安定如磐，战士的战心炽烈到极致，工坊的产出与陆上的攻势皆达顶峰，万火归一，焚净深渊。"

 # 1. 希巴拉克初代火神遗产
 SHEBARAK_FIRST_FIRELORD_LEGACY:"希巴拉克初代火神遗产"
 SHEBARAK_FIRST_FIRELORD_LEGACY_desc:"这是初代火神希巴拉克屠龙立誓后留下的永恒馈赠，承载着「万火归一」的初始意志。当年他从火龙王心脏中重生，以神座之力联结死之执政，定下归火圣夜巡礼的规则，团结六大部族抵御深渊。这份遗产让纳塔人天生承袭火焰的韧性，圣火的光辉滋养着稳定与战意，战士们挥舞兵刃时，仿佛能听见希巴拉克跨越千年的战吼，为守护赤色大地而战。"

 # 2. 库库尔坎盗火者智慧
 KUKULKAN_FIRE_BRINGER_LEGACY:"库库尔坎盗火者智慧"
 KUKULKAN_FIRE_BRINGER_LEGACY_desc:"源自龙族贤者瓦萨克拉胡巴肯的盗火之举，他打破龙族对燃素的垄断，将源火智慧赠予人类，升起浮土静界试炼勇者。这份遗产化作纳塔的科研与工业根基，让燃素从龙族的能源变为驱动工坊与战舰的力量。纳塔人承袭这份求知欲，在火山深处的遗迹中破译远古符文，让龙裔的技术与人类的韧性相融，迸发出跨越时代的创造力。"

 # 3. 六大部族大联盟誓约
 SIX_TRIBES_GREAT_ALLIANCE:"六大部族大联盟誓约"
 SIX_TRIBES_GREAT_ALLIANCE_desc:"这是希巴拉克联合沃陆之邦、回声之子等六部立下的神圣盟约，打破部族割据的壁垒，以圣火为见证，共御外侮与深渊。盟约让各部族共享资源与智慧：沃陆的沃土滋养民生，回声的锻炉锻造兵刃，流泉的航道连通四方。这份团结的遗产化作民族凝聚力，让纳塔在分裂边缘总能重聚，征兵的号角一响，各部勇士便会放下分歧，奔赴共同的战场。"

 # 4. 归火圣夜巡礼之誓
 HOLY_FIRE_NIGHT_PILGRIMAGE:"归火圣夜巡礼之誓"
 HOLY_FIRE_NIGHT_PILGRIMAGE_desc:"这是纳塔最神圣的竞技盛典遗产，源自希巴拉克借死之执政力量定下的规则，勇士们在圣火竞技场角逐荣耀，「角逐之焰」维系着深渊封印。巡礼中诞生的英雄将承袭古名，成为巡夜者对抗黑暗。这份遗产让纳塔人自幼崇尚勇武，军队在竞技中积累经验，战魂在圣火中淬炼，每周都有新的战意注入民心，地脉中流淌的英雄意志让陆军学说的探索更具效率。"

 # 5. 夜神之国大灵庇佑
 NIGHT_GOD_KINGDOM_BLESSING:"夜神之国大灵庇佑"
 NIGHT_GOD_KINGDOM_BLESSING_desc:"这是最后一位天使融入地脉后，为纳塔筑起的灵魂屏障，夜神之国收纳英雄魂灵，化作守护部族的大灵。大灵们以图腾为媒介，加持族人的反谍能力，抵御深渊对记忆的侵蚀，让抵抗运动无从滋生。纳塔人坚信，牺牲的勇士从未远去，他们的魂灵在夜神之国注视着家园，为生者降下安定的力量，成为对抗黑暗的精神后盾。"

 # 6. 燃素锻造秘术
 PHLOGISTON_FORGING_TECHNIQUE:"燃素锻造秘术"
 PHLOGISTON_FORGING_TECHNIQUE_desc:"这是回声之子传承千年的核心技艺，源自锻火英雄伊葵的燃素编织之法，将火山源火与龙鳞、龙骨相融，打造无坚不摧的器物。匠人们在峡谷工坊中敲击锤炼，让燃素渗入金属的肌理，提升工厂效率与最大产能，装备转换时如火焰流转般顺畅。这份秘术让纳塔的兵刃自带灼焰之力，哪怕是废弃的装备，也能在燃素驱动下重获新生。"

 # 7. 人龙共生盟约
 HUMAN_DRAGON_SYMBIOSIS_COVENANT:"人龙共生盟约"
 HUMAN_DRAGON_SYMBIOSIS_COVENANT_desc:"这是希巴拉克打破人龙奴役枷锁后定下的神圣契约，让纳塔人不再畏惧龙群，转而与鳍游龙、绒翼龙等共生共战。龙焰为战士的攻击加持威力，龙鳞强化突破防线的锐度，特殊部队得以吸纳龙裔的敏捷与力量。从布基纳与山王康加玛托并肩作战，到松伽塔与穆胡鲁共击恶龙，这份盟约让人与龙的力量交织，成为跨越种族的守护羁绊。"

 # 8. 古名英雄传承
 ANCIENT_NAME_HEROIC_HERITAGE:"古名英雄传承"
 ANCIENT_NAME_HEROIC_HERITAGE_desc:"这是纳塔人精神的核心图腾，每一枚古名都承载着英雄的光辉事迹——「团结」沃摩延、「超越」武卡、「希望」杜麦尼。继承者通过燃素刻录的黑曜石，读取地脉中英雄的记忆，获得双倍经验成长，指挥官初始便带着先辈的智慧，最多能解锁额外的天赋。这份传承让英雄的意志永不消亡，新的勇士站在竞技场时，仿佛能与历代古名持有者共鸣，续写荣耀。"

 # 9. 春之部族水道智慧
 SPRING_CLAN_WATERWAY_WISDOM:"春之部族水道智慧"
 SPRING_CLAN_WATERWAY_WISDOM_desc:"这是流泉之众世代相传的生存智慧，源自初代首领乌努库开拓航道的传奇，他们驾驭鳍游龙，将温泉与海岸相连，构建起遍布纳塔的水网。这份智慧让纳塔海军获得水流的加持，航速与探测能力大增，补给消耗也因熟悉水道而降低。商船沿着部族开辟的航道穿梭，将燃素工艺品运往远方，造船厂在温泉滋养的土地上高效运转，成为纳塔与外界联结的纽带。"

 # 10. 回声之子锻造匠心
 ECHO_CLAN_FORGING_INGENUITY:"回声之子锻造匠心"
 ECHO_CLAN_FORGING_INGENUITY_desc:"这是回声之子部族的立身之本，从伊葵焚尽手稿也不愿技艺落入暴君之手，到松伽塔用龙骨锻造「弥坚骨」，匠人们将执念与荣耀熔入每一件器物。这份匠心让军工厂的生产效率飙升，陆军装备升级的经验成本降低，步兵与装甲部队的攻击都得到燃素加持。峡谷中的锤声千年未绝，每一次敲击都在打磨更强的兵刃，为纳塔战士筑起坚不可摧的攻防底气。"

 # 11. 悬木人绝壁战技
 HANGING_CLAN_CLIMBING_SKILL:"悬木人绝壁战技"
 HANGING_CLAN_CLIMBING_SKILL_desc:"这是悬木人在踞石山悬崖间练就的生存绝技，先祖用绳索与钩爪悬挂巨木为家，在险峻地形中磨砺出超凡的机动性。这份战技让纳塔军队无视复杂地形的阻碍，渡河作战时如履平地，两栖防御与构工速度大增。战士们攀爬峭壁如猿猴，在山地中设下埋伏，让入侵的敌人陷入天堑绝境，正如布基纳当年为摘取火榴果，征服绝壁的传奇。"

 # 12. 花羽会空翼巡弋
 FEATHER_GUILD_AIR_PATROL:"花羽会空翼巡弋"
 FEATHER_GUILD_AIR_PATROL:"这是花羽会传承自莉安歌的驭龙之术，这位被龙族养大的少女三度射落邪龙又三度治愈，将绒翼龙的敏捷融入空战技艺。部族勇士驾驭龙翼翱翔天际，战机的敏捷与航程大幅提升，制空效率倍增，每架运输机都能搭载更多伞兵。他们的巡弋覆盖纳塔每一寸领空，如雄鹰般锐利的视野，让敌人的空中动向无所遁形，成为守护天际的坚盾。"

 # 13. 沃野部族丰饶之赐
 PLAINS_CLAN_FERTILE_LAND:"沃野部族丰饶之赐"
 PLAINS_CLAN_FERTILE_LAND_desc:"这是沃陆之邦扎根火山沃土的馈赠，火山灰滋养的土地盛产颗粒果，突角龙协助耕种，让纳塔拥有提瓦特最肥沃的粮仓。这份丰饶降低了民生消耗，提升工业产能与民用工厂效率，本地资源的利用率倍增。农人们遵循阿霍布立下的丰饶誓约，在火渠灌溉的田地里劳作，金黄的穗子随风摆动，为纳塔的稳定与发展筑牢物质根基。"

 # 14. 烟谜主谜烟秘仪
 SMOKE_CLAN_MYSTERY_SECRET:"烟谜主谜烟秘仪"
 SMOKE_CLAN_MYSTERY_SECRET_desc:"这是烟谜主部族守护的夜域秘术，祭司们以荧光角菌为墨，在岩壁绘制灵谜涂鸦，通过谜烟与夜神之国的大灵沟通。这份秘仪让纳塔的加密与解密能力超凡，情报网络的成长速度倍增，能精准捕捉敌人的部队动向。桑哈杰曾借秘仪预见深渊灾厄，茜特菈莉用涂鸦封印魔物，谜烟如屏障般遮蔽纳塔的战略意图，成为对抗深渊与谍报渗透的利器。"

 # 15. 火龙王源火之力
 FIRE_DRAGON_KING_PRIMAL_FIRE:"火龙王源火之力"
 FIRE_DRAGON_KING_PRIMAL_FIRE_desc:"这是火龙王修库特尔遗留的源火余威，尽管他曾被深渊侵蚀，但源火的本质依旧炽烈，为纳塔的武器注入原始的毁灭力量。这份力量让部队的软硬攻击同步提升，突破防线的能力大增，对工事的破坏力翻倍。燃素武器在源火加持下灼烧深渊魔物，仿佛能净化一切黑暗，正如当年希巴拉克击穿火龙王眼睛时，那份贯穿古今的火焰锋芒。"

 # 16. 还魂诗不朽誓约
 REVIVAL_POEM_IMMORTAL_OATH:"还魂诗不朽誓约"
 REVIVAL_POEM_IMMORTAL_OATH_desc:"这是死之执政赐予纳塔的重生奇迹，源自希巴拉克与若娜瓦的契约，让为家园牺牲的英雄得以通过古名与诗歌重临人间。这份誓约提升军队的组织度与士气，人力恢复速度加快，行军时的组织损耗降低。每当还魂诗在圣火竞技场传唱，英雄的魂灵便会回归战场，他们的意志化作部队的韧性，让纳塔在绝境中总能重燃斗志。"

 # 17. 巡夜者战争经验
 NIGHT_WATCHER_WAR_EXPERIENCE:"巡夜者战争经验"
 NIGHT_WATCHER_WAR_EXPERIENCE_desc:"这是纳塔人数千年对抗深渊积累的宝贵财富，从葬火之战到坎瑞亚灾厄，巡夜者们在烬寂海与魔物死战，用鲜血换来实战智慧。这份经验让陆海空三军的经验获取效率大增，敌人的制空优势效果被削弱。战士们熟悉深渊魔物的习性，能精准避开致命攻击，哪怕在黑暗中也能保持战斗力，正如特诺切与桑哈杰当年以生命封印巴窟纳瓦的决绝。"

 # 18. 玛薇卡永恒烈焰
 MAVEKA_ETERNAL_BLAZING_FLAME:"玛薇卡永恒烈焰"
 MAVEKA_ETERNAL_BLAZING_FLAME_desc:"这是历代最强火神玛薇卡留下的炽烈意志，她从悬木人少女成长为圣火执掌者，在归火圣夜巡礼中未尝一败，为守护纳塔将意识存入圣火五百年。这份烈焰让纳塔的战意空前高涨，军队攻击威力大增，稳定与指挥点数获取同步提升。当战士们举起兵刃，便会感受到玛薇卡跨越时空的加持，在对抗深渊的终极战役中，燃烧出不可阻挡的力量。"

 # 19. 奥奇卡纳塔烬城遗产
 OCHIKAN_ASH_CITY_LEGACY:"奥奇卡纳塔烬城遗产"
 OCHIKAN_ASH_CITY_LEGACY_desc:"这是暴君奥奇坎统治时期留下的复杂遗产，尽管他晚年吞入深渊源头封锁禁城，但烬城的工业设施与燃素管线仍在运转。这份遗产让工厂初始效率与生产线切换速度提升，科研进度加快，纳塔人从废墟中破译远古龙族的工业智慧。烬城的熔岩石碑记录着燃素与机械的奥秘，成为纳塔工业化的垫脚石，正如奥奇坎复杂的一生，在毁灭中藏着未竟的守护。"

 # 20. 茜特菈莉黑曜涂鸦
 CITLALI_OBSIDIAN_GRAFFITI:"茜特菈莉黑曜涂鸦"
 CITLALI_OBSIDIAN_GRAFFITI_desc:"这是烟谜主传奇萨满茜特菈莉传承的灵谜涂鸦秘术，以荧光角菌为墨、黑曜石为底，将记忆与守护的力量刻入岩壁。这份涂鸦强化了纳塔的反谍能力，降低地形惩罚，军队防御得到加持，情报机构的防御效能大增。涂鸦如夜神之国的眼睛，监视着深渊的渗透，战士们在涂鸦笼罩的区域作战时，仿佛能获得大灵的庇佑，在黑暗中看清胜利的方向。"

 # 21. 特诺切议事棒传说
 TENOCHE_TALKING_STICK_LEGEND:"特诺切议事棒传说"
 TENOCHE_TALKING_STICK_LEGEND:"这是最后一位特诺奇兹托克人特诺切的遗物，当年他手持「聊聊棒」团结分裂的部族，在烬寂海与深渊魔物同归于尽。这份传说让纳塔军队攻击与突破能力提升，城市作战时如虎添翼，士气始终高昂。议事棒的木纹中藏着「团结」的古名之力，战士们挥舞兵刃时，仿佛能听见特诺切召集盟友的呐喊，为了共同的家园而战，无畏生死。"

 # 22. 烬寂海戍边勇士
 ASH_SEA_GARRISON_WARRIORS:"烬寂海戍边勇士"
 ASH_SEA_GARRISON_WARRIORS_desc:"这是驻守烬寂海防线的勇士们传承的意志，五百年前桑哈杰与特诺切在此牺牲，无数后人前赴后继，用血肉筑起对抗深渊的屏障。这份意志提升部队的构工上限与速度，降低损耗，核心领土的攻防能力大增。勇士们在被时间遗弃的荒原上巡逻，铠甲沾染火山灰与魔物的血，他们的坚守让纳塔腹地远离深渊的直接侵蚀，成为赤色大地最坚固的外围防线。"

 # 23. 燃素机兵战争造物
 PHLOGISTON_AUTOMATON_WAR_MACHINE:"燃素机兵战争造物"
 PHLOGISTON_AUTOMATON_WAR_MACHINE_desc:"这是远古龙族与纳塔人共同研发的战争机械，以燃素为核心驱动，从秘源机兵·寻捕械到深古秘源机龙，承载着龙族的工业巅峰。这份造物提升装甲价值与摩托化、机械化部队的攻击，突破能力大增。机兵的齿轮转动时带着源火的轰鸣，装甲上铭刻的反深渊符文能抵御黑暗侵蚀，成为纳塔陆军的钢铁洪流，正如当年龙族用机兵建造图兰圣城的辉煌。"

 # 24. 大灵先祖指引
 GREAT_SPIRIT_ANCESTOR_GUIDANCE:"大灵先祖指引"
 GREAT_SPIRIT_ANCESTOR_GUIDANCE_desc:"这是夜神之国中历代英雄魂灵的集体庇佑，从第一位大灵察阿克到牺牲的巡夜者，他们的意志通过图腾柱与还魂诗滋养纳塔。这份指引让纳塔每周稳定增长，意识形态漂移防御增强，政治点数获取加速，战意始终高昂。子民们祈祷时能听见先祖的低语，迷茫时能获得大灵的启示，这份跨越生死的联结，成为纳塔在黑暗中永不迷失的精神灯塔。"

 # 25. 纳塔龙血血脉
 NATLAN_DRAGON_BLOODLINE:"纳塔龙血血脉"
 NATLAN_DRAGON_BLOODLINE_desc:"这是纳塔人与龙共生千年后沉淀的血脉馈赠，从奥奇坎的半人半龙之躯到布基纳与山王的羁绊，龙血与人体相融，带来超凡的适应力。这份血脉提升军队组织度与攻防，降低酷热与严寒的损耗，突破能力增强。纳塔战士的血管中流淌着源火与龙焰的力量，在极端环境中依旧能保持巅峰战力，正如嵴锋龙的祖先天生便能适应火山与荒原的考验。"

 # 26. 荣花演武武道文化
 GLORY_FLOWER_MARTIAL_ART_CULTURE:"荣花演武武道文化"
 GLORY_FLOWER_MARTIAL_ART_CULTURE_desc:"这是纳塔传承千年的武道盛会，与归火圣夜巡礼并称双璧，勇士们以武会友，在竞技中磨砺技艺、凝聚人心。这份文化缩短军队训练时间，提升部队经验获取，降低军事领袖招募成本，组织度得到加持。演武场的鼓声唤醒纳塔人血脉中的勇武，年轻战士在对决中传承古名精神，每一次出招都带着对荣耀的渴望，让纳塔的武道传统历久弥新。"

 # 27. 图兰圣山地热恩赐
 TULAN_SACRED_MOUNTAIN_GEOTHERMAL_BOUNTY:"图兰圣山地热恩赐"
 TULAN_SACRED_MOUNTAIN_GEOTHERMAL_BOUNTY_desc:"这是图兰大火山赋予纳塔的天然馈赠，作为源火诞生之地，地热与燃素矿藏遍布山体，滋养着工业与农业。这份恩赐提升建筑与基建建造速度，增强本地资源利用率，燃料获取效率大增。纳塔人利用地热驱动熔炉，用火山灰改良土壤，图兰圣山的脉搏与纳塔的工业心跳同频，正如远古龙族当年在此建造圣城，让源火的力量惠及众生。"

 # 28. 缝影针深渊封印
 SHADOW_STITCH_NEEDLE_ABYSS_BARRIER:"缝影针深渊封印"
 SHADOW_STITCH_NEEDLE_ABYSS_BARRIER_desc:"这是回声之子长老陶奥鲁以大灵之力打造的抗渊神器，四根燃素钉柱钉住火山大王的手臂，也封住了深渊渗透的裂隙。这份封印强化核心领土防御，降低抵抗运动强度，提升顺从度增长，减少驻军需求。遍布纳塔的缝影针如地脉的缝线，将深渊污染牢牢锁在边界，钉柱上的符文闪烁时，仿佛能听见大灵的祷文，守护着纳塔的地脉纯净。"

 # 29. 六英杰光辉传承
 SIX_HEROES_RADIANCE:"六英杰光辉传承"
 SIX_HEROES_RADIANCE_desc:"这是五百年前坎瑞亚灾厄中，六位英雄留下的集体荣耀——万杰鲁的力量、孟尼力克的超越、桑哈杰的奉献、布基纳的回火、松伽塔的祝福、图帕克的团结。这份传承提升指挥官最大指挥规模，让陆海空将领初始等级提升，各类学说研究成本降低。英雄们的古名在纳塔大地上流传，他们的勇气与智慧化作部队的战力，激励着新一代战士续写抗渊传奇。"

 # 30. 纳塔不屈战魂
 NATLAN_INDOMITABLE_WAR_SPIRIT:"纳塔不屈战魂"
 NATLAN_INDOMITABLE_WAR_SPIRIT_desc:"这是纳塔人在千年灾厄中淬炼出的核心特质，从葬火之战对抗龙族，到坎瑞亚灾厄抵御深渊，再到如今直面夜神之国的污染，纳塔人从未屈服。这份战魂降低投降阈值，战时每周战意增长，提升军队攻防，减少补给不足的损耗。哪怕身处绝境，纳塔战士也会挥舞燃素兵刃死战到底，圣火的光辉与英雄的魂灵共同铸就这份不屈，让赤色大地的火焰永远燃烧。"


 # 纳塔决策（Decision）Localisation（30个）

 NAT_Decisions:"归火圣夜巡礼" # 纳塔核心机制
 NAT_Decisions_desc:"\n归火圣夜巡礼是纳塔最神圣的竞技盛典，亦是维系深渊封印的关键仪式。旅者下令启动巡礼全面筹备，烟谜主祭司绘制灵谜涂鸦指引赛程，回声之子锻造竞技用燃素兵刃，六大部族推选最勇武的勇士参赛。工匠们修缮圣火竞技场的黑曜石看台，沃野部族备足颗粒果与火山酒，花羽会驯龙骑士在空中布设燃素符文阵。筹备过程中，各部族的凝聚力空前高涨，子民们期盼着英雄的诞生，而「角逐之焰」的燃起，也将让深渊封印的力量再度稳固。\n\n§Y深渊侵蚀度：§!§R[?NAT-ABY-Index]§!\n\n§Y玛薇卡威望：§!§R[?MVK-Prestige-Index]§!\n\n纳塔将在历史演进中根据§Y深渊侵蚀度§!与§Y玛薇卡威望§!走向不同的道路。\n\n"

