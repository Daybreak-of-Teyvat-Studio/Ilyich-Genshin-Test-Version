#####################   SPIRIT

SNE_Cold_Winter:"§C严冬计划§!"
SNE_Cold_Winter_desc:"§C战争近在眼前，§!\n§C切忌沉湎冰原上的伟业，§!\n§C我们仍需奉献，§!\n§C直至§!§R旗帜高扬，尘埃落定。§!"
SNE_concil:"至冬皇都评议会"
SNE_concil_desc:"为了弥补妖精官员改革留下的空缺，女皇成立了至冬皇都评议会，评议会上的每一票都牵动着无数人的利益"
SNE_Fatui_Army:"愚人众军官团"
SNE_Fatui_Army_desc:"愚人众是由至冬女皇与帝国历成立的近卫军团，但在漫长的扩容与内部斗争下，冗杂的指挥系统和良莠不齐的战斗素质让至冬并没有做好面对全面战争的准备。"
SNE_FireK:"克什尼克之炬"
SNE_FireK_desc:"克什尼克之炬是保障至冬城镇供暖的主要设施，也是至冬全面战争下重要的战略中枢，除非必要时刻，我们不能让它熄灭。"
SNE_Royal:"至冬皇家军事学院"
SNE_Royal_desc:"至冬皇家军事学院早期只能由妖精贵族进入学习，在女皇的改革计划下，越来越多的人类军官从这里毕业进入愚人众为女皇效力。"
SNE_Varya:"沃雅妮莎的阴谋"
SNE_Varya_desc:"科洛列夫茨基剧团是至冬皇家最优秀的剧团，剧院首席女高音沃雅妮莎似乎筹划着不为人知的阴谋。"
SNE_Winter_Army:"老冬契军的传统"
SNE_Winter_Army_desc:"冬契军是由白沙皇组建的老式军团，由各类妖精担任不同作战职责，但在女皇的大改革下，目前只有风仙在军中的传统职能未被新式的战斗兵器取代。"
SNE_TREE:"§C陵寝与白桦§!"
SNE_TREE_desc:"§C后来，天理玷污了我们的爱。§!\n§C我甚至怀疑，它是否真的存在过。§!\n§C不应给予溺水之人无根的浮木，§!\n§C不应给予冻毙之人临终温暖的幻觉。§!\n§R死亡§!§C并非爱的敌人，§!\n§C敌人，来自神明一厢情愿的祝福。§!\n\n§C这是沙皇最后怜爱，§!\n§C由我而起之事，理应由我了断。§!"
