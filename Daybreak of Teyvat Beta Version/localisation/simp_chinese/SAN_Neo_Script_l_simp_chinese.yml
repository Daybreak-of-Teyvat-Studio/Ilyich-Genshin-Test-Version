# ========================================================================
# 珊瑚宫剧本 BY 桂花糕
# ========================================================================

 SAN_genshin_party:0 "海祇大御神"
 SAN_neutrality_party:0 "御建鸣神"
 SAN_communism_party:0 "曚云神社"
 SAN_fascism_party:0 "渊下神宫"
 SAN_democratic_party:0 "现人神巫女"

# ========================================================================
# 国策部分
# ========================================================================

 # ========================== 第一阶段：揭旗起事 (1-30) ==========================
 SAN_the_resistance_begins:"反抗的开端"
 SAN_the_resistance_begins_desc:"海浪拍礁岩，珍珠不染尘泥间，愿望化长剑。现人神巫女珊瑚宫心海正式向幕府的眼狩令发出挑战。我们要守护的不止是海祇岛的安宁，更是所有岛民被剥夺的愿望与灵魂。战争的火种已在珊瑚宫前点燃，海祇岛将不再沉默。——珊瑚宫剧本制作：桂花糕"
 
 SAN_mobilize_watatsumi_militia:"动员海祇民兵"
 SAN_mobilize_watatsumi_militia_desc:"望泷村的壮丁们拿起了尘封的渔叉与长弓。我们要将散布在诸岛的青年集结起来，转化为守卫家园的钢铁长城。每一份人力都是海祇岛珍贵的宝藏，在巫女的旗帜下，我们将众志成城，化平凡为不朽的传奇。"
 
 SAN_establish_sangonomiya_hq:"建立珊瑚宫大本营"
 SAN_establish_sangonomiya_hq_desc:"在大本营中，战略地图被缓缓摊开。心海大人亲自坐镇，统筹全局。我们需要建立一套高效的指挥体系，确保每一道军令都能如同潮汐般迅速传达到前线。这里将是反抗意志的神经中枢，是智慧与勇气的交汇之地。"
 
 SAN_gorou_army_reforms:"五郎军事改革"
 SAN_gorou_army_reforms_desc:"大将之威，如犬影之迅捷。五郎提出了一系列针对反抗军现状的训练法。士兵们不再是散兵游勇，而是在严格纪律下磨炼出的精锐。通过山地拉练与模拟对抗，陆军的组织度与恢复能力得到了质的飞跃，我们将以弱胜强。"
 
 SAN_covert_courier_service:"建立秘密情报网"
 SAN_covert_courier_service_desc:"在阴影中穿行的飞鸟，传递着决定胜负的密报。我们需要在幕府的封锁线下开辟出隐秘的通道，利用走私者与志愿者建立可靠的通讯链路。知己知彼，百战不殆，每一份截获的情报都可能改变战场的走向。"
 
 SAN_strategic_pockets_doctrine:"锦囊妙计战略"
 SAN_strategic_pockets_doctrine_desc:"心海大人留下的锦囊中，藏着应对百种局势的生机。通过对兵法的深入研习，我们将战场上的每一个变量都纳入计算。即使面对人数众多的敌军，灵活的机动与出其不意的突袭也将为我们争取到决定性的战略优势。"
 
 SAN_vision_vanguard_action:"神之眼先锋行动"
 SAN_vision_vanguard_action_desc:"那些尚未失去愿望的勇士们，将成为我们的锋刃。神之眼持有者们被编入先锋突击队，利用元素力撕开幕府军的阵线。这不仅是力量的展示，更是意志的较量，我们要向世人证明，愿望是不灭的星火。"
 
 SAN_pearl_rationing_program:"珍珠配给计划"
 SAN_pearl_rationing_program_desc:"为了支撑长期的战争，我们必须优化资源的分配。通过严格的配给制度，确保每一颗粮食、每一份物资都能发挥最大的效用。海祇岛的稳定基于民众的信任，合理的保障措施将极大提升国民的凝聚力与稳定性。"
 
 SAN_naval_ambush_tactics:"海上伏击战术"
 SAN_naval_ambush_tactics_desc:"迷雾笼海面，礁石暗藏杀机现，战舰影忽闪。利用海祇岛错综复杂的水域，我们的小型快船将对幕府的运输线展开袭扰。在波涛中忽隐忽现的攻击，会让庞大的幕府舰队陷入无尽的恐慌与疲惫。"
 
 SAN_shrine_maiden_volunteers:"巫女志愿者动员"
 SAN_shrine_maiden_volunteers_desc:"除了战场的拼杀，后勤与医疗同样关键。珊瑚宫的巫女们走下神坛，加入医疗营与救护队。她们用轻柔的歌声安抚伤员，用精湛的医术拯救生命。这股温柔的力量，是前线士兵们心中最坚实的后盾。"
 
 SAN_recruitment_of_ronin:"招募流浪武士"
 SAN_recruitment_of_ronin_desc:"流落荒野的剑客，不再有主的刀刃，将在海祇岛找到新的目标。我们向全稻妻的浪人发出邀请：为了大义而战。这些身经百战的武者将补充我们的中坚力量，让反抗军的战法更加多变且致命。"
 
 SAN_kokomi_art_of_war_study:"心海兵法研习"
 SAN_kokomi_art_of_war_study_desc:"现人神巫女不仅仅是信仰的象征，更是卓越的军事家。通过对古今兵法的深度复盘与创新，我们正在完善一套属于海祇岛的防御理论。行政效率的提升与对资源掌控力的增强，将为国家注入持续不断的生命力。"
 
 SAN_wartime_taxation_arrangements:"战时税收安排"
 SAN_wartime_taxation_arrangements_desc:"为了换取最后的胜利，暂时的牺牲是必要的。我们重新调整了税收结构，在不伤害民生根基的前提下，最大限度地筹集战争经费。每一份贡献都将被铭记，胜利后的繁荣将是给所有岛民最好的回馈。"
 
 SAN_resistance_fortification_plan:"反抗军加固计划"
 SAN_resistance_fortification_plan_desc:"在名椎滩与海祇岛的要冲，我们修筑了坚固的堡垒。这些混凝土与岩石构成的防线，将成为幕府军无法逾越的天堑。防线不仅仅是为了阻挡敌人，更是为了给我们争取宝贵的反击时机与喘息空间。"
 
 SAN_foreign_mercenary_outreach:"异国雇佣兵联络"
 SAN_foreign_mercenary_outreach_desc:"通过离岛的秘密渠道，我们联络了那些游荡在提瓦特边缘的雇佣军。只要酬劳合理，这些异国战士将为我们提供急需的战力。他们的加入将打破稻妻内战的僵局，让幕府见识到外界力量的威慑力。"
 
 SAN_logistics_tunnel_project:"后勤隧道工程"
 SAN_logistics_tunnel_project_desc:"深挖地下道，穿行群山密林间，补给永连绵。为了规避幕府军的空中侦察与重炮轰击，我们启动了庞大的地下运输工程。这些隧道将成为生命线，确保前线物资的运输始终处于安全且高效的状态。"
 
 SAN_vision_user_integration:"神之眼持有者整合"
 SAN_vision_user_integration_desc:"每一颗神之眼都代表着一个独特的意志。我们将不同元素的持有者进行战术编组，利用元素反应产生毁灭性的杀伤效果。通过科学的协同训练，这些异能者将不再是个体英雄，而是反抗军最强大的战略武器。"
 
 SAN_underground_intelligence_network:"地下情报网络扩张"
 SAN_underground_intelligence_network_desc:"在鸣神岛的市井之间，我们的眼线正在扩散。从花见坂的茶馆到町街的工坊，每一处都有我们的同情者。这些微小的声音汇聚成海，为我们提供关于天领奉行的一举一动。信息就是胜利，智慧高于武力。"
 
 SAN_coastline_patrol_strategy:"海岸线巡逻战略"
 SAN_coastline_patrol_strategy_desc:"海洋是我们的家园，绝不容许幕府染指。我们建立了全天候的海岸巡逻机制，利用海灵芝与元素浮标预警敌情。通过对近海海域的绝对控制，我们将海祇岛的安全边界向外推移了数十海里。"
 
 SAN_village_council_empowerment:"村议会授权"
 SAN_village_council_empowerment_desc:"基层权力的释放将极大地激发岛民的积极性。通过赋予望泷村等基层行政单位更多的自主权，我们建立了一套响应迅速的战时管理机制。民心的凝聚是抵御外敌最强力的屏障，让人民真正成为国家的主人。"
 
 SAN_emergency_rice_storage_tactics:"紧急粮食储备战略"
 SAN_emergency_rice_storage_tactics_desc:"深积粮，高筑墙。在海祇岛的山腹之中，我们建立了大量的战备粮仓。即使面临幕府的长久封锁，我们也能保证军民的温饱。粮食安全是战争的底气，是持久抗战得以成功的物质基础与信心来源。"
 
 SAN_signal_flag_protocol:"旗语通讯协议"
 SAN_signal_flag_protocol_desc:"在波涛汹涌的海面上，旗语是最高效的沟通手段。我们开发了一套全新的加密旗语协议，确保在失去元素通讯的情况下，各舰船与岸防阵地依然能保持高度的同步。挥动的旗帜，是指引胜利的明灯。"
 
 SAN_partisan_warfare_arrangements:"游击战术部署"
 SAN_partisan_warfare_arrangements_desc:"隐于丛林中，击于敌之所不备，退如晨雾散。我们将反抗军编成多个小型作战单位，在八酝岛的密林与裂谷中展开游击战。通过长期的袭扰与迟滞，我们要让幕府军在连绵不断的泥潭中消耗殆尽。"
 
 SAN_scout_unit_reorganization:"侦察部队改组"
 SAN_scout_unit_reorganization_desc:"侦察兵是军队的眼睛。我们引进了全新的选拔机制，挑选那些最敏锐、最坚韧的战士进入侦察连队。通过对潜行与野外生存的极度训练，他们将深入敌后，为总攻提供最精准的目标坐标与战图信息。"
 
 SAN_naval_mine_laying_strategy:"水雷布设战略"
 SAN_naval_mine_laying_strategy_desc:"将危险藏在波涛之下。我们利用踏鞴砂的工业残余开发了简易的水雷装置，布设在幕府舰队必经的航道上。这些隐形的杀手将大幅增加幕府水军的航行风险，为我们的防守反击创造绝佳的心理优势。"
 
 SAN_island_fortress_objective:"岛屿要塞化目标"
 SAN_island_fortress_objective_desc:"将海祇岛打造成为一座不可攻克的堡垒。我们不仅在关键地点修建了地堡，还对原有的自然洞穴进行了加固。要塞化的岛屿将成为反抗军的避风港，也是任何入侵者都无法吞下的‘硬骨头’。守护家园，寸步不让。"
 
 SAN_heroic_propaganda_campaign:"英雄史诗宣传行动"
 SAN_heroic_propaganda_campaign_desc:"歌颂凡人的意志，铸就共同的记忆。我们通过岛歌与布告，广泛传播前线战士的英勇事迹。当每一个人都视自己为英雄的一员时，国家的战争支持度将达到巅峰。这种精神上的狂热，是烈火也无法燃尽的铠甲。"
 
 SAN_defense_line_coordination:"防线协同强化"
 SAN_defense_line_coordination_desc:"大御神之佑，化作岩壑之森严。我们整合了各处独立的防线，建立了统一的防御调度平台。通过跨防线的火力支援与兵力调动，我们确保了防守的弹性和深度。一旦某处受压，全岛的支援将如同潮水般涌来。"
 
 SAN_black_market_supply_deal:"黑市物资交易协议"
 SAN_black_market_supply_deal_desc:"在法律无法触及的地方，寻找生存的资源。我们与离岛的黑市头目达成了秘密协议，用海祇岛的珍珠交换工业设备与稀有矿石。这种游走在灰色地带的交易，虽然充满风险，却能在这个封锁时代维持国家的运转。"
 
 SAN_first_phase_offensive_prep:"第一阶段攻势筹备"
 SAN_first_phase_offensive_prep_desc:"万事俱备，只欠东风。随着动员与防御工作的完成，我们开始制定反攻鸣神岛的详细计划。各部队已进入最高战备状态，心海大人正在挑选进攻的窗口期。第一阶段的目标是彻底撕开名椎滩的封锁，挺进神无冢。"

 # ========================== 第二阶段：内战烽火 (31-70) ==========================
 SAN_kannazuka_offensive_strategy:"神无冢攻势战略"
 SAN_kannazuka_offensive_strategy_desc:"踏过名椎滩的血红之花，我们的剑锋直指神无冢。这里是控制稻妻工业命脉的关键之地。通过正面牵制与侧翼渗透，我们要夺回本属于岛民的资源。这一战将决定内战的平衡点，每一个士兵都深知此役的重量。"
 
 SAN_seize_mikage_furnace_action:"夺取御影炉心行动"
 SAN_seize_mikage_furnace_action_desc:"那是稻妻最庞大的心脏。通过突袭控制御影炉心，我们不仅能切断幕府的军工补给，更能为自己获得先进的冶炼技术。虽然炉心内部充满风险，但勇士们无所畏惧，我们将利用这股力量重铸反抗军的武装。"
 
 SAN_nazuchi_beach_deployment:"名椎滩战术部署"
 SAN_nazuchi_beach_deployment_desc:"浅滩映斜阳，赤红血斛遍地芳，枯骨诉凄凉。名椎滩是绞肉机般的战场。我们需要在这里建立多层纵深阵地，利用废弃的海船作为掩体，将幕府的优势兵力阻挡在滩涂之上，为踏鞴砂的后续行动争取时间。"
 
 SAN_tatarasuna_reconstruction_plan:"踏鞴砂重建计划"
 SAN_tatarasuna_reconstruction_plan_desc:"战火后的废墟需要新生。我们启动了对踏鞴砂工业区的系统性修复，利用缴获的资料恢复生产。我们要将这里从恐怖的‘神不在之丘’变为反抗军的工业引擎，让每一座熔炉都为自由而燃烧。"
 
 SAN_yashiori_island_pacification:"八酝岛平定行动"
 SAN_yashiori_island_pacification_desc:"长久以来，八酝岛受祟神余恨的侵蚀。为了保护撤退的民众并建立稳定的后方，我们必须采取主观行动。派遣巫女与卫队深入灾区，通过仪式安抚神骸，建立起一道能够抵御外部干涉的心理与物质防线。"
 
 SAN_tatarigami_containment_project:"祟神能量遏制工程"
 SAN_tatarigami_containment_project_desc:"海祇之虔诚，足以净化千年怨。我们启动了系统性的祟神遏制工程，通过修筑神龛与能量导流槽，减少祟神对土地的侵蚀。这不仅是民生工程，更是为了获得一种能被我们掌控的、超常的战争能源。"
 
 SAN_fontaine_engineering_outreach:"联络枫丹工程团队"
 SAN_fontaine_engineering_outreach_desc:"枫丹的技术代表着提瓦特的顶尖水平。我们试图联系那些留在稻妻的枫丹工程师（如泽维尔），邀请他们参与到我们的工业现代化进程中。通过吸收异国的科技养分，海祇岛的工厂将焕发出前所未有的效率。"
 
 SAN_secret_liaison_with_kamisato:"神里家秘密联络"
 SAN_secret_liaison_with_kamisato_desc:"白鹭影蹁跹，社奉行里暗传笺，结盟共蓝天。为了孤立天领奉行，我们与社奉行神里家建立了秘密联系。通过共同的利益——废除眼狩令，我们达成了一致的暗战协议。盟友的支持将从内部瓦解幕府的铁幕。"
 
 SAN_kazuha_vanguard_strategic_unit:"万叶先锋战略单位"
 SAN_kazuha_vanguard_strategic_unit_desc:"身在人间，心向山水，枫原万叶的刀尖闪耀着风的力量。我们将招募这位浪人武士及其追随者，组建一支特殊的突击部队。他们将如风般迅捷，在敌阵中制造混乱，为反抗军开辟出一条通往胜利的血色通道。"
 
 SAN_shumatsuban_collaboration_tactics:"终末番协同战术"
 SAN_shumatsuban_collaboration_tactics_desc:"在社奉行的默许下，一些终末番的忍者开始向我们提供战术支持。我们要学习他们的潜行技巧与暗杀术，将我们的侦察部队提升到专业特种兵的水平。黑暗中的较量，往往能决定阳光下的成败。"
 
 SAN_higi_village_relief_action:"绯木村救援行动"
 SAN_higi_village_relief_action_desc:"祟神带来的怪病折磨着无辜的村民。心海大人下令启动大规模救援行动，分发抗病药物并疏散重病者。我们要让稻妻的人民看到，反抗军不仅是武力的挑战者，更是民众生命财产的守护者，胜利在于民心。"
 
 SAN_ore_extraction_modernization:"矿产开采现代化行动"
 SAN_ore_extraction_modernization_desc:"利用白夜国留下的部分理念，我们对八酝岛的矿井进行了升级。通过机械化设备提升晶化骨髓的采集效率，确保我们的钢铁生产不再受限于原材料的短缺。每一斤采集的矿石，都将转化为打击敌人的子弹。"
 
 SAN_musoujin_gorge_defensive_line:"无想刃狭间防线"
 SAN_musoujin_gorge_defensive_line_desc:"一刀两断处，雷残响里筑坚垒，天险守忠诚。利用雷电将军留下的那道恐怖裂谷，我们修筑了复杂的防御工事。我们要将这处自然地理奇观转化为战术堡垒，让天险成为幕府军无法跨越的永恒绝望。"
 
 SAN_weapon_forging_standardization:"武器锻造标准化"
 SAN_weapon_forging_standardization_desc:"稻妻刀剑固然精美，但现代战争需要的是标准化生产。我们整合了踏鞴砂的工坊，制定了统一的武器规格。这种从艺术向工业的转变，将极大地缩短士兵的武装时间，提升补给的互换性与前线战力。"
 
 SAN_recruit_yashiori_volunteers:"八酝岛志愿者招募"
 SAN_recruit_yashiori_volunteers_desc:"在平定祟神与实施救援后，八酝岛的幸存者们纷纷要求加入反抗军。这些饱受苦难的战士拥有最坚韧的意志。我们将他们编入新的师团，赋予他们守卫故乡与复仇的权利。他们的热血，将让反抗之火燃遍全境。"
 
 SAN_mikage_furnace_overload_safety:"御影炉心过载安全协议"
 SAN_mikage_furnace_overload_safety_desc:"为了防止愚人众可能的破坏行为，我们建立了一套科学的炉心监控与安全协议。通过对祟神能量的精准调控，我们在保证生产效率的同时，确保了工厂不会成为灾难的中心。稳定的工业是国家战时经济的压舱石。"
 
 SAN_sabotage_tenryou_supply_lines:"破坏天领奉行补给线"
 SAN_sabotage_tenryou_supply_lines_desc:"截其辎重，乱其粮草。通过情报网的引导，我们的轻装部队将频繁袭击幕府军在神无冢与鸣神岛之间的补给节点。让敌人陷入饥饿与弹药匮乏的窘境，是我们实施大规模总攻前必须完成的战略削弱。"
 
 SAN_kujou_encampment_siege_plan:"九条阵屋围攻计划"
 SAN_kujou_encampment_siege_plan_desc:"那里是天领奉行的前进基地。通过包围并切断其与外部的联络，我们要彻底拔掉这颗钉子。心海大人设计了一套引蛇出洞的战术，诱使敌方主力出击，然后在预设阵地中利用火炮优势将其一举歼灭。"
 
 SAN_wartime_propaganda_expansion:"战时宣传扩张"
 SAN_wartime_propaganda_expansion_desc:"让真相揭开铁幕。我们通过所有的传播渠道，向稻妻民众揭露勘定奉行的腐败与天领奉行的专横。我们要塑造一种‘解放者’的形象，让海祇岛的意志成为稻妻所有受压迫者心中的希望与信仰。"
 
 SAN_centralized_command_structure:"中心化指挥结构"
 SAN_centralized_command_structure_desc:"随着战争规模的扩大，扁平化的组织已不再适用。我们建立了一套严密的中心化指挥体系，由心海大人直接对各师团下达战略指令。通过减少层级，我们实现了战术响应的极速化，确保军队如臂使指。"
 
 SAN_resource_stockpiling_strategy:"资源储备战略"
 SAN_resource_stockpiling_strategy_desc:"未雨绸缪，以应长久。我们通过行政手段在各控制区强制建立战备仓库，收集钢铁、粮食与元素结晶。这套储备系统将为我们的下一次大规模战略扩张提供充足的‘燃料’，确保战争机器不会因暂时的断供而停摆。"
 
 SAN_amendment_of_the_code_of_conduct:"行为准则修正案"
 SAN_amendment_of_the_code_of_conduct_desc:"反抗军必须是纪律的模范。心海大人重新审订了战时行为准则，严禁掠夺民众，强调保护平民利益。通过提升军队的道德水准，我们赢得了占领区民众的真心拥护，这种软实力是比任何武器都更有威慑力的盾牌。"
 
 SAN_watatsumi_trade_routes_protection:"海祇贸易航线保护"
 SAN_watatsumi_trade_routes_protection_desc:"海浪滔天处，铁甲巨舰巡航忙，商船安然归。为了打破幕府的海上封锁，我们组建了专业的护航编队。通过在关键海域部署巡逻艇与暗礁防线，我们确保了与离岛及异国贸易的持续性，维持了国家的经济血脉。"
 
 SAN_joint_staff_military_academy:"联合参谋军事学院"
 SAN_joint_staff_military_academy_desc:"战争的未来在于人才。我们在珊瑚宫附近建立了一所专门的军事学校，由五郎等高级将领授课。通过对兵法、战术与后勤的系统化教学，我们正在培养一批兼具忠诚与专业素养的新型指挥官，他们将是国家的栋梁。"
 
 SAN_industrial_migration_plan:"工业迁移计划"
 SAN_industrial_migration_plan_desc:"鸡蛋不能放在一个篮子里。我们将踏鞴砂的部分精密生产线向海祇岛的山腹内迁移。通过建立分散的工业节点，我们极大增强了面对大规模轰击时的工业生存能力，确保核心产能始终处于巫女大人的庇护之下。"
 
 SAN_advanced_reconnaissance_missions:"高级侦察任务"
 SAN_advanced_reconnaissance_missions_desc:"利用缴获的电子设备与炼金探测仪，我们提升了侦察的深度。我们的小分队甚至能够渗透进鸣神岛的影向山周围，获取幕府防御体系的实时情报。这些精准的信息流，将为心海大人制定最后的决战计划提供数据支持。"
 
 SAN_frontline_medical_support_reform:"前线医疗支援改革"
 SAN_frontline_medical_support_reform_desc:"海祇之韧性，源于每一个获救的战士。我们改革了前线医疗体系，建立了战场急救站与分级后送机制。通过提升生存率，我们稳定了军心。每一个重返战场的勇士，都将以更坚定的信念打击那些试图践踏家园的敌军。"
 
 SAN_watatsumi_naval_shipyard_expansion:"海祇海军造船厂扩张"
 SAN_watatsumi_naval_shipyard_expansion_desc:"深水港湾内，重锤声声震碧波，铁船向远洋。利用在踏鞴砂获得的工业成果，我们扩建了海祇岛的造船厂。我们要建造更大的蒸汽战舰，让海祇岛的蓝色旗帜在更广阔的海域上飘扬，夺回稻妻的海洋霸权。"
 
 SAN_strategic_reserve_mobilization:"战略储备动员"
 SAN_strategic_reserve_mobilization_desc:"在决战前夕，我们释放了所有的隐藏战力。通过动员最后的一批适龄志愿者与老兵，我们组建了庞大的预备队师团。这些储备力量将作为压垮幕府防线的最后一根稻草，在关键时刻投入战场，毕其功于一役。"
 
 SAN_shrine_defence_coordination:"神社防御协同"
 SAN_shrine_defence_coordination_desc:"通过在各岛神社部署小规模精锐分队，我们将信仰中心转化为局部的防御节点。这些地点拥有极高的精神象征意义，防御者的决死意志将极大地迟滞幕府军的推进，为全局的战略反攻创造绝佳的侧翼保护。"
 
 SAN_logistical_efficiency_overhaul:"后勤效率大整顿"
 SAN_logistical_efficiency_overhaul_desc:"利用心海大人的精算能力，我们对后勤网络进行了全面的数学优化。减少运输环节，提升周转速度，确保每一颗子弹都能在需要的时候出现在战士手中。这种效率的提升，是维持庞大反抗军长期作战的必然保障。"
 
 SAN_maritime_patrol_fleet_setup:"海上巡逻舰队组建"
 SAN_maritime_patrol_fleet_setup_desc:"我们不再满足于近海。通过组建中型巡逻舰队，我们开始对八酝岛至鸣神岛的深海区域进行定期清剿。我们要将所有的海乱鬼与幕府哨船驱离，为反抗军的主力舰队开辟出一条通往稻妻城的安全走廊。"
 
 SAN_elite_warrior_training_reforms:"精锐勇士训练改革"
 SAN_elite_warrior_training_reforms_desc:"针对高强度近身战，我们开发了一套全新的训练流程。士兵们不仅要修习武艺，更要学习如何在混战中利用环境优势。这些精锐将在总攻中作为凿子，刺破天领奉行最坚硬的铠甲，化身为敌人的噩梦。"
 
 SAN_synthetic_material_research_action:"合成材料研究行动"
 SAN_synthetic_material_research_action_desc:"利用踏鞴砂的副产物，我们开展了早期合成材料的研发。这种新型材料能够提升装甲的韧性并减轻重量。通过技术创新，我们正在逐步弥补与幕府军在重型装备上的代差，让海祇岛的战车也能在战场上驰骋。"
 
 SAN_national_conscription_arrangements:"国民征兵安排"
 SAN_national_conscription_arrangements_desc:"为了最终的正义，每一位国民都做好了牺牲的准备。我们系统性地整理了征兵档案，建立了一套公平且高效的兵源补充机制。这不再仅仅是一场局部的反抗，而是海祇岛全体国民为了自由与愿望而进行的民族战争。"
 
 SAN_heavy_artillery_deployment_plan:"重型火炮部署计划"
 SAN_heavy_artillery_deployment_plan_desc:"利用在御影炉心改进的铸炮技术，我们制造了一批重型攻坚炮。这些钢铁巨兽被部署在关键的地理高地上，能够覆盖敌人的主要防线。通过密集的火力覆盖，我们要让幕府的堡垒在海祇岛的怒火中化为齑粉。"
 
 SAN_experimental_aircraft_prototype_plan:"实验性航空雏形计划"
 SAN_experimental_aircraft_prototype_plan_desc:"受白夜国‘大日御舆’太阳神车传说与枫丹机械的启发，我们开始尝试研制早期的轻型飞行器。这些木材与帆布构成的雏形虽然稚嫩，却代表着我们探索第三维战场的野心。终有一天，我们的意志将从高天降临。"
 
 SAN_total_war_industrial_focus:"全面战争工业重点"
 SAN_total_war_industrial_focus_desc:"将所有的资源倾注到齿轮与熔炉之中。我们暂时停止了非必要的轻工业生产，举国体制转向军工。通过这种极致的资源集中，我们建立起了能够与幕府长期抗衡的战争工业体系，将海祇岛变为了钢铁的熔炉。"
 
 SAN_narukami_infiltration_strategy:"鸣神岛渗透战略"
 SAN_narukami_infiltration_strategy_desc:"渗透者们已经穿过了雷暴，在稻妻城的阴影下潜伏。我们要利用这一策略，在总攻发起时从内部瘫痪天守阁的指挥中枢。通过破坏通讯与刺杀关键幕僚，我们将让庞大的幕府机器在最关键的时刻陷入瘫痪。"
 
 SAN_tenshukaku_offensive_arrangements:"天守阁总攻安排"
 SAN_tenshukaku_offensive_arrangements_desc:"那是最后的时刻。所有的部队已集结在鸣神岛的边缘，等待着现人神巫女的终极信号。我们要直捣稻妻的权力中心，彻底终结眼狩令的黑暗统治。为了海祇大御神的荣光，为了凡人的愿望，进攻！"

 # ========================== 第三阶段：平定旧域 (71-110) ==========================
 SAN_seirai_island_expedition_strategy:"清籁岛远征战略"
 SAN_seirai_island_expedition_strategy_desc:"雷云旋聚处，孤岛静谧锁旧愁，巫女叹悠悠。为了寻找失落的资源并彻底平定稻妻群岛的叛乱，我们必须向被雷暴封锁的清籁岛进军。我们要解开浅濑神社背后的秘密，将那股狂暴的自然之力转化为国家的防御屏障。"
 
 SAN_unseal_amakumo_thunder_plan:"解封天云雷暴计划"
 SAN_unseal_amakumo_thunder_plan_desc:"通过对浅濑响留下的法术残片的研究，我们试图通过主观干预来引导天云峠的雷暴。这并非是亵渎神灵，而是为了让那股忿恨的力量平息，并为海祇岛获得一种前所未有的电子脉冲防御手段，让任何敌对设备都无法靠近。"
 
 SAN_koseki_village_rehabilitation:"越石村康复安排"
 SAN_koseki_village_rehabilitation_desc:"曾经的笑语早已湮没在雷鸣中。我们要派驻专业的行政团队与建设人员，恢复越石村的生机。通过修缮渔船与发放补助，让这些迁徙回乡的居民感受到海祇领袖的关怀。一个稳定的后方是前线最坚定的支撑。"
 
 SAN_ako_domeki_legacy_investigation:"百目鬼遗产调查行动"
 SAN_ako_domeki_legacy_investigation_desc:"赤穗百目鬼，那个传说中的海盗王，曾在这片土地上留下过傲骨。我们要派兵寻找他在雷暴中失落的财宝与战术资料。通过对‘清籁丸’残骸的挖掘，我们希望能获得古老的航海经验与被遗忘的海战战法。"
 
 SAN_seirai_maru_salvage_operation:"清籁丸打捞工程"
 SAN_seirai_maru_salvage_operation_desc:"破败的巨舰在星光下垂泪。我们要启动大规模的打捞与复原行动，利用现代工程技术将这艘曾经的旗舰变回可移动的海上浮动平台。这不仅是文物的回收，更是为了展示海祇岛在极端环境下进行大规模工程的能力。"
 
 SAN_thunder_manifestation_study:"雷音权现研究行动"
 SAN_thunder_manifestation_study_desc:"雷音之权现，纯粹忿恨化雷霆，凡人探秘行。我们组织了一支由学者与武士构成的科考队，在保护措施下观察这一元素生命。通过对其能量流动的监控，我们正在开发一种新型的雷元素传感器，这将极大提升我们的电子战水平。"
 
 SAN_asase_shrine_restoration_plan:"浅濑神社修复计划"
 SAN_asase_shrine_restoration_plan_desc:"为了守护封印并赢得当地人的信仰，修复浅濑神社是我们的政治首务。我们为代理宫司寝子带去了充足的修缮材料。当神社重焕生机之时，清籁岛的人心也将归附于珊瑚宫，信仰的力量将化作守御国土的无形屏障。"
 
 SAN_storm_rider_training_action:"雷暴骑兵训练行动"
 SAN_storm_rider_training_action_desc:"在清籁岛的雷区中进行高强度演练。我们要训练一批能适应极端气象环境的特殊部队，让他们学会在雷雨中利用地形优势展开打击。这些‘风暴骑兵’将成为我们在恶劣气候下作战的最后王牌，如影随形。"
 
 SAN_seirai_naval_fortress_strategy:"清籁海军要塞战略"
 SAN_seirai_naval_fortress_strategy_desc:"利用清籁岛破碎而险峻的地形，我们决定将其南岸建设成一座大型海上要塞。这里将部署远程海防炮与水雷监控中心。要塞的建成将彻底封锁稻妻通往南方暗之外海的咽喉，让清籁岛成为海祇岛最坚实的南方盾牌。"
 
 SAN_amakumo_energy_harnessing_plan:"天云能量捕获计划"
 SAN_amakumo_energy_harnessing_plan_desc:"天云峠中心的能量是无穷的。我们尝试修筑巨大的元素集电装置，直接捕获空中的闪电。这些原始而强大的能量将被转化为工业电力，通过跨海电缆反哺海祇岛的工厂。科技的进步，正在将自然的灾难变为发展的动力。"
 
 SAN_tsurumi_island_reconnaissance_plan:"鹤观岛侦察安排"
 SAN_tsurumi_island_reconnaissance_plan_desc:"迷雾笼罩处，数千载轮回未休，孤魂复何求。那是一座被世人遗忘的禁忌之地。我们必须在迷雾中派遣先行者，寻找通往岛屿中心的唯一路径。侦察不仅仅是为了扩张，更是为了揭开隐藏在雾海之后的远古真相同。"
 
 SAN_dispel_fog_over_tsurumi_action:"驱散鹤观迷雾行动"
 SAN_dispel_fog_over_tsurumi_action_desc:"通过对阿瑠之羽的解析，我们掌握了与迷雾沟通的方式。我们要利用特殊的元素灯塔，在惑饲滩与逢岳之野建立起稳定的通路。当阳光再次照进这座岛屿，那长达数千年的黑暗轮回将正式宣告终结，新秩序即将建立。"
 
 SAN_save_ruu_soul_strategic_action:"救赎阿瑠灵魂战略"
 SAN_save_ruu_soul_strategic_action_desc:"阿瑠的歌声不应在惨剧中心中回响。心海大人亲自主持这一充满怜悯的行动。我们要通过修补地脉节点，让阿瑠的灵魂得到真正的解脱，不再受循环血祭的折磨。这种对人性的救赎，将极大提升国家的神圣性与凝聚力。"
 
 SAN_kapatcir_restless_energy_containment:"卡帕奇莉能量遏制"
 SAN_kapatcir_restless_energy_containment_desc:"雷之魔鸟的残余能量依旧危险。我们要建立一整套元素拘束系统，防止那些狂暴的紫色电流再次暴走。通过对其能量频率的调整，我们正在尝试将其与电子科技结合，让雷鸟的遗愿以另一种方式守护这片大地。"
 
 SAN_moshiri_ritual_site_reform:"茂知祭场改革安排"
 SAN_moshiri_ritual_site_reform_desc:"废除野蛮的旧式祭祀，将茂知祭场改造为科学与艺术的研究基地。我们要在这里整理那些失落的历史与文字，让文明的灯火取代愚昧的血祭。通过对岛民观念的系统性引导，我们将把鹤观真正纳入海祇文明的版图。"
 
 SAN_mt_kanna_mining_exploration:"菅名山矿产勘探行动"
 SAN_mt_kanna_mining_exploration_desc:"在菅名山那巨大的坑穴之下，隐藏着罕见的特种矿石。我们组织了地质专家团，在解除诅咒后对山体进行深层钻探。我们要寻找那些能增强合金性能的稀有元素，为我们未来的重型战车与战列舰提供更强的防护能力。"
 
 SAN_shirakoro_peak_observation_post:"知比山观测站建设"
 SAN_shirakoro_peak_observation_post_desc:"知比山的高峰是绝佳的天文与气象观测点。我们决定在这里建立一座全天候的观测基地，监控稻妻全地的气象变动。精准的气象预报将为我们的海上行动提供巨大的战略优势，让敌军在风暴中迷失，而我们如鱼得水。"
 
 SAN_riftstalker_containment_tactics:"兽境猎犬遏制战术"
 SAN_riftstalker_containment_tactics_desc:"那些来自深渊的侵蚀者在鹤观四处游荡。我们必须开发出专门针对‘兽境’生物的作战条例。利用特定的元素反应削弱其腐蚀能力，并训练士兵学会在异次空侵扰中保持阵型。这种经验将使我们的军队在未来的全球危机中独占鳌头。"
 
 SAN_ancient_civilization_study_action:"远古文明系统性研究"
 SAN_ancient_civilization_study_action_desc:"通过对鹤观壁画与石根文字的深度翻译，我们要重建那段消失在天钉落下前的历史。这种知识的获取将为我们提供一种超越时代的宏大视野。我们不仅在经营一个岛屿，更是在继承提瓦特那被封印的文明遗产。"
 
 SAN_tsurumi_coastal_radar_setup:"鹤观海岸雷达设置"
 SAN_tsurumi_coastal_radar_setup_desc:"利用知比山的地下遗迹技术，我们尝试建造第一台远距离波段雷达。由于地理位置极其偏远，这里的雷达站将能提前发现来自外海的任何威胁。它将成为我们海洋预警系统的眼睛，让黑暗中的不速之客无所遁形。"
 
 SAN_shirne_maiden_of_outer_islands:"外岛巫女巡抚行动"
 SAN_shirne_maiden_of_outer_islands_desc:"现人神巫女的影响力应遍布每一个岛屿。我们向清籁与鹤观派遣巡抚团队，建立分支管理机构。通过神圣权力的延伸，我们将这三处原本孤立的领土紧密地缝合在一起，形成了一个跨海域的高效行政共同体。"
 
 SAN_veteran_resettlement_program:"老兵移居安置行动"
 SAN_veteran_resettlement_program_desc:"为了巩固新占领区的统治，我们鼓励反抗军的老兵在清籁与鹤观定居。政府将为他们提供土地与农具，并协助建设基础民生设施。这些退伍战士将成为坚实的民兵中坚，确保国家的版图在边境区域稳如泰山。"
 
 SAN_fortress_network_expansion:"要塞网络全域扩张"
 SAN_fortress_network_expansion_desc:"将外岛的防御点串联成网。我们在各岛的高地上修筑了相互支援的防空阵地与岸防炮群。通过这种网状化的防御架构，我们确保了即使在局部受损的情况下，整个防线依然能保持火力全开，让海洋变成侵略者的公墓。"
 
 SAN_islands_economic_integration:"诸岛经济整合战略"
 SAN_islands_economic_integration_desc:"打破孤岛的隔阂，建立统一的市场。我们将海祇的珍珠、清籁的雷元素结晶与鹤观的矿石进行系统性贸易调配。通过经济的互补性，我们打造了一个能够自我循环的内循环体系，极大地增强了面对国际制裁时的韧性。"
 
 SAN_outer_defence_command_reforms:"外海防御司令部改组"
 SAN_outer_defence_command_reforms_desc:"为了应对复杂的跨岛指挥，我们成立了独立的‘外海防御司令部’。该机构将统筹清籁、鹤观与海祇岛的联防事务。通过数字化的指挥链路，我们实现了资源的跨区域最优调配，让每一份战力都能精确打击在最需要的地方。"
 
 SAN_maritime_trade_monopoly_strategy:"海洋贸易垄断战略"
 SAN_maritime_trade_monopoly_strategy_desc:"掌握了诸岛，就掌握了稻妻南方的贸易权。我们通过行政手段确立了海祇岛在特定海域的专属贸易地位，强制所有通过此地的商船接受我们的监管。这种垄断地位将为国家带来源源不断的财富与外汇收入。"
 
 SAN_naval_aviation_training_action:"海军航空兵强化训练"
 SAN_naval_aviation_training_action_desc:"在清籁岛的狂风中，我们的实验性飞行队开始了高难度科目演练。我们要训练飞行员学会在狭小的甲板上降落，并学会利用云层躲避敌人的视线。这些早期的航空先驱，将为我们未来的制空权奠定最扎实的人才基础。"
 
 SAN_island_logistics_hub_plan:"离岛后勤中枢计划"
 SAN_island_logistics_hub_plan_desc:"在诸岛之间建立起大型的自动化补给站。通过利用传送地脉的原理与现代运输船，我们正在极大地缩短战备物资的周转周期。一个高效的中枢将确保前线在面对任何突发情况时，都能在24小时内获得充足的支援。"
 
 SAN_regional_administrative_offices:"区域行政署设立"
 SAN_regional_administrative_offices_desc:"精简职能，强化效能。我们在新领土上设立了直接隶属于珊瑚宫的区域行政署，取代了原本低效的村落自治。通过专业的文官体系，我们实现了法律的统一与秩序的重建，让海祇领袖的意志在每一寸土地上扎根。"
 
 SAN_pan_island_defense_pact_action:"全岛防御公约行动"
 SAN_pan_island_defense_pact_action_desc:"我们要与所有的岛民签署一份共同防御公约：一岛受难，诸岛支援。通过这种政治契约，我们把不同岛屿的命运紧紧捆绑在一起。这股团结的力量是比任何铁丝网都更难突破的墙，是国家生存的最高政治保障。"
 
 SAN_tsurumi_resource_processing_hub:"鹤观资源深加工中心"
 SAN_tsurumi_resource_processing_hub_desc:"原材料的出口是低效的。我们在鹤观建立了现代化的选矿与精炼工坊，利用当地的能量特征生产高纯度合金。通过产业链的延伸，我们不仅提升了产品的附加值，更在技术层面上建立了不可替代的竞争优势。"
 
 SAN_ritual_stone_energy_research:"仪式石能量研究"
 SAN_ritual_stone_energy_research_desc:"鹤观那些古老的祭祀石具有奇特的元素传导特性。我们通过物理手段对其进行重组，开发出一种新型的高能蓄电池雏形。这种技术若能成熟，将彻底改变我们军队的能源结构，让长时间的远程机动成为可能。"
 
 SAN_seirai_storm_prediction_center:"清籁风暴预测中心"
 SAN_seirai_storm_prediction_center_desc:"在清籁岛的中央，我们建立了一座精密的气象预测塔。通过对大气电荷的实时监控，我们能提前数小时预测到海上气象的剧变。这种预见性让我们在海战中总能抢占上风向，将风暴转化为我们的战术掩护。"
 
 SAN_ako_pirate_fleet_integration:"百目鬼余部整合行动"
 SAN_ako_pirate_fleet_integration_desc:"那些曾跟随百目鬼的海寇，是海洋上最顽强的战士。我们向他们发出诏安令：只要宣誓效忠海祇岛，就能获得正式的海军编制。这些‘海洋猎犬’的加入，将为我们的舰队注入一股狂野而高效的战斗精神。"
 
 SAN_koseki_village_fishing_standardization:"越石村渔业标准化"
 SAN_koseki_village_fishing_standardization_desc:"渔业是清籁岛的经济基石。我们引入了工业化的捕捞与加工流程，利用冷藏设备提升产品的保鲜期。这种标准化的改变不仅解决了岛民的生计，更为国家提供了稳定的战略副食品储备，让经济在战时也充满活力。"
 
 SAN_amakumo_peak_scientific_base:"天云峰科研基地建设"
 SAN_amakumo_peak_scientific_base_desc:"在天云峠的高处，我们建立了一座跨学科的综合科研中心。这里将是研究高能物理与远古遗迹的前沿。我们要吸引全稻妻的优秀人才，在这里共同攻克那些困扰世人千年的科学难题。知识就是我们最强大的扩张工具。"
 
 SAN_storm_shield_technology_plan:"风暴护盾技术计划"
 SAN_storm_shield_technology_plan_desc:"受雷鸟能量笼罩鹤观的启发，我们尝试研发一种基于元素场的小规模护盾装置。这种技术若能成功，将能有效地保护我们的地面部队免受大规模轰炸的伤害。我们要用科技筑起一道看不见的城墙，守护每一位战士的生命。"
 
 SAN_outer_islands_customs_union:"外岛关税同盟安排"
 SAN_outer_islands_customs_union_desc:"建立起海祇岛与其所有海外领地的统一关税区。通过取消内部贸易壁垒，我们实现资源的极速流转。这种深度的经济整合将产生巨大的合力，让海祇岛从一个孤悬海外的小国，成长为一个区域性的海洋经济强权。"
 
 SAN_watatsumi_maritime_supremacy_plan:"海祇海洋霸权计划"
 SAN_watatsumi_maritime_supremacy_plan_desc:"我们要确立海祇岛在全稻妻南部海域的绝对领导地位。通过展示我们强大的舰队与坚固的要塞网络，我们要让所有的邻邦意识到：这片海洋的主人已经易手。海祇大御神的旗帜，将成为这片蔚蓝领域唯一的正统符号。"
 
 SAN_outer_expeditionary_corps_setup:"外海远征军团组建"
 SAN_outer_expeditionary_corps_setup_desc:"这是为了捍卫正义而组建的矛头。该军团由精锐的远征军士、雷暴骑兵与百目鬼余部组成，配备了海祇岛最先进的装备。它将不再局限于防御，而是作为国家意志的延伸，随时准备前往提瓦特的任何一个角落播撒反抗的火种。"

 # ========================== 第四阶段：白夜遗产 (111-140) ==========================
 SAN_enkanomiya_exploration_project:"渊下宫大探险计划"
 SAN_enkanomiya_exploration_project_desc:"天崩地裂后，深渊遗迹藏忧，白夜几时休。现人神巫女下令开启通往渊下宫的封印。我们要派遣最勇敢的先遣队深入海渊，寻找那段被时光掩埋的历史。那里的失落科技与远古知识，将是海祇岛崛起的终极筹码。"
 
 SAN_search_for_before_sun_and_moon_action:"寻找《日月前事》行动"
 SAN_search_for_before_sun_and_moon_action_desc:"那是被天空岛严令封禁的禁忌之书。我们要通过对渊下宫图书馆的系统性挖掘，找回这部记载了世界真相的史书。虽然这会引来高空的窥视，但为了海祇民的尊严，我们必须掌握属于自己的真相与历史定义权。"
 
 SAN_dainichi_mikoshi_reactivation_plan:"重启大日御舆计划"
 SAN_dainichi_mikoshi_reactivation_plan_desc:"赫利俄斯之车，在地底再次放射出万丈光芒。通过修复那些被龙蜥破坏的传导节点，我们要让这座宏伟的人造太阳重新运转。它不仅能提供无尽的能源，更将成为海祇岛在深渊科技领域取得突破的标志性工程。"
 
 SAN_jizhashi_training_reforms:"地走官训练改革"
 SAN_jizhashi_training_reforms_desc:"据说地走官候补一夜不可受伤。我们要恢复这一古老而严酷的选拔标准，并结合现代格斗技进行改组。这些新一代的地走官将拥有在完全黑暗的环境中战斗的能力，他们将成为国家最隐秘、最致命的‘暗中之眼’。"
 
 SAN_vishap_containment_measures:"龙蜥遏制战术安排"
 SAN_vishap_containment_measures_desc:"深海的龙嗣是我们要共同面对的古老威胁。我们通过对龙蜥研究所的修复，掌握了针对其生物弱点的化学与频率武器。我们要将这些危险的生物遏制在禁区之内，甚至通过基因筛选，将它们改造为我们可以利用的生物辅助力量。"
 
 SAN_evernight_temple_archeology:"常夜灵庙考古行动"
 SAN_evernight_temple_archeology_desc:"在常夜的幽冥中，隐藏着空间叠加的奥秘。我们要对灵庙进行微米级的扫描，破解那些古老的相位传送阵法。这些考古成果若能应用在现代运输中，将彻底颠覆现有的物流逻辑，让海祇岛获得跨越空间的战略机动能力。"
 
 SAN_serpents_heart_ritual_study:"蛇心之地仪式研究"
 SAN_serpents_heart_ritual_study_desc:"蛇心之地，那是空间交叠的奇点。我们组织了最顶尖的炼金术士与物理学家，对祭坛的震动频率进行监测。我们要学习如何引导那些跨维度的能量，为国家建立起一套无法被常规火力摧毁的、基于多维空间的防御体系。"
 
 SAN_abyss_technology_integration:"深渊科技系统性整合"
 SAN_abyss_technology_integration_desc:"将白夜国的远古智慧与踏鞴砂的现代工业完美融合。我们要建立一套属于海祇岛的‘渊科技’标准，涵盖能源、材料与精密机械。这种代差级别的技术跨越，将让我们的工业产能在短短数年内实现对大陆国家的全面超越。"
 
 SAN_enkanomiya_industrial_complex:"渊下宫工业联合体"
 SAN_enkanomiya_industrial_complex_desc:"在巨大的地底空间内，建立起完全封闭的自动化工厂链。由于不受地表气候与战火影响，这里将成为国家最安全的战略生产基地。每一台下线的机械都将集成了高能核心，代表着反抗军武装力量的最高技术巅峰。"
 
 SAN_ancient_vessel_restoration:"古代潜航舰修复"
 SAN_ancient_vessel_restoration_desc:"我们要打捞那些沉睡在渊底的古老潜航器残骸。通过对这些超越时代引擎的逆向工程，我们决定建造自己的深海潜艇舰队。这些静默的杀手将能从海渊深处发动突袭，让幕府军的海上防御在无声无息中彻底崩溃。"
 
 SAN_chronos_worship_integration:"时间之执政信仰整合"
 SAN_chronos_worship_integration_desc:"卡伊洛斯，时刻与千风的统领。我们要将这段被尘封的信仰重新引入岛民的视野。通过宣传‘时刻’的必然性，我们将增强民众对未来的信心。信仰不再是虚无的死物，而是对真理的无尽追求与对天空秩序的主动反击。"
 
 SAN_forbidden_history_dissemination:"禁忌历史扩散行动"
 SAN_forbidden_history_dissemination_desc:"真相不应只被少数人掌握。我们有计划地将渊下宫发现的历史记录，通过小册子与演讲，向全稻妻甚至全提瓦特扩散。我们要用这种‘思想核武’去瓦解天理建立的叙事权威，在每一个人的心中播下怀疑与自由的种子。"
 
 SAN_byakuya_military_standardization:"白夜军事标准化"
 SAN_byakuya_military_standardization_desc:"将渊下宫发现的古代军制与现代动员体制相结合。我们要建立一套基于‘地走官’传统的高效军衔与晋升制度，并为所有部队配备集成了古代符文的标准化武器。这种从历史中汲取的军事智慧，将赋予海祇岛军队无坚不摧的纪律性。"
 
 SAN_hydro_elemental_weaponry_plan:"水元素高能武器计划"
 SAN_hydro_elemental_weaponry_plan_desc:"海祇之怒，化作激流斩铁甲。利用大蛇留下的血枝珊瑚原理，我们正在研制高压水元素脉冲炮。这些武器能够发射具有极强穿透力的压缩液滴，轻易击穿敌方重型巡洋舰的装甲。我们要掌握海洋中最本质的力量作为进攻的利矛。"
 
 SAN_abyssal_intelligence_gathering:"深渊情报收集安排"
 SAN_abyssal_intelligence_gathering_desc:"派遣专门的‘深渊侦察连’深入渊底更深处的未知缝隙。我们要监控那些来自世界之外的异常波动，预防深渊邪祟的再次入侵。同时，这种情报收集也将为心海大人提供一种全局性的视角，在战略高度上审视提瓦特的变局。"
 
 SAN_dainichi_energy_grid_expansion:"大日御舆能源网扩张"
 SAN_dainichi_energy_grid_expansion_desc:"通过特殊的传导合金，我们要将大日御舆的能源输送到渊下宫的每一个角落，并最终反向供应给海祇岛地表。这一能源网的建成将标志着我们彻底摆脱了对传统燃料的依赖，海祇岛将成为提瓦特大陆第一个步入‘无限能源’时代的国度。"
 
 SAN_subterranean_bunker_network:"地底碉堡群网络"
 SAN_subterranean_bunker_network_desc:"在渊下宫的关键路口，利用天然岩层修筑密集的火力支撑点。这些碉堡集成了古代龙蜥防御科技，能够抵御从地表降下的任何形式的打击。我们要将海渊打造为最后的避难所，也是反击天理统治的坚实根据地。堡垒在下，希望在上。"
 
 SAN_enkanomiya_civilian_resettlement:"渊下宫平民迁入安排"
 SAN_enkanomiya_civilian_resettlement_desc:"我们要引导一部分勇敢的海祇民众回归祖先居住过的土地。通过对狭间之街的系统性修复，建立现代化的居住区与生态系统。这不仅是为了缓解地表的土地压力，更是为了培养出一代适应多种环境、具备高度危机意识的新海民。家园即海渊。"
 
 SAN_ancient_archives_decryption_action:"古代档案全面解码"
 SAN_ancient_archives_decryption_action_desc:"渊下宫的机密室中仍存有大量被封印的量子化档案。我们投入了大量的计算资源与炼金资源进行暴力破解。每一页被译出的文档都代表着一种失传的炼金配方或工程图纸，我们要将这些失落的珍珠一颗颗串联起来，重现第一王座的荣光。"
 
 SAN_watatsumi_enkanomiya_united_front:"海祇-渊下宫统一战线"
 SAN_watatsumi_enkanomiya_united_front_desc:"明确地表与地底在政治、军事与文化上的绝对统一性。我们要让所有的岛民意识到，我们是一个拥有深厚底蕴且技术领先的伟大集体。通过这种跨维度的民族认同感，我们建立起了一套牢不可破的国家意志，任何外敌都无法将其撕裂。"
 
 SAN_abyssal_resource_monopoly_plan:"深渊资源垄断计划"
 SAN_abyssal_resource_monopoly_plan_desc:"渊下宫出产的一些稀有材料在提瓦特地表是绝无仅有的。我们要确立对这些资源的绝对垄断权，并以此作为与大陆大国博弈的筹码。通过高价值资源的战略输出，我们将控制提瓦特的原材料供应链，在经济战线上立于不败之地。"
 
 SAN_experimental_underwater_armor_action:"实验性深海装甲行动"
 SAN_experimental_underwater_armor_action_desc:"利用在海渊深处获得的耐压材料，我们研制出了新一代的步兵外骨骼装甲。这种装甲不仅能防弹，更能让士兵在极端水压与黑暗环境下如履平地。它将作为我们海军陆战队的标配，让海祇岛的战士成为海洋中最全能、最致命的狩猎者。"
 
 SAN_white_night_doctrine_development:"白夜作战教义开发"
 SAN_white_night_doctrine_development_desc:"针对地底空间与复杂地形，我们开发了一套全新的军事教义——‘白夜作战法’。它强调利用照明与黑暗的交替、空间的窄口控制以及远程火力的精准制导。这种教义将我们的陆军转化为一支极具弹性的作战力量，能适应各种极端恶劣的战场。"
 
 SAN_enkanomiya_high_command_setup:"渊下宫最高指挥部"
 SAN_enkanomiya_high_command_setup_desc:"为了管理日益庞大的地底版图，我们成立了独立的‘渊下指挥部’。该机构将直接负责渊下宫的防御、科研与工业生产。通过与其地表指挥部的深度联动，我们实现了一套海、陆、空、潜、渊五位一体的现代化战争指挥架构。"
 
 SAN_ancient_tactics_integration:"古代战术系统性整合"
 SAN_ancient_tactics_integration_desc:"将白夜国先民对抗龙蜥的群体协作策略，转化为现代军队的小组作战标准。通过对阵型与元素共鸣的精密计算，我们让每一个步兵班组都具备了对抗敌军重型单位的能力。这种源于远吕羽氏时代的智慧，将让我们的军队焕发出新生的杀气。"
 
 SAN_enkanomiya_reserve_training_plan:"渊下宫预备役训练计划"
 SAN_enkanomiya_reserve_training_plan_desc:"所有的地底移民都必须接受基本的军事化培训。我们要利用渊下宫复杂的地形进行实战模拟，培养国民的危机处理能力与协作意识。一旦战争爆发，整个渊下宫将瞬间转化为一个庞大的兵营，提供源源不断的、适应性极强的战士。"
 
 SAN_subterranean_supply_overhaul:"地底物资周转大整顿"
 SAN_subterranean_supply_overhaul_desc:"建立起垂直于海床的大型重载升降系统。我们要大幅提升地表海祇岛与地底渊下宫之间的物资流转速度。这种补给线的优化将确保我们的战争工业与民生系统能在一个闭环内高速运转，极大地降低了外部打击对国家循环的影响。"
 
 SAN_abyssal_cultural_restoration_plan:"深渊文化复兴计划"
 SAN_abyssal_cultural_restoration_plan_desc:"我们要复原白夜国的服饰、节祭与艺术。通过这种文化复兴，增强海祇岛民对祖先辉煌历史的自豪感。这种深厚的人文底蕴将转化为强大的精神凝聚力，让我们在面对任何强权时，都能以‘文明继承者’的傲骨挺起胸膛，永不屈服。"
 
 SAN_unification_of_the_two_realms:"两界意志大统一"
 SAN_unification_of_the_two_realms_desc:"在珊瑚宫的旗帜下，地表的珍珠与地底的白夜正式融为一体。现人神巫女大人宣布国家进入新的纪元。这种从行政到灵魂的全方位统一，标志着海祇岛已完成了从一个地区反抗势力到一个拥有独特文明根基的独立强国的华丽转身。两界一心，共铸未来。"
 
 SAN_final_archeological_synthesis:"最终考古学大综述"
 SAN_final_archeological_synthesis_desc:"我们将渊下宫所有的发现整理成一套完整的知识体系。这不仅是为了科研，更是为了向未来揭示提瓦特的真实脉络。我们要建立一所综合性的白夜大学，将这些知识转化为推动国家全面现代化的核心动力。历史是我们的阶梯，指向无限的高天。"

 # ========================== 第五阶段：战后构想 (141-180) ==========================
 SAN_post_war_future_debate:"战后未来大辩论"
 SAN_post_war_future_debate_desc:"幕府已成旧梦，新的稻妻将在何处扎根？心海大人在珊瑚宫前开启了关于国家前途的广泛讨论。我们要决定，是走上绝对权威的神权之路，还是开启共和之门的民主之路，抑或是对天空岛秩序进行终极挑战的革命之路。命运的舵盘，此刻正握在我们手中。"

 # --- 路线A：现人神绝对权威 (威权) ---
 SAN_divine_authority_consolidation:"强化现人神绝对权威"
 SAN_divine_authority_consolidation_desc:"海祇大御神，荣光永驻信徒心，神谕定乾坤。为了确保战后的绝对稳定与效率，心海大人将被奉为唯一的、神圣不可侵犯的国家领袖。我们要建立一套基于神权统治的行政体系，将信仰转化为推动国家强制力的终极手段，实现万世一系的永恒秩序。"
 
 SAN_enforced_orobashi_orthodoxy:"强制大蛇正统信仰"
 SAN_enforced_orobashi_orthodoxy_desc:"确立大蛇远吕羽氏尊为国家唯一的正统。我们要重修所有的曚云神社，并对异端的鸣神残留进行系统性的文化清洗。通过这种思想的高度统一，我们要消除任何可能导致分裂的苗头，让整个民族在单一信仰的感召下，成为一台高效运转的战争机器。"
 
 SAN_clerical_administrative_overhaul:"神职行政体系重组"
 SAN_clerical_administrative_overhaul_desc:"政府官员即是神职人员。我们将行政等级与宗教层级挂钩，通过神圣的考核选拔官员。这种体制将极大地减少行政成本，提升民众对政策的服从性。每一个行政指令都将带有神谕的力量，任何质疑都将被视为对大御神的不敬。"
 
 SAN_monolith_industrial_prioritization:"单一工业重点化战略"
 SAN_monolith_industrial_prioritization_desc:"将所有的国资倾注于核心的军工复合体。在现人神的直接领导下，我们要建立起效率惊人的大型国营工坊。通过取消无意义的商业竞争，我们实现生产力的极致集中，确保国家在面对外部威胁时，能够随时爆发出排山倒海般的战争产能。"
 
 SAN_theocratic_military_indoctrination:"神权军事洗脑行动"
 SAN_theocratic_military_indoctrination_desc:"为了领袖，也为了信仰，战士们已准备好献祭生命。我们在军队中推行严格的忠诚教育，将每一个士兵都武装成为虔诚的十字军。这种建立在神权基础上的狂热战意，将让我们的陆军在冲锋时无视伤亡，成为扫荡一切敌人的神圣烈火。"
 
 SAN_purging_the_unbelievers_action:"清除不信者行动"
 SAN_purging_the_unbelievers_action_desc:"为了国家的纯洁，必须铲除那些隐藏在暗处的异见分子。我们授权秘密卫队对那些拒绝向珊瑚宫宣誓效忠的人进行清洗。只有思想绝对一致的国家，才能在接下来的提瓦特动乱中存续。稳定先于一切，哪怕其代价是鲜血与沉默。"
 
 SAN_divine_economic_planning_strategy:"神圣经济计划战略"
 SAN_divine_economic_planning_strategy_desc:"现人神巫女大人将亲自核准每一份五年计划。我们要建立一套完全脱离自由市场、基于国家需求的配给经济模型。通过对资源的绝对掌控，我们将每一粒大米、每一块钢铁都用在最能体现国家意志的地方。神圣的效率，将创造经济的奇迹。"
 
 SAN_prophets_of_the_deep_network:"深渊先知情报网"
 SAN_prophets_of_the_deep_network_desc:"利用那些能与远吕羽氏遗恨沟通的巫女，我们建立了一套玄学与科学并存的情报分析中心。我们要‘预见’敌人的动向，通过这种带有神秘色彩的战略侦察，确保国家的决策始终领先于竞争对手。先知在暗，神谕在明，胜利在握。"
 
 SAN_supreme_edict_drafting:"最高诏令草拟计划"
 SAN_supreme_edict_drafting_desc:"这是决定所有岛民命运的至高文件。我们要制定一套将现人神权力永久化、法律化的基本法。该法案将规定领袖对土地、资源与生命的绝对处置权，为海祇岛的千年长治久安奠定最坚实的、带血的法律基石。意志高于法律，神权决定秩序。"
 
 SAN_holy_expansionist_doctrine:"神圣扩张主义教义"
 SAN_holy_expansionist_doctrine_desc:"海洋不应有边界，神的光辉应普照万方。我们要将扩张主义作为国家的核心教义，宣称所有的蓝色水域都应属于大御神的子民。这种侵略性的国策将驱动我们的军队向更远方的群岛推进，为国家攫取更多的生存空间与奴役的红利。"
 
 SAN_watatsumi_eternal_dominance_plan:"海祇永恒主宰计划"
 SAN_watatsumi_eternal_dominance_plan_desc:"我们要确立海祇岛对稻妻全岛甚至整个暗之外海的永久霸权。通过在每一个重要节点建立带有神像的要塞，我们将这种统治具象化为民众每日必须瞻仰的奇迹。我们要让‘海祇岛’这个词汇，成为提瓦特东方永恒且唯一的统治符记。主宰一切，绝不动摇。"
 
 SAN_divine_monarchy_manifesto:"神圣君主制宣言"
 SAN_divine_monarchy_manifesto_desc:"正式宣布建立‘海祇神圣帝国’。通过这份宣言，我们将现人神巫女大人的世俗权力推向巅峰。我们要恢复古老的仪式感与贵族等级，以此构建一套等级森严、绝对稳定的金字塔式社会结构。秩序即正义，服从即美德。帝国的太阳，将永不落下。"
 
 SAN_ultimate_theocracy_implementation:"终极神权体制实施"
 SAN_ultimate_theocracy_implementation_desc:"所有的准备都已完成，终极的神权统治正式降临。从教育到工业，从摇篮到坟墓，国家的每一寸脉搏都随现人神的意志律动。海祇岛已成为一个完美的、神圣的整体，准备好在领袖的指引下，去书写那部属于强者的、血色与荣光交织的宏大史诗。神佑海祇！"

 # --- 路线B：海祇民主议会 (民主) ---
 SAN_democratic_council_strategy:"海祇民主议会战略"
 SAN_democratic_council_strategy_desc:"权力归民手，万岛一心建共和，自由满山河。为了防止威权主义的复辟，我们决定建立由多岛代表组成的联合议会。心海大人将主动交出大部分世俗权力，退居为宗教元首。我们要建立一个自由、平等且多元的新稻妻，让每一个岛民的声音都能被听见。"
 
 SAN_multi_island_parliament_setup:"多岛联合议会筹建"
 SAN_multi_island_parliament_setup_desc:"从海祇岛到鸣神岛，从清籁岛到离岛，每一个区域都将拥有平等的投票权。我们要起草一份能够保障各方利益的宪章，通过协商而非屠杀来解决内部争端。民主的火种虽然微弱，但它将点燃民众的归属感与主人翁精神，铸就最稳固的国家根基。"
 
 SAN_yashiro_commission_advisory_role:"社奉行顾问咨询权"
 SAN_yashiro_commission_advisory_role_desc:"尊重传统是民主的真谛。我们邀请社奉行神里家作为议会的终身文化顾问，负责调解不同派系间的矛盾并保护非物质文化遗产。这种新老权力的良性互动，将极大减少社会动荡，确保平稳过渡到一个更文明、更包容的共和体制。"
 
 SAN_ritou_merchant_trade_pact:"离岛商会贸易协定"
 SAN_ritou_merchant_trade_pact_desc:"自由贸易是繁荣的源泉。我们与万国商会及离岛当地势力签署了全面的经贸协定，取消大部分关税壁垒。通过吸引异国资本，我们将离岛重新打造为提瓦特东方的金融中心。一个富足的中产阶级，将成为民主体制最坚实的保护者。财富属于每一个人。"
 
 SAN_freedom_of_worship_proclamation:"信仰自由大宣言"
 SAN_freedom_of_worship_proclamation_desc:"我们要正式终结大蛇与鸣神之间的千年隔阂。政府宣布实行政教分离，保障所有公民选择自己信仰的权利。通过这种宽容的政策，我们将消除宗教仇恨的根源，实现跨岛屿、跨族群的大和解。信仰是个人的慰藉，和平是国家的基石。"
 
 SAN_liberal_economic_reforms_plan:"自由派经济改革计划"
 SAN_liberal_economic_reforms_plan_desc:"我们要拆分原本僵化的战时国营工厂，鼓励私人开办工坊。通过引入竞争机制，提升工业的生产效率与创新能力。我们要建立完善的知识产权保护与社会保障体系，让每一个勤劳的岛民都能在自由竞争中获得属于自己的那份幸福与尊严。市场万岁。"
 
 SAN_council_of_elders_integration:"长老议会整合安排"
 SAN_council_of_elders_integration_desc:"为了获得传统农村社区的支持，我们将望泷村等地的长老会整合进国家的地方咨询委员会。通过这种渐进式的民主，我们确保了政策在基层能够被顺利理解并执行。民主不应是外来的嫁接，而应从本土的土壤中自然地生长出来。"
 
 SAN_citizens_militia_organization:"公民民兵组织建设"
 SAN_citizens_militia_organization_desc:"为了捍卫自由，每个人都有义务拿起武器。我们要建立一套基于志愿制度的国民警卫队，由退伍老兵与热血青年组成。这支部队将不仅仅是军事单位，更是公民精神的摇篮。我们要向世人证明，一个自由的国家在面对入侵时，将拥有最顽强的防御意志。武装的自由民。"
 
 SAN_social_welfare_expansion_action:"社会福利扩张行动"
 SAN_social_welfare_expansion_action_desc:"国家的繁荣必须惠及弱势群体。我们启动了全民医疗计划与义务教育改革，利用战后盈余在各岛修建诊所与学校。通过消除贫困与愚昧，我们要培养出一代具有批判性思维、独立人格与共和精神的新国民，他们将是自由稻妻永久的守护者。"
 
 SAN_pan_teyvat_diplomatic_outreach:"全提瓦特外交拓展"
 SAN_pan_teyvat_diplomatic_outreach_desc:"我们要与蒙德的西风骑士团及璃月的七星建立平等的伙伴关系。通过广泛的跨国贸易与文化交流，我们彻底打破了锁国令留下的孤立状态。海祇岛将以一个文明、开放、民主的新面貌，正式登上提瓦特的政治舞台，成为全球和平与贸易的坚定维护者。"
 
 SAN_constitution_of_sangonomiya_drafting:"珊瑚宫宪法草拟行动"
 SAN_constitution_of_sangonomiya_drafting_desc:"这是我们对未来的庄严承诺。心海大人将亲自监督宪法的起草，明确规定领袖的权力范围、公民的基本权利以及司法的独立性。这部宪法将成为照亮国家长远发展的灯塔，确保权力的运行始终在阳光下接受人民的监督。法治即民主。"
 
 SAN_democratic_industrial_modernization:"民主工业现代化"
 SAN_democratic_industrial_modernization_desc:"我们要利用民主体制带来的协作优势，推动工业的智能化与绿色化。通过建立多岛科研联盟，共享渊下宫与地表的研发成果。我们要发展高端精密制造业，让‘海祇制造’成为提瓦特高品质与先进技术的代名词，用工业的飞跃为民主成果提供坚实的物质支撑。"
 
 SAN_joint_island_defense_reforms:"诸岛联合防御改革"
 SAN_joint_island_defense_reforms_desc:"建立一套跨岛屿的民防指挥网，将各地的公民武装整合进现代化的国防体系。这种去中心化的防御理念，将使国家在面对大规模侵略时具有极强的生存力。我们要让每一个岛屿都成为自由的堡垒，让每一个公民都成为反抗暴政的坚实盾牌。防御即和平。"
 
 SAN_ultimate_republican_vision:"终极共和远景蓝图"
 SAN_ultimate_theocracy_implementation_desc:"所有的碎片已拼凑成完整的版图。我们正式宣告‘海祇联合共和国’的诞生。这不再是一个人的神国，而是数百万岛民共同的家园。我们怀揣着对未来的美好愿景，准备在一个和平、繁荣、民主的体制下，去迎接提瓦特新时代的每一个黎明。自由之海，波澜壮阔！"

 # --- 路线C：白夜远征军 (共产/革命) ---
 SAN_celestia_defiance_pact:"反抗天理圣约"
 SAN_celestia_defiance_pact_desc:"揭开伪秩序，血荐轩辕战高天，白夜意志坚。通过《日月前事》，我们认清了天空岛对提瓦特的虚伪统治。海祇岛将不再寻求苟安，我们要组建一支跨越生死、挑战神灵的革命军。哪怕对手是高高在上的执政，我们也要为了凡人的定义权，发动这场终极的解放战争。"
 
 SAN_export_revolutionary_ideals_action:"革命理想输出行动"
 SAN_export_revolutionary_ideals_action_desc:"反抗的火种不应只在海祇岛燃烧。我们要派遣革命导师前往提瓦特各国，联络那些被压迫的群体与失意武士。我们要向世界阐述：神权并非永恒，凡人的意志才是世界的真宰。通过思想的渗透与革命的策动，我们将建立一个全球性的反抗联盟。"
 
 SAN_dark_sea_expeditionary_strategy:"暗之外海远征战略"
 SAN_dark_sea_expeditionary_strategy_desc:"向禁忌的领域进发，寻找那些被遗弃的力量。我们要组建强大的远征军团，穿越致命的雷暴，探索提瓦特边缘的‘暗之外海’。我们要寻找大蛇远吕羽氏尊曾经获得珊瑚力量的地方，在那里建立革命的前哨站，攫取足以挑战神灵的原始资源。"
 
 SAN_celestial_order_disruption_plan:"天理秩序扰乱计划"
 SAN_celestial_order_disruption_plan_desc:"我们要利用渊下宫发现的古代电子干扰技术，尝试屏蔽天空岛对稻妻群岛的地脉监控。通过制造局部性的‘地脉噪音’，我们要让天理的眼睛变得模糊。这种对秩序的系统性破坏，将为我们接下来的革命爆发赢得宝贵的黑暗窗口期。混乱是我们的利刃。"
 
 SAN_radical_industrial_collectivization:"激进工业集体化"
 SAN_radical_industrial_collectivization_desc:"一切工厂归公社，所有成果归革命。我们要建立极高效率的集体化生产体系，取消所有的私人私产，将国民经济彻底转化为一个庞大的后勤中心。每一颗铆钉的拧入，都是为了那场挑战天空的终极战争而准备。在这种极端的动员下，我们将创造工业产出的奇迹。"
 
 SAN_vanguard_of_the_abyss_recruitment:"深渊先锋兵团招募"
 SAN_vanguard_of_the_abyss_recruitment_desc:"那些适应了海渊黑暗的地走官们，将成为革命的先锋。我们甚至招募了那些对现世不满的异类，将它们编入‘白夜突击队’。这些战士不畏惧深渊的侵蚀，不畏惧神灵的威压，他们是纯粹的意志化身，准备好在领袖的指引下，向天空投掷出毁灭性的长矛。"
 
 SAN_clandestine_abyssal_alliances:"深渊秘密结盟协议"
 SAN_clandestine_abyssal_alliances_desc:"敌人的敌人就是盟友。我们试图联络那些游走在阴影中的深渊教团分支，就共同对抗天空岛达成临时性的战略默契。虽然这无异于火中取栗，但为了撕碎那虚伪的苍穹，我们愿意与任何力量合作。黑暗，将成为我们颠覆光明秩序的同谋。"
 
 SAN_mobilize_the_under_dwellers_strategy:"地底住民总动员战略"
 SAN_mobilize_the_under_dwellers_strategy_desc:"让深居渊下宫的数万民众成为革命的中坚。我们要建立地底训练营，利用那些古代设施将平民转化为革命战士。渊下宫将不再仅仅是避难所，而是作为向地表喷发革命怒火的火山口。当地底的意志咆哮时，全世界都将颤抖。"
 
 SAN_total_ideological_war_prep:"全域意识形态战备"
 SAN_total_ideological_war_prep_desc:"这不仅是武力的决斗，更是灵魂的夺取。我们要建立一套严密的、基于反抗哲学的思想战线。让每一个国民都深信，挑战神灵是最高尚的宿命。这种精神上的极度狂热，将赋予国家一种近乎自毁的进攻性，任何理性或温和的阻碍都将被这股革命洪流彻底碾碎。"
 
 SAN_sky_throne_reconnaissance_action:"天之御座侦察行动"
 SAN_sky_throne_reconnaissance_action_desc:"利用白夜国失落的轨道观测技术，我们要尝试观测云层之上那座神秘的悬浮岛。通过收集高层大气的元素流动规律，我们要分析出天理防御体系的空隙。虽然高处不胜寒，但我们的目光早已刺穿了铁幕，锁定在那高高在上的神座之上。"
 
 SAN_final_assault_on_the_divine_arrangements:"神圣安排终极突击"
 SAN_final_assault_on_the_divine_arrangements_desc:"这是革命的高潮。所有的部队已在渊下宫的祭坛前集结，所有的导弹与高压水炮已锁定目标。我们要发动一场前所未有的海、空、潜、渊联合打击，目标直指那些试图操控凡人命运的、陈腐的神圣法则。我们要用烈火，去烧出一条通向真理的道路。"
 
 SAN_liberation_of_all_teyvat_strategic_vision:"全提瓦特解放战略愿景"
 SAN_liberation_of_all_teyvat_strategic_vision_desc:"白夜终将归，旧序崩颓灰烟里，万物复生晖。我们要让整个提瓦特重现第一王座时代的荣光。海祇岛将作为革命的灯塔，指引所有的国家废除执政统治，建立起凡人自治的联合政体。这不再是一个国家的胜利，而是全人类对命运枷锁的最后告别。新世界，已近在咫尺！"
























 # --- 第一阶段：揭旗起事 (1-30) ---
 SAN_the_resistance_begins:"反抗的开端"
 SAN_the_resistance_begins_desc:"现人神巫女珊瑚宫心海在海祇岛正式宣告：我们不再忍受幕府的眼狩令与沉重的赋税。为了民众的愿望与海祇的自由，反抗军的旗帜将在此刻升起，向稻妻幕府正式宣战，揭开内战的序幕。"
 SAN_mobilize_watatsumi_militia:"动员海祇民兵"
 SAN_mobilize_watatsumi_militia_desc:"望泷村的青年们已经拿起了长枪和鱼叉。虽然他们大多是农夫和渔民，但大御神的信仰给予了他们勇气。我们将组织起最基础的防御力量，保卫我们的家园不被勘定奉行的走狗践踏。"
 SAN_establish_sangonomiya_hq:"建立珊瑚宫大本营"
 SAN_establish_sangonomiya_hq_desc:"珊瑚宫不仅是信仰的中心，现在更要成为战争的指挥部。我们将在此整理兵法，调度粮草，统筹全岛的战略。心海大人的锦囊妙计将从这里传遍每一个战场，指引士卒走向胜利。"
 SAN_gorou_army_reforms:"五郎的军事改革"
 SAN_gorou_army_reforms_desc:"作为反抗军的大将，五郎提议建立更加严明的军纪和训练体系。我们要将零散的武士与民兵整合为高效的战斗序列，通过特有的阵法与协同作战，弥补我们在兵员素质上与幕府正规军的差距。"
 SAN_covert_courier_service:"秘密联络网计划"
 SAN_covert_courier_service_desc:"在幕府的封锁下，情报的传递至关重要。我们将建立一套由巫女和林间飞鸟构成的秘密联络体系，确保反抗军的指令能够穿过踏鞴砂的雷暴，精准地抵达每一位前线指挥官的手中。"
 SAN_strategic_pockets_doctrine:"锦囊妙计战略"
 SAN_strategic_pockets_doctrine_desc:"心海大人深入研究了历代先贤留下的兵法，并将其具象化为数百个预案锦囊。这种灵活多变的战术将使我们在局部战场上始终保持信息与策略优势，令死板的幕府军队疲于奔命。"
 SAN_vision_vanguard_action:"神之眼先锋行动"
 SAN_vision_vanguard_action_desc:"虽然眼狩令夺走了许多人的神之眼，但仍有无畏的愿望持有者加入了我们。我们将组建一支专门的精英小队，由这些掌握元素力量的战士带头冲锋，以此作为破开幕府军坚固防线的尖刀。"
 SAN_pearl_rationing_program:"珍珠配给计划"
 SAN_pearl_rationing_program_desc:"海祇岛盛产美丽的珍珠，但在战争时期，它将成为我们最重要的硬通货。我们将统一收归这些宝贵的资源，用于向海外商人换取急需的铁矿与药材，确保海祇岛的战争潜力不被枯竭。"
 SAN_naval_ambush_tactics:"海上伏击战术"
 SAN_naval_ambush_tactics_desc:"海祇岛周边的海域暗流涌动，这是我们天然的屏障。我们将训练士卒利用礁石与迷雾进行伏击，让幕府那些笨重的安宅船在踏入我们的领海时，就得付出血的代价，沉入无尽的深海之中。"
 SAN_shrine_maiden_volunteers:"巫女志愿者行动"
 SAN_shrine_maiden_volunteers_desc:"神社的巫女们不仅精通祭祀，更拥有一颗保家卫国的心。她们将深入前线提供战地医疗与士气鼓舞。大御神的颂歌将在战场上回荡，治愈伤者的病痛，并坚定每一位反抗军战士的内心。"
 SAN_recruitment_of_ronin:"收容流浪武士计划"
 SAN_recruitment_of_ronin_desc:"稻妻各地都有因不满眼狩令而流亡的武士。我们将向他们敞开大门，给予他们身份与尊严。虽然这些武士性格各异且难以管束，但他们的剑术将成为我们不可或缺的强大战力支持。"
 SAN_kokomi_art_of_war_study:"心海兵法研习"
 SAN_kokomi_art_of_war_study_desc:"心海大人闭关研读《兵法记录》，力求将白夜国的古老智慧与现代战争相结合。我们要完善行政管理的每一个细节，确保政府在战争的高压下依然能够保持极高的效率，为前线提供稳固的后盾。"
 SAN_wartime_taxation_arrangements:"战时税收安排"
 SAN_wartime_taxation_arrangements_desc:"尽管我们是为了反抗暴政而战，但战争的消耗是巨大的。我们需要在不伤害民生的前提下，通过更加科学的财务分配，确保每一枚摩拉都能用在刀刃上，支持反抗军度过最艰难的初期阶段。"
 SAN_resistance_fortification_plan:"反抗军加固计划"
 SAN_resistance_fortification_plan_desc:"我们必须在海祇岛的滩涂与峡谷之间修筑永久性的防御工事。这些碉堡将配备最先进的弩机，并利用当地的雷元素力场进行加固，哪怕是幕府的主力部队亲至，也将在这里寸步难行。"
 SAN_foreign_mercenary_outreach:"异国雇佣兵招募行动"
 SAN_foreign_mercenary_outreach_desc:"通过特殊的贸易渠道，我们尝试接触来自须弥或枫丹的冒险者与雇佣兵。只要能出得起价码，这些异国人的奇特装备与战斗经验将为我们的战场带来更多变数，打破传统战斗的僵局。"
 SAN_logistics_tunnel_project:"后勤隧道工程"
 SAN_logistics_tunnel_project_desc:"海祇岛的地形错综复杂，我们计划开凿一套贯穿全岛的地下后勤网络。这将使物资在受到空袭或炮击时依然能够安全转运，并为我们在极端情况下进行地道战和反包围提供可能。"
 SAN_vision_user_integration:"神之眼持有者整合计划"
 SAN_vision_user_integration_desc:"我们将正式建立神之眼部队的编制。通过系统的训练，让持有不同元素力的战士能够产生元素反应，将他们的战斗力提升到极致。这是凡人向神权发起的第一次真正有组织的挑战。"
 SAN_underground_intelligence_network:"地下情报网构建"
 SAN_underground_intelligence_network_desc:"在离岛和稻妻城，我们的密探已经悄然渗透。我们将利用当地的商会和酒馆，编织一张无形的情报巨网。幕府的一举一动都将在我们的监控之下，任何针对海祇的奇袭都将无所遁形。"
 SAN_coastline_patrol_strategy:"海岸线巡逻战略"
 SAN_coastline_patrol_strategy_desc:"我们不能仅仅被动等待敌人的到来。通过组建快速机动的巡逻艇部队，我们将对整个鸣神岛周边的水道进行持续骚扰。这种小规模、高频率的打击将让幕府的水军在出港前就感到身心俱疲。"
 SAN_village_council_empowerment:"村社委员会授权"
 SAN_village_council_empowerment_desc:"为了提高行政效率，我们赋予望泷村等村社更大的自治权。让基层民众参与到战争物资的收集与分配中来，这不仅能减轻中央负担，更能增强民众的归属感，将整个海祇岛拧成一股绳。"
 SAN_emergency_rice_storage_tactics:"紧急粮食储备战略"
 SAN_emergency_rice_storage_tactics_desc:"如果幕府实行长期的禁运，粮食将成为我们的死穴。我们要利用珊瑚宫的特殊仓库存储大量的应急稻米，并推广耐盐碱的改良作物，确保即便在最严酷的封锁下，我们的士卒也不会饿着肚子打仗。"
 SAN_signal_flag_protocol:"旗语通信方案"
 SAN_signal_flag_protocol_desc:"在雷元素干扰严重的地区，法术通信往往失效。我们将开发一套复杂的旗语与灯光信号系统，利用望楼进行远程传递。这套纯手工的系统虽然原始，但在战争中却是最可靠且无法被拦截的。"
 SAN_partisan_warfare_arrangements:"游击战争安排"
 SAN_partisan_warfare_arrangements_desc:"如果幕府占据了优势，我们将在八酝岛和神无冢的群山中开展游击战。通过化整为零的策略，利用地形优势打击幕府的后勤线，让他们意识到，每一寸海祇的土地下都埋藏着致命的陷阱。"
 SAN_scout_unit_reorganization:"侦察部队改编行动"
 SAN_scout_unit_reorganization_desc:"我们需要更专业的斥候来查明幕府军的虚实。这些精英侦察兵将接受严格的潜行与隐蔽训练，他们不仅要查探敌情，更要执行斩首行动和炸毁敌方重要仓库的任务，成为阴影中的幽灵。"
 SAN_naval_mine_laying_strategy:"海雷布设战略"
 SAN_naval_mine_laying_strategy_desc:"通过将雷元素晶块封装在密封的浮筒中，我们将制造出一批成本低廉但威力巨大的海雷。将它们布设在幕府水军的必经之路上，即便无法摧毁战舰，也能极大地限制幕府海军的机动性。"
 SAN_island_fortress_objective:"海岛要塞化目标"
 SAN_island_fortress_objective_desc:"海祇岛的每一座离岛都应该成为一个独立的作战支点。我们将这些孤岛要塞化，配备足够的淡水和弹药。这套防御链条将形成多层拦截网，让入侵者在到达珊瑚宫前就消耗掉所有的锐气。"
 SAN_heroic_propaganda_campaign:"英雄主义宣传行动"
 SAN_heroic_propaganda_campaign_desc:"我们需要塑造自己的战斗英雄。通过编撰在名椎滩等地勇猛杀敌的故事，我们将极大地振奋反抗军的士气。我们要让每一位士兵都相信，正义在我们这一边，而海祇大御神正注视着他们的英姿。"
 SAN_defense_line_coordination:"防线协同计划"
 SAN_defense_line_coordination_desc:"各处的岗哨和碉堡不能孤军奋战。我们将建立一套有组织的防御调度体系，确保一处受袭，多处支援。这种网状的防御结构将极大提升我们的抗压能力，让局部阵地的失守不再导致全局的崩溃。"
 SAN_black_market_supply_deal:"黑市物资交易安排"
 SAN_black_market_supply_deal_desc:"通过与离岛商会中的贪腐官员和黑市商人建立联系，我们尝试绕过幕府的官方管制，采购被禁止出口的玉钢和先进技术。虽然价格昂贵，但这是我们快速提升军事工业水平的一条捷径。"
 SAN_first_phase_offensive_prep:"第一阶段进攻准备"
 SAN_first_phase_offensive_prep_desc:"所有的防御和动员都是为了此刻。我们已经在海祇岛完成了力量的积蓄，所有的剑刃都已磨利。我们将跨越海峡，在神无冢插下反抗军的第一面旗帜，正式拉开反攻幕府的序幕。"

 # --- 第二阶段：内战烽火 (31-70) ---
 SAN_kannazuka_offensive_strategy:"神无冢进攻战略"
 SAN_kannazuka_offensive_strategy_desc:"神无冢是进入鸣神岛的门户，也是幕府最重要的前哨阵地。我们将集中全军之力，发起一场规模宏大的渡海登陆作战。目标是肃清九条阵屋的敌军，将战火烧到幕府的核心地带去。"
 SAN_seize_mikage_furnace_action:"夺取御影炉心行动"
 SAN_seize_mikage_furnace_action_desc:"御影炉心不仅是稻妻的工业心脏，更是祟神能量的聚集点。我们要将其纳入掌控，这不仅能瘫痪幕府的武器产出，更能为我们提供前所未有的能源供应，当然前提是我们要处理好随之而来的污染风险。"
 SAN_nazuchi_beach_deployment:"名椎滩部署行动"
 SAN_nazuchi_beach_deployment_desc:"在这片血染的浅滩上，我们要建立稳固的滩头阵地。利用残骸和暗礁构筑工事，确保后续源源不断的援军能够安全登陆。名椎滩将成为我们后续所有军事行动的后勤中转站与进攻跳板。"
 SAN_tatarasuna_reconstruction_plan:"踏鞴砂重建计划"
 SAN_tatarasuna_reconstruction_plan_desc:"在占领踏鞴砂后，我们必须尽快修复被战火损毁的设施。我们要雇佣那些流离失所的工匠，通过给予他们优厚的待遇，让他们为反抗军锻造更精良的铠甲与兵刃，将这里转化为我们的军事工业堡垒。"
 SAN_yashiori_island_pacification:"八酝岛平定战略"
 SAN_yashiori_island_pacification_desc:"八酝岛是大蛇骸骨所在之地，对我们具有极高的精神意义。我们要彻底肃清岛上的残留幕府军，并安抚当地饱受祟神折磨的难民，重新确立大御神在这一地区的崇高统治地位。"
 SAN_tatarigami_containment_project:"祟神封印治理工程"
 SAN_tatarigami_containment_project_desc:"奥罗巴斯的遗恨在八酝岛久久不散。我们要指派最高阶的巫女，联合异国学者，通过修复镇物和构建元素稳定力场，将狂乱的雷雨平息。只有治理好祟神，八酝岛才能真正成为支持我们的基地。"
 SAN_fontaine_engineering_outreach:"引进枫丹工程技术"
 SAN_fontaine_engineering_outreach_desc:"枫丹的机械技术在提瓦特首屈一指。通过与泽维尔等工程师的秘密合作，我们将把先进的压力传动和水利结构引入踏鞴砂的工厂，极大地提升我们的工业产值和装备精度，超越落后的传统锻造。"
 SAN_secret_liaison_with_kamisato:"与神里家的秘密联络"
 SAN_secret_liaison_with_kamisato_desc:"社奉行神里家一直以来对眼狩令持保留态度。我们要派遣特使与神里兄妹进行秘密会谈，通过共同的目标建立非正式的互助同盟。这将为我们提供幕府内部的高层机密，甚至可能分化天领奉行的盟友。"
 SAN_kazuha_vanguard_strategic_unit:"万叶特遣尖刀小队"
 SAN_kazuha_vanguard_strategic_unit_desc:"枫原万叶作为一心传的后人，其超凡的剑术和对气流的感知能力无人能及。我们将以他为核心，组建一支能够在战场上进行瞬时奇袭的特遣队，专门针对幕府军的指挥官和重要补给枢纽进行打击。"
 SAN_shumatsuban_collaboration_tactics:"终末番协同计划"
 SAN_shumatsuban_collaboration_tactics_desc:"利用与社奉行的联系，我们尝试在局部战场与终末番的忍者达成默契。这些神出鬼没的忍者将为我们提供幕后支援，包括暗杀、投毒和散布假消息，在不直接暴露身份的情况下极大地消耗敌人的耐心。"
 SAN_higi_village_relief_action:"绯木村救济安排"
 SAN_higi_village_relief_action_desc:"绯木村的村民在战争和祟神的影响下生活在水深火热之中。我们要指派最好的医疗官前往救治，并分配充足的粮食。通过仁义之举，我们要让全稻妻的子民看到，海祇反抗军是真正的正义之师。"
 SAN_ore_extraction_modernization:"矿石开采现代化"
 SAN_ore_extraction_modernization_desc:"蛇骨矿洞蕴含着丰富的晶化骨髓。我们将投入重型钻井设备和矿车，改进原始的挖掘方式。充足的矿产供应将确保我们的炼钢炉永不停歇，为反抗军提供源源不断的钢铁装备支撑。"
 SAN_musoujin_gorge_defensive_line:"无想刃狭间防御线"
 SAN_musoujin_gorge_defensive_line_desc:"这道横贯岛屿的裂谷是防守的天然屏障。我们要在两侧山崖部署长程弩炮和火力点，将狭间转化为敌人的坟墓。只要守住这里，我们就掌握了八酝岛的绝对控制权，让任何地面突击都化为泡影。"
 SAN_weapon_forging_standardization:"兵器锻造标准化计划"
 SAN_weapon_forging_standardization_desc:"我们要废除混乱的地方性兵器规格，统一实行反抗军标准。这种标准化不仅能极大提高生产效率，更能让前线的装备替换和弹药补给变得异常简单，确保任何缴获的物资都能立刻投入战斗。"
 SAN_recruit_yashiori_volunteers:"八酝岛志愿者招募"
 SAN_recruit_yashiori_volunteers_desc:"在被我们平定的土地上，许多热血青年渴望加入反抗军。我们将为他们提供基础的军事训练和思想教育，将他们编入战斗序列。这不仅补充了我们的战损，更将这些土地牢牢地与我们的命运绑在了一起。"
 SAN_mikage_furnace_overload_safety:"炉心过载防护工程"
 SAN_mikage_furnace_overload_safety_desc:"御影炉心的全负荷运转伴随着巨大的危险。我们要安装一套多重冷却系统和元素抑制装置，防止其发生像之前那样的灾难性爆炸。稳定的炉心才是工业发展的基石，我们决不能让力量反噬自身。"
 SAN_sabotage_tenryou_supply_lines:"破坏天领奉行补给线"
 SAN_sabotage_tenryou_supply_lines_desc:"幕府军依赖于从稻妻城出发的漫长供应链。我们要指派精干的小分队在山间小路设下陷阱，利用火药和落石切断他们的粮食和箭矢补给。饥饿和匮乏将比剑刃更能打击幕府军的意志。"
 SAN_kujou_encampment_siege_plan:"围困九条阵屋计划"
 SAN_kujou_encampment_siege_plan_desc:"九条阵屋是敌人的核心要塞。我们不采取强攻，而是通过封锁其周边的水源和逃生路线进行长期围困。我们要围点打援，利用幕府急于解围的心理，在沿途消灭他们的生力军，最终迫使要塞守军投降。"
 SAN_wartime_propaganda_expansion:"战时政治宣传扩张"
 SAN_wartime_propaganda_expansion_desc:"我们要将“反抗眼狩令、追求愿望自由”的理念传播到稻妻的每一个角落。通过散发传单和在公共场所宣讲，我们要唤醒鸣神子民内心的斗志，让敌人的后方燃起反抗的火种，瓦解幕府统治的根基。"
 SAN_centralized_command_structure:"中央指挥体系改革"
 SAN_centralized_command_structure_desc:"随着领土的扩大，分散的指挥已经无法适应复杂的形式。我们要建立一个直属于心海大人的战略协调室，统筹陆海军的协同作战。高效的中央集权指挥将使我们能够像操作手臂一样灵活地运用全军。"
 SAN_resource_stockpiling_strategy:"战略物资储备行动"
 SAN_resource_stockpiling_strategy_desc:"我们要动用一切手段囤积燃料、钢材和晶化骨髓。即便现在的供应还算充足，我们也必须为未来可能的总决战做准备。一个深厚的资源库将使我们在长期拉锯战中拥有比幕府更持久的韧性。"
 SAN_amendment_of_the_code_of_conduct:"军人行为准则修订"
 SAN_amendment_of_the_code_of_conduct_desc:"我们要制定最严格的军纪，严禁抢掠民财或虐待俘虏。反抗军必须是民众的守护者，而非新的压迫者。良好的名声是我们最强大的外交武器，将吸引更多中间派势力站到我们这一边。"
 SAN_watatsumi_trade_routes_protection:"海祇贸易航线保卫战"
 SAN_watatsumi_trade_routes_protection_desc:"幕府的海军正试图封锁我们与外界的联系。我们要派遣护航舰队，巡视与璃月、须弥之间的航道。我们要确保商船能够安全抵港，带回急需的物资和技术，打破幕府企图困死我们的幻梦。"
 SAN_joint_staff_military_academy:"联合参谋军事学院"
 SAN_joint_staff_military_academy_desc:"战争不能只靠热血，更要靠头脑。我们要建立专门的军事学院，培养具备战略眼光的初级军官。通过学习古今中外的战例，这些军官将成为反抗军的脊梁，确保我们的战术始终走在时代的前沿。"
 SAN_industrial_migration_plan:"军事工业迁移安排"
 SAN_industrial_migration_plan_desc:"为了防备幕府可能的反扑和空袭，我们要将关键的武器加工厂分散迁移到隐蔽的山洞或地下设施中。这种去中心化的布局将使我们的军事工业在任何打击下都能保持运作，实现生产能力的永不间断。"
 SAN_advanced_reconnaissance_missions:"深度侦察行动安排"
 SAN_advanced_reconnaissance_missions_desc:"我们要派人穿过雷暴，潜入稻妻城深处查明幕府的新式武器研发进度。我们要获取关于“魔偶剑鬼”等量产型战争机器的详细数据。知己知彼百战不殆，这种高风险的渗透是反攻天守阁的必要前提。"
 SAN_frontline_medical_support_reform:"前线医疗支持改革"
 SAN_frontline_medical_support_reform_desc:"每一位反抗军战士的生命都是宝贵的。我们要推行模块化的战地医院标准，配备充足的急救药物和元素理疗设备。大幅降低因伤致残率将直接提升我们的战斗力和士气，让战士们在冲锋时再无后顾之忧。"
 SAN_watatsumi_naval_shipyard_expansion:"海祇海军船坞扩建"
 SAN_watatsumi_naval_shipyard_expansion_desc:"为了争夺制海权，我们需要更强大的战舰。我们将利用海祇岛的特殊木材与踏鞴砂的钢材结合，扩建大型干船坞。我们要建造能够搭载更多弩炮和元素发生器的快速巡防舰，打造一支属于海祇的无敌舰队。"
 SAN_strategic_reserve_mobilization:"战略预备队动员方案"
 SAN_strategic_reserve_mobilization_desc:"除了前线部队，我们还需要一支训练有素的预备队随时准备填补缺口。我们将动员那些已经退伍的武士和有潜力的青年进行封闭式训练，这支生力军将在决战的关键时刻投入战场，成为压死敌人的最后一根稻草。"
 SAN_shrine_defence_coordination:"神社联合防卫计划"
 SAN_shrine_defence_coordination_desc:"全岛的神社要形成一个覆盖性的防御网络。我们要训练巫女们掌握基础的防御法术，并与驻军达成协同。当外敌入侵时，神社的结界将与守军的坚甲相互配合，构成坚不可摧的立体防御体系。"
 SAN_logistical_efficiency_overhaul:"后勤效率全面优化"
 SAN_logistical_efficiency_overhaul_desc:"我们要利用心海大人的精算能力，重新梳理后勤转运流程。每一斤粮食、每一支箭矢的流动都要有详尽的记录和优化方案。减少中间环节的损耗，将使我们在同等资源下能支持更多部队作战。"
 SAN_maritime_patrol_fleet_setup:"海上巡逻编队组建"
 SAN_maritime_patrol_fleet_setup_desc:"我们要建立常态化的海上警戒体系。这些由快速帆船组成的编队将分区域负责领海的安全，及时发现并驱逐幕府的渗透分队。领海的安全是贸易和补给的前提，决不能有半分马虎。"
 SAN_elite_warrior_training_reforms:"精锐武士训练改革"
 SAN_elite_warrior_training_reforms_desc:"我们要从全军中选拔最优秀的战士，进行地狱式的封闭训练。重点培养他们在极端环境下的生存能力和独立作战能力。这支精锐将作为特种部队，执行最高难度的任务，成为反抗军中的战神。"
 SAN_synthetic_material_research_action:"合成材料研发行动"
 SAN_synthetic_material_research_action_desc:"由于资源的匮乏，我们需要开发新型的复合材料。利用海祇岛特有的珊瑚粉末与矿渣混合，研发出硬度更高、重量更轻的新型装甲材料。这种技术革新将使我们的士兵在机动性与防护力上取得双重优势。"
 SAN_national_conscription_arrangements:"全民征兵动员安排"
 SAN_national_conscription_arrangements_desc:"战争已经进入白热化，我们必须号召所有的海祇子民贡献力量。我们将实行有秩序的普选制征兵，确保兵源充足的同时，也不过分损害农业和生产。这是为了生存而发起的最终动员，每一个海祇人都责无旁贷。"
 SAN_heavy_artillery_deployment_plan:"重型火炮部署计划"
 SAN_heavy_artillery_deployment_plan_desc:"我们需要能够击碎幕府军重甲和城墙的力量。我们将投入巨资研发基于雷元素能级激发的重型大炮，并将其部署在关键高地和战舰上。这种毁天灭地的火力将从远距离摧毁敌人的意志，彻底改变战争的形式。"
 SAN_experimental_aircraft_prototype_plan:"实验性航空器原型计划"
 SAN_experimental_aircraft_prototype_plan_desc:"通过研究风之翼和机关术，我们尝试开发一种能够载人的简易飞行器。这将使反抗军获得梦寐以求的空中视野，甚至能跨越雷暴进行空中突袭。即便只是最初的原型，也将开启我们走向天空的第一步。"
 SAN_total_war_industrial_focus:"总体战工业重心转移"
 SAN_total_war_industrial_focus_desc:"我们要将全境所有的工厂转型为军用生产。停止一切奢侈品和不必要民用品的制造。所有的钢铁都要变成利刃，所有的能源都要化作火炮。在取得最终胜利之前，整个海祇文明将成为一部高效运转的战争机器。"
 SAN_narukami_infiltration_strategy:"鸣神岛渗透潜伏战略"
 SAN_narukami_infiltration_strategy_desc:"在总攻发起之前，我们要派遣大量的潜伏人员进入鸣神岛。他们将混入难民和商人中，搜集稻妻城的街道情报，标记军事防御的死角。这些情报将在我们攻入稻妻城的那一刻，成为指引胜利的灯塔。"
 SAN_tenshukaku_offensive_arrangements:"攻入天守阁战役安排"
 SAN_tenshukaku_offensive_arrangements_desc:"终局之战即将到来。我们要制定一份详尽到分钟的作战计划，联合所有的正面部队和潜伏人员，对天守阁发起总攻。我们要彻底终结眼狩令，迫使雷电将军废除暴政，还稻妻众生一个真正永恒的清平盛世。"

 # --- 第三阶段：平定旧域 (71-110) ---
 SAN_seirai_island_expedition_strategy:"清籁岛远征战略"
 SAN_seirai_island_expedition_strategy_desc:"清籁岛由于浅濑响引发的雷暴，长期处于法外之地，成为了海盗的乐园。为了海祇的安全与资源的获取，我们必须指派一支精锐远征军南下，清缴那里的贼寇，将这座雷暴笼罩的岛屿纳入版图。"
 SAN_unseal_amakumo_thunder_plan:"解开天云峠雷暴计划"
 SAN_unseal_amakumo_thunder_plan_desc:"天云峠的雷暴是数百年前封印被破坏的产物。我们要指派心海大人亲自设计的封印小组，通过重新调整镇石的方位，将狂乱的雷电引入地下能源网。这将使清籁岛重新变得宜居，并为我们提供无尽的能源。"
 SAN_koseki_village_rehabilitation:"越石村重建行动"
 SAN_koseki_village_rehabilitation_desc:"越石村曾是清籁岛最繁华的聚集地。我们要清理废墟中的杂物，安抚那些被海盗劫掠后的幸存者，并资助他们重建房屋。通过恢复基础的农业与渔业，我们要让清籁岛再次燃起代表文明的炊烟。"
 SAN_ako_domeki_legacy_investigation:"赤穗百目鬼遗产调查"
 SAN_ako_domeki_legacy_investigation_desc:"传说中，赤穗百目鬼在清籁岛留下了惊人的财富与先进的造船图纸。我们要派出专业的考古队伍，在岛上的岩洞中寻找这些遗落的宝藏。这些遗产将极大提升反抗军海军的作战效能，让我们获得远洋作战的能力。"
 SAN_seirai_maru_salvage_operation:"清籁丸打捞修复作业"
 SAN_seirai_maru_salvage_operation_desc:"那艘搁浅在海滩上的巨型安宅船“清籁丸”是百目鬼曾经的旗舰。我们要动用重型起重设备将其残骸重新修整，利用现代的钢铁技术加固其结构。这艘重生的战舰将成为反抗军新的海上主宰，威慑整个稻妻海域。"
 SAN_thunder_manifestation_study:"雷音权现能量研究"
 SAN_thunder_manifestation_study_desc:"雷音权现是纯粹忿恨与电能的结合体。我们要派遣勇敢的学者在安全距离内观测它的能量流动，并尝试收集其散发的雷元素微粒。这种研究将使我们的能量武器获得质的飞跃，开发出比幕府更加恐怖的雷电打击手段。"
 SAN_asase_shrine_restoration_plan:"浅濑神社修缮计划"
 SAN_asase_shrine_restoration_plan_desc:"浅濑神社是封印雷鸟的核心点。我们要重新修缮那破损的神龛，并派遣忠诚的巫女前去常驻。通过定期的祭祀与维护，我们要确保封印的长期稳定，防止雷暴再次卷土重来，危害周边的航道与村庄。"
 SAN_storm_rider_training_action:"风暴骑兵训练行动"
 SAN_storm_rider_training_action_desc:"利用清籁岛恶劣的天候，我们要训练出一支能够在极端雷暴环境下作战的特殊兵种。这些战士配备绝缘铠甲与导电长矛，在敌人的视野死角里发起突击。当风暴来临时，他们就是最恐怖的索命幽灵。"
 SAN_seirai_naval_fortress_strategy:"清籁岛海军要塞战略"
 SAN_seirai_naval_fortress_strategy_desc:"清籁岛的地理位置非常适合建立前哨站。我们要利用岛上的悬崖峭壁，布设大量的远程监视雷达和重型弩炮。这座不沉的海上要塞将作为我们控制南部海域的锁链，让任何未经授权的船只都无法通行。"
 SAN_amakumo_energy_harnessing_plan:"天云能量利用计划"
 SAN_amakumo_energy_harnessing_plan_desc:"我们要建立一座宏大的能量采集塔，直接从天云峠的高空雷云中汲取电能。这股力量将通过地下缆线传输到全境。有了这种近乎无限的电力支持，我们的工厂效率将提升数倍，引领海祇进入全新的电气化时代。"
 SAN_tsurumi_island_reconnaissance_plan:"鹤观岛深度侦察计划"
 SAN_tsurumi_island_reconnaissance_plan_desc:"在那片长年被迷雾笼罩的神秘之岛，潜伏着未知的危险。我们要派遣经验最丰富的斥候，携带特制的导向灯具潜入。我们要查明鹤观岛的地形、资源分布以及传闻中消失的远古文明，为最终的登陆做好万全准备。"
 SAN_dispel_fog_over_tsurumi_action:"驱散鹤观迷雾行动"
 SAN_dispel_fog_over_tsurumi_action_desc:"鹤观的迷雾是地脉异常的产物。我们要利用从渊下宫获得的知识，构建一套大型的地脉稳定器，将这些干扰视线的浓雾驱散。只有阳光重新照耀这片土地，我们才能进行有规模的资源开发与领土治理。"
 SAN_save_ruu_soul_strategic_action:"少年阿瑠灵魂救赎计划"
 SAN_save_ruu_soul_strategic_action_desc:"那个在迷雾中徘徊了数千年的少年阿瑠，他的悲歌是大鸟卡帕奇莉狂暴的根源。心海大人决定发动一场特殊的法事，用鲸歌安抚阿瑠的灵魂，并引导他走向真正的安息。这一义举将彻底平息鹤观岛积累的怨念。"
 SAN_kapatcir_restless_energy_containment:"雷鸟残余能量收容方案"
 SAN_kapatcir_restless_energy_containment_desc:"雷鸟死后的能量依然在鹤观徘徊。我们要建立一套特殊的容器，将其狂暴的电荷捕获并转化为可控的驱动力。这股古老的力量将为我们的尖端武器提供动力，让海祇的科技水平在传承中获得爆发式的增长。"
 SAN_moshiri_ritual_site_reform:"茂知祭场体制改革"
 SAN_moshiri_ritual_site_reform_desc:"鹤观古老的血祭体制必须被彻底废除。我们要推行基于大御神信仰的科学治理观，将原本阴森的祭场改造成研究中心与教育基地。我们要让鹤观的后裔明白，未来是靠双手创造的，而非靠祈求残暴的神灵怜悯。"
 SAN_mt_kanna_mining_exploration:"菅名山矿产开发探索"
 SAN_mt_kanna_mining_exploration_desc:"菅名山脉蕴藏着只有在迷雾中才能生成的珍稀矿石。我们将投入重型挖掘设备，在保护生态的前提下进行小规模高效率的开采。这些珍贵的材料将用于制造高精度的电子元件和航空器的核心部件。"
 SAN_shirakoro_peak_observation_post:"知比山高空观测站"
 SAN_shirakoro_peak_observation_post_desc:"知比山的高度足以俯瞰大半个稻妻。我们要在此建立一座现代化的综合观测站，配备大倍率的望远镜与气象雷达。这将极大地增强我们的预警能力，让任何大范围的敌军动向都在我们的掌控之中。"
 SAN_riftstalker_containment_tactics:"兽境猎犬对抗战术"
 SAN_riftstalker_containment_tactics_desc:"鹤观岛滋生了大量侵蚀性的兽境猎犬。我们要研发专门的干扰器，利用特定的声波和元素频率削弱这些虚空怪物的侵蚀能力。我们要训练士兵如何有效地猎杀这些危险生物，确保鹤观的土地彻底回归平安。"
 SAN_ancient_civilization_study_action:"鹤观古文明考古行动"
 SAN_ancient_civilization_study_action_desc:"鹤观壁画中记载了关于“三月女神”与“天空使者”的隐秘信息。我们要组织一支跨学科的专家团队，对遗址进行抢救性发掘。这些来自葬火之战以前的知识将为我们揭开提瓦特的历史真相提供关键的线索。"
 SAN_tsurumi_coastal_radar_setup:"鹤观岛海岸雷达网"
 SAN_tsurumi_coastal_radar_setup_desc:"为了防止幕府从最南端进行包抄，我们要建立一套完善的海岸防卫雷达网络。通过这种跨视距的探测手段，我们可以监控从暗之外海进入稻妻的一切动向，确保海祇的南大门万无一失。"
 SAN_shirne_maiden_of_outer_islands:"外岛巫女巡回计划"
 SAN_shirne_maiden_of_outer_islands_desc:"为了强化领土的文化认同，我们要指派海祇岛的巫女前往清籁和鹤观巡回。她们将传播现人神巫女的仁义之道，并协助当地建立基础的卫生与教育体系，让新领地的子民感受到身为海民的骄傲与自豪。"
 SAN_veteran_resettlement_program:"老兵外岛安置计划"
 SAN_veteran_resettlement_program_desc:"我们将鼓励那些在内战中负伤或成家的战士迁移到清籁和鹤观。我们会拨给他们土地和种子，并建立退伍军人互助会。这些忠诚的战士将成为新领土的基层支柱，确保边境地区的绝对稳定。"
 SAN_fortress_network_expansion:"要塞网络全境扩张"
 SAN_fortress_network_expansion_desc:"我们要将防御工事的建设推广到每一座受控的岛屿。建立一套互联互通的要塞系统，配备快速反应的无线电装置。一旦发生战事，周边的岛屿要塞将迅速形成联动，让任何侵略者陷入十面埋伏的死局。"
 SAN_islands_economic_integration:"诸岛经济一体化方案"
 SAN_islands_economic_integration_desc:"我们要打破岛屿间的贸易壁垒，建立统一的大海祇市场。清籁的能源、鹤观的珍矿与海祇的珍珠将通过我们的商队实现高效交换。这种互补性的经济结构将极大增强我们的抗压能力，带动全境的繁荣。"
 SAN_outer_defence_command_reforms:"外围防区指挥部改革"
 SAN_outer_defence_command_reforms_desc:"为了更好地管理分散的领地，我们要建立“南部防区指挥部”。赋予前线指挥官更大的战术决策权，让他们能够根据突发状况即时做出反应。这种去中心化与集中领导相结合的体制将使我们的边防更加坚韧。"
 SAN_maritime_trade_monopoly_strategy:"海上贸易垄断战略"
 SAN_maritime_trade_monopoly_strategy_desc:"随着南部岛屿的稳固，我们现在有能力控制通过稻妻南部的大部分航线。我们要建立海祇专营贸易区，对往来商船提供有偿保护。这种海上霸权的初步建立将为我们带来源源不断的摩拉与外交筹码。"
 SAN_naval_aviation_training_action:"海军航空兵训练行动"
 SAN_naval_aviation_training_action_desc:"结合清籁岛的空中实验数据，我们要正式编组海军航空兵大队。这些装备了元素动力引擎的飞行器将从岛屿基地和航母残骸中起飞，执行远程侦察与精确轰炸任务，让海祇的意志延伸到肉眼不可见的海平线之外。"
 SAN_island_logistics_hub_plan:"离岛后勤枢纽计划"
 SAN_island_logistics_hub_plan_desc:"我们要将其中一座离岛改造成全自动化的大型后勤中转枢纽。利用从外邦引进的传送带技术和库存管理算法，将物资的周转效率提升到极致。这将确保在面对总决战时，我们的补给能够像血液一样永不停歇地流向全身。"
 SAN_regional_administrative_offices:"区域行政官署建设"
 SAN_regional_administrative_offices_desc:"要在清籁和鹤观建立常设的政府分支机构。选拔正直廉洁的官员进行管理，负责户籍登记、税务征收和民事调解。稳固的行政统治是将这些土地转化为战争潜力的前提，我们要实现对每一寸领土的有效掌控。"
 SAN_pan_island_defense_pact_action:"诸岛联合防务协定"
 SAN_pan_island_defense_pact_action_desc:"我们要组织所有受控岛屿的村社代表，共同签署一份防御协定。在遭受攻击时实现全民皆兵，建立跨岛屿的民兵支援网络。这种植根于民众的防线将是任何正规军都无法彻底攻克的噩梦。"
 SAN_tsurumi_resource_processing_hub:"鹤观资源加工中心"
 SAN_tsurumi_resource_processing_hub_desc:"与其将原矿运回，不如在产地进行加工。我们要利用鹤观的空旷地形建立大规模的冶炼与粗加工工厂。这些工厂将通过我们的南部铁路网与各港口连接，将鹤观打造成反抗军最重要的原材料产地与重工业基地。"
 SAN_ritual_stone_energy_research:"仪式石刻能量研究"
 SAN_ritual_stone_energy_research_desc:"鹤观岛上的古老石根文字蕴含着一种奇特的共振能量。我们要组织顶尖的纹章学家与元素物理学家共同破解其中的秘密。这种古老的增幅技术将被应用于我们的通讯设备中，极大增强信号在极端元素干扰下的穿透能力。"
 SAN_seirai_storm_prediction_center:"清籁气象风暴预测中心"
 SAN_seirai_storm_prediction_center_desc:"清籁岛变幻莫测的雷暴其实具有一定的周期性。我们要建立一座高精度的预测中心，通过长期观测建立数学模型，精准预报风暴的来袭。这将使我们的海军能够利用风暴作为掩护，在敌军措手不及时发起致命一击。"
 SAN_ako_pirate_fleet_integration:"赤穗海盗余部整合计划"
 SAN_ako_pirate_fleet_integration_desc:"虽然大部已经散去，但清籁岛依然有许多百目鬼的追随者。我们要通过大义名分和赦免令，将这些老练的海员整合进反抗军海军。他们的航海经验和野性斗志将为我们死板的正规海军注入一股不可预测的战斗灵魂。"
 SAN_koseki_village_fishing_standardization:"越石村渔业标准化计划"
 SAN_koseki_village_fishing_standardization_desc:"渔业是外岛的重要产出。我们要推广更高效的拖网技术和冷库保存技术，建立越石村大型远洋渔队。这些产出的海产品将不仅丰富民众的餐桌，更能作为战略军粮发往前线，减少对稻米产区的依赖。"
 SAN_amakumo_peak_scientific_base:"天云峠峰顶科研站"
 SAN_amakumo_peak_scientific_base_desc:"要在天云峠最高处建立一座多功能的实验室。这里的雷元素浓度冠绝全境，是测试高能实验与雷元素反应理论的绝佳场所。我们的大量前沿武器技术与能源传输理论都将在这里诞生，开启海祇的科学繁荣之路。"
 SAN_storm_shield_technology_plan:"风暴护盾技术计划"
 SAN_storm_shield_technology_plan_desc:"我们要研发一种基于雷元素排斥原理的大型电磁护盾。这种装置将被安装在关键建筑和重型战舰上，能够有效地拦截敌人的炮弹与法术攻击。有了这层守护，我们的防御体系将变得毫无死角，让敌人绝望。"
 SAN_outer_islands_customs_union:"外岛关税同盟安排"
 SAN_outer_islands_customs_union_desc:"我们要建立一套跨岛屿的关税优惠制度，鼓励诸岛之间的自由贸易。这不仅能促进经济的活跃，更能通过紧密的商业纽带将各岛民众的利益牢牢绑定在一起，形成一个不可分割的政治经济共同体。"
 SAN_watatsumi_maritime_supremacy_plan:"海祇海上霸权计划"
 SAN_watatsumi_maritime_supremacy_plan_desc:"所有的海上扩张都指向一个目标：建立由海祇岛主导的海上秩序。我们要巡航整个暗之外海边缘，打击海盗，保护贸易。我们要让提瓦特的航海者们都知道，在这片海域，海祇的旗帜才是唯一受尊重的法则。"
 SAN_outer_expeditionary_corps_setup:"外围远征军团编制"
 SAN_outer_expeditionary_corps_setup_desc:"我们要正式编组“外围远征军团”，专门负责离岛地区的防御与扩张。这支军团将拥有独立的指挥权和完善的跨海补给链，能够快速机动到任何受威胁的岛屿。他们将成为海祇向外延伸的最强之矛。"

 # --- 第四阶段：白夜遗产 (111-140) ---
 SAN_enkanomiya_exploration_project:111 "渊下宫探索工程"
 SAN_enkanomiya_exploration_project_desc:111 "月浴之渊下隐藏着我们祖先的起源之地。心海大人决定重启对渊下宫的大规模探索。我们要指派全境最优秀的探险家与护卫队潜入深渊，解开那些被尘封了数千年的秘密，寻找能让海祇岛再次崛起的终极力量。"
 SAN_search_for_before_sun_and_moon_action:112 "寻找《日月前事》行动"
 SAN_search_for_before_sun_and_moon_action_desc:112 "这本禁书隐藏着关于世界起源与天理谎言的真相。我们要组织专门的考古小组，在渊下宫的废墟中搜寻任何关于它的蛛丝马迹。哪怕这是一场对抗命运的赌博，我们也必须查明真相，因为只有真相才能给我们真正的自由。"
 SAN_dainichi_mikoshi_reactivation_plan:113 "大日御舆重启计划"
 SAN_dainichi_mikoshi_reactivation_plan_desc:113 "阿倍良久留下的地下太阳已经熄灭太久。我们要修复那些受损的能源节点，注入高密度的元素能量，让大日御舆再次放射出普照深渊的光辉。这将不仅驱散黑暗中的龙蜥，更能为我们的全境提供源源不断的古代核心动力。"
 SAN_jizhashi_training_reforms:114 "地走官训练体制改革"
 SAN_jizhashi_training_reforms_desc:114 "我们要复兴渊下宫古老的精英战士选拔制度。通过严酷的体能挑战与战术磨练，培养出一批不仅精通剑术，更能利用深渊特殊环境作战的“地走官”。这支部队将作为心海大人的禁卫军，执行最隐秘的安保任务。"
 SAN_vishap_containment_measures:115 "深海龙蜥管控措施"
 SAN_vishap_containment_measures_desc:115 "深海龙蜥是渊下宫最危险的原生生物。我们要研发特殊的元素诱饵和捕捉网，将它们的活动范围限制在无人区。甚至在极端情况下，我们要尝试通过基因选择与训练，将这些强大的古生物转化为我们的战兽，随军作战。"
 SAN_evernight_temple_archeology:116 "常夜灵庙考古行动"
 SAN_evernight_temple_archeology_desc:116 "灵庙中埋葬着白夜国的历代贤者。我们要小心地开启那些受封印的墓穴，整理其中的陪葬文献。这不仅是对祖先的致敬，更能让我们获得大量失传的古代法术与机械构造图纸，极大填补我们科技树上的空白。"
 SAN_serpents_heart_ritual_study:117 "蛇心之地仪式研究"
 SAN_serpents_heart_ritual_study_desc:117 "蛇心祭坛拥有跨越空间与维度的神奇力量。我们要组织高级祭司研究那些复杂的仪式序列，尝试建立稳定的空间传输点。这种技术一旦成熟，将使我们的部队实现瞬时的跨岛屿部署，将战争的机动性提升到神话级别。"
 SAN_abyss_technology_integration:118 "深渊科技整合战略"
 SAN_abyss_technology_integration_desc:118 "渊下宫的科技充满了对世界本质的独特见解。我们要将那些不依赖神之眼的能源接口与我们的现代武器相结合。这种“深渊工业化”将让海祇岛走上一条完全独立于七神体系的技术道路，实现前所未有的军事革新。"
 SAN_enkanomiya_industrial_complex:119 "渊下宫工业复合体"
 SAN_enkanomiya_industrial_complex_desc:119 "我们要利用深渊中不受地面干扰的环境，建立大规模的地下工厂。这里不受气象影响，也无法被任何敌军侦察。这座隐秘的工业巨兽将成为我们的战略底牌，哪怕地表遭遇毁灭打击，我们的反击力量也将在此长存。"
 SAN_ancient_vessel_restoration:120 "古老舰船修复计划"
 SAN_ancient_vessel_restoration_desc:120 "在渊下宫的干涸港口中，停泊着一些使用了古代推进装置的神秘舰船。我们要动用所有的机械专家将其重新激活。这些能够潜入水下甚至穿越暗流的战舰，将使我们的海军获得全维度的制海权，在深海之中给予敌人致命一击。"
 SAN_chronos_ZZ_worship_integration:121 "时间之执政崇拜融合"
 SAN_chronos_ZZ_worship_integration_desc:121 "常世大神伊斯塔露曾是白夜民唯一的救赎。我们要将这种古老的信仰与大御神教义相融合。通过弘扬“时间流转、永恒不灭”的理念，我们将极大增强民众面对漫长战争的耐心与定力，建立稳固的民族核心凝聚力。"
 SAN_forbidden_history_dissemination:122 "禁忌历史有组织传播"
 SAN_forbidden_history_dissemination_desc:122 "我们要小心地将渊下宫发现的历史真相传递给中层将领与知识分子。我们要让他们意识到，现有的世界秩序是建立在谎言之上的。这种认知上的觉醒将使我们的斗争获得更高的正义性，激发他们彻底粉碎旧世界的决绝之心。"
 SAN_byakuya_military_standardization:123 "白夜军事规格标准化"
 SAN_byakuya_military_standardization_desc:123 "我们要将白夜国的各种复杂武器接口与反抗军的现役装备进行统一适配。建立一套兼容古代符文与现代机械的混用标准。这将极大方便我们在战场上大规模列装古代遗物仿制品，实现军队武装力量的代差式领先。"
 SAN_hydro_elemental_weaponry_plan:124 "水元素增强武器计划"
 SAN_hydro_elemental_weaponry_plan_desc:124 "作为海之民，我们要将对水元素的掌控发挥到极致。研发能够大规模操纵水体形态与温度的重型能量炮。这些武器将在海战中制造出毁灭性的漩涡与海啸，让任何敢于挑战海祇海军的舰队都被汪洋大海彻底吞没。"
 SAN_abyssal_intelligence_gathering:125 "深渊情报收集网建设"
 SAN_abyssal_intelligence_gathering_desc:125 "渊下宫的地脉与提瓦特全局相连。我们要建立一套地脉监听站，通过感应元素波动的微小变化，预判全球范围内的地缘政治剧变和军事动向。这种超视距的情报优势将使我们始终掌握博弈的主动权。"
 SAN_dainichi_energy_grid_expansion:126 "大日能源网格扩张"
 SAN_dainichi_energy_grid_expansion_desc:126 "我们要以大日御舆为中心，建立一套覆盖全渊下宫并延伸至海祇岛的远距离能量传输系统。这种清洁且高效的能量网将使我们的每一个要塞都拥有永不枯竭的动力，支持最高能耗的防御设施持续运作。"
 SAN_subterranean_bunker_network:127 "地底掩体防御网络"
 SAN_subterranean_bunker_network_desc:127 "我们要利用渊下宫厚实的岩层，建设足以抵御天理惩戒（如寒天之钉）强度的避难所与指挥所。这种极端的生存主义建设将确保海祇文明的种子在任何大灾变中都能延续，是我们对终极战争做出的终极准备。"
 SAN_enkanomiya_civilian_resettlement:128 "渊下宫平民迁回计划"
 SAN_enkanomiya_civilian_resettlement_desc:128 "随着环境的改善，我们鼓励部分有勇气的海民迁回祖先的土地居住。我们要通过给予房产和补贴，建立新的生活社区。这种领土的重新开发将极大扩展我们的战略纵深，在深渊中建立一个繁荣的海下第二家园。"
 SAN_ancient_archives_decryption_action:129 "古代档案馆破译行动"
 SAN_ancient_archives_decryption_action_desc:129 "我们要指派最顶尖的语言学家破译那些被遗忘的白夜国卷宗。我们要从中挖掘关于“第一王座”与“龙种时代”的科学理论。这些知识将重塑我们的世界观，并为我们开发出超越目前认知的超级技术奠定坚实的理论基础。"
 SAN_watatsumi_enkanomiya_united_front:130 "海祇-渊下联合战线"
 SAN_watatsumi_enkanomiya_united_front_desc:130 "我们要建立一个跨越水面的统一政治体。海祇岛作为对外的外交与军事窗口，渊下宫作为对内的生产与科研核心。这种“表里结合”的国家架构将使我们具备极强的适应性与防御力，成为提瓦特最难以捉摸的强权。"
 SAN_abyssal_resource_monopoly_plan:131 "深渊特种资源垄断"
 SAN_abyssal_resource_monopoly_plan_desc:131 "渊下宫出产的龙骨花凝珠等特产具有极高的医学与工业价值。我们要建立垄断性的开采与贸易制度，将其出口价格控制在手中。通过这种战略物资的输出，我们可以干预外邦的经济，甚至在无声无息中影响他国的政局。"
 SAN_experimental_underwater_armor_action:132 "实验性深海重甲行动"
 SAN_experimental_underwater_armor_action_desc:132 "我们要研发一种基于深海抗压技术的新型动力装甲。这种装甲能让普通的士兵在深水区自由活动并进行高强度作战。这支“深海步兵”将能出其不意地从任何海岸线下方发起登陆攻击，让敌人的海岸防御沦为摆设。"
 SAN_white_night_doctrine_development:133 "“白夜”军事学说开发"
 SAN_white_night_doctrine_development_desc:133 "我们要总结在渊下宫探索中获得的战斗经验，建立一套全新的多维度军事学说。重点强调复杂地形下的生存与反击，以及利用环境元素进行干扰的战术。这套前卫的理论将使我们的指挥官在任何极端战场上都能游刃有余。"
 SAN_enkanomiya_high_command_setup:134 "渊下宫最高防务司令部"
 SAN_enkanomiya_high_command_setup_desc:134 "为了应对日益复杂的安全局势，我们要建立一个专门负责深渊防务的高级统帅部。通过整合地走官、探险队与科研基地的力量，我们要实现对渊下宫全境的无死角监控与快速反应，将其打造成永不陷落的最后堡垒。"
 SAN_ancient_tactics_integration:135 "古代阵法融合计划"
 SAN_ancient_tactics_integration_desc:135 "我们要将白夜国民对抗龙蜥的阵法应用于现代阵地战。这些通过特定脚步和方位形成的战法能有效地分散爆炸冲击并提升元素共鸣。这种古老与现代的完美结合，将使反抗军的方阵成为战场上最坚不可摧的移动城墙。"
 SAN_enkanomiya_reserve_training_plan:136 "渊下宫后备兵员训练"
 SAN_enkanomiya_reserve_training_plan_desc:136 "在渊下宫定居的开拓者们也必须具备战斗力。我们要实行半军事化管理，定期组织民兵进行防御演练。这支驻扎在深渊的后备力量将确保即便前线部队全部调走，我们的核心实验室与能源枢纽依然稳如泰山。"
 SAN_subterranean_supply_overhaul:137 "地底物资中转网优化"
 SAN_subterranean_supply_overhaul_desc:137 "我们要建立一套完全独立于地表的资源循环体系。通过地热能与大日电力的结合，实现地底工厂的零排放与自循环。这种自给自足的工业闭环将使我们彻底摆脱对他国资源的依赖，在战争中立于不败之地。"
 SAN_abyssal_cultural_restoration_plan:138 "深渊文明复兴计划"
 SAN_abyssal_cultural_restoration_plan_desc:138 "我们要复原白夜国的服饰、艺术与文学，在海祇全境进行推广。我们要让子民明白自己是高贵文明的继承者。通过这种强烈的文化自尊心建立，我们将培育出最坚定的爱国主义战士，他们将为了守护文明的火种而战至最后一人。"
 SAN_unification_of_the_two_realms:139 "两界归一政治联合"
 SAN_unification_of_the_two_realms_desc:139 "现人神巫女将正式宣布地表海祇岛与地下渊下宫的行政统一。我们要废除所有过时的界限，建立统一的官僚体系与法律框架。这次彻底的政治整编将标志着一个涵盖海陆空的强大政权的诞生，为我们进军天空岛奠定基础。"
 SAN_final_archeological_synthesis:140 "终极考古结论汇总"
 SAN_final_archeological_synthesis_desc:140 "所有的探索都指向了一个结论：真相必须被公之于众。我们要将破译的所有禁忌知识汇总成册，由心海大人亲自把关。这份终极文档将成为我们向“天理”发起意识形态挑战的最强武器，指引全人类走向真正的觉醒之路。"

 # --- 第五阶段：战后构想 (141-180) ---
 SAN_post_war_future_debate:141 "战后前途大辩论"
 SAN_post_war_future_debate_desc:141 "随着幕府军的节节败退，关于稻妻乃至整个提瓦特的未来，在珊瑚宫内部引发了激烈的讨论。我们要组织各界代表共同协商，是走向绝对的权威统治，还是建立包容的议会，亦或是向天空发起最后的远征？"

 # 路线A：现人神绝对权威 (威权)
 SAN_divine_authority_consolidation:142 "现人神绝对权威整合"
 SAN_divine_authority_consolidation_desc:142 "为了应对乱世，我们需要一个无可置疑的最高核心。心海大人作为“海祇大御神”的唯一人间代理人，将集军、政、教大权于一身。我们要建立高效的垂直领导体系，确保国家的每一道政令都能得到最绝对的执行。"
 SAN_enforced_orobashi_orthodoxy:143 "强化大御神正统教义"
 SAN_enforced_orobashi_orthodoxy_desc:143 "我们要将大御神的崇拜提升为国教，并编撰统一的神圣教典。任何挑战这一信仰的行为都将被视为对国家的背叛。通过这种极端的宗教凝聚力，我们将打造出一支视死如归的狂热军队，为实现巫女大人的远景而战。"
 SAN_clerical_administrative_overhaul:144 "巫女官僚体系整编"
 SAN_clerical_administrative_overhaul_desc:144 "我们要将行政权力收归由巫女组成的圣议会。这些受过严格神学与行政训练的官僚将负责治理全境，取代腐败的旧三奉行体制。这种神权化的统治将确保我们的政府始终走在神圣且高效的既定轨道上。"
 SAN_monolith_industrial_prioritization:145 "纪念碑式重工业重心"
 SAN_monolith_industrial_prioritization_desc:145 "我们要集中全境资源，建设一些规模宏大的工业奇观。这些巨型工厂不仅要生产最强大的战争机器，更要作为国家力量的象征矗立在岛屿之上。这种宏大叙事的工业化将向世界展示威权体制下无可比拟的动员效率。"
 SAN_theocratic_military_indoctrination:146 "神权化军事洗脑"
 SAN_theocratic_military_indoctrination_desc:146 "每一个士兵都将是圣战者。我们要派遣随军祭司进行思想教育，确保他们相信在大御神的庇护下，灵魂将获得永生。这种精神上的彻底统一，将使反抗军在战场上爆发出超越生物极限的战斗力，令敌人胆寒。"
 SAN_purging_the_unbelievers_action:147 "肃清异见者行动"
 SAN_purging_the_unbelievers_action_desc:147 "为了国家的纯洁，我们不能容忍内部有任何摇摆不定的声音。我们要指派专门的密查机构，查处那些怀念旧幕府或者宣扬动摇理念的人。通过一次彻底的内部大清洗，我们要让海祇岛成为一个意志绝对统一的钢铁堡垒。"
 SAN_divine_economic_planning_strategy:148 "神授经济计划战略"
 SAN_divine_economic_planning_strategy_desc:148 "我们要废除混乱的市场调节，转而实行详尽的五年计划。由巫女官署根据国家需求精确分配每一斤矿石和每一台机关。这种命令式经济将使我们能以前所未有的速度完成重工业化，为最终的扩张打下物质基础。"
 SAN_prophets_of_the_deep_network:149 "深渊先知情报网"
 SAN_prophets_of_the_deep_network_desc:149 "我们要利用深渊力量改造一部分密探，让他们能够跨越物质界的阻隔获取信息。这些被称为“深渊先知”的特工将为巫女大人提供关于任何潜在威胁的预示。在威权体制下，预测未来将是我们巩固统治的最强手段。"
 SAN_supreme_XRS_edict_drafting:150 "现人神至高敕令起草"
 SAN_supreme_XRS_edict_drafting_desc:150 "我们要制定一套神圣不可侵犯的宪典。明确心海大人拥有对所有律法和生命的最终裁判权。这套敕令将成为国家的根本大法，将我们的意志合法化、神圣化，建立起一套延续千年的至高统治框架。"
 SAN_holy_expansionist_doctrine:151 "神圣扩张主义学说"
 SAN_holy_expansionist_doctrine_desc:151 "海祇的光辉不应止步于岛屿。我们要确立将信仰传播到全提瓦特的战略目标。任何不接受大御神指引的地区都将被视为迷途之地。我们将发起一场全球性的圣战，用剑与真理为巫女大人开辟一个前所未有的宏大版图。"
 SAN_watatsumi_eternal_dominance_plan:152 "海祇永恒霸权计划"
 SAN_watatsumi_eternal_dominance_plan_desc:152 "我们要建立一套完善的朝贡体系，让周边所有的小势力都臣服于珊瑚宫的意志。通过军事威慑与经济控制的双重手段，确立海祇在东海乃至整个提瓦特东部的绝对霸主地位，重塑一个由我们定义的国际秩序。"
 SAN_divine_monarchy_manifesto:153 "神权君主制宣言"
 SAN_divine_monarchy_manifesto_desc:153 "我们要正式废除虚伪的共治模式，宣布建立以现人神巫女为元首的中央集权政体。我们要让世界看到，一个由神指引、由圣徒治理的国家是如何在乱世中崛起并统治一切的。这是秩序对混乱的终极胜利。"
 SAN_ultimate_theocracy_implementation:154 "终极神权体制实现"
 SAN_ultimate_theocracy_implementation_desc:154 "所有的筹备都已经完成。整个海祇文明已经与大御神的意志彻底融合。我们将以一种不可挑战的姿态，屹立在提瓦特之巅。在这片土地上，巫女大人的话语即是真理，我们的意志即是神迹，永恒的统治由此开启。"

 # 路线B：海祇民主议会 (民主)
 SAN_democratic_council_strategy:155 "建立海祇民主议会"
 SAN_democratic_council_strategy_desc:155 "内战的惨痛让我们意识到，只有集思广益才能避免灾难。心海大人决定交出部分权力，组建一个由诸岛代表、商会代表和学术界组成的民主议会。我们要通过平等的对话与协商，共同决定这个国家未来的航向。"
 SAN_multi_island_parliament_setup:156 "多岛联合议会筹建"
 SAN_multi_island_parliament_setup_desc:156 "我们要制定一套公平的选举制度。让每一位海民，无论是海祇岛的珍珠采集者，还是清籁岛的渔民，都能拥有属于自己的投票权。议会将拥有对国家财政和重大外交事务的表决权，建立真正的民意统治基础。"
 SAN_yashiro_commission_advisory_role:157 "社奉行顾问参与行动"
 SAN_yashiro_commission_advisory_role_desc:157 "我们要邀请神里家参与议会运作。利用社奉行在人文艺术与民事管理方面的丰富经验，建立一套温和且富有同情心的行政机制。这种多元力量的参与，将极大增强新政权的包容性，吸引原幕府领地的子民向心。"
 SAN_ritou_merchant_trade_pact:158 "离岛商会贸易协定"
 SAN_ritou_merchant_trade_pact_desc:158 "我们要给予离岛商会合法的政治地位，并签署一份全面的自由贸易协定。通过保障私有财产和商业合同的履行，我们将吸引全球的资本涌入。一个繁荣的商业民主环境将为我们的重建提供源源不断的活力与税收支持。"
 SAN_freedom_of_worship_proclamation:159 "信仰自由大宣告"
 SAN_freedom_of_worship_proclamation_desc:159 "虽然大御神是我们的传统守护神，但在新海祇国，每一个公民都有选择信仰的权力。不管是崇拜雷电将军，还是追随时间之执政，都应受到法律的平等保护。这种信仰上的包容将彻底消弭内战留下的宗派仇恨。"
 SAN_liberal_economic_reforms_plan:160 "自由派经济改革计划"
 SAN_liberal_economic_reforms_plan_desc:160 "我们要放开国家对关键资源的垄断，鼓励私人企业参与开采与研发。通过竞争与创新，提升生产效率。我们要建立完善的银行体系与劳工保护法，让每一个人都能在国家的崛起中分享到应有的经济成果。"
 SAN_council_of_elders_integration:161 "贤者长老会整合"
 SAN_council_of_elders_integration_desc:161 "我们要尊重各村社的传统权威。将那些德高望重的长者纳入议会的上议院，负责对法律草案进行审议。这种传统智慧与现代民主的结合，将确保我们的改革在稳步推进的同时，不至于割断与民族历史的纽带。"
 SAN_citizens_militia_organization:162 "公民民兵组织建设"
 SAN_citizens_militia_organization_desc:162 "我们不建立一支脱离群众的庞大职业军队。通过组织公民民兵，让每一个公民都掌握保卫民主的能力。这种“寓兵于民”的策略不仅节省了开支，更能确保国家权力不被野心家窃取，因为民众本身就是权力的守护者。"
 SAN_social_welfare_expansion_action:163 "社会福利扩张行动"
 SAN_social_welfare_expansion_action_desc:163 "我们要将大量的财政预算拨给公共卫生与教育。建立覆盖全境的基础学校和免费诊所。只有让民众感受到民主带来的切身好处，他们才会成为制度最坚定的捍卫者。我们要打造一个真正充满幸福感的海民共同体。"
 SAN_pan_tepvat_diplomatic_outreach:164 "全提瓦特外交拓展"
 SAN_pan_tepvat_diplomatic_outreach_desc:164 "我们要积极与蒙德、璃月等自由城邦建立外交关系。通过签署互不侵犯条约和文化交流协定，我们要提升海祇在国际舞台上的合法性与声望。通过温和的软实力输出，我们要让全世界看到一个和平且繁荣的民主典范。"
 SAN_constitution_of_sangonomiya_drafting:165 "珊瑚宫宪法草案起草"
 SAN_constitution_of_sangonomiya_drafting_desc:165 "我们要邀请法律专家共同制定一部赋予权力的宪法。明确三权分立的原则和公民的基本权利。这部宪法将成为国家的基石，将心海大人的仁慈转化为持久的制度保障，建立起一个法治而非人治的现代文明。"
 SAN_democratic_industrial_modernization:166 "民主化工业现代转型"
 SAN_democratic_industrial_modernization_desc:166 "我们要引导工业向高附加值的民用领域转型。除了必要的国防工业，我们要重点发展远洋贸易船队、电子通讯和精密仪器制造。通过技术出口与品牌塑造，我们要让“海祇制造”成为提瓦特高质量产品的代名词。"
 SAN_joint_island_defense_reforms:167 "诸岛联合防务机制改革"
 SAN_joint_island_defense_reforms_desc:167 "我们要建立一套基于互助原则的共同防御体系。议会将统筹各岛的自卫力量，形成快速联动的防御网络。这种防御架构强调防御而非进攻，旨在确保我们的民主成果不受任何外来干涉与破坏，实现长治久安。"
 SAN_ultimate_republican_vision:168 "终极共和愿景实现"
 SAN_ultimate_republican_vision_desc:168 "所有的努力终将汇聚成一个伟大的时刻：海祇共和国的诞生。我们将不再依赖神明的恩赐，而是靠着公民的意志与契约建立起一个永恒的乐土。在这个国度里，理智胜过迷信，合作胜过争斗，希望的旗帜将永恒飘扬。"

 # 路线C：白夜远征军 (共产/扩张)
 SAN_celestia_defiance_pact:169 "反抗天理秘密协定"
 SAN_celestia_defiance_pact_desc:169 "通过《日月前事》，我们已经看清了这个世界残酷的真相。心海大人决定，我们不能只安于海岛的一角。我们要组建一支名为“白夜”的远征军，向那个奴役众生的“天理”发起挑战。我们要打破天空的囚笼，为全人类赢取真正的尊严。"
 SAN_export_revolutionary_ideals_action:170 "输出革命理想行动"
 SAN_export_revolutionary_ideals_action_desc:170 "我们要向提瓦特各地的受压迫者散布真相。派遣我们的宣讲团潜入诸国，播撒反抗的种子。我们要让全天下的凡人都意识到，神灵并非不可挑战，我们要联络所有的反抗力量，发起一场席卷全球的意识形态大风暴。"
 SAN_dark_sea_expeditionary_strategy:171 "暗之外海远征战略"
 SAN_dark_sea_expeditionary_strategy_desc:171 "在七神秩序之外，暗之外海隐藏着未知的禁忌力量。我们要指派精锐舰队向海洋的边缘进发，寻找那些逃离天理的古老文明与魔神。我们要整合一切可以利用的力量，建立一个反抗天空秩序的宏大统一战线。"
 SAN_celestial_order_disruption_plan:172 "天空秩序扰乱计划"
 SAN_celestial_order_disruption_plan_desc:172 "利用渊下宫的波动技术，我们要尝试干扰天理对地脉的监控。通过人为制造元素力场的混乱，掩盖我们军事调动的痕迹，甚至尝试切断天空岛与各国七天神像之间的联系，让那些代理人的意志陷入混乱与孤立之中。"
 SAN_radical_industrial_collectivization:173 "激进工业集体化运动"
 SAN_radical_industrial_collectivization_desc:173 "为了支撑前所未有的远征，我们要实行最彻底的集体化。所有的生产资料归国家所有，所有的民众都要投入到战争准备中。通过这种极端的资源整合，我们要在一夜之间爆发出令神明战栗的物质生产能力，打造通向天空的利刃。"
 SAN_vanguard_of_the_abyss_recruitment:174 "深渊先锋军团招募"
 SAN_vanguard_of_the_abyss_recruitment_desc:174 "我们要从全境选拔最具革命意志的战士，用深渊中获取的禁忌药剂提升他们的身体潜能。这支“白夜先锋团”将不惧任何神罚，由于他们已经见过最深的黑暗，所以没有任何天空的威光能够动摇他们的斗志。"
 SAN_clandestine_abyssal_alliances:175 "深渊秘密结盟计划"
 SAN_clandestine_abyssal_alliances_desc:175 "虽然危险，但我们必须尝试与深渊教团的部分势力达成交易。敌人的敌人就是朋友。通过交换情报与技术，我们要获取关于天理防线弱点的关键数据。这场战争中，为了最终的自由，我们将不惜借用任何禁忌的力量。"
 SAN_mobilize_the_under-dwellers_strategy:176 "动员深渊遗民战略"
 SAN_mobilize_the_under-dwellers_strategy_desc:176 "我们要深入渊下宫和那些被遗忘的地底缝隙，唤醒那些沉睡数千年的遗民。告诉他们反击的时刻已经到来。这些怀着千年怨恨的军势将成为我们最坚实的后援，从大地最深处发起对那个高高在上的王座的挑战。"
 SAN_total_ideological_war_prep:177 "全面意识形态战争准备"
 SAN_total_ideological_war_prep_desc:177 "我们要建立一套完整的战时宣传体制，将心海大人塑造成全人类的解放者。我们要让每一位战士都明白，他们不是在为领土而战，而是在为人类这个物种的自由而战。这种神圣的使命感将产生一种摧枯拉朽的革命力量。"
 SAN_sky_throne_reconnaissance_action:178 "天空王座深度勘测"
 SAN_sky_throne_reconnaissance_action_desc:178 "利用我们研发的高空航空器和强力望远镜，我们要对天空岛进行详尽的地理扫描。我们要找到它的弱点，分析其防御屏障的能级。所有的努力都是为了制定那一份最终的突击计划，我们要让海祇的意志在万米高空绽放。"
 SAN_final_assault_on_the_divine_arrangements:179 "对神圣秩序的最终总攻"
 SAN_final_assault_on_the_divine_arrangements_desc:179 "时刻已经成熟。所有的远征军、民兵、地走官和深渊盟友将同时发动。我们要像雷霆一样击碎现有的神权结构。哪怕前途是毁灭，我们也要用鲜血在提瓦特的历史上刻下凡人不屈的名字，挑战那个虚伪的神灵乐园。"
 SAN_liberation_of_all_teyvat_strategic_vision:180 "解放全提瓦特战略远景"
 SAN_liberation_of_all_teyvat_strategic_vision_desc:180 "我们要建立一个没有神之眼、没有眼狩令、没有天理束缚的新世界。我们要让每一个凡人都能主宰自己的愿望。随着旧王座的崩塌，一个新的黎明将在海祇的指引下到来。这是一个属于人类的时代，自由的歌声将永远响彻七国。"




# ========================================================================
# 事件部分
# ========================================================================
 # ========================== 第一阶段：揭旗起事 (1-30) ==========================
 SAN_event.1.t:"反抗的开端"
 SAN_event.1.desc:"旗帜猎猎响，现人神之命将降，愿望莫两忘。珊瑚宫心海在海祇大御神的祭坛前正式宣告：眼狩令是践踏灵魂的暴政。反抗军的战士们已在望泷村集结，我们的剑指向稻妻城。这一刻，历史的潮汐开始逆转，海祇岛的尊严将由鲜血和意志来重铸。——珊瑚宫剧本制作：桂花糕"
 SAN_event.1.a:"为了大义！"

 SAN_event.2.t:"海祇民兵的觉醒"
 SAN_event.2.desc:"渔叉换长锋，青年挥别慈母颜，波涛入梦间。望泷村的年轻人们放下了渔网，拿起了武器。虽然他们曾是平凡的渔民，但在家园受到威胁时，每个人都是不可战胜的卫士。我们将这些散布在各岛的勇士集结成军，让他们成为守卫海祇岛的钢铁长城。"
 SAN_event.2.a:"众志成城。"

 SAN_event.3.t:"大本营的筹谋"
 SAN_event.3.desc:"珊瑚映月明，智将指点江山势，运筹帷幄里。在大本营中，战图被缓缓摊开，每一处关隘、每一条航道都被严密计算。心海大人亲自主持军事会议，建立起了一套跨岛屿的高效指挥体系。在这里发出的每一道指令，都将如同汹涌的潮汐，席卷敌人的防线。"
 SAN_event.3.a:"掌握胜算。"

 SAN_event.4.t:"五郎的强军策"
 SAN_event.4.desc:"犬影战阵前，忠勇之志燃胸膛，大将威名扬。五郎大将提出了全新的训练大纲。士兵们在崎岖的山地中磨炼意志，在模拟对抗中学习战法。这种改革让反抗军脱胎换骨，从一群志愿者进化为纪律严明的正规军。将军之威，不在于权势，而在于与士兵同生共死的觉悟。"
 SAN_event.4.a:"军威大振。"

 SAN_event.5.t:"暗影中的飞鸟"
 SAN_event.5.desc:"微风传秘语，潜行阴影乱敌踪，情报胜千雄。我们的秘密通信网络已穿透幕府的封锁线。利用走私船和各岛的眼线，敌人的每一项调动都在心海大人的掌控之中。信息在黑暗中流动，化作决定胜负的利刃。知己知彼，方能立于不败之地。"
 SAN_event.5.a:"截获密报。"

 SAN_event.6.t:"锦囊妙计的实践"
 SAN_event.6.desc:"锦囊藏生机，兵法精微算无遗，奇袭正当时。心海大人分发的锦囊中写满了应对各种突发状况的策略。士兵们惊叹于军师大人的未雨绸缪。通过这些兵法的实践，我们学会在绝境中寻找转机，在乱局中锁定胜果。智慧的力量，比任何重炮都更能震撼敌人的灵魂。"
 SAN_event.6.a:"妙算如神。"

 SAN_event.7.t:"愿望的锋芒"
 SAN_event.7.desc:"神之眼烁光，赤子愿望化雷火，一念破苍茫。神之眼持有者们组成了先锋突击队。他们不再是孤军作战的个体，而是协同进攻的元素洪流。每一次元素爆发都代表着不屈的意志，我们要向天理和将军证明，凡人的愿望绝非可以随意夺取的玩物。"
 SAN_event.7.a:"先锋突击！"

 SAN_event.8.t:"珍珠配给制"
 SAN_event.8.desc:"粒米思艰辛，珍珠碎散济贫苦，民心重千金。为了应对幕府的经济封锁，我们启动了严格的资源配给计划。心海大人亲自走访村落，确保最弱势的岛民也能获得温饱。这种牺牲与公正赢得了全体国民的信任，民众的团结成为了我们最坚固的防线。"
 SAN_event.8.a:"共克时艰。"

 SAN_event.9.t:"迷雾海战"
 SAN_event.9.desc:"海雾锁战船，礁石暗藏杀机现，惊雷震海天。利用海祇岛周边复杂的水文环境，我们的快船编队对幕府运输线展开了毁灭性的伏击。敌人的巨舰在迷雾中迷失，而我们如鱼得水。海洋是海祇民的领地，在这里，幕府的权势将被波涛淹没。"
 SAN_event.9.a:"海上大捷。"

 SAN_event.10.t:"巫女的慈悲"
 SAN_event.10.desc:"白衣染尘灰，医者仁心抚创痛，歌声唤回归。珊瑚宫的巫女们放下了祭祀的铃铛，拿起了药草与纱布。她们在战场后方建立起简陋却温馨的医疗营。温柔的歌声平息了伤员的恐惧，精湛的医术挽救了无数生命。这股柔性的力量，是反抗军永不枯竭的精神源泉。"
 SAN_event.10.a:"守护生命。"

 SAN_event.11.t:"招募流浪武士"
 SAN_event.11.desc:"刀刃无主时，流落荒野叹浮生，海祇觅忠魂。失去领地的浪人们在海祇岛找到了新的归宿。我们承诺，只要为了公义而战，每个人都能获得名誉与报酬。这些身经百战的武者补强了我们的近战能力，他们的加入让反抗军的战术变得更加多变且致命。"
 SAN_event.11.a:"剑客集结。"

 SAN_event.12.t:"兵法研习会"
 SAN_event.12.desc:"古卷翻残影，心海沉思月影中，智略贯苍穹。心海大人在繁忙的政务之余，依然坚持研习古今兵法。她将白夜国的遗迹文献与稻妻实战相结合，总结出了一套全新的防御教义。行政效率的提升与对资源掌控力的增强，正在为这个年轻的国家注入持续不断的生命力。"
 SAN_event.12.a:"学无止境。"

 SAN_event.13.t:"战时税收改革"
 SAN_event.13.desc:"国难当头日，千家万户献忠诚，财粮足军声。为了维持漫长的战线，我们不得不调整税收政策。心海大人强调，税收应以平稳民生为前提。通过对豪商的劝募与行政流程的简化，大量的战争经费被筹集起来，确保了前方战士的弹药与口粮从未断绝。"
 SAN_event.13.a:"厚积薄发。"

 SAN_event.14.t:"加固海祇防线"
 SAN_event.14.desc:"磐石筑坚垒，任凭风雨狂雷袭，故土守无余。在海祇岛的门户区域，一座座钢筋混凝土堡垒拔地而起。我们利用天然洞穴改造成弹药库，利用高地部署远程重炮。防线的加固不仅是为了抵御进攻，更是为了给我们提供一个稳固的反攻跳板。"
 SAN_event.14.a:"坚不可摧。"

 SAN_event.15.t:"异国雇佣兵的到来"
 SAN_event.15.desc:"异乡客踏浪，重金礼聘助声威，乱局现生机。通过秘密渠道，一群来自蒙德和璃月的雇佣兵抵达了海祇岛。虽然他们的动机是金钱，但其专业的战斗技巧确实是目前的我们所急需的。他们的加入打破了稻妻内战的沉闷局面，让幕府见识到了外界力量的干预。"
 SAN_event.15.a:"增强战力。"

 SAN_event.16.t:"秘密地道的落成"
 SAN_event.16.desc:"深挖地层底，穿行群山密林间，奇兵出不意。后勤地道工程终于完工。这些在山腹中穿梭的暗道，不仅能规避幕府军的侦察，还能在被包围时进行奇袭。物资的运输变得更加隐蔽、安全。地道如同海祇岛的血管，源源不断地为前线输送胜利的希望。"
 SAN_event.16.a:"地下长城。"

 SAN_event.17.t:"元素战术整合"
 SAN_event.17.desc:"元素共鸣响，火光电石映山冈，威能震八方。通过对神之眼持有者的科学编组，我们实现了一加一大于二的效果。超载的火光、冻结的寒意、感电的麻痹，这些自然的力量在战场上交织成死神的镰刀。这种战术整合，标志着反抗军已掌握了足以抗衡神灵力量的手段。"
 SAN_event.17.a:"战力飞跃。"

 SAN_event.18.t:"情报网的延伸"
 SAN_event.18.desc:"耳目遍稻妻，町街深处藏暗语，秘密不再秘。我们的眼线已经渗透到了鸣神岛的市井深处。天领奉行的公文副本在数小时内就能传到珊瑚宫。这种无孔不入的渗透，让幕府的行政机器变得迟钝而笨拙。在知识与信息的博弈中，我们已经赢了一半。"
 SAN_event.18.a:"洞察先机。"

 SAN_event.19.t:"海岸巡逻制度"
 SAN_event.19.desc:"惊涛拍岸响，日夜巡逻莫稍停，家园保清宁。我们建立了一套完善的海岸线预警系统。每个哨塔都配备了元素感应仪，确保任何非法登陆的敌军都会在第一时间被发现。海洋不再是威胁的来源，而是海祇岛天然的护城河，每一寸浅滩都在我们的守护之下。"
 SAN_event.19.a:"守护边疆。"

 SAN_event.20.t:"村议会的权力"
 SAN_event.20.desc:"民心归一处，村落自治议新篇，众意定大权。心海大人下令将部分行政权力下放到村议会。望泷村的长老们开始负责分配土地与组织民防。这种权力的释放极大地激发了民众的主观能动性，让每个人都意识到，保卫国家就是保卫自己的生活方式。民主的萌芽正在悄然生长。"
 SAN_event.20.a:"权力归民。"

 SAN_event.21.t:"战略粮仓工程"
 SAN_event.21.desc:"深积战备粮，广筑高墙固根基，长战志不移。利用海祇岛独特的珊瑚岩层，我们开辟了大量的地下粮仓。即使面临长达数年的封锁，我们的战士和民众也不会忍饥挨饿。充足的粮食储备是持久战的底气，也是心海大人制衡幕府的最强经济筹码。"
 SAN_event.21.a:"温饱无忧。"

 SAN_event.22.t:"旗语的革新"
 SAN_event.22.desc:"彩旗舞长空，密报传于波涛间，同步建奇功。在失去地脉通讯的情况下，我们的快船编队依靠全新的加密旗语保持同步。每一次挥旗都代表着精确的战术动作。这种古老而有效的手段，让我们的海上协同能力达到了前所未有的高度。旗帜所向，即是胜果所在。"
 SAN_event.22.a:"统一号令。"

 SAN_event.23.t:"游击战的部署"
 SAN_event.23.desc:"隐于密林中，击于敌之所不备，退若晨雾散。我们将反抗军化整为零，在八酝岛的裂谷与丛林中展开游击战。幕府军的笨重师团在这里陷入了泥潭。这种长期的迟滞与袭扰，正在耗尽天领奉行的耐心与兵力。我们要用无数次微小的胜利，换取最后的战略转折。"
 SAN_event.23.a:"持久抗战。"

 SAN_event.24.t:"侦察兵的训练"
 SAN_event.24.desc:"身捷似灵猫，穿梭敌后觅虚实，双眼看分明。一批最敏锐的战士接受了特种侦察训练。他们学会了利用草药掩盖气味，利用阴影躲避视线。他们带回的每一张地图、每一个敌方粮草堆的位置，都成为了心海大人制定攻势的关键数据。他们是军队的眼睛，是黑暗中的利剑。"
 SAN_event.24.a:"情报致胜。"

 SAN_event.25.t:"水雷防御区"
 SAN_event.25.desc:"潜藏暗流底，爆炸声震深海魂，入侵莫入门。我们在近海关键航道布设了大量的改良水雷。这种廉价而有效的防御手段，让幕府水军的巡洋舰望而却步。海洋的宁静之下隐藏着致命的陷阱。海祇岛的近海已经变成了任何侵略者的禁区，我们掌握了海上的主动权。"
 SAN_event.25.a:"封锁海域。"

 SAN_event.26.t:"要塞化海祇"
 SAN_event.26.desc:"岛屿化铁塔，万门重炮指苍天，犯者必遭难。心海大人下令将整个海祇岛要塞化。每一个山头都被改造成掩体，每一处防波堤都暗藏火力点。这座被珊瑚覆盖的美丽岛屿，如今已变成了一座不可攻克的堡垒。我们要用钢铁与鲜血，告诉所有敢于进犯的人：这里是海祇民的圣地。"
 SAN_event.26.a:"严阵以待。"

 SAN_event.27.t:"宣传战的开展"
 SAN_event.27.desc:"布告传诸岛，正义之声唤归心，幕府失德音。我们的文宣团队正在各岛散发传单，揭露眼狩令背后的腐败与残酷。当稻妻的民众意识到反抗军才是真正的守护者时，天领奉行的统治根基就开始动摇。思想的战争同样血腥，而我们正在赢得民心这场终极战役。"
 SAN_event.27.a:"揭露真相。"

 SAN_event.28.t:"防线的协同强化"
 SAN_event.28.desc:"诸岛共一心，防线交织网罗密，大御神佑民。我们整合了全岛的独立防御单元。通过统一的无线电频道，各防区可以实时支援。这种网状化的防御体系，让敌人的局部突破变得毫无意义。大御神的保佑不仅在于信仰，更在于这种科学严密的协同合作中。"
 SAN_event.28.a:"固若金汤。"

 SAN_event.29.t:"黑市贸易协定"
 SAN_event.29.desc:"利诱贪官手，物资暗渡离岛关，贸易补国艰。心海大人默许了与离岛黑市的接触。通过黄金与珍珠，我们换回了急需的钢铁与炼金药剂。这种游走在灰色地带的交易，虽然充满风险，却在封锁期间维持了海祇岛的工业运转。在这个残酷的世界里，生存是最高的一道准则。"
 SAN_event.29.a:"暗度陈仓。"

 SAN_event.30.t:"第一阶段攻势计划"
 SAN_event.30.desc:"万事已俱备，只欠东风破敌营，反攻显威灵。心海大人在战略地图上画下了红色的进攻箭头。随着第一阶段筹备的完成，我们的部队已集结完毕。反抗军将不再仅仅满足于守土，我们要跨过名椎滩，收复神无冢。这一战，将向全稻妻宣告：反抗的号角正式吹响！"
 SAN_event.30.a:"全面进攻！"

 # ========================== 第二阶段：内战烽火 (31-70) ==========================
 SAN_event.31.t:"神无冢的血色大门"
 SAN_event.31.desc:"踏过名椎滩，血斛盛开浸战袍，英魂志气高。反抗军的先头部队已在神无冢登陆。这里是天领奉行的工业心脏，每一寸土地都布满了防御工事。通过正面的佯攻和侧翼的奇袭，我们要撕开敌人的阵线。这是一场意志的较量，胜利将属于那些为了愿望而死战不退的人。"
 SAN_event.31.a:"挺进踏鞴砂。"

 SAN_event.32.t:"御影炉心的轰鸣"
 SAN_event.32.desc:"炉心雷光闪，祟神威能入掌中，重铸钢铁魂。通过精密的战术行动，我们成功控制了御影炉心。虽然炉内能量不稳定，但我们的工程师已在枫丹专家的指导下开始利用这股力量进行冶炼。反抗军将拥有比幕府更精良的武器，每一柄重铸的刀刃都闪耀着复仇的光芒。"
 SAN_event.32.a:"掌握工业。"

 SAN_event.33.t:"名椎滩的拉锯战"
 SAN_event.33.desc:"浅滩映斜阳，赤红血斛遍地芳，枯骨诉凄凉。名椎滩成了绞肉机。敌我双方在这里反复争夺每一个废弃的船骸。心海大人下令修筑多层纵深阵地，利用炮火优势压制敌人的冲锋。虽然伤亡惨重，但每一朵盛开的血斛都在见证我们的坚韧。这片滩涂将成为幕府军的噩梦。"
 SAN_event.33.a:"寸步不让。"

 SAN_event.34.t:"踏鞴砂重建工程"
 SAN_event.34.desc:"废墟现新生，工坊烟火重燃起，工业定国基。战火后的踏鞴砂满目疮痍，但核心设施依然完好。我们投入了大量的资源和人力进行系统性修复。我们要将这里从恐怖的‘神不在之丘’变为反抗军的兵工厂。当第一炉钢水流出时，胜利的天平已向我们倾斜。"
 SAN_event.34.a:"工业腾飞。"

 SAN_event.35.t:"八酝岛的安魂曲"
 SAN_event.35.desc:"神骸残怨消，巫女吟唱止风暴，黎民得安宁。为了建立稳定的后方，心海大人亲自带领巫女团前往八酝岛。通过古老的安魂仪式，那些因祟神之力而发狂的地脉能量逐渐平息。这种对土地的救赎赢得了当地人的支持。一个安定的后方，是我们能够持续作战的最后保障。"
 SAN_event.35.a:"平定祟神。"

 SAN_event.36.t:"捕捉祟神能量"
 SAN_event.36.desc:"禁忌入牢笼，雷光闪动定乾坤，威能御国疆。我们不仅是在安抚祟神，更是在尝试控制它。通过修筑特制的元素拘束塔，我们将不稳定的祟神能量导流进蓄能站。这种危险而强大的能源，将为我们的重型工厂和防御阵地提供近乎无限的动力。科技正在征服迷信。"
 SAN_event.36.a:"利用禁忌。"

 SAN_event.37.t:"枫丹技术的引进"
 SAN_event.37.desc:"异国奇机巧，齿轮转动映蓝图，科技追高远。枫丹工程师泽维尔加入了我们的团队。他带来的高炉设计和蒸汽泵技术，让我们的生产效率提升了数倍。海祇岛正在经历一场前所未有的工业革命。吸收异国的智慧，让我们在技术代差上追平甚至反超了腐朽的幕府。"
 SAN_event.37.a:"科技领先。"

 SAN_event.38.t:"白鹭的信笺"
 SAN_event.38.desc:"白鹭影蹁跹，社奉行里暗传笺，结盟共蓝天。神里家派来了秘密使者。虽然身在幕府，但神里兄妹对眼狩令的厌恶与我们一致。通过私下的物资交换和情报共享，我们建立了一个脆弱却强大的抗争同盟。天领奉行的铁幕正在从内部分裂，援军或许就在灯火阑珊处。"
 SAN_event.38.a:"联合盟友。"

 SAN_event.39.t:"万叶的顺风突击"
 SAN_event.39.desc:"风起叶飘零，浪人一剑斩长空，影中现孤鸿。枫原万叶带回了他的剑与意志。这支由他领导的‘万叶先锋队’在战场上如风般迅捷，他们总能出现在敌方防线最脆弱的地方。这种飘逸而致命的战斗风格，极大地打击了幕府军的士气。风之志，是自由之志，亦是制胜之剑。"
 SAN_event.39.a:"风卷残云。"

 SAN_event.40.t:"终末番的协力"
 SAN_event.40.desc:"潜影默无声，忍者行刺定乾坤，暗战决明晨。在社奉行的默许下，一些终末番的成员开始向我们提供专业的潜行支援。我们要学习这种隐秘的作战方式，让每一个反抗军战士都具备在黑暗中取敌首级的能力。正面的战场由勇气支撑，而背后的阴影由专业决定。"
 SAN_event.40.a:"暗影契约。"

 SAN_event.41.t:"绯木村的救援"
 SAN_event.41.desc:"病榻见真情，海祇仁政广施布，民心向正义。绯木村的怪病一度令人绝望，但心海大人派出的医疗队带来了希望。通过分发净化过的泉水和药剂，村民们的病情得到了缓解。这种人道主义行动向全稻妻证明：反抗军不仅是战士，更是苦难众生的守护者。民心所向，即是天命所在。"
 SAN_event.41.a:"仁政广被。"

 SAN_event.42.t:"骨髓矿的革新开采"
 SAN_event.42.desc:"钻机震岩层，晶化骨髓献宝藏，重工业辉煌。利用缴获的工程机械，我们对八酝岛的矿区进行了现代化改造。晶化骨髓的产量翻了一番。这些富含能量的矿石被送往踏鞴砂，转化为最坚硬的装甲钢。资源是战争的血液，而现在，我们的血液比以往任何时候都更加澎湃。"
 SAN_event.42.a:"开采资源。"

 SAN_event.43.t:"无想刃狭间防线"
 SAN_event.43.desc:"天险割山川，雷残响里筑坚垒，要冲守如磐。利用雷电将军留下的恐怖裂谷，我们修筑了复杂的永久性要塞。这里是通往八酝岛的唯一陆路，每一处岩壁都部署了隐蔽的火力点。要塞化的狭间防线成了幕府军面前的一道鬼门关，任何试图强攻的人都将在这里粉身碎骨。"
 SAN_event.43.a:"天险要塞。"

 SAN_event.44.t:"武器标准化的推行"
 SAN_event.44.desc:"规格归于一，万剑同铸战旗扬，补给无忧长。心海大人下令统一全军的弹药与刀剑规格。虽然失去了些许艺术感，但这种工业化的生产极大地方便了前线的补给更换。每一颗炮弹都能在任何一个营地通用，每一把战损的武器都能迅速得到配件更换。效率，就是我们的战斗力。"
 SAN_event.44.a:"统一规格。"

 SAN_event.45.t:"八酝岛民的投效"
 SAN_event.45.desc:"苦难铸铁躯，复仇之火燃胸膛，报国志昂扬。深受感动的八酝岛幸存者们踊跃参军。他们经历了家破人亡的痛苦，拥有最坚韧的战斗意志。我们将这些‘复仇者’编入独立的重装突击师。在攻打九条阵屋的战斗中，他们表现出的无畏与狂热，让幕府军感到前所未有的战栗。"
 SAN_event.45.a:"招募精兵。"

 SAN_event.46.t:"御影炉心安全协议"
 SAN_event.46.desc:"雷光入笼中，严防泄露定生产，安稳保工坊。为了防止敌方的破坏行动导致核能级别的灾难，我们建立了一套科学的安全协议。通过对炉心振动频率的实时监控，我们实现了生产效率与环境安全的完美平衡。一座稳定的炉心，是海祇岛战时经济长期发展的能量源头。"
 SAN_event.46.a:"稳步生产。"

 SAN_event.47.t:"补给线的袭扰"
 SAN_event.47.desc:"截其辎重车，乱其粮草焚其仓，敌军自惶惶。利用小规模快船和潜行小分队，我们频繁袭击天领奉行的海上补给线。幕府前线部队开始面临断粮缺弹的困局。这种战略性的削弱，虽然不如正面会战那样耀眼，却能从根本上瓦解敌人的战斗意志。战争，不只是在前方拼杀。"
 SAN_event.47.a:"战略封锁。"

 SAN_event.48.t:"合围九条阵屋"
 SAN_event.48.desc:"重炮震敌营，阵屋四合困孤兵，拔钉正当时。反抗军主力已完成对九条阵屋的战略包围。通过切断其与鸣神岛的空中联络，我们要彻底孤立这处顽疾。心海大人的战术如手术刀般精准，我们的炮群已锁定阵屋的弹药库。随着总攻号角的响起，这颗钉子终将被拔除。"
 SAN_event.48.a:"围而歼之。"

 SAN_event.49.t:"真相的火种"
 SAN_event.49.desc:"传单漫天飞，揭露幕府虚伪心，唤起稻妻魂。我们的地下宣传站已在稻妻城周边运行。通过散发关于勘定奉行与天领奉行勾结的证据，我们唤醒了普通民众的反抗意识。真相是比长枪更锋利的武器，当民众不再畏惧，幕府的统治就只剩下一具干枯的空壳。星火正在燎原。"
 SAN_event.49.a:"舆论反击。"

 SAN_event.50.t:"统合指挥架构"
 SAN_event.50.desc:"军令如潮水，统一调动无阻碍，如臂使指快。随着战线的拉长，心海大人建立了一套中心化的联合指挥系统。通过数字化的地脉信号发送机，各岛指挥官可以在数秒内获得最新的战略简报。这种信息化的同步，让我们在瞬息万变的战场上始终领先敌人一步。统一指挥，赢在速度。"
 SAN_event.50.a:"强化体系。"

 SAN_event.51.t:"全域资源整合"
 SAN_event.51.desc:"仓库堆如山，各岛资源共调配，储备志在先。我们将神无冢的玉钢、八酝岛的晶石与海祇岛的珍珠进行了全国性的统一调配。通过行政强制手段建立的战略储备，让我们有信心面对未来的任何持久挑战。一个能够自给自足的经济循环，是国家走向独立的物质基础。"
 SAN_event.51.a:"厚积民力。"

 SAN_event.52.t:"反抗军行为准则"
 SAN_event.52.desc:"秋毫莫敢犯，纪律森严定军心，义师名远播。心海大人亲自颁布了修正后的战时行为准则。严禁掠夺占领区财物，严禁伤害平民。这种极高的道德自律，让我们在收复失地时获得了一致的拥护。我们是解放者，而非征服者。优秀的军纪，是反抗军最耀眼的勋章。"
 SAN_event.52.a:"严明纪律。"

 SAN_event.53.t:"护航编队的组建"
 SAN_event.53.desc:"铁甲护商船，海路通达连四方，封锁自消亡。为了打破幕府的海上封锁，我们组建了装备了元素炮的专业护航舰队。通过与离岛商会的秘密协作，我们的商贸航线重新焕发生机。一个流动的市场是繁荣的源泉，也是国家战时财政不致枯竭的关键保障。海洋属于自由者。"
 SAN_event.53.a:"通商四海。"

 SAN_event.54.t:"海祇军事学院"
 SAN_event.54.desc:"将星出校园，兵法研习育英才，柱石撑危难。我们在珊瑚宫附近的灵地建立了一所正式的军事学院。由五郎和万叶亲自担任教官，教授士兵不仅要有勇气，更要有专业的战术修养。这些年轻的基层军官将是未来的国家栋梁，他们的智慧将决定下一场战争的走向。教育即强军。"
 SAN_event.54.a:"培养将才。"

 SAN_event.55.t:"工业的跨海迁移"
 SAN_event.55.desc:"工坊入山腹，深藏功与名利间，避乱保生产。为了防备敌人的大规模轰炸，我们将部分精密加工厂拆解后转移至海祇岛的天然溶洞中。这些‘洞穴工厂’集成了先进的防御法阵，确保核心军工产能在极端状况下仍能维持运转。分散风险，就是保护国家的未来。"
 SAN_event.55.a:"战略转移。"

 SAN_event.56.t:"深空侦察气球"
 SAN_event.56.desc:"扶摇上九霄，俯瞰敌后万里云，局势尽眼底。利用枫丹的充气技术和我们的炼金感应器，第一批深空侦察气球升上了高天。它们能提供实时的敌军阵地全景。这种超越时代的观察高度，让幕府的伪装变得毫无意义。在高天之上，我们注视着每一个试图反扑的阴影。"
 SAN_event.56.a:"俯瞰全局。"

 SAN_event.57.t:"全域医疗支援网"
 SAN_event.57.desc:"药草香满园，战地救护争秒刻，死神亦胆寒。我们建立了一套覆盖全境的伤员分级处理系统。从前线的急救包到后方的中心医院，伤员的存活率大幅提升。每一个获救的老兵都是宝贵的财富，他们重返战场后展现出的战斗技巧与忠诚度，是任何新兵都无法比拟的。人命关天，善莫大焉。"
 SAN_event.57.a:"仁心仁术。"

 SAN_event.58.t:"超级造船厂工程"
 SAN_event.58.desc:"龙骨立滩头，巨舰如林向远洋，制海权在手。利用在踏鞴砂获取的技术，我们扩建了海祇岛的造船设施。我们要建造全铁甲的蒸汽战舰，让海祇岛的蓝色旗帜飘扬在整个提瓦特东部海域。制海权就是制胜权，我们将不再畏惧幕府的旧式水师。大海将为强者开路。"
 SAN_event.58.a:"重铸海军。"

 SAN_event.59.t:"最终动员令"
 SAN_event.59.desc:"老幼皆甲兵，一战功成定乾坤，热血卫家邦。在总攻鸣神岛的前夕，心海大人发布了最终动员令。所有的预备役人员已穿上军装。这种举国体制的爆发，向幕府展示了我们不惜一切代价争取自由的决心。这不再是一场局部的叛乱，而是一个民族为了生存而进行的圣战。"
 SAN_event.59.a:"孤注一掷。"

 SAN_event.60.t:"神社联合防区"
 SAN_event.60.desc:"信仰化坚垒，各岛神龛守忠诚，灵光佑战旗。我们加强了各岛重要神社的防御。这些地点不仅是宗教中心，更是地脉节点。通过巫女与武士的协同，我们将信仰中心转化为了能够产生局部干扰场的防御节点。神灵的庇护化作了具体的物理屏障，守护着每一寸被占领的国土。"
 SAN_event.60.a:"神佑海祇。"

 SAN_event.61.t:"后勤自动化的尝试"
 SAN_event.61.desc:"机关转不停，物资流转极速间，军需无匮乏。利用从遗迹中逆向工程获得的齿轮传动技术，我们开始在主要后勤节点尝试自动化作业。物资的装卸与分类变得更加高效，极大减少了由于人为错误导致的延误。一个高效的后勤网络是现代战争的基础，我们将用效率碾碎敌人的固守。"
 SAN_event.61.a:"物流革新。"

 SAN_event.62.t:"组建深海舰队"
 SAN_event.62.desc:"潜行影无踪，深海突袭乱敌心，浪涛任我行。我们的实验性潜水艇编队正式入役。这些能在水下静默航行的‘影之鱼’，将专门负责偷袭敌人的主力舰。当幕府军自豪于他们的巨炮时，来自水底的杀机将让他们彻底绝望。深海，是海祇岛民最后的猎场。海洋之魂正在觉醒。"
 SAN_event.62.a:"深海惊雷。"

 SAN_event.63.t:"重装突击兵训练"
 SAN_event.63.desc:"重甲震大地，刀光劈开死神门，先阵定胜勋。针对稻妻城外的重型堡垒，我们专门训练了一批配备了全身板甲和重型元素盾牌的突击兵。他们将负责在总攻中强行撕开城门的封锁。虽然训练极其艰苦，但这些重装勇士将成为反抗军最锋利的矛头，无坚不摧。铁甲之躯，勇往直前。"
 SAN_event.63.a:"重装上阵。"

 SAN_event.64.t:"合成纤维研究"
 SAN_event.64.desc:"蚕丝合秘金，坚韧轻盈胜皮革，护卫勇士心。利用炼金术和植物提取物，我们成功研发出了第一批合成防弹织物。这种材料不仅轻便，且对雷元素攻击有极佳的抗性。全军普及这种新型护甲，将大幅降低我们的战损。科技的微小进步，转化为战场上实实在在的生命保障。"
 SAN_event.64.a:"材料革命。"

 SAN_event.65.t:"国民兵役法实施"
 SAN_event.65.desc:"户籍归一册，保家卫国是英豪，义务重如山。为了确保长期的兵源补充，我们实施了公平的国民兵役制度。心海大人强调，军队应与民众同呼吸。这种体制化的动员，确保了反抗军在连续会战后仍能迅速恢复元气。国家不再是高高在上的统治者，而是每个人共同奋斗的事业。"
 SAN_event.65.a:"全民皆兵。"

 SAN_event.66.t:"‘心海’级巨炮"
 SAN_event.66.desc:"巨管吐烟火，雷鸣声里碎城墙，威慑传四疆。我们的重工厂制造出了稻妻历史上最大口径的列车炮。这种被命名为‘心海’级的巨炮，能够发射特制的元素爆裂弹，足以摧毁任何坚固的堡垒。当它在名椎滩试射时，连大地都在颤抖。这股压倒性的武力，将为决战画下句号。"
 SAN_event.66.a:"终极火力。"

 SAN_event.67.t:"实验性航空队组建"
 SAN_event.67.desc:"双翼掠长空，云端俯看战火飞，制空定乾坤。利用踏鞴砂的精密技术和炼金引擎，第一支木质双翼飞机中队成立了。虽然它们现在只能挂载少量炸弹，但这种跨时代的打击能力让幕府军无处躲藏。未来的天空将由海祇岛主宰。从高处落下的意志，比任何手段都更具威慑力。"
 SAN_event.67.a:"翱翔天际。"

 SAN_event.68.t:"全面战争体制确立"
 SAN_event.68.desc:"举国转齿轮，熔炉昼夜火不熄，决战志已立。反抗军指挥部正式宣布进入全面战争状态。民间所有的工业能力、所有的科研力量都已向战争倾斜。在这种极端的动员下，我们的生产数据正在呈指数级增长。当海祇岛化作一台高效的战争机器时，任何阻挡我们的敌人都将被碾碎。"
 SAN_event.68.a:"总动员令。"

 SAN_event.69.t:"渗透者报告"
 SAN_event.69.desc:"暗影潜城中，信号一发即动乱，稻妻梦已惊。潜伏在稻妻城的间谍发回了密报。天守阁内派系林立，勘定奉行已处于崩溃边缘。通过暗中资助那些失意的武士，我们已在内部制造了足够的混乱。当总攻发起的时刻，这座宏伟的都城将从内部开始燃烧。胜负，早已注定。"
 SAN_event.69.a:"等待时机。"

 SAN_event.70.t:"天守阁的总攻号角"
 SAN_event.70.desc:"雷雨决战时，万军齐发震天守，理想终有期。所有的准备已化作这一刻的爆发。心海大人在旗舰上亲自下达了进攻指令。海、陆、空三军在雷鸣声中同时发动了总攻。我们要直捣稻妻权力的心脏，终结眼狩令的暴政，为凡人的愿望争得一个永恒的归宿。为了海祇，进攻！"
 SAN_event.70.a:"为了新时代！"

 # ========================== 第三阶段：平定旧域 (71-110) ==========================
 SAN_event.71.t:"清籁岛的阴霾"
 SAN_event.71.desc:"雷云旋聚处，孤岛静谧锁旧愁，巫女叹悠悠。虽然内战告一段落，但南方的清籁岛依然被狂暴的雷暴锁死。那里曾是叛乱者的避难所，现在却成了文明的禁区。为了国家的安全与资源的拓展，我们必须派遣远征军。我们要揭开浅濑神社背后的秘密，让那片失落之地重归秩序。"
 SAN_event.71.a:"远征清籁。"

 SAN_event.72.t:"天云雷暴的封印"
 SAN_event.72.desc:"雷霆入掌握，古老契约现端倪，力量换和平。通过对浅濑响遗留咒术的研究，心海大人发现雷暴并非不可控。我们要尝试通过主观手段引导这股能量，而非盲目消除它。将自然的忿恨转化为守护领空的盾牌，这是海祇岛迈向科技强国的重要一步。雷光将不再伤人，而是为我所用。"
 SAN_event.72.a:"控制雷电。"

 SAN_event.73.t:"越石村的重筑"
 SAN_event.73.desc:"村舍现炊烟，渔船重归碧波间，民生复旧观。我们派出了第一批移居团队。曾经荒废的越石村在海祇行政员的组织下重新煥发生机。修缮后的房屋、发放的补助、以及新修的码头，让这些流离失所的民众重新找到了归属感。一个安宁的家园，是最好的政治动员。民心，在这里生根发芽。"
 SAN_event.73.a:"恢复生产。"

 SAN_event.74.t:"寻找百目鬼的遗产"
 SAN_event.74.desc:"海盗名声远，失落宝藏藏深渊，傲骨存世间。赤穗百目鬼，那位传奇海盗曾在这里留下了数之不尽的财富与航海日记。远征军正在雷暴的边缘搜索。找回这些遗产，不仅能极大地补充国库，更能为我们的海军提供那些失传的海战秘策。传承历史的勇武，重塑海祇的海洋雄风。"
 SAN_event.74.a:"打捞遗产。"

 SAN_event.75.t:"清籁丸的打捞"
 SAN_event.75.desc:"巨舰浮出海，星光垂泪映余辉，重整旗鼓飞。曾经的旗舰‘清籁丸’静静躺在沙滩上。我们动用了大型机械，试图将其整体打捞并修复。这不仅是一项繁重的工程，更是一种精神的图腾。当这艘承载着岛民希望的巨舰再次扬帆时，海祇岛在极端环境下的工程能力将令世界侧目。雄风不减。"
 SAN_event.75.a:"工程壮举。"

 SAN_event.76.t:"雷音权现的观测"
 SAN_event.76.desc:"忿恨化纯灵，电光石火映科考，凡人窥神意。雷音权现是纯粹雷元素的集合体。我们在安全距离建立了观测站。通过对其能量流动的分析，我们正在开发全新的元素波段传感器。这种技术将让我们的电子干扰和反侦察能力获得质的飞跃。神灵留下的忿恨，正转化为凡人的智慧基石。"
 SAN_event.76.a:"科学研究。"

 SAN_event.77.t:"浅濑神社的复兴"
 SAN_event.77.desc:"古刹钟声远，猫妖寝子守寂寥，文化传薪火。修复浅濑神社是收服清籁岛民心的核心。我们为那只固执的猫妖送去了修缮材料和它怀念的食物。当神社的大门重新开启时，清籁岛的历史与信仰也终于在海祇岛的羽翼下得到了延续。文化的力量，是比军队更持久的纽带。历史永存。"
 SAN_event.77.a:"重焕神圣。"

 SAN_event.78.t:"雷暴骑兵的特训"
 SAN_event.78.desc:"风雷穿林去，勇士无畏袭敌踪，速如闪电惊。我们在清籁岛恶劣的气候中组建了全新的‘雷暴突击队’。这些战士学会在狂风大雨中保持阵型，学会利用闪电的干扰进行渗透。他们将成为海祇岛在极端环境作战的王牌。当风暴来临时，就是他们出猎的时刻。影随雷行。"
 SAN_event.78.a:"精锐特训。"

 SAN_event.79.t:"清籁海军要塞"
 SAN_event.79.desc:"要塞锁海咽，巨型岸防指远洋，南疆守如磐。利用清籁岛破碎而险峻的南岸，我们修筑了一座大型自动化要塞。这里不仅部署了远程干扰塔，还配备了足以击穿重巡洋舰的轨道重炮。要塞的落成，彻底封锁了通向南方外海的咽喉。清籁岛，已成为海祇岛最坚不可摧的南部屏障。"
 SAN_event.79.a:"确立主权。"

 SAN_event.80.t:"雷云能量捕获"
 SAN_event.80.desc:"集电通高天，天云能量注熔炉，工业新纪元。我们在天云峠中心建立了巨大的元素集电器。这套装置能将空中狂暴的闪电转化为稳定的工业电力。通过跨海电缆，清籁岛的能源正在反哺海祇全岛。这种对自然灾难的征服，标志着我们已正式步入元素能源的自由时代。电力即未来。"
 SAN_event.80.a:"能源自给。"

 SAN_event.81.t:"鹤观迷雾的挑战"
 SAN_event.81.desc:"迷雾笼罩处，数千载轮回未休，孤魂复何求。那是一座被时间遗忘的岛屿。我们的侦察船在迷雾中迷失了数次，只有通过特殊的炼金灯塔才能勉强定位。鹤观岛不仅仅是领土的扩张，更是一个古老文明的墓地。我们要去揭开那里的秘密，将迷途的灵魂带回光明。远征鹤观。"
 SAN_event.81.a:"破雾而行。"

 SAN_event.82.t:"驱散千年的迷雾"
 SAN_event.82.desc:"金羽划长空，迷障崩颓现真身，阳光照故土。通过对阿瑠之羽的解析，我们掌握了驱散鹤观迷雾的钥匙。在惑饲滩，第一座驱雾灯塔散发出了神圣的白光。随着迷雾的退散，岛屿的真实轮廓终于在数千年后第一次展现在世人面前。一个新世界的门户，正缓缓向海祇岛开启。迷梦初醒。"
 SAN_event.82.a:"重见天日。"

 SAN_event.83.t:"救赎阿瑠的灵魂"
 SAN_event.83.desc:"少年歌声远，菅名山影迷雾散，救赎终有期。心海大人亲自主持了对阿瑠灵魂的超度仪式。通过修补地脉的裂痕，那长达数千年的血祭轮回终于宣告终结。少年的歌声将不再伴随着惨剧，而是在海祇岛的港口悠扬回响。这种对人性的最高救赎，极大地提升了政府的神圣感。正义已达。"
 SAN_event.83.a:"安息吧，阿瑠。"

 SAN_event.84.t:"卡帕奇莉的遗泽"
 SAN_event.84.desc:"雷鸟翼扇动，残留威能定疆场，科学继神光。雷之魔鸟的残余能量被我们系统地收集。这种带有地脉特征的高频雷元素，成为了研制远程雷达的关键材料。我们正在将神话时代的悲剧转化为现代军事的利器。科学的力量正在剥离迷信，将神灵的余晖转化为守护国家的技术基石。智慧传承。"
 SAN_event.84.a:"掌握技术。"

 SAN_event.85.t:"茂知祭场的改革"
 SAN_event.85.desc:"祭台现新风，科学研究代迷信，古迹焕新生。我们废除了野蛮的旧式祭祀，将茂知祭场改造成了一座综合性的科研中心。学者们在这里研究古代文字，翻译失落的历史。我们要用知识的灯火取代血腥的仪式。鹤观，将从一座被诅咒的死岛，成长为海祇岛最前沿的科学中心。文明跃进。"
 SAN_event.85.a:"开启民智。"

 SAN_event.86.t:"菅名山深层采矿"
 SAN_event.86.desc:"山腹藏秘金，大型钻机震幽冥，资源富万家。菅名山那巨大的坑穴之下埋藏着极其罕见的铬矿。在心海大人的授权下，我们启动了深层机械采矿工程。这种特种矿产是制造高压水炮与航空合金的必需品。海祇岛的工业体系，正在因为鹤观的资源加入而变得完整且不可战胜。矿脉即命脉。"
 SAN_event.86.a:"深入挖掘。"

 SAN_event.87.t:"知比山气象观测点"
 SAN_event.87.desc:"山巅观云影，气象变化尽掌控，四海任我行。知比山的高度提供了全稻妻最广阔的视野。我们在这里建立了全天候的自动化观测站。精准的台风预报和雷暴监控，让我们的舰队在海战中能够永远占据上风向。通过掌控自然的变化规律，我们已经在这场跨海博弈中赢得了气象制高点。洞察天机。"
 SAN_event.87.a:"监控风云。"

 SAN_event.88.t:"对抗深渊侵蚀"
 SAN_event.88.desc:"幽影袭边界，兽境猎犬乱乾坤，战阵定乾坤。那些来自深渊的‘兽境猎犬’在鹤观周边的缝隙中游荡。我们制定了专门的特种作战条令。利用特定的元素中和剂，我们大大减轻了士兵受到的腐蚀伤害。这种与深渊对抗的宝贵经验，让我们的军队成为了提瓦特大陆上最专业、最坚韧的防线。守护清净。"
 SAN_event.88.a:"清除邪祟。"

 SAN_event.89.t:"远古文明大翻译"
 SAN_event.89.desc:"壁画语千载，石根文字现真意，历史复全观。通过对鹤观遗迹的深度翻译，我们重构了数千年前的天钉坠落历史。这种宏大的历史视野，让我们明白了海祇岛民不仅仅是难民的后裔，更是文明的守望者。知识的回归，为国家提供了深厚的文化自信。我们正在继承那段被神灵封印的遗产。重塑根基。"
 SAN_event.89.a:"文化觉醒。"

 SAN_event.90.t:"全域雷达网的合拢"
 SAN_event.90.desc:"电波织密网，海天变化无遗漏，入侵莫敢前。在知比山和天云峠的雷达站落成后，一套覆盖全稻妻南方的预警网络正式合拢。任何未授权的飞行器或舰船，只要进入这片海域，就会在我们的屏幕上显现。这种电子化的边境管理，让海祇岛的安全感提升到了前所未有的高度。铁幕已立。"
 SAN_event.90.a:"天罗地网。"

 SAN_event.91.t:"海祇巡抚制度"
 SAN_event.91.desc:"巫女巡四海，领袖恩威抚人心，版图定永恒。心海大人亲自向清籁与鹤观派驻巡抚团队。这不仅仅是行政的管理，更是权力的具象化。通过建立直接隶属于珊瑚宫的行政署，我们彻底终结了这些岛屿的无序状态。三个原本孤立的领土，现在被紧密地缝合在一个高效的体制之下。海祇大成。"
 SAN_event.91.a:"天下一家。"

 SAN_event.92.t:"老兵安置计划"
 SAN_event.92.desc:"解甲归田日，新领土上定根基，民兵守边疆。为了巩固新领土，我们鼓励反抗军老兵在清籁和鹤观定居。政府提供了充足的农具与种畜。这些定居者不仅是农民，更是随时可以响应号召的专业民兵。通过人口的结构性调整，我们确保了边境地区的绝对忠诚与稳定。武德长存。"
 SAN_event.92.a:"拓土开疆。"

 SAN_event.93.t:"防空要塞网络"
 SAN_event.93.desc:"仰望碧空净，防空重炮织火力，天际莫敢犯。针对日益增长的航空威胁，我们在各岛高地修筑了密集的防空阵地。这些阵地互相支援，形成了一个致命的火网。海祇岛的领空不再是敌方飞机的后花园。我们要用密集的弹幕，告诉所有试图从高天降下打击的人：这里是不可逾越的死线。空天卫士。"
 SAN_event.93.a:"锁定蓝天。"

 SAN_event.94.t:"诸岛关税同盟"
 SAN_event.94.desc:"贸易无壁垒，珍珠矿产物流转，经济合伟力。我们正式建立了海祇岛、清籁与鹤观的统一大市场。取消了内部所有的过路费与关税。海祇的粮食、清籁的能源与鹤观的矿产实现了极速互补。这种深度的经济整合，让国家的总产值呈爆发式增长。一个强大的区域经济强权，正在东方崛起。富国强兵。"
 SAN_event.94.a:"共同繁荣。"

 SAN_event.95.t:"外海防御司令部"
 SAN_event.95.desc:"将略统全域，数字化指挥链路，战力定巅峰。为了管理日益庞大的海疆，我们成立了独立的‘外海防御司令部’。该机构统筹三岛的防御、后勤与人员调动。通过现代化的指挥链路，我们实现了资源的跨区域最优调配。无论哪一点受到威胁，全域的支援都会瞬间抵达。统一战线。"
 SAN_event.95.a:"完善指挥。"

 SAN_event.96.t:"海洋霸权确立"
 SAN_event.96.desc:"巨舰巡四海，蓝色旗帜定尊严，主宰波涛里。海祇岛正式宣布对全稻妻南部海域拥有绝对主权。我们强大的巡逻舰队开始执行常态化的监视任务。任何过往商船都必须向我们通报。这种海洋霸权的确立，不仅带来了丰厚的过路费收入，更让海祇大御神的荣光重新照耀了这片古老的海洋。主宰一切。"
 SAN_event.96.a:"蔚蓝光辉。"

 SAN_event.97.t:"海军航空兵的诞生"
 SAN_event.97.desc:"战隼掠海翼，俯冲投弹乱敌营，制空制海一。在清籁岛的训练基地，第一批海军飞行员完成了科目演练。他们学会在狭窄的海滩和起伏的甲板上起降。这些‘海隼’赋予了我们的舰队延伸数公里的打击范围。空中优势与海上力量的结合，标志着海祇岛军事理论已经全面超越了时代。高天海影。"
 SAN_event.97.a:"海空一体。"

 SAN_event.98.t:"诸岛后勤枢纽"
 SAN_event.98.desc:"补给永连绵，大型枢纽通诸岛，战争无匮乏。我们在鹤观与清籁之间建立了大型自动化补给基地。通过地脉共振原理开发的短途运输阵法，物资的流转不再受限于风浪。枢纽的建立确保了前线在面对任何突发情况时，都能在24小时内获得充足的战略储备。后勤，是胜利的唯一基石。无忧中枢。"
 SAN_event.98.a:"完善物流。"

 SAN_event.99.t:"全域行政整合"
 SAN_event.99.desc:"法度归一律，高效行政肃纲常，秩序定民心。心海大人签署了《海祇领地统一管理法案》。我们在新岛屿设立了专业的分支管理机构，取代了落后的部落自治。通过统一的法律、统一的度量衡和统一的教育，我们将这三片原本陌生的领土，紧紧凝聚成了一个拥有共同意志的伟大国度。大同社会。"
 SAN_event.99.a:"万政归宗。"

 SAN_event.100.t:"全岛防御公约"
 SAN_event.100.desc:"唇齿相依日，万众一心卫家园，外敌莫敢欺。我们与各岛签署了共同防御协定：一岛受难，诸岛同讨。这份公约不仅仅是政治文书，更是所有岛民命运的纽带。在这种集体防御体制下，任何潜在的侵略者都必须面对整个南部群岛的怒火。团结的力量，比任何堡垒都更能带给人安宁。血盟永存。"
 SAN_event.100.a:"牢不可破。"

 SAN_event.101.t:"鹤观资源深加工中心"
 SAN_event.101.desc:"矿砂化秘金，深加工中增产值，工业冠群伦。我们不满足于仅仅出口原材料。在鹤观岛，一座现代化的选矿与精炼厂已经投产。我们生产的高纯度合金不仅满足了国内需求，还成为了赚取外汇的战略物资。产业链的延伸极大地增强了我们的经济主权。在火与铁的交响中，海祇制造正在崛起。工业皇冠。"
 SAN_event.101.a:"提升效益。"

 SAN_event.102.t:"仪式石能量研究"
 SAN_event.102.desc:"古石藏秘法，重组频率现威能，科技定乾坤。通过对鹤观祭祀石的物理重组，我们发现了一种极其高效的元素储存方式。这种新型蓄电池的容量是传统容器的十倍。这标志着我们的单兵武器和自动化机械将获得更长的续航时间。古代的巫术，在科学的手术刀下，正在焕发出改变世界的力量。能量革命。"
 SAN_event.102.a:"技术突破。"

 SAN_event.103.t:"清籁风暴预测中心"
 SAN_event.103.desc:"云端望雷电，精准预报定航向，风波亦无妨。我们在清籁岛建立了全天候气象中心。通过对大气电荷的精密监控，我们能提前数小时预知海上风暴的路径。这让我们的海军可以在最完美的时机发动奇袭，也将极端气象化作了我们的战术屏障。自然不再是主宰，我们才是。气象掌控。"
 SAN_event.103.a:"预知未来。"

 SAN_event.104.t:"百目鬼余部的整合"
 SAN_event.104.desc:"义旗再扬日，海寇归心卫正途，骁勇震八荒。曾经跟随百目鬼的老海盗们向珊瑚宫宣誓效忠。这些在海洋上历经风霜的勇士，带来了最宝贵的海战经验和对复杂水域的直觉。我们将他们改编为‘海祇别动队’，专门执行最具风险的敌后打击任务。海洋猎犬，已重新入笼，随时准备出击。骁勇善战。"
 SAN_event.104.a:"海军强援。"

 SAN_event.105.t:"越石村渔业标准化"
 SAN_event.105.desc:"银鳞满载归，工业捕捞丰粮仓，民生足有余。我们将现代管理技术引入了传统的渔业。通过建立冷链物流和标准化的加工作坊，清籁岛的渔获不再受季节限制。这种稳定的食品供应极大地增强了国家的战争潜力。国民的餐桌丰富了，国家的底气也就足了。民以食为天。渔歌唱晚。"
 SAN_event.105.a:"保障供给。"

 SAN_event.106.t:"天云峰科研基地"
 SAN_event.106.desc:"高山望远瞩，尖端科研育人才，智慧通高天。在天云峠的最高处，一座跨学科科研基地落成。这里汇集了来自全稻妻最优秀的头脑，研究领域涵盖高能物理、地脉动力与航天雏形。我们要在这里攻克那些困扰世人千年的科学难题。知识，就是海祇岛通向伟大的入场券。智慧巅峰。"
 SAN_event.106.a:"科学至上。"

 SAN_event.107.t:"元素护盾技术"
 SAN_event.107.desc:"光盾御外侮，雷火不侵佑兵锋，科技立屏障。受雷鸟能量场启发，我们研制出了第一代便携式元素护盾发生器。这种装置能有效抵御地毯式轰炸的冲击波。我们要为每一个突击师配备这种护盾，让我们的战士在烈火中亦能如履平地。科技，筑起了保卫生命的第一道防线。盾甲神兵。"
 SAN_event.107.a:"无懈可击。"

 SAN_event.108.t:"外岛关税同盟安排"
 SAN_event.108.desc:"货通三岛间，经济命脉紧相连，同盟兴万利。心海大人签署了《离岛与海祇自由贸易协定》。这标志着一个以海祇岛为中心的海洋经济共同体正式确立。通过资本的自由流转，我们正在快速积累财富，为接下来的战略扩张提供充足的资金保障。经济的统一，是政治合一的前奏。财源广进。"
 SAN_event.108.a:"加强同盟。"

 SAN_event.109.t:"海祇大御神的荣光"
 SAN_event.109.desc:"信仰化剑芒，神像光辉映蓝洋，主宰定民心。通过在各岛建立宏伟的大御神像，我们将信仰的力量具象化。这种神圣感的建立，不仅极大地提高了民众的战争支持度，更让我们的统治获得了一层神圣不可侵犯的色彩。信仰是不灭的火种，正照耀着我们走向霸权之路。神威远播。"
 SAN_event.109.a:"神佑我民。"

 SAN_event.110.t:"外海远征军团"
 SAN_event.110.desc:"铁流向汪洋，正义之师显神威，志气贯苍穹。一支由各岛精锐组成的远征军团已在海祇港集结完毕。他们配备了最先进的自动步枪和便携式电台。这支部队的目标不再仅仅是防御，而是随时准备响应心海大人的号召，去提瓦特的任何一个角落播撒正义的火种。海洋之子，无所畏惧。远征开始。"
 SAN_event.110.a:"迈向巅峰。"

 # ========================== 第四阶段：白夜遗产 (111-140) ==========================
 SAN_event.111.t:"深渊的门户"
 SAN_event.111.desc:"天崩地裂后，深渊遗迹藏忧，白夜几时休。现人神巫女大人宣布开启渊下宫的尘封封印。那是一个被世界遗忘的维度，隐藏着我们祖先最辉煌也最痛苦的记忆。远征队已在蛇肠之路集结，我们要深入那无尽的黑暗，带回属于白夜国的失落科技。历史的真相，正等待着我们的挖掘。"
 SAN_event.111.a:"深入海渊。"

 SAN_event.112.t:"日月前事"
 SAN_event.112.desc:"禁书录旧史，第一王座现真容，天理亦惊心。我们终于找回了那部被天理严令销毁的《日月前事》。书中记载的历史彻底颠覆了我们对提瓦特的认知。心海大人深知此书的危险，但为了海祇民的尊严，我们绝不能再生活在神灵的谎言之中。掌握了过去，就掌握了未来的定义权。真相万岁。"
 SAN_event.112.a:"揭开禁忌。"

 SAN_event.113.t:"大日御舆的重燃"
 SAN_event.113.desc:"人造日升起，黑暗龙嗣尽遁逃，白夜映辉煌。在大本营工程师的努力下，大日御舆的能源核心重新焕发了光芒。地底的太阳再次照亮了渊下宫的每一处浮岛。这不仅是能源的突破，更是文明对黑暗的最终胜利。大日御舆的重燃，预示着海祇岛正在接收一个超越时代的科技遗产。永恒之光。"
 SAN_event.113.a:"重启太阳。"

 SAN_event.114.t:"地走官的严酷训练"
 SAN_event.114.desc:"圈内一人立，长枪错落莫敢伤，精锐定江山。我们要恢复白夜国‘地走官’那近乎自虐的选拔制度。这些精英战士在完全黑暗的环境中磨炼直觉。他们将成为海祇岛最精锐的特种部队，专门负责处理深渊侵蚀和高难度的敌后破坏任务。唯有经过烈火淬炼的意志，方能主宰战争。百炼成钢。"
 SAN_event.114.a:"地走官集结。"

 SAN_event.115.t:"遏制龙蜥的计划"
 SAN_event.115.desc:"龙嗣伏深渊，化学武器现神威，禁区定乾坤。深海龙蜥曾是先祖的梦魇，但现在我们将使用科学手段来终结这一威胁。通过研发专门的神经毒素和频率干扰器，我们将龙蜥群限制在受控的实验区内。这种对古老威胁的有效遏制，为我们开发渊下宫的资源扫平了最后的障碍。自然的臣服。"
 SAN_event.115.a:"掌控地底。"

 SAN_event.116.t:"常夜灵庙的考古"
 SAN_event.116.desc:"幽冥灵庙中，空间叠影藏玄机，古迹语沉沉。我们的考古队在常夜灵庙发现了关于相位传送的古老记录。通过逆向工程，我们正尝试在三岛之间建立起瞬时物资传送点。这种跨越空间的后勤能力，将让海祇岛在战略机动性上达到神灵的高度。历史的断章，正在拼凑出未来的版图。时空之钥。"
 SAN_event.116.a:"解码相位。"

 SAN_event.117.t:"蛇心之地的仪式"
 SAN_event.117.desc:"蛇心祭坛前，维度交织现灵光，定力守国疆。蛇心之地是地脉交汇的奇点。心海大人亲自指导我们利用这里的特殊频率。通过布置元素稳定器，我们建立了一套能够屏蔽外部地脉扫描的隐蔽系统。整个国家正在从神灵的监视下隐去，我们要在这片阴影中积蓄力量。隐秘而伟大。"
 SAN_event.117.a:"维稳地脉。"

 SAN_event.118.t:"渊科技的整合"
 SAN_event.118.desc:"远古遇现代，齿轮符文共齐鸣，工业冠古今。我们将白夜国的远古符文与踏鞴砂的精密机械进行了完美的结合。第一台集成式渊能引擎已经下线。这种技术的应用，让我们的坦克和飞机拥有了远超同行的能量密度。一种名为‘海祇制造’的新型工业标准，正在重新定义提瓦特的强国之路。技术巅峰。"
 SAN_event.118.a:"工业革命。"

 SAN_event.119.t:"渊下宫联合体"
 SAN_event.119.desc:"地底工厂林，自动化链转不休，战力定巅峰。在广阔的地底空间，我们建立了完全封闭的工业联合体。由于不受地表轰炸的影响，这里成为了国家最稳固的战略后方。每一架下线的战机都涂上了象征深渊的深蓝色。渊下宫的产能，正在将反抗军的武装力量推向一个不可思议的高度。铁底雄心。"
 SAN_event.119.a:"全速生产。"

 SAN_event.120.t:"古代潜航舰修复"
 SAN_event.120.desc:"旧舰复生威，深海猎手出伏击，波涛任我驰。考古队从大日御舆的遗址中挖掘出了古代潜水艇的蓝图。通过现代材料的加固，第一艘全金属深海潜艇‘白夜号’正式下水。它能在数千米的深海静默巡航。幕府的水面舰艇在它面前将如待宰的羔羊。海洋，已经成了我们的内湖。深海霸权。"
 SAN_event.120.a:"幽灵出击。"

 SAN_event.121.t:"时间之执政的信仰"
 SAN_event.121.desc:"时刻统万物，卡伊洛斯佑民心，信仰志不移。我们要重新确立对‘时间之执政’的崇拜。这不仅仅是宗教，更是一种对‘必然胜利’的坚定信念。心海大人强调，我们是时刻的守望者。这种超越魔神的信仰体系，极大地增强了国民的心理韧性。在时间的洪流中，我们已立于不败之地。信仰新生。"
 SAN_event.121.a:"神圣归依。"

 SAN_event.122.t:"真相的扩散行动"
 SAN_event.122.desc:"密卷传诸国，揭穿天理伪秩序，革命火种燃。我们不再将《日月前事》视作秘密。通过秘密印刷厂，无数的小册子正通过商路传往提瓦特各国。我们要让每一个凡人都知道：神灵的权柄并非天经地义。思想的觉醒将引发终极的革命，而海祇岛就是照亮黑暗的第一座灯塔。言论自由。"
 SAN_event.122.a:"播撒星火。"

 SAN_event.123.t:"白夜军制的复兴"
 SAN_event.123.desc:"古礼入军营，严明纪律肃杀声，战旗定八方。我们将白夜国的‘地走官’编制引入了现有的反抗军。建立了一套基于功勋与专业技能的晋升系统。这种制度消除了贵族与平民的隔阂，让最有才华的人领导军队。一支拥有古老灵魂和现代装备的十字军，正等待着统帅的最终号令。军团重铸。"
 SAN_event.123.a:"强化纪律。"

 SAN_event.124.t:"高压水元素炮"
 SAN_event.124.desc:"激流斩铁甲，海祇之怒震九天，威力破苍穹。利用奥罗巴斯的血枝珊瑚技术，我们研发出了第一门大功率高压水炮。这种武器能发射比钢铁更硬的高速水箭，轻易贯穿敌方重坦的装甲。这是海洋赋予我们的最纯粹的打击手段。在蔚蓝的怒火面前，一切坚固的防线都将瓦解。海洋之枪。"
 SAN_event.124.a:"水力全开。"

 SAN_event.125.t:"深渊情报局"
 SAN_event.125.desc:"探子下幽冥，监控世界缝隙间，敌踪尽掌控。我们成立了专门的‘深渊情报局’。通过在渊下宫布置的感应网，我们能监测到提瓦特地脉的细微震动，从而提前发现敌人的战略移动。这种上帝视角般的侦察手段，让我们的决策永远领先于时代。在阴影中注视，在阳光下致胜。情报至上。"
 SAN_event.125.a:"眼观六路。"

 SAN_event.126.t:"大日御舆能源网"
 SAN_event.126.desc:"金线连三岛，恒星能源注生活，国家兴万代。通过特殊的超导材料，我们将大日御舆的无尽能量输送到了地表。每一个岛民的家庭都用上了这种清洁的能源。这彻底摆脱了对煤炭和石油的依赖。能源的自由为工业的大爆发提供了肥沃的土壤，海祇岛已率先迈入后能源时代。光明未来。"
 SAN_event.126.a:"能源革命。"

 SAN_event.127.t:"地底避难所网络"
 SAN_event.127.desc:"堡垒深藏下，任凭地表火冲天，希望永不熄。在渊下宫的坚硬岩层中，我们建立了一套覆盖全国的避难系统。即使地表遭到毁灭性的打击，我们的文明火种依然能在这里延续。每一座避难所都配备了完善的循环系统和工厂。这是我们要对抗天理最坚底的底牌。最后堡垒。"
 SAN_event.127.a:"居安思危。"

 SAN_event.128.t:"回归祖先的土地"
 SAN_event.128.desc:"海民归渊底，狭间新街见笑容，故土重温情。第一批志愿者已经在地底的‘新狭间街’定居。我们要证明，渊下宫不再是阴暗的囚牢，而是现代化的宜居区。通过对光照和植被的炼金控制，地底的生活甚至比地表更加优越。人口的这种战略分布，极大地增强了国家的生存韧性。两界合一。"
 SAN_event.128.a:"迁徙新居。"

 SAN_event.129.t:"古代档案的解密"
 SAN_event.129.desc:"符号现真意，失传炼金育新篇，智慧冠提瓦特。我们破解了渊下宫机密室中最后一批量子档案。里面记载的关于第一王座时期的基因改造技术令我们的科学家惊叹。我们要将这些知识转化为提升国民身体素质与大脑潜能的生物工程。人类的极限，正在因为历史的回归而不断被打破。进化开始。"
 SAN_event.129.a:"掌握真理。"

 SAN_event.130.t:"统一战线的正式确立"
 SAN_event.130.desc:"地表与地底，珊瑚白夜共呼吸，意志定永恒。心海大人签署了《两界统一宣言》。这标志着海祇岛与渊下宫在政治上正式融合为一个整体。无论是阳光下的珍珠，还是暗影里的遗迹，都只服从于唯一的现人神巫女。这种前所未有的国家凝聚力，让我们的行政效率达到了顶峰。团结一致。"
 SAN_event.130.a:"共铸辉煌。"

 SAN_event.131.t:"深渊资源的战略控制"
 SAN_event.131.desc:"秘矿冠全球，出口贸易握筹码，经济霸主路。渊下宫出产的龙骨花凝珠和特种元素晶体在国际市场上是绝无仅有的。我们确立了国家垄断的出口制度。通过这些高价值物资，我们控制了提瓦特高端制造业的供应链。任何试图制裁我们的国家，都必须考虑失去这些关键材料的后果。经济武器。"
 SAN_event.131.a:"资源垄断。"

 SAN_event.132.t:"深海装甲步兵"
 SAN_event.132.desc:"铁甲震渊底，步兵外骨骼现世，勇士力千钧。利用海渊特产的抗压合金，我们研制出了第一代动力外骨骼。装备了这种装甲的士兵可以单手操纵重型火炮，且在极端地形如履平地。这种‘超级士兵’的出现，将彻底改写陆战的游戏规则。凡人的躯体，正因为科技而获得神一般的力量。钢铁洪流。"
 SAN_event.132.a:"机械飞升。"

 SAN_event.133.t:"白夜教义的应用"
 SAN_event.133.desc:"战法出古卷，奇兵诡道算无遗，胜负早先定。心海大人将白夜国的‘狭间控制’理论转化为现代的步炮协同教义。我们强调利用地形的极致切割来消灭优势敌军。每一场会战都被精确计算成了一个个必胜的数学模型。这种理性的光芒，正带领我们的军队走向一个又一个巅峰。战争艺术。"
 SAN_event.133.a:"算无遗策。"

 SAN_event.134.t:"渊下最高司令部"
 SAN_event.134.desc:"司令驻深渊，全局调度无盲区，军令定乾坤。为了统一指挥日益复杂的跨维度战场，我们成立了‘渊下最高司令部’。这里集成了最先进的地脉通信站和全息沙盘。海、陆、空、潜、渊五大军种在这里实现了实时的数据共享。这种降维打击级别的指挥能力，是我们获得最终胜利的技术保障。运筹帷幄。"
 SAN_event.134.a:"总揽全局。"

 SAN_event.135.t:"古代战术的现代重构"
 SAN_event.135.desc:"阵型变幻疾，小组协作现威力，单兵亦英雄。我们从先民对抗龙蜥的记录中，提炼出了高效的小组作战标准。这种去中心化的指挥模式，让每一个战斗小组在失去联络时仍能发挥出最大的杀伤力。这种坚韧与灵活的结合，让我们的军队成为了任何敌人的噩梦。白夜精神，永垂不朽。战术创新。"
 SAN_event.135.a:"精益求精。"

 SAN_event.136.t:"渊下储备训练计划"
 SAN_event.136.desc:"全民皆英豪，地底训练育勇士，战备永不停。所有的渊下宫移民都必须接受为期三月的地走官基础训练。这种高密度的国防教育，让整个地底社会都保持着极高的战备状态。渊下宫不再仅仅是工业中心，它已经变成了一个能随时喷发出千万战士的庞大兵营。国家的力量，源于每个国民。枕戈待旦。"
 SAN_event.136.a:"全民战备。"

 SAN_event.137.t:"垂直补给链的大整合"
 SAN_event.137.desc:"升降机隆隆，地表深渊共流转，后勤无断绝。我们建立了一套庞大的垂直重载运输系统，直接贯穿海床连接珊瑚宫与大日御舆。物资的跨维度流转时间从数天缩短至数小时。这种极致的物流效率，确保了国家在面对全方位封锁时依然能维持高质量的运转。补给是血液，而我们的血液正加速奔流。物流巅峰。"
 SAN_event.137.a:"畅通无阻。"

 SAN_event.138.t:"白夜文化的全面复兴"
 SAN_event.138.desc:"服饰复古韵，节祭歌舞映古今，自豪满心田。我们要恢复白夜国的节庆与服饰。通过这种文化的回归，我们找回了海祇民作为‘第一王座孑遗’的尊贵身份感。这种深厚的民族自豪感转化为了强大的国家意志。我们不再是流亡者的后裔，而是提瓦特真理的继承者。文化的力量，无懈可击。复兴盛世。"
 SAN_event.138.a:"重塑自尊。"

 SAN_event.139.t:"两界意志的终极合流"
 SAN_event.139.desc:"旗帜映白夜，珍珠白月共辉映，国家定万年。心海大人在重燃的大日御舆前宣布：海祇岛与渊下宫的意志已完全合流。我们是一个文明，一个民族，一个不可分割的整体。这种从灵魂深处的统一，让任何外部的离间都变得徒劳。我们正站在历史的顶端，准备向着更高的目标进发。大哉海祇。"
 SAN_event.139.a:"万众一心。"

 SAN_event.140.t:"最终考古学大综合"
 SAN_event.140.desc:"知识汇成海，引领国家向高天，智慧冠寰宇。所有的解密、考古与技术研究已汇总成一套完整的《白夜百科全书》。它不仅是过去的记录，更是通向未来的操作手册。我们要建立一所白夜大学，将这些失落的珍珠转化为推动国家全面现代化的核心动力。历史是我们的阶梯，指向无限。智慧永存。"
 SAN_event.140.a:"开启未来。"

 # ========================== 第五阶段：战后构想 (141-180) ==========================
 SAN_event.141.t:"时代的十字路口"
 SAN_event.141.desc:"幕府已成梦，未来稻妻何处去，辩论定乾坤。内战的硝烟已散，我们要决定战后稻妻的命运。心海大人在珊瑚宫举行了为期一周的‘未来研讨会’。每一个岛民都在思考：是拥抱绝对的神权以求稳，还是开启民主的共和以求强，亦或是发动终极的革命去挑战天空？命运，正握在我们的选票与刀锋上。"
 SAN_event.141.a:"抉择之时。"

 # --- 路线A：现人神绝对权威 (142-154) ---
 SAN_event.142.t:"现人神，唯一的神"
 SAN_event.142.desc:"神谕定乾坤，珊瑚宫内现圣芒，众生皆俯首。为了维持战后极其不稳的秩序，我们决定赋予心海大人绝对的世俗与宗教权力。她不再仅仅是领袖，而是海祇大御神的化身。所有政令即是神谕，所有质疑皆为亵渎。通过这种高度集权的统治，我们将实现海祇岛千年的绝对稳定。秩序高于一切。"
 SAN_event.142.a:"神威永存。"

 SAN_event.143.t:"大蛇正统化"
 SAN_event.143.desc:"大蛇尊位起，鸣神残留尽清洗，信仰归一宗。我们要正式确立大蛇远吕羽氏尊为稻妻唯一的真神。原本的鸣神大社被改为海祇分社。通过对思想的彻底清洗，我们消除了所有可能导致分裂的文化苗头。在一个声音、一个信仰的感召下，整个民族将变成一柄不可摧毁的战锤。信仰的铁拳。"
 SAN_event.143.a:"清洗异端。"

 SAN_event.144.t:"神职行政官制度"
 SAN_event.144.desc:"官位即祭司，行政职能带圣威，服从是美德。我们建立了一套全新的行政体系，所有的政府官员必须由受过神学考核的巫女或祭司担任。这种体制将减少无意义的行政磨损，民众对政策的执行力得到了质的飞跃。每一道政令都带有不可违抗的神圣性。海祇岛正在变成一个完美的宗教城邦。神权统治。"
 SAN_event.144.a:"强化集权。"

 SAN_event.145.t:"国家单一工业支柱"
 SAN_event.145.desc:"熔炉归神领，所有资源注军工，威慑震四方。所有的自由竞争被取消，全国的工业能力被整合进一个庞大的国家军工复合体。在现人神的指导下，生产效率被推向了极限。每一颗铆钉都是为了扩张而铸造。这种极致的资源集中，让我们的军事实力在短期内实现了爆炸式增长。战争机器，永不熄火。"
 SAN_event.145.a:"工业统制。"

 SAN_event.146.t:"神圣军事洗脑"
 SAN_event.146.desc:"战死为荣光，灵魂归于大御神，勇士无所惧。军队中推行了极端的忠诚教育。士兵们被告知，为现人神大人战死是通往彼岸的唯一捷径。这种狂热的战意让我们的部队在冲锋时完全无视伤亡。任何常规的战术在这些宗教十字军面前都变得软弱无力。我们是神灵的惩戒之剑。死战不退。"
 SAN_event.146.a:"铸就忠魂。"

 SAN_event.147.t:"不信者的黄昏"
 SAN_event.147.desc:"阴影藏罪恶，圣卫突击净灵魂，国家保纯洁。为了确保国家意志的绝对统一，秘密警察‘圣卫队’开始在占领区清除那些拒绝宣誓效忠的异见分子。我们不需要杂音，只需要服从。虽然这带来了暂时的恐惧，但长远的稳定将证明这一切牺牲都是值得的。国家先于个人，信仰重于生命。纯洁运动。"
 SAN_event.147.a:"肃清内奸。"

 SAN_event.148.t:"神圣经济五年计划"
 SAN_event.148.desc:"计算定产出，每一米粮皆归公，国家保温饱。心海大人亲自签署了第一份战后经济总表。我们废除了自由市场，实行完全的指令性计划。每一份资源的分配都必须经过珊瑚宫的精密计算。这种效率至上的体制，虽然牺牲了多样性，却让我们在短短几年内就完成了国家的全面现代化建设。计划即正义。"
 SAN_event.148.a:"统揽财权。"

 SAN_event.149.t:"深渊先知网"
 SAN_event.149.desc:"水晶窥未来，巫女预言乱敌心，先机永掌握。利用地脉的残留回响，我们组建了一支‘先知部队’。她们能预判敌人的战略意图并直接通过意识传输告知前线指挥官。这种带有神秘色彩的技术，让我们的外交与军事行动始终处于降维打击的地位。在神谕的指引下，胜利已是必然。先知在上。"
 SAN_event.149.a:"预见胜果。"

 SAN_event.150.t:"最高诏令法案"
 SAN_event.150.desc:"金石刻法典，现人神权定万年，法律佑神位。这是决定国家长治久安的根本大法。法案明确规定了心海大人对所有岛屿、资源乃至生命的绝对处置权。法律不再是约束权力的工具，而是保护权力的圣火。我们要建立一套基于血缘与信仰的永恒秩序，让海祇岛在神灵的注视下步入千年盛世。法正国纲。"
 SAN_event.150.a:"法律定鼎。"

 SAN_event.151.t:"神圣扩张教义"
 SAN_event.151.desc:"版图无边际，蓝色海洋皆圣土，进军向远方。我们要将扩张主义写进国家的基因。海祇大御神的信仰不应仅限于三岛，而应覆盖整个提瓦特。远征军团正整装待发，我们要以‘解放’的名义去获取更多的生存空间和战略红利。海洋之子的征途，是星辰大海。为了荣光，扩张！"
 SAN_event.151.a:"圣战开启。"

 SAN_event.152.t:"海祇主宰者"
 SAN_event.152.desc:"万国皆称臣，东方霸权我独尊，威严盖古今。海祇岛已正式确立了对全稻妻及周边海域的绝对主权。我们不仅是军事上的强者，更是精神上的主宰。所有的邻邦都必须向珊瑚宫纳贡并请求神谕。这种绝对的霸权，让我们的国民在提瓦特大陆的任何一个角落都享有着至高无上的尊严。主宰一切。"
 SAN_event.152.a:"东方霸主。"

 SAN_event.153.t:"海祇神圣帝国"
 SAN_event.153.desc:"皇冠戴顶端，帝国初升照万里，威名震环宇。心海大人在万民的欢呼声中，于珊瑚宫正式登基为‘海祇神圣帝国’的第一任女皇。我们要恢复古老的贵族等级和宫廷礼仪，构建一套极其稳定的金字塔式社会。等级即秩序，服从即文明。帝国的太阳，将永不落下。皇权万岁。"
 SAN_event.153.a:"女皇陛下！"

 SAN_event.154.t:"终极神权体制"
 SAN_event.154.desc:"神人合为一，千年基业从此定，海祇佑万灵。所有的准备已化作这个完美的整体。从教育到工业，从摇篮到坟墓，国家的每一寸脉搏都随现人神的意志律动。海祇岛已成为一个完美的、神圣的意志化身，准备好在领袖的指引下，去书写那部属于强者的、血色与荣光交织的宏大史诗。神佑海祇！"
 SAN_event.154.a:"为了永恒的荣光！"

 # --- 路线B：海祇民主议会 (155-168) ---
 SAN_event.155.t:"民主的黎明"
 SAN_event.155.desc:"权力归民手，万岛一心建共和，自由满山河。心海大人主动宣布交出大部分行政权力，退居为精神领袖。我们要建立一个由各岛代表组成的‘诸岛联合议会’。每一个岛民的声音，无论其身份高低，都将通过选票在珊瑚宫的大厅内回响。民主，不再是异国的口号，而是我们的未来。自由万岁。"
 SAN_event.155.a:"开启民权。"

 SAN_event.156.t:"诸岛联合议会筹建"
 SAN_event.156.desc:"辩论定国策，多岛一心议蓝图，公正见阳光。我们正在各岛进行普选。从鸣神岛的商户到鹤观岛的矿工，每个人都在行使自己的神圣权利。议会将通过协商而非对抗来解决内部利益冲突。这种建立在共识基础上的体制，将铸就海祇岛最稳固、最具有韧性的国家根基。民意所向，即是胜果。民主实践。"
 SAN_event.156.a:"议会开幕。"

 SAN_event.157.t:"社奉行的顾问权"
 SAN_event.157.desc:"传统遇现代，神里家族助新政，文化守古根。我们邀请神里绫人作为议会的终身首席顾问。尊重传统是民主体制能够平稳过渡的关键。通过社奉行在文化和艺术领域的号召力，我们消除了旧武士阶层的抵触心理。这种新老权力的良性互动，为共和体制注入了一份优雅与深厚。和谐共治。"
 SAN_event.157.a:"传统纽带。"

 SAN_event.158.t:"离岛商贸自由区"
 SAN_event.158.desc:"商旅连诸国，零关税下兴百业，财富满金仓。我们要将离岛彻底打造为一个国际自由港。取消所有的进出口壁垒。吸引来自璃月和至冬的资本在这里落地。一个富足的中产阶级和繁荣的商业网络，将成为民主体制最坚实的经济保护伞。财富属于勤劳的每一个人。贸易兴国。"
 SAN_event.158.a:"商贸腾飞。"

 SAN_event.159.t:"信仰自由大宣言"
 SAN_event.159.desc:"信仰归个人，大蛇鸣神共和解，灵台自清宁。政府宣布正式实行政教分离。保障每个公民选择自己信仰的权利。无论是大蛇的子民还是鸣神的信徒，在法律面前一律平等。这种极大的宽容，彻底终结了稻妻千年的宗教仇恨。和平，是建立在对他人的尊重之上的。信仰自主。"
 SAN_event.159.a:"大共和解。"

 SAN_event.160.t:"自由经济改革"
 SAN_event.160.desc:"竞争促动力，私人工坊现奇机，效率超往昔。我们要将原本僵化的战时工厂私有化。鼓励个人创业和技术创新。通过引入市场竞争机制，我们的民生工业得到了极大的丰富。每一个岛民都能通过努力获得属于自己的幸福。市场，是文明最好的加速器。经济繁荣。"
 SAN_event.160.a:"释放活力。"

 SAN_event.161.t:"望泷村的长者议会"
 SAN_event.161.desc:"古训育新政，基层自治稳基石，民主生本土。我们将各村落的传统长老会整合进国家的地方咨询委员会。这种由下而上的民主尝试，确保了政策在基层能够被顺利理解。民主不应是外来的嫁接，而应从本土的土壤中自然地生长出来。当每个人都能参与家乡的事务，国家就有了根。基层民主。"
 SAN_event.161.a:"深耕民意。"

 SAN_event.162.t:"公民民兵团"
 SAN_event.162.desc:"义务卫自由，每个人皆是哨兵，国疆固若磐。我们要建立一套基于志愿制度的国民警卫队。由退伍军人和热血青年组成。这支部队不仅仅是军事单位，更是公民精神的摇篮。我们要向世人证明，一个自由的国家在面对入侵时，将拥有最顽强的防御意志。武装的自由民，是暴政的克星。保卫共和。"
 SAN_event.162.a:"守护自由。"

 SAN_event.163.t:"全民福利法案"
 SAN_event.163.desc:"弱者有所依，医疗教育广覆盖，国富济黎民。我们利用战后的和平红利，在全境推行免费义务教育和基础医疗保险。消除贫困与愚昧，是我们长久治安的终极保障。培养出一代具有批判性思维和独立人格的新国民，是我们要送给未来的最好礼物。共和的温暖，普照万家。民生至上。"
 SAN_event.163.a:"社会保障。"

 SAN_event.164.t:"全提瓦特外交拓展"
 SAN_event.164.desc:"伙伴遍四海，平等外交连万邦，文明共蓝天。我们要与蒙德的西风骑士团、璃月的七星以及须弥的教令院建立正式的平等外交关系。通过广泛的文化与技术交流，海祇岛正式登上了世界舞台的中心。我们是和平的维护者，也是贸易的促进者。一个开放的国家，必将赢得未来的尊重。外交突破。"
 SAN_event.164.a:"走向世界。"

 SAN_event.165.t:"珊瑚宫大宪章"
 SAN_event.165.desc:"权柄入笼中，法律至上定乾坤，公义永长存。这是我们对未来的庄严承诺。宪章明确规定了领袖权力的边界、公民的基本权利以及司法的绝对独立。这部宪法将成为照亮海祇岛长远发展的灯塔，确保权力的运行始终在人民的监督之下。法治，是文明最后的堡垒。宪政国家。"
 SAN_event.165.a:"法治万岁。"

 SAN_event.166.t:"工业的现代化飞跃"
 SAN_event.166.desc:"智略引生产，高端制造冠提瓦特，国力定巅峰。我们利用民主体制带来的协作优势，推动工业向智能化与高附加值转型。通过建立多岛科研联盟，我们将渊下宫的远古技术转化为民用的精密设备。‘海祇制造’正在成为高品质与先进技术的代名词。工业的飞跃，支撑着共和的梦想。科技富国。"
 SAN_event.166.a:"重工业现代化。"

 SAN_event.167.t:"诸岛联合防务改革"
 SAN_event.167.desc:"防务网全域，三军协同保平安，和平志已坚。我们建立了一套跨岛屿的民防指挥网，将各地的公民武装整合进现代化的国防体系。这种去中心化的防御理念，将使国家在面对大规模侵略时具有极强的生存力。我们要让每一个岛屿都成为自由的堡垒，让每一个公民都成为反抗暴政的坚实盾牌。防务安全。"
 SAN_event.167.a:"联合防务。"

 SAN_event.168.t:"海祇联合共和国"
 SAN_event.168.desc:"自由之海阔，万众同心铸共和，远景映黎明。所有的碎片已拼凑成完整的版图。我们正式宣告‘海祇联合共和国’的诞生。这不再是一个人的神国，而是数百万岛民共同的家园。我们怀揣着对未来的美好愿景，准备在一个和平、繁荣、民主的体制下，去迎接提瓦特新时代的每一个黎明。自由之海，波澜壮阔！"
 SAN_event.168.a:"为了人民的共和！"

 # --- 路线C：白夜远征军 (169-180) ---
 SAN_event.169.t:"揭开虚伪的苍穹"
 SAN_event.169.desc:"血荐战高天，揭开天理伪秩序，白夜志不移。通过对《日月前事》的深度解析，心海大人做出了一个令提瓦特战栗的决定：我们要向天空岛宣战。神灵的统治是一场持续数千年的谎言。海祇岛将作为凡人的先锋，组建跨越生死的革命军。哪怕对手是执政，我们也要夺回命运的定义权。革命爆发。"
 SAN_event.169.a:"挑战天空。"

 SAN_event.170.t:"输出反抗意志"
 SAN_event.170.desc:"火种撒万里，革命思想传列国，旧序终崩颓。反抗的火种不应只在海祇岛燃烧。我们派出了无数的政治工作者前往提瓦特各地。去联络那些被神权压迫的失意者。我们要告诉全世界：神非永恒，凡人的意志才是世界的真宰。一场全球性的反抗风暴，正在我们的策动下悄然成型。思想觉醒。"
 SAN_event.170.a:"解放全人类。"

 SAN_event.171.t:"暗之外海大征服"
 SAN_event.171.desc:"远征向禁忌，攫取魔神古威能，战旗映残阳。我们要组建强大的远征军团，穿越致命的雷暴，探索提瓦特边缘的‘暗之外海’。寻找那些被天理放逐的原始力量。我们要在大蛇曾经获得珊瑚力量的地方建立革命的前哨站。攫取那足以撼动高天秩序的远古资源。征服黑暗。"
 SAN_event.171.a:"挺进禁区。"

 SAN_event.172.t:"天理监控屏障"
 SAN_event.172.desc:"屏蔽天之眼，地脉噪音乱神意，黑暗现生机。利用渊下宫发现的古代电子干扰技术，我们尝试屏蔽天空岛对稻妻的地脉监控。通过制造大规模的‘地脉噪音’，我们要让天理的眼睛变得模糊。这种对秩序的系统性破坏，将为我们接下来的总爆发赢得宝贵的黑暗窗口期。混乱是我们的利刃。隐匿锋芒。"
 SAN_event.172.a:"盲区建立。"

 SAN_event.173.t:"革命工业集体化"
 SAN_event.173.desc:"工坊归公社，所有产出注革命，铁流向高天。我们取消了所有的私有私产，将整个国民经济转化为一个庞大的后勤中心。每一颗子弹的铸造、每一克粮食的分配都服务于挑战天空的终极战争。在这种极致的革命动员下，我们的工业产出正在创造神灵也无法想象的奇迹。一切为了前线。"
 SAN_event.173.a:"彻底集体化。"

 SAN_event.174.t:"白夜突击兵团招募"
 SAN_event.174.desc:"深渊育死士，不惧神灵威压重，一念破苍茫。我们招募了那些适应了渊下宫黑暗环境的极端战士。这些‘白夜突击队员’不仅精通地底战法，更对天空的秩序充满仇恨。他们配备了最先进的渊能武器，准备好在领袖的指引下，向那高高在上的御座投掷出毁灭性的长矛。我们是神灵的噩梦。无所畏惧。"
 SAN_event.174.a:"精锐集结。"

 SAN_event.175.t:"深渊的秘密契约"
 SAN_event.175.desc:"暗影为同谋，敌人的敌人共敌，撕碎伪光明。心海大人默许了与部分深渊教团分支的临时性合作。虽然这无异于火中取栗，但为了摧毁天理的统治，我们愿意动用任何可以利用的力量。黑暗，将成为我们颠覆光明秩序的同谋。当阴影与革命交织时，提瓦特的天空将彻底变色。禁忌同盟。"
 SAN_event.175.a:"暗中联手。"

 SAN_event.176.t:"地底住民总动员"
 SAN_event.176.desc:"渊下起咆哮，数万平民化锐卒，革命志如磐。我们要让深居渊下宫的移民成为革命的预备役中坚。建立起覆盖每一个社区的军事训练营。渊下宫将不再仅仅是生产中心，它是我们要向地表喷发革命怒火的火山口。当地底的意志开始咆哮时，整个提瓦特都将颤抖。觉醒的巨人。"
 SAN_event.176.a:"全军动员。"

 SAN_event.177.t:"全域意识形态战备"
 SAN_event.177.desc:"灵魂皆甲兵，革命哲学映人心，向死而生勇。这不仅是武力的决斗，更是灵魂的夺取。我们要建立一套严密的、基于‘反抗哲学’的思想战线。让每一个国民都深信，挑战神灵是最高尚的宿命。这种精神上的极度狂热，将赋予国家一种近乎自毁的进攻性。任何理性的阻碍都将被这股洪流碾碎。思想武装。"
 SAN_event.177.a:"意志统一。"

 SAN_event.178.t:"锁定天之御座"
 SAN_event.178.desc:"目光穿铁幕，精密定位高天影，打击有期时。利用白夜国失落的轨道观测技术，我们成功锁定了那座悬浮在云层之上的神秘岛屿。通过收集高层大气的元素波动，我们正在绘制天理防御体系的结构图。虽然高处不胜寒，但我们的目光早已锁定了神座。终结的倒计时，已经开始。目标确立。"
 SAN_event.178.a:"锁定天空。"

 SAN_event.179.t:"神圣安排终极打击"
 SAN_event.179.desc:"烈火烧天幕，海空潜渊齐发难，旧序化飞灰。这是革命的高潮。所有的渊能导弹已锁定目标，所有的重装突击师已在祭坛前集结。我们要发动一场跨越维度的联合打击。目标直指那些试图操控凡人命运的陈腐法则。我们要用凡人的铁火，去烧出一条通向真理的道路。最后的决战。进攻高天！"
 SAN_event.179.a:"撕碎天理！"

 SAN_event.180.t:"新提瓦特的黎明"
 SAN_event.180.desc:"白夜终将归，旧序崩颓灰烟里，万物复生晖。我们要让整个提瓦特重现第一王座时代的荣光。海祇岛将作为革命的灯塔，指引所有的国家废除执政统治，建立起凡人自治的联合政体。这不再是一个国家的胜利，而是全人类对命运枷锁的最后告别。新世界，已近在咫尺！凡人万岁！"
 SAN_event.180.a:"新纪元开启。"







# ========================================================================
# 精神部分
# ========================================================================
 # ========================== 模块一：开局局势 (1-10) ==========================
 
 # Daybreak_of_Teyvat:"提瓦特的黎明"
 # Daybreak_of_Teyvat_desc:"晨曦破长夜，群星黯淡月西斜，旧序终将灭。这是提瓦特大陆动荡时代的开端，海祇岛作为反抗天理与幕府暴政的第一哨站，肩负着引领众生走向觉醒的使命。在这片古老的土地上，反抗的火种已经点燃，我们将见证文明的重生与黎明的到来。"

 SAN_Tax:"九十万年的赋税"
 SAN_Tax_desc:"稻妻幕府一边以锁国与眼狩令消解海祇子民世代传承的信仰根基，一边借勘定奉行之手对海外岛屿施以层层经济盘剥。时至今日，海祇岛的赋税竟已预收到九十万年之后，岛上民众终年劳作却难饱腹，生计早已被逼至悬崖边缘。"
 
 SAN_army_corruption:"军队组织涣散"
 SAN_army_corruption_desc:"残甲卧荒滩，流兵四散望长安，军魂何处还。由于长期缺乏正规化训练和幕府的武力压制，海祇反抗军在初期面临着严重的组织度缺失与物资匮乏问题。战士们虽有满腔热血，却常因指挥脱节而陷入苦战。如果不彻底进行军事洗礼，反抗的愿景终将成为幻梦。"
 
 SAN_worker_shortage:"劳动力枯竭"
 SAN_worker_shortage_desc:"田园没荒草，壮丁从军别乡老，空屋听秋鸟。为了应对连年不断的边境摩擦与眼狩令的骚扰，大量的青壮年离开了农田与工坊投身战场。这导致海祇岛的基础建设进度严重滞后，民生工业停滞不前。国家正面临着战争动员与社会生产之间的残酷博弈。"
 
 SAN_planingtoomuch:"过度的战略推演"
 SAN_planingtoomuch_desc:"残灯映锦囊，万策千虑谋全局，难补一时慌。现人神巫女珊瑚宫心海大人致力于通过精密的锦囊妙计来弥补硬实力的差距。虽然这赋予了军队极高的战术灵活性，但繁琐的推演有时也会拖慢前线指挥官的临场反应。智慧是我们的盾牌，但有时它也会让决策变得沉重。"
 
 SAN_Too_young:"现人神的资历疑云"
 SAN_Too_young_desc:"新月掩云间，雏凤清声初试羽，群臣忧圣颜。年轻的心海大人临危受命，继承了现人神巫女的尊号。虽然她聪慧过人，但在面对岛内保守派势力与复杂的官僚体系时，其统治合法性仍需时间与战果来巩固。权力的过渡充满波折，每一步决策都必须如履薄冰。"
 
 SAN_Delusion:"邪眼的代价"
 SAN_Delusion_desc:"虚名换战威，暮色苍茫生命竭，残愿化灰飞。为了在绝境中反击，部分反抗军士兵选择了禁忌的邪眼。这股狂暴的力量虽然能让他们在战场上横扫千军，却也在无情地透支他们的生命力。这是一种饮鸩止渴的绝望战术，每一份辉煌战果背后，都是战士衰老的容颜与破碎的灵魂。"
 
 SAN_devalue_the_inmuase:"经济封锁遗恨"
 SAN_devalue_the_inmuase_desc:"金贝锁重关，市井萧条物价翻，苦泪落心坛。受勘定奉行长期的经济制裁与盘剥，海祇岛的珍珠贸易几乎断绝。岛内通货膨胀严重，物资流通受阻。我们要重振经济，就必须打破幕府的关税铁幕，让海祇的珍珠再次闪耀在提瓦特的商路上。"
 
 SAN_piety_of_watatsumi:"海祇虔诚"
 SAN_piety_of_watatsumi_desc:"潮汐向海渊，万民膜拜祭灵泉，信仰定国先。海祇岛民对大御神奥罗巴斯的信仰是国家最坚韧的纽带。即使神灵已逝，那份悲悯子民的遗志依然深植于每个人的血脉中。这种宗教凝聚力转化为对珊瑚宫的绝对忠诚，是我们在动荡中屹立不倒的精神支柱。"
 
 SAN_legacy_of_sun_child:"太阳之子的枷锁"
 SAN_legacy_of_sun_child_desc:"高塔囚稚童，白夜幽幽照孤影，权柄落深宫。渊下宫时期‘太阳之子’的悲剧统治留下了深重的政治遗毒。这种对权力的病态掌控与内部争斗的阴影，至今仍潜伏在海祇岛的行政体系中。我们要走向未来，就必须彻底清算这些陈腐的历史残渣，释放文明的活力。"
 
 SAN_omikami_protection:"大御神之佑"
 SAN_omikami_protection_desc:"灵光佑三岛，坚垒磐石映狂涛，敌寇胆魂消。当外敌入侵我们的核心领土时，大御神的守护力量似乎穿透了时空。每一道珊瑚岩防线都显得格外坚固，战士们在故土作战时爆发出了超常的勇气。只要珊瑚宫前的圣火不灭，海祇岛就是不可逾越的禁区。"

 # ========================== 模块二：军事改革 (11-20) ==========================
 SAN_gorou_general:"大将之威"
 SAN_gorou_general_desc:"犬影战阵先，忠勇无双振军纪，破敌若等闲。五郎大将以其赤诚之心和卓越的统帅力，赢得了士兵们的崇高敬意。在他的领导下，原本散漫的反抗军逐渐形成了严密的组织体系。他那不屈的斗志如同冬日暖阳，在每一次绝境中都能带领部队重新集结，向敌人发起反击。"
 
 SAN_watatsumi_militia:"海祇民兵动员"
 SAN_watatsumi_militia_desc:"渔叉磨亮时，解甲归田又披挂，保家志不迟。我们将散布在诸岛的渔民与农夫转化为一支高效的民兵组织。他们熟悉家园的每一处滩涂与礁石，是反抗军最广大的兵源基础。这种全民皆兵的态势，让幕府军在占领区的每一寸土地上都要付出沉重的代价。"
 
 SAN_partisan_warfare:"裂谷游击战法"
 SAN_partisan_warfare_desc:"隐身暗林间，奇袭惊雷落敌阵，退若晨雾残。利用八酝岛复杂的地形与祟神气息，我们开展了持久的游击战争。小型作战单位在裂谷中神出鬼没，频繁打击幕府的补给线。这种非对称的作战模式，正在一点点耗尽幕府军的耐性与资源，为总攻争取宝贵的时间。"
 
 SAN_vision_vanguard:"神之眼先锋队"
 SAN_vision_vanguard_desc:"一念动雷火，凡人愿望破苍穹，锐意荡敌踪。那些未被眼狩令剥夺愿望的强者，被心海大人编入精锐的先锋师团。他们将元素力与现代战术相结合，成为了战场上无可替代的利矛。每一个神之眼的烁光，都在宣告着凡人意志对神权的正面挑战。"
 
 SAN_ronin_mercenaries:"浪人契约军"
 SAN_ronin_mercenaries_desc:"残刀无主时，流落荒野觅忠义，海祇续英姿。失去领主的流浪武士们在海祇岛找到了新的生存意义。我们通过提供名誉与补给，将这些身经百战的剑客整合进正规军。他们的加入丰富了我们的近战技巧，并为反抗军带来了一股狂野而不受拘束的战斗精神。"
 
 SAN_high_pressure_hydro:"高压水炮技术"
 SAN_high_pressure_hydro_desc:"激流斩铁甲，渊底秘术重现世，威力震八荒。利用渊下宫遗迹中发现的高压流体传导原理，我们研制出了这种致命的战术武器。它能够发射足以切割钢铁的水箭，轻而易举地摧毁幕府的重型工事。科技的进步，正在将海祇之怒转化为具象的毁灭力量。"
 
 SAN_naval_ambush:"海雾伏击战术"
 SAN_naval_ambush_desc:"迷雾锁战舰，影中杀机现端倪，沉舟没汪洋。我们利用海祇岛周边常年不散的浓雾，开发了一套独特的海上伏击教义。小型快船编队学会在视觉盲区中进行极速包抄。在敌人的惊恐注视下，我们的战士总能从海浪的阴影中降临，将所谓的幕府水军送入海底。"
 
 SAN_elite_divine_guard:"现人神亲卫团"
 SAN_elite_divine_guard_desc:"珍珠映红袍，誓死守护巫女殿，荣光不可摇。这是由心海大人亲自挑选、在内战中立下赫赫战功的最强精锐。他们不仅配备了最好的炼金装备，更接受了最高强度的战术培训。作为国家的最后一道防线，亲卫团的存在本身就是对敌军士气的沉重打击。"
 
 SAN_standardized_forging:"标准工业锻造"
 SAN_standardized_forging_desc:"规格归一律，铁锤声声震工坊，兵甲足且长。我们废除了传统刀剑锻造中低效的学徒制，引入了标准化的流水线作业。每一把步枪、每一枚炮弹都拥有完美的互换性。这种工业思维的变革，让我们的武装速度呈几何倍数增长，彻底终止了前线补给混乱的历史。"
 
 SAN_storm_riders:"雷暴骑兵"
 SAN_storm_riders_desc:"风雷穿林去，勇士无畏袭敌踪，速如闪电惊。我们在清籁岛极端的气象环境中训练出了一支能适应电磁干扰与狂风作战的特殊兵种。他们学会在雷雨中利用元素共鸣进行超速移动。当暴风雨来临时，雷暴骑兵就是海面上最致命的死神，所到之处寸草不生。"

 # ========================== 模块三：白夜科技 (21-30) ==========================
 SAN_abyssal_wisdom:"深渊智慧的启示"
 SAN_abyssal_wisdom_desc:"禁卷录旧史，第一王座揭真言，智慧越千年。通过对《日月前事》中被天理封印知识的系统性研究，海祇岛的学者们打开了通往高维科技的大门。这种超越时代的科研视野，让我们的工程学、电子学与炼金术实现了质的飞跃。我们不再是盲目的探索者，而是文明遗产的继承人。"
 
 SAN_dainichi_energy:"大日能源网络"
 SAN_dainichi_energy_desc:"恒星沉海底，赫利俄斯核心燃，光明满国园。重启大日御舆后，这种近乎无限的元素能源通过地脉光纤覆盖了海祇岛全境。所有的工厂不再受限于燃料供应，所有的民居都点亮了不灭的灯火。能源的自由，奠定了海祇岛作为科技强国的物质基础。白夜的光辉，永不熄灭。"
 
 SAN_jizhashi_spirit:"地走官精神"
 SAN_jizhashi_spirit_desc:"黑暗莫敢伤，枪尖烁光守狭间，意志胜天罡。我们复兴了白夜国地走官的铁血纪律。这种在无尽黑暗与残酷试炼中磨炼出的直觉，赋予了我们的精锐部队无与伦比的侦察与特种作战能力。他们是黑夜中的主人，任何伪装在他们敏锐的感知面前都将无所遁形。"
 
 SAN_vishap_taming:"龙蜥驯服技术"
 SAN_vishap_taming_desc:"龙嗣低垂首，铁轭加身役深渊，助力越山川。通过生物炼金术对深海龙蜥进行基因筛选与行为干预，我们成功将其改造为强大的负重与突击生物。这些远古的猎手现在成为了我们的运输载具与近战辅助。这种生物与机械的结合，让海祇岛的后勤投送能力达到了惊人的水平。"
 
 SAN_evernight_phasing:"常夜相位折叠"
 SAN_evernight_phasing_desc:"空间叠残影，瞬息移步跨重洋，玄机莫能详。利用常夜灵庙发现的空间叠加现象，我们实现了初步的相位传送技术。虽然目前只能用于小规模物资与信使的快速流转，但它在战略机动性上赋予了我们巨大的优势。距离正在失去意义，海祇岛的意志可以瞬间降临在任何地脉节点。"
 
 SAN_serpents_heart_ritual:"蛇心祭仪"
 SAN_serpents_heart_ritual_desc:"地脉乱弦振，屏蔽天之监视眼，秘密锁重深。我们利用蛇心之地的特殊地理特征，建立了一套国家级的情报屏障。任何来自天空岛或外部势力的超视距侦察都将在这里陷入噪音。在这片隐秘的阴影中，我们可以从容不迫地推进那些足以撼动世界秩序的庞大计划。"
 
 SAN_forbidden_history:"直视禁忌历史"
 SAN_forbidden_history_desc:"真相沉血海，揭开谎言逆乾坤，白夜志不改。公开传播《日月前事》的历史真相让国民认清了世界的虚伪性。虽然这引来了极大的外交风险与国际恐慌，但也彻底激发了岛民的民族自尊心与革命狂热。我们不再被神灵的叙事所左右，我们要亲自执笔书写未来的篇章。"
 
 SAN_white_night_doctrine:"白夜对抗教义"
 SAN_white_night_doctrine_desc:"战法出古卷，奇兵诡道算无遗，神位亦可敌。针对七执政体系的武力特征，我们开发了一套全新的作战理论。这种教义强调利用空间控制、能量反制与极端环境适应性来对抗压倒性的个人战力。它将陆军转化为一支能够对抗魔神级威胁的高效战斗集体。众生平权，始于剑锋。"
 
 SAN_subterranean_complex:"地底联合工业体"
 SAN_subterranean_complex_desc:"熔炉深藏下，任凭地表火冲天，生产永不延。在渊下宫广阔的岩层中，我们建设了完全自给自足的工业中心。这些工厂不受地表天气与空袭的影响，能够二十四小时不间断地产出战争物资。地底的机械轰鸣声，就是海祇岛反击天理的最强有力的心脏跳动。"
 
 SAN_hydro_mastery:"水元素全域掌控"
 SAN_hydro_mastery_desc:"汪洋入指尖，潮汐奔流断铁甲，威名震云边。通过对奥罗巴斯血枝珊瑚的深入解析，我们掌握了操控海洋能量的最本源技术。无论是在海上建立瞬间的防御屏障，还是通过海流加速舰队航行，这种对元素的极致运用都让我们成为了海洋真正的主宰者。大海之魂，与我同在。"

 # ========================== 模块四：政治分歧 (31-45) ==========================
 # --- 路线A：现人神绝对权威 (威权) ---
 SAN_divine_authority:"唯一真神权威"
 SAN_divine_authority_desc:"神谕定乾坤，万众一心拜巫女，秩序定万年。心海大人正式被奉为海祇大御神的在世化身，拥有无可置疑的绝对权力。所有的法律、行政指令与军事决策均被视为神圣的旨意。这种极端集权的体制确保了国家意志的高度统一，但也让整个社会的容错率完全取决于巫女一人的智慧。"
 
 SAN_orobashi_orthodoxy:"大蛇正统信仰"
 SAN_orobashi_orthodoxy_desc:"大蛇尊位起，鸣神残留尽清洗，信仰归一宗。我们要彻底肃清国内任何关于鸣神的崇拜痕迹。通过强制性的神学教育与文化清洗，确立奥罗巴斯远吕羽氏尊为稻妻唯一的正统神灵。在这种单一信仰的感召下，整个民族将凝聚成一柄无坚不摧的神权战锤，准备横扫一切异端。"
 
 SAN_clerical_admin:"神职行政体系"
 SAN_clerical_admin_desc:"官位即祭司，行政职能带圣威，服从是美德。政府各级官员均由受过神学考核的巫女或祭司出任。这种体制极大地减少了行政过程中的阻力，民众对政策的执行力达到了宗教层面的狂热。每一道行政命令都伴随着神灵的威压，确保了在战时状态下，国家能够如精密的钟表般运转。"
 
 SAN_holy_crusade:"神圣解放征讨"
 SAN_holy_crusade_desc:"版图无边际，蓝色海洋皆圣土，进军向远方。我们要将大御神的悲悯（与霸权）扩展到提瓦特的每一寸土地。以解放被伪神奴役的众生为名，我们的远征军团将跨越雷暴与极寒。这种进攻性的扩张教义，为国家攫取了海量的生存空间与战争红利。圣战的号角，已响彻天际。"
 
 SAN_imperial_zeal:"帝国主义狂热"
 SAN_imperial_zeal_desc:"战死为荣光，灵魂归于大御神，勇士无所惧。在现人神的指引下，整个社会陷入了扩张与征服的狂热中。士兵们视战死疆场为通往彼岸的捷径。这种近乎偏执的爱国主义，让军队在面临惨重伤亡时依然能保持极高的作战效率。为了海祇神圣帝国的荣光，我们愿意献祭一切。"
 
 # --- 路线B：海祇民主议会 (民主) ---
 SAN_republic_spirit:"海祇共和精神"
 SAN_republic_spirit_desc:"权力归民手，万岛一心建共和，自由满山河。我们废除了个人独裁的阴影，确立了主权在民的基本原则。心海大人作为国家的精神象征而存在，而世俗权力则交由选举产生的诸岛议会。这种自由、平等且包容的氛围，极大地激发了民众的创造力与主人翁意识。共和，是我们共同的契约。"
 
 SAN_multi_island_parliament:"诸岛联合议会"
 SAN_multi_island_parliament_desc:"多岛一心议蓝图，公正见阳光，民意定国方。议会汇集了来自海祇、鸣神、清籁与离岛的各界代表。虽然协商决策的过程往往漫长而充满争论，但它确保了各方利益的平衡与政策的长久稳定性。通过公开、透明的政治博弈，我们建立起了一套能够自我修正的高效民主体制。"
 
 SAN_freedom_of_worship:"信仰自由共存"
 SAN_freedom_of_worship_desc:"大蛇鸣神共和解，灵台自清宁，信仰归个人。我们正式实行政教分离，宣布保障每个公民选择信仰的自由。无论是大蛇的虔信者，还是鸣神的追随者，在宪法面前一律平等。这种宽容的政策消除了引发内战的宗教毒素，实现了一个跨族群、跨文化的大和解时代。"
 
 SAN_liberal_market:"离岛自由港"
 SAN_liberal_market_desc:"商旅连诸国，零关税下兴百业，财富满金仓。我们要将离岛打造为提瓦特东方的金融与贸易中枢。通过取消贸易壁垒与吸引异国资本，国家的经济活力得到了前所未有的释放。一个富足的中产阶级正在崛起，他们是民主体制最坚定的支持者。财富的流转，正滋养着自由的花朵。"
 
 SAN_citizens_militia:"公民武装卫队"
 SAN_citizens_militia_desc:"义务卫自由，每个人皆是哨兵，国疆固若磐。为了捍卫共和成果，我们建立了一套基于志愿制度的国民警卫体系。这种武装的公民组织不仅是防御力量，更是公民教育的摇篮。当民众意识到自由需要鲜血来捍卫时，任何潜在的独裁者或入侵者都将在人民的怒火中化为齑粉。"
 
 # --- 路线C：白夜远征军 (共产/革命) ---
 SAN_revolutionary_logic:"凡人革命逻辑"
 SAN_revolutionary_logic_desc:"旧序崩颓灰烟里，万物复生晖，意志破天威。我们彻底否定了任何形式的神权统治，确立了凡人意志高于一切的革命纲领。海祇岛将作为全球革命的指挥中心，致力于推翻所有执政者的‘虚假永恒’。这种激进的教义赋予了国家极强的进攻性与感召力。我们要亲手终结神灵的时代。"
 
 SAN_collectivized_forges:"集体化工业熔炉"
 SAN_collectivized_forges_desc:"工坊归公社，所有产出注革命，铁流向高天。我们废除了所有的私有制，将全国的工业产出集中投入到挑战天空的终极战争中。通过极致的计划调度，我们的生产力实现了超限爆发。每一颗子弹、每一台机甲都承载着劳动者的革命愿望。集体主义的力量，正改写着世界的版图。"
 
 SAN_abyss_alliance:"深渊阴影契约"
 SAN_abyss_alliance_desc:"暗影为同谋，敌人的敌人共敌，撕碎伪光明。为了对抗高高在上的天空岛，我们不惜与深渊中的黑暗力量达成暂时的战略协议。我们利用深渊的知识来反制天理的法则，虽然这充满风险，但为了终极的解放，我们无所畏惧。黑暗不是我们的敌人，它是我们颠覆伪秩序的利刃。"
 
 SAN_defiance_celestia:"逆天行道使命"
 SAN_defiance_celestia_desc:"血荐战高天，揭开天理伪秩序，白夜志不移。我们公开宣布废除与天空岛的所有‘神圣协议’。通过拦截地脉信号、破坏元素循环，我们要让天理的眼睛变得模糊。这种对所谓‘天理秩序’的系统性蔑视，正在唤醒全提瓦特被压迫者的斗志。我们要让高天之上的神座，在凡人的咆哮中颤抖。"
 
 SAN_liberation_army:"提瓦特解放军团"
 SAN_liberation_army_desc:"火种撒万里，革命思想传列国，旧序终崩颓。这是一支跨越国界的革命武装，由来自七国的失意武士、破产商户与觉醒农民组成。他们配备了海祇岛最先进的渊能武器，随时准备前往大陆的任何一个角落播撒反抗的火种。解放的钢铁洪流已经启动，任何陈腐的强权都无法阻挡。"

 # ========================== 模块五：区域整合 (46-50) ==========================
 SAN_pearl_monopoly:"海祇珍珠垄断"
 SAN_pearl_monopoly_desc:"明珠出玉涡，贸易利权归珊瑚，国库丰且多。我们确立了国家对核心资源‘珍珠’的绝对控制权。通过垄断这种高价值的奢侈品与炼金材料出口，我们获得了巨额的外汇收入。珍珠不再仅仅是饰品，它是我们与大陆大国博弈的经济筹码。掌控了财富，就掌控了话语权。"
 
 SAN_tatarasuna_engine:"踏鞴砂复兴引擎"
 SAN_tatarasuna_engine_desc:"炉心雷光闪，祟神威能入掌中，重铸钢铁魂。通过对御影炉心的彻底修复与升级，我们将其转化为海祇岛最强大的工业引擎。它源源不断地为全国提供高质量的玉钢与重型装备。踏鞴砂的轰鸣声象征着稻妻工业霸权的易手。钢铁的洪流，正从这座神不在的山丘喷涌而出。"
 
 SAN_seirai_storm_harnessing:"清籁能电转化"
 SAN_seirai_storm_harnessing_desc:"集电通高天，天云能量注熔炉，工业新纪元。我们将清籁岛狂暴的雷暴能量通过超导阵法转化为稳定的工业电力。这让海祇岛成为了提瓦特第一个实现能源完全自给自足的地区。能源生产的极大丰富，支撑起了我们庞大的深渊探索计划与国防建设。电力，就是我们的新动力。"
 
 SAN_tsurumi_fog_radar:"鹤观迷雾之眼"
 SAN_tsurumi_fog_radar_desc:"电波织密网，海天变化无遗漏，入侵莫敢前。利用鹤观岛遗迹中发现的古老频率探测原理，我们建立了一套覆盖全稻妻南方的远程预警雷达网。即使是最先进的隐蔽技术，也无法在迷雾之眼的注视下遁形。这套电子预警系统，为国家筑起了一道看不见的领空长城。"
 
 SAN_watatsumi_hegemony:"海祇海洋霸权"
 SAN_watatsumi_hegemony_desc:"巨舰巡四海，蓝色旗帜定尊严，主宰波涛里。海祇岛正式确立了在提瓦特东部海域的绝对领导地位。我们强大的铁甲舰队与密布的海防要塞，确保了所有经过此地的商路都必须遵循珊瑚宫的规矩。海洋不再是阻隔，它是海祇子民永恒的猎场。主宰波涛，霸权永续。"



# ========================================================================
# 决议组标题
# ========================================================================
 SAN_internal_reform_category:"望泷内政与军事整固"
 SAN_internal_reform_category_desc:"\n珊瑚映月明，锦囊妙计定民心，故土焕新声。\n在内战的最初阶段，我们必须优先解决岛内积压已久的社会与军事问题，通过现人神巫女的行政改革，将混乱的民兵转化为守卫信仰的铁军。\n"
 
 SAN_war_mobilization_category:"战时动员与资源开发"
 SAN_war_mobilization_category_desc:"\n烈火淬钢锋，愿望汇聚破长空，四海战旗红。\n为了对抗幕府的军事优势，我们必须动员一切可以利用的力量，从神之眼的奇迹到踏鞴砂的工业之火，皆为我用。\n"
 
 SAN_regional_governance_category:"群岛整合与旧域治理"
 SAN_regional_governance_category_desc:"\n迷雾渐散时，雷光平息见真容，万政归一统。\n随着领土的扩张，清籁的雷暴、鹤观的诅咒以及被占领区的民生，都需要我们投入巨大的精力进行系统化治理。\n"
 
 SAN_white_night_legacy_category:"白夜遗产与真理追寻"
 SAN_white_night_legacy_category_desc:"\n深渊藏往事，日月前书语未终，白夜觅遗踪。\n渊下宫不仅是我们的祖地，更蕴含着颠覆世界秩序的远古科技。挖掘这些遗产，我们将获得挑战天空的力量。\n"
 
 SAN_political_path_category:"珊瑚改新"
 SAN_political_path_category_desc:"\n殊途同归日，理想高扬绘蓝图，国运定万年。\n海祇岛的潮汐往复不休，珊瑚宫的治理却曾因权责芜杂、流程繁冗，如被暗礁牵绊的航船，难抵岛民之心。此番梳理行政体系，恰似为海祇的脉络清淤——明晰各寮各司之责，简化政令传递之途，让珊瑚宫的每一道指令，都能如洋流般顺畅淌过每一处村落的栈桥，抵达每一片渔场的渔火旁，让海祇的治理如潮起潮落般有序，如珊瑚生长般稳固。\n\n现人神巫女威望： §R[?SAN_prestige]§!\n"
 #	add_to_variable = { var = SAN_prestige value = 10 }
 SAN_prestige_Add:"§G现人神巫女威望增加§!"
 SAN_prestige_Les:"§R现人神巫女威望减少§!"

 #####################
# 决议：心海的锦囊妙计
#####################
 SAN_Kokomi_Trick_decision_categories:"心海的锦囊妙计"
 SAN_Kokomi_Trick_decision_categories_desc:"\n珊瑚宫心海者，海祇现人神巫女也，幼娴兵略，智计周详。\n当眼狩令行，天领重兵压境，愚人众构隙于内，海祇地狭兵寡，危在旦夕。心海临危秉政，乃裁素帛，预演百八十七种变局，分著临阵破敌、外交斡旋、安民治岛之策，纳以青绫锦囊，遍颁将卒，嘱临事启视，依计而行。\n临敌则伏兵、引潮、焚营诸策咸备，屡以弱胜强；和谈则预杜奸谋，揭伪定盟，干戈立止；治民则农桑、赈济、海防纤悉无遗，庶务井然。复诫麾下毋专恃锦囊，当勤研兵略，方能临机独断。\n一囊藏万策，寸帛护沧溟。其思密虑远，庇佑一方，洵巾帼之智囊也。\n\n现人神巫女威望： §R[?SAN_prestige]§!\n"
 SAN_Kokomi_Trick_decision_01:"临阵破敌计"
 SAN_Kokomi_Trick_decision_01_desc:"遇敌营坚壁，计分三途，皆书于囊：一曰擒首，潜登高地，突袭渠帅，群寇无主自溃；二曰借势，潜燃营中火药，猝惊敌众，乱其行伍；三曰用水，依海岛滩涂地利，引海潮、合雷力施感电之术，陷敌于水泽，不得施展兵戈。凡行军，囊中有分灶、伏兵、诱敌、断粮诸法；斥候探报、伏哨巡防之细则，纤悉无遗。士卒偶失锦囊，亦有备用分藏于营垒要道，不致临危无措。义军主将五郎，日夕诵读囊中文策，军中凡遇疑难，启囊即得定计，屡以寡胜众，挫幕府劲旅、破愚人众奸谋。"
 SAN_Kokomi_Trick_decision_02:"远交近攻计"
 SAN_Kokomi_Trick_decision_02_desc:"兵祸日久，岛民疲弊，心海志在休兵安民，锦囊预存外交机变。幕府遣使议和，内有奸人煽乱，欲于帐中哗变，离间两军。心海早知其谋，先授侍从锦囊，令乱起之时，先拘造事者，再示幕府勾结愚人众之实证，先安己方军心，复令天领奉行自清内奸。一席和谈，不动干戈，保全海祇疆土，又免兵戈再兴之祸，全赖囊中之预设机宜。"
 SAN_Kokomi_Trick_decision_03:"安民治岛计"
 SAN_Kokomi_Trick_decision_03_desc:"非独战事，民政庶务亦具锦囊。心海偶出岛远察，临行密布锦囊于各司：农田水利、商市通商、赈济孤弱、防备海潮、教化兵卒之规，一一罗列。虽身不在岛内，诸事循策施行，秩序井然。其囊中非独权谋，亦藏体恤民生之心，常诫将士：锦囊为权宜辅翼，不可一味依赖，闲暇当多读兵书，自辨战局，方得独当一面，不困于纸上之计。"
 SAN_Kokomi_Trick_decision_04:"阴谋进行中"
 SAN_Kokomi_Trick_decision_04_desc:"迩者宫中有不逞之徒，阴结幕府所遣间谍，潜相呼应，共为奸谋。彼辈布流言之于闾巷，腾谤言之于行伍，或诬巫女举措失当，或构其私怀异图，务欲摧损巫女德望，离散军民之心。其迹隐伏，其计阴狡，日夕煽惑，冀以浮言乱政，待衅而发，倾覆海祇之安。"

# ========================== 组1：望泷内政与军事整固 (10条) ==========================
 SAN_decision_purge_army_corruption:"肃清军队腐败"
 SAN_decision_purge_army_corruption_desc:"残甲卧荒滩，流兵散漫军魂黯，利剑斩贪婪。长期处于幕府高压下的地方部队存在严重的违纪现象。由五郎大将亲自督导，清除那些尸位素餐的旧军官，重塑反抗军的尊严与纪律。只有铁律筑就的脊梁，才能撑起海祇的明天。"
 
 SAN_decision_foreign_labor:"征召外籍劳工"
 SAN_decision_foreign_labor_desc:"异乡远渡船，共筑坚城保家园，珍珠换平安。由于壮丁大多奔赴前线，岛内的基础建设严重人手不足。通过开放离岛港口，吸引那些受战乱波及的外国技工来到海祇岛。我们提供丰厚的报酬与大御神的庇护，换取他们精湛的劳动力。"
 
 SAN_decision_simplify_strategy:"简化战略文书"
 SAN_decision_simplify_strategy_desc:"锦囊藏万策，繁文缛节误战机，智略贵神速。心海大人的锦囊虽然精妙，但过于复杂的条目有时会让基层军官无所适从。通过精简行政流程，将繁杂的兵法转化为简单易懂的旗语和指令，确保政令如潮汐般迅捷，瞬息而至。"
 
 SAN_decision_ascension_ceremony:"举行现人神升座大典"
 SAN_decision_ascension_ceremony_desc:"新月掩云间，现人神位定乾坤，万民拜圣颜。为了平息民间对心海大人资历的疑虑，一场宏大的宗教典礼在珊瑚宫举行。通过重现大御神降临的神迹，确立现人神巫女无可置疑的统治合法性。信仰的共鸣将转化为国家最稳固的稳定力量。"
 
 SAN_decision_economic_reconstruction:"经济结构重组"
 SAN_decision_economic_reconstruction_desc:"金贝锁重关，市井重生财路通，利权归珊瑚。长期受制于勘定奉行的垄断，我们要建立属于海祇岛自己的经济循环。通过补贴手工业与发展本土渔业加工，彻底摆脱外部的盘剥。当经济的血液重新加速流动，战争的潜力将呈指数级增长。"
 
 SAN_decision_militia_regularization:"海祇民兵正规化"
 SAN_decision_militia_regularization_desc:"渔叉易利锋，百战老兵训后人，众志固长城。望泷村的民兵曾是平凡的渔民。通过引入系统的军事训练课程，配备标准化的炼金装备，将这支散漫的队伍转化为纪律严明的正规军。每一个岛民都应是战士，每一片沙滩都应是堡垒。"
 
 SAN_decision_forge_standardization:"推行标准锻造法"
 SAN_decision_forge_standardization_desc:"规格归一律，铁锤声震工坊隆，军需足且丰。废除传统的学徒制手工作业，引入模块化的武器锻造流程。确保每一把佩刀、每一枚弹药都能在全军范围内通用。工业化的效率是战胜幕府旧式武力的关键，我们要用钢铁的洪流淹没敌人。"
 
 SAN_decision_strengthen_faith:"强化海祇虔诚"
 SAN_decision_strengthen_faith_desc:"潮汐向海渊，万众一心拜灵泉，信仰护主权。在村议会中推广对海祇大御神的深度崇拜。将宗教生活与日常行政紧密结合，让每位公民都意识到保卫国家即是践诺信仰。这份神圣的契约将赋予军队近乎狂热的士气，使之在绝境中亦能爆发战威。"
 
 SAN_decision_gorou_supervision:"五郎亲自督导训练"
 SAN_decision_gorou_supervision_desc:"犬影战阵先，同甘共苦抚兵心，将威震八荒。五郎大将深入基层军营，与士兵同吃同住。他那不屈的意志和赤诚的斗志是最好的榜样。在这种人格魅力的感召下，士兵们的组织度迅速回升，原本的怨言化作了对领袖的绝对效忠。将帅同心，无往不胜。"
 
 SAN_decision_fortify_watatsumi:"加固海祇防波堤"
 SAN_decision_fortify_watatsumi_desc:"磐石筑坚垒，任凭狂雷风雨袭，故土守如金。利用海祇岛独特的珊瑚岩层，在海岸关键节点修筑隐蔽的重炮掩体和观察哨。这不仅是为了抵御幕府军可能的登陆，更是为了在被围困时保留反击的火种。海祇岛，应是任何侵略者无法逾越的死亡禁区。"

# ========================== 组2：战时动员与资源开发 (10条) ==========================
 SAN_decision_mobilize_vision_users:"动员神之眼持有者"
 SAN_decision_mobilize_vision_users_desc:"一念动雷火，凡人愿望破苍穹，锐意荡敌踪。那些在眼狩令中幸存的强者被编入特殊的先锋小组。他们不再是孤军作战，而是在珊瑚宫的战术指引下进行元素协同作战。当愿望汇聚成洪流，即便是幕府的钢铁防线也将如同薄纸般被轻易撕裂。"
 
 SAN_decision_yashiori_guerilla:"八酝山地游击演习"
 SAN_decision_yashiori_guerilla_desc:"隐身密林间，奇袭惊雷落敌阵，退若晨雾残。八酝岛的裂谷是埋葬幕府军的最佳猎场。我们利用当地复杂的祟神环境进行抗干扰训练，让部队学会在迷雾与雷雨中进行非对称打击。这种令敌人如坐针毡的游击战法，将彻底拖垮天领奉行的后勤链路。"
 
 SAN_decision_recruit_ronin:"招募浪人剑客"
 SAN_decision_recruit_ronin_desc:"残刀无主时，流落荒野觅忠魂，海祇续英姿。失去领土的流浪武士们在海祇岛找到了新的归宿。我们提供名誉、烈酒与充足的补给，换取他们那身经百战的剑术。这些狂野的武者虽然难以管理，但他们在白刃战中的表现足以令任何正规军感到战栗。"
 
 SAN_decision_establish_divine_guard:"组建现人神禁卫军"
 SAN_decision_establish_divine_guard_desc:"珍珠映红袍，誓死守护巫女殿，荣光不可摇。这是从全军挑选出的最忠诚、最精锐的勇士。他们配备了渊下宫特产的抗压板甲和充能长戟。作为心海大人的亲卫力量，禁卫军的出现本身就是一种强大的政治象征，宣告着海祇核心权力的绝对武装化。"
 
 SAN_decision_hydro_tech_research:"整合白夜高压水术"
 SAN_decision_hydro_tech_research_desc:"激流斩铁甲，渊底秘术现神威，威力震九州。通过解析渊下宫古籍中记载的‘流体塑形’原理，我们研制出了这种新型的攻城武器。它利用高压元素力喷射出的水箭甚至能击穿轻型战舰的甲板。科技的进步，正将海祇民的元素天赋转化为真正的毁灭力量。"
 
 SAN_decision_sea_fog_tactics:"海雾隐蔽演练"
 SAN_decision_sea_fog_tactics_desc:"迷雾锁战舰，影中杀机现端倪，沉舟没汪洋。我们利用海祇岛周边的天然浓雾，开发了一套复杂的视觉屏蔽战法。舰队学会在无线电静默状态下通过声呐信号保持阵型。当幕府舰队在迷雾中迷失方向时，迎接他们的将是来自海浪阴影处的致命一击。"
 
 SAN_decision_seirai_storm_training:"清籁雷暴训练"
 SAN_decision_seirai_storm_training_desc:"风雷穿林去，勇士无畏袭敌踪，速如闪电惊。清籁岛那狂暴的气象是天然的演兵场。在这里训练出的‘雷暴骑兵’能够适应极端恶劣的电磁干扰环境。他们学会在落雷中寻找律动，利用元素脉冲加速冲锋。这种超常规的机动力，将让敌人的防线瞬间土崩瓦解。"
 
 SAN_decision_tatarasuna_restart:"重启御影炉心"
 SAN_decision_tatarasuna_restart_desc:"炉心雷光闪，祟神威能入掌中，重铸钢铁魂。在收复神无冢后，我们冒着极大的风险重启了这座超级冶炼设施。通过枫丹工程学与海祇巫术的结合，我们稳定了祟神核心。现在，它正源源不断地为工厂提供近乎无限的能源，支撑起我们庞大的战争机器。"
 
 SAN_decision_naval_dominance:"确立海祇海洋主权"
 SAN_decision_naval_dominance_desc:"巨舰巡四海，蓝色旗帜定尊严，主宰波涛里。我们正式宣告全稻妻南部海域为海祇岛的领海。任何未授权的商船都将受到盘查，任何入侵的敌舰都将被击沉。海洋不再是我们的屏障，而是我们力量延伸的阶梯。大御神的荣光，必须覆盖每一片蔚蓝。"
 
 SAN_decision_pearl_export:"珍珠出口专卖"
 SAN_decision_pearl_export_desc:"明珠出玉涡，贸易利权归珊瑚，国库丰且多。珍珠是海祇岛的命脉，绝不容许私人走私。建立国家专营机构，统一控制珍珠的质量与价格。通过与璃月和至冬的贸易协定，获取巨额的外汇储备。金钱的流动就是国家实力的增长，我们将以财富反哺革命。"

# ========================== 组3：群岛整合与旧域治理 (10条) ==========================
 SAN_decision_seirai_grid:"清籁电网铺设"
 SAN_decision_seirai_grid_desc:"集电通高天，雷暴能量注工坊，工业新纪元。利用天云峠那永不枯竭的雷元素力，我们建立了一套覆盖全境的能量输送系统。清洁、高效的能电正转化为推动齿轮转动的伟力。这标志着海祇岛彻底告别了对传统燃料的依赖，迈向了元素能源自由的新时代。"
 
 SAN_decision_tsurumi_radar:"鹤观雷达部署"
 SAN_decision_tsurumi_radar_desc:"电波织密网，海天变化无遗漏，入侵莫敢前。通过逆向工程鹤观岛遗迹中的频率探测器，我们建立了一套远程预警网络。即便是在最浓的迷雾中，任何敌对的飞行器或舰船都将在我们的屏幕上暴露无遗。这套领空长城，将为海祇岛的安全提供最后一道坚实的屏障。"
 
 SAN_decision_purify_delusions:"净化邪眼残余"
 SAN_decision_purify_delusions_desc:"暮色苍茫尽，清泉洗涤旧伤痕，残愿莫再传。邪眼留下的副作用正折磨着许多勇敢的战士。心海大人亲自主持净化仪式，并投入大量资源研发缓解病痛的药剂。通过这种人道主义的治理，我们挽救了宝贵的人力资源，也消除了内政中最大的不稳定隐患。仁政即是战力。"
 
 SAN_decision_tatarigami_suppression:"崇神抑制工程"
 SAN_decision_tatarigami_suppression_desc:"神骸残怨消，巫女吟唱止风暴，黎民得安宁。八酝岛的祟神气息必须得到根本性的遏制。我们不仅修复了古老的镇物，还修筑了现代化的元素稳定装置。随着环境的改善，原本荒废的绯木村重新出现了生机。一个安定的后方，是我们能够持续扩张的最强底气。"
 
 SAN_decision_hydro_mastery_ritual:"奥罗巴斯血枝研究"
 SAN_decision_hydro_mastery_ritual_desc:"古枝藏秘力，潮汐奔流断铁甲，威名震云边。深度解析大御神遗骸中的珊瑚结晶。这种特殊的生命能量能够极大地提升水元素武器的亲和度。我们要将这种古老的力量与现代的海军战术相结合。大海之魂，正融入我们每一位水手的意志之中，无坚不摧。"
 
 SAN_decision_new_jizhashi:"选拔新代地走官"
 SAN_decision_new_jizhashi_desc:"黑暗莫敢伤，枪尖烁光守狭间，意志胜天罡。复兴白夜国最严酷的战士选拔制度。这些精英在无尽黑暗中磨炼直觉，专门负责处理深渊侵蚀等极端局势。他们是国家的隐影，是藏于暗处的毒牙。当地走官的战吼再次响起，所有敢于轻视海祇的敌人都将感受到战栗。"
 
 SAN_decision_ritou_trade_zone:"离岛通商特区"
 SAN_decision_ritou_trade_zone_desc:"商旅连诸国，零关税下兴百业，财富满金仓。我们要将离岛彻底打造为一个受海祇岛主导的自由港。吸引全提瓦特的资本在这里落地，建立稻妻东部的贸易中枢。一个繁荣的特区将为我们提供源源不断的税收与情报，让离岛成为海祇利益的对外窗口。"
 
 SAN_decision_enkanomiya_hub:"建设地底工业枢纽"
 SAN_decision_enkanomiya_hub_desc:"熔炉深藏下，任凭地表火冲天，生产永不延。渊下宫广阔的浮岛群是完美的战备工厂区。由于不受天气与空袭影响，这里正被改造成国家最大的工业枢纽。每一台自动化机床都在二十四小时不间断地运作。地底的轰鸣声，就是海祇岛反击天理的最强有力的脉搏。"
 
 SAN_decision_phasing_experiment:"相位折叠实验"
 SAN_decision_phasing_experiment_desc:"空间叠残影，瞬息移步跨重洋，玄机莫能详。利用常夜灵庙发现的空间重叠现象，我们尝试建立跨岛屿的即时物资传送点。虽然目前的成功率尚不稳定，但这种跨越空间的后勤能力将彻底改写战略机动性的定义。距离在真理面前，将不再是障碍。"
 
 SAN_decision_hq_expansion:"总指挥部扩建"
 SAN_decision_hq_expansion_desc:"司令驻深渊，全局调度无盲区，军令定乾坤。为了管理日益庞大的版图，我们扩建了位于大日御舆下方的联合指挥部。这里集成了最先进的地脉通信站和全息战术沙盘。海、陆、空三军的每一项异动都能在这里实时反馈。指挥的高效，决定了决战的胜果。"

# ========================== 组4：白夜遗产与真理追寻 (10条) ==========================
 SAN_decision_break_sun_child_chains:"卸下太阳之子的枷锁"
 SAN_decision_break_sun_child_chains_desc:"高塔囚稚童，白夜幽幽照孤影，权柄落深宫。彻底废除渊下宫遗留的病态政治残余，释放那些被旧式官僚体系束缚的文明活力。我们通过追思会与历史清算，将‘太阳之子’的悲剧转化为激励国民追求自由的动力。清空历史的尘埃，方能看清未来的方向。"
 
 SAN_decision_read_forbidden_history:"解读《日月前事》"
 SAN_decision_read_forbidden_history_desc:"禁书录旧史，第一王座现真容，天理亦惊心。这是一个极其危险的行动。在严密保护下，顶尖学者们开始系统性地破译这本禁书。里面记载的关于世界起源的真相虽然令人震撼，却也赋予了我们对抗天空法则的终极智慧。知识，就是我们撕碎伪装的利刃。"
 
 SAN_decision_ignite_helios:"点燃恒星之核"
 SAN_decision_ignite_helios_desc:"恒星沉海底，赫利俄斯核心燃，光明满国园。重启大日御舆的能源核心，不仅是为了照亮渊下宫，更是为了获取那传说中的‘微型太阳’能量。这种能量的应用将使我们的重型机甲和旗舰拥有远超时代的动力密度。白夜的光辉，将成为驱散黑暗的制胜之光。"
 
 SAN_decision_vishap_domestication:"龙蜥生物驯化"
 SAN_decision_vishap_domestication_desc:"龙嗣低垂首，铁轭加身役深渊，助力越山川。通过生物炼金术对深海龙蜥进行行为干预，我们将这些远古的猎手转化为强大的突击与负重载具。龙蜥骑兵的组建，将大幅提升我们在复杂地形下的战术威慑力。自然的野性，正因为凡人的智慧而归于秩序的掌控。"
 
 SAN_decision_serpent_heart_ceremony:"举行蛇心大祭"
 SAN_decision_serpent_heart_ceremony_desc:"地脉乱弦振，屏蔽天之监视眼，秘密锁重深。蛇心之地是空间交叠的奇点。通过举行规模宏大的祭祀仪式，我们利用其地脉共振频率建立了一套覆盖全岛的‘反侦察屏障’。在这片神灵也无法看穿的阴影中，我们将从容不迫地推进那颠覆提瓦特的终极计划。"
 
 SAN_decision_reveal_forbidden_truth:"公开真实历史"
 SAN_decision_reveal_forbidden_truth_desc:"真相沉血海，揭开谎言逆乾坤，白夜志不改。将《日月前事》的内容在各级教育机构中公开。让国民意识到我们并非神灵的弃民，而是文明真理的唯一继承者。虽然这会引发国际舆论的恐慌，但被真相唤醒的民族自尊心，将筑就我们最坚不可摧的意志长城。"
 
 SAN_decision_white_night_tactics_book:"编撰白夜作战条令"
 SAN_decision_white_night_tactics_book_desc:"战法出古卷，奇兵诡道算无遗，神位亦可敌。将先民对抗龙蜥的记录与现代步炮协同理论相结合。我们强调利用地形切割与能量反制来对抗压倒性的个人武力。这套条令将把军队转化为一支专门针对‘神灵级威胁’的高效战斗集体。众生平权，始于剑锋。"
 
 SAN_decision_abyss_armor_project:"研制深海潜航甲"
 SAN_decision_abyss_armor_project_desc:"铁甲震渊底，步兵外骨骼现世，勇士力千钧。利用渊下宫特产的耐高压合金，我们研制出了第一代动力增强装甲。这种装甲能让普通的士兵在极短时间内爆发魔神般的力量，且在极端地形中如履平地。钢铁的洪流即将从深渊中喷发，去碾碎那些陈腐的旧序。"
 
 SAN_decision_chronos_prayer:"时间之执政祈祷"
 SAN_decision_chronos_prayer_desc:"时刻统万物，常世大神佑民心，信仰志不移。确立对‘常世大神卡伊洛斯’的官方崇拜。这不仅仅是信仰，更是一种对‘历史必然性’的宣告。国民深信我们正走在正确的时刻上。这种超越现世神权的心理韧性，将使我们在面对任何形式的磨损时都立于不败之地。"
 
 SAN_decision_abyss_mobilization:"渊下防卫动员"
 SAN_decision_abyss_mobilization_desc:"渊下起咆哮，数万平民化锐卒，革命志如磐。在渊下宫的深处建立覆盖全社区的军事训练营。让每一位移民都具备基础的特种作战能力。渊下宫不再仅仅是生产中心，它已经变成了一个随时可以响应领袖号召、喷涌出千万复仇火种的庞大兵营。全军备战，决胜千里。"

# ========================== 组5：现人神意志与万政合流 (10条) ==========================
 SAN_decision_orobashi_orthodoxy:"强化大蛇正统"
 SAN_decision_orobashi_orthodoxy_desc:"大蛇尊位起，鸣神残留尽清洗，信仰归一宗。肃清占领区内一切关于鸣神的崇拜痕迹。确立奥罗巴斯远吕羽氏尊为唯一的正统真神。这种单一、纯粹的宗教环境将极大降低统治成本，让整个国家的意志如同神权战锤般高度统一。异端必将被圣火净化，光荣归于海祇。"
 
 SAN_decision_clerical_admin_reform:"神职官僚整肃"
 SAN_decision_clerical_admin_reform_desc:"官位即祭司，行政职能带圣威，服从是美德。政府官员必须由受过神学考核的祭司出任。这种体制将行政决策与神学教义紧密结合，消除了政令在执行过程中的损耗。民众对政策的响应已达到宗教层面的狂热，国家正化作一台由现人神意志驱动的精密钟表，高速运转。"
 
 SAN_decision_republic_oath:"共和宪章宣誓"
 SAN_decision_republic_oath_desc:"权柄入笼中，法律至上定乾坤，公义永长存。心海大人在诸岛代表面前郑重宣告权力的边界。通过签署这部庄严的宪章，我们确立了主权在民、司法独立的原则。每一个岛民的声音都将受到保护。这部契约将成为海祇联合共和国长治久安的灯塔，照亮自由的自由之路。"
 
 SAN_decision_island_parliament_session:"召开诸岛议会"
 SAN_decision_island_parliament_session_desc:"辩论定国策，多岛一心议蓝图，公正见阳光。汇集来自鸣神、离岛、清籁与海祇的民选代表。虽然协商的过程可能伴随着激烈的争吵，但这确保了国家决策的透明度与包容性。通过多方利益的博弈与平衡，我们正在塑造一个比旧幕府更加坚韧、更有生命力的共和政体。"
 
 SAN_decision_export_revolution:"输出革命意志"
 SAN_decision_export_revolution_desc:"火种撒万里，革命思想传列国，旧序终崩颓。派遣大批政治工作者前往提瓦特各地，联络那些被神权秩序压迫的失意者。我们要告诉全世界：神非永恒，凡人的意志才是世界的主宰。一场席卷大陆的反抗风暴正由我们策划。我们要让革命的钢铁洪流，冲跨天空岛的御座。"
 
 SAN_decision_industry_collectivization:"工业集体化运动"
 SAN_decision_industry_collectivization_desc:"工坊归公社，所有产出注革命，铁流向高天。取消一切私人企业，将所有生产资料收归国有并集中调度。为了那场挑战天空的终极圣战，每一颗子弹、每一台装甲都必须服务于整体革命利益。这种极致的动员模式正创造出神灵也无法想象的奇迹。一切为了解放，一切为了胜利。"
 
 SAN_decision_holy_crusade_start:"发起神圣征讨"
 SAN_decision_holy_crusade_start_desc:"版图无边际，蓝色海洋皆圣土，进军向远方。我们要将大御神的悲悯扩展到被伪神奴役的每一寸土地。以解放众生为名，远征军团正整装待发。这种进攻性的扩张教义将为国家攫取海量的生存空间和战争红利。圣战的旗帜已高高飘扬。为了荣光，前进！"
 
 SAN_decision_religious_tolerance:"宽容信仰宣言"
 SAN_decision_religious_tolerance_desc:"信仰归个人，大蛇鸣神共和解，灵台自清宁。正式实行政教分离，保障公民选择信仰的自由。无论是大蛇的虔信者还是鸣神的追随者，在法律面前一律平等。这种极大的宽容彻底终结了稻妻千年的宗教内耗。一个和谐共处的大时代正随着自由的风气席卷诸岛。"
 
 SAN_decision_abyss_secret_contract:"缔结深渊秘密契约"
 SAN_decision_abyss_secret_contract_desc:"暗影为同谋，敌人的敌人共敌，撕碎伪光明。心海大人默许了与阴影中黑暗力量的暂时性协作。我们要利用深渊的知识来反制天空的禁令。虽然这充满风险，但为了终极的自由，我们无惧与深渊同行。当黑暗与革命交织时，提瓦特的天空将彻底变色，旧秩序必将坍塌。"
 
 SAN_decision_defy_the_order:"宣告逆天行道"
 SAN_decision_defy_the_order_desc:"血荐战高天，揭开天理伪秩序，白夜志不移。我们公开宣布废除与天空岛的一切单方面协定。拦截地脉信号，扰乱元素循环。我们要向世人证明，所谓‘不可违抗的秩序’不过是脆弱的谎言。海祇岛已向御座亮剑。我们要用凡人的血火，烧出一条通向真理的坦途。决战已经开始！"



