FOM.12.t: "檐帽之影"
FOM.12.desc: "费索勒的情报只是一根引线，护国公爵当然有逮捕议员的权力，但要扳倒杜吉耶，光靠一个受害者的口供远远不够。他需要更多的受害者站出来，需要确凿的物证，以及檐帽会控制成员的证据。情报部门反馈信息显示，几乎每一个被接触的檐帽会成员都表现出异乎寻常的谨慎和抗拒。他们愿意进行日常交易，愿意完成简单的工作指令，但对任何超出明确任务范围的对话都显示出一种近乎本能的回避。有人试图打听组织内部的情况，得到的回应只有沉默。\n莱欧斯利只能选择更迂回的办法：放出风声。护国公爵正在调查内战期间某些组织“对成员使用非法手段”的问题，任何知情者若愿意提供线索，不仅身份会得到绝对保密，还能获得公爵的庇护。几天后，开始有人借着夜色敲响情报站的门。来的不是檐帽会的核心成员，而是他们的家属、邻居，或者曾经短暂加入又设法逃离的边缘人。有人说看见过会长杜吉耶带着一颗会发光的黑色石头走进密室，那些成员出来后无一例外露出极其惊恐的表情。\n人证在增加，但物证仍然缺位。莱欧斯利需要一个人——一个能接触到核心秘密、愿意冒死站出来的人。\n直到这天下午，莱欧斯利正在沫芒宫的办公室里翻阅文件，门被轻轻敲响。进来的是一个年轻女人，穿着一件和费索勒类似的工装，手里拿着一顶檐帽会的帽子。她的脸色苍白，双手微微发抖，但眼神里有一种豁出去了的决绝。“公爵大人，”她的声音压得很低，“我叫阿维斯，是费索勒的恋人。”莱欧斯利合上文件夹，示意她坐下。阿维斯没有坐。她走到办公桌前，将手中的帽子放在桌面上。她的嘴唇动了动，还没来得及说出一个字——\n门被猛地推开了。杜吉耶站在门口，他的脸上挂着惯常的微笑。“阿维斯，你怎么昏头昏脑地闯进了公爵大人的办公室。不好意思啊公爵大人，让您见笑了，阿维斯从到梅洛彼得堡开始精神就不太稳定...”\n“我可不记得听到了敲门的声音。”莱欧斯利在言语中敲打杜吉耶，也在给他机会坦白。\n杜吉耶目光从阿维斯身上移到莱欧斯利脸上。“抱歉，我害怕公爵大人受到惊吓，还望您大人有大量。”\n“抱歉，公爵大人，”阿维斯尽力压制恐慌的语气，“我没有什么要说的，打扰您了。”\n“好了我们回去吧，阿维斯。”阿维斯乖乖地抱着帽子，跟在杜吉耶身后，头也不回地走了。\n来客关上门后，莱欧斯利坐回椅子思考起来。“证据不在帽子里，也不在脑袋上，但费索勒的情报显示，证据就在头顶。”莱欧斯利将翘在桌上的双腿放下，“杜吉耶的办公地点就在门外，阿维斯应该没有傻到用帽子种明显的证物传递情报。那她摘下帽子是为了...”莱欧斯利突然看到刚刚阿维斯放帽子的文件底下，压着一个棕色的发卡。“这个！”莱欧斯利拿起发卡，翻过来。背面有一道极细的缝隙，用针尖轻轻挑开，里面是中空的。残留的深色液体已经干涸，颜色与费索勒描述的那颗黑色宝石几乎一致。背面的凹槽里，嵌着一根输液用的细针。他把发卡放到灯下，反复看了很久。"
FOM.12.a: "证据，终于到手了"

