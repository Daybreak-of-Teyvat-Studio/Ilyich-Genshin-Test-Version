#人物

PBF_Navia1: "娜维娅"
PBF_Navia2: "娜维娅"
PBF_Navia1_desc: "娜维娅，刺玫会的现任会长与领导者。这个由她父亲卡雷斯创立的民间组织，以其在白淞镇的船只为总部，长期以来以为枫丹居民提供各式各样的帮助而闻名，并曾为巡轨船水道的建设做出过巨大贡献。然而，父亲卡雷斯的离世让刺玫会一度蒙上阴影，声望与经济实力大不如前。所幸在吞噬枫丹的预言危机之中，娜维娅与她领导的刺玫会没有退缩。组织的船队在灾难中挺身而出，全力营救被洪水围困的民众，这一壮举为娜维娅赢得了空前的声望，也向所有枫丹人证明了刺玫会依然是可以依赖的力量。 \n\n安宁并未持续太久。随着最高审判官那维莱特的失踪，枫丹廷迅速被阴霾笼罩。贵族议会以“优化”为名，再度将清洗的矛头指向了灰河与白淞镇的居民。面对压迫，娜维娅没有丝毫犹豫。她深知，刺玫会诞生的意义，就是为了阻止这样的悲剧重演。\n\n此刻， 娜维娅坚定地站在斗争的最前沿，她的身影成为了反抗者们的精神旗帜。她向所有人，也向自己立下誓言：百年前枫丹发生的惨剧，绝不能在今天，在她的守护下重演。"
PBF_Navia2_desc: "当战火平息，硝烟散尽，娜维娅面对的是一片亟待重建的枫丹，以及一个更加棘手的内部泥潭。刺玫会凭借在内战中的功绩与声望，自然成为了新生枫丹的核心领导力量。然而，这位年轻的会长比任何人都清楚，胜利的光环之下，暗流从未停止涌动。\n\n昔日的刺玫会是一个包容各方的庇护所，这既是其力量的源泉，也成为了如今最大的隐患。卡布里埃商会的残党——那些曾在预言危机前染指“乐斯”贸易、甚至参与了“少女连环失踪案”的阴影，如今披着“革命功臣”的外衣，试图将触角伸向新政府的贸易与金融命脉；而罗默夫帮的继承者们，尽管在内战中并肩作战，却从未真正放下因水道修建而与刺玫会结下的旧怨，他们盘踞在重建工程的关键节点，将国家命脉视作博弈的筹码。\n\n娜维娅深知，这些盘根错节的势力若不清算，她的政令将永远无法踏出沫芒宫的大门，而枫丹的未来也将从一个贵族的牢笼，坠入另一个由商会与帮派掌控的无序深渊。于是，一场比对抗贵族更加残酷、更加考验智慧与决断的内部整顿悄然展开。每一步都如履薄冰，每一次行动都可能被指责为“背叛战友”。但为了父亲建立的理想，为了刺玫会守护的信念，更为了一个不被阴影操控的枫丹，她必须成为那个挥剑之人。真正的守护，有时比单纯的征服更需要勇气。"









