l_simp_chinese:

#################################################################
#国策

HZH_mass_Fatui: "集结愚人众"
HZH_mass_Fatui_desc: "召唤的讯号已经通过密线传达到了每一个安全的角落。他们从海露港的阴影中，从枫丹廷废弃的宅邸里，甚至从那些自以为早已摆脱过去的“商人”面具下走了出来。他们是被祖国抛弃的尖刀，是渗透进枫丹血肉中的根须，如今，他们被要求集结在“父亲”的旗帜之下。这并非一场愉快的重逢，空气中弥漫着怀疑与算计的气息。我们知道，他们效忠的或许并非枫丹的新秩序，而是至冬遥远的意志，或是纯粹的金币。但此刻，我们需要每一把能够握住的武器，哪怕它最终会割伤自己的手。让这些来自冬都的幽灵，暂时成为我们可见的骨架。"
HZH_Knave_protect: "保护“孩子们”"
HZH_Knave_protect_desc: "阿蕾奇诺的目光扫过地图上那些代表敌军的箭头，最终落在一份份写满了“孩子们”名字的名单上。他们中有的人已经拿起了枪，更多的人则躲在临时营地里，眼中充满了对这个撕裂世界的恐惧。“父亲”的职责是什么？是赢得一场战争，还是确保火种得以延续？命令被下达了：建立一条绝对安全的补给线，动用一切资源，确保每一个“雪奈茨芙娜”和“雪奈茨维奇”都能得到食物、药品和庇护。这无关软弱的同情，这是最根本的战略——壁炉之家之所以为“家”，正是因为我们从不放弃家人。哪怕这意味着前线的士兵需要分出宝贵的给养，这也是我们必须承担的重量。"
HZH_control_Esus: "掌控芒索斯"
HZH_control_Esus_desc: "芒索斯山脉冰冷的风吹拂着侦察兵的脸颊。在他们脚下，枫丹廷的灯火如同散落的星辰，而更远处，梅洛彼得堡的阴影潜伏在海水中。这座山脉不仅仅是地理的制高点，它是精神的象征，是旧时代贵族们用以自恃的天然屏障。如今，我们必须成为这座山脉的新主人。工程师们——其中不少是曾在至冬军事学院学习过的“家人”——正在险要处架设火炮和通讯基站。每一条被开辟的小径，每一个被建立的观察哨，都是我们伸出的手指，即将牢牢扼住梅堡的咽喉。"
HZH_Snezhnaya_support: "至冬的后援"
HZH_Snezhnaya_support_desc: "十字湾的起重机在夜色中轰鸣，卸下印着愚人众徽记的板条箱。里面是崭新的步枪、成捆的制服、以及枫丹市场上早已断绝的医疗用品。官员们清点着物资，脸上却毫无喜色。每一箱军火，都伴随着一份来自“公鸡”或“富人”那充满算计的问候，以及一份利率不明的账单。我们正在用国家的未来做抵押，换取眼前的生存。这些冰冷的钢铁和化学品，是我们维持“家庭”运转的血液，但输入这血液的针管，却牢牢握在至冬的手中。有人低声质疑，我们是否只是在为另一场属于冬都的战争充当先锋？但枪声已响，我们没有回头路可走。接受这份带着荆棘的馈赠，是我们唯一的选择。"
HZH_Conjuring_Chiaroscuro: "光与影的戏术"
HZH_Conjuring_Chiaroscuro_desc: "合法性并非源于血脉或古老的神谕，它是一场需要被精心导演的戏剧。我们必须成为最伟大的魔术师，在枫丹的舞台上，将“境外势力”的冰冷事实，巧妙地转化为“秩序重建者”的温暖许诺。让每一次公开演讲都如同林尼最精彩的表演——用光芒去掩盖阴影，用华丽的辞藻去转移他们对幕后真相的注意力。我们要让民众为这“奇迹”欢呼，让他们在见证幻术的惊叹中，自愿接受我们书写的新规则。这场戏法的高潮，将是所有人都在为我们这个“外来之家”的统治而喝彩，却忘记了追问我们究竟从何而来。"
HZH_Snezhevna_choice: "雪奈茨芙娜的抉择"
HZH_Snezhevna_choice_desc: "孩子们正站在命运的十字路口。他们生于枫丹的流水与雾霭，却被赋予了至冬的姓氏与使命。他们的灵魂深处正在进行着一场无声的战争：一边是脚下土地的呼唤，是童年记忆中枫丹廷的街巷与歌声；另一边是“父亲”的教诲，是壁炉之家的温暖，是至冬所代表的、强大的“外部意志”。我们不能允许这种撕裂感瓦解我们的根基。必须发起一场灵魂层面的总动员，通过历史的重述、共同的仪式与内部教育，清晰地告诉他们：你们的根或许扎在枫丹，但你们的枝叶之所以能迎风招展，是因为“父亲”提供了生长的支架。忠于壁炉之家，就是忠于一个超越了狭隘地域的、更崇高的秩序。你们的抉择，不是背叛出生地，而是选择一个更强大的家庭与未来。"
HZH_Spectacle_Phantasmagoria: "惑光幻戏"
HZH_Spectacle_Phantasmagoria_desc: "我们不再满足于分散观众的注意力，我们要重塑他们的现实。通过严格控制的信息渠道、精心编排的教育内容、以及无孔不入的宣传艺术，我们将系统性地构建一个全新的叙事：旧枫丹的贵族与律法早已腐烂至骨髓，是“壁炉之家”响应了这片土地无声的呼唤，带来了至冬的力量与智慧作为“礼物”，而非“入侵”。我们将把所有的抵抗行为定义为“旧时代幽灵的抽搐”，将所有质疑的声音描绘为“不愿见到枫丹康复的顽固派”。真相不再重要，重要的是被广泛接受的“现实”。当这一幻戏完成，枫丹人将发自内心地相信，我们的统治不是一种选择，而是历史必然的、唯一的出路。"
HZH_Trivial_Observations: "琐碎观察术"
HZH_Trivial_Observations_desc: "经济并非宏大的口号，它隐藏在每一份被忽略的报表、每一次微小的市场波动、每一个平民关于面包价格的抱怨之中。\n我们要建立一套前所未有的经济监测体系，去审视那些贵族经济学家不屑一顾的“琐碎”——黑市交易量、茉洁草价格的异常波动、工坊零件损耗率的细微变化。从这些碎片中，我们能拼凑出国家经济真实的健康状态，能预见到即将发生的短缺或动荡。然后，我们将以精准的、外科手术般的方式进行干预，像魔术师预知观众的每一个反应那样，调控市场，分配资源。让经济的缰绳，牢牢握在能看清所有“琐碎”的人手中。"
HZH_Loci_Based: "点位记忆法"
HZH_Loci_Based_desc: "经济重建不能依靠漫无目的的投入，它需要一份精确到“点位”的认知地图。\n苍晶矿脉最富集的矿点、律偿之轨最关键的枢纽、白淞镇最有效率的造船厂、以及贵族们藏匿财富的秘密金库。所有的资源、所有的投资、所有的政策，都将被导向这些战略性的“点位”。我们将不会浪费一丝一毫的力量在无关紧要的地方。通过这种极致的“点位记忆”与执行，我们将在废墟上以最高的效率，重建起一个完全服务于我们战略目的的经济体系，每一个齿轮的转动，都将强化壁炉之家的统治。"
HZH_Elegance_Shadows: "丽影绮行"
HZH_Elegance_Shadows_desc: "堡垒最易从内部攻破，任何组织的溃烂都始于细微的腐败、动摇的忠诚与潜藏的异见。\n这不是残酷的清洗，而是一次必要的外科手术，旨在切除那些会危及整个身体的病变组织。我们将确保壁炉之家在迈向更高权力的道路上，内部的核心如同琳妮特的心境一般，冷静、纯粹、且绝对忠诚。"
HZH_ghost_under_water: "水下堡垒的幽灵"
HZH_ghost_under_water_desc: "梅洛彼得堡……它不再是那座管理罪犯的监狱，它已化身为一个政治实体，一个由莱欧斯利那套危险而有效的生存哲学所武装起来的“水下王国”。它代表着一种本土的、不受我们控制的、并且极具韧性的力量。在我们与软弱的枫丹廷贵族周旋之前，必须优先拔除这颗最靠近心脏的钉子。这个“幽灵”不除，它随时可能在我们与南方交战的关键时刻，从背后给我们致命一击。因此，集结我们所有的力量，优先应对莱欧斯利的攻势。我们必须将这水下的幽灵彻底驱散，将梅洛彼得堡的铁律，替换成壁炉之家的火焰。"
HZH_deep_depth: "深潜行动"
HZH_deep_depth_desc: "菲米尼调整着潜水面具，目光透过舷窗，望向下方那片吞噬光线的深蓝。梅洛彼得堡就像一头匍匐在海床上的巨兽。他的任务不是从正面攻打它，而是找到它的鳃，它的脆弱之处。他和他精挑细选的小队，将沿着洋流，从水下最隐秘的排污口或检修通道潜入。他们的目标是核心的泵房、通讯线路或是能源中枢。这是一场与压力、低温、缺氧以及无时无刻不在的暴露风险的赛跑。他们携带的不是大规模杀伤性武器，而是精准的爆破炸药和一颗与整个堡垒同归于尽的决心。成功，他们将为主力打开一条通往胜利的捷径；失败，他们的名字将只会出现在壁炉之家内部那份永不公开的阵亡名单上。"
HZH_attack_fortress: "要塞攻坚"
HZH_attack_fortress_desc: "幻术、渗透、心理战……所有精巧的铺垫都已就绪。现在，是时候让战争回归其最古老、最残酷的本质了。命令沿着战线传递：总攻开始。重炮被推上前沿，对着那些厚重的钢铁墙壁发出怒吼；士兵们检查着最后的装备，眼神中混合着恐惧和决绝。这不是他们擅长的阴影中的游戏，这是正面撞击，是钢铁与血肉的消耗战。我们将用“家人”的生命，去测量那座堡垒的坚固程度。每一寸的推进，都将被鲜血染红。"
HZH_Yearning_Unseen_Depths: "潜怀遐梦"
HZH_Yearning_Unseen_Depths_desc: "菲米尼曾说过，最深的海底没有光，只有压力与回忆交织的梦境。如今，我们正潜入一场远比海洋更幽邃的战争——一场关乎身份与归属的遐梦。\n那些曾在阴影中挥舞利刃的“孩子们”，此刻凝视着自己染血的双手，恍惚间分不清那是敌人的血，还是自己逐渐凝固的过去。我们以“家人”之名并肩作战，却不得不将刀锋指向这片土地上同样挣扎的灵魂。莱欧斯利的堡垒沉没了，但水面上浮起的，是我们内心深处更汹涌的迷雾：我们究竟是谁？是至冬掷向棋盘的利刃，还是枫丹未来的铸造者？"
HZH_end_sin: "“罪恶”之终"
HZH_end_sin_desc: "“父亲”的指令简洁而绝对：梅洛彼得堡必须被彻底肃清，其作为一个独立权力中心的象征必须被完全抹去。所有负隅顽抗者，都将被视作旧时代罪恶的残渣，予以物理意义上的清除。这场战役的终结，必须如此残酷，如此彻底，以至于未来任何试图挑战壁炉之家权威的人，在想起梅洛彼得堡的结局时，都会从骨髓里感到寒意。让这座水下堡垒的陷落，不仅仅是一场军事胜利，更是一场对所有潜在对手的血淋淋的献祭。"
HZH_Snezhnaya_coming: "凛冬将至"
HZH_Snezhnaya_coming_desc: "南方的内战硝烟即将散去，无论最终站在废墟上的是垂死挣扎的旧贵族，还是以解放者自居的刺玫会，我们都将面对一个统一的、敌对的南方政权。和煦的假面已被撕碎，枫丹的天空将不再由两种不同的蓝色平分——要么是壁炉之家的旗帜覆盖全境，要么是我们的理想被彻底逐出这片土地。让来自至冬的寒风，成为我们进军的前奏。"
HZH_attract_Rosula: "壁炉温暖孤影"
HZH_attract_Rosula_desc: "战争制造了无数的流离失所者，刺玫会的理想在现实的铁蹄下破碎，留下的是充满迷茫与怨恨的灵魂。他们失去了家园，而我们可以提供一个。向这些孤影敞开大门，提供食物、庇护所以及一个名为“家人”的归属。这并非纯粹的仁慈，而是一种最有效的净化——将他们对旧秩序和失败反抗者的忠诚，转化为对“壁炉”炽热的、不容置疑的依附。"
HZH_attack_Rosula: "风雪摧残刺玫"
HZH_attack_Rosula_desc: "枫丹帝国溃败催生了一股北上的逃亡潮——昔日的贵族、军官、以及所有恐惧我们统治的人。对于这些人，首先，甄别并暂时安置所有具备价值的目标；其次，无情地清除那些冥顽不灵的核心死硬派；最后，让剩余的人在严密的监控下，用他们的知识和残余的影响力，为我们新的秩序服务。\n执行官“富人”说这是他的三步走战略：请客，斩首，收下当狗。"
HZH_Balemoon_Rising: "厄月将升"
HZH_Balemoon_Rising_desc: "外交的试探与虚伪的缓和已经结束。阿蕾奇诺的意志如同夜空中升起的厄月，其光芒所及之处，唯有彻底的征服。是时候向盘踞在南方的最后敌人，递上那份早已准备好的、以血书写的战书。让整个枫丹都明白，拒绝“父亲”的恩典，其代价唯有毁灭。"
HZH_Whimsical_Wonders: "空取奇思的手艺"
HZH_Whimsical_Wonders_desc: "经济重建需要非凡的想象力。如同最伟大的魔术师能从虚无中取出礼物，我们必须从战争的废墟里变出繁荣。鼓励并资助那些异想天开的技术革新与手工业复兴，让发条机关、苍晶石加工乃至荒芒能量应用，成为我们经济复苏的第一个奇迹。"
HZH_Prestidigitation: "宣迷灵敏的执法"
HZH_Prestidigitation_desc: "市场的稳定需要一双无处不在且敏锐的眼睛。建立一支高效、廉洁且绝对忠诚的经济执法队伍，严厉打击投机倒把、囤积居奇与黑市交易。让经济领域的任何“疾病”都能被迅速诊断、定位并根除，确保国家资源的每一滴都流向最需要的地方。"
HZH_Loquacious_Cajoling: "巧言贴耳的引诱"
HZH_Loquacious_Cajoling_desc: "资本是胆怯而又贪婪的。用精心设计的政策——税收减免、贸易特权、安全保障——向那些仍在观望的国内残余资本与谨慎的国际投资者低语。让他们相信，在壁炉之家的新秩序下，存在着前所未有的、安全的暴利机会。让摩拉的声音，压过他们对政治风险的疑虑。"
HZH_Versed_Rehearsed: "熟稔习练的筹谋"
HZH_Versed_Rehearsed_desc: "当零散的经济手段铺垫完毕，一个全面、系统且深谋远虑的经济总规划便必须登场。将所有产业、资源与财政政策整合进一个宏大的蓝图之中。我们的目标不是简单的恢复，而是构建一个完全服务于国家战略、能够支撑我们未来野心的战争机器与社会体系。"
HZH_undercover_intelligence: "卧底情报"
HZH_undercover_intelligence_desc: "真正的征服始于对敌人灵魂的渗透。将我们的“家人”如同种子般播撒进南方社会的每一个缝隙。他们将成为我们的耳朵、眼睛，甚至在必要时，成为搅乱对方神经的毒药。在敌人的心脏深处，构建另一个无形的“壁炉之家”。"
HZH_magic_tricks: "魔术技巧"
HZH_magic_tricks_desc: "政治在某种程度上，就是一场盛大的魔术。通过精心编排的信息、引人入胜的叙事与对现实巧妙的“剪辑”，我们将把残酷的征服描绘成解放，将必要的镇压解释为秩序，将自身的利益包装成共同的福祉。让南方民众在不知不觉中，为我们喝彩。"
HZH_Sophisticated_Synergy: "巧施协同"
HZH_Sophisticated_Synergy_desc: "当渗透与宣传达到临界点，便是收网之时。让卧底的特工与正面的舆论攻势协同发力，在敌人内部制造无法弥合的猜忌与混乱，策动关键人物的倒戈，在总攻发起前，就从内部瓦解他们的抵抗意志。影子与光线的戏法，在此刻达成最完美的协同。"
HZH_Agony_Repaid: "唯苦痛可偿还"
HZH_Agony_Repaid_desc: "对壁炉之家造成的每一份伤害，对“家人”流下的每一滴血，都必须得到偿还。这不是报复，这是神圣的算术。我们将以敌人十倍的痛苦与毁灭，来清算他们欠下的债务。唯有如此，才能告慰逝者，并让生者牢记反抗的代价。"
HZH_Strength_Defend: "唯力量可守护"
HZH_Strength_Defend_desc: "空洞的理想与软弱的同情，守护不了任何东西。刺玫会的失败已然证明。在这片残酷的土地上，唯有绝对的力量——训练有素的军队、坚不可摧的工事、以及使用这一切力量的冷酷决心——才是守护我们建立的一切的唯一信条。"
HZH_Balemoon_Know: "唯厄月可知晓"
HZH_Balemoon_Know_desc: "战争的最终阶段，其决策已超出了常人的理解范畴。它依赖于一种在漫长黑暗中磨砺出的、近乎直觉的洞察力。阿蕾奇诺，我们的“厄月”，将以其独有的方式洞悉战场的迷雾，下达那些看似疯狂却直指胜利核心的终极指令。这是唯有她才能背负的智慧与诅咒。"
HZH_Invitation_Beheading: "斩首之邀"
HZH_Invitation_Beheading_desc: "对于南方的指挥中枢，我们不必耗费兵力进行强攻。向他们核心层的关键人物，发出特别的“邀请”。可以是匿名的恐吓，可以是无法拒绝的贿赂，也可以是……一场由琳妮特亲自递上的、无法送达的午夜问候。让他们的头脑，在恐惧中自行崩溃。"
HZH_Hearth_Fontaine: "炉火映射枫丹"
HZH_Hearth_Fontaine_desc: "南方的战火已然平息，无论曾有多少犹豫与代价，如今整个枫丹都已置于壁炉之家的管理之下。炉火的温暖驱散了旧时代的严寒，其光芒也照亮了我们脚下这片满目疮痍却又充满可能性的土地。但这光芒也映出了我们自身的影子——一个庞大、统一，但内部蕴藏着至冬的烙印与未知挑战的新生国家。我们完成了征服，而真正的考验，现在才刚刚开始。"
HZH_ECC: "经济统筹委员会"
HZH_ECC_desc: "当战火的余烬尚未完全冷却，建立新秩序的第一步便是驾驭经济的缰绳。沫芒宫的深处，一个新的权力核心正在诞生——经济统筹委员会。这里没有贵族间无休止的讨价还价，只有基于数据和战略需求的冷静计算。每一个工厂的复工，每一份资源的调配，都将不再是市场盲目的选择，而是服务于国家重建这部精密机器的绝对指令。我们将用计划，取代混乱。"
HZH_restore_north_traffic: "修复北线交通"
HZH_restore_north_traffic_desc: "连接枫丹廷与梅洛彼得堡及枫丹科学院的血管早已干涸、堵塞。它们不仅是国内经济的脉络，更是我们与至冬母亲之间不可或缺的脐带。让工程师与工兵部队开赴前线，不是去摧毁，而是去重建。疏通水道，加固桥梁，让来自冬都的给养、技术与意志，能够如同北风一般毫无阻滞地吹遍枫丹的每一个角落。这条水道的复苏，象征着我们的统治已从征服走向建设。"
HZH_Esus_market: "芒索斯边境市场"
HZH_Esus_market_desc: "芒索斯山脉的北风，直接来自冬都。我们无法，也不能切断这条经济的生命线。在山脉的北侧，建立特许的边境市场，给予至冬商品最优惠的通行权与关税豁免。让这里的集市成为至冬工业品与枫丹原材料交换的前哨。我们的经济重建离不开圣冬，这是一个必须承认，并需主动利用的事实，哪怕这会让我们北方的边境永远回荡着至冬的口音。"
HZH_Meropide_product: "梅洛彼得堡产线"
HZH_Meropide_product_desc: "那座水下堡垒曾是我们最顽固的敌人，如今，它锈蚀的工厂和沉寂的船坞将成为我们最宝贵的遗产。工程师们正在评估那些被莱欧斯利遗留下的工业产线——从船舶维修到武器制造。重启它们，让曾经用于对抗我们的机器，转而为我们生产重建所需的钢铁与设备。让梅洛彼得堡的轰鸣声，从抵抗的号角，变为臣服的赞歌。"
HZH_FRI_rebirth: "枫丹科学院重生"
HZH_FRI_rebirth_desc: "过去的爆炸让这里蒙上阴影，但恐惧不应是科学的主旋律。在确保绝对安全与政治可靠的前提下，重启枫丹科学院的大门。让那些被埋没的天才与他们的研究重见天日，无论是用于改善民生的发条机关，还是能够强化我们军事实力的能源科技。知识本身没有立场，但从今往后，它必须为壁炉之家服务。"
HZH_share_research: "共享研究院成果"
HZH_share_research_desc: "单打独斗是愚蠢的。向我们的至冬盟友敞开研究的大门，共享枫丹科学院在能源、机械等领域的非核心研究成果。这是一种诚意的姿态，也是一笔精明的投资。我们付出的是一部分知识，换取的是更深度的技术合作、更牢固的政治同盟，以及在未来那场更大的棋局中，一个更有利的位置。"
HZH_attract_south: "影响南方观念"
HZH_attract_south_desc: "枫丹廷与白淞镇的街头，那些沉默的眼神中依然充满了不信任。枪杆子可以征服土地，却无法征服人心。是时候发起一场更持久、更精细的战役了。通过教育、文艺和无处不在的宣传，将我们的存在从“征服者”重塑为“重建者”与“保护者”。观念的转变需要耐心，但一旦成功，它将比任何堡垒都更为坚固。"
HZH_Beryl_mineral: "开发苍晶区矿脉"
HZH_Beryl_mineral_desc: "深埋于地下的苍晶石，是枫丹工业的蓝色血液。战争曾让开采陷入停滞，如今，我们必须以更高的效率与规模，重新唤醒这些沉睡的矿脉。组织勘探队，引入更先进的采矿技术，让这些蕴含着能量的宝石成为我们出口的支柱和工业复苏的催化剂。"
HZH_Erinnyes_usage: "伊黎耶林区利用"
HZH_Erinnyes_usage_desc: "伊黎耶的林区不仅是风景，更是宝贵的资源。结束贵族时代无序的砍伐，建立国家主导的、可持续的林业管理体系。木材将用于重建家园，林间的特产可以成为贸易商品。我们要像梳理发丝一般管理这片绿海，让它持续地为国家贡献财富。"
HZH_branch_bank: "北国银行枫丹分行"
HZH_branch_bank_desc: "金融是现代国家的心脏。邀请北国银行在枫丹设立分行，以其雄厚的资本稳定我们的货币体系，并为大规模重建提供信贷支持。\n然而，我们必须清醒地认识到，当我们的心跳开始由至冬的银行家来调节时，我们的经济自主权也正被悄然抵押。"
HZH_attract_collaborator: "拉拢各组织合作者"
HZH_attract_collaborator_desc: "旧贵族的产业主、灰河的帮派头目、白淞镇的商会领袖……他们并非铁板一块。通过威胁、利诱与许诺，在他们中间寻找那些识时务的“合作者”。给予他们一定的生存空间和灰色利益，换取他们的臣服与协助。利用他们的本地网络与影响力，以最小的成本维系基层的稳定，将他们的“适应性”转化为我们的统治工具。"
HZH_Hearth_Rises: "炉火旺盛"
HZH_Hearth_Rises_desc: "工厂的烟囱再度冒出浓烟，市场的货架上出现了久违的商品。表面上看，壁炉之家的经济重建取得了毋庸置疑的成功。炉火从未如此旺盛，它驱散了战后的严寒，带来了虚假的暖意。但我们围坐在这炉火旁，感受着它的温度，也必须正视其燃料——那是对至冬日益加深的依赖、是对内部矛盾的暂时压制、是对未来代价的透支。我们建设了一个繁荣的幻象，而维持这个幻象，或许将比赢得内战本身，需要付出更多。"
HZH_MC: "军事共同体"
HZH_MC_desc: "枫丹的枪口应对准何方？这个问题的答案不再取决于我们自身，而是系于沫芒宫内那场无声的路线之争。若我们选择彻底拥抱冬都，那么我们的军队将成为“严冬计划”延伸至高海之上的冰冷触须；若我们胆敢追寻独立的幻影，那么此刻精心打造的武力，则将成为对抗昔日盟邦的最后壁垒。与至冬的同盟关系，正将我们的军事命运引向一个非此即彼的十字路口。"
HZH_mobilize_Fontaine: "全枫丹动员法令"
HZH_mobilize_Fontaine_desc: "通过法令，让整个国家进入彻底的战时轨道——工厂的流水线只为武器轰鸣，农夫的田地产出优先供给军营，每一户家庭的餐桌都与前线的补给线紧密相连。这是一场将国家灵魂锻造成武器的宏大仪式。"
HZH_recruit_supporter: "支援队招募"
HZH_recruit_supporter_desc: "战争不仅需要锋利的矛尖，更需要稳固的握柄。从基层招募可靠人员，组建庞大的军事支援队伍，负责后勤保障、工事修筑与占领区治安。他们或许不直接参与冲锋，但他们的存在，是将军事控制力渗透至国土每一个角落的毛细血管。"
HZH_SSSP_rebirth: "特巡队重整"
HZH_SSSP_rebirth_desc: "将特巡队从治安警察力量，改组为兼具国内维稳与境外渗透功能的特殊军事单位。赋予他们更广泛的执法权限、更精良的装备、以及更严酷的行动准则。让他们成为悬浮在潜在反抗者头顶的无形利剑，以及刺入邻国阴影中的致命毒针。"
HZH_adapt_water: "适应多水环境"
HZH_adapt_water_desc: "枫丹的本质是水。大力扩建海军与两栖部队，研发适应复杂水道与胎海特性的特种舰船。我们的舰队不仅要能控制海面，更要能如菲米尼般深潜，掌握水下战场的绝对主导权，将枫丹的水域化为入侵者的坟墓。"
HZH_military_reform: "全门类军事改革"
HZH_military_reform_desc: "从单兵装备到指挥体系，进行全面而深刻的现代化改革。引入至冬的严酷训练标准，结合枫丹的科技特色，打造一支兼具纪律、韧性与技术优势的新型军队。这是一次伤筋动骨的重塑，只为应对未来更严酷的挑战。"
HZH_air_fleet: "空巡机群"
HZH_air_fleet_desc: "我们不能将枫丹的天空拱手让人。建立一支基于发条技术与风之翼原理的空中力量，尽管初期可能仅能执行侦察与有限的对地支援，但这是争夺未来制空权的起点，是我们视野的必要延伸。"
HZH_shadow_attack: "猎影潜袭"
HZH_shadow_attack_desc: "将琳妮特的潜行与菲米尼的深潜结合，打造专业的猎杀部队。他们擅长在复杂地形——尤其是水下与城市巷战中——进行无声渗透与高速突袭，如同阴影中扑出的猎豹，在敌人发出警报前便已终结战斗。"
HZH_Tacit_Coordination: "灵犀默应的配合"
HZH_Tacit_Coordination_desc: "战争是体系的对抗。打破陆军、海军、空军与特战部队之间的隔阂，通过联合演习、统一通讯和数据共享，锤炼它们在复杂战场上的协同作战能力。让林尼的魔术、琳妮特的潜行、菲米尼的深潜，在宏观战场上融为一体，达成如臂使指般的致命默契。"
HZH_Bouffes_intelligence: "布法蒂情报中心"
HZH_Bouffes_intelligence_desc: "位于枫丹城内的布法蒂公馆，曾是其乐融融的“家”。如今，温暖的壁炉旁架设起最先进的通讯拦截设备，儿童画作被巨大的情报分析板取代。这里将成为我们窥探内外、编织阴谋的神经中枢，每一个进入其中的“家人”，都将成为“父亲”延伸向外的感知触角。"
HZH_Cold_Shadow: "如影流露的冷刃"
HZH_Cold_Shadow_desc: "我们将培养一支特殊的“清道夫”队伍，他们精通伪装、渗透与无声行动。不同于战场上的正面交锋，他们的艺术在于让目标在众目睽睽下“自然”消失，或在狂欢盛宴中悄然沉寂。就像魔术师手中那看似随意流淌的卡牌，实则每一张都淬着剧毒。让死亡本身，成为一场精心编排的演出，在观众尚未察觉之时，幕布已然落下。"
HZH_Obscuring_Ambiguity: "暗昧遮目的障法"
HZH_Obscuring_Ambiguity_desc: "特制的发条观测装置被悄然布设，它们会向敌人的飞行单位传递经过精密篡改的元素信号与视觉幻象；而经过训练的风之翼部队则携带着苍晶石共鸣器，在特定空域制造大范围的光线扭曲。\n\n当敌人的飞行护卫试图定位我方部队时，他们眼中的地面战线会变得模糊而错乱——我们的行军纵队在他们的视野里化作林间迷雾，坚固的防御工事被伪装成废弃的民居，而真正的集结地却在他们感知的盲区中安然无恙。就连最敏锐的巡鹰也会在这片认知的泥潭中迷失方向，将致命的弹药徒劳地倾泻在幻影之上。"
HZH_Midlander_Blade: "央陆利刃"
HZH_Midlander_Blade_desc: "当各兵种的改革与建设相继完成，是时候将它们淬炼成一柄无坚不摧的中央大陆之刃。确立统一的、极具攻击性的作战学说，强调主动出击与决定性歼灭。让“壁炉之家”的军事力量，成为任何对手在制定战略时，都无法忽视的、充满压迫感的噩梦。"
HZH_Father_Fontaine: "枫丹的“慈父”"
HZH_Father_Fontaine_desc: "统一已然实现，但真正的抉择此刻才降临。是成为冰之女皇在枫丹最忠实的代理人，将这片土地与孩子们的未来彻底献祭给至冬的宏大棋局？还是凭借这来之不易的权柄，在两大势力的夹缝中，为“家”争取一丝喘息的自决空间？每一个决定，都将决定枫丹是成为一个繁荣的附庸，还是一个在悬崖边行走的独立实体。这份“慈父”之爱，究竟该如何定义？"
HZH_Arlecchino_duty: "阿蕾奇诺的职责"
HZH_Arlecchino_duty_desc: "她厌恶“公鸡”的权谋算计，不齿“富人”的铜臭哲学，更痛恨“博士”非人的实验。那些同僚似乎早已抛弃了为人的本质。\n然而，现实的引力如此沉重。公开的抗拒，换来的或许是至冬战车的无情碾压，是壁炉之家顷刻间的覆灭。也许，暂时的、表面的顺从，扮演一个忠诚的“仆人”，才是保护孩子们免受更高层面怒火的唯一方式。职责，有时意味着吞咽苦果，与魔鬼共舞。"
HZH_Snezhnaya_choice: "严冬的抉择"
HZH_Snezhnaya_choice_desc: "命令已经下达。枫丹的苍晶矿脉、荒芒能量、乃至重建中的工厂产能，都将被系统地纳入“严冬计划”的庞大需求中。\n更令人窒息的是，征召名单上开始出现壁炉之家“孩子们”的名字——他们将被作为“合作人员”，送往至冬的实验室或隐秘前线。将祖国的资源与家人的血肉，转化为执行他国战略的成本，这是对“父亲”职责最残酷的背叛，还是在其名义下必须承受的终极代价？"
HZH_Father_end_kindness: "结束“父亲”的仁慈"
HZH_Father_end_kindness_desc: "历史是一个残酷的轮回。昔日，她正是凭借对“母亲”暴政的反抗，以仁慈和希望为旗帜，登上了“仆人”之位。\n如今，为了应对内外压力，维持摇摇欲坠的平衡，她不得不重新捡起铁腕与恐惧的权杖。那条她曾亲手推翻的、充满压迫与猜忌的老路，如今正成为她必须踏上的唯一途径。仁慈已成奢侈品，唯有力量永恒。"
HZH_cut_soft: "压制软肋的反抗"
HZH_cut_soft_desc: "几个被自由幻梦蛊惑的孩子，竟在壁炉之家的阴影下编织着独立的网络。他们窃窃私语，谈论着不切实际的未来，全然不知自己的天真正在将所有人拖入深渊。克蕾薇的幽灵在阿蕾奇诺耳边低语——软弱必须被根除。这些无法承受现实重量的灵魂，这些因恐惧而退缩的意志，正是组织最危险的软肋。是时候让手术刀精准地切入肌体，切除这些病变的组织。让他们明白，背叛温暖炉火的人，只配得到冰封的结局。"
HZH_Arlecchino_warning: "给孩子们的警告"
HZH_Arlecchino_warning_desc: "克蕾薇……这个名字是她心脏上永不愈合的伤疤。那个曾与她一同梦想自由、誓言推翻旧秩序的少女，最终却倒在了她的怀中，生命在她手中流逝。杀死挚友，是为了更大的目标，还是只是一种必要的罪恶？那个天真的佩露薇利早已死去，活下来的是双手沾满鲜血的阿蕾奇诺。她必须让所有孩子看清这个事实——理想主义会害死你，而活下去，往往需要弄脏自己的手。这就是她能给他们的，最真实的警告。"
HZH_Peruere_wish: "佩露薇利的愿望"
HZH_Peruere_wish_desc: "在无数个无法安眠的夜晚，那个名为“佩露薇利”的少女的幽灵都会悄然造访。她代表着未被玷污的初衷、对自由的渴望，以及……那份无法偿还的罪孽。这个幽灵就是阿蕾奇诺的“本我”，一个永恒的赎罪者。她所有的权力、所有的谋划，其最深处驱动着的，或许正是为了完成“佩露薇利”与“克蕾薇”未能实现的愿望——创造一个再无需牺牲无辜者的世界，哪怕为此，她需要犯下更多的罪。"
HZH_rebirth_choice: "新生的选择"
HZH_rebirth_choice_desc: "在铁与血的缝隙里，是否还存在另一种可能？或许，不必将所有孩子都锻造成武器，也不必让他们全部成为阴谋的祭品。可以建立某种机制，让那些不适合黑暗世界的孩子，能够获得一个相对平凡、相对安全的人生。这并非软弱，而是为壁炉之家保留一丝人性的火种，一个关于“更好生活”的、渺茫却真实的选项。"
HZH_end_Mother: "终结“母亲”的炼狱"
HZH_end_Mother_desc: "前代“仆人”的阴影至今仍徘徊在壁炉之家的走廊。她的暴政、她的炼狱式培养，其影响必须被连根拔起。发起一场彻底的思想清算，销毁所有相关的记录与仪式，让孩子们在“自由选择”的旗帜下，重新宣誓效忠。让他们明白，如今这个“家”，不再是充满痛苦回忆的牢笼，而是一个他们自愿归属的、真正温暖的避风港。"
HZH_exile_soft: "遣散反抗的软肋"
HZH_exile_soft_desc: "对于那些密谋独立的孩子，死刑并非唯一答案。可以有一种更“仁慈”的处理：利用某些技术或手段，精准地焚毁他们关于壁炉之家、关于枫丹内乱的所有记忆。然后，将他们送往遥远的国度，给予他们一个全新的身份，一个空白的人生。这既是给予自由，也是一种最彻底的流放——他们获得了新生，而我们，则清除了一个隐患。"
HZH_lesson_save_life: "给买命人的教训"
HZH_lesson_save_life_desc: "“公鸡”、“博士”……这些将生命视作冰冷数字和实验材料的同僚，他们的傲慢必须被记录。我们暂时需要蛰伏，需要扮演一个顺从的傀儡，以满足他们对枫丹资源的渴求。但这并非永恒。积蓄力量，隐忍待发。终有一日，当形势逆转，我们要让他们深刻理解，轻视“家人”生命的人，必将付出难以想象的代价。"
HZH_no_betrayal: "壁炉之家容不下背叛"
HZH_no_betrayal_desc: "统一的表象之下，裂痕已然显现。一小撮被自由幻梦蛊惑的孩子，正在阴影中编织着叛乱的网络。他们的行为，无论初衷如何，都已触及了不可动摇的底线。忠诚是这个家庭得以存在的基石。任何形式的背叛，都必须被迅速、公开地施以惩罚，以儆效尤。温暖的火炉，也拥有灼伤伸入之手的属性。"
HZH_cost_life: "“生命”的代价"
HZH_cost_life_desc: "摆在面前的，是两个残酷的选项。对于叛徒，是沿用古老而绝对的律法——处以极刑，用死亡来维护纪律的神圣性？还是采用某种技术手段，抹除其记忆与人格，让他们以“空白”的状态重新开始，作为一种另类的“新生”？生与死的定义在此模糊。这个抉择，将定义壁炉之家未来的统治哲学。"
HZH_no_sea_water: "看不见海的水"
HZH_no_sea_water_desc: "壁炉之家的运作模式、与至冬的秘密协议、那些不宜公开的过往……所有这些秘密，构成了深不见底的幽暗之水。必须确保这潭水永不外泄。建立最严密的保密体系，内部监控、信息分级、以及对于泄密者最严厉的终极手段。要让外界，永远像看不见海底一样，看不透我们这个“家”的真相。"
HZH_liquidate_sin: "清算他们的罪业"
HZH_liquidate_sin_desc: "犹豫与怀柔的时期已经结束。是时候进行最后的清算了。锁定所有反对派系的核心成员，无论他们隐藏得多深。动用一切力量，将他们从组织的肌体中彻底剥离、清除。这是一次必要的外科手术，旨在确保壁炉之家在未来的风暴中，能够保持绝对的、铁板一块的团结。"
HZH_hand_control: "掌中天幕"
HZH_hand_control_desc: "当最后的反对声音被消音，当所有孩子都在统一的意志下屏息，我们终于完成了内部的绝对整合。此刻，枫丹的天空仿佛已完全笼罩于我们的掌中。然而，掌控天空意味着要独自承受所有风暴。当我们抬头，看到的不是星辰，而是至冬冰封的凝视与天理莫测的威光。帷幕已完全拉起，下一场戏，我们将不再只是演员，而是被迫参与最终幕的、身不由己的导演。"

#事件

HZH_civil_war.100.t: "暗流涌动"
HZH_civil_war.100.desc: "信使穿梭于塔拉塔海谷之间，而枫丹廷以北，芒索斯以南的陆地上，南北双方都在前线部署了数量可观的军队。无论和平或是暴力，我们都将统一枫丹，为这片破碎的高海之地带来安宁。枫丹的命运，紧紧地掌握在你的手中..."
HZH_civil_war.100.a: "做好准备..."

HZH_civil_war.200.t: "长久以后"
HZH_civil_war.200.desc: "经过度日如年的战争岁月，我们终于迎来了和平。重建房屋，修补衣物，弥合伤口...犒赏或是分赃，由我们的政治架构决定。战时，我们的组织也许能搁置争议。战后，各个派系必定会提出自己的诉求。"
HZH_civil_war.200.a: "接下来是..."








HZH_Liney: "林尼"
HZH_Liney_desc: "当「父亲」阿蕾奇诺专注于巩固权力与应对内部纷争时，将国家日常运作的重担，交给了她最杰出的「孩子」——林尼。这位曾经用魔术给观众带来欢笑的巨星，如今正为整个国家上演一场更为宏大、也更为危险的「幻戏」。他的治理方式正如他的魔术：华丽、精准，且永远让人看不清真相背后究竟藏着什么。\n\n然而，最伟大的魔术师也无法欺骗自己。林尼深知，他正在经营的，是一个建立在矛盾之上的国度。他是「壁炉之家」的代理人，却要扮演枫丹的爱国者；他依赖着至冬的输血，却梦想着断奶自立。他的每一个决策，都是一次在钢丝上的舞蹈，下方即是万丈深渊。他是阿蕾奇诺意志的延伸，还是早已在心中谋划着属于自己的终幕？这场关乎枫丹未来的宏大戏法，最终的答案，或许连他自己也仍在寻找。"
HZH_The_Knave: "“仆人”阿蕾奇诺"
HZH_The_Knave_desc: "她是「壁炉之家」的家长，亦是至冬安插于枫丹棋局的「仆人」。阿蕾奇诺，这个名字本身就是一个悖论。她以慈父般的姿态，为无家可归的孤儿们提供了名为「家」的避风港，却又亲手将这些「孩子」训练成愚人众的利刃，推向内战的绞肉机。她推翻了前任「仆人」库嘉维娜残酷的统治，誓言创造一个不再需要手足相残的乐园，如今却为了维持新生的秩序，不得不沿用甚至精进了那些她曾深恶痛绝的铁腕手段。\n\n「保护」，是她一切行动的核心，也是一道她为自己设下的、永无止境的枷锁。为了保护「孩子们」不被外部敌人吞噬，她必须首先确保自己的权力坚不可摧；为了保护枫丹不被至冬彻底消化，她必须首先证明自己是一枚无可替代的棋子。她的内心是一座被理性冰封的火山，每一次冷静的决策之下，都奔涌着对「博士」等同僚的憎恶、对牺牲者的愧疚，以及那份与克蕾薇共同憧憬过的、关于「自由」的、早已被背叛的梦想。\n\n如今，真正的试炼才刚刚开始。她是会选择继续扮演那位忠诚的「仆人」，将枫丹的一切献祭给女皇的「宏图」？还是会抓住这千载难逢的时机，为了她真正的「家人」，去赌一个独立自主的未来？枫丹的命运，悬于她内心冰与火的裂隙之间。"


