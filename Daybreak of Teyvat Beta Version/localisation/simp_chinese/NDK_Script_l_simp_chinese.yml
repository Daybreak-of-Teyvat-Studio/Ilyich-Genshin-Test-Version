NDK_Columbina: "哥伦比娅"
Columbina: "哥伦比娅"
Columbina_desc: "愚人众十一执行官之一，席位为第三席。深姜红色挑染的黑发少女，脸上戴有网格状面纱，后脑处佩戴六翼翅膀头饰。以闭眼姿态示人。据纳西妲所言，愚人众前三席执行官都有着堪比神明的实力。 哥伦比娅诞生于挪德卡莱，在加入愚人众之前，她曾是当地居民所崇拜的神明。那些遍布挪德卡莱的新月神像，所雕刻的便是她当年的形象。如今出于某些原因，她已离开愚人众，暂时藏身在希汐岛附近的“银月之庭”。"

Sandrone: "桑多涅"
Sandrone_desc: "愚人众执行官第三席，代号“木偶”，现在负责关系诺德卡莱的愚人众月矩力实验设计局"

NDK_Lauma: "菈乌玛"
Lauma: "菈乌玛"
Lauma_desc: "霜月之子当代咏月使，试图改变霜月之子长久以往的困境"

MoonHunter: "猎月人"
MoonHunter_desc: "五罪人之一，猎月人，狂猎之主"

NDK_Nefer: "奈芙尔"
Nefer: "奈芙尔"
Nefer_desc: "秘闻馆老板娘"
NDK_Nefer_Sand: "湮沙的秘闻"

NDK_Flins: "菲林斯"
Flins: "菲林斯"
Flins_desc: "看守终夜长茔的执灯士"

VOYNICH_GUILD: "伏尼契商会"
VOYNICH_GUILD_desc: "为了维护基本的秩序，那夏镇的商人们组成了商会。但诸岛之间的法外狂徒又怎么会被规则所束缚呢？若是要说有谁能让他们感到恐惧，恐怕只有那位「秘闻馆」的老板娘吧…"


Nico: "尼可莱恩"
Nico_desc: "天使魔女"

NDK_Aino: "爱诺"

NDK_Ineffa: "伊涅芙"

NDK_Ashlu: "阿舍鲁"

NDK_Jahoda: "雅柯达"

NDK_illuga: "叶洛亚"

NDK_Navy: "诺德卡莱没有海军，只有鱼"

NDK_book: "终夜祷歌"

NDK_Wuzshnu: "罗素姆工坊"



NDK_Eggcake: "蛋卷坦克工坊"
NDK_night: "终夜长茔船厂"
NDK_moon: "银月之庭飞行器俱乐部"
NDK_Witch: "魔女会火炮工坊"
NDK_lightkeepers: "执灯士制式武器工厂"
NDK_frostmoon: "霜月之坊"




