l_simp_chinese:

####国策####


####事件####

FOD_Furina_event.100.t: "镜中故我"
FOD_Furina_event.100.desc: "镜子从未说谎。在沫芒宫最深处那间连月光都要曲折片刻才能抵达的寝室内，唯一一面完整的等身镜，正履行着它亘古不变的职责。镜面如水，冰冷而忠实地吞噬着眼前的一切：镀金的边框、摇曳的孤烛，以及那个静坐在前的、身披繁复华服的身影。\n芙宁娜，或者说，此刻被尊称为「枫丹帝国女王」的存在，正凝视着镜中的自己。白日典礼的喧嚣与华彩，如同退潮后的海水，留下湿冷的盐渍，粘附在每一寸感官上。那顶新铸的冠冕出乎意料地沉重，其重量源于数千道目光的投射——贵族的审视、平民的茫然、暗处或许尚存的零星期待，还有她自己那五百年来早已习惯、却在此刻感到全新陌生的，被注视感。\n典礼本身是一场宏大的哑剧。欧庇克莱歌剧院的舞台被拓宽，铺上了从至冬进口的猩红地毯。她遵循着排练了三次的轨迹，行走，驻足，转身。讲稿上的字句她早已背熟，那些关于「秩序重建」、「传统荣光」、「帝国新生」的辞藻，像糖霜般包裹着铁硬的意志。当她念出「以神圣血脉与古老律法之名」时，坐在前排的达尔杜弗公爵脸上露出了转瞬即逝的、堪称满意的弧度。掌声随即响起，规律、澎湃、不容置疑，仿佛由无形的指挥棒所引导。\n回程的马车车窗蒙着薄纱。透过那层精致的遮蔽，枫丹廷的街景流淌而过，模糊不清。一个瞬间，她捕捉到巷口一对母子的剪影。年幼的孩子兴奋地抬手指向马车。下一秒，母亲的手如惊弓之鸟般迅速按下孩子的手臂，近乎粗暴地将他拖入砖墙投下的更深阴影中，消失不见。没有声音穿透车厢的隔音层，但那个下拉的动作，比任何喧嚣的抗议更具穿透力。它无声地诉说着恐惧，以及在这崭新帝国秩序下，某种更古老、更本能的生存智慧。\n此刻，镜中的脸庞依旧完美。脂粉掩盖了连日未得好眠的痕迹，眉笔勾勒出的弧度精准符合「威仪与仁慈并存」的妆造要求。她尝试牵动嘴角，镜中人也回应以一个标准的、典雅的微笑——肌肉记忆般的成果，无需意志驱动。然而，眼底深处，那片连她自己都无法完全触及的幽暗水域，却波澜不兴。烛火噼啪一声，爆出一小朵灯花。光影晃动间，镜面似乎模糊了一瞬，映出的不再是头戴帝国冠冕的女王，而是曾今那个坐在沫芒宫空荡王座上，日复一日扮演神明的孤独身影。两个影像重叠、交织，最终又归于清晰的女王装扮。历史是一个环环相扣的回廊，她以为已走出的那扇门，背后竟是另一间布置相似的囚室。\n镜中人再次缓缓扬起嘴角，这一次，弧度更深了些，也更空洞了些。一个只为镜子、或许也为某些更遥远虚无的观众准备的，纯粹属于「扮演」的笑容。粉饰太平是她的新台词，维持幻象是她的新戏码。舞台从未坍塌，只是幕布换了颜色，导演换了姓名。而演员，只要呼吸尚未停止，演出就必须继续——直到真正的终场哨响，无论那声音来自贵族灭亡的丧钟，还是她生命琴弦崩断的绝音。 在这之前，每一刻都是戏。"
FOD_Furina_event.100.a: "演出继续"
FOD_Furina_event.101.t: "丝线交织"
FOD_Furina_event.101.desc: "「昨日夜间，我帝国卫队第四支队于灰河枢纽区，遭遇刺玫会残部伏击。经历约三刻钟交火，叛军被击退。我军亦有六名忠诚士兵不幸捐躯。」几乎在副官合上文件夹的同一刻，窗外，预定的「帝国成立周」庆典焰火，准时划破了枫丹廷阴沉的天空。第一簇礼花就在沫芒宫广场上空炸开，绚烂的金色流光瀑布般垂落，瞬间映亮了简报室。欢呼声经由魔法扩音装置传来，经过距离的过滤，变成一种嗡嗡的、背景噪音般的颂歌。\n室内冰冷的战报摘要与窗外炽烈的庆祝光华，在这一刻形成了荒诞而尖锐的叠影。芙宁娜感到肩头那缀满勋绶的礼服突然变得异常沉重，那些丝线刺绣的纹路，仿佛不再仅仅是装饰，而变成了从地图上延伸而来的、无形的导管，将远方下水道中尚未冷却的血腥与硝烟气息，直接输送至她的感官。丝线，无形地绷紧了。 一端系于这灯火通明的权力殿堂，系于她这尊被精心装扮的傀儡冠冕；另一端，则没入城市地底那阴暗、潮湿、正被鲜血浸染的战场沟壑。\n她的存在，这个「女王」的符号，正是这场庆典所要庆祝的核心，也是那地图上一切军事行动宣称要捍卫的「秩序」化身。每一簇为庆祝帝国而绽放的烟花，其火药或许与夺取士兵生命的子弹来自同一处兵工厂；每一声被引导的欢呼，都在掩盖地图上某个角落可能传来的最后呻吟。\n副官等待了片刻，见她只是沉默地凝视着地图，便微微一躬，无声退下。芙宁娜缓缓起身，走到巨大的地图前。她的指尖掠过光滑的图面，最终停留在「灰河」那个刺眼的红圈上。报告里没有细节，但她能想象——并非具体的画面，而是那种氛围：狭窄通道中的回响，绝望的抵抗，以及帝国士兵倒下时，眼中或许仍映着上级灌输的、关于「捍卫女王与秩序」的信念。\n若这尊符号此刻崩塌，他们为之牺牲的「意义」将瞬间被抽空，阵亡只会沦为统治失败的注脚与笑谈。贵族的历史笔触会毫不犹豫地将一切归咎于「叛军的卑劣」。\n然而，若符号依旧矗立……哪怕它被丝线操控，它的存在本身，就占据了叙事的一个中心。灯光照亮傀儡，也照亮了丝线。她的每一次被迫亮相，每一次宣读的冠冕堂皇的文稿，在知情者眼中，都可能成为对这场「表演」本身的无声揭露。她的存在，成了一个持续的、诡异的参照点，映照着庆典的虚妄与战争的实残酷。\n她收回手指，上面没有灰尘，只有地图油墨微微的凉意。硝烟的气息从窗缝渗入，与室内的烟味混合。丝线丈量着从庆典高台到战争泥淖的垂直距离。 而悬于丝线上的人，正清晰地感受到，那来自深渊之下的、带着硝烟与血锈味的重量。"
FOD_Furina_event.101.a: "这丝线，也将编织出全新的棋盘"
FOD_Furina_event.102.t: "剧本指导"
FOD_Furina_event.102.desc: "德波大饭店的宴会厅被临时改造成了小剧场。水晶吊灯的光芒经过精心调试，既足够明亮，又不至于刺眼。奥蕾莉剧团的演出已经结束，剧目是经过三重审查的古典喜剧。芙宁娜端坐主位，达尔杜弗公爵的心腹侍从如影随形地立在侧后方，记录着每一句对话，衡量着每一次举杯的弧度。空气里飘散着酱鹅肝、蜜渍蔷薇与旧贵族们身上浓淡不一的香水气味。\n剧团的核心成员被允许上前敬酒，这是流程的一部分。波洛走在最后，他比传闻中更显拘谨，手指因长期握笔而带着洗不净的墨渍。他恭敬地递上一册装帧朴素的手写剧本，并表示渴望得到女王陛下的「艺术见解的指点」。侍从锐利的目光扫过剧本封面，上面只有剧名《水的女儿》与作者署名。「无妨。」芙宁娜的声音适时响起，打断了侍从的审阅，「一点文艺工作，能让我暂时忘却那些枯燥的公文。」她从侍从手中近乎优雅地「取」过剧本，指尖与其手套有过一瞬轻微的接触。这个动作既宣告了所有权，也未显失礼。侍从微微颔首，后退半步，目光却未离开。\n她翻开剧本，目光快速滑过那些关于舞台布置与人物出场的描述，仿佛真的只是在随意浏览。直到一句话突兀地钉入她的视线 ：\n「成为人类，就意味着隐藏秘密，经历痛苦，与孤独相伴，即便如此，你也愿意吗？」\n宴会厅的喧嚣——银餐具的轻碰、酒液的倾倒、贵族们刻意压低的谈笑——在那一瞬间仿佛被一道无形的屏障隔绝。她的呼吸几不可察地停滞了半拍，握着纸张边缘的指尖微微收紧，好在厚重的裙摆褶皱掩饰了这一切。五百年的扮演，神座下的孤影，和如今王冠下的窒息……所有的重量，似乎都被这短短一行来自陌生人的台词称量了出来。\n她抬起头，第一次认真地审视波洛。对方低垂着眼帘，姿态恭敬，但那紧绷的嘴角和等待审判般静止的身体，泄露了更多的信息。这一刻，芙宁娜从他身上看到了反抗的可能。她合上剧本，递还给波洛，脸上浮现出一个标准的、略带赞许的微笑。「剧情很有特色，波洛先生。」芙宁娜的声音平稳，确保侍从能听清每一个字，「或许，在这样一个需要重建秩序的时代，专注于文艺，抚慰民众的心灵，未来有机会的话，我一定要参与这个剧本的创作。」\n……\n翌日傍晚，完成文书工作后，芙宁娜漫不经心地向侍从抱怨：「军事政治方面的事，我根本不擅长处理。替我向达尔杜弗公爵转达，未来可以多安排一些类似昨天那样……能彰显帝国文化关怀的公开活动。我只想看看歌剧什么的……」侍从眼中闪过一丝讶异，随即化为理解与淡淡的轻蔑——傀儡终于认清了位置，选择了最轻松无害的角色。于是他恭敬地记下后，准备离开芙宁娜的书房，但芙宁娜突然起身叫住了侍从。「对了，蛮烦您将奥蕾莉剧团的波洛先生请到会客厅……」"
FOD_Furina_event.102.a: "「他的剧本，我很感兴趣」"
FOD_Furina_event.103.t: "铳枪指向何处"
FOD_Furina_event.103.desc: "贵族议会的要求随着晨间公文一同送达：需制作一部宣传映影，旨在「彰显帝国武力，震慑不轨之心」。内容直指特巡队在灰河区域的「平乱」行动，而芙宁娜被要求以王室名义出任艺术指导。要求的措辞恭敬，实质却不容拒绝。芙宁娜在回执上签下名字，笔迹平稳，未起一丝波澜。\n拍摄地点定在特巡队总部。大厅里弥漫着消毒水也未能完全掩盖的、一种铁锈与焦虑混合的气息。新漆的帝国徽记在墙上闪着冷光，映照着下方列队士兵僵硬的脸。夏沃蕾队长站在队列前方，身姿挺拔如标枪，她的视线平直，仿佛穿透墙壁，落在了某个遥远而具体的地方——或许是灰河蜿蜒的巷道，或许是她自己同样出身于此的童年记忆。她的制服纤尘不染，指节却在无人注意时微微收紧。\n拍摄间隙，以「探讨主角眼神」为由，芙宁娜要求与夏沃蕾单独交谈片刻，以便「说戏」。贵族监督官略微迟疑，但考虑到镜头效果，最终退至数步之外。\n空间暂时被隔离开。芙宁娜背对监督官，目光落在夏沃蕾胸前的勋章上，一面用手比划着前方的道具堆，一面压低声音与夏沃蕾交流：「他们让你去清洗灰河，夏沃蕾队长。那里是你的来处，不是『暴民』的巢穴。」\n夏沃蕾的下颌线骤然绷紧，如同一张拉满的弓，但她依旧沉默。\n「我不是来为他们的暴行涂脂抹粉的，」芙宁娜的语速加快，每个字都像精心打磨过的冰棱，「但镜头在这里，你我也在这里。我需要知道，在这身制服和这些命令之下，特巡队里是否还有人记得，法律本该保护枫丹的每一个人，而不是成为贵族铲除异己的棍棒。」\n芙宁娜没有等待回答——此刻也不需要回答。她后退一步，夏沃蕾配合地举起铳枪，芙宁娜声音恢复如常：「很好，保持这种状态。」仿佛刚才只是一段关于角色背景的简短提示。夏沃蕾的嘴唇抿成一条苍白的直线，在接下来的镜头中，她被要求展现的「坚毅」目光和精湛的枪法，但夏沃蕾的脸上，却难以抑制地渗入了一丝更复杂的东西：一种被撕裂的痛楚，一种深埋的质疑。"
FOD_Furina_event.103.a: "镜头捕捉到了怒火，却不知其源自何处"
FOD_Furina_event.104.t: "织锦的夹层"
FOD_Furina_event.104.desc: "宴请劳伦斯与稻妻重要使节的晚宴，被贵族议会视为展示帝国「崭新而强大」面貌的绝佳舞台。芙宁娜的装扮，因此成为一项政治任务。议会不仅需要她光彩夺目，更希望借此向稻妻传递明确的效仿之意——他们渴望建立起稻妻那般等级森严、权力集中的「强固秩序」。来自稻妻的顶尖设计师千织，因而成为不二之选：其技艺能确保王室的体面，其身份则是向稻妻示好的活符号。另外，这也是芙宁娜的要求。\n最后一次试衣在千织屋的衣帽间进行。千织屏退了芙宁娜的侍从，空间被天鹅绒帷幔包裹，只剩下衣料摩挲的窸窣声。千织的手指滑过礼服上那些奢华的刺绣，语气平淡得像在评论天气：「金线用量是寻常礼服的三倍，重量也是。贵族老爷们似乎认为，威严直接等同于让人难以呼吸的重量。」她调整着腰侧的束带，微微摇头，「这与稻妻的美学，实则背道而驰。他们只看到了森严的表象，却不懂支撑那表象的是什么。」\n芙宁娜从镜中看着千织熟练的动作，轻声接话，声音恰好只传到对方耳中：「他们模仿他们想要的，却忽略本质。就像这件衣服，和现在的我……都是展示品，内核却被紧紧束缚。」\n千织抬起眼，在镜中与芙宁娜的目光交汇了一瞬，那目光里没有谄媚，只有千织那标志性的慵懒，另外还带有一丝疑问。「芙宁娜女士点名让我来亲自服务，不是为了和我猜谜语的吧？」\n芙宁娜趁她转身取珠针的刹那，将一张紧紧卷起的、火柴棍大小的薄纸片，迅速塞入千织工具包敞开的侧袋，「我需要一条……不在贵族老爷们监视清单上的小路。传递的不是请柬或礼服图样，而是能够反抗贵族老爷们的东西。你在两国间往来，你的渠道……能否偶尔运送一些『不起眼的布料样本』？」\n千织的手没有丝毫停顿，自然地拉上了工具包的搭扣。「我只是个裁缝，陛下，」她的声音依旧平稳，语气同往常一样慵懒，「与布料、丝线打交道。有时，样本的运输确实会有微小的、难以追踪的误差。不过，」她最后为芙宁娜正了正肩袖，退后半步，「误差，总是伴随着风险。尤其是当布料本身……过于醒目的时候。」\n「我明白。」芙宁娜望向镜中那个即将被华服完全包裹的身影，「再醒目的布料，也需要有透气的内衬。哪怕只是一道缝隙。」"
FOD_Furina_event.104.a: "镜头捕捉到了怒火，却不知其源自何处"
FOD_Furina_event.105.t: "织锦的夹层"
FOD_Furina_event.105.desc: "宴请劳伦斯与稻妻重要使节的晚宴，被贵族议会视为展示帝国「崭新而强大」面貌的绝佳舞台。芙宁娜的装扮，因此成为一项政治任务。议会不仅需要她光彩夺目，更希望借此向稻妻传递明确的效仿之意——他们渴望建立起稻妻那般等级森严、权力集中的「强固秩序」。来自稻妻的顶尖设计师千织，因而成为不二之选：其技艺能确保王室的体面，其身份则是向稻妻示好的活符号。另外，这也是芙宁娜的要求。\n最后一次试衣在千织屋的衣帽间进行。千织屏退了芙宁娜的侍从，空间被天鹅绒帷幔包裹，只剩下衣料摩挲的窸窣声。千织的手指滑过礼服上那些奢华的刺绣，语气平淡得像在评论天气：「金线用量是寻常礼服的三倍，重量也是。贵族老爷们似乎认为，威严直接等同于让人难以呼吸的重量。」她调整着腰侧的束带，微微摇头，「这与稻妻的美学，实则背道而驰。他们只看到了森严的表象，却不懂支撑那表象的是什么。」\n芙宁娜从镜中看着千织熟练的动作，轻声接话，声音恰好只传到对方耳中：「他们模仿他们想要的，却忽略本质。就像这件衣服，和现在的我……都是展示品，内核却被紧紧束缚。」\n千织抬起眼，在镜中与芙宁娜的目光交汇了一瞬，那目光里没有谄媚，只有千织那标志性的慵懒，另外还带有一丝疑问。「芙宁娜女士点名让我来亲自服务，不是为了和我猜谜语的吧？」\n芙宁娜趁她转身取珠针的刹那，将一张紧紧卷起的、火柴棍大小的薄纸片，迅速塞入千织工具包敞开的侧袋，「我需要一条……不在贵族老爷们监视清单上的小路。传递的不是请柬或礼服图样，而是能够反抗贵族老爷们的东西。你在两国间往来，你的渠道……能否偶尔运送一些『不起眼的布料样本』？」\n千织的手没有丝毫停顿，自然地拉上了工具包的搭扣。「我只是个裁缝，陛下，」她的声音依旧平稳，语气同往常一样慵懒，「与布料、丝线打交道。有时，样本的运输确实会有微小的、难以追踪的误差。不过，」她最后为芙宁娜正了正肩袖，退后半步，「误差，总是伴随着风险。尤其是当布料本身……过于醒目的时候。」\n「我明白。」芙宁娜望向镜中那个即将被华服完全包裹的身影，「再醒目的布料，也需要有透气的内衬。哪怕只是一道缝隙。」"
FOD_Furina_event.105.a: "镜头捕捉到了怒火，却不知其源自何处"
FOD_Furina_event.200.t: "刺玫暗信"
FOD_Furina_event.200.desc: "灰河和白淞镇已经被枫丹帝国严格管控，会面地点被定在了奥蕾莉剧团平时排练的地方。道具箱堆砌在一起构成了寒酸的会议桌，街上的灯光透过窗户仅能照亮方寸之地。桌对面是两名刺玫会的成员，衣衫褴褛，眼中燃烧着未曾在灰河之火中熄灭的余烬。\n他们带来的消息简短而确切：娜维娅女士已成功穿越帝国控制的狭长地带，抵达了东部边境，处于逐影庭的实际控制区。逐影庭自内战伊始便宣布中立，如同一块嵌入帝国版图的、沉默的礁石。关于更进一步的援助或联合，对方无法给出承诺，只递过来一个没有任何署名的、粗布缝制的小口袋。\n芙宁娜回到沫芒宫，在确保无人监视的角落，打开了它。里面没有信件，只有一张微微泛黄的旧照片。照片上并非人像，而是某个建筑外墙的一角，上面用粉笔清晰地画着一个略显褪色、却依然能辨认的图案——刺玫会的标志，那朵在石缝中倔强生长的玫瑰。照片背面，有一行几乎看不见的、用指甲掐出的细微凹痕，需以指尖细细抚摸才能感知其走向。那不是文字，只是一个简单的箭头符号，指向照片中标志下方的地面。\n没有言语，没有承诺。只有一朵无声的玫瑰，与一个指向「根基」之处的箭头。这已然是答案，是娜维娅在自身漂泊未定、前途未卜之际，所能传递的最清晰也最沉重的信号：刺玫会的根，仍在灰河的阴影与白淞镇的废墟之下蔓延；而希望，或许正埋藏在这些最朴素、最沉默的「土壤」之中。芙宁娜将照片贴近胸前，感受着那微小却切实的共鸣。反抗的图景，第一次在她心中，有了超越宫廷阴谋与个人牺牲的、更广阔的轮廓。"
FOD_Furina_event.200.a: "犹有花枝俏"
FOD_Furina_event.201.t: "旧剑新誓"
FOD_Furina_event.201.desc: "当克洛琳德的回信最终以加密形式送达时，信笺上仿佛还带着佩特莉可镇方向飘来的、若有若无的焦灼气息。这位昔日的决斗代理人、曾经的贴身护卫，如今的逐影庭领导者，她的笔迹依旧刚劲利落，但字里行间透出的，是远非中立二字所能涵盖的沉重压力。\n「芙宁娜大人，」她仍沿用旧称，这本身已是一种态度，「逐影庭的立场未变：我们不介入枫丹廷的内争。但眼下，我们自身的立场也已摇摇欲坠——须弥的军队已经越过了界碑，他们的理由牵强，攻势却实实在在。佩特莉可镇及周边区域已是前线，每一把剑、每一个人，都必须用于守卫我们的家园与自治誓言。」\n信中没有任何虚伪的客套或敷衍的承诺。她清晰地陈述了困境：兵力紧绷，物资开始管制，与枫丹廷的所有官方渠道都因内战和外部威胁而变得不可靠。然而，在信笺的末尾，笔锋稍稍放缓：\n「……即便如此，有些东西不应被遗忘。随信附上的清单，是我们可以『损失』或『淘汰』的一批旧式装备的编号与存放坐标。它们或许已不入帝国新军的眼，但对于需要武装忠诚而非华丽外观的人来说，可能仍有擦拭使用的价值。此外，在秋分山以东的几条古老巡林小径上，逐影庭的情报显示，贵族军巡逻频率因兵力短缺已不可避免降低。它们从未出现在帝国官方的地图上。」\n「祝您顺利，大人。愿正义，最终能找到它真正的归宿。」 信到此为止。没有承诺派出一兵一卒，没有构建任何正式的联盟。有的，只是一份废弃装备的「清单」，几条失去监视的「路径」。这是克洛琳德在自身立于悬崖边时，所能挤出的、最极限的援助——不是力量的分予，而是机会的分享。这份援助的代价，或许比直接的武力支持更为昂贵，因为它建立在逐影庭自身承受巨大风险的基础之上。芙宁娜握紧信纸，她知道，这不是往日主从情谊的简单回归，而是一位战士在更复杂的棋局上，以她的方式，落下的一枚沉重砝码。"
FOD_Furina_event.201.a: "一份沉默的馈赠"
FOD_Furina_event.300.t: "安魂的序曲"
FOD_Furina_event.300.desc: "夏沃蕾站在阴影与光亮的交界处，制服外套已经脱下，身上的特巡队衬衣在昏暗光线下颜色近乎于灰。她的声音平稳低沉，像在汇报日常勤务：「两条关键情报会通过『可靠』的匿名渠道，在明天日出前分别抵达军事委员会和《蒸汽鸟报》某些编辑的案头：一是逐影庭庇护刺玫会残党，且其巡逻队已多次越界，冲突升级在即；二是至冬国对壁炉之家被镇压的愤怒已接近临界点，至冬和挪德卡莱的军队调动可能预示报复性战争。」她微微停顿，计算着听者的反应，「根据帝国应对条例和那群老爷们的恐惧本能，拱卫首都的第一、第三兵团主力将被调往东部与北境边界展示存在，预防事态。「她的目光如钉，看向芙宁娜：「而特巡队，将以『维持首都绝对稳定，防范庆典期间任何不测』的名义，全员留守，全面接管枫丹廷所有街区、桥梁与宫门卫戍。」\n纤织的身影靠在堆满华丽布料的道具架旁，手指无意识地捻着一缕金线。「我下月有两批货从稻妻来，一批是贵族定制的夏季真丝，另一批是剧院急需的舞台特种钢材与机械构件。」她将金线绕在指上，又松开，「后者会混入一些特别定制的组件。它们抵达利奥奈区仓库后，将会由我亲自检视瑕疵，送入千织屋地下那间专放『展览级古董面料』的储藏室。等到日子，它们会变成『帝国周年庆典特供舞台装置零件』。」\n波洛最后从舞台后方现身，手里捧着一卷厚重的、镶着暗金色雷穆利亚风格纹样的剧本手稿。他的脸上泛着一种艺术家谈及杰作时的光彩，尽管声音因紧张而有些干涩：「议会已经全票通过了庆典提案。奥蕾莉剧团将在帝国周年纪念日，于欧庇克莱歌剧院献上一部全新创作的大型史诗音乐剧，暂定名《金色潮涌》以体现雷穆利亚的荣光。」他深吸一口气，仿佛在背诵宣传词，「剧情歌颂古老帝国的统一与伟业，这正是他们此刻最渴望的精神图腾。届时所有议员、将领、他们的家眷……都将入席。」\n他走到灯下，展开手稿的某一页，上面却是密密麻麻的座位图和后勤标注：「演出前剧团需要运送大量布景、服装、特效器材，所有箱子都会提前进入剧场后台。我们将把武器零件放置在道具箱的隐秘隔层中，在演出开始前组装。」\n芙宁娜的目光缓缓扫过昏暗中每一张面孔，掠过夏沃蕾肩线笔挺的制服，纤织手中微闪的金线，波洛描绘着虚幻荣光的剧本。每一个环节都危险而脆弱，却又在绝境中透着一丝精密的美感。「很好，就让这场歌颂旧日幽灵的演出，成为它真正的安魂曲吧。」"
FOD_Furina_event.300.a: "「Pawn to D4，后翼弃兵」"
FOD_Furina_event.301.t: "引蛇出洞"
FOD_Furina_event.301.desc: "瓦萨里回廊街角的咖啡馆，帝国第三兵团的下士雷蒙和他的两个同乡战友，正享受着难得的轮休时光。阳光暖洋洋地洒在露天座椅上，咖啡的香气混合着刚烤好的枫丹薄饼的甜腻气味。雷蒙眯着眼，看着广场上踱步的灰鸽，心里盘算着晚上去哪家酒馆能碰到新来的舞娘。幻想很快被不同寻常的换岗哨打断，连续三声短促、一声长鸣。\n「见鬼！不会要在这时候出任务吧？」 旁边的战友打翻了咖啡杯，深色液体迅速在粗布军服上洇开。悠闲的时光瞬间蒸发。街道上，像他们一样原本散落在各处的士兵，如同被无形的鞭子抽打，从咖啡馆、小吃店的椅子上弹起来，一边咒骂一边胡乱扣上武装带，朝着营区方向狂奔。市民们则慌乱地收起摊位，关门闭户，只从窗缝后投来惊疑不定的目光。\n营区操场已是一片鼎沸。士兵们仓促列队，装备碰撞声、军官的怒吼混作一团。他看见团长和几个贵族参谋官簇拥着一位从沫芒宫来的特使，站在临时搭起的高台上。空气里弥漫着紧张的气息，雷蒙在队列中站稳，心脏还在为刚才的狂奔而激烈跳动。\n「怎么回事，为什么要紧急集结？」战友微微贴近雷蒙的耳边询问。\n「你没看报纸吗？」雷蒙瞟了一眼高台，见军官们的注意力没在自己这边，就侧过脸小声答复：「逐影庭拒绝服从贵族的指挥，还包庇了刺玫会的人，想脱离枫丹帝国……」\n扩音装置刺耳的试音声打断了雷蒙与战友的谈话，团长清了清嗓子，声音带着不容置疑的严厉：「至冬国对我们清除其非法渗透组织壁炉之家的行动，表现出不可理喻的敌意！情报显示，愚人众的军事单位正在边境地带秘密集结！愚人众可能对我们发起报复性战争！」恐惧像冰冷的潮水，瞬间淹过了之前的猜测。至冬的愚人众……那些装备精良、手段冷酷的士兵形象，比逐影庭的边境摩擦更具冲击力。「因此，奉议会命令！」团长展开一卷命令文书，「我团，以及第一兵团的弟兄们，将立即开拔！第一兵团前往东部边境，增强对逐影庭方向的防御力量！而我团将北上与驻防部队汇合，构建应对至冬威胁的坚固防线！」\n操场上即刻响起一片混乱的脚步声和军官催促整装的吼叫。雷蒙麻木地跟着队伍走向装备库领取行军背包和额外的弹药，他背起沉重的行囊，最后看了一眼营房窗外枫丹廷熟悉的屋顶轮廓线。阳光依旧很好，咖啡馆的招牌还在风中轻轻晃动，但他知道，自己短时间内再也喝不上那家的咖啡了。一种被巨大而无形的手随意拨弄的无力感，混合着对未知前路的担忧，沉甸甸地压在了心头。"
FOD_Furina_event.301.a: "「Bishop to H3，一子捉双」"
FOD_Furina_event.302.t: "千织屋的魔盒"
FOD_Furina_event.302.desc: "狛荷屋的运输队准时停在了枫丹廷外港的检查站前。印有稻妻纹章的货箱整齐码放，其中一批贴着「千织屋 - 庆典特供舞台器材」的标签。带队的是那位以准时著称的快递员绮良良，她正在和检查站士兵核对着单据。气氛从例行公事陡然收紧，新任的检查站军官，显然承受着来自上峰的严密监视压力，他指着那些贴着标签的箱子，要求开箱彻查。「近期安全条例升级，所有入境金属构件，必须查验。」\n绮良良立刻上前，张开爪子拦在箱子前，脸上是营业式的灿烂笑容，语气却异常坚定：「不行哦，军爷！这里面都是精密舞台部件和定制金属件，防潮防尘封装，打开会影响性能的！若是耽误了不久后的帝国周年庆典，可就麻烦啦！」\n军官不为所动，士兵们已经上前。僵持之际，一辆带有贵族家徽的马车适时驶近。千织与一位面色不豫的贵族一同下车。千织平静地出示了全套加盖了宫廷与商会印章的文件，那位贵族则用不耐烦的腔调证实了这批货物与他所监督的庆典筹备工作息息相关。\n「尽是些笨重的金属块，」在士兵们小心开箱查验时，贵族鄙夷地瞥了几眼箱内那些看似寻常的机械框架与金属锭。「快些，我的时间很宝贵。」在贵族权威的直接干预下，检查草草收场。军官挥手放行。车队得以继续前进，驶向利奥奈区。\n在千织屋后面，货物被迅速卸下，放进地下仓库。那些「舞台器材」箱被单独移至恒温恒湿的储藏室。当助手们离开后，千织独自留在室内。她反锁了门，目光掠过箱体。最终，她的指尖停留在其中一个箱体侧面的某条接缝处，遵循着只有她知道顺序的力度与方位，轻轻按压、移动。一声几乎微不可闻的「咔嗒」声后，一块侧板悄然滑开，露出了内侧精心设计的夹层空间，里面整齐固定着的，绝非舞台所需的物件。她快速检查了标记，确认无误后，将一切恢复原状。\n「千织姐！」千织下意识合上箱子，绮良良与千织屋的助手结清运费，对地下仓库的方向呼喊。「我先走一步啦！下次有货还要找我们狛荷屋哦！」千织并没有回答，对绮良良而言，这又是一次圆满完成的托运任务。至于那些箱子为何格外沉重，以及千织小姐最后那个检查箱体的小动作，并非她需要关心的事情。"
FOD_Furina_event.302.a: "「Rook to A7，底线渗透」"
FOD_Furina_event.303.t: "旧世遗篇"
FOD_Furina_event.303.desc: "波洛夹着厚重的提案卷宗，步入了沫芒宫侧翼那间专用于审议庆典事务的小议事厅。空气里弥漫着旧羊皮纸、封蜡和权力交织的气味。长桌两侧坐着的并非最高层的公爵们，而是负责文化、宣传与庆典预算的贵族议员。他们的目光带着些许漫不经心，审视着这位小有名气但终究属于「匠人」阶层的剧作家。波洛展开了一幅描绘着金色浪潮与雷穆利亚帝国徽记的华丽概念图。他的声音因「激动」而微微发颤，充满了艺术家特有的、对宏大叙事的虔诚：\n「尊贵的各位大人，值此帝国新生之际，奥蕾莉剧团倾尽心血，构思了一部足以匹配此刻伟大时代精神的作品——《金色潮涌》！」他指向概念图，「这并非普通戏剧，而是一部融合史诗叙事、交响乐与最新舞台机械技术的大型音乐剧！它旨在再现雷穆利亚帝国的辉煌起源——那由伟大意志统一诸部，引领文明从高海上崛起的壮丽史诗！」\n这个词精准地击中了贵族们内心最渴望的痒处。几位议员的身体微微前倾。雷穆利亚，那个传说中神王雷穆斯主宰的古老帝国，它的荣光与秩序，正是当下贵族议会试图为自己统治寻找的合法性源头与精神图腾。\n波洛敏锐地捕捉到了这细微的变化，他继续推进，话语如精心排练的咏叹调：「我们将在欧庇克莱歌剧院的舞台上，重现古帝国法典的颁布、宏伟建筑的奠基、以及象征无上权威的『黄金舰队』破浪启航的瞬间！音乐将由枫丹科学院声学所最新研制的共鸣装置辅助，让每一个音符都仿佛来自历史深处；道具将运用从稻妻进口的特殊机关，确保视觉震撼而无懈可击！」\n他适时地拿出了预算草案和极其详尽的技术需求清单——长长的物品目录，从特种金属构件、大型木质框架、复杂的滑轮组系统，到大量需要提前进入后台进行「预组装」和「调试」的说明。清单琐碎、专业，充满了工匠术语，完美地掩盖了其下可能隐藏的真实用途。一位负责财政的秘书官皱了皱眉，但看到预算金额在「可接受」范围内，且大部分是一次性技术投资，便没有再深究。\n「为了确保演出达到震撼人心的完美效果，」波洛最后恳切地请求，「剧团需要提前至少一周，将主要布景和大型道具组件运入剧院后台，进行复杂的安装与合成调试。这需要各位大人的特许，以及……在演出当日，对后台区域进行必要的、暂时的出入管制，以避免任何意外干扰。毕竟，这部作品的成功，将是献给帝国复兴的引领者们——最崇高的礼赞。」\n提议被暂时搁置，进行闭门评议。波洛在走廊上不安地等待着，他能听到门内隐约传来的争论声片段：「……主题很好，符合当前宣传需要。」「……技术复杂，但预算尚可。」「……安保需加强，那天所有重要人物都会在场。」\n门再次打开。首席议员手持盖上了议会印章的批准文件走出，脸上带着一丝施舍般的嘉许：「你的热情与构思打动了我们，波洛先生。《金色潮涌》将成为周年庆典的压轴演出。所需物资运输特许令会下发，后台区域的临时管理权也授予奥蕾莉剧团，但必须配合剧特巡队的总体安保安排。不要辜负议会的期望，也不要让任何意外玷污了这个重要的日子。」\n「绝不会，大人！」波洛再次深深鞠躬，双手接过文件，指尖因用力而微微发白，脸上却绽放出混合着感激与狂喜的光芒，「奥蕾莉剧团必将奉献一场配得上今日枫丹的……让贵族老爷们永生难忘的演出。」"
FOD_Furina_event.303.a: "「Pawn to H7，通路奇兵」"
FOD_Furina_event.304.t: "封棋"
FOD_Furina_event.304.desc: "一、行动概述\n遵照议会第147号指令，我部对灰河区废弃仓库疑似刺玫会残余分子聚集点，实施了代号「织网」的定点清除行动。行动投入三个战术小队，并首次尝试与执律庭巡防单位进行前期情报与封锁协同（详见附件一《跨部门协作备忘录》）。\n二、过程与成果\n行动按预定方案展开。我部便衣单位提前十二小时对目标周边所有出入口实施了隐蔽监控与态势控制。主力于昨夜发起突击。过程中遭遇轻微抵抗，已予以压制。现场缴获煽动性印刷品47份，自制燃烧瓶组件若干，通讯器材残件3台。目标建筑已被彻底搜查并封锁。\n主要遗憾： 据现场痕迹判断，核心目标人物（约3-5名）疑似在行动发起前40-75分钟内，经由建筑东南侧一条未记录于市政图纸的废弃排水管转移。该出口位于执律庭负责的相邻巡逻区交界地带。我部在行动简报中曾提示关注此区域衔接部，然最终封锁线未能及时覆盖。（详见附件二《现场地形与责任区划图》）\n三、经验总结与后续安排\n敌方适应性： 残余分子对城区隐蔽通道的利用超出预期，显示其仍具备一定的本地情报网络与应急逃散能力。\n协同效率待提升： 此次事件暴露出，在涉及多部门边界的快速行动中，信息同步与指挥链整合仍存在可改进空间。执律庭巡防单位的反应速度与对交界区的熟悉程度，直接影响合围效果。\n布防调整方案： 为避免类似漏洞，我部拟采取以下措施：\n强化重点区域监控： 对灰河、白淞镇外围等「治安洼地」，增加不定时、不定路线的机动巡逻频次，形成持续压力。\n优化衔接区管控： 希望议会协调，明确此类行动中，交界区域的临时指挥权归属，或由我部派出联络官前置协调。\n尊重与保障隐私： 所有布防调整将严格遵循委员会训令，重点巡逻路线均绕开各家族宅邸核心区域，贵族区周边安保继续由各位大人的私人卫队全权负责，我部仅提供外围应急响应支持。 现行方案已确保公共区域安全与私人领域自主权之间的平衡。"
FOD_Furina_event.304.a: "「Queen to D4，控制中心」"
FOD_Furina_event.305.t: "将军抽车"
FOD_Furina_event.305.desc: "「……歌剧院外围已无悬念。我的特巡队将以最高级别庆典安保为由，在演出前六小时完成对歌剧院的完全封锁。所有出入口，都将由我的人控制。」夏沃蕾的指尖划过地图上代表贵族马车停靠区的区域，「贵族们的车驾会在指定区域被引导、检查，然后由我的人护送至贵宾入口。」\n千织微微颔首，接过话头：「我的化妆师和道具师团队，共十二人，持有剧院签发、特巡队背书的最高权限工作证件。他们会带着『精密器械箱』和『主演的备用礼服箱』进入后台。」她顿了顿，目光扫过众人，「箱子里面除了表面的物品，每个箱体都有独立的夹层，组件已经过预处理，确保能在十五分钟内，由熟悉机械的人组装成可用的状态。组装地点在后台最里面的那间旧道具维修室，演出期间绝不会有人打扰。」\n波洛的呼吸有些急促，眼睛在灯光下异常明亮。他面前摊着《金色潮涌》的舞台流程表，但旁边另一张纸上，却是用极小字体写就的行动时刻表。「演出七点开始。六点四十五分，灯光暗下，序曲响起，所有贵族及家眷应已入席。按照剧本，七点十五分，有一段歌颂雷穆利亚海军扬帆起航的盛大群舞，舞台光线最炫目，音响最震撼，所有人的注意力都会被彻底吸引到台上。」他舔了舔有些干涩的嘴唇，「那将是后台行动的信号。千织小姐的人会在那时开始最终组装。而我和剧团的演员们会在侧台待命。武器组装完成后，我们会控制舞台侧道和贵宾席后方的工作通道。等演出结束，邀请芙宁娜女士上台致辞，就是我们控场的时候。」\n计划环环相扣，但一个关键的障碍依然悬着。夏沃蕾眉头微蹙：「贵族卫队是棘手麻烦，达尔杜弗和他最核心的几名议员，很可能坚持带一两名贴身警卫进入观众席包厢，这是他们的特权，也很难强行剥夺，容易引发警觉。」\n所有人的目光投向了芙宁娜。她一直安静地听着，手指无意识地在木质桌面上轻轻敲击。「贵族卫队……你去联系一下爱可菲，到时候我们在剧院的侧厅摆设筵席，让特巡队、执律庭和贵族卫队都入席。」芙宁娜的语调从容不迫，仿佛在口述一个已经完成的剧本，「波洛，在剧场里服务的工作人员，也尽可能换成刺玫会、逐影庭的人。另外，大家还记得……将我运抵歌剧院接受审判的『魔术盒』吗？我们需要用那个方法，把枫丹最忠于我们、最精锐的反抗者运到舞台上，在』魔术盒『打开的瞬间，舞台上的人负责控制主场，剧团和千织屋的人控制侧面的包厢，剧场工作人员负责锁上正厅通往其他房间的门，特巡队和执律庭则负责控制住侧厅的贵族卫队，进不了场的反抗军成员，也尽量让他们在剧院附近望风，如果其他贵族武装想要接近剧院，就用一切办法拖住他们，为歌剧院外的特巡队分担压力。」芙宁娜停顿了一下，抬头看向三人。「我暂时想不到什么要补充的了，你们呢。」\n三人看向彼此，想在同伴的脸上找到答案，他们看到了坚毅的指挥官、锐利的艺术家、孤注一掷的剧作家，奥蕾莉剧团的排练室陷入了短暂的寂静，随后三人一齐看向芙宁娜，并微微点头。女王在她的棋局中，走出了最重要的一步。"
FOD_Furina_event.305.a: "「Pawn to H8，底线升变」"
FOD_Furina_event.306.t: "金色幻梦"
FOD_Furina_event.306.desc: "欧庇克莱歌剧院从未如此耀眼。水晶吊灯将每一个角落映照得金碧辉煌，空气中弥漫着高级香氛、葡萄酒与权力的甜美气息。达尔杜弗公爵端坐于二层包厢最佳位置，志得意满地俯瞰着他的「帝国」。下方，所有议员、将军、外国使节济济一堂，华服珠宝交织成一片流动的盛宴，象征着由他主导的秩序已达顶峰。\n舞台之上，史诗音乐剧《金色潮涌》正如火如荼。宏大的交响乐撼动着人们的胸腔，炫目的魔法布景再现着雷穆利亚帝国传说中的辉煌。剧情正推向最高潮：神王雷穆斯乘坐的「法图纳号」，劈开高海之上混沌的海水，抵达先知西比尔所诉说的应许之地。作为压轴道具，一艘极其庞大、细节惊人的「法图纳号」模型，在烟雾与灯光特效中，由机关缓缓推送至舞台中央，象征着征服与奠基，引来全场经久不息的、献给昔日荣光与当下统治的狂热掌声。\n达尔杜弗微微颔首，沉浸在完美的掌控感中。演出、氛围、贵族们的陶醉，一切都在按照最理想的剧本进行。这是一个由他定义历史、也由他享受当下的夜晚。他举起酒杯，向邻座的盟友致意，眼中映照着舞台与水晶灯交织出的、令人眩晕的金色光芒。\n最终，在雷穆斯于舞台前端「靠岸」，向虚拟的国土张开双臂的史诗画面中，音乐达到最强音，旋即戛然而止。灯光骤亮，奥蕾莉剧团的全体成员于舞台中央列队，向着宾客满堂的观众席深深鞠躬。编剧波洛手持金箔装饰的剧本，上前一步，他的声音通过扩音装置传遍寂静的剧场：\n「感谢诸位大人莅临，共赏这曲献给古老伟业的颂歌。而此刻，我们更应聆听，为今日之枫丹带来和平与秩序的另一位重要人物的致辞。」他侧身，手臂优雅地伸向贵宾席方向，「有请我们伟大的芙宁娜陛下，为这个值得铭记的夜晚，献上她的祝福与智慧。」\n聚光灯应声移动，精准地笼罩在缓缓起身的芙宁娜身上。她脸庞上带着惯常的、无可挑剔的浅笑，迎着全场的注目礼与重新响起的、礼节性的掌声，步履平稳地走向那被光芒照亮的舞台中央，走向那艘庞大而沉默的原初之舟模型之侧。所有人的目光都跟随着她，期待着一场为这完美夜晚锦上添花的、符合身份的陈词。"
FOD_Furina_event.306.a: "「梦醒时分」"
FOD_Furina_event.307.t: "潮声逆转"
FOD_Furina_event.307.desc: "「谨以水神——以及你们所认可的君王之名，感谢诸位今夜莅临。我们齐聚于此，共同缅怀雷穆利亚的浩瀚史诗，它的律法、秩序与荣光，始终是枫丹文明不可或缺的基石。而这基石，正由在座的各位贤明之士所守护、所重塑。」\n达尔杜弗公爵放松地靠回天鹅绒椅背，指尖在扶手上轻轻敲击着无声的节拍。这番对「基石」与「重塑」的褒扬，正是他期待听到的认可，仿佛为他的统治盖上了最后一枚合法的玺印。\n「然而，」 芙宁娜的话锋，就在这一片祥和的赞颂之后，毫无预兆地滑向了陡峭的深渊，「当基石不再承载庙堂的巍峨，转而成为囚禁众生的牢笼；当重塑并非为了庇护，而是为了更精致的掠夺——我们歌颂的，究竟是历史，还是为自己罪行编织的遮羞布？」敲击扶手的指尖骤然停住。达尔杜弗的身体微微前倾，包厢内温暖的气息仿佛瞬间被抽空。\n「灰河的水至今仍能映出火光与泪痕，白淞镇的土壤下埋着未寒的尸骨与未竟的控诉！」 她的声音陡然拔高，不再是致谢的陈词，而是化为利剑般的指控，「而你们——高居议席的诸位，却在这用金箔与谎言搭建的剧场里，观赏着一出名为复兴的残酷戏剧！你们将压迫铸成新的神像，还要强迫所有人跪拜！」\n死寂。令人窒息的死寂扼住了所有人的喉咙。达尔杜弗猛地站起呼喊卫队，却发现包厢门外是诡异的宁静，侧厅的欢宴喧哗早已不知所踪。\n「所有的戏剧，都该落幕了！」 芙宁娜侧身，手臂挥向那艘象征征服起点的「原初之舟」模型，「尤其是这一出——！」\n话音未落，巨舰模型的侧舷装甲轰然向内倒塌！没有烟雾与幻象，克洛琳德、娜维娅、弗洛朗带着一群精锐的反抗军战士鱼贯而出。他们如同从被掩盖的历史真相中破壁而出，瞬间控制了舞台、乐池及所有通道。同一时刻，包厢帷幔被猛地拉开。楼下正厅的「侍从」们迅速行动。舞台上，芙宁娜立于战士身前，聚光灯此刻只映照真实。\n达尔杜弗僵立在原地，视野中金色的幻梦寸寸龟裂、剥落，只剩下剧院冰冷的石材与无数道投向他的、混杂着震惊、恐惧与最终彻底绝望的目光。那曾为他响起的潮水般掌声，此刻化作了将他彻底淹没的、无声的海啸。"
FOD_Furina_event.307.a: "「Queen to F6，弃后杀王」"
FOD_Furina_event.400.t: "告枫丹人民书"
FOD_Furina_event.400.desc: "长久以来，枫丹的命运被少数人的私欲与一个沉重的预言所捆绑。我们曾以神权之名行统治之实，后又落入贵族以「帝国」为饰的压迫循环。历史证明，将一国之运系于一人或一族之手，终将酿成不公与灾难。因此，我，芙宁娜·德·枫丹，在此郑重宣布：\n一、关于旧制度与我的职责\n自即刻起，象征世袭与专制的 「枫丹帝国」及「女王」之衔，予以永久废除。一个国家的前途，不应取决于一人的意志或一族的血脉。为保障变革期间秩序不乱、政令通达，根据各派系及公民代表的紧急磋商结果，我将以公仆身份，担任「临时统领」。此职务唯一且核心的目标，是主持起草宪法、筹办首次公民议会选举，并在此过渡期内维持国家基本运转。待民选政府正式成立之日，即是我卸任全责、回归公民身份之时。\n二、关于国家新篇\n我们的国家，将依据公义、平等与契约之基石，重组为 「枫丹共和国」。国家最高权力属于全体公民。一个由全民普选产生的公民议会，将制定宪法并行使最高立法与监督权。所有维护贵族特权、压迫平民的旧法即刻废除。一部保障所有枫丹公民（无论出身人类、美露辛或其他族群）平等权利与自由的新宪法，将被迅速起草并交付全民公议。\n三、关于军事、正义与秩序\n原贵族统辖的所有军事单位，即刻由国家接管并启动共和国化改编。其未来职责是保卫共和国主权与公民安全，效忠于宪法。改编期间，官兵合法权益受保障。\n原特巡队将改组为共和国国家宪兵，核心原则从「维护特权」转为「守护宪法与公民」。\n在反抗贵族暴政期间，所有为自由而战的 「刺玫会」成员、「梅洛彼得堡」起义者及相关被通缉者，其行动属于正当抗争，一切旧帝国指控无条件撤销，名誉彻底恢复。共和国铭记你们的勇气与牺牲。\n四、关于重建\n我们将尽力援助白淞镇、灰河等受创最重的地区，提供物资、医疗与重建支持，不遗落任何一位公民。废除贵族经济特权，建立公平的商贸与劳动秩序，让繁荣源于全民的创造。依法清算旧统治者的罪行，并建立透明监察机制，确保新权力永受约束。\n公民们，神明的时代已经落幕，贵族的冠冕已被掷于尘埃。这不是结束，而是一个艰难却真正的开始。未来，就在我们彼此伸出的手中，在我们共同认可的法律里，在我们为彼此负责的勇气之中。这一无需神明拯救、亦无贵族压迫的，属于所有枫丹人的故事……"
FOD_Furina_event.400.a: "「今日，由你们执笔。」"
FOD_Furina_event.401.t: "头版头条"
FOD_Furina_event.401.desc: "复刊不久的《蒸汽鸟报》编辑部内，弥漫着熟悉的油墨与纸张气味，但空气里跃动着的，是一种久违的活力。夏洛蒂从贵族的监牢里，回到了自己的位置上。政变已过去一些时日，但每条新法令的颁布，仍像投入平静水面的石子，在报社里激起迅速扩散的涟漪。\n一阵不同于往常的急促脚步声从楼梯口传来。编辑部助理几乎是冲了进来，手里挥舞着一张还散发着油墨湿气的、大幅面的官方文件，声音因激动而拔高：「来了！第一号法令！贴在沫芒宫外墙上的，刚刚抄送过来！」\n整个编辑部瞬间安静了一瞬，随即所有人都围拢过去。夏洛蒂放下笔，快步上前。那是一份以「枫丹共和国临时政府」名义发布的公告。标题简洁，却重若千钧：《关于永久解散贵族议会及废除其一切法律效力的公告》。她的目光迅速扫过正文。法令以不容置疑的措辞，将「贵族议会」这个机构定性为「旧帝国特权之核心、不公之渊薮」，宣布其即刻解散，所有财产收归国有，其颁布的一切法律、决议即刻失效。\n围同事的议论声嗡嗡响起，充满了震惊与释然。夏洛蒂却异常沉默。她伸出手，指尖轻轻拂过公告上那几个关键词「永久解散」、「一切效力」、「即刻失效」。一种复杂而汹涌的情绪在胸腔里冲撞，不是单纯的喜悦，更像见证历史巨石终于被撬动时，那种混合着震撼、确信与沉重责任感的战栗。\n她转身，不再看那被传阅的公告，而是径直走向主编的办公室，声音平静却带着不容拒绝的穿透力：「下一期的头版，现在就需要定稿。专题报道可以等，但这个——」\n她指向外面同事手中那张纸，「——必须立刻让所有人知道。」\n她没有等待批准，已经回到桌前，抽出一张全新的稿纸。笔尖悬停片刻，然后落下。她不需要华丽的辞藻，此刻，事实本身最具力量。她以最快的速度、最清晰的笔法，撰写了这篇注定载入史册的报道。\n标题定为：《特权的终结：共和国第一号法令宣告贵族议会永久解散》。\n「……这并非一场针对个人的清算，而是对一个时代的制度性终审判决。从今天起，枫丹土地上，将不再有一个以血脉和爵位为门槛的权力密室。尽管废墟的清理与新大厦的奠基同样艰难，但最大的那块绊脚石，已被正式移开……」"
FOD_Furina_event.401.a: "旧秩序的终结"
FOD_Furina_event.402.t: "重建的蓝图"
FOD_Furina_event.402.desc: "空气里混杂着新鲜木材、石灰与尚未散尽的淡淡硝烟味。白淞镇的人们在残垣断壁间忙碌着，眼中透出在战火中饱受摧残、却依旧对未来充满希望的情绪，这份乐观就如同他们曾经的领导者——娜维娅一样。波洛和刺玫会的成员在规划着白淞镇重建的蓝图，他的手指沿着一条标记为「连接灰河的主干道」的虚线缓缓移动，最终停在一个画着剧场标志的圆圈上。\n「我们的主张，必须像一出好戏的序幕，清晰、有力，并且让每个人都能在其中看到自己的角色。」他抬起头，看向窗边的娜维娅，声音比平时多了一份沉静的力度，「人文党的核心，是让法律成为保护弱者的盾，让经济成为连接社区的桥，让文化成为治愈伤痕的药。」\n娜维娅转过身，阳光勾勒出她坚定的侧影。她手里拿着一份白淞镇的需求清单，上面列满了食物、药品和建材。「刺玫会相信团结。枫丹人最想要的不是更多的口号，而是看得见的改变：下一顿饭、安全的住处、孩子能去的学校。人文党如果能把这些承诺变成现实，就能吸引 工匠、农民、教师……所有渴望安稳度日之人的信任……」讨论从具体的工坊扶持政策，到如何将没收的贵族庄园转化为公共设施，逐渐勾勒出一个务实而充满希望的轮廓。\n然而，当话题转向可能的盟友与支持者时，娜维娅的目光再次扫过屋内聚集的十几张面孔，她的眉头微微蹙起。「我们给灰河的代表发出了邀请……」她声音压低了一些，带着一丝不易察觉的疑虑，「…他们没人到场吗？」\n「没有……」刺玫会的参谋弗洛朗摇头。「送信的人回来提过一句，灰河那边……似乎有自己的集会……」\n沉默了片刻，娜维娅转向身旁这位一直沉默记录的中年参谋：「弗洛朗，你去一趟灰河。找到我们以前的联络人，问问情况。」\n弗洛朗合上笔记本，沉稳地点了点头，没有多问一句，便转身步入了门外渐沉的暮色之中。娜维娅与波洛交换了一个眼神，那里面不再只有绘制蓝图的专注，也蒙上了一层对未知变数的审慎。白淞镇重建的蓝图很美好……却无法覆盖枫丹每一寸土地的伤痛。"
FOD_Furina_event.402.a: "分道扬镳……"
FOD_Furina_democratic_party: "博爱人文党"
FOD_Furina_event.403.t: "狂怒"
FOD_Furina_event.403.desc: "弗洛朗踏入灰河时，看到的不是往日的破败与沉寂，而是一种灼热的、集结中的愤怒。残缺的墙壁上刷着醒目的标语，人们聚集在废墟间的空地上，围着临时搭建的木台。台上，夏洛蒂正对着人群演讲，她的声音不再仅仅是报道事实，而是化作了控诉的武器：\n「他们告诉我们『向前看』！他们说『要宽容』！但当我的镜头记录下每一具从废墟中抬出的尸体，当灰河的污水至今仍带着血色，这种『宽容』是什么？是对罪恶的赦免！是对记忆的背叛！」 她高举着一份文件副本，「贵族议会被解散了，但这够吗？他们的产业还矗立在我们的痛苦之上！他们的帮凶还在阳光下行走！平等进步党要求的不只是政治权力的更迭，我们要的是政治、经济权力的革命！是每一份被掠夺财富的清算！是在这个新议会中，必须有为灰河、为梅洛彼得堡、为每一个被踩在脚下的人保留的、永不缺席的席位！」\n台下爆发出雷鸣般的、夹杂着哭腔的怒吼。莱欧斯利站在台侧，双臂环抱，虽未发言，但其存在本身就是一种无声的威慑与支持。弗洛朗在人群中艰难地寻找，终于在一个偏僻的角落找到了蹲着抽烟的老查理，他曾是刺玫会在灰河最可靠的联络人。\n「好久不见，查理，娜维娅小姐和波洛先生正在探讨合作建党的事情，我们正寻思着怎么没见你来白淞镇呢？」\n弗洛朗的话中带着与老朋友打趣的语气，可当老查理抬起头，弗洛朗收起了轻松的表情。只见老查理眼中布满血丝，那不是疲惫，是熊熊燃烧的恨意。「去干什么？」 他的声音嘶哑，「去听他们讲怎么和那些刽子手修复关系？怎么把贵族的豪宅改成文化中心？」 他猛地站起，烟头狠狠摔在地上，「弗洛朗，你和我，我们运气好，还他妈的活着！可我的家人们，就死在城市优化的刀剑下面！他们永远回不来了！那些贵族，那些下令的人，他们用血债盖起了宫殿！现在你告诉我，不要仇恨，要宽容？他们必须偿还！用他们的一切来偿还！而你们的主张，听起来就像在帮他们打折！」\n他的怒吼引来了周围人的目光，那些目光里充满了同样的愤怒与不信任。弗洛朗还想说什么，但老查理已经粗暴地推了他一把：「滚回白淞镇去！灰河人有自己的路要走！」弗洛朗还想说些什么，可看到周围无数愤怒的目光后，也只能无奈转头离开了灰河。\n人文党也许有治愈枫丹的良方，可「死者」是不需要医治的……"
FOD_Furina_event.403.a: "远水不解近渴"
FOD_Furina_communism_party: "平等进步党"
FOD_Furina_event.404.t: "壁炉茶会"
FOD_Furina_event.404.desc: "布法蒂公馆的会客室内弥漫着红茶的香气与旧书卷的气息，阳光透过彩窗，在地毯上投下静谧的光斑。林尼靠在椅背上，目光却似乎没有焦点。一个微妙的念头在他脑中盘旋：为何芙宁娜的临时政府对壁炉之家——这个理论上仍带有些许至冬背景的组织——尝试组建政治力量保持了沉默？甚至没有设置明显的障碍。这种默许绝非疏忽，更像是一种……预留的棋子，或是某种未言明的平衡术。\n「哥哥，客人到了。」琳妮特平静的声音打断了他的思绪。她已将茶具摆放妥当，自己端着一杯，安静得仿佛客厅装饰的一部分。林尼回过神，起身迎接。访客是商会代表厄舍，刚刚被保释不久，脸上还残留着焦虑与不安。面对琳妮特准备的、香气诱人的甜点，他显得毫无食欲，坐姿僵硬。\n「厄舍先生，」林尼坐下，重新挂上得体的微笑，决定先将那些宏观的考量搁置，「放轻松些。与您进行一些……互利互惠的交流，不需要这么严肃的气氛。」\n「好吧，林尼先生。」厄舍深吸一口气，试图镇定，「如您所见，我们……前景不容乐观。刺玫会和娜维娅小姐声望正盛，灰河那边现在更是群情激奋。如果他们成为主流，像我们这样的商人还有生存空间吗？」\n「或许我们一开始就不该和这些与贵族私通，满身摩拉味的商会有牵连。」琳妮特的声音没什么起伏，却像猫爪般轻轻挠破了紧张的空气，「我们的精力，应该聚焦于那些真正接受过壁炉之家援助的社区。」\n「谁又不是在帮助弱势群体？」厄舍突然有些激动，「难道像千织屋那样，偶尔施舍几件华服就是善行，而我们通过规模生产，让最普通的家庭都能穿上体面衣裳，反而成了唯利是图？林尼先生，琳妮特小姐，我厄舍也不是生来就穿着这身衣服！我经历过衣不蔽体、食不果腹的日子。我比谁都清楚稳定的工作和买得起的货物，对穷人意味着什么！」\n看着妹妹与商会代表之间这理念的轻微碰撞，林尼暗自苦笑。琳妮特担忧的是根基与纯粹性，厄舍强调的是现实影响与广泛利益。而他内心那层更深的忧虑始终未散：无论他们做什么，在许多人眼中，至冬背景是否会成为一个永远无法撕掉的标签？\n「咳，」林尼清了清嗓子，将两人的注意力拉回，「厄舍先生，还有我亲爱的妹妹，你们说的都切中了要害。正因为我们各自都有显而易见的短板，才更需要联合，不是吗？社区根基和商业脉络，我们都不能丢。立宪自由党，可以成为这样一个平台：主张在宪法框架内，通过法律与商业推动渐进、务实的改革。我们或许无法赢得最响亮的欢呼，但可以争取那些恐惧混乱、渴望稳定与持续生计的『沉默的大多数』。」\n厄舍正是为此而来，自然不必说服。但琳妮特跨起了小猫批脸，随后的讨论转向了繁琐的纲领细节，直到厄舍因激烈辩论而消耗了大量精力，临走时，他的目光不由自主地飘向桌上那盘未曾动过的、琳妮特制作的膨膨泡芙。林尼微微颔首，厄舍便略带尴尬地迅速取走一块，匆匆告辞。"
FOD_Furina_event.404.a: "妥协的艺术"
FOD_Furina_neutrality_party: "立宪自由党"
FOD_Furina_event.405.t: "未竟之事"
FOD_Furina_event.405.desc: "议员、政客、盟友、对手，他们的声音属于沫芒宫的白天。而批阅文件的沙沙声，是夜晚沫芒宫里唯一的声响。芙宁娜放下笔，指尖按压着隐隐作痛的太阳穴。窗外的枫丹正在缓慢止血，而窗玻璃上模糊映出的，是她自己——一个被多重过去缠绕、却必须为未来做出计算的影子。\n她留在这个位置上，源于两种清晰到近乎冷酷的认知。其一，是偿还。 无论「水神」的扮演还是「女王」的冠冕，其掀起的洪流最终都让不少枫丹人承受了代价。这临时统领的职责，是她选择的忏悔方式——用最具体、最繁重的工作，去一点点抵消那历史性的负债。其二，是缓冲。 共和国初生，裂痕深重。温和、激进、务实，各方诉求激烈冲撞，却无人能真正统合。她这个身份复杂、权力过渡的「临时」角色，恰恰成了各方勉强接受的缓冲阀。她并非不可替代的领袖，而是防止国家在她骤然抽身后立刻再次崩坏的，临时粘合剂。\n正是这双重身份带来的沉重与局限，让她的思绪不可遏制地锚定在那个缺席者身上——那维莱特。芙宁娜知道，唯有大审判官的回归，才能同时化解她背负的历史重量，并填补她无法担任的未来核心。寻回他，是为枫丹找到最终的、稳固的基石。\n然而，通往胎海深处的道路被迷雾封锁。所有人都知道，最高审判官在歌剧院一战后，追随着那条恐怖的吞星之鲸，消失在了原始胎海的深处，再无音讯。那维莱特的力量与意志都非同寻常，他的「滞留」必然意味着遇到了常规手段无法解决的困境。\n在所有的线索与可能中，一个名字反复浮现：「公子」达达利亚。这位愚人众执行官是已知的、唯一曾深入胎海并完整归来的存在。他与吞星之鲸之间存在着某种旁人无法理解的关联，他甚至可能在胎海中抵达过凡人无法想象的领域。如果说，有谁最有可能知道如何在胎海的混沌中找到特定目标，那么非他莫属。 这导向了一个冰冷的政治等式。要请动这位至冬的武人，绝非易事。芙宁娜需要一个足够重量、且能撬动愚人众内部力量的筹码。\n于是，布法蒂公馆里那些小心翼翼的试探，林尼与琳妮特试图聚合的「立宪自由党」，其意义在她眼中彻底改变。这不再是一个单纯的国内政治派系问题。默许壁炉之家这个隶属于「仆人」阿蕾奇诺的组织——在枫丹积累政治资本，是她预先支付的「定金」，而她手中还有一张能直通至冬权力核心的底牌。她期待用这张底牌——推动「公子」达达利亚履行承诺，动用他那条独一无二的途径，寻回那维莱特。\n这是一个危险的平衡。国内将因此多出一个背景复杂、饱受猜疑的政治力量，可能激化矛盾。但这也是她权衡后必须承受的风险。与「寻回国家最终支柱」这一终极目标相比，国内政治格局中多出的这个变数，是一个可以尝试管控的代价。\n夜更深了。她停止一切徒增焦虑的思考，开始着手计划行动。"
FOD_Furina_event.405.a: "秘密外交行动"
FOD_Furina_event.406.t: "茶叙与回音"
FOD_Furina_event.406.desc: "璃月港的晨光初露时，一份盖有特殊水纹印章、措辞正式的外交信函，已通过可靠的渠道，送达北国银行璃月分行最核心的保险柜。信中没有任何暧昧的隐喻，以枫丹共和国临时执政府的名义，正式邀请愚人众执行官「公子」达达利亚与「仆人」阿蕾奇诺，在方便之时前往枫丹廷，就双方共同关心的特定历史遗留问题举行秘密会谈。 信函强调，枫丹方已为此次会面做好了「必要的、包括安全与保密在内的全面安排」。\n完成这项关键动作后，芙宁娜的公开日程如期进行。午后，她与璃月七星之一的刻晴在安静的茶室会面。刻晴以务实干练著称，话题很快从礼节性的寒暄转向实质。侍者奉上沉玉谷的珍品岩茶，熟练地进行温杯、醒茶等步骤。\n「璃月的茶，讲究火功与山场，」刻晴将茶汤分入品茗杯，语气平静，「沉稳的底蕴胜过浮华的香气。治国或许也是如此，依靠久经磨练的人民，方能历经风浪。」她的话似乎另有所指，目光清澈地看向芙宁娜。\n芙宁娜微微一笑，接过茶杯，先观其色，再嗅其香。「感谢指教。枫丹的茶艺则更注重调配与呈现，以求在不同元素间找到和谐的平衡。」她轻啜一口，感受着岩茶特有的醇厚与回甘，「正如我们正在学习的一样：在破碎的过去与未知的未来之间，在激进的呐喊与保守的低语之间，寻找那个能让国家保持平稳的支点。稳固的根基与灵活的平衡，缺一不可。」\n茶香袅袅中，两位女性领导者就重建规划、商贸合作交换了诸多务实意见。刻晴欣赏芙宁娜不空谈理念、直指具体难题的风格；芙宁娜则尊重刻晴高效务实的作风。这场茶叙，在公开层面，为两国关系奠定了更坚实的信任基础。\n日暮时分，芙宁娜返回下榻的驿馆。几乎在她踏入房门的同一刻，一份没有任何标识的密封函件被悄然送入。拆开封口，里面只有一张北国银行的通用信笺，上面是用至冬语书写的一行简短字句：\n「邀约已悉，具体时地通过壁炉之家沟通。」\n没有多余的承诺，没有情绪的流露，只有最简洁的确认。芙宁娜将信纸移至烛火上方，看着火焰将其吞噬殆尽，化为一小撮灰烬。"
FOD_Furina_event.406.a: "下一个舞台：布法蒂公馆"
FOD_Furina_event.407.t: "孤胆勇者"
FOD_Furina_event.407.desc: "布法蒂公馆的会客室比平日更加静谧，壁炉的火光在光洁的地板上投下晃动的阴影。阿蕾奇诺坐在主位，姿态优雅而放松，如同蛰伏于巢穴的蜘蛛，安静审视着步入网中的飞蛾。她身边的达达利亚则显得有些百无聊赖，双手下意识地整理着衣带与装备，目光早已飘向窗外，似乎在期待一场能让他活动筋骨的「意外」。\n门被轻声推开。进来的只有芙宁娜一人。她身着简洁的深色便装，未戴任何彰显身份的饰物，甚至没有一名贴身侍卫。阿蕾奇诺的红瞳中，一丝极淡的讶异转瞬即逝。她清晰地记得，在不久前的另一场会面中，这位「水神」是如何在茶桌的另一端，依赖着那位非人存在的庇护，才能维持表面的镇定。那时的芙宁娜，如同精致易碎的人偶，需被精心守护。而此刻，人偶自己走进了猛兽的巢穴。\n恐惧的气息并未完全消失。阿蕾奇诺能闻到它，如同最稀薄的香水尾调，萦绕在访客略显紧绷的肩线，藏在她交握于身前、指节微微用力的双手上。她怕他们，这是理所当然的。达达利亚的战意与自己的手段，都曾真实地威胁过她的生命与她的国家。\n然而，她毕竟还是来了。独自一人。\n这不再是被迫出席的表演，而是主动踏入险境的抉择。阿蕾奇诺身体里属于战士与统治者的那一部分，开始以一种全新的、近乎审慎的目光，重新评估眼前这位「前神明、前女王、临时统领」。卸去了神性的光环与王权的甲胄，此刻站在这里的，似乎是一个更加真实、也因此更加难以预测的个体——一个怀揣着巨大目的，并愿意为之押上自身安全作为赌注的政治人物。忌惮依旧存在，但一缕细微的、近乎「尊重」的情绪，悄然在阿蕾奇诺冰冷的计算中滋生。她调整了一下坐姿，这微小的动作意味着，谈话将从纯粹的威压与试探，进入一个或许存在真正交易可能的层面。\n「欢迎，芙宁娜女士。」阿蕾奇诺的声音平稳，听不出情绪，「请坐。在枫丹的土地上会见它的主人，却让主人孤身前来……」"
FOD_Furina_event.407.a: "「……倒是我们失礼了。」"
FOD_Furina_event.408.t: "高海之心"
FOD_Furina_event.408.desc: "芙宁娜在两个愚人众执行官对面坐下，没有寒暄，直接切入正题，声音清晰，尽管最初的音节略显干涩。「阿蕾奇诺女士，达达利亚先生。首先，关于壁炉之家——或者说，林尼、琳妮特以及那些愿意回归枫丹的孩子们。」她看向阿蕾奇诺，「我默许甚至有限度地支持他们在新秩序下寻找自己的位置，原因有二。」\n「第一，这是迟来的歉意。他们本就出身枫丹，却在过去的岁月里，因种种不公与迫害，被迫辗转流离，甚至被贵族的暴政所伤害。共和国没有理由继续将受害者拒之门外。他们理应拥有选择未来的权利。」\n「第二，」她的目光转向达达利亚，语气更加凝重，「这与我希望达达利亚先生能提供的帮助直接相关。」达达利亚眼中闪过一丝兴趣。「我需要你重返原始胎海，」芙宁娜一字一句地说，「找到最高审判官那维莱特，并带他回来。我们都知道，只有你曾深入那片海域并安全返回，也只有你，可能与那片海域中……更强大的存在，有所联系。」\n达达利亚咧嘴笑了，那笑容里混合着战斗的渴望与对挑战的兴趣：「哦？找那位龙王？有意思。说实话，我也很好奇他现在怎么样了。不过，那片地方可不是什么旅游胜地……但如果是为了拜会我师傅，顺便找找看，倒也不是不能商量。找到她，大概就能找到那条大鲸鱼，和粘在鲸鱼边上的审判官先生了。」\n阿蕾奇诺静静地听着，直到此刻才缓缓开口，声音如丝绸般滑润，却带着不容回避的锋利：「芙宁娜女士，你刚刚将默许壁炉之家的回归称为歉意，这或许可以理解为第一项共识。而现在，你提出了第二项明确的请求，并暗示这与我这位同僚的特殊路径有关。在至冬，我们习惯将这类请求称为交易。那么，请问——」 她微微前倾，红眸锁定了芙宁娜，「——你为这第二项交易，准备的回报是什么？寻回一位元素龙王，这代价，可不轻。」\n会客室陷入短暂的沉寂，只有壁炉木柴的轻微噼啪声。芙宁娜迎向阿蕾奇诺的目光，似乎早已准备好这个答案。\n「神之心。」她平静地说出。达达利亚的眉毛挑高了。阿蕾奇诺的瞳孔几不可察地收缩了一瞬。「神之心目前不在我手中，正如你们所知，它在最高审判官那维莱特那里。」芙宁娜继续道，「如果愚人众能够帮助枫丹寻回他，那么，作为对至冬此等重大友好援助的感激与回馈，我将以临时统领的身份，正式请求并说服那维莱特阁下，将水神之心，作为两国外交的至高礼物，赠予至冬国。」\n空气仿佛凝固了。壁炉的火光在两位执行官脸上跳跃。他们交换了一个眼神——那眼神中充满了权衡、意外，以及一种冰冷的、终于触及核心目标的锐利光芒。神之心，正是女皇陛下渴望之物。而芙宁娜给出的条件，虽然迂回，却将他们的目标与枫丹的核心需求彻底绑在了一起，形成了一个近乎完美的交换闭环。\n阿蕾奇诺向后靠去，重新恢复了那副优雅从容的姿态，但眼底深处已是一片了然与决断。"
FOD_Furina_event.408.a: "「契约成立，芙宁娜女士。」"
FOD_Furina_event.409.t: "歌剧院三重奏"
FOD_Furina_event.409.desc: "欧庇克莱歌剧院经历了短暂的沉寂，如今再次被喧嚣填满。只是这一次，回响在镀金穹顶下的不再是咏叹调与掌声，而是提案、辩论与偶尔激烈的驳斥。议席临时安置在观众席，高耸的舞台帷幕低垂，仿佛在提醒着这里曾上演过的另一类「戏剧」。波洛坐在乐池区中央偏右的位置，属于博爱人文党的标识在他身前很是显眼。\n审议甫一开始，声浪便陡然拔高。一位平等进步党的代表，一位来自灰河的演说者，几乎是以踏上昔日审判台的气势站到了发言区域，声音沉郁却极具穿透力：「我们要审议《旧债清算与资产重归法案》！这不是请求，是正义的索还！我们必须厘清，某些人库房里的摩拉，有多少是在白淞镇的废墟上、灰河的泪水里铸成的！共和国的法律，首先要为清洗不义而生！」赤红区域爆发出雷鸣般的赞同。\n一位立宪自由党的发言人，一位言辞谨慎的前法典学者，迅速起身回应，声音在空旷的歌剧院里带着回音：「我们提请审议《枫丹商业复兴与契约保障法案》！国家需要的是稳定的规则、明确的权属，是能让商船重新满载的信心，而非沉湎于仇恨的泥潭！烧掉旧账本，并不能自动填饱明天的肚子！」\n紧接着，又一位进步党成员拍案而起，指责对方意图「为旧日的幽灵披上新法典的外衣」；自由党那边则有人反唇相讥，称其主张是「以平等的名义施行新的掠夺」。言辞如刀剑交击，在昔日上演悲喜剧的空间里碰撞。两党如同两股属性迥异的元素力，在议席间激烈对撞，让空气都仿佛绷紧、升温。\n波洛静静地看着，听着。这尖锐的对立并未让他惊慌，反而在心底生出一种复杂的、近乎庆幸的踏实感。他的目光扫过议席的分布——那占据了绝对多数的人文党人，此刻不再是简单的数量优势，而是一道坚实而宽厚的堤坝。正是人文党这沉默的多数存在，将左右两边那几乎要直接相撞的激流与寒冰，有效地隔开了。无论哪一方的提案，若想真正成为律法，都必须先经过人文党这片广阔而务实的「中间地带」，接受磋商、调和与转化。争吵固然刺耳，但只要这主导性的中间力量保持清醒与稳固，争吵便终将收敛于辩论的范畴，而不会演变成议会功能的瘫痪，或更危险的局面。\n轮到人文党发言时，这位人文党代表起身，将话题平稳地引向了《社区重建与资源开发法案》，具体谈起了全枫丹的房屋修缮计划，和如何开发枫丹现存的各项资源，以加快枫丹各处恢复。议题就这样被巧妙地从抽象的理念之争，拉回到了砖瓦与面包的现实层面。激烈的元素对撞声，渐渐被更具体、也更繁琐的民生讨论所覆盖。\n波洛在面前的记录板上写下几个关键词。他意识到，在这初生的共和国议会里，人文党的角色或许并非提出最闪耀或最尖锐的理念，而是成为这复杂合奏中不可或缺的稳定节拍与调音器——将炽烈的诉求转化为可铺展的砖石，将冰冷的忧虑化解为可防范的风险。歌剧院窗外的枫丹廷天色渐晚，但在这方汇聚了所有声音的舞台上，至少此刻，那最可能引发风暴的剧烈冲突，已被一片广阔而沉静的水域所包容、所缓冲。"
FOD_Furina_event.409.a: "多数者的责任"
FOD_Furina_event.410.t: "患得患失？"
FOD_Furina_event.410.desc: "夜晚的沫芒宫办公室，规律而低沉的潮声透过虚掩的窗扉传来，伴随着羽毛笔划过纸面的沙沙轻响。壁炉里的火苗稳定地燃烧着，驱散着枫丹廷特有的、带着水汽的微寒。\n芙宁娜放下了手中那份来自刺玫会的报告，揉了揉眉心，目光投向对面沙发上同样埋首于文件中的波洛。桌面上、地毯上，甚至窗台边，都散落着各式各样的卷宗：科学院重启部分实验室的能耗评估，梅洛彼得堡提交的关于新型建材的测试数据，还有各商业行会呈报上来的、对未来市场的乐观预测与谨慎担忧。\n「波洛先生，」芙宁娜开口，声音在安静的房间里显得格外清晰，「第一阶段，我们勉强算是站稳了。」\n波洛抬起头，推了推眼镜，脸上是同样混合着疲惫与思索的神情。「是的，芙宁娜大人。」他顿了顿，话锋微微一转，「但接下来的剧本还是一片空白。」\n芙宁娜站起身，走到那张覆盖了整面墙的枫丹地图前。地图上，许多代表「损毁」或「停滞」的红色标记已经被代表「修复中」或「已恢复」的绿色标签覆盖，看起来令人欣慰。但她的手指轻轻点在了几个广阔的区域——苍晶区的荒废矿场，伊黎耶林区边缘的稀疏村落。「仅仅恢复原样，是不够的，对吧？」她没有回头，像是在问波洛，也像是在问自己。\n波洛走到她身边，递过来一杯温热的茶。「您说得对。重建不是最终目标。现在，我们有了一个难得的、可以重新思考枫丹根基的机会。就像修改一个存在致命缺陷的旧剧本。」\n「根基……」芙宁娜接过茶杯，暖意从掌心传来，「你认为，新的根基应该是什么？」\n波洛没有直接回答，而是从旁边的资料堆里抽出几份文件。「这里有两种声音。第一种，来自科学院和许多实业家，他们主张集中力量。枫丹资源有限，经历了天灾人祸更是如此。我们应该将剩余的所有资本、技术和人力，集中投入到最关键的重工业和国家主导的大型基建项目上，比如重建并升级全国的巡轨船系统，建立国有的发条机关制造核心。」\n「第二种，」他又拿起另一份，「则主要来自白淞镇、海露港商会，以及像千织小姐那样有想法的年轻人。他们认为，自上而下的规划往往伴随僵化和浪费。应该降低门槛，鼓励商业和创新，让民间的智慧去决定方向。无论是发展更精巧的民用机关，还是重振我们的文化艺术产业，都应该交给人们选择。政府的角色是维护公平的舞台，而不是亲自下场扮演每一个角色。」\n芙宁娜沉默地听着，目光在地图上那些绿色标签和空白区域之间游移。波洛提到的每一种声音，都代表着一种未来，也代表着一种代价。集中力量能快速见效，但可能埋下新的不公；自由放任充满活力，却也可能导致混乱与另一种形式的垄断；枫丹，还能承受得了一个可能错误的抉择吗？窗外的潮声似乎变得汹涌了一些，一个孤独而强大的身影在她心头一闪而过。决策的事，她觉得自己做不到，但在那个身影回到枫丹以前，她必须做到。\n芙宁娜转过身，面对波洛，眼中最后一丝犹豫已被沉重的责任感和初步成型的决心取代。「波洛先生，我也许不会是一个好的决策者、统治者，但我知道，不能再上演过去的悲剧了。新的枫丹，不会丢下高海上的任何一个生灵……」"
FOD_Furina_event.410.a: "决策之人烦恼多"
FOD_Furina_event.411.t: "一颗方糖悬滞的时间"
FOD_Furina_event.411.desc: "早上的阳光斜照进沫芒宫办公室，在堆叠如山的文件卷宗上投下斑驳的光影。空气中飘散着陈旧纸张与新墨水的味道，以及一丝冷掉的红茶香味。波洛站在办公桌前，手中的报告纸页沙沙作响，他的声音平稳而清晰地汇报道：「……综上所述，白淞镇的重建进度已超过九成，娜维娅女士预计下月中旬即可举行正式的落成仪式。梅洛彼得堡方面，在莱欧斯利公爵的督导下，三座新型工厂的产能均已达到预期，开始向枫丹廷稳定供应建材。此外，克洛琳德女士与夏沃蕾队长联合提交了新兵训练评估，第一阶段成效显著。」\n他的汇报条理分明，每一条都是令人安心的好消息。然而，书桌后的回应却是一阵沉默。波洛抬起头，芙宁娜坐在高大的椅子上，单手撑着额角，另一只手还虚握着笔。她的眼睛紧闭着，睫毛在苍白的脸颊上投下淡淡的阴影，胸口随着均匀轻浅的呼吸微微起伏。阳光掠过她略显凌乱的白色发丝，照亮了眉宇间无法掩饰的深深倦怠。\n她竟然在听报告时睡着了。\n「芙宁娜大人？」波洛压低声音，轻轻唤道。\n没有反应。他稍提高了音量：「芙宁娜大人。」\n芙宁娜的肩膀猛地一颤，像是从某种深渊边缘被拽回。她倏地睁开眼，湛蓝的瞳孔里瞬间闪过未及掩饰的恍惚与惊慌，随即被惯有的、强撑的清醒所覆盖。她迅速坐直身体，仿佛刚才的失态从未发生，只是指尖不经意间轻颤了一下。「抱歉，波洛先生，」她的声音比平日沙哑，却努力维持着平稳，「请继续。你刚才说到……梅洛彼得堡的产能？」\n波洛没有继续报告。他放下手中的文件，目光扫过她眼底淡淡的青灰色，以及桌角那盏显然亮至天明的台灯。「您又通宵未眠。」\n芙宁娜避开了他的视线，指尖无意识地摩挲着羽毛笔的柄。「……只是有些文件需要尽快处理。重建刚有起色，许多细节不能耽搁。」\n「但您的身体会先于那些文件垮掉。」波洛的语气温和，却带着不容置疑的恳切，「白淞镇正在新生，工厂运转良好，军队也在稳步重建。最危险的湍流已经过去，枫丹这艘船正在恢复平稳。您不必，也不应再如此苛刻地驱策自己。您需要休息，真正的休息。」\n芙宁娜沉默了片刻，目光望向窗外沐浴在阳光下的枫丹廷。那些喧闹的、生机勃勃的声音隐约传来，与她此刻寂静而疲惫的内心形成微妙对比。她似乎想反驳，想说自己还能坚持，想说还有那么多事要做……但最终，这些话语只是化为一声几乎听不见的轻叹。\n「你说得对，波洛先生。」她微微扯动嘴角，那是一个疲惫至极、却依然带着某种责任感的笑容，「我答应你，稍后就去休息。」\n她的目光随即落回桌面，落在那一叠等待批阅的文件最上方。「不过，在休息之前，」她伸出手，轻轻拿起最上面那份，动作带着一种固执的温柔，「我得先看完这最后一份。关于苍晶区孤儿安置与学校重建的联合提案。我想在今天之内，给他们一个确定的答复。不会花太久时间的。」她的声音很轻，却像一位不愿谢幕的演员，执意要完成自己的台词。\n波洛微微颔首，并为她添了一杯加了方糖块的热茶。"
FOD_Furina_event.411.a: "一杯闲暇，两种挂念"
FOD_Furina_event.412.t: "星与夜的低语"
FOD_Furina_event.412.desc: "璃月港的午后，阳光被熙攘人声蒸得发暖。旅行者与派蒙刚从吃虎岩工匠处离开，一股没来由的虚乏感却如附骨之疽般攀上心头，非关体力，更像是灵魂某处被悄悄凿开了一个细孔，有东西正悄然流失。几日来皆是如此，不卜庐的白术大夫也只道是心力交瘁，开了些安神的方子，却不见根本好转。\n「要不然…再去看看别的医生？」派蒙绕着旅行者飞了两圈，小脸上满是担忧，「总觉得你最近没什么精神，像被偷走了好多摩拉似的…」\n就在此时，一个声音毫无征兆地切入这片嘈杂，清晰得如同在耳畔低语：\n「你的『存在』，缺了一块。」\n旅行者倏然转身。不远处的街角阴影下，一位身着异域服饰的银发女子静静站立，仿佛她已在那里凝视了许久。她的目光澄澈而冰冷，越过派蒙，直接落在旅行者身上，那并非审视，更像是在阅读一份复杂图表上的异常数据。\n派蒙吓得往后一缩：「你、你说什么？！」\n「灵魂的完整性受损，伤口边缘有『边界』侵蚀的残留痕迹。寻常医术自然无效。」女子的语调平直，毫无波澜，她向前走了两步，周遭的喧嚣似乎自动与她隔绝。「窃取的手法精细且贪婪，目标不仅是力量，更在汲取构成你本质的某些『特质』。拖延下去，流失会加剧，直至某个临界点。」\n她的话直指核心，带来冰冷的悚然感。旅行者下意识握紧了拳。\n「我能暂时稳定这种流失，并追踪窃取者的源头。」她继续说道，仿佛在陈述一项交易条款，「但这需要你配合。你的『特质』本身，就是最好的信标。作为交换，在追踪过程中，我会引导你如何感知、乃至有限度地抵御这种针对『存在』层面的侵蚀——你可以将其理解为，认识另一种形态的『力量』。」\n派蒙紧张地问：「你…你到底是谁？怎么会知道这些？」\n女子略微停顿了一下，似乎认为这是一个必要的程序。\n「丝柯克。一个旅者，和你一样，我不是个提瓦特人。」\n她并未解释更多，那份笃定与超越常识的认知本身，便是最强的凭证。面对这莫名而来的侵蚀与这位自称「丝柯克」的神秘人，旅行者似乎没有什么更多的选择。"
FOD_Furina_event.412.a: "跟随对症下药的诊断"
FOD_Furina_event.413.t: "线索交汇"
FOD_Furina_event.413.desc: "丝柯克所授的感知法门，如同在黑暗中点亮了一盏只映照特定痕迹的灯。旅行者依循指引，能清晰「看到」一缕源自自身、细若游丝却顽强延伸向远方的暗紫色连线。这连线指向层岩巨渊北方的荒谷。谷地死寂，弥漫着元素被粗暴吮吸后的枯竭感，以及一丝若有若无的、令人联想到深海庞然巨物的腥气。空气中残留着空间被短暂撕开的涟漪，证明目标拥有非常规的移动手段。\n「它在这里『饱餐』过，痕迹很新。」丝柯克凝视着地面一道仿佛被无形之物犁开的沟壑，语气平淡，「不止是你的力量，还有地脉的碎片，甚至…更古老沉淀物的气息。它在不计后果地吞食。」\n正当她准备进一步追踪那迅速淡去的空间涟漪时，一道凌厉的水箭猝然从侧方岩顶射下，并非攻击他们，而是精准钉在谷地中央一块突兀的巨石上。水光炸裂的瞬间，隐约显出一个正急速淡去的、踉跄的人形虚影。\n「啧，又慢了一步！」 带着一丝懊恼的熟悉嗓音响起。达达利亚从岩顶跃下，轻巧落地。他看到旅行者和丝柯克，明显一怔。\n「旅行者？还有…师父？！」 他眼中的惊讶迅速被锐利的思索取代，目光在丝柯克和这片狼藉的谷地间快速扫过，「你们也追着那东西来的？难道……」\n公子的话还没结束，就被震惊的派蒙打断。「原来这位就是你的师父？」\n「我们的力量都在它的『食谱』上。」丝柯克没有接派蒙的话茬，瞥了一眼那水箭消散处，「你那毫无杀伤力、也没有精准度的攻击，提前惊扰了它。」\n达达利亚抓了抓头发，有点无奈地笑道：「抱歉，师父，我追踪这家伙有段时间了。各国都有微量但性质奇特的能量失窃报告，我们的人发现失窃的能量残留里，混杂着一种非常特殊的『腥味』——和枫丹胎海底下那头『吞星之鲸』散发的部分波动高度相似。」 他神色严肃起来，「我接受了枫丹和阿蕾奇诺的委托。所以跟着这条线索追过来了。没想到，它居然还敢对师父和旅行者下手。」\n线索在此刻完全吻合。窃取旅行者力量、偷食地脉与古老残渣、使用与吞星之鲸同源的力量……追踪着不同线索的三人，目标指向了同一个敌人。\n「我的力量不是它能够轻易掌控的，在它消化完之前，应该不会远离。」丝柯克判断道，目光投向荒谷深处一道散发不祥气息的裂隙，「追上它。」"
FOD_Furina_event.413.a: "白夜追凶"
FOD_Furina_event.414.t: "旧影新痕"
FOD_Furina_event.414.desc: "裂隙之后的空间扭曲而压抑。一个身影背对入口，静静立于混沌中央。他身姿挺拔，肩背线条如蓄势待箭，一柄形制古奥、枪尖萦绕不散漆黑气息的长枪矗立身旁，枪尾深深没入地面——那是与传说中「极恶骑」极为相似的形制。他身着的铠甲虽破损陈旧，样式却带着某种早已失传的奇异美感，只是浸染了深渊的污浊。\n斯克弗努格的动作带着矛盾感：其枪术基础有着千锤百炼的简洁与老辣，每一击都精准而充满力道；但动作时常被胸口中那团搏动的、散发出与吞星之鲸同源令人窒息波动的暗蓝能量所扭曲，变得狂乱而不计章法。长枪挥舞间，不仅力量惊人，更会撕开短暂的漆黑裂口，溢出干扰性的深渊气息，或突然爆发出强大的吸引力场，试图攫取周围一切能量。\n达达利亚正面强攻，水刃如潮，试图以连绵攻势压制对方。旅行者侧翼策应，用元素力冲击、干扰其架势，并抵御那贪婪的吸力。丝柯克则立于战圈边缘，每当斯克弗努格试图引动胸口能量引发更大混乱，或吸引力场过强时，便凌空一点，用更晦涩的力量将失控的征兆强行抚平。\n在丝柯克的精准调控与两人协力猛攻下，斯克弗努格胸口的能量波动逐渐紊乱。最终，三方合击，那暗蓝能量剧烈闪烁，反噬其身。他闷哼一声，动作僵滞，长枪脱手，单膝跪地，眼中狂乱稍褪，露出混杂痛苦与一丝茫然的底色。\n丝柯克走向那片湮灭的核心区域，仔细感知了片刻。「他的不死诅咒会让他在别处缓慢重生，但至少很长一段时间内，无法再作乱了。」她转向旅行者，「我们的的隐患，根除了。」\n丝柯克完成了所有步骤，准备离开。\n「师父，请等等。」达达利亚的声音响起。他收起武器，脸上依旧挂着轻快笑容，不过笑容中混合着一丝徒弟对师父敬畏的神情。「师父，这个疯子用了吞星之鲸的力量。而那怪物…此刻正和枫丹的大审判官一起，被困在原始胎海深处。」达达利亚语速平稳，却字字清晰，「我对枫丹的统领芙宁娜做出了一些...承诺，需要带他们的审判官回来。既然吞星之鲸持续引发麻烦，您一定有办法处理这个源头。我知道您...」\n「所以你并没有变强多少...」丝柯克不带一丝情感波动的话语，截断了公子的解释。「好吧，总之谢谢你们帮忙善后，看管吞星之鲸本该是我的工作，既然师父的宠物闯下大祸，那只能由我解决了。」\n丝柯克转身挥动剑刃，空间如同镜面般碎裂开来。「至于我和极恶骑的关系，等解决完吞星之鲸的问题，再和你慢慢解释吧。」"
FOD_Furina_event.414.a: "翻开往日的篇章"
FOD_Furina_event.415.t: "深海回响"
FOD_Furina_event.415.desc: "时间在原始胎海之底失去了世俗的意义，只余下能量缓慢流淌的韵律与近乎永恒的孤寂。那维莱特悬于吞星之鲸那如山峦般沉寂的身躯之前，双目微阖，并非沉睡，而是将全部感知与浩瀚的纯粹水元素力融为一体，编织、维系着那笼罩巨兽的无数道封印枷锁。每一道锁链都与他本源相连，每一次这头巨物在强制沉眠中无意识的能量脉动，都需他以自身力量悄然抚平、导引。这是一场无声的、消耗巨大的持久守望，如同以自身为堤坝，抵挡着深海中无声的海啸。\n忽地，一种截然不同的杂音刺入了这单调而宏大的能量场。\n并非来自鲸鱼，亦非胎海自然的潮涌。那是一道尖锐、突兀的空间撕裂感，伴随着迥异于元素力的、更为晦涩深邃的波动，如同在深潭中投入了一块灼热的异色矿石。\n那维莱特倏然睁开双眼，绛紫的竖瞳中泛起凌厉的锐光。他手中的权杖瞬间显现，磅礴的水元素力不再温和，而是化为凝练的威严与戒备，在他周身激荡起无声的漩涡。最糟糕的预想掠过心头——莫非吞星之鲸的封印出现了未曾预料的裂隙？或是引来了其他觊觎这巨兽力量的存在？他的目光如最精准的审判之刃，投向波动传来的方向。只见胎海那永恒的幻境中，一点异样的光华正在急速扩大、旋转，构筑成一道不稳定、边缘逸散着细微漆黑电芒的门扉。门扉之中，景象扭曲，传来不属于此地的气息。\n权杖微抬，胎海之水在他意志下开始汇聚、结晶，化为无数悬浮的尖锐冰凌，对准了那正在洞开的门户。无论来者为何，都必须做好将其瞬间压制或驱逐的准备。漫长的守望与巨大的责任，不容许任何意外的干扰。\n然而下一刻，吞星之鲸急速旋转、缩小，慢慢汇聚成一个黑紫色的发光圆球，落入了从门扉中踏出的人影手中，一位银发、气息幽邃难明的女子，其特殊的气息如同明灯，让那维莱特难以捉摸。但紧随其后出现的的旅行者和公子，像是一道意外的暖流，冲淡了那维莱特瞳孔中凝结的寒冰。虽然那位银发女子极为陌生，且气息深不可测，但既然与旅行者、达达利亚同行，至少非即刻之敌。他周身的压迫感缓缓收敛，悬浮的冰凌无声消散，重新化为柔和的水流。权杖虽未放下，但已从战斗姿态转为警惕的驻守。\n他的视线扫过两位熟人，最终回到丝柯克身上：「旅行者，达达利亚。以及…这位女士。看来，漫长的守望在此刻迎来了意料之外的变数。」 他的目光掠过那枚球体。\n达达利亚率先开口，语气比平时更显正式：「那维莱特大人。这位是我的师父，丝柯克。我们追踪与这头鲸鱼力量外泄有关的事件，最终请动她亲自出手处理这根源。」他侧身示意丝柯克，「师父，这位就是枫丹的最高审判官，那维莱特大人。」\n丝柯克平静地迎向那维莱特的目光，手中球体的微光映照着她没有波澜的脸庞。「一个需要被回收的麻烦。它是我师傅的宠物。由我处置，合乎规则。」\n「原来如此。」那维莱特权杖的光芒彻底温润下来，「那么，感谢您终结了这场僵持，女士。」\n达达利亚抓住时机，上前一步：「那维莱特大人，我此行，更是为了请您回归枫丹。芙宁娜女士领导下的重建已步入正轨，但国家上下，无不期盼您的归来。如今吞星之鲸的威胁已除，您……无需再留守于此了。」\n「芙宁娜女士……」这个名字让那维莱特静默了片刻。孤独守望的时光仿佛在飞速褪色，尘世的职责与牵挂如潮水般回涌。"
FOD_Furina_event.415.a: "「她...可还安好？」"
FOD_Furina_event.416.t: "帷幕将倾"
FOD_Furina_event.416.desc: "沫芒宫最高执政官办公室的灯火，又一次成为了这座逐渐苏醒的城市里，最后熄灭的星点之一。\n宽大的办公桌上，文件的丘陵几乎要淹没那盏孤零零的台灯。左侧堆叠的是映影行业协会关于新剧院选址与税收优惠的激烈争论；右侧摊开的是来自纳塔的商贸邀请函与璃月关于技术合作的冗长草案；正前方，则是夏沃蕾呈报的新兵训练评估与克洛琳德附议的边境巡防舰队扩充方案。而在这一切之下，压着一份已用娟秀却难掩疲惫字迹批注了大半的《枫丹公民权利修正案》。\n芙宁娜坐在这一切的中心，背脊依旧挺直，如同舞台上最后的定格。窗外的天色，已从浓黑转为一种沉郁的深蓝，预示着又一个不眠之夜的结束与一个忙碌白日的开始。她在文件上签下名字，目光扫过桌角，那里静静地躺着一封从昨天下午送达后便被她刻意搁置的信——信封上印着至冬国的徽记与愚人众的独特火漆。\n她深吸一口气，仿佛需要额外的勇气，才终于拿起了它。拆开火漆，展开信纸，那些工整却冰冷的官方文字映入眼帘：\n「致枫丹共和国临时最高执政官芙宁娜女士尊鉴：贵方数次就『胎海探查事宜』之质询，我方均已收悉，并予以最高级别关注……」\n接下来是长篇的、空洞的陈述。「复杂且充满变数的环境」、「投入了宝贵的专业资源与人力」、「初步探查未获决定性进展」、「相关情报仍在整合分析」……每一个词句都像是一层精致的冰壳，将实质性的进展与承诺冻结在最深处。信末的总结更是如此：\n「……综上所述，目前尚未具备进行下一步实质性通报之条件。我方将继续对此事保持密切关注，并在获得明确进展后，第一时间与贵方沟通。感谢理解。」\n没有期限，没有承诺，只有无尽的「继续关注」和「适时告知」。\n支撑着她的那根无形的信念之柱——「有一天他会回来，他会接替这一切」，在这份滴水不漏的、温柔的敷衍面前，发出了清晰而残酷的碎裂声。不是彻底的拒绝，却比拒绝更令人窒息。它意味着等待被无限期地延长，意味着她所背负的这一切，看不见终点。数年以来积累的疲惫、焦虑、孤独、重压，以及此刻希望被无限期推迟所带来的巨大空虚感，所有这些被理智强行镇压的情绪，终于找到了决堤的缺口。它们并非化为泪水，而是化作一股尖锐的、物理性的冲击，猛然撞向她的脑海。\n世界骤然失声，视线中的文字扭曲旋转成一片模糊的光斑。她试图伸手扶住桌沿，手指却只无力地划过冰凉的木质表面，碰翻了那杯早已冷透、只剩残渣的红茶。\n就在这死寂的一刻，办公室的门被轻轻推开了。如同过去许多个清晨一样，波洛准备开始劝诫执政官休息的日常任务。他脸上带着习惯性的、温和而担忧的神情，轻声说道：「芙宁娜大人，请去休……」\n他的话，连同他脸上所有的表情，在下一刻冻结了。他看见，那位始终挺直背脊、仿佛永远不会倒下的执政官，就那样毫无征兆地、松开了所有支撑，向后软倒在宽大的座椅里。她的眼睛紧闭，脸色是一种近乎透明的苍白，手中那份来自至冬的信函，如同秋叶般飘落，悄然覆在未完成的法案之上。"
FOD_Furina_event.416.a: "「快叫医生！」"
FOD_Furina_event.417.t: "给继任者的一封信"
FOD_Furina_event.417.desc: "波洛先生敬启，\n记得第一次见面时，您还是无名的作家，而我是命运的傀儡。但您作品所传达的精神深深地感动了我，而你也始终如一地支持着我。枫丹的过去是多灾多难的，所幸预言危机和贵族暴政都没有将你我击垮。而后，您在议会中表现出的——那种将写作上的造诣转化为说服众人的能力，让娜维娅小姐和莱欧斯利先生都赞不绝口。因此我相信，您是一个理解我的所作所为，也有能力继承这一切的人。\n我不确定您看到这封信的时候，枫丹是否已秩序井然，那维莱特是否已安然回归，但无论怎样，我请求您接过这份责任。在这样一个动荡不安的年代，维系一个正确但不稳定的体制是困难的，您需要尽己所能地为枫丹带来变革，完成每一代水神、每一代枫丹人所积累下来的愿景。\n在我离开沫芒宫以后，我会在其他事业上为枫丹添砖加瓦。出于一些私心，我借走了您的一样重要物品，不久之后，我将以另一种形式把这样物品还给您。我作为国家象征的职责到此为止，而属于您的剧本才刚刚开始。\n愿您成功！"
FOD_Furina_event.417.a: "芙宁娜·德·枫丹"
FOD_Furina_event_417_tt: "他不知自己被借走了什么，但眼中泛起一丝泪光，随后将信件珍藏在芙宁娜的画像旁。"
FOD_Furina_event.418.t: "潮声归处"
FOD_Furina_event.418.desc: "芙宁娜的卧房沐浴在午后柔和的日光中，与楼下办公厅的繁忙恍若两个世界。她靠在枕上，身上盖着轻软的绒毯，脸色虽仍显苍白，但眉宇间那长久积压的、作为责任人的重压已然消散。她已不再是统领，这让她在病弱中反而显出一种久违的轻盈。桌边仅放着一些友人们送来的慰问品与书籍，没有任何公文。\n门轴发出几近无声的轻响，这并非女仆或医官惯常的敲门声，芙宁娜下意识地转过头。一个她思念了数百个日夜、也曾在信念中依靠了数百个日夜的身影，就那样静静地立在门边，仿佛从未离开。那维莱特的气息依旧带着深海独有的沉静，他的银发在斜照的光线中流淌着柔和的光泽，那双熟悉的绛紫色眼眸正凝视着她，其中翻涌着她能读懂的情绪——深刻的关切与歉意。他缓步走近，并未言语，只是极其自然地在床榻边的矮凳上坐下，身躯微微前倾，让自己的视线与她齐平。\n「……你回来了。」芙宁娜先开了口，声音有些轻哑，嘴角却不由自主地弯起一个真实的、放松的微笑，「看来，我这场漫长的加演……总算可以彻底谢幕了。」\n「嗯。」那维莱特低低应了一声，目光仔细地掠过她的脸庞，「我回来了。让你独自支撑至今，承受如此重负，是我的失职。」\n「别这么说。这是我的选择，也是我的路。」芙宁娜轻轻摇头，笑容里带着疲惫后的透彻，「你看，现在不是很好吗？波洛先生是个可靠的统领，公民议会也在学习发出自己的声音。行政与立法的框架已经搭起来了，虽然还会吵吵嚷嚷，但那正是生机所在。」\n她的目光变得清亮而专注，望进那维莱特的眼底。\n「现在，你回来了。最后、也是最关键的一块基石，就位了。」她的语气平和却郑重，「司法必须独立。它必须像高山，像深海，不受风浪与烟火的影响，只忠于律法与公正本身。这是新枫丹能够长治久安的真正根基。行政官会更迭，议员们会辩论，但审判官的权威与公正，必须永恒不变。这份守护的职责，我只能托付给你，也唯有你能承担。」\n那维莱特静静地听着，缓缓颔首，如同接受一项最庄严的使命。\n芙宁娜仿佛终于卸下了最后一重心事，神情彻底松弛下来。「还有一件事需要你了结。我们与壁炉之家的「仆人」阿蕾奇诺有一项秘密约定：若寻得你平安归来，便将「水神之心」交予她，以换取他们在寻找你时提供的、决定性的协助。」她顿了顿，语气坦然，「如今你已归来，这份承诺到了履行之时。」\n那维莱特眼中闪过一丝了然。水神之心一直在他身上，此事他自然知晓。这枚神之心所关联的承诺与政治交换，他也完全理解。「约定之事，我已知晓。我会妥善处理，不失枫丹信义。」\n所有紧要的话似乎都已说完。芙宁娜向后靠了靠，脸上露出一种孩子气般的、纯粹的倦意和安心。「好啦……都交代完啦。」她甚至眨了眨眼，「现在的我，只是个需要休长假的普通市民了。至于维护『舞台』秩序、看着新演员们成长这种辛苦事……就拜托你了，那维莱特。」\n那维莱特注视着她，眼中漾起极淡却温暖的波澜。他能清晰地感觉到，那份压垮她的、混合着孤独与无限责任的沉重已然消失，取而代之的是一种如释重负的平静。\n阳光移过窗棂，室内一片静谧温暖。窗外，枫丹廷的轮廓在蓝天下显得充满生机。潮水之王已然归位，足以镇守这片土地所有的浪潮与秩序。而终于可以完全卸下一切重担的少女，在她的老友与最终的依靠面前，缓缓阖上眼睛，沉入了一场无需再扮演任何角色、也无需再忧虑明天的平静睡眠。"
FOD_Furina_event.418.a: "潮水啊，我已归来"
FOD_Furina_event.419.t: "轻涟"
FOD_Furina_event.419.desc: "欧庇克莱歌剧院的穹顶下，水晶吊灯将辉煌柔和的光洒向重新铺设的深蓝帷幔。观众席间，枫丹新生的核心人物们难得齐聚——波洛坐在统领的专属席位上，身旁是身姿笔挺的那维莱特；娜维娅与克洛琳德低声交谈，夏洛蒂的笔尖在本子上飞快移动；莱欧斯利饶有兴致地环顾四周，连梅洛彼得堡的犯人们今日也获得了通过映影仪观看转播的许可。\n这只是一场久违的、纯粹的艺术邀请。请柬上只有简单的字样：「芙宁娜导演作品，诚邀莅临。」灯光渐暗，交响乐序曲如潮水般漫过歌剧院。深蓝帷幕徐徐拉开，舞台上是梦幻般的水下布景。波洛翻开手中精美的剧目单，目光落在标题页的瞬间，他的手指微微一颤。他想起数月前那封信中的话语，终于发现芙宁娜借走了什么。\n《水的女儿》 / 原作：奥蕾莉、波洛 / 改编与导演：芙宁娜\n那一行行他无比熟悉的、曾寄托了他对理想与人性全部思考的文字，此刻被精心编排，印在烫金的纸页上。一种难以言喻的暖流与震动涌上心头，他下意识地看向身侧的那维莱特。最高审判官的视线也落在剧目单上，片刻后，他微微颔首，眼中闪过一丝了然的微光，仿佛在说：「这便是她选择的新生。」\n故事依旧是那个孤独的纯水精灵探寻自我与爱的童话，但在芙宁娜的导演下，被赋予了更细腻的层次与更真实的情感厚度。观众们沉浸其中，直到最后一幕。舞台中央，聚光灯下，不再是扮演角色的演员，而是身着一袭简单而典雅长裙的芙宁娜本人。她站在那里，身后是荡漾的水波光影，手中没有权杖，没有冠冕。\n空灵而优美的前奏响起，那是从未在枫丹流传过的旋律。\n她开口歌唱，歌声清澈而充满故事，不再是神明的宣告，而是一个人的低语与诉说。每一个音符都仿佛在剥落过往的尘埃。歌词中关于水的形态、关于存在、关于渴望被理解又害怕被遗忘的脆弱，与她五百年的扮演、卸任后的漂泊、以及最终找回自我的旅程产生了惊人的共鸣。这不是神性的颂歌，而是人性的诗篇。\n波洛怔怔地望着舞台，他所创作的故事内核，在此刻被歌者以最真实的人生体验彻底点燃。那维莱特静静地注视着，作为最古老的见证者，他比任何人都更清晰地听出了歌声中那沉重历史的终结与轻盈自我的诞生。\n娜维娅握紧了手帕，夏洛蒂忘记了记录，克洛琳德的目光变得柔和。所有曾与芙宁娜并肩或旁观的人，此刻都通过这首歌，触碰到了那个藏在「神明」、「女王」、「统领」符号之下，真实而鲜活的灵魂。随着歌声渐息，剧情走向尾声，余韵在寂静的剧院中缭绕，一枚蓝色的神之眼缓缓落入芙宁娜的掌心。片刻的绝对宁静后，掌声如同冲破堤坝的浪潮，轰然响起，持久不息。观众席上，许多人已泪光闪烁。\n芙宁娜站在光芒中，微微喘息，脸上终于露出了那种毫无负担、清澈见底的微笑。她看向波洛的方向，轻轻点头致意——那是对知遇与理解的感谢；她的目光也与那维莱特相遇，那是跨越漫长时光后，对老友与归处确认的安然。"
FOD_Furina_event.419.a: "化水复回归途"
FOD_Furina_event_419_tt: "《水的女儿》的故事，将在枫丹的历史与艺术长河中，永远流淌下去。 它见证了一个国家的新生，更见证了一个人，如何最终找到了属于自己的、平静的涟漪。\n/至此，您已经体验了高海欲火版本-芙宁娜路线的全部内容，感谢您的游玩。"
FOD_Furina_news_event.1.t: "枫丹内战结束"
FOD_Furina_news_event.1.desc: "达尔杜弗公爵今日于沫芒宫正式宣告，历时数年的全国性平叛行动已取得决定性胜利。贵族议会发布公告，确认三大反抗组织——刺玫会、壁炉之家及梅洛彼得堡已被镇压，其骨干成员均已潜逃出帝国势力范围。国家随即进入以重建「雷穆利亚帝国」秩序与荣光为核心的「复兴纪元」，一系列旨在强化中央权威与社会管控的法令预计将在未来数周内颁布。\n\n然而，一个关键且尴尬的现实处于边境地区：早在内战爆发之初便宣布脱离各方、独自驻守的逐影庭，至今仍未宣布效忠新帝国。有确切消息显示，该部队在内战期间为包括前刺玫会首领娜维娅在内的多名反抗者提供了庇护，此举直接导致了其与枫丹廷之间深刻的信任裂痕。目前，逐影庭仍牢牢控制着边境防线，拒绝议会派员接管，实际上处于一种高度自治的观望状态。分析人士指出，这支未被内战削弱、且拥有丰富实战经验的边防力量，已成为帝国统一进程中一个无法忽视的变量。\n\n与此同时，来自北方的压力正急剧升高。至冬国以清剿行动中壁炉之家人员伤亡及财产损失为由，向枫丹发出了措辞严厉的正式抗议与赔偿要求，其外交照会中包含了不容忽视的军事威胁暗示。与之相呼应，帝国海军侦察单位报告，至冬的舰队近期在毗邻枫丹北部海域的活动异常频繁，并进行了多次针对性极强的作战演练。内部评估认为，新建的帝国军事力量因平叛作战而分散疲惫，国库亦消耗甚巨，此时若在北部边境与至冬发生任何规模的军事对峙，都将使枫丹陷入极其危险的战略困境。"
FOD_Furina_news_event.1.a: "波涛未平"
FOD_Furina_news_event.2.t: "帝国庆典夜催生枫丹新纪元"
FOD_Furina_news_event.2.desc: "一场精心策划的政变彻底改写了枫丹的命运！昨日，帝国精英正在欧庇克莱歌剧院齐聚一堂，观赏一部歌颂雷穆利亚荣光的大型史诗音乐剧《金色潮涌》。当象征帝国起源的原初之舟模型被推向舞台中央时，剧情发生了意想不到的转折。那艘华丽的舞台道具船舰侧舷轰然洞开，全副武装的战士从中涌出，迅速控制了剧院的所有出口与关键位置。与此同时，伪装成侍从与剧院工作人员的特巡队忠诚成员及反抗军战士在观众席中同时行动，迅速解除了贵族卫队的武装。整个行动在极短时间内完成，达尔杜弗公爵及其核心圈成员在惊愕中被当场拘捕，未发生大规模流血冲突。\n政变领导者芙宁娜在控制局面后，于歌剧院舞台向全国宣告：旧帝国及其贵族特权体系已被终结。她宣布成立「枫丹共和国」，并承诺将建立一个法律面前人人平等的新政权。所有世袭贵族头衔与相关法律特权将被即刻废除，其非法聚敛的财产将由国家接收，用于国家重建与民生。\n此次政变的核心支持力量被证实为秘密联合的多种势力：包括由克洛琳德、夏沃蕾领导的特巡队改革派，波洛、娜维娅等人联络的地下抵抗网络，以及来自梅洛彼得堡和千织屋等领域的秘密协助。而此前保持观望的逐影庭，据悉在政变发生后已迅速表态支持新共和国。\n据有关人士分析指出，新生的枫丹共和国面临艰巨挑战：亟需建立全新的宪政体系，处理旧势力残余，安抚仍怀有疑虑的边疆力量，同时仍需应对北方至冬国因政权更迭而可能加剧的外交与军事压力。"
FOD_Furina_news_event.2.a: "考验接踵而至"
FOD_Furina_news_event.3.t: "枫丹迎来新生"
FOD_Furina_news_event.3.desc: "在枫丹共和国成立并运行数年后，芙宁娜女士于昨日正式向公民议会提交辞呈，卸任共和国临时统领一职。她在公开声明中表示，这一决定是「基于个人健康原因与长久以来的个人意愿」，并强调共和国体制已步入正轨，现在是「将职责交给继任者，并回归个人生活」的恰当时机。议会对她「在共和国最脆弱时期的卓越领导与无私付出」表达了最高敬意。\n\n根据共和国宪法规定的继任程序，经各主要党派协商并获公民议会确认，原共和国临时执政委员会核心成员、著名剧作家与社会活动家波洛先生，于同日宣誓就任枫丹共和国第二任统领。波洛在就职演说中承诺，将致力于巩固民主制度、推动社会和解与经济发展，并特别强调「司法独立与公民权利的保障将是不可动摇的基石」。\n\n在芙宁娜女士卸任前夕，因压制吞星之鲸而长期缺席的最高审判官那维莱特，已然返回枫丹廷并重掌最高法院。他的回归被广泛视为共和国司法体系完全确立的关键一环。那维莱特阁下已公开表示，将依据新宪法，绝对独立地行使审判权，守护法律的权威。\n\n分析人士指出，此次无缝衔接的权力转移，标志着枫丹共和国的制度建设通过了首次关键考验。行政权、立法权与司法权相互制衡的宪政框架已从文本走向现实。 尽管仍面临经济重建、贵族残余思潮等挑战，但和平的政治交接与核心国家机构的稳定，为这个新生国家提供了难得的内部凝聚力和持续发展的可能性。"
FOD_Furina_news_event.3.a: "艰难但坚定之路"

