#####################
# 国策
#####################
NDK_Dance_of_Snow_and_Forest: "雪浪与苍林之舞"
NDK_Dance_of_Snow_and_Forest_desc: "漫游四方的旅客，你或许是第一次来到此处。/n请享受美酒与欢笑，和夜色中温柔的月光。/n也请小心死魂与欺骗，和冷寂中苍白的月光。"

NDK_Nasha_Town: "那夏镇"
NDK_Nasha_Town_desc: "那夏镇作为诺德卡莱的贸易与情报枢纽，各个势力云集于此都想掌控本地宝贵的月矩力资源，或是寻找传说中的宝藏，但请小心，在看似波诡云谲的交锋下隐藏着更大的阴影。"

NDK_Meeting_Lauma: "圣银辉冕"
NDK_Meeting_Lauma_desc: "在那夏镇的集市中心，我们见到了菈乌玛，霜月之子当代咏月使，试图改变霜月之子长久以往的困境，但除她以外似乎霜月之子的其他人并不希望接受那夏镇的帮助。"

NDK_Meeting_Nefer: "与蛇共舞"
NDK_Meeting_Nefer_desc: "如果说谁在诺德卡莱最有影响力，奈芙尔一定是前三的人选，秘闻馆接取小到找猫，大到刺杀女皇等一系列委托，但什么是这位商人真正想要的东西，并没有人能开出一个合适的价格。"

NDK_Meeting_Ineffa: "机芯之礼"
NDK_Meeting_Ineffa_desc: "那夏镇的天才少女在某一天带回了一个机器人，从此伊涅芙就成为了蛋卷工坊的第二个“家人”，不久之前伊涅芙前往纳塔完成一项重要任务，如果说想要靠蛋卷收买爱诺，现在就是最好机会。"

NDK_Meeting_Flins: "织夜笼灯"
NDK_Meeting_Flins_desc: "墓地中的「火」不会令人觉得温暖，反而会更加寒冷，菲林斯这位执灯士就像一盏夜墓中的冷灯一样安静，又像那座灯塔一样孤寂，但执灯士的誓言不会熄灭。"

##################### 菈乌玛
NDK_Sliver_Moon: "银月之庭"
NDK_Sliver_Moon_desc: "跟随着月灵来到了一片月之花包围的洞穴，空灵似白鸽的歌声回荡在此，我们见到了诺德卡莱的「库塔尔」，然而如今的情况来看并不乐观，阴影中潜伏的危机正蠢蠢欲动，我们需要加快脚步在一切不那么晚之前。"

NDK_Frost_Moon_Factory: "霜月之坊"
NDK_Frost_Moon_Factory_desc: "霜月之子在诺德卡莱的据点，自然而原始的建筑风格不禁让人思考传承至今的教义是否需要一些改变"

NDK_Nuanta: "努昂诺塔"
NDK_Nuanta_desc: "见到了一只不同寻常的月灵「努昂诺塔」，按菈乌玛说，这是「库塔尔」的赐福月灵，希望我们真能从中获得好运吧。"

NDK_Feed_Columbina: "给少女带一份供餐"
NDK_Feed_Columbina_desc: "见过少女一面后，她似乎意有所指希望品尝一些那夏镇的食物，并不是什么难得要求，难道霜月之子的贡品真的吃不饱吗？"

NDK_Rebuild_three_Moon: "恒月相随"
NDK_Rebuild_three_Moon_desc: "找回了恒月月髓，少女的力量恢复了不少"

NDK_Ideological_Emancipation: "宗教改革"
NDK_Ideological_Emancipation_desc: "菈乌玛跟我们说了霜月之子的当今现状，对于这位慈爱的咏月使来说，霜月教派已经到了需要做出选择的分岔路口，只有改革，才有新生。"

NDK_We_Are_Family: "家人"
NDK_We_Are_Family_desc: "对于菈乌玛眼中的霜月之子，每个人都是大家的家人，每个人都爱着家人，但改革一定伴随着痛苦，如今已经完成的宗教改革舍弃的古老的繁文缛节，迎来了走向新生的皎皎月光。"

NDK_Rebuild_Faith: "新霜月教"
NDK_Rebuild_Faith_desc: "如今，霜月教派不再拘泥于传统的自然之道，更多关于科学与现代的思想在教派中传播，我们知晓了古老与过往，也接受了希望与未来。"

##################### 奈芙尔
NDK_Hall_of_Secret: "秘闻馆"
NDK_Hall_of_Secret_desc: "诺德卡莱的穷人想暴富只能在旗舰碰运气，而权贵的交易在秘闻馆，如果想要找一位合作的生意伙伴，奈芙尔绝对不会是错误的选择，但也不会是最好的选择。"

NDK_Black_Market: "黑市"
NDK_Black_Market_desc: "诺德卡莱的黑市是全提瓦特最规范但又规模最大黑市了，伏尼契商会的规则和秘闻馆的威名在外，即便想要以命相搏但至今没有人成功过。"

NDK_Recall_Jahoda: "召回雅柯达"
NDK_Recall_Jahoda_desc: "到上个月为止雅柯达已经工作两年零三个月了，这位自封的诺德卡莱地头龙并不知道她将接下一份可能拯救世界的任务"

NDK_Infiltrate_the_Laboratory: "潜入实验设计局"
NDK_Infiltrate_the_Laboratory_desc: "潜入愚人众在诺德卡莱的实验设计局，雅柯达并不想接受这份任务，但不得不做"

NDK_Getting_Moon: "得到月髓"
NDK_Getting_Moon_desc: "根据情报，恒月月髓被带到了星砂滩，巡逻的执灯士发现了逐渐显现的狂猎踪迹"

NDK_Intelligence_Network: "建立情报网"
NDK_Intelligence_Network_desc: "掌控了诺德卡莱的地下黑市后，奈芙尔作为北大陆情报网的现任负责人，也完整掌控了诺德卡莱的情报系统，令人疑惑的是，我们的敌人似乎不是愚人众。"

NDK_Wild_Hunter: "狂猎"
NDK_Wild_Hunter_desc: "在得到多方验证后，我们确认了这次灾难的源头，狂猎，提瓦特的深渊力量在诺德卡莱的具象体现，奈芙尔也遇到了她这辈子最有趣的一位队友，“猎月人”。"

NDK_Prepare_for_War: "捕食之势"
NDK_Prepare_for_War_desc: "毒蛇以经做好了准备跟这位远古对手一较高下，但狡猾并不是蛇的标签"

##################### 伊涅芙
NDK_Rebuild_Cannon: "蛋卷大炮"
NDK_Rebuild_Cannon_desc: "那夏镇的大炮已经年久失修，为了应对一次次愈发强烈的狂猎，我们需要重新修复这门大炮。"

NDK_Eggcake_Factory: "蛋卷工坊"
NDK_Eggcake_Factory_desc: "蛋卷工坊是爱诺一个人(现在是两个人了)建造的家，为了让家持久的运转下去，爱诺也会接取一些武器订单。"

NDK_More_Screw: "更多螺丝"
NDK_More_Screw_desc: "蛋卷工坊的订单需求量本就极大，随着爱诺的徒弟越来越多，那夏镇现在有越来越多的螺丝机械师了"

NDK_Strengthen_Ineffa: "如此强劲，令人惊叹"
NDK_Strengthen_Ineffa_desc: "在得知伊涅芙在纳塔的遭遇后，爱诺就开始为她设计强化模块，相应的，花费也是更多的。"

NDK_Joint_Operations: "联合作战"
NDK_Joint_Operations_desc: "完成了那夏镇的大炮升级与武装补齐，我们需要进行一次联合作战来为战争做好准备"

NDK_More_Eggcake: "更多蛋卷"
NDK_More_Eggcake_desc: "这种小孩子爱吃东西在诺德卡莱本不应该火起来的，但不知为什么甚至有枫丹的糕点师来品尝过蛋卷后，蛋卷工坊出品的蛋卷烤箱变得家喻户晓。"

NDK_Destroy_BM: "摧毁黑市"
NDK_Destroy_BM_desc: "随着奈芙尔对黑市的规范与剔除，现在的诺德卡莱黑市或许更应该叫“自由市场”，或许还有着些许猫腻，但"

NDK_Eggcake_Research: "蛋卷研究院"
NDK_Eggcake_Research_desc: "枫丹的科学院和璃月的军工院在看到爱诺的设计作品后一直派学生来参考学习，甚至为其捐赠了一座研究院，爱诺享有命名权，就叫蛋卷研究院了，虽然很快就变成另一座零件堆积场。"

##################### 菲林斯
NDK_Patrol_Duty: "巡逻任务"
NDK_Patrol_Duty_desc: "狂猎逐渐频繁，执灯士的巡逻任务繁重，或许我们应该征调更多的赏金猎人"

NDK_Request_Support: "请求援助"
NDK_Request_Support_desc: "狂猎危在旦夕，那夏镇无法独善其身，我们将向一切可能得帮助求援"

NDK_Deal_WildHunter: "处理小型狂猎"
NDK_Deal_WildHunter_desc: "大型狂猎潮在期初都是由少数狂猎发起的，防微杜渐是对抗狂猎的第一要务"

NDK_Save_Filns: "雾中明灯"
NDK_Save_Filns_desc: "在确定菲林斯的踪迹后，我们在猎月人攻击他时及时救下，同时也得知了猎月人的目的"

NDK_Final_Night_Cemetery: "终夜长茔"
NDK_Final_Night_Cemetery_desc: "终夜长茔埋葬的一代代的执灯士，菲林斯作为漫漫长夜唯一的幽灯，静静地伫立在那片大海之中。"

NDK_Army_Exercise: "军事强化"
NDK_Army_Exercise_desc: "我们的敌人异常强大，因此需要舍弃一切幻想，做好最坏的打算和最充足的准备吧，同志，我们墓里见。"

NDK_Deploy_Combat_Plan: "作战计划"
NDK_Deploy_Combat_Plan_desc: "对抗狂猎的作战计划书已经完成，现在，是时候终结这上百年来的怨毒与诅咒了"

NDK_Order_Supplies: "订购物资"
NDK_Order_Supplies_desc: "我们从蛋卷工坊订购了大量物资，但还不够，远远不够。"

##################### 
NDK_Relationship_FMS: "霜月同行"
NDK_Relationship_FMS_desc: "霜月之子完成了历史变革，菈乌玛将支持我们对抗狂猎"

NDK_Relationship_HOS: "秘闻交织"
NDK_Relationship_HOS_desc: "秘闻馆得到了那夏镇的地下控制权，我们将得到全面的情报支持和源源不断的赏金猎人"

NDK_Nasha_and_EC: "那夏工业园"
NDK_Nasha_and_EC_desc: "那夏工业体系在蛋卷工坊的支持下建立完成"

NDK_Relationship_LKS: "执灯共明"
NDK_Relationship_LKS_desc: "执灯士已经补充到位各个关卡哨点，但这一次我们也将亲手保卫我们的家园"

NDK_Martial_Law: "作战警报"
NDK_Martial_Law_desc: "警告，星砂滩方向侦查到大量狂猎出没，其中包含高危狂猎个体，请做好接敌准备，预计时间，20小时后"

NDK_Sandrone: "茶会密友"
NDK_Sandrone_desc: "愚人众执行官木偶带领她的卫队来支援我们了，但这似乎也只是杯水车薪。"


NDK_revise_law: "命运的抉择路口"
NDK_revise_law_desc: "诺德卡莱的情况受到魔女会的关注，显然只靠普通人无法解决这次问题，天使魔女尼可莱恩将以魔女会的名义引导诺德卡莱做出正确的选择"






NDK_Exchange_views_with_FMS: "纺月的夜歌"
NDK_Exchange_views_with_FMS_desc: "霜月之子信仰被确定为合法宗教，霜月保护区建立，霜月图书馆开放，霜月民被认定为合法公民，有相应的责任与义务"

NDK_Exchange_views_with_LKS: "长夜之誓"
NDK_Exchange_views_with_LKS_desc: "执灯士看到了我们抗击深渊的坚定信念，执灯士军区并入诺德卡莱公社"


#      分支国策，重组军队，霜月农业


NDK_Tea_party: "茶会密友"
NDK_Tea_party_desc: "哥伦比亚给她的茶会密友桑多涅去了一封信，转述了诺德卡莱的新变化，桑多涅也知道将要发生的事了，她答应我们，在进攻实验设计局时，她的机械部队应该会在某个不知名山区做实验。"

#      木偶会作为装甲大师在后面的红色至冬用的

NDK_Full_Moonlight: "满辉"
NDK_Full_Moonlight_desc: "三月显世，哥伦比亚用权能强化了军队中所有月矩力装备至满辉额度"

NDK_North_Spear: "北国枪阵"
NDK_North_Spear_desc: "执灯士的传统阵法"

NDK_Night_guest: "夜客致访"
NDK_Night_guest_desc: "一位灯之妖精答应我们会参与进攻，菲林斯会在终夜长茔进攻实验设计局"

NDK_First: "首战"
NDK_First_desc: "愚人众实验设计局作为至冬在诺德卡莱的堡垒，严重损害了我们的领土安全，因此必须武装夺取，而且要速战速决，我们不能让至冬反应过来"


NDK_Tank: "研究设计手稿"
NDK_Tank_desc: "在成功攻破实验设计局后，我们拿到了愚人众关于月矩力装备的相关实验手稿，这些手稿将为我们日后的武装能力提升带来巨大帮助"

NDK_Gun: "月矩力能源"
NDK_Gun_desc: "愚人众在实验设计局制造了大量的月矩力装备并存储了大量的月矩力能源"

NDK_Brother_or_prisoner: "接收俘虏"
NDK_Brother_or_prisoner_desc: "由于做了完整的站前准备，我们迅速拿下了实验设计局，大量的愚人众和实验人员成为了俘虏，如何处理他们则是我们要思考的问题"


#      下面是对至冬作战系列国策

NDK_Communism: "红旗飘扬"
NDK_Communism_desc: "我们的斗争已经起到了初步的胜利，启明思想的春风已经吹到了凛冽的至冬"

NDK_Collogue: "私下接触执政官"
NDK_Collogue_desc: "执政官并不完全忠诚于女皇，如果想要战胜至冬，尽可能的拉拢执政官则是我们必须做的事"

#      该线会有大量的分支国策，具体内容待定，每完成一项都会削弱至冬的强度
#      木偶，仆人，队长（队长可能给他一个活的戏份）将会必然接受我们的拉拢，可能会接受的执政官有丑角，公子（待定）。必然不会接受的，公鸡，富人（富人计划会在璃月的相应国策被干掉），
#      博士（看完剧情大概你是必死了，可能会给散兵一点剧情表现）

NDK_Deserter: "整合各地残军"
NDK_Deserter_desc: "随着诺德卡莱的建立，越来越多的各地至冬士兵加入了我们的阵营，对于他们来说，女皇的伟大理想和他们这些因为贫苦而参军的士兵来说毫无干系，他们愿意为了至冬而死并非女皇"

NDK_three_moon: "三相月临"
NDK_three_moon_desc: "木偶的世界式完成验算，霜月被拉回，哥伦比娅回到提瓦特，三月权能归一，现在，是反攻的时候了"

#      这一条的扩展内容待定
#      西风骑士团必然接受，法尔伽将会开辟第二战场，璃月如果刻晴执政将会接受，稻妻无消息，须弥在完成相关散兵国策后会提供援助


#      其实还有进一步的团结各个群体的国策
#      团结学生，至冬皇家军事学院的学生，工农，军队

NDK_political_actions: "聚所共建"
NDK_political_actions_desc: "在诺德卡莱，聚所系统是统合整个诺德卡莱高效运行的关键，玩家需要通过完成国策，任务，花费整治点对聚所进行建设，从而获得相应的奖励。\n霜月之坊：维持政治稳定，提供大量政治基础，提供人力资源，保障月神任务，完成后获得特殊霜月特种。\n蛋卷工坊：工业与科研聚所，提供大量工业科研加成，提供武器制造，但需要玩家花费政治点和消费品给爱诺买蛋卷和收集零件。\n终夜长茔：提供前期王牌陆军指挥官菲林斯，提供特殊陆军执灯士加成，后期会转为海军加成。\n魔女小屋：在战胜博士后，获得魔女会支持，得到进一步科研加成，解锁参与外部战争支援和后期对抗天理的决议。\n西风驻地：战胜博士后，获得西风骑士支持，获得进一步空军加成，西风骑士团会获得执灯士加成。\n壁垒前线：执灯士大型堡垒，对执灯士部队做进一步加成，彻底压制诺德卡莱的狂猎debuff。"
