 # --- 第一板块：海祇的反抗（1-40） ---
 SAN_resistance_proclamation:"海祇岛的反抗宣言"
 SAN_resistance_proclamation_desc:"幕府的眼狩令已触及海祇岛的底线。珊瑚宫心海大人在月浴之渊宣告：为了信仰与自由，我们必须向鸣神拔刀。此举虽为豪赌，但海祇岛民绝不低头。"
 SAN_gorou_army_training:"五郎的强军计划"
 SAN_gorou_army_training_desc:"反抗军大将五郎开始督导全岛训练，将往日的渔民与农夫转化为能够抵御幕府精锐的钢铁之师。"
 SAN_kokomi_strategic_maneuver:"心海的兵法演练"
 SAN_kokomi_strategic_maneuver_desc:"现人神巫女不仅是宗教领袖，更是足智多谋的军师。通过她的兵法布局，反抗军将在战术上取得先机。"
 SAN_focus_4:"动员望泷村"
 SAN_focus_4_desc:"望泷村是海祇岛的灵魂。动员这里的壮丁，为即将到来的内战补充人力。"
 SAN_focus_5:"改进反抗军制式装备"
 SAN_focus_5_desc:"海祇岛的资源有限，但我们的工匠能在有限的条件下改良长枪与弓箭。"
 SAN_focus_6:"强调进攻意志"
 SAN_focus_6_desc:"海祇之众绝不仅仅是防守者，在合适的时机，我们将发起如浪潮般的攻势。"
 SAN_focus_7:"强化阵地防御"
 SAN_focus_7_desc:"利用海祇岛险峻的地形，构建密不透风的防御网络。"
 SAN_focus_8:"缴获幕府装备"
 SAN_focus_8_desc:"利用战场缴获的幕府长枪补充我们的武器库。"
 SAN_focus_9:"扩充前线营地"
 SAN_focus_9_desc:"建立更多野战医院与仓库，支持长期的拉锯战。"
 SAN_focus_10:"名椎滩誓师大会"
 SAN_focus_10_desc:"名椎滩是踏向鸣神岛的第一步，在这里，我们将誓死终结眼狩令。"
 SAN_focus_11:"整合剑鱼二番队"
 SAN_focus_11_desc:"由最精锐的海民组成的特种分队，将执行最艰巨的任务。"
 SAN_focus_12:"安抚八酝岛平民"
 SAN_focus_12_desc:"八酝岛深受祟神影响，我们需要在这片荒凉之地赢得民心。"
 SAN_focus_13:"开发蛇骨矿洞"
 SAN_focus_13_desc:"深入大蛇骸骨附近的矿洞，开采珍贵的晶化骨髓以强化钢铁性能。"
 SAN_focus_14:"绯木村工坊"
 SAN_focus_14_desc:"在被雷电波及的村庄重建工坊，支援前线物资。"
 SAN_focus_15:"无明砦防御研究"
 SAN_focus_15_desc:"研究这片浅滩上的古代防御建筑，提升我军的阵地战能力。"
 SAN_focus_16:"海祇水军运输线"
 SAN_focus_16_desc:"利用我们的航海优势，确保补给物资在诸岛间畅通无阻。"
 SAN_focus_17:"训练海民舰队"
 SAN_focus_17_desc:"海祇岛的孩子生于浪潮，他们将在波涛中彻底击溃幕府的楼船。"
 SAN_focus_18:"招募浪人武士"
 SAN_focus_18_desc:"那些不满眼狩令的流浪武士（如枫原万叶）将成为我们重要的战力。"
 SAN_focus_19:"联络离岛商会"
 SAN_focus_19_desc:"由于勘定奉行的盘剥，离岛商人急需新的出路，我们可以达成秘密贸易协议。"
 SAN_focus_20:"挺进踏鞴砂"
 SAN_focus_20_desc:"夺取幕府的武器锻造中心，彻底切断他们的补给来源。"
 SAN_focus_21:"神无冢防线"
 SAN_focus_21_desc:"在神不在的山丘上，建立反抗军的永久据点。"
 SAN_focus_22:"强化名椎滩滩头"
 SAN_focus_22_desc:"血斛盛开之地，必将成为幕府军队的坟场。"
 SAN_focus_23:"现人神巫女随军"
 SAN_focus_23_desc:"心海大人的亲临将赋予战士们神性的庇佑与无畏的勇气。"
 SAN_focus_24:"收集幕府情报"
 SAN_focus_24_desc:"通过秘密渠道了解天领奉行的进军路线。"
 SAN_focus_25:"研究心海兵法录"
 SAN_focus_25_desc:"“常胜不败”的秘诀就在这厚厚的手稿之中。"
 SAN_focus_26:"大赦幕府降兵"
 SAN_focus_26_desc:"许多幕府武士只是被迫执行命令，大赦他们能为我们争取更多的人力。"
 SAN_focus_27:"南十字船队支持"
 SAN_focus_27_desc:"北斗率领的船队将为我们运来关键的火药与粮食。"
 SAN_focus_28:"社奉行秘密会盟"
 SAN_focus_28_desc:"神里家亦对现状感到忧虑，我们可以达成某种形式的默契。"
 SAN_focus_29:"反抗之火燃遍鸣神"
 SAN_focus_29_desc:"鸣神岛的子民已听到海祇的呼唤，内战进入了最后阶段。"
 SAN_focus_30:"攻占天守阁"
 SAN_focus_30_desc:"踏上稻妻城的最高处，面对雷电将军，要求废除眼狩令。旧秩序就此终结。"
 SAN_focus_31:"战后治安维持"
 SAN_focus_31_desc:"胜利后的混乱可能导致盗贼横行，必须迅速稳定局势。"
 SAN_focus_32:"重组三奉行"
 SAN_focus_32_desc:"废除腐败的旧官僚，以海祇的行政逻辑重塑行政体系。"
 SAN_focus_33:"修复稻妻城"
 SAN_focus_33_desc:"内战后的重建是赢得全体稻妻人拥戴的关键。"
 SAN_focus_34:"重启离岛贸易"
 SAN_focus_34_desc:"撤销锁国令，让稻妻再次与提瓦特大陆相连。"
 SAN_focus_35:"海祇治世宣告"
 SAN_focus_35_desc:"大蛇的旗帜将与雷鸣共存，宣告一个兼容并包的新时代到来。"
 SAN_focus_36:"彻底废除眼狩令"
 SAN_focus_36_desc:"神之眼应归还给它们的主人，愿望不应被任何人收割。"
 SAN_focus_37:"总结内战经验"
 SAN_focus_37_desc:"整理战场记录，提升我军未来的联合作战能力。"
 SAN_focus_38:"鸣神大社档案"
 SAN_focus_38_desc:"整理神子宫司留下的古籍，寻找关于提瓦特真实历史的蛛丝马迹。"
 SAN_focus_39:"全境大动员"
 SAN_focus_39_desc:"整合鸣神岛、海祇岛的人力资源，准备清理周边岛屿。"
 SAN_focus_40:"统一稻妻的曙光"
 SAN_focus_40_desc:"尽管前方仍有迷雾与雷暴，但海祇岛的旗帜已是不可阻挡的潮流。"

 # --- 第二板块：白夜国遗产（41-80） ---
 SAN_enkanomiya_access:"开启深渊之门"
 SAN_enkanomiya_access_desc:"打破月浴之渊的古老封印，探访先祖沉眠的故乡——渊下宫。"
 SAN_focus_42:"翻译《常世国龙蛇传》"
 SAN_focus_42_desc:"这部著作中隐藏着白夜国古文明的运行逻辑。"
 SAN_focus_43:"维护大日御舆"
 SAN_focus_43_desc:"阿倍良久设计的太阳神车，不仅是光明源泉，更是庞大的能量核心。"
 SAN_focus_44:"对话残影：阿倍良久"
 SAN_focus_44_desc:"向这位跨越千年的贤者请教远古的工业技术。"
 SAN_focus_45:"永夜光能工业化"
 SAN_focus_45_desc:"利用大日御舆的辐射能加速我军工厂的生产效率。"
 SAN_focus_46:"第一王座建筑技术"
 SAN_focus_46_desc:"研究天理降临前的建筑结构，极大提升我军要塞的坚固度。"
 SAN_focus_47:"深海龙蜥矿藏"
 SAN_focus_47_desc:"在那些禁区中，埋藏着地表罕见的铬与钨矿。"
 SAN_focus_48:"三界路飨祭"
 SAN_focus_48_desc:"通过古老的仪式，净化虚无界的侵蚀，稳定渊下宫局势。"
 SAN_focus_49:"触碰虚无界真理"
 SAN_focus_49_desc:"那不属于七神秩序的力量，将成为我们打破桎梏的杀信锏。"
 SAN_focus_50:"蛇心之地空间研究"
 SAN_focus_50_desc:"研究蛇心之地的空间交叠现象，提升战略部署效率。"
 SAN_focus_51:"核动力源雏形"
 SAN_focus_51_desc:"大日御舆的底层逻辑近乎于核裂变，我们需要以此开发新型能源。"
 SAN_focus_52:"处理太阳之子遗恨"
 SAN_focus_52_desc:"纠正那段血腥而荒唐的历史，赢得渊下宫残余意识的认可。"
 SAN_focus_53:"挖掘坎瑞亚残骸"
 SAN_focus_53_desc:"坎瑞亚使团曾试图窃取《日月前事》，他们留下的遗迹机械充满了研究价值。"
 SAN_focus_54:"地下工业基地"
 SAN_focus_54_desc:"在渊下宫腹地建立不受敌军轰炸威胁的秘密兵工厂。"
 SAN_focus_55:"珊瑚加固武器"
 SAN_focus_55_desc:"利用血枝珊瑚的特殊结构，制造出强度远超钢材的新型步枪。"
 SAN_focus_56:"研究龙蜥装甲"
 SAN_focus_56_desc:"龙蜥厚重的外皮是研制重型战车装甲的最佳模版。"
 SAN_focus_57:"组建地走官部队"
 SAN_focus_57_desc:"恢复古代精锐卫队的编制，作为心海大人的直属战力。"
 SAN_focus_58:"血枝珊瑚的加持"
 SAN_focus_58_desc:"让战士们接触珊瑚之力，极大提升他们的白昼作战属性。"
 SAN_focus_59:"根除社会腌臜"
 SAN_focus_59_desc:"清理渊下宫遗留的旧贵族腐朽思想，确立现人神的神圣领导。"
 SAN_focus_60:"蔑视七神秩序"
 SAN_focus_60_desc:"既然白夜国被天空岛抛弃，那我们也无需再遵守所谓的秩序。"
 SAN_focus_61:"揭开《日月前事》真相"
 SAN_focus_61_desc:"书中记载了提瓦特最古老的秘密，这将彻底改变我们的科研逻辑。"
 SAN_focus_62:"海渊下的战术思考"
 SAN_focus_62_desc:"在三维空间的深渊中，总结出全新的潜艇战术。"
 SAN_focus_63:"观察飞鳐飞行动作"
 SAN_focus_63_desc:"通过仿生学改进我们的飞机机翼设计。"
 SAN_focus_64:"龙蛇商路"
 SAN_focus_64_desc:"建立起贯穿海祇岛与渊下宫的高效运输体系。"
 SAN_focus_65:"仿生飞机试飞"
 SAN_focus_65_desc:"利用渊下宫特殊大气环境研发的新型战机即将升空。"
 SAN_focus_66:"巫女绝对威严"
 SAN_focus_66_desc:"心海大人在渊下宫确立了无可动摇的统治权。"
 SAN_focus_67:"沐浴大日之光"
 SAN_focus_67_desc:"让民众感受到来自远古太阳的温暖，极大提升全境稳定度。"
 SAN_focus_68:"常世大神祝福"
 SAN_focus_68_desc:"时间之执政伊斯塔露的残响正在注视着我们。"
 SAN_focus_69:"劳役体制改良"
 SAN_focus_69_desc:"以现代科学方法管理渊下宫的劳动力。 "
 SAN_focus_70:"蛇肠之路研究"
