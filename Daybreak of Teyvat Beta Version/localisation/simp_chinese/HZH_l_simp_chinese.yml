HZH_Liney: "林尼"
HZH_Liney_desc: "当「父亲」阿蕾奇诺专注于巩固权力与应对内部纷争时，将国家日常运作的重担，交给了她最杰出的「孩子」——林尼。这位曾经用魔术给观众带来欢笑的巨星，如今正为整个国家上演一场更为宏大、也更为危险的「幻戏」。他的治理方式正如他的魔术：华丽、精准，且永远让人看不清真相背后究竟藏着什么。\n\n然而，最伟大的魔术师也无法欺骗自己。林尼深知，他正在经营的，是一个建立在矛盾之上的国度。他是「壁炉之家」的代理人，却要扮演枫丹的爱国者；他依赖着至冬的输血，却梦想着断奶自立。他的每一个决策，都是一次在钢丝上的舞蹈，下方即是万丈深渊。他是阿蕾奇诺意志的延伸，还是早已在心中谋划着属于自己的终幕？这场关乎枫丹未来的宏大戏法，最终的答案，或许连他自己也仍在寻找。"