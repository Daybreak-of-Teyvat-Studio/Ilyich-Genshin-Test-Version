#事件

HZH_civil_war.100.t: "暗流涌动"
HZH_civil_war.100.desc: "信使穿梭于塔拉塔海谷之间，而枫丹廷以北，芒索斯以南的陆地上，南北双方都在前线部署了数量可观的军队。无论和平或是暴力，我们都将统一枫丹，为这片破碎的高海之地带来安宁。枫丹的命运，紧紧地掌握在你的手中..."
HZH_civil_war.100.a: "做好准备..."

HZH_civil_war.200.t: "长久以后"
HZH_civil_war.200.desc: "经过度日如年的战争岁月，我们终于迎来了和平。重建房屋，修补衣物，弥合伤口...犒赏或是分赃，由我们的政治架构决定。战时，我们的组织也许能搁置争议。战后，各个派系必定会提出自己的诉求。"
HZH_civil_war.200.a: "接下来是..."








HZH_Liney: "林尼"
HZH_Liney_desc: "当「父亲」阿蕾奇诺专注于巩固权力与应对内部纷争时，将国家日常运作的重担，交给了她最杰出的「孩子」——林尼。这位曾经用魔术给观众带来欢笑的巨星，如今正为整个国家上演一场更为宏大、也更为危险的「幻戏」。他的治理方式正如他的魔术：华丽、精准，且永远让人看不清真相背后究竟藏着什么。\n\n然而，最伟大的魔术师也无法欺骗自己。林尼深知，他正在经营的，是一个建立在矛盾之上的国度。他是「壁炉之家」的代理人，却要扮演枫丹的爱国者；他依赖着至冬的输血，却梦想着断奶自立。他的每一个决策，都是一次在钢丝上的舞蹈，下方即是万丈深渊。他是阿蕾奇诺意志的延伸，还是早已在心中谋划着属于自己的终幕？这场关乎枫丹未来的宏大戏法，最终的答案，或许连他自己也仍在寻找。"
HZH_The_Knave: "“仆人”阿蕾奇诺"
HZH_The_Knave_desc: "她是「壁炉之家」的家长，亦是至冬安插于枫丹棋局的「仆人」。阿蕾奇诺，这个名字本身就是一个悖论。她以慈父般的姿态，为无家可归的孤儿们提供了名为「家」的避风港，却又亲手将这些「孩子」训练成愚人众的利刃，推向内战的绞肉机。她推翻了前任「仆人」库嘉维娜残酷的统治，誓言创造一个不再需要手足相残的乐园，如今却为了维持新生的秩序，不得不沿用甚至精进了那些她曾深恶痛绝的铁腕手段。\n\n「保护」，是她一切行动的核心，也是一道她为自己设下的、永无止境的枷锁。为了保护「孩子们」不被外部敌人吞噬，她必须首先确保自己的权力坚不可摧；为了保护枫丹不被至冬彻底消化，她必须首先证明自己是一枚无可替代的棋子。她的内心是一座被理性冰封的火山，每一次冷静的决策之下，都奔涌着对「博士」等同僚的憎恶、对牺牲者的愧疚，以及那份与克蕾薇共同憧憬过的、关于「自由」的、早已被背叛的梦想。\n\n如今，真正的试炼才刚刚开始。她是会选择继续扮演那位忠诚的「仆人」，将枫丹的一切献祭给女皇的「宏图」？还是会抓住这千载难逢的时机，为了她真正的「家人」，去赌一个独立自主的未来？枫丹的命运，悬于她内心冰与火的裂隙之间。"


