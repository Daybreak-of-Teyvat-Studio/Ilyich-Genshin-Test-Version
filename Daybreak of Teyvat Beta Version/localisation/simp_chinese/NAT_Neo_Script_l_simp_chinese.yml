 MVK-Prestige-Index_Decrease_10:"§R玛薇卡威望减10§!"
 NAT-MVK-WIN:"不败阳焰"
 NAT-MVK-LOSE:"阳焰熄灭"
 NAT-MVK-WIN_desc:"这位最强大的火神以不灭的炽焰为刃，携手六英杰冲破深渊的封锁，于夜神之国直面古斯托特，以死之执政的力量斩断了深渊的祸根。圣火因她的意志燃得愈发炽烈，纳塔的阳焰从未熄灭，她以一己之力护佑火之国度，让竞逐与荣耀的赞歌，永远回荡在这片土地。§Y玛薇卡威望：§!§R[?MVK-Prestige-Index]§!"
 NAT-MVK-LOSE_desc:"火神的炽焰终被深渊狂潮吞噬，夜神之国彻底坍缩，圣火的庇佑荡然无存。失去核心统御的六大部族陷入彼此猜忌，为争夺残存的燃素资源与安全领地相互设防，昔日盟誓分崩离析，纳塔正式踏入准分裂的混沌之境。深渊魔物趁虚肆虐全境，地脉持续崩坏，火之国度的荣光碎作焦土，唯有无尽的纷争与黑暗，笼罩着这片曾经炽热的土地。§Y玛薇卡威望：§!§R[?MVK-Prestige-Index]§!"
 NAT_decisions-02:"部族行动中"
 NAT_decisions-02_desc:"纳塔六大部族虽各有传承，却长期处于分裂状态。分裂根源在于部族间信仰、利益差异，以及历史积怨 —— 奥奇坎暴政时期，阿霍布因仇视龙族与胞妹伊葵反目，莉安歌遭儿子背叛战死，加剧部族隔阂。后续荣花演武中，伊马雷为圣火结晶背叛盟友，让部族间信任崩塌。坎瑞亚灾变时，六大部族仍争执不休，需特诺切出面团结抗敌。即便火神居中协调，部族间宣战、结盟、背叛仍频繁发生，内耗严重，成为纳塔抵御危机的巨大阻碍。"


 # 第一类：内政政治类（1-8）
 # 1. 召开部族联合会议
 NAT_Hold_Tribal_Joint_Council:"召开部族联合会议"
 NAT_Hold_Tribal_Joint_Council_desc:"赤色火山平原上，六部族的旌旗在圣火风中猎猎作响。旅者以希巴拉克的盟约为名，召集沃陆之邦的农酋、回声之子的锻主、流泉之众的航首等首领齐聚源火城。议事篝火映照着部族间的历史裂隙，烟谜主祭司以灵谜涂鸦记录共识，古名传承的英雄意志在低语中共鸣。这场会议不仅是权力的制衡，更是团结的誓约——唯有让散佚的部族声量汇入同一片圣火，才能让深渊低语无机可乘，让纳塔的稳定如火山岩般坚固。"

 # 2. 调解部族边境冲突
 NAT_Mediate_Tribal_Border_Conflict:"调解部族边境冲突"
 NAT_Mediate_Tribal_Border_Conflict_desc:"部族边境的火渠与猎场争端再起，刀剑相向的阴影重现赤色大地。旅者效仿希巴拉克的调停传统，启用双轨调解机制：由悬木人长老凭地形智慧划分边界，烟谜主祭司以燃素涂鸦立下契约。在圣火的见证下，争执双方放下私怨，遵循「决斗定分止争」的古训，而非流血冲突。这场调解不仅平息了当下的烽烟，更修复了部族间的羁绊，让战争损耗消解于萌芽，为纳塔的团结再添一道圣火屏障。"

 # 3. 授予英雄古名
 NAT_Award_Hero_Ancient_Name:"授予部落英雄古名"
 NAT_Award_Hero_Ancient_Name_desc:"归火圣夜巡礼的竞技场上，勇士的锋芒如燃素烈焰般耀眼。旅者遵循纳塔千年传承的古名体系，从「团结」「超越」「希望」等神圣称谓中，为功勋卓著的战士授予英雄古名。仪式上，回声之子锻主将古名铭刻于黑曜石铭牌，烟谜主祭司以灵谜涂鸦激活地脉共鸣，让英雄的意志与先祖魂灵相连。这份荣誉不仅点燃了全军的战魂，更让民族认同深植人心，让纳塔的英雄血脉在古名传承中永不枯竭。"

 # 4. 镇压部族分离主义叛乱
 NAT_Suppress_Tribal_Separatist_Rebellion:"镇压部族分离主义叛乱"
 NAT_Suppress_Tribal_Separatist_Rebellion_desc:"深渊低语蛊惑下，部分部族长老妄图分裂纳塔，在踞石山竖起反叛旗帜，切断燃素运输管线。旅者调遣花羽会的驭龙骑士与悬木人的山地精锐，以「万火归一」的名义发起平叛。战士们循着灵谜涂鸦的指引，直捣叛乱巢穴，龙焰与燃素武器交织成无坚不摧的攻势。这场镇压不仅恢复了全境的驻军管控，更肃清了内部的分裂隐患，让希巴拉克立下的团结盟约再度焕发光芒，让分离主义在圣火中化为灰烬。"

 # 5. 平反历史冤案
 NAT_Redress_Historical_Injustice:"平反历史冤案"
 NAT_Redress_Historical_Injustice_desc:"奥奇坎暴政时期的冤案，如深渊阴影般困扰着纳塔部族。旅者翻阅烟谜主珍藏的织卷史料，走访奥奇卡纳塔遗迹，还原那些被污蔑为「叛逆」的英雄真相——他们或是庇护龙族的义士，或是坚守人龙共生盟约的勇者。旅者在圣火祭坛前举行平反仪式，为蒙冤者刻名于英雄碑，让灵谜涂鸦传颂其功绩。这场昭雪治愈了历史的创伤，让部族间的积怨烟消云散，让纳塔的稳定在正义之光中愈发坚实。"

 # 6. 规范部族税收制度
 NAT_Standardize_Tribal_Taxation_System:"规范部族税收制度"
 NAT_Standardize_Tribal_Taxation_System_desc:"各部族分散的税收体系，如杂乱的燃素管线般效率低下。旅者效仿希巴拉克的统一之策，建立全国性税收制度：沃陆之邦按颗粒果收成缴粮，回声之子以燃素工坊产出抵税，流泉之众则贡献通商收益。烟谜主祭司以灵谜涂鸦记录税目，悬木人匠人打造统一税符，确保税负公平、征管有序。这套制度不仅充盈了国库，更减少了民用物资消耗，让纳塔的工业产能如火山喷发般蓬勃，为对抗深渊筑牢物质根基。"

 # 7. 拉拢部族长老议会
 NAT_Woo_Tribal_Elder_Council:"拉拢部族长老议会"
 NAT_Woo_Tribal_Elder_Council_desc:"部族长老议会的摇摆，如未稳定的燃素核心般潜藏风险。旅者携带回声之子锻造的龙鳞礼器，走访各部族聚落，承诺保留部族自治传统，共享燃素技术革新红利。在圣火祭祀仪式上，旅者与长老们共饮火山酒，以希巴拉克的誓约为证，确立「集权与自治平衡」的治理原则。这场拉拢不仅强化了威权主义的认同，更赢得了长老们的全力支持，让政府权威如熔岩般厚重，让纳塔的政令畅通无阻。"

 # 8. 清剿内部深渊邪教
 NAT_Clean_Up_Internal_Abyss_Cults:"清剿内部深渊邪教"
 NAT_Clean_Up_Internal_Abyss_Cults_desc:"深渊邪教徒如附骨之疽，在纳塔腹地散播黑暗教义，以荧光角菌为诱饵蛊惑子民，试图在夜神之国边缘打开裂隙。旅者启用情报机构与烟谜主祭司联合行动，循着谜烟的异常波动锁定邪教巢穴。战士们身披龙骨装甲，手持燃素喷射器，在灵谜涂鸦的净化加持下，将邪教徒一网打尽。这场清剿不仅强化了反谍能力，更让圣火的光芒驱散了内部的黑暗，让纳塔的稳定如缝影针封印般坚不可摧。"

 # 第二类：军事治安类（9-16）
 # 9. 举办全国决斗演武
 NAT_Hold_National_Duel_Martial_Arts:"举办全国决斗演武"
 NAT_Hold_National_Duel_Martial_Arts_desc:"荣花演武的鼓声回荡在赤色大地，六大部族的勇士齐聚圣火竞技场，演绎纳塔千年传承的决斗传统。旅者以火神之名主持赛事，回声之子提供燃素兵刃，花羽会搭建龙焰试炼场，烟谜主祭司以灵谜涂鸦守护公平。勇士们在竞技中磨砺技艺，在对决中传承古名精神，每一次兵刃交锋都迸发着战魂的光芒。这场演武不仅提升了军队的组织度，更让战技在切磋中精进，让纳塔的尚武精神如源火般炽烈，为对抗深渊储备了最锐利的锋芒。"

 # 10. 整编部族民兵武装
 NAT_Restruct_Tribal_Militia:"整编部族民兵武装"
 NAT_Restruct_Tribal_Militia_desc:"部族民兵如散落的火星，亟需凝聚成燎原之势。旅者遵循希巴拉克的治军之道，将沃陆之邦的农兵、悬木人的猎手、流泉之众的水手整编为正规民兵。回声之子为其配备燃素武器，花羽会传授侦查技巧，烟谜主祭司以灵谜涂鸦加持士气。整编后的民兵既能戍守乡土，又能支援正规军，人力储备如火山沃土般充盈，部队征召速度大幅提升。这些扎根部族的武装，成为纳塔防御体系的毛细血管，让深渊魔物再无渗透之机。"

 # 11. 构筑边境防御隘口
 NAT_Build_Border_Defense_Passes:"构筑边境防御隘口"
 NAT_Build_Border_Defense_Passes_desc:"烬寂海的深渊阴影逼近，边境防线亟需加固为铜墙铁壁。旅者调集全国人力物力，在踞石山、硫晶支脉等天险处构筑防御隘口：悬木人匠人以巨木与绳索搭建吊桥工事，回声之子用燃素与龙骨加固堡垒，烟谜主祭司以灵谜涂鸦布设预警符文。隘口内配备火焰火炮与燃素喷射器，形成层层递进的防御网，让边境 provinces 如铁桶般坚固。这场构筑不仅提升了陆军防御，更让入侵者陷入天堑绝境，为纳塔赢得了抵御深渊的战略缓冲。"

 # 12. 训练部族斥候部队
 NAT_Train_Tribal_Scout_Units:"训练部族斥候部队"
 NAT_Train_Tribal_Scout_Units_desc:"战场情报如燃素核心般关键，部族斥候需成为纳塔的「眼睛」与「耳朵」。旅者从花羽会与悬木人中选拔精锐，传授龙裔追踪技巧、燃素信号传递、灵谜涂鸦伪装等绝技。斥候们在烬寂海边缘历练，在火山群中穿梭，练就了超凡的侦查与潜行能力。训练后的斥候部队，侦查效率大幅提升，能精准捕捉深渊魔物的动向，为军队提供关键情报支持，让纳塔的战术部署如行云流水，始终占据战场主动。"

 # 13. 清缴跨境武装走私
 NAT_Crack_Down_Crossborder_Arms_Smuggling:"清缴跨境武装走私"
 NAT_Crack_Down_Crossborder_Arms_Smuggling_desc:"跨境走私的武装物资，如黑暗裂隙般侵蚀着纳塔的安全。走私者勾结深渊邪教，将违禁燃素武器与深渊矿石偷运入境，威胁边境稳定。旅者调动流泉之众的海军与烟谜主的情报网络，在海岸线与山道设伏，严查走私船只与商队。清缴行动中，不仅缴获了大量武装物资，更斩断了邪教的补给线，让武器可用性显著提升，反谍能力同步增强。这场整治让纳塔的边境管控如圣火般严密，让黑暗交易再无生存空间。"

 # 14. 推行全民军事训练
 NAT_Implement_Universal_Military_Training:"推行全民军事训练"
 NAT_Implement_Universal_Military_Training_desc:"深渊威胁迫在眉睫，全民皆兵方能铸就坚不可摧的防线。旅者颁布全民军事训练令，让纳塔子民无论男女老少，皆需接受基础军事训练：沃陆之邦传授近战技巧，回声之子讲解燃素武器使用，花羽会培训防空预警。训练以荣花演武为考核，以古名传承为激励，让尚武精神深植人心。这场推行不仅让人力储备大幅充盈，更让战支持续高涨，军队士气如火山喷发般炽热，让每一位纳塔人都成为守护家园的勇士。"

 # 15. 平定军阀割据势力
 NAT_Pacify_Warlord_Separatist_Forces:"平定军阀割据势力"
 NAT_Pacify_Warlord_Separatist_Forces_desc:"部分军阀妄图割据一方，在奥奇卡纳塔遗迹周边拥兵自重，切断燃素运输，扰乱国家统一。旅者以「万火归一」为旗帜，调集正规军与部族联军发起讨伐：花羽会的驭龙骑士空袭其营地，悬木人的山地部队封锁其退路，回声之子的燃素火炮摧毁其工事。这场平叛不仅恢复了中央对全境的管控，更强化了政府权威，让纳塔的统一如圣火般不可分割，让军阀割据的阴影在龙焰与源火中消散。"

 # 16. 升级军用装备制造线
 NAT_Upgrade_Military_Equipment_Lines:"升级军用装备制造线"
 NAT_Upgrade_Military_Equipment_Lines_desc:"传统军工生产线已难以应对深渊魔物的威胁，亟需注入燃素革新之力。旅者下令升级全国军工厂：回声之子引入古龙锻炉技术，将龙鳞与燃素融合锻造装甲；烟谜主祭司以灵谜涂鸦优化生产流程；流泉之众保障燃素原料运输。升级后的生产线能高效产出燃素武器、龙骨装甲等先进装备，装备生产速度大幅提升，工厂产能如源火般喷涌。这些革新后的军工力量，为纳塔军队打造了无坚不摧的钢铁利爪，让对抗深渊的底气愈发充足。"

 # 第三类：经济工业类（17-24）
 # 17. 开发部族传统矿产资源
 NAT_Develop_Tribal_Traditional_Minerals:"开发部族传统矿产资源"
 NAT_Develop_Tribal_Traditional_Minerals_desc:"纳塔的火山沃土之下，埋藏着丰富的钢铁、铬矿等战略资源，是燃素工业的根基。旅者组织各部族联合开发：沃陆之邦提供人力，悬木人搭建运输栈道，回声之子运用燃素采矿技术，烟谜主祭司以灵谜涂鸦勘探矿脉。开采出的矿产不仅满足了军工生产需求，更让工厂产能显著提升，为纳塔的工业化注入强劲动力。这些来自部族传统领地的资源，如圣火的燃料般，让纳塔的经济引擎持续轰鸣，为对抗深渊筑牢物质基础。"

 # 18. 修建部族间贸易商道
 NAT_Build_Inter_Tribal_Trade_Routes:"修建部族间贸易商道"
 NAT_Build_Inter_Tribal_Trade_Routes_desc:"部族间的贸易壁垒，如未连通的燃素管线般阻碍发展。旅者效仿流泉之众的通商传统，修建贯穿全境的贸易商道：悬木人在山地搭建藤桥，流泉之众疏浚河道，回声之子铺设燃素驱动的轨道。商道上，沃陆之邦的颗粒果、回声之子的燃素工艺品、流泉之众的水产互通有无，贸易效率大幅提升，民用物资消耗显著降低。这条连接各部族的经济纽带，让纳塔的资源配置更趋优化，让团结的种子在贸易往来中生根发芽。"

 # 19. 建立部族手工业合作社
 NAT_Establish_Tribal_Crafts_Cooperatives:"建立部族手工业合作社"
 NAT_Establish_Tribal_Crafts_Cooperatives_desc:"部族的传统手工业如散落的珍珠，亟需串联成璀璨的项链。旅者整合沃陆之邦的编织、回声之子的锻造、烟谜主的涂鸦等技艺，建立手工业合作社。合作社共享燃素工具与技术，统一标准与销售渠道，让传统工艺在协作中焕发新生。这些合作社不仅新增了民用工厂，更让子民收入提升，幸福感倍增，民用物资消耗进一步降低。来自部族的手工制品，既承载着纳塔的文化记忆，又成为经济发展的重要支柱。"

 # 20. 改革部族土地分配制度
 NAT_Reform_Tribal_Land_Allocation:"改革部族土地分配制度"
 NAT_Reform_Tribal_Land_Allocation_desc:"部族间的土地争端，如干涸的火渠般制约农业发展。旅者遵循希巴拉克的公平之策，重新划分土地：沃陆之邦获得肥沃的火山谷地，悬木人保有踞石山的林地，流泉之众拥有沿海的渔区。烟谜主祭司以灵谜涂鸦立下界碑，回声之子协助修建灌溉工程，让每一寸土地都得到充分利用。这场改革不仅提升了农业效率，更让粮食产量大幅增加，稳定了民心，让纳塔的民生根基如火山岩般坚实，为全民抗战提供了充足的食粮。"

 # 21. 引入外来工业技术投资
 NAT_Attract_Foreign_Industrial_Investment:"引入外来工业技术投资"
 NAT_Attract_Foreign_Industrial_Investment_desc:"纳塔的燃素工业亟需外来技术的助力，以突破发展瓶颈。旅者以燃素资源与市场为筹码，吸引提瓦特各国的工业投资：从璃月引入岩系防御工事技术，从须弥借鉴学术研究方法，从枫丹学习精密机械制造。外来投资不仅新增了军用工厂，更让工业产能显著提升，与各大国的关系也日益融洽。这场开放让纳塔的工业发展搭上快车，让燃素技术与外来革新碰撞出璀璨火花，为对抗深渊增添了更强劲的工业底气。"

 # 22. 规范部族商品交易市场
 NAT_Standardize_Tribal_Commodity_Markets:"规范部族商品交易市场"
 NAT_Standardize_Tribal_Commodity_Markets_desc:"部族市场的混乱交易，如紊乱的燃素能量般制约经济发展。旅者建立统一的商品交易规范：统一度量衡，制定公平价格，设立烟谜主祭司组成的监管机构。市场上，沃陆之邦的粮食、回声之子的武器、流泉之众的海产等商品有序流通，贸易效率大幅提升，民用物资消耗进一步降低。这场规范让纳塔的市场秩序如圣火般井然，让商业活力充分释放，让各部族在贸易中实现共赢，让团结的纽带愈发牢固。"

 # 23. 建设水利灌溉工程
 NAT_Construct_Irrigation_Projects:"建设水利灌溉工程"
 NAT_Construct_Irrigation_Projects_desc:"火山地带的干旱，如深渊侵蚀般威胁农业收成。旅者效仿流泉之众的治水智慧，组织全国力量建设水利工程：悬木人开凿山地水渠，流泉之众疏浚河道，回声之子以燃素动力驱动抽水机，烟谜主祭司以灵谜涂鸦祈福降雨。灌溉工程覆盖了沃陆之邦的所有农田，让火山沃土得到充分滋养，农业效率显著提升，粮食产量大幅增加。这些流淌的生命之水，不仅保障了民生，更稳定了民心，让纳塔的生计根基如夜神之国般稳固。"

 # 24. 发行部族统一流通货币
 NAT_Issue_Unified_Tribal_Currency:"发行部族统一流通货币"
 NAT_Issue_Unified_Tribal_Currency_desc:"部族间的以物易物，如未精炼的燃素般效率低下。旅者以燃素结晶为核心，发行统一的「火纹币」，以火神圣殿为发行中枢，设立烟谜主祭司组成的货币监管机构。统一货币在全国范围内流通，贸易往来无需再进行复杂兑换，经济稳定性显著提升，贸易效率与工厂产能同步增长。这枚镌刻着圣火图腾的货币，成为连接各部族的经济纽带，让纳塔的经济血脉畅通无阻，为工业化与抗战提供了坚实的金融支撑。"

 # 第四类：文化外交类（25-30）
 # 25. 编撰部族英雄史诗集
 NAT_Compile_Tribal_Heroic_Epics:"编撰部族英雄史诗集"
 NAT_Compile_Tribal_Heroic_Epics_desc:"纳塔的英雄事迹如璀璨星辰，亟需编纂成史诗永世传颂。旅者召集烟谜主的叙事人与花羽会的史官，走访各部族聚落，搜集希巴拉克屠龙、莉安歌射龙、特诺切抗渊等传奇故事。史诗以灵谜涂鸦为插图，以燃素刻印为装订，记录着纳塔人的勇气与坚守、团结与抗争。这部史诗不仅点燃了民族自豪感，更让古名传承的精神深入人心，让纳塔的文化认同如圣火般炽烈，成为凝聚全民意志的精神图腾。"

 # 26. 举办纳塔文化交流节
 NAT_Hold_Nata_Cultural_Exchange_Festival:"举办纳塔文化交流节"
 NAT_Hold_Nata_Cultural_Exchange_Festival_desc:"六大部族的文化如各异的火焰，亟需汇聚成「万火归一」的璀璨。旅者在源火城举办文化交流节：沃陆之邦展示颗粒果丰收舞，回声之子表演燃素锻造技艺，流泉之众演绎航船歌谣，烟谜主祭司现场创作灵谜涂鸦。各族子民在节庆中载歌载舞，分享传统、交流技艺，部族间的隔阂在欢声笑语中消融。这场盛会不仅提升了民族凝聚力，更让纳塔的文化魅力充分展现，让团结的种子在文化交融中生根发芽。"

 # 27. 与邻邦签署边境和平协定
 NAT_Sign_Border_Peace_Agreement_With_Neighbors:"与邻邦签署边境和平协定"
 NAT_Sign_Border_Peace_Agreement_With_Neighbors_desc:"边境的摩擦与猜忌，如深渊低语般侵蚀着外交关系。旅者以希巴拉克的和平理念为指引，派遣外交使团与邻邦谈判，以燃素工艺品与火山宝石为礼，承诺开放通商航道、共享深渊情报。在圣火的见证下，双方签署和平协定，划定明确边界，建立边境贸易区与联合防御机制。这份协定不仅修复了与邻邦的关系，更减轻了边境防御压力，让纳塔能集中力量对抗深渊，让和平的光芒照亮赤色大地。"

 # 28. 设立部族语言标准化机构
 NAT_Establish_Tribal_Language_Standardization_Body:"设立部族语言标准化机构"
 NAT_Establish_Tribal_Language_Standardization_Body_desc:"各部族的语言差异，如未统一的燃素符文般阻碍沟通。旅者设立语言标准化机构，召集六大部族的学者，以源火祭祀的通用语为基础，整合各部族方言，制定统一的纳塔语言规范。机构以灵谜涂鸦记录语法，以燃素刻印传播教材，让统一语言在全国范围内普及。这场标准化不仅提升了民族凝聚力，更让政令传达、文化交流更加顺畅，让纳塔的团结从语言开始，深入每一位子民的心中。"

 # 29. 派遣文化使团出访友邦
 NAT_Dispatch_Cultural_Missions_To_Friendly_Nations:"派遣文化使团出访友邦"
 NAT_Dispatch_Cultural_Missions_To_Friendly_Nations_desc:"纳塔的文化魅力如燃素火焰，亟需向提瓦特传播。旅者组建文化使团，携带英雄史诗集、燃素工艺品、灵谜涂鸦卷轴等珍贵礼物，出访提瓦特友好邦国。使团在异国他乡展示纳塔的决斗传统、人龙共生文化与燃素技术革新，让各国人民领略赤色大地的独特魅力。这场外交不仅提升了纳塔的国际影响力，更深化了与友邦的关系，为联合抗渊奠定了文化基础，让纳塔的名字在提瓦特各国间传颂。"

 # 30. 确立纳塔传统决斗为国家仪式
 NAT_Establish_Nata_Traditional_Duel_As_National_Ritual:"确立纳塔传统决斗为国家仪式"
 NAT_Establish_Nata_Traditional_Duel_As_National_Ritual_desc:"决斗是纳塔人刻入血脉的荣耀象征，是古名传承的核心载体，理应成为至高无上的国家仪式。旅者在圣火祭坛前颁布政令，将传统决斗纳入国家礼制：重大争端以决斗定分止争，英雄册封以决斗验其锋芒，归火圣夜以决斗维系深渊封印。仪式由烟谜主祭司主持，回声之子打造专属兵刃，花羽会搭建神圣竞技场，让决斗的每一个环节都充满神圣感与仪式感。这场确立不仅升华了民族精神，更让纳塔的核心文化永世传承，让「万火归一」的意志在决斗的荣光中愈发坚定。"



 # 1. 召集部族议会
 NAT_Event.1.t:"召集部族议会"
 NAT_Event.1.d:"赤红的火山熔岩映照着纳塔的大地，千百年来，散落的部族如星火般分布在这片燃烧的土地上。而今，深渊的阴影悄然蔓延，部族间的裂隙渐生，玛薇卡的火焰意志亟待凝聚。旅者决意召集所有部族的首领齐聚图兰圣城，在火神的注视下共商大计。是以温和的姿态倾听各部落的诉求，以火焰的包容弥合分歧，让纳塔的政治力量如熔岩般凝聚，稳固这片土地的根基；还是秉持强硬的立场，以绝对的权威划定规则，虽能强化统治，却可能让部分部族心生隔阂。每一个选择，都将牵动纳塔未来的走向，火焰的道路，从来都由抉择铸就。"
 NAT_Event.1.a:"以火焰包容，共商纳塔大计"
 NAT_Event.1.b:"以铁腕立规，凝聚统治权威"

 # 2. 拉拢军阀同盟
 NAT_Event.2.t:"拉拢军阀同盟"
 NAT_Event.2.d:"纳塔的荒原上，手握重兵的部族军阀如熔岩巨兽般盘踞一方，他们的铁骑踏过的土地，连草木都带着火焰的余温。深渊的威胁步步紧逼，单凭零散的部族之力难以抵御，旅者必须争取这些军阀的支持。是以外交的智慧许以利益，用真诚的盟约换取他们的信任，让纳塔的稳定如火山岩般坚固；还是以军事的绑定加深联结，许诺共享火焰附魔的军械与快速征兵的资源，虽能快速提升军队战力，却也需承担军阀野心膨胀的风险。火焰的同盟，要么如篝火般温暖，要么如野火般难控。"

 # 3. 安抚沃陆之邦
 NAT_Event.3.t:"安抚沃陆之邦"
 NAT_Event.3.d:"沃陆之邦是纳塔为数不多的丰饶之地，火山灰滋养的土地孕育着成片的粮田，部族的子民在此繁衍生息。近来，深渊的低语蛊惑着部分族人，粮田的收成渐减，民心浮动。旅者需以智慧安抚这片土地的子民：是兴修农坊，用充足的粮食与民生建设让沃陆之邦的火焰重归平和，让纳塔的后勤根基如大地般稳固；还是征召此地的壮丁，将沃陆之邦的守护意志化为边防的坚盾，虽能补充兵力、强化防御，却可能暂时损耗民生。火焰的温柔与刚猛，皆为守护这片土地的底色。"

 # 4. 争取回声之子
 NAT_Event.4.t:"争取回声之子"
 NAT_Event.4.d:"回声之子是纳塔最擅长锻造的部族，他们的工坊建在火山裂隙旁，每一次锤击都与大地的火焰共鸣，打造出的军械带着熔岩的力量。深渊的爪牙正试图拉拢这个部族，旅者必须抢先一步。是为他们扩建战争工坊，赠予充足的步兵装备，让他们的锻造之火为纳塔的军队燃烧；还是提升他们的锻造技艺，强化工业产能，让每一件出自回声之子的军械都如火神之矛般锋利。回声的火焰，要么化为冲锋的利刃，要么化为长久的工业根基。"

 # 5. 和解流泉之众
 NAT_Event.5.t:"和解流泉之众"
 NAT_Event.5.d:"流泉之众世代居住在纳塔的沿海地带，他们的船只穿梭于烬寂海的边缘，掌握着纳塔唯一的海上商路。因部族资源分配的分歧，他们与内陆部族的关系渐僵，海上贸易几近停滞。旅者需化解这份矛盾：是扩建海军工坊，提升贸易效率，让流泉之众的船只载着纳塔的火焰特产驶向提瓦特各地；还是修缮沿海基建，开采深海的石油资源，既稳固沿海防线，又能为纳塔的工业注入动力。流泉的温柔，与火焰的炽热相融，方能让纳塔的海路如熔岩河般畅通。"

 # 6. 联结悬木人
 NAT_Event.6.t:"联结悬木人"
 NAT_Event.6.d:"悬木人部族栖身于纳塔的火山森林，他们熟悉每一寸土地的脉络，擅长建造与机动作战，其部族的工程技艺能让熔岩旁的堡垒拔地而起。深渊的魔物正蚕食着火山森林的边界，悬木人的防御阵线摇摇欲坠。旅者决意联结这个部族：是助力他们提升建造速度，让纳塔的防御工事如古树般扎根大地，突破敌军防线的能力也随之增强；还是强化他们的机动装备生产，让悬木人的部队如火焰猎豹般迅捷，提升整体行军速度。悬木的坚韧，是纳塔机动与建造的基石。"

 # 7. 争取花羽会
 NAT_Event.7.t:"争取花羽会"
 NAT_Event.7.d:"花羽会是纳塔唯一掌握驭空之术的部族，他们与火焰巨龙缔结契约，驾驭着覆火的飞禽翱翔于纳塔的天空。深渊的魔物正试图污染巨龙的心智，花羽会的空中防线岌岌可危。旅者需争取他们的支持：是扩建航空工坊，积累空军经验，让花羽会的飞骑成为纳塔天空的火焰屏障；还是强化龙语驯服之术，提升空中攻击与制空权，让每一次俯冲都如火神的怒火降临。花羽的翅膀，承载着纳塔的天空，也承载着火焰的荣光。"

 # 8. 安抚烟谜主
 NAT_Event.8.t:"安抚烟谜主"
 NAT_Event.8.d:"烟谜主部族隐居于纳塔的火山迷雾之中，他们精通火焰幻术与情报刺探，是纳塔最神秘的情报力量。近来，深渊的间谍混入迷雾，烟谜主的情报网出现混乱，部族的信任也开始动摇。旅者需安抚这群掌握秘密的人：是提升他们的情报机构效率，强化反间谍能力，让迷雾成为纳塔的情报盾牌，隔绝一切外来窥探；还是借助他们的神秘学识，提升科研速度与间谍效率，让烟谜主的智慧如火焰般烧穿深渊的阴谋。迷雾中的火焰，虽无形，却能照见一切隐秘。"

 # 9. 调解部族边境争端
 NAT_Event.9.t:"调解部族边境争端"
 NAT_Event.9.d:"纳塔的边境地带，两个部族因火山矿脉的归属剑拔弩张，熔岩般的怒火在族人心中燃烧，冲突一触即发。深渊正伺机利用这份内乱，蚕食纳塔的土地。旅者作为火焰的执掌者，需出面调解：是以和平的斡旋平息纷争，用包容的姿态让部族重归和睦，降低战争疲惫，稳固纳塔的内部稳定；还是遵循纳塔的决斗传统，以一对一的荣誉决斗定夺归属，虽能提升战争支持度与军队经验，却也为纳塔的决斗文化立下新的先例。火焰的争端，要么以包容化解，要么以荣耀定分。"

 # 10. 订立烈火大契
 NAT_Event.10.t:"订立烈火大契"
 NAT_Event.10.d:"图兰圣城的火山祭坛前，熔岩如血般流淌，所有部族的首领皆汇聚于此。玛薇卡的火焰意志在空气中震颤，旅者决意以火神之名，订立贯穿纳塔所有部族的烈火大契。这份契约将以火焰为证，让散落的部族如星火汇聚成燎原之势，终结长久以来的分裂。当契约的火焰燃起，纳塔的政治力量将如熔岩般暴涨，统治权威也随之强化，稳定的根基在火焰的灼烧下愈发坚固。这是纳塔走向统一的第一步，每一个部族的誓言，都将融入这份属于火焰的契约之中。"

 # 11. 玛薇卡的意志宣言
 NAT_Event.11.t:"玛薇卡的意志宣言"
 NAT_Event.11.d:"赤红的披风猎猎作响，玛薇卡立于图兰圣城的最高处，火山的光芒映照着她的身影。深渊的阴影笼罩提瓦特，纳塔的部族仍在犹豫徘徊，旅者决意以火神之名发表意志宣言。是高呼火焰的抗争，点燃所有族人的爱国之心，让战争支持度如火山喷发般攀升，民族主义的火焰燃遍每一寸土地；还是秉持集权的立场，以强硬的姿态凝聚政治力量，强化威权统治，虽能快速整合资源，却需直面部分部族的质疑。玛薇卡的意志，便是纳塔的方向，火焰的道路，从不畏惧争议。"

 # 12. 改革部族议会
 NAT_Event.12.t:"改革部族议会"
 NAT_Event.12.d:"图兰圣城的议会大厅里，部族首领们的争论如火山岩浆般翻涌，旧有的议会制度早已无法适应纳塔统一的需求，效率低下的决策让火焰的力量迟迟无法凝聚。旅者决意推动议会改革：是精简议事流程，强化统治权威，让议会的决策如火焰般干脆利落，稳固纳塔的内部秩序；还是平衡各部族的利益，以政治妥协换取所有部族的支持，提升政治力量的同时，让议会成为真正代表纳塔所有声音的场所。议会的改革，是火焰从分散到凝聚的必经之路。"

 # 13. 强化火神权威
 NAT_Event.13.t:"强化火神权威"
 NAT_Event.13.d:"纳塔的土地上，仍有少数部族质疑玛薇卡的火焰意志，深渊的低语更是蛊惑着部分族人背弃火神的指引。旅者决意强化火神的绝对权威，让火焰的信仰成为纳塔唯一的核心。是以宗教与政治的双重手段，提升统治权威与政治力量，让每一个族人都铭记火神的恩泽；还是将火神的意志融入军队，提升陆军经验与攻击能力，让纳塔的军队成为火焰的化身，每一次冲锋都带着火神的祝福。火神的权威，要么扎根于信仰，要么彰显于武力。"

 # 14. 编订古名体系
 NAT_Event.14.t:"编订古名体系"
 NAT_Event.14.d:"纳塔的古籍中，记载着每个部族独有的火焰古名，那是火神赐予的印记，也是部族身份的象征。长久的分裂让古名体系混乱，年轻的族人甚至遗忘了自己部族的真名。旅者决意重新编订这份古名体系：是让每个族人重拾属于自己的火焰之名，唤醒民族认同与幸福感，让纳塔的文化如熔岩般厚重；还是将古名与军事征召绑定，以荣誉之名激励族人参军，提升征兵速度与战争支持度。古名的火焰，既是文化的传承，也是战力的源泉。"

 # 15. 镇压分离主义势力
 NAT_Event.15.t:"镇压分离主义势力"
 NAT_Event.15.d:"烬寂海边缘的部族受深渊蛊惑，妄图脱离纳塔的统一体系，自立为王，分离主义的野火如瘟疫般蔓延。这些势力不仅割裂纳塔的火焰根基，更成为深渊入侵的跳板。旅者决意铁腕镇压：是强化驻军效率，精简民用物资消耗，以严密的防御让分离势力无处遁形；还是以绝对的权威肃清叛乱，提升政治力量的同时，立下镇压分离主义的铁律。纳塔的火焰，容不得分裂的裂隙，每一次镇压，都是对统一的守护。"

 # 16. 纪念灾厄英雄
 NAT_Event.16.t:"纪念灾厄英雄"
 NAT_Event.16.d:"多年前的深渊灾厄中，无数纳塔勇士如飞蛾扑火般冲向魔物，用血肉之躯筑起火焰的防线，他们的名字被刻在火山岩壁上，却渐渐被时光掩埋。而今，深渊的威胁再次降临，旅者决意举办盛大的纪念仪式，缅怀这些灾厄英雄。是唤醒族人的爱国之心，让战争支持度如火焰般高涨，民族主义的情感凝聚成守护纳塔的力量；还是将英雄的精神融入军队，提升陆军经验，降低伤亡率，让每一个士兵都继承英雄的意志。英雄的火焰，永不熄灭。"

 # 17. 平反奥奇坎暴政冤案
 NAT_Event.17.t:"平反奥奇坎暴政冤案"
 NAT_Event.17.d:"奥奇坎部族曾因莫须有的叛乱罪名被镇压，数代人的冤屈如火山灰般积压在纳塔的土地上，部族的怨气让火焰的团结出现裂痕。深渊正利用这份怨恨挑拨离间，旅者决意揭开真相，为奥奇坎平反。是还部族以公道，让稳定与幸福感如熔岩般抚平伤痕，修复纳塔的内部和谐；还是以外交的姿态向全提瓦特宣告正义，提升外交权重与国际声望，让纳塔的火焰之名与公正相伴。冤案的平反，是火焰洗尽尘埃，重归纯粹的必经之路。"

 # 18. 建立决斗调解制度
 NAT_Event.18.t:"建立决斗调解制度"
 NAT_Event.18.d:"纳塔的决斗传统由来已久，却因缺乏规范，时常演变成部族间的血腥冲突。深渊正伺机利用无序的决斗制造内乱，旅者决意建立一套完整的决斗调解制度。这套制度将以火神的名义划定规则，让决斗从无意义的厮杀，变为解决争端的荣誉方式。是以此提升政治力量，降低战争疲惫，让部族间的矛盾在规则内化解；还是坚守荣誉的核心，提升战争支持度与稳定，让每一场决斗都成为火焰意志的彰显。决斗的规则，是纳塔秩序的火焰纹路。"

 # 19. 统一部族律法
 NAT_Event.19.t:"统一部族律法"
 NAT_Event.19.d:"千百年来，纳塔的各部族皆有自己的律法，有的严苛如火山熔岩，有的温和如流泉，律法的混乱让部族间的协作举步维艰。深渊的渗透让律法的漏洞被无限放大，旅者决意整合所有部族的律法，制定出统一的纳塔法典。是强化统治权威，让稳定的根基如火山岩般坚固，每一条律法都成为纳塔的屏障；还是兼顾经济发展，降低民用物资消耗，提升工厂产能，让律法成为工业与贸易的保障。统一的律法，是纳塔火焰凝聚的骨架。"

 # 20. 玛薇卡的纳塔誓言
 NAT_Event.20.t:"玛薇卡的纳塔誓言"
 NAT_Event.20.d:"火山喷发的轰鸣声中，玛薇卡站在图兰圣城的祭坛中央，高举燃烧的权杖，向所有纳塔族人许下誓言。她承诺将以火焰的意志守护这片土地，终结分裂，抵御深渊，让纳塔的名字响彻提瓦特。当誓言的火焰席卷大地，纳塔的稳定如熔岩般不可撼动，战争支持度暴涨，政治力量也达到前所未有的高度。这是属于火神的誓言，也是属于所有纳塔人的誓言，火焰的承诺，终将以行动兑现。"

 # 21. 探索图兰圣城
 NAT_Event.21.t:"探索图兰圣城"
 NAT_Event.21.d:"图兰圣城是纳塔最古老的遗迹，深埋于火山腹地，传说其中藏着火神遗留的火焰秘典与龙族的智慧。深渊的魔物正试图闯入圣城，窃取这份传承，旅者决意组织探险队深入其中。是发掘圣城的科技遗产，提升科研速度与工业效率，让古老的智慧化为现代的力量；还是与守护圣城的龙族建立联结，获得实验室与龙族的支持，让火焰与龙息相融，成为纳塔的新战力。图兰的秘密，是纳塔火焰的源头。"

 # 22. 研究燃素技术
 NAT_Event.22.t:"研究燃素技术"
 NAT_Event.22.d:"燃素是纳塔火山深处的核心能源，蕴含着纯粹的火焰元素力量，却因技术限制，始终未能被完全利用。深渊的机械魔物已开始觊觎这份能源，旅者决意投入资源研究燃素技术。是提升工厂产能与工业规模，让燃素成为纳塔民用与军用的核心动力，每一座工坊都因燃素而迸发活力；还是专攻军事应用，提升全装备生产效率，扩建战争工坊，让燃素的力量融入每一件军械。燃素的火焰，是纳塔工业的心脏。"

 # 23. 人龙关系政策
 NAT_Event.23.t:"人龙关系政策"
 NAT_Event.23.d:"龙族是纳塔的古老守护者，火焰巨龙的呼吸曾驱散无数深渊魔物，却因部分族人的猜忌，人龙关系日渐疏远。深渊正试图挑拨人龙对立，旅者决意制定全新的人龙关系政策。是以合作的姿态修复信任，让稳定的根基如熔岩与龙鳞般契合，提升与龙族的友好度；还是以监管的方式建立秩序，强化统治权威与驻军效率，虽能避免龙族失控，却需小心维系这份平衡。人龙的共生，是纳塔火焰长存的关键。"

 # 24. 守护源火之心
 NAT_Event.24.t:"守护源火之心"
 NAT_Event.24.d:"源火之心是纳塔火焰力量的核心，深埋于图兰火山的最深处，一旦被深渊污染，整个纳塔的火焰都将熄灭。近来，深渊裂隙在火山内部扩张，源火之心的屏障摇摇欲坠。旅者决意倾尽全力守护这份核心：是加固火山防御工事，提升陆地防御能力，让源火之心被层层堡垒守护；还是组建专属的源火守卫军，补充人力，让最忠诚的战士驻守火山腹地。源火的光芒，是纳塔永不熄灭的希望。"

 # 25. 建设元素熔炉
 NAT_Event.25.t:"建设元素熔炉"
 NAT_Event.25.d:"元素熔炉是纳塔独有的工业奇迹，能将火山的火焰元素转化为稳定的能源，为工坊与城市提供不竭动力。长久的忽视让熔炉破败不堪，纳塔的工业发展陷入停滞。旅者决意重建元素熔炉：是提升电力供应与民用工坊数量，让纳塔的民生与工业如火焰般复苏；还是强化工业效率与工厂产能，让每一座熔炉都能最大化转化火焰元素，成为工业升级的核心。元素熔炉的火焰，是纳塔工业化的基石。"

 # 26. 争取龙贤士的支持
 NAT_Event.26.t:"争取龙贤士的支持"
 NAT_Event.26.d:"龙贤士是龙族中掌握古老智慧的长者，他们知晓火焰元素的终极奥秘，也精通对抗深渊的秘术。深渊的魔法正试图侵蚀龙贤士的心智，旅者必须争取他们的支持。是借助他们的智慧提升科研速度，扩建实验室，让纳塔的科技如龙息般突破瓶颈；还是将龙贤士的秘术融入军队，提升陆军攻击能力与经验，让每一次冲锋都带着龙族的加持。龙贤士的智慧，是纳塔对抗深渊的利刃。"

 # 27. 镇压反龙极端派
 NAT_Event.27.t:"镇压反龙极端派"
 NAT_Event.27.d:"纳塔的反龙极端派视龙族为威胁，他们烧毁龙巢，袭击龙裔，试图彻底驱逐龙族，这份狂热的执念正成为深渊的棋子。极端派的活动让纳塔的内部秩序混乱，旅者决意铁腕镇压。是平息冲突，稳固内部稳定，修复与龙族的关系，让火焰与龙息重归和谐；还是以强硬手段肃清极端派，提升政治力量与统治权威，虽能快速解决问题，却需安抚龙族的情绪。反龙的野火，必须被火焰的秩序熄灭。"

 # 28. 修复古龙锻坊
 NAT_Event.28.t:"修复古龙锻坊"
 NAT_Event.28.d:"古龙锻坊是龙族与纳塔先民共同建造的奇迹，每一件出自此处的军械都蕴含龙焰的力量，却因岁月侵蚀与深渊破坏，锻坊早已沦为废墟。旅者决意修复这份传承：是扩建战争工坊，提升步兵装备品质，让古龙锻坊重新锻造出能撕裂深渊的利刃；还是补充装甲装备库存，提升装甲战力，让龙焰加持的装甲成为纳塔陆军的坚盾。古龙锻坊的锤声，是纳塔战力复苏的号角。"

 # 29. 封印火山深渊裂隙
 NAT_Event.29.t:"封印火山深渊裂隙"
 NAT_Event.29.d:"图兰火山的腹地出现了巨大的深渊裂隙，黑色的瘴气不断涌出，魔物如潮水般涌入纳塔，火山的火焰都被瘴气遮蔽。旅者决意集结所有部族的力量，封印这份裂隙。是强化陆地防御，降低战争疲惫，让封印的屏障如火山岩般坚固，隔绝深渊的侵蚀；还是以火焰的信仰凝聚民心，提升稳定与民族主义，让每一个族人都成为封印的守护者。裂隙的封印，是纳塔守护家园的第一战。"

 # 30. 掌握秘源技术
 NAT_Event.30.t:"掌握秘源技术"
 NAT_Event.31.t:"建立决斗法典"
 NAT_Event.30.d:"秘源技术是纳塔古籍中记载的终极火焰科技，能从深渊裂隙的边缘提取纯净的元素能量，却因风险极高，始终无人敢深入研究。而今深渊的威胁迫在眉睫，旅者决意突破禁忌，掌握这份技术。是提升科研速度与工业效率，让秘源技术成为纳塔工业升级的核心，火焰的力量如涌泉般迸发；还是专攻军事应用，提升核科研与军事科技速度，让秘源技术成为对抗深渊的终极武器。秘源的火焰，是纳塔最后的底牌。"

 # 31. 建立决斗法典
 NAT_Event.31.t:"建立决斗法典"
 NAT_Event.31.d:"纳塔的决斗文化虽热血，却因无典可依，时常沦为野心家的工具，部族间的决斗死伤渐增，深渊的间谍更是借机挑唆。旅者决意编纂一部完整的决斗法典，以火神的意志划定荣誉、规则与底线。是让法典成为秩序的基石，提升稳定与政治力量，让每一场决斗都服务于纳塔的统一；还是强化决斗的军事属性，提升战争支持度与陆军经验，让决斗成为士兵磨砺战力的方式。决斗法典，是纳塔荣誉的火焰章程。"

 # 32. 修建神圣决斗竞技场
 NAT_Event.32.t:"修建神圣决斗竞技场"
 NAT_Event.32.d:"在图兰圣城的中心，旅者决意修建一座神圣决斗竞技场，让所有部族的决斗都在此进行，接受火神的见证。这座竞技场将以火山岩为基，火焰元素为饰，成为纳塔荣誉的象征。是提升建造速度，扩建民用工坊，让竞技场成为纳塔的地标，也带动周边民生发展；还是强化文化认同，提升全民幸福感与民族主义，让每一场决斗都成为凝聚民心的仪式。竞技场的火焰，是纳塔荣誉的舞台。"

 # 33. 举办荣花演武
 NAT_Event.33.t:"举办荣花演武"
 NAT_Event.33.d:"荣花演武是纳塔最盛大的决斗盛会，每一次举办都能让部族的勇士齐聚一堂，火焰的热血在竞技中凝聚。而今深渊压境，旅者决意重启这份传统，以演武唤醒纳塔的斗志。是让演武成为军队磨砺的战场，提升陆军经验与战争支持度，每一个勇士都能在竞技中习得实战技巧；还是选拔演武冠军，提升陆地攻击与经验获取速度，让冠军的意志成为全军的榜样。荣花的火焰，是纳塔勇士的勋章。"

 # 34. 规范荣誉决斗规则
 NAT_Event.34.t:"规范荣誉决斗规则"
 NAT_Event.34.d:"纳塔的荣誉决斗本是解决争端的神圣方式，却因部分部族擅自修改规则，变得血腥且无序，甚至出现故意致残的卑劣手段。深渊正利用这些漏洞制造部族仇恨，旅者决意重新规范决斗规则。是强化统治权威，稳固内部稳定，让规则如火焰的边界般清晰；还是以规则化解争端，降低战争疲惫，提升政治力量，让决斗回归荣誉的本质。规则的规范，是纳塔决斗文化的火焰准绳。"

 # 35. 建立决斗冠军体系
 NAT_Event.35.t:"建立决斗冠军体系"
 NAT_Event.35.d:"在规范的决斗规则之上，旅者决意建立一套完整的决斗冠军体系，为每一届的决斗胜者赋予火神认可的荣誉与地位。冠军将成为纳塔的英雄，他们的名字将被刻在火山岩壁上，激励所有族人。是让冠军的战力融入军队，提升陆地攻击与经验获取速度，让每一个士兵都以冠军为目标；还是以冠军凝聚民心，提升战争支持度与民族主义，让冠军成为纳塔精神的象征。冠军的火焰，是纳塔战力的旗帜。"

 # 36. 决斗训练营体系
 NAT_Event.36.t:"决斗训练营体系"
 NAT_Event.36.d:"纳塔的勇士虽天生好斗，却缺乏系统的决斗训练，面对深渊魔物的诡谲战术，时常陷入被动。旅者决意建立遍布各部族的决斗训练营体系，让每一个族人都能习得正统的决斗技巧。是提升征兵速度与人力储备，让训练营成为军队的兵源库，每一个新兵都具备基础的决斗能力；还是强化防御与驻军效率，让训练营的勇士成为边境的坚盾，抵御深渊的突袭。训练营的火焰，是纳塔战力的根基。"

 # 37. 举办归火圣夜巡礼
 NAT_Event.37.t:"举办归火圣夜巡礼"
 NAT_Event.37.d:"归火圣夜是纳塔最神圣的节日，每年此时，所有部族都会举着火把环绕图兰火山巡礼，纪念火神赐予火焰的恩典。深渊的威胁让这份传统中断多年，旅者决意重启归火圣夜巡礼。是让巡礼点燃族人的爱国之心，民族主义与战争支持度如火山喷发般高涨；还是以巡礼抚平族人的焦虑，提升稳定与幸福感，让火焰的信仰成为心灵的慰藉。归火的圣夜，是纳塔精神的回归。"

 # 38. 以决斗解决部族冲突
 NAT_Event.38.t:"以决斗解决部族冲突"
 NAT_Event.38.d:"两个部族因火山矿场的归属再次爆发冲突，战士们的刀剑已出鞘，火焰般的怒火随时可能引发内战。深渊的魔物正潜伏在战场边缘，等待内乱的爆发。旅者决意遵循纳塔的传统，以一对一的荣誉决斗解决这场冲突。是让决斗平息纷争，提升稳定与部族友好度，让火焰的团结重归这片土地；还是让决斗磨砺军队，提升陆军经验与战争支持度，让每一场决斗都成为战力的试炼。决斗的荣誉，是纳塔和平的火焰桥梁。"

 # 39. 为决斗勇士赋予火焰祝福
 NAT_Event.39.t:"为决斗勇士赋予火焰祝福"
 NAT_Event.39.d:"即将代表纳塔迎战深渊先锋的决斗勇士们，正站在火山祭坛前，等待火神的祝福。这些勇士将以一己之力挑战深渊的魔物首领，他们的胜负关乎纳塔的尊严。旅者决意以火焰的力量为他们加持：是扩建战争工坊，补充机动装备库存，让勇士的军械如火焰般锋利；还是提升装备品质与陆地攻击能力，让火神的祝福融入每一次挥剑，撕裂深渊的防御。勇士的火焰，是纳塔的第一道防线。"

 # 40. 英雄的终极决斗
 NAT_Event.40.t:"英雄的终极决斗"
 NAT_Event.40.d:"深渊的大将亲自降临纳塔的土地，他的黑暗力量让火山的火焰都为之黯淡，无数族人在魔物的攻势下倒下。纳塔的第一勇士挺身而出，决意与深渊大将展开终极决斗，这场决斗的胜负，将决定纳塔的生死。当勇士的剑与深渊的利爪碰撞，火焰的光芒撕裂黑暗，陆军攻击能力暴涨，战争支持度达到顶峰，陆军经验也在这场史诗决斗中飞速提升。这是属于纳塔英雄的时刻，火焰的荣耀，终将战胜深渊的黑暗。"

 # 41. 推广纳塔民族认同
 NAT_Event.41.t:"推广纳塔民族认同"
 NAT_Event.41.d:"长久的部族分裂让纳塔的族人只知自己的部族，不知纳塔的整体，深渊正是利用这份割裂，逐个蚕食部族的土地。旅者决意发起一场全民的民族认同推广运动，让每一个族人都铭记自己是纳塔人。是唤醒民族主义情感，稳固内部稳定，让火焰的认同成为联结所有部族的纽带；还是以政治手段强化认同，提升政治力量与统治权威，让纳塔的名字成为唯一的信仰。民族的认同，是纳塔统一的火焰基石。"

 # 42. 整合部族资源体系
 NAT_Event.42.t:"整合部族资源体系"
 NAT_Event.42.d:"纳塔的各部族皆有专属的资源优势：有的掌控钢铁矿脉，有的垄断石油产区，却因各自为战，资源无法高效利用，工业发展陷入瓶颈。深渊的封锁让资源短缺的问题愈发严重，旅者决意整合所有部族的资源体系。是统一调配钢铁与石油资源，让每一份资源都用在刀刃上，支撑纳塔的工业与军事；还是提升工业效率与工厂产能，让资源的转化效率最大化，火焰的工业如熔岩般运转。资源的整合，是纳塔强大的火焰燃料。"

 # 43. 统一部族军事力量
 NAT_Event.43.t:"统一部族军事力量"
 NAT_Event.43.d:"纳塔的各部族都有自己的军队，战术与装备各不相同，面对深渊的大规模进攻，分散的军力如星火般易灭。旅者决意打破部族壁垒，统一所有军事力量，组建一支属于纳塔的正规军。是提升军队攻击能力与征兵速度，让统一的军队如熔岩洪流般碾压敌人；还是强化军队经验与经验获取速度，让每一个士兵都能在实战中快速成长。军事的统一，是纳塔抵御深渊的火焰利刃。"

 # 44. 忠诚部族的自治政策
 NAT_Event.44.t:"忠诚部族的自治政策"
 NAT_Event.44.d:"那些始终坚守火焰信仰、忠诚于纳塔统一的部族，在长久的战争中付出了巨大代价，却因集权管理，发展受到限制。旅者决意制定专属的自治政策，回馈这些忠诚的部族。是赋予更多自治权，提升稳定与幸福感，让忠诚的火焰愈发炽热；还是扶持部族的工业发展，扩建民用工坊，提升建造速度，让忠诚部族成为纳塔的经济支柱。自治的政策，是纳塔团结的火焰纽带。"

 # 45. 建立统一税收体系
 NAT_Event.45.t:"建立统一税收体系"
 NAT_Event.45.d:"纳塔的各部族曾按自己的规则征税，有的重税压得族人喘不过气，有的轻税让部族财政空虚，税收的混乱让纳塔的财政体系濒临崩溃。深渊的经济封锁更是雪上加霜，旅者决意建立统一的税收体系。是优化税收结构，提升工厂产能，降低民用物资消耗，让税收成为工业发展的助力；还是强化税收权威，提升统治力与政治力量，让每一份税收都能支撑纳塔的统一大业。统一的税收，是纳塔运转的火焰血液。"

 # 46. 镇压叛乱部族长老
 NAT_Event.46.t:"镇压叛乱部族长老"
 NAT_Event.46.d:"部分部族的长老被深渊蛊惑，暗中勾结魔物，试图发动叛乱，分裂纳塔的统一阵线。这些长老曾是部族的领袖，他们的背叛让火焰的团结出现致命裂痕。旅者决意铁腕镇压这场叛乱：是肃清叛乱核心，提升统治权威与政治力量，让叛乱的野火无处蔓延；还是强化驻军效率与陆地防御，让边境的堡垒成为镇压叛乱的坚盾，防止深渊趁机入侵。长老的叛乱，必须被火焰的正义扑灭。"

 # 47. 统一文化教育体系
 NAT_Event.47.t:"统一文化教育体系"
 NAT_Event.47.d:"纳塔的各部族有着不同的文化传承，有的崇尚决斗，有的敬畏龙族，却因缺乏统一的教育，年轻族人对纳塔的整体认同日渐淡薄。深渊的文化渗透让部分族人背弃火焰信仰，旅者决意建立统一的文化教育体系。是融合各部族的文化精华，提升科研速度与文化影响力，让纳塔的火焰文化走向提瓦特；还是强化民族主义，稳固内部稳定，让每一个孩子都铭记自己是纳塔的火焰之子。文化的统一，是纳塔精神的火焰根基。"

 # 48. 制定纳塔统一律法
 NAT_Event.48.t:"制定纳塔统一律法"
 NAT_Event.48.d:"在整合部族律法的基础上，旅者决意制定一部真正属于纳塔的统一律法，这部律法将涵盖民生、军事、外交、工业等所有领域，成为纳塔运转的根本准则。律法的每一条款都将以火神的名义立下，火焰的公正将照耀每一个族人。是强化律法的权威，提升稳定与统治力，让纳塔的秩序如火山岩般坚固；还是兼顾经济发展，降低民用物资消耗，提升贸易效率，让律法成为繁荣的保障。统一的律法，是纳塔文明的火焰骨架。"

 # 49. 整合部族护卫力量
 NAT_Event.49.t:"整合部族护卫力量"
 NAT_Event.49.d:"纳塔的各部族都有自己的护卫队，负责守护部族的领地，却因分散部署，无法形成有效的联防体系，深渊的小股魔物时常趁虚而入。旅者决意整合所有部族的护卫力量，组建一支统一的纳塔护卫军。是强化驻军效率与陆地防御，让护卫军成为边境的移动堡垒，抵御深渊的突袭；还是补充人力与征兵速度，让护卫军的规模如火焰般壮大，覆盖每一寸纳塔的土地。护卫的整合，是纳塔内部安全的火焰屏障。"

 # 50. 全部族统一宣言
 NAT_Event.50.t:"全部族统一宣言"
 NAT_Event.50.d:"图兰圣城的火山广场上，所有部族的首领共同举起燃烧的火炬，在玛薇卡的见证下，发表纳塔全部族统一宣言。这份宣言终结了千百年来的部族分裂，宣告纳塔作为一个统一的国家屹立于提瓦特。当宣言的声音响彻火山，纳塔的稳定如熔岩般不可撼动，政治力量暴涨，人力储备与战争支持度达到前所未有的高度。这是纳塔历史的转折点，火焰的团结，终将让这片土地重归荣光。"

 # 51. 建立燃素武器研究所
 NAT_Event.51.t:"建立燃素武器研究所"
 NAT_Event.51.d:"燃素的力量虽已被初步利用，却始终未能转化为专属的武器，面对深渊的魔法魔物，常规军械的效果日渐式微。旅者决意建立专门的燃素武器研究所，专攻火焰元素武器的研发。是提升陆战武器科研速度，强化火炮装备品质，让燃素火炮的威力撕裂深渊的防御；还是扩建战争工坊，提升工业产能，让燃素武器能大规模量产，装备每一支军队。研究所的火焰，是纳塔军事科技的突破。"

 # 52. 扩建火焰附魔锻坊
 NAT_Event.52.t:"扩建火焰附魔锻坊"
 NAT_Event.52.d:"火焰附魔是纳塔独有的锻造技艺，能将火山的火焰元素融入军械，让刀剑拥有灼烧深渊魔物的力量。但现有的锻坊规模有限，无法满足全军的装备需求。旅者决意扩建火焰附魔锻坊，让这份技艺惠及所有士兵。是提升战争工坊数量与步兵装备生产效率，让每一个士兵都能手持附魔军械；还是强化装备品质与工厂产能，让附魔的效果最大化，每一件军械都能发挥极致战力。锻坊的火焰，是纳塔军械的灵魂。"

 # 53. 研发龙骨装甲
 NAT_Event.53.t:"研发龙骨装甲"
 NAT_Event.53.d:"龙族的骨骼蕴含着抵御深渊侵蚀的天然力量，是制造重型装甲的最佳材料。面对深渊魔物的重型冲击，纳塔现有的装甲不堪一击，旅者决意研发以龙骨为核心的新式装甲。是提升装甲防护能力，补充重型坦克装备库存，让龙骨装甲成为陆军的移动堡垒；还是强化装甲攻击能力与突破能力，让龙骨装甲的主炮如龙息般摧毁一切障碍。龙骨的坚韧，是纳塔装甲的核心。"

 # 54. 扩建火山工业区
 NAT_Event.54.t:"扩建火山工业区"
 NAT_Event.54.d:"图兰火山周边的工业区是纳塔的工业核心，却因规模有限，无法支撑统一后的纳塔工业需求，火焰元素的转化效率也亟待提升。旅者决意大规模扩建火山工业区，让这片土地成为纳塔的工业心脏。是增加民用工坊数量，提升工业效率，让工业区的产能如火山喷发般暴涨；还是修缮火山周边基建，提升建造速度，为后续的工业升级打下基础。工业区的火焰，是纳塔经济的引擎。"

 # 55. 革新机动战术
 NAT_Event.55.t:"革新机动战术"
 NAT_Event.55.d:"纳塔的军队仍沿用传统的阵地战术，面对深渊魔物的高速突袭，时常陷入被动，机动能力的不足让战机屡屡错失。旅者决意联合部族的军事将领，革新机动战术体系。是提升部队突破能力，加快机动战学说进度，让军队如火焰猎豹般穿插敌军防线；还是强化部队速度与机动装备生产效率，让每一支军队都能快速部署，掌握战场主动权。战术的革新，是纳塔陆军的蜕变。"

 # 56. 研发火焰火炮
 NAT_Event.56.t:"研发火焰火炮"
 NAT_Event.56.d:"常规火炮对深渊魔物的杀伤有限，而火焰元素能灼烧魔物的黑暗内核，旅者决意研发以火焰为弹药的新式火炮。这种火炮将火山熔岩作为炮弹，落地后能形成大范围的火焰灼烧区。是补充火炮装备库存，提升陆地攻击能力，让火焰火炮成为战场的核心火力；还是提升火炮生产效率，扩建战争工坊，让火焰火炮能覆盖每一条战线。火焰火炮的轰鸣，是深渊魔物的丧钟。"

 # 57. 建设海军锻坊
 NAT_Event.57.t:"建设海军锻坊"
 NAT_Event.57.d:"烬寂海的深渊魔物日益猖獗，纳塔的海军装备老旧，无法抵御魔物的海上突袭，沿海的贸易与防御都陷入危机。旅者决意建设专属的海军锻坊，研发火焰加持的海军装备。是扩建海军工坊，提升海军攻击能力，让火焰战舰成为烬寂海的守护者；还是修建海军基地，补充海军工坊数量，让纳塔的海军能长期驻守沿海，形成严密的防御网。海军锻坊的火焰，是纳塔海权的保障。"

 # 58. 扩建航空工业
 NAT_Event.58.t:"扩建航空工业"
 NAT_Event.58.d:"纳塔的航空工业起步较晚，面对深渊的空中魔物，花羽会的飞骑独木难支，制空权的缺失让地面部队屡屡遭受空袭。旅者决意大规模扩建航空工业，打造一支属于纳塔的空军。是增加航空工坊数量，提升空中攻击能力，让火焰战机成为天空的主宰；还是积累空军经验，提升航空科技科研速度，让纳塔的空军技术追上提瓦特的顶尖水平。航空工业的火焰，是纳塔制空权的基石。"

 # 59. 精锐火焰战士训练
 NAT_Event.59.t:"精锐火焰战士训练"
 NAT_Event.59.d:"面对深渊的精英魔物，普通士兵的战力已难以应对，旅者决意选拔最优秀的勇士，开展精锐火焰战士特训。这些战士将学习龙族的战斗技巧，掌握火焰元素的运用，成为对抗深渊的尖刀。是提升陆军经验与特种部队上限，让精锐战士成为战场的奇兵；还是强化陆地攻击能力，降低伤亡率，让每一个精锐战士都能以一敌百。精锐战士的火焰，是纳塔战力的巅峰。"

 # 60. 军事工业现代化
 NAT_Event.60.t:"军事工业现代化"
 NAT_Event.60.d:"纳塔的军事工业仍停留在传统锻造阶段，效率低下，无法满足大规模战争的装备需求，与提瓦特其他国家的现代化军工差距渐大。旅者决意推动军事工业全面现代化，引入须弥的工业技术，融合纳塔的火焰元素。是扩建战争工坊，提升工业效率，让现代化的生产线如火焰般运转；还是提升工厂生产速度与产能，让每一件军械的生产都能高效完成。军工的现代化，是纳塔强军的核心。"

 # 61. 调查深渊渗透
 NAT_Event.61.t:"调查深渊渗透"
 NAT_Event.61.d:"纳塔的内部出现了大量深渊间谍，他们伪装成族人，渗透进议会、工坊、军队等核心领域，窃取情报，制造混乱。旅者决意启动最高级别的调查行动，揪出所有深渊间谍。是强化反间谍能力与情报机构效率，让每一个间谍都无处遁形；还是以政治手段整合资源，提升政治力量与统治权威，为调查行动扫清一切障碍。调查的火焰，将烧尽深渊的渗透网络。"

 # 62. 强化夜神国度防护
 NAT_Event.62.t:"强化夜神国度防护"
 NAT_Event.62.d:"夜神国度是纳塔的隐秘领地，与火焰的力量相生相克，也是抵御深渊暗影的最后屏障。近来，深渊的暗影力量开始侵蚀这片领地，防护结界日渐薄弱。旅者决意强化夜神国度的防护体系：是稳固内部稳定，提升民族主义，让夜神的信仰与火神的意志相融，强化结界；还是提升战争支持度与幸福感，让守护夜神国度的族人充满斗志，抵御暗影的侵蚀。夜神的防护，是纳塔的最后一道防线。"

 # 63. 清剿深渊邪教势力
 NAT_Event.63.t:"清剿深渊邪教势力"
 NAT_Event.63.d:"深渊邪教在纳塔的偏远部族中悄然滋生，他们蛊惑族人背弃火神，崇拜深渊的黑暗力量，甚至举行血腥的献祭仪式。这些邪教成为深渊入侵的温床，旅者决意全面清剿。是强化统治权威与驻军效率，让清剿部队如火焰般扫荡每一个邪教据点；还是稳固内部稳定，降低战争疲惫，让族人认清邪教的真面目，自发抵制深渊的蛊惑。邪教的黑暗，必须被火焰的光明驱散。"

 # 64. 烬寂海的阴影
 NAT_Event.64.t:"烬寂海的阴影"
 NAT_Event.64.d:"烬寂海的海面泛起黑色的瘴气，深渊的巨型魔物潜伏在海底，不时袭击纳塔的沿海村落，阴影般的威胁让沿海族人惶惶不可终日。旅者决意应对这份来自海洋的危机：是加固沿海防御工事，提升陆地防御能力，让堡垒成为抵御魔物的坚盾；还是强化情报机构效率，提升对深渊的间谍能力，摸清魔物的动向，提前布局防御。烬寂海的阴影，是纳塔海防的最大挑战。"

 # 65. 召开抗深渊战争会议
 NAT_Event.65.t:"召开抗深渊战争会议"
 NAT_Event.65.d:"深渊的大规模入侵已箭在弦上，纳塔的军队、部族、龙族都需协同作战，却因缺乏统一的指挥，备战进度混乱。旅者决意召集所有军事将领、部族首领与龙贤士，召开抗深渊战争会议。是凝聚民心，提升战争支持度与政治力量，让所有力量都为抗深渊而集结；还是统一军事部署，提升陆军经验与攻击能力，制定出精准的作战计划。战争会议的火焰，是纳塔抗深渊的指挥核心。"

 # 66. 联合龙族抗渊同盟
 NAT_Event.66.t:"联合龙族抗渊同盟"
 NAT_Event.66.d:"龙族是纳塔对抗深渊的天然盟友，火焰巨龙的力量能轻易撕裂深渊的防线，旅者决意与龙族正式缔结抗深渊同盟，让人与龙并肩作战。是让同盟强化陆军攻击能力与经验，龙息与火焰军械相融，形成双重打击；还是借助龙族的古老智慧，提升科研速度，扩建实验室，研发出针对性的抗深渊技术。同盟的火焰，是纳塔战胜深渊的关键。"

 # 67. 修复缝影针封印
 NAT_Event.67.t:"修复缝影针封印"
 NAT_Event.67.d:"缝影针是纳塔封印深渊裂隙的上古神器，因岁月侵蚀，封印的力量日渐衰弱，深渊的魔物正从裂隙中源源不断涌出。旅者决意集结所有的元素大师与龙贤士，修复这份关键封印。是强化陆地防御能力，降低战争疲惫，让修复后的封印能长久抵御深渊侵蚀；还是稳固内部稳定，提升民族主义，让每一个族人都参与到封印的守护中。缝影针的光芒，是纳塔封印深渊的希望。"

 # 68. 研发抗深渊技术
 NAT_Event.68.t:"研发抗深渊技术"
 NAT_Event.68.d:"深渊的黑暗魔法能腐蚀军械、削弱士兵的战力，常规的军事技术已难以应对，旅者决意组建专项团队，研发专属的抗深渊技术。是提升军事科技科研速度，降低军队伤亡率，让抗深渊技术保护每一个士兵；还是扩建战争工坊，提升装备生产效率，让抗深渊装备能快速装备全军。抗深渊技术的火焰，是纳塔战力的护盾。"

 # 69. 灾厄英雄纪念碑
 NAT_Event.69.t:"灾厄英雄纪念碑"
 NAT_Event.69.d:"在抗深渊的战斗中，无数纳塔勇士献出了生命，他们的牺牲如火焰般照亮了胜利的道路。旅者决意在图兰圣城修建一座灾厄英雄纪念碑，永久缅怀这些英雄。是让纪念碑唤醒民族主义与幸福感，让英雄的精神成为纳塔的信仰；还是让英雄的意志融入军队，提升战争支持度与陆军经验，让每一个士兵都继承英雄的斗志。纪念碑的火焰，是纳塔永不磨灭的记忆。"

 # 70. 玛薇卡的焚渊誓言
 NAT_Event.70.t:"玛薇卡的焚渊誓言"
 NAT_Event.70.d:"火山的顶峰，玛薇卡高举火神权杖，火焰的力量席卷整个纳塔，她向天地许下焚渊誓言：将以火焰的全部力量，彻底焚烧深渊的黑暗，守护纳塔的每一寸土地。当誓言落下，纳塔的陆军攻击能力暴涨，战争支持度达到顶峰，统治权威也随之强化。这是火神的誓言，也是纳塔的宣战书，火焰的怒火，终将烧尽深渊的一切。"

 # 71. 万火归一
 NAT_Event.71.t:"万火归一"
 NAT_Event.71.d:"玛薇卡的焚渊誓言点燃了所有纳塔人的火焰意志，各部族的火焰、龙族的龙息、元素熔炉的能源、勇士手中的附魔之火，所有的火焰力量汇聚成一股，如燎原之势席卷纳塔。这份“万火归一”的力量，让全民的幸福感达到顶峰，内部稳定如熔岩般不可撼动。这是纳塔火焰力量的终极凝聚，也是对抗深渊的最强底气。"

 # 72. 与璃月建立外交关系
 NAT_Event.72.t:"与璃月建立外交关系"
 NAT_Event.72.d:"璃月是提瓦特最繁华的商贸国度，拥有纳塔急需的工业技术与资源，旅者决意打破长久的隔绝，与璃月正式建立外交关系。是提升与璃月的友好度，强化贸易效率，让纳塔的火焰特产与璃月的矿石、摩拉互通有无；还是深化贸易合作，补充钢铁资源，让贸易成为纳塔工业发展的助力。外交的火焰，是纳塔走向提瓦特的第一步。"

 # 73. 提瓦特火焰外交倡议
 NAT_Event.73.t:"提瓦特火焰外交倡议"
 NAT_Event.73.d:"纳塔的统一与抗深渊的决心，让提瓦特各国重新审视这片燃烧的土地。旅者决意发起“提瓦特火焰外交倡议”，以火焰的包容与力量，联结提瓦特的所有国家。是提升与各国的友好度，强化外交权重，让纳塔成为提瓦特外交的重要力量；还是传播纳塔的火焰文化，提升文化影响力与民族主义，让火焰的信仰走向整个提瓦特。外交倡议的火焰，是纳塔国际地位的提升。"

 # 74. 与蒙德、稻妻结盟
 NAT_Event.74.t:"与蒙德、稻妻结盟"
 NAT_Event.74.d:"蒙德的风之力量能助力纳塔的空军，稻妻的雷之军械能强化纳塔的海军，旅者决意与这两个国家缔结抗深渊同盟，形成提瓦特的三方战力。是提升与蒙德、稻妻的友好度，让同盟的纽带更加牢固；还是强化海军与空军的攻击能力，让风、雷、火三元素的力量相融，形成无敌的联军。同盟的火焰，是提瓦特抗深渊的核心。"

 # 75. 须弥学术与工业合作
 NAT_Event.75.t:"须弥学术与工业合作"
 NAT_Event.75.d:"须弥是提瓦特的学术中心，拥有最先进的工业理论与科研体系，旅者决意与须弥达成学术与工业的深度合作。是借助须弥的智慧提升科研速度，强化与须弥的友好度，让纳塔的火焰技术与须弥的理论相融；还是扩建实验室，提升工业效率，让合作的成果转化为实际的工业产能。合作的火焰，是纳塔科技升级的阶梯。"

 # 76. 建立永恒火焰军团
 NAT_Event.76.t:"建立永恒火焰军团"
 NAT_Event.76.d:"在抗深渊的战争中，纳塔需要一支精锐的常备军，旅者决意组建“永恒火焰军团”，这支军团将由最优秀的火焰战士组成，装备最先进的燃素军械与龙骨装甲，成为纳塔的核心战力。是提升征兵速度与人力储备，让军团的规模如火焰般壮大；还是强化部队征兵速度与陆地攻击能力，让军团能快速投入战场，成为抗深渊的尖刀。永恒火焰军团，是纳塔的钢铁洪流。"

 # 77. 纳塔工业复兴
 NAT_Event.77.t:"纳塔工业复兴"
 NAT_Event.77.d:"长久的战争让纳塔的工业陷入低迷，旅者决意发起“纳塔工业复兴”计划，整合所有的工业资源，升级技术，扩建工坊，让纳塔的工业重回巅峰。是大规模扩建民用与战争工坊，让工业的规模如火山喷发般增长；还是提升工业效率与工厂产能，让每一座工坊都能发挥极致的生产能力。工业复兴的火焰，是纳塔强大的经济基础。"

 # 78. 枫丹与至冬外交拓展
 NAT_Event.78.t:"枫丹与至冬外交拓展"
 NAT_Event.78.d:"枫丹的机械技术与至冬的冰之军械，能与纳塔的火焰力量形成互补，旅者决意拓展与这两个国家的外交关系，形成更广泛的抗深渊联盟。是提升与枫丹、至冬的友好度，让外交的纽带更加牢固；还是强化国际外交影响力与权重，让纳塔成为提瓦特外交的核心力量。外交拓展的火焰，是纳塔国际地位的升华。"

 # 79. 玛薇卡的永恒火焰祝福
 NAT_Event.79.t:"玛薇卡的永恒火焰祝福"
 NAT_Event.79.d:"玛薇卡将自己的火神之力注入纳塔的工业核心，降下“永恒火焰祝福”，这份祝福能让火焰元素的转化效率达到极致，工业生产能力暴涨。是扩建战争工坊，提升工厂产能，让每一座工坊都能生产出顶级的军械；还是提升装备生产效率，扩充工业规模，让纳塔的军工体系能支撑长期的抗深渊战争。永恒火焰的祝福，是纳塔工业的终极加持。"

 # 80. 燃烧之地纳塔的荣耀
 NAT_Event.80.t:"燃烧之地纳塔的荣耀"
 NAT_Event.80.d:"在玛薇卡的带领下，纳塔不仅击退了深渊的入侵，还实现了部族统一、工业复兴、外交崛起，成为提瓦特不可忽视的火焰强国。当胜利的号角响彻图兰火山，纳塔的民族主义与战争支持度达到顶峰，陆地攻击能力获得长久加持，统治权威与政治力量也达到前所未有的高度。这是纳塔的荣耀时刻，燃烧的土地终将以火焰之名，闪耀于提瓦特的每一个角落。"

