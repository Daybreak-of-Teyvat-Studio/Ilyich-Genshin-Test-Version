 # ===================== 二、国家精神类本地化（ideas）=====================
 ns_san_unity:"珊瑚同心"
 ns_san_unity_desc:"海祇岛的民众因对奥罗巴斯的共同信仰、对自由的共同追求，如珊瑚的枝丫般紧紧相拥，凝聚成不可分割的整体。这份团结是在战火中淬炼而成的，望泷村的渔户为反抗军送粮，渊下宫的海渊民为士兵疗伤，巫女们为战局祈祷，每个岛民都在为共同的目标努力。当外敌入侵，他们众志成城，用血肉之躯筑起防线；当内部遭遇困境，他们相互扶持，共渡难关。这份同心如深海珊瑚的根系，深深扎入土地，让海祇岛在风雨中屹立不倒；如潮汐的力量，汇聚成无坚不摧的抗争之力，稳定度与战争支持度因此大幅提升，成为反抗幕府最坚实的后盾。"

 ns_geo_ally:"璃月之盟"
 ns_geo_ally_desc:"璃月港的岩色与海祇岛的珊瑚色在反抗幕府的征程中相融，缔结下牢不可破的友好盟约。这份盟约并非一纸空文，而是实打实的支援与信赖。璃月的工匠带着先进的技艺来到海祇，帮助修建工事、打造战船，让民用工厂的效率大幅提升；璃月的商队穿越鸣神海域的雷暴，送来充足的钢材、铁矿等战略物资，解决了反抗军的燃眉之急；璃月的七星在国际上为海祇岛发声，谴责幕府的暴政，让稻妻的锁国令形同虚设。岩王帝君的契约精神与奥罗巴斯的创世之恩相互呼应，让这份盟约坚如磐石，为海祇岛的反抗大业提供了强大的外部支撑。"

 ns_kokomi_leader:"心海的智略"
 ns_kokomi_leader_desc:"珊瑚宫心海是奥罗巴斯意志的继承者，是海祇岛的现人神巫女，更是足智多谋的军事统帅。她的智谋如深海的洋流，看似平静，却藏着无尽的力量。自幼研读《海祇兵法》，精通战术布局与人心洞察，能在复杂的战局中找到破局之道；她的领导力如珊瑚的枝干，看似温柔，却有着坚韧的内核，能将分散的力量凝聚成一股绳。在她的引领下，海祇岛的研究速度事半功倍，无论是军事技术的革新还是民生设施的建设，都能高效推进；作战规划精准无误，每一次进攻、每一次防守都经过深思熟虑；陆军的组织度大幅提升，士兵们对她绝对信任，愿意为她赴汤蹈火。心海的智略，是海祇岛反抗大业的定海神针。"

 ns_san_victory:"珊瑚的胜利"
 ns_san_victory_desc:"击败幕府军队的阶段性胜利，如一道光刺破了笼罩海祇岛的阴霾，让全岛上下的士气如涨潮般高涨。这份胜利是对每一位反抗者的犒赏，是对奥罗巴斯信仰的印证。战场上的缴获充实了反抗军的军械库，让后续的作战有了更充足的物资保障；胜利的消息传遍稻妻，让更多不满幕府暴政的人加入反抗的行列，人力补充如潮汐般不竭；岛民的信心倍增，稳定度如磐石般稳固，不再因幕府的威压而动摇。更重要的是，这份胜利让海祇岛看到了希望，让反抗的火种燎原，建筑建造的效率也因民心振奋而大幅提升，破损的家园快速重建，胜利的红利惠及海祇的每一个角落。"

 ns_sea_god_era:"海神时代"
 ns_sea_god_era_desc:"推翻幕府的统治后，海祇岛被压抑已久的海洋优势如冲破堤岸的潮水，全面释放，正式开启属于奥罗巴斯的海神时代。这一时代的稻妻，舰船战力如海兽般凶猛，融合了海祇岛的水系术法与璃月的造船技术，战船在鸣神海域纵横驰骋，无人可挡；海洋资源的产出如珊瑚般繁茂，渔获、海盐、珊瑚制品成为稻妻的经济支柱，通过远洋贸易销往提瓦特各地；社会稳定如深海的洋流，和平的秩序取代了战乱，岛民安居乐业，自由的理念深入人心。海神时代是稻妻的黄金发展期，奥罗巴斯的创世之恩得以彰显，海祇岛的文化与信仰成为稻妻的核心，让这片土地焕发出前所未有的生机与活力。"

 ns_temp_buff:"临时战备增益"
 ns_temp_buff_desc:"决战的脚步日益临近，鸣神海域的空气都弥漫着刀兵的气息。为了应对即将到来的恶战，反抗军开启短期的战备强化，如为锋利的刀刃淬上最后一道火。通过集中训练，步兵的攻击力如涨潮的海浪陡然提升，每一次挥刀都能劈开幕府的重甲；作战规划的速度如疾行的海鸟大幅加快，心海的智谋能更快地转化为实战部署。这份临时的增益是海祇岛为守护自由的最后蓄力，是珊瑚宫为迎接决战的精准布局，虽短暂却极具威力。在关键时刻，这份增益能帮助反抗军突破困境，扭转战局，为最终的胜利奠定基础，彰显出海祇岛反抗军的坚韧与勇气。"

 ns_victory_buff:"胜利的荣光"
 ns_victory_buff_desc:"大胜之后的荣光如温暖的洋流，包裹着每一位反抗军战士的心房，军队的士气如虹，直冲云霄。这份荣光源于对自由的坚守，源于对暴政的胜利，是对每一位牺牲者的告慰。在荣光的加持下，陆海两军的经验获取速度如乘风的航船飞速加快，新兵在实战中快速成长为老兵，战术配合愈发默契；补给的消耗因士气高昂而有所减少，战士们以信念为粮，以勇气为水，无需过多物资便能坚守阵地。胜利的荣光不仅提升了军队的战力，更凝聚了民心，让岛民对反抗大业充满信心，为后续的作战提供了强大的精神支撑，让海祇岛的反抗之路越走越宽。"

 ns_san_era:"新海祇时代"
 ns_san_era_desc:"稻妻重归和平，战火的硝烟如退潮般消散，新海祇时代的曙光洒遍鸣神海域的每一寸土地。这是一个以海为核、以自由为魂、以信仰为根的新时代，稻妻的发展迎来质的飞跃。全领域的研究速度如洋流般顺畅，科技革新与文化传承齐头并进，从前未解的难题如今迎刃而解；建筑建造的效率如珊瑚生长般迅猛，残破的家园焕然一新，现代化的设施与传统的建筑交相辉映；人力的增长如鱼群繁衍般旺盛，人口的恢复与人才的涌现为稻妻的发展注入源源不断的动力。新海祇时代的稻妻，既传承了奥罗巴斯的创世遗志，又吸纳了提瓦特的先进理念，成为一个开放、包容、繁荣的国度。"

 # 珊瑚宫海祇岛国策树本地化文本
 # 阶段1：海祇凝心
 SAN_Unite_Watatsumi_Clans:0 "海祇众心的聚合"
 SAN_Unite_Watatsumi_Clans_desc:0 "在月浴之渊幽蓝波光的映照下，珊瑚宫的大厅内汇聚了来自海祇岛各聚落的代表。他们之中，有世代耕耘贫瘠土地、面容被海风雕刻出深邃纹路的村长；有驾驶着祖传小舟、熟知每一道暗流与渔汛的船老大；有在悬崖峭壁间采集奇异珊瑚与发光海草的采珠人；还有那些沉默寡言、却在祭祀仪式上能吟唱古老歌谣的巫祝后裔。所有人的目光都投向殿堂高处，那位端坐于贝壳与珍珠装饰座席上的年轻巫女——珊瑚宫心海。她手中那本厚重的《兵书》静静合拢，但她的目光却比任何文字都更具力量，缓缓扫过每一张写满忧虑、期待与迷茫的脸庞。她知道，海祇岛的力量从来不是源于个体的强大，而是像深海中的珊瑚虫，唯有千万个体紧紧相依，才能筑起抵御惊涛骇浪的礁盘。眼狩令的阴影如同海面上的乌云，正沉沉压向这片本就资源匮乏的岛屿。是时候搁置村落间关于渔场、关于水源的微小龃龉，将分散的人心与力量，如同涓涓细流汇聚成可以推动水车的活水。她以清晰而沉稳的语调，阐述着共同的危机与可能的未来，不是命令，而是邀请，邀请所有海祇子民，共同决定家园的命运。"

 SAN_Divine_Miko_Of_Watatsumi:0 "现人神巫女的威仪"
 SAN_Divine_Miko_Of_Watatsumi_desc:0 "“现人神巫女”，这个称号承载的远不止是主持祭祀的职责。她是海祇大御神奥罗巴斯在现世的代行者，是连接深海遗民与已逝蛇神的精神桥梁，更是战时凝聚全岛意志的绝对核心。心海深知，在即将到来的风暴中，模糊的、仅基于传统的权威是不够的。她需要将这份源于信仰的权威，转化为清晰、有效且令行禁止的统治力。一系列悄然却又坚定的变革在珊瑚宫内外展开：巫女与神官的职责被重新明确划分，古老的律例被加以修订以适应当下的危机，一套基于贡献与能力的晋升体系开始在反抗军雏形中试行。她亲自处理以往交由下属的纠纷，裁决结果公正而迅速，令人信服。她出现在最艰苦的渔村，倾听最卑微子民的诉求。渐渐地，“心海大人”的称呼中，敬畏逐渐与信赖交织。她并非要以威权压服众人，而是要以无可挑剔的履职与深谋远虑，让所有海祇子民相信，追随这位巫女的指引，是穿过眼前迷雾最可靠的路径。"

 SAN_Orobashi_Sacred_Legacy:0 "大御神遗泽的再光"
 SAN_Orobashi_Sacred_Legacy_desc:0 "奥罗巴斯，那位折下身上珊瑚枝为子民照亮深渊、最终在无想刃狭间陨落的蛇神。它的故事在海祇岛并非尘封的史诗，而是流淌在血脉中的记忆，是每一处发光珊瑚从、每一座蛇神雕像无声诉说的过往。心海下令系统整理、宣讲大御神的传说，尤其是祂为保护子民而牺牲的壮举。这并非简单的怀旧，而是要在危难时刻，重新点燃那份深植于族群灵魂中的韧性、牺牲精神与对自由的渴望。她将反抗幕府暴政的斗争，巧妙地与继承大御神“庇护子民”的遗志联系起来。古老的祭祀仪式被赋予新的内涵，成为战前动员与凝聚信念的场合。战士们开始相信，他们不仅是为自己而战，更是为维护那位曾为他们献出生命的守护神最后的尊严而战。这份源于共同神话与悲壮历史的认同感，如同深海潜流，将不同出身、不同想法的海祇人紧紧联结，孕育出远超物质力量的斗志与团结。"

 SAN_Watatsumi_Economic_Restructuring:0 "海祇经济的重塑"
 SAN_Watatsumi_Economic_Restructuring_desc:0 "海祇岛的土地受限于地质与魔神遗恨，农业产出有限；渔业虽是其命脉，但在幕府封锁与战乱威胁下也岌岌可危。依赖单一产业和外部输入的经济结构脆弱不堪。心海与她的幕僚们点起灯火，在珊瑚宫的密室中反复推演。蓝图逐渐清晰：利用岛上独特的发光珊瑚、珍稀海产与渊下宫可能发掘的古代资源，发展特色手工业与加工业。鼓励民间探索新的养殖与种植技术，哪怕是在岩缝中开辟小块梯田。建立一套更有效的物资调配与储备体系，以应对可能的长期围困。同时，开始秘密规划与岛外（如璃月）的非官方贸易线路，哪怕需要冒巨大风险。经济重整的每一步都伴随着巨大的困难与争议，但心海明白，没有经济自主的支撑，军事反抗与政治独立都将是无根之木。这场静默的经济改革，其意义不亚于任何一场轰轰烈烈的战役，它旨在为海祇岛锻造出一具能够自力更生、承受压力的坚韧躯体。"

 SAN_Establish_Watatsumi_Think_Tank:0 "珊瑚智囊团的创立"
 SAN_Establish_Watatsumi_Think_Tank_desc:0 "心海虽被誉为“真珠之智”，但她从不认为智慧应为一人所垄断。她广泛征召海祇岛内的有识之士：不仅有熟知兵法的退役武士、精通建设的工匠，还有那些记忆力超群、能背诵大量古老歌谣与传说（其中或许隐藏着有用信息）的老人，甚至包括对幕府制度或稻妻诸岛地理有深入了解的异乡来客。这些背景各异的人被组织起来，在珊瑚宫一侧僻静的偏殿中，形成了一个非正式的“智囊团”。他们的任务并非处理日常政务，而是进行近乎天马行空的“推演”与“谋画”：分析幕府可能的战略动向，评估海祇岛各项资源的潜力，研究历史上以弱胜强的战例，甚至设想与外国势力接触的各种可能情境。这里不强调身份尊卑，只崇尚有价值的想法。心海时常参与其中，倾听、质疑、引导。这个智囊团如同一座为海祇岛未来照亮更多可能性的灯塔，其产出的并非直接命令，而是多种预案与风险评估，为心海最终的决策提供了更为广阔的视野与坚实的依据。"

 SAN_Develop_Watatsumi_Fishery_Agriculture:0 "渔农之本的新生"
 SAN_Develop_Watatsumi_Fishery_Agriculture_desc:0 "望泷村的田间，农人们正在尝试种植一种新的耐盐碱作物；沿岸的渔村中，长老们开始推行轮捕轮休的古老法则，并试验新的网具与养殖方法。心海深知，无论战略如何宏伟，士兵与民众的餐桌始终是第一位的。她派出手下精通农业与渔业的人才，深入各个聚落，不是去指挥，而是去学习当地经验，并带去从古籍或他国（通过隐秘渠道）获得的新知识。鼓励改进渔船的适航性与安全性，探索深海捕捞的可能。在有限的耕地上推广更有效的水利管理与施肥技术。建立由珊瑚宫协调的粮食储备与调剂机制，预防局部饥荒。这些措施看似琐碎，却实实在在地影响着每一个海祇岛民的日常生活。当人们看到田地里的收成略有增加，渔获更加稳定，对未来的恐慌便会减轻一分，对珊瑚宫领导能力的信任便会增加一分。民生是最大的政治，尤其是在战争阴云下，确保基础的温饱，就是确保了社会最基本的稳定与兵员最基础的士气。"

 SAN_Watatsumi_Infrastructure_Upgrade:0 "岛内脉络的强化"
 SAN_Watatsumi_Infrastructure_Upgrade_desc:0 "海祇岛地势复杂，村落散落于海湾、山崖与岛屿各处，交通往来多靠舟船与崎岖小径。在和平时期，这只是些许不便；但在战时，这将成为调配兵力、运输物资、传递信息的致命弱点。心海启动了规模浩大的基础设施强化计划：修缮并拓宽连接主要村落的道路，在险要处架设简易桥梁；扩建和加固几个关键港口，使其能停靠更大的船只；建立一套基于灯火、旗语与快船的应急通讯网络。同时，开始有计划地建设一批隐蔽的物资仓库、小型野战工事和应急避难所。这些工程动员了大量民力，但心海坚持给予合理报酬，并将其宣传为“共建家园防线”。工程进展或许缓慢，但每一条道路的贯通，每一个码头的完善，都如同在岛屿的躯体中疏通血脉、强健筋骨，让海祇岛在潜在的风暴中，能够更快速、更有效地调动其内在力量，将地理上的分散劣势，逐渐转化为利用复杂地形进行防御与机动的优势。"

 SAN_Resolve_Internal_Political_Factions:0 "内部歧见的调和"
 SAN_Resolve_Internal_Political_Factions_desc:0 "即便在外患迫近之时，海祇岛内部也并非铁板一块。有激进的少壮派，渴望立刻举旗，与幕府决一死战，认为妥协就是背叛大御神；有保守的旧氏族，担忧反抗会招致灭顶之灾，主张隐忍甚至有限度的合作；还有单纯害怕战争、只想保全家庭的普通民众。不同的声音在私下里交汇、碰撞，形成暗流。心海没有采用压制的手段，而是主动介入调和。她分别接见不同派别的代表人物，耐心倾听他们的诉求与恐惧。在公开场合，她强调“守护所有海祇子民”是最高目标，无论是选择奋战还是生存。她设计出一套折中的初期方案：积极备战，但不明目张胆地打出反旗；寻求外援，但不将希望完全寄托于外人。对于无法调和的极端派，她采用隔离或赋予其不危及大局的专项任务的方式进行处理。这个过程犹如在激流中操舟，需要极大的耐心、技巧与权威。心海的目标并非消灭所有不同意见，而是将这些歧见引导到一个可控的范围内，确保在关键时刻，海祇岛能够以一个相对统一的声音和意志行动。"

 SAN_Watatsumi_Cultural_Inheritance:0 "海渊文化的传承"
 SAN_Watatsumi_Cultural_Inheritance_desc:0 "海祇岛的文化，是与稻妻主流鸣神文化截然不同的瑰宝。它源于黑暗的海渊，带着对巨蛇的崇拜、对光明的独特理解，以及适应深海环境的生存智慧。心海认为，在面临文化同质化压力（来自幕府）的当下，强化自身的文化认同至关重要。她支持学者整理即将失传的古歌谣、祭祀舞蹈与传说故事。鼓励工匠沿用传统工艺制作服饰、器物，哪怕其中一些在现代看来已不“实用”。在学校与民间集会中，讲述海祇岛自己的历史，而非仅仅接受鸣神岛视角的叙述。这些文化活动并非为了怀旧而怀旧，而是为了提醒每一个海祇人“我们是谁”、“我们从何处来”。在战争时期，强烈的文化认同感是凝聚人心、抵御精神同化的坚固壁垒。它让士兵明白自己为何而战，让民众理解自己所要守护的，不仅仅是生命与财产，更是一份独特的、源于祖先的记忆与生活方式。文化，成了海祇岛无形的盔甲与旗帜。"

 SAN_Watatsumi_Medical_System_Establishment:0 "海祇医理的奠立"
 SAN_Watatsumi_Medical_System_Establishment_desc:0 "战争必然带来伤亡，而海祇岛本就医疗资源匮乏。心海未雨绸缪，开始着手建立一套战时医疗体系。她汇集岛上的医师、巫医和草药师，结合传统的海祇医术（常利用海生生物与矿物）与外来医学知识，编写实用的战地医疗手册。设立医疗物资的集中采购与生产基地，重点生产止血、消炎、镇痛类药物与敷料。在各大村落和计划中的军营所在地，设立初级医疗点，培训基本的救护人员。更关键的是，她开始筹划组建随军的医疗小队，并物色合适的地点建立后方医院。与此同时，公共卫生也被提上日程，预防瘟疫在拥挤的战时环境中爆发。这套体系的建立，不仅是为了降低未来的伤亡数字，更是向所有即将参战的人员传递一个明确的信息：他们的生命将被珍视，受伤后将得到尽可能的救治。这在无形中极大地安抚了人心，提升了部队的士气与凝聚力。医疗体系的完善，是文明程度的重要体现，也是海祇岛决心进行一场有组织、有准备长期抗争的明证。"

 # 阶段2：反抗军起
 SAN_The_Vision_Hunt_Decree:0 "眼狩令的阴云"
 SAN_The_Vision_Hunt_Decree_desc:0 "自鸣神岛传来的消息，如同冰冷的潮水，一波波拍打着海祇岛的海岸。“眼狩令”——收缴所有神之眼，断绝凡人与元素的共鸣。对许多稻妻人而言，这或许是对永恒的一种扭曲追求；但对海祇岛而言，这无疑是敲响了丧钟。神之眼持有者往往是各村的中坚，是抵御魔物、开拓生产、乃至传承特殊技艺的关键。剥夺神之眼，等于抽走了海祇岛在贫瘠环境中艰难求存的脊梁。更深的恐惧在于，这被视为雷神对海祇信仰与自治传统的终极否定与清洗的前奏。恐慌在渔民、农夫和工匠间蔓延，有人试图藏匿，有人计划逃亡。珊瑚宫内，气氛凝重如铅。心海明白，这道法令将海祇岛逼到了墙角，退无可退。继续沉默隐忍，等同于坐视同胞被夺去力量与梦想，坐视部族在未来被慢性扼杀。反抗，不再是可选项，而是生存的唯一出路。眼狩令的雷霆，最终点燃了海祇岛压抑百年的地火。"

 SAN_Form_Coral_Palace_Rebel_Army:0 "珊瑚宫反抗军的组建"
 SAN_Form_Coral_Palace_Rebel_Army_desc:0 "决心已下，但反抗不能仅凭一腔热血。心海开始在海祇岛的阴影中，编织一张精密的军事网络。征召并非大张旗鼓，而是通过可信的村落长老、退役武士和秘密结社，悄然吸纳那些对幕府不满、身手矫健或有一技之长的男女。他们中有被剥夺神之眼的原持有者，心中燃烧着不屈的火焰；有熟知海路、能在风暴中航行的老水手；也有擅长潜伏、刺探与设置陷阱的猎人。初期训练在偏僻的海湾、废弃的矿洞和夜晚的丛林中进行，使用木制武器和改良的渔具。心海亲自参与制定训练大纲，强调小队配合、地形利用和游击战术，而非正面拼杀。后勤体系也在同步搭建，利用岛屿的复杂地形建立隐蔽的补给点。这支新兴的军队如同深海中的章鱼，触手开始向岛屿各处延伸，虽然装备简陋，缺乏正规战经验，但他们熟悉家乡的每一寸土地与海浪，并且怀抱着守护家园的强烈意志。他们自称“珊瑚宫军”，是海祇子民紧握的拳头。"

 SAN_Appoint_General_Gorou:0 "大将五郎的任命"
 SAN_Appoint_General_Gorou_desc:0 "一支军队需要灵魂，也需要利剑。心海的目光，落在了那位忠诚勇毅、在士兵中享有极高威望的犬族青年——五郎身上。他并非出身显赫的军事世家，但他的勇猛、正直和对士兵的关爱，在早期的秘密军事准备中已显露无疑。任命仪式简单而庄重，在心海的见证下，五郎接过了象征指挥权的珊瑚令牌。他深知责任重大，海祇岛资源有限，无法承受无谓的牺牲。他立即着手整训部队：将散漫的义勇编成有明确编制的队伍，建立基本的军纪和指挥链路；亲自示范战斗技巧，尤其注重弓箭与近身格斗；更关键的是，他像兄长一样关心士兵的食宿、健康与情绪，倾听他们的想法。五郎的存在，如同为这支新生军队注入了一根定海神针。士兵们信任他，愿意跟随他赴汤蹈火。他与心海，一武一文，一外一内，构成了反抗军早期最坚实的核心。大将五郎的名字，开始如同海祇岛的潮信，在军中和民间传颂，成为勇气与希望的象征。"

 SAN_Rescue_Vision_Users:0 "神之眼持有者的庇护"
 SAN_Rescue_Vision_Users_desc:0 "眼狩令的执行如同捕猎，而神之眼持有者成了最显眼的猎物。幕府的“猎犬”在诸岛活动，收缴、追捕。海祇岛无法坐视同胞被夺去梦想与力量。一项危险而隐秘的行动——“海祇之盾”启动了。珊瑚宫的情报网络开始全力运转，追踪幕府收缴队伍的行踪。海祇岛的浪船在夜色与雾霭的掩护下，悄然驶向鸣神岛、神无冢等地，接应那些走投无路的逃亡者。接应点可能是偏僻的渔村、废弃的神龛，或是商船约定的海面。过程充满风险，时有交火与牺牲。但每成功接回一名神之眼持有者及其家人，反抗军就多了一份宝贵的力量，海祇岛也多了一份誓死反抗的决心。这些被救回的人，许多怀着对幕府的深切恨意与感激，很快成为了反抗军中最坚定、最勇猛的战士，或是在后方贡献他们独特的元素技艺。这项行动不仅保存了有生力量，更向所有稻妻人宣告：海祇岛，是反抗眼狩令暴政的灯塔与堡垒。"

 SAN_Watatsumi_Military_Industry_Construction:0 "海祇军工的奠基"
 SAN_Watatsumi_Military_Industry_Construction_desc:0 "竹枪与渔网无法对抗幕府的精锐与玉钢打造的刀剑。心海深知，必须拥有自己的军工生产能力。在岛屿隐蔽的峡谷、临海的洞窟中，简陋但功能齐全的作坊被建立起来。匠人们利用岛上特有的“晶化骨髓”尝试锻造比普通铁器更坚韧的武器；从发光珊瑚和某些海兽分泌物中提取材料，试验特殊的涂层与药剂；甚至尝试复现一些渊下宫古籍中记载的古老机关术。木材加工厂开始批量生产弓身与箭杆；皮革作坊处理海兽皮，制作轻甲与装备。一切都在极端缺乏原料和技术的条件下摸索进行，失败是家常便饭。但心海给予了匠人们最大的支持与宽容，鼓励创新与实用主义结合。渐渐地，第一批制式装备开始下线：虽然粗糙，但足够致命；虽然产量有限，但意味着海祇岛开始摆脱对外部武器的完全依赖。这微弱的军工火种，是海祇岛军事独立的起点，也是长期抗争的物质基础。"

 SAN_Watatsumi_Coastal_Defense:0 "海岸防线的构筑"
 SAN_Watatsumi_Coastal_Defense_desc:0 "海祇岛四面环海，这意味着来自海上的威胁无处不在。幕府的海军远比孱弱的海祇船队强大。被动挨打等于灭亡。心海与五郎亲自勘察了全岛海岸线，标定出最容易登陆、最具战略价值的海滩、港湾与崖壁。防御工事的建设随即展开：在关键登陆点水下布设改良的渔网与木桩，阻碍船只靠近；在悬崖上修建隐蔽的观察哨与射击孔；在沙滩后方构筑简易的沙垒与壕沟。更富创意的是，他们利用海祇岛多雾的特点，在沿岸布设了大量由贝壳、浮木制成的假目标，并安排小股部队频繁调动，制造守军众多的假象。同时，组建了快速反应的“海祇之鳍”小队，配备快舟，专门负责沿岸巡逻与预警。这道防线并非坚不可摧，其核心思想在于迟滞、消耗和预警，迫使来袭之敌无法轻易立足，为内陆的主力和民众转移争取宝贵时间。每一处工事，都是海祇岛用智慧与汗水在海岸线上刻下的宣言：入侵必将付出代价。"

 SAN_Establish_Watatsumi_Navy:0 "海祇水师的创立"
 SAN_Establish_Watatsumi_Navy_desc:0 "没有制海权，海祇岛就是一个困守的孤岛。然而，建立一支能与幕府海军抗衡的舰队，无异于痴人说梦。心海的策略务实而灵活：放弃建造大型战舰的幻想，专注于发展小型、快速、灵活的船只。匠人们改造大型渔船，加固船体，加装简易的护板；设计狭长快速的突击舟，专用于接舷战与渗透。水手的训练围绕海祇岛复杂的暗礁、急流与多变天气展开，他们将学会如何在幕府大船难以进入的浅水区作战，如何利用夜色和风暴发起突袭。战术上，强调“狼群”战术与海上游击，绝不正面硬撼，以袭扰运输线、攻击落单舰船、快速登陆撤离为主。这支小小的“海祇水师”，更像是海上的刺客与幽灵。他们的目标不是夺取海洋，而是确保海祇岛与外界的联系不被完全切断，并能对幕府漫长的海岸线保持一定的威胁能力。每一艘出航的小船，都承载着海祇岛不甘被封锁的命运，在浩瀚而危险的海面上，寻找着生存与反击的缝隙。"

 SAN_Special_Recon_Troop_Establishment:0 "特别侦察队的成立"
 SAN_Special_Recon_Troop_Establishment_desc:0 "战争不仅是力量的碰撞，更是信息的博弈。心海需要一双能穿透迷雾、看清对手的眼睛。她从军队和民间选拔出最机敏、最坚韧、最熟悉外岛的士兵，组建了直属珊瑚宫的“海祇之眼”特别侦察队。他们的训练严酷而特异：不仅要掌握潜伏、伪装、跟踪、野外生存等技能，还要学习鸣神岛的语言、习俗、军队编制和装备识别。他们被秘密派往神无冢、八酝岛乃至鸣神岛沿岸，任务包括：测绘地形、记录驻军调动、评估物资囤积、甚至接触对幕府不满的当地人。信息通过密语、隐藏标记和不定期的海上接头传回。这是一项刀尖上跳舞的工作，被捕往往意味着死亡。但“海祇之眼”带回的情报，逐渐拼凑出幕府军事行动的模糊轮廓，为心海的战略决策提供了不可或缺的依据。他们是反抗军伸向外界的无形触手，在绝对的劣势中，为海祇岛争取着那一点点珍贵的信息主动权。"

 SAN_Battlefield_Medical_Corps:0 "战场医疗队的编成"
 SAN_Battlefield_Medical_Corps_desc:0 "心海深知，在缺医少药的海祇岛，一名受伤老兵的经验，可能比十个新兵更宝贵。她将之前建立的医疗体系进一步专业化、军事化，成立了直属军队的“海祇之愈”战场医疗队。成员包括受过培训的巫女、药师和心灵手巧的士兵。他们被分派到各主要部队，携带统一配发的急救包。医疗队重点研究战场常见的刀剑伤、箭伤、烧伤和疫病，利用海祇特色的药材（如某种海藻的止血功效）制作特效药。同时，建立了一套从前线包扎点到后方医院的伤员后送流程，并训练士兵基本的互救技能。心海甚至亲自编写了简易的战场急救手册下发。这支医疗队的存在，极大地稳定了军心。士兵们知道，受伤后不会像野草一样被抛弃，这让他们在战斗中多了一份勇气，少了一份对伤亡的恐惧。救死扶伤，不仅保存了战斗力，更是海祇岛人道精神与文明底线的体现，即使在最残酷的战争中，也竭力守护着生命的微光。"

 SAN_Rebel_Army_Tactical_Training:0 "反抗军战术训练"
 SAN_Rebel_Army_Tactical_Training_desc:0 "面对训练有素、装备精良的幕府军，海祇反抗军不能硬碰硬。心海与五郎、智囊团一同，为这支新生军队量身打造了一套独特的战术体系。核心思想是“以柔克刚，以奇胜正”。训练重点包括：复杂地形（丛林、山地、礁石区）下的快速机动与小分队作战；利用天气（大雾、暴雨、夜晚）进行掩护与突袭；设置各种陷阱与障碍，迟滞消耗敌人；学习简单的土木作业，快速构筑野战工事。特别强调伏击与反伏击，以及得手后迅速脱离接触的能力。训练是艰苦的，常常在恶劣环境下进行模拟对抗。心海通过《兵书》中的案例和推演，亲自讲解战术意图。渐渐地，散兵游勇开始向一支有战术素养的军队转变。他们或许仍不擅长大兵团正面列阵，但在海祇岛的山林与海岸间，他们将化身为最致命的狩猎者，利用每一处地形，每一分智慧，去对抗强大的敌人。这套战术，是弱者的生存之道，也是海祇岛反抗智慧的结晶。"

 # 阶段3：诸岛经略
 SAN_Yashiori_Island_Campaign:0 "八酝岛攻略"
 SAN_Yashiori_Island_Campaign_desc:0 "海祇岛不能永远困守孤岛。向外寻找盟友、资源和战略纵深势在必行。目光首先投向了饱受“祟神”能量折磨、幕府控制相对薄弱的八酝岛。此地不仅有重要的晶化骨髓矿藏，其地理位置更是扼守通往鸣神岛的水道。心海的计划并非全面占领，而是进行一场精密的有限军事行动，旨在扶植当地反抗势力，建立前沿据点，并获取急需的矿产资源。行动在浓雾弥漫的清晨开始，海祇军精锐小队乘快船登陆，与岛内早已秘密接触的反抗组织“破砕之志”汇合。他们避开幕府军主力驻扎的无想刃狭间，快速控制了几个关键的矿洞和沿海村庄，并协助当地人建立自治防御。战斗零星而激烈，海祇军充分发挥了山地游击特长。此役不仅为海祇岛打开了通往外界的第一扇门，获得了宝贵的矿产，更向整个稻妻昭示：反抗之火，已从海祇岛燃向了鸣神幕府统治的其他岛屿。"

 SAN_The_Tragedy_of_Tatarasuna:0 "踏鞴砂的悲鸣"
 SAN_The_Tragedy_of_Tatarasuna_desc:0 "踏鞴砂的悲剧，并非遥远的新闻。当海祇军的侦察员潜入这片被“祟神”污染、御影炉心失控的工业区时，看到的是一幅人间地狱的景象：废弃的工坊，染病的工人，弥漫的有毒紫气，以及仍在徒劳试图控制炉心、却得不到幕府有效支援的本地官员与技师。心海意识到，这不仅是一场人道灾难，更是一个机会。她派出以技术人员和医疗人员为主的小队，携带有限的海祇岛药物（对某些祟神症状或有缓解），以“民间救助”的名义秘密接触踏鞴砂的幸存者与技术人员。目的有三：一是展现海祇岛与冷漠幕府不同的人文关怀，争取民心；二是尝试获取踏鞴砂的冶金与工匠技术，尤其是与晶化骨髓相关的知识；三是了解御影炉心的真相，这关乎整个稻妻的安危。这是一场危险的道德与政治行动，但踏鞴砂的哭声，让心海无法坐视不理。援助与接触，如同投入死水的石子，激起的涟漪将微妙地改变当地人对海祇岛的观感。"

 SAN_Kannazuka_Island_Strategy:0 "神无冢的战略"
 SAN_Kannazuka_Island_Strategy_desc:0 "神无冢，稻妻的军事与工业重镇，九条阵屋所在地，幕府军的前沿大本营。对于海祇岛而言，这里是必须正视的巨兽，但并非没有弱点。心海的策略是“遏制与窥视”，而非强攻。她下令增强在神无冢周边海域的侦察与袭扰活动，目标指向幕府的运输船和外围哨所，持续施加压力，牵制其兵力，使其无法全力进攻海祇岛。同时，利用岛上山林密布、流浪武士与海盗盘踞的复杂局面，秘密接触那些对幕府不满的势力，建立情报网，甚至尝试有限的物资交换。更重要的目标是勘测神无冢的海岸地形、驻军分布与物资囤积点，为未来的任何可能性做准备。这是一场猫鼠游戏，海祇岛是那只灵活而警惕的老鼠，时刻在巨兽的爪牙边缘游走，试探其反应，寻找其破绽，并让幕府军无法忽视来自海祇方向的存在。对神无冢的经营，是一场长期的、静默的布局，旨在平衡敌我力量，争取战略主动。"

 SAN_Seirai_Island_Contact:0 "清籁岛的接触"
 SAN_Seirai_Island_Contact_desc:0 "被狂暴雷暴永久笼罩的清籁岛，在大多数人眼中是生命的禁区。但心海从古籍与冒险者的只言片语中，察觉到其中可能隐藏着不寻常的力量与秘密。那里残留着古老的遗迹，据说与一位逝去的雷之魔神的怨念有关。她派出一支由胆大心细的士兵、冒险家和学者组成的小型探险队，乘坐特制的防雷击木船，尝试穿越外围的风暴带，与岛上可能存在的、适应了极端环境的特殊族群（如果有的话）进行接触。目的并非军事占领，而是探索与建立联系：清籁岛的异常雷元素环境能否被研究或利用？岛上是否存在稀有的矿物或生物资源？那位逝去魔神的遗产，是否蕴含着对抗雷神威能的知识？这是一次风险极高的赌博，但心海认为值得一试。在绝对的实力劣势下，任何非常规的可能性，哪怕再渺茫，都可能成为未来破局的关键。清籁岛的雷暴，既是屏障，也可能成为意想不到的机遇。"

 SAN_Tsurumi_Island_Expedition:0 "鹤观的探险"
 SAN_Tsurumi_Island_Expedition_desc:0 "被浓雾与奇异时空现象包裹的鹤观岛，是稻妻最神秘的岛屿之一，传说其上曾有一个高度发达的文明“知比山”，却因某种原因骤然消失。心海对鹤观的兴趣，远超其可能的资源价值。她指示探险队以考古与研究为首要目的，尝试揭开鹤观文明失落的原因，以及那笼罩全岛的“雾”与“雷鸟”传说的真相。她相信，古代文明的经验与教训，尤其是那些涉及灾难、生存与信仰的部分，可能对面临存亡危机的海祇岛有重要的启示。此外，鹤观可能保留有独特的古代技术或知识片段。探险队配备了记录工具和学者，任务是在保证安全的前提下，尽可能多地收集遗迹信息、壁画拓片和古老器物。这是一次穿越迷雾，与失落历史对话的旅程。心海希望，鹤观的古老回响，能为海祇岛的未来，照见一丝被时光尘封的智慧光亮。"

 SAN_Watatsumi_Island_Fortification:0 "海祇本岛的堡垒化"
 SAN_Watatsumi_Island_Fortification_desc:0 "在向外扩张触角的同时，海祇岛的大本营必须变得固若金汤。心海启动了全岛范围的“深垒计划”。防御不再局限于海岸，而是向内陆纵深发展。在珊瑚宫周边险要处，依托山体开凿洞穴仓库和隐蔽指挥所；在连接各村落的主要道路上，预设可摧毁的障碍和伏击点；将一些偏僻的村落改造为具备自持能力的防御节点，储备粮食与武器。更重要的是，建立了一套基于烽火、信鸽和徒步信使的立体预警与通讯网络，确保任何方向的入侵都能被快速发现并传达。心海甚至设计了数套在极端情况下的民众疏散与转入地下坚持的预案。整个岛屿，正从一个普通的居住地，转变为一个为长期战争准备的巨大堡垒。每一处加固的工事，每一条暗藏的通道，都是海祇岛决心的体现：这里将是入侵者最难啃的骨头，是反抗军最稳固的根基，是海祇子民最后的，也是最坚强的家园壁垒。"

 SAN_The_Curse_of_Tatarigami:0 "祟神能量的警示"
 SAN_The_Curse_of_Tatarigami_desc:0 "八酝岛与踏鞴砂的“祟神”灾难，像一面血腥的镜子，映照出魔神战争残留的怨恨与毁灭性能量的可怕。心海高度重视对这一现象的研究。她召集巫女、学者和医师，成立专门小组，搜集、分析祟神能量的表现、传播途径及其对生物与环境的影响。目的不仅是为了防范（海祇岛有大蛇奥罗巴斯的遗骸，需警惕类似隐患），更是为了深入理解魔神力量的本质与代价。研究是艰难而危险的，但初步结果表明，这种能量与地脉异常、强烈的执念与怨恨密切相关。心海下令，所有在祟神区域活动的部队必须采取严格的防护措施，并严禁私自接触或利用这种危险能量。同时，她也思考着更深层的问题：雷神追求的“永恒”，与这种带来毁灭与痛苦的“执念”，是否存在某种隐秘的联系？对祟神的研究，让海祇岛在对抗幕府时，多了一份对力量本质的清醒认知与敬畏。"

 SAN_Yashiori_Island_Supply_Line:0 "八酝岛补给线的建立"
 SAN_Yashiori_Island_Supply_Line_desc:0 "控制了八酝岛的部分区域后，如何将其与海祇岛本岛有效连接，成为关键。海上运输线暴露而脆弱，心海决定双管齐下。一方面，派遣水师精锐，开辟并保卫一条隐蔽的夜间航线，使用小型快船进行高频率、小批量的物资与人员运输。另一方面，着手改善八酝岛占领区内部的道路与小型码头，提高物资分发和部队机动的效率。更重要的是，尝试在八酝岛本地组织生产，特别是利用获取的晶化骨髓，就地建立小型的武器加工点，减少对后方运输的依赖。这条跨越海洋的脆弱“生命线”，是海祇岛战略外延的血管。每一次成功的航行，不仅运去了补给和援兵，也带回了矿产和情报，更将海祇岛与八酝岛的命运更紧密地捆绑在一起。维持这条线路，需要高超的航海技巧、严格的保密纪律和不间断的军事护航，它是对海祇岛组织与韧性的一次严峻考验。"

 SAN_Musoujin_Gorge_Frontline:0 "无想刃狭间前线"
 SAN_Musoujin_Gorge_Frontline_desc:0 "无想刃狭间——大蛇奥罗巴斯陨落之地，雷神无想的一刀留下的巨大峡谷。这里不仅是地理分界，更是海祇与鸣神百年恩怨的精神象征。如今，它成了军事对峙的最前线。幕府军重兵屯集于峡谷一侧，而海祇军在八酝岛的控制区延伸至峡谷边缘。双方哨所隔渊相望，小规模摩擦与侦察对抗时有发生。心海严禁部队轻易进入峡谷底部那能量紊乱的中心地带，但鼓励在前沿建立坚固的观察哨与防御工事，并派出最精锐的小队，在复杂破碎的地形中进行巡逻与反渗透。这里没有大规模会战，但紧张气氛令人窒息。每一块岩石后都可能藏着敌人，每一次雾气流动都可能掩盖着杀机。无想刃狭间前线，是意志与耐力的较量场。海祇军在此的存在本身，就是一种宣言：即使面对雷神威光曾降临之地，海祇的子民也绝不退让。这里流淌的不仅是地脉能量，还有未干的鲜血与未冷的斗志。"

 SAN_Narukami_Island_Intelligence_Operation:0 "鸣神岛情报行动"
 SAN_Narukami_Island_Intelligence_Operation_desc:0 "敌人的心脏在鸣神岛，在天守阁。要战胜对手，必须了解其核心的运作。心海启动了针对鸣神岛最高级别的“深潜”情报行动。精锐的“海祇之眼”特工，利用商旅、难民、甚至伪装成投降者等多种身份，渗透进入鸣神岛。他们的目标不再是外围军情，而是更高价值的信息：天领奉行与勘定奉行的内部决策倾向、三奉行之间的矛盾、雷电影（将军）的真实状态与动向、天守阁的防卫情况、以及“眼狩令”与“锁国令”更深层的决策动机。信息传递极度困难，往往依靠单线联系和死信箱。这是风险最高的任务，一旦暴露，万劫不复。但传回的只言片语，开始拼凑出幕府统治机器内部的裂痕与压力点。心海在珊瑚宫内，对着这些零碎的情报沉思，试图勾勒出那位端坐于永恒殿堂中的雷电将军的真实面目，以及那看似铁板一块的统治体系中，可以被撬动的缝隙。知己知彼，这场实力悬殊的对抗，容不得半分侥幸。"

 # 阶段4：渊下秘藏
 SAN_The_Abyss_Beneath_Watatsumi:0 "海祇之下的深渊"
 SAN_The_Abyss_Beneath_Watatsumi_desc:0 "海祇岛最大的秘密，并非藏在山中，而是沉于海底。在珊瑚宫最隐秘的殿堂深处，古老的机关被缓缓启动，通往传说之地“渊下宫”——大蛇奥罗巴斯曾统治，海祇先民曾生活的白夜国故土。随着巨大门户的开启，并非清新的海风，而是一股混合着远古尘埃、微弱能量流和莫名压抑感的气息涌出。心海知道，开启这扇门意味着什么。这不仅是探索一个遗迹，更是掀开海祇历史被刻意掩埋的一页，直面先祖在黑暗中挣扎求存的过去，以及可能随之而来的、被时光封存的危险与知识。探险队由最忠诚勇敢的战士、学识渊博的学者和熟悉仪轨的巫女组成，他们带着敬畏与决心，步入那片失去阳光的国度。这一步，标志着海祇岛不再仅仅着眼于当下的抗争，开始向历史的深处与文明的源头寻求力量与答案。渊下宫的黑暗，或许蕴藏着改变战局，乃至改变海祇人自我认知的星光。"

 SAN_Enkanomiya_First_Expedition:0 "渊下宫初次勘探"
 SAN_Enkanomiya_First_Expedition_desc:0 "第一次踏入渊下宫，探险队仿佛进入了另一个世界。巨大的建筑遗迹悬浮在虚无中，人造太阳“大日御舆”黯淡地悬挂天际，发出苍白冰冷的光芒。空气中弥漫着惰性的能量，奇特的发光植物点缀着断壁残垣，而阴影中似乎有古老的魔物在游荡。探险队小心翼翼地前进，绘制粗略的地图，记录下各种前所未见的建筑风格、壁画与符号。他们发现了“常夜”与“白夜”转换的机关，遭遇了遗迹守卫“龙蜥”的袭击，也找到了似乎是古代图书馆或工坊的废墟。每一件带回的器物碎片，每一张拓下的碑文，都让海祇岛的学者们激动不已。然而，探索也伴随着代价，未知的陷阱、狂暴的能量乱流和神出鬼没的魔物造成了伤亡。但这片被遗忘的国度，正将其神秘面纱的一角，缓缓揭开在心海与她的子民面前。"

 SAN_The_Legacy_of_Byakuyakoku:0 "白夜国的遗产"
 SAN_The_Legacy_of_Byakuyakoku_desc:0 "随着探索深入，一个失落文明的轮廓逐渐清晰。白夜国，一个在远古时期曾拥有高度智慧与技术的国度，其文明水平似乎在某些方面不亚于，甚至超越了当时的提瓦特地面世界。探险队发现了大量记载着历史、哲学、科学和技术的书卷与石板（尽管大多残缺）。内容包括对地脉的研究、对元素力的另一种理解与应用、精密的机关术、独特的冶炼与材料学知识，以及关于“原初之人”、“法涅斯”和“第二王座”等震撼世界的远古神话记载。这些知识碎片，如同散落的珍珠，亟待串联。心海意识到，白夜国的遗产，其价值无法估量。它不仅能潜在提升海祇岛的科技与生产力，更可能提供一种全新的、区别于天空岛与尘世七神体系的视角，去看待这个世界的历史与本质。消化这份遗产，需要时间、智慧与谨慎，但它无疑为海祇岛打开了一扇通往更广阔知识殿堂的大门。"

 SAN_Dainichi_Mikoshi_Research:0 "大日御舆的研究"
 SAN_Dainichi_Mikoshi_Research_desc:0 "渊下宫最令人震撼的造物，莫过于那悬浮于空中的巨型人造太阳——“大日御舆”。它曾是白夜国的光明之源，如今虽已黯淡，但其结构与原理依然代表着难以想象的古代科技巅峰。心海派遣最顶尖的学者和工程师组成研究小组，在严密护卫下靠近研究。他们分析其能量回路、悬浮机制和光芒转换原理（“常夜”与“白夜”）。研究发现，大日御舆的核心似乎利用了某种对“光界”力量的精妙操控，其能量转换效率远超现代提瓦特的许多技术。尽管完全修复或复制遥不可及，但研究其原理，已经为海祇岛的能源技术、光学应用甚至元素理论带来了革命性的启发。尝试理解并安全地汲取其一丝一毫的能量，或模仿其部分设计，都可能为海祇岛带来巨大的技术进步。大日御舆，这颗沉寂的古代太阳，正缓缓向它的后继者，泄露着失落的光辉。"

 SAN_Bathysmal_Vishap_Study:0 "深海龙蜥的研究"
 SAN_Bathysmal_Vishap_Study_desc:0 "渊下宫的原住民——深海龙蜥，是探索中最大的威胁之一。这些古老的元素生物强大、适应黑暗环境，且对入侵者充满敌意。起初，军事解决是唯一手段。但心海认为，简单杀戮并非上策。她指示研究团队，在确保安全的前提下，尝试观察龙蜥的生态习性、社会结构、元素运用方式及与渊下宫环境的关系。惊人的发现逐渐浮现：龙蜥似乎与渊下宫的地脉、乃至大日御舆存在着某种共生或能量循环关系；它们的甲壳与骨骼结构具有惊人的物理与元素抗性；不同种类的龙蜥拥有不同的元素能力和协作狩猎智慧。研究这些生物，不仅能提高在渊下宫行动的生存率，其生物学特性也可能为军事防御（如仿生护甲设计）、元素抗性研究提供灵感。更重要的是，心海思考着与这些古老生物共存的可能性，或许在遥远的未来，海祇岛能与这些渊下的“邻居”找到某种平衡，而非无止境的对抗。"

 SAN_The_Secret_of_Orobashi:0 "奥罗巴斯的秘密"
 SAN_The_Secret_of_Orobashi_desc:0 "在渊下宫的最深处，探险队可能触碰到海祇历史最核心的真相——关于大蛇奥罗巴斯的一切。它为何离开渊下宫带领子民前往地面？它在白夜国扮演了怎样的角色？它与天空岛、与雷神之间，究竟发生了什么？尘封的记载可能揭示：奥罗巴斯不仅是庇护者，也可能曾是统治白夜国的“神”，甚至是某些重大历史事件的亲历者与承担者。它折下珊瑚枝为子民照亮通往地面的路，其背后是崇高的牺牲，还是不得已的逃亡？它最终挑战雷神，是纯粹的疯狂，还是蕴含着更深层的、或许与远古秘密相关的动机？了解这些，可能会动摇海祇信仰的根基，也可能让其更加坚实。心海以极其慎重的态度对待这些可能出现的秘密，她知道，真相可能如双刃剑，既能赋予力量，也能带来撕裂。但作为现人神巫女，她有责任去面对，去理解，然后决定哪些真相应该告知子民，以何种方式，去重塑海祇的集体记忆与未来道路。"

 SAN_Enkanomiya_Defense_System:0 "渊下宫防御体系"
 SAN_Enkanomiya_Defense_System_desc:0 "渊下宫不仅是宝库，也可能成为海祇岛最后的避难所，或是敌人意想不到的突袭路径。必须将其纳入整体防御。心海下令，在确保不破坏主要遗迹的前提下，于关键入口、通道和重要遗址周围，建立隐蔽的防御工事和预警系统。利用渊下宫独特的“常夜”与“白夜”环境，设计需要特定机关或时间才能通过的门禁。部署小股精锐部队长期驻守，他们不仅要防御可能的外敌（如果通道被发现），还要防范渊下宫内部未知的危险。同时，建立一条安全、隐蔽且快速的，连接海祇岛本岛与渊下宫核心区的撤离与补给通道。将渊下宫建设成一个可退守、可研究、可生产的战略纵深基地，是一项庞大工程。但一旦完成，海祇岛将拥有一个近乎绝对安全的“地下家园”，极大增强其战略韧性，使其能在最极端的情况下，依然保有文明的火种与反击的希望。"

 SAN_Ancient_Civilization_Technology_Recovery:0 "古文明技术回收"
 SAN_Ancient_Civilization_Technology_Recovery_desc:0 "知识需要转化为力量。心海成立了专项的“技术转化小组”，任务是从白夜国浩如烟海的技术资料中，筛选出那些相对完整、有实现可能、且对海祇岛当下生存与发展有直接助益的项目，进行谨慎的复原实验。可能的方向包括：基于古代冶金术改进武器与工具材料；解读部分机关术，用于陷阱、防御工事或生产器械；研究古代农业与照明技术，改善渊下宫或本岛特定环境的生产生活条件；甚至尝试理解某些简单的能量应用装置。过程充满风险，古代技术往往依赖现代已不存在的材料或能量环境，强行复原可能导致事故。心海强调安全与渐进，反对盲目追求威力。每一项成功复原的微小技术，哪怕只是一个更高效的净水装置或一种更坚固的建筑粘合剂，都是实实在在的进步。古文明的技术回收，是一场与时间的赛跑，旨在将失落的智慧，重新锻造成支撑海祇岛未来的砖瓦。"

 SAN_The_Sunchildren_Redemption:0 "太阳之子的救赎"
 SAN_The_Sunchildren_Redemption_desc:0 "在探索中，一个令人心碎的发现可能浮出水面：关于“太阳之子”的传说与悲剧——那些被选为祭品，以维持某种仪式或秩序的孩童。相关的记载、遗迹甚至残存的意念，可能揭示白夜国历史中黑暗与残酷的一面。心海对此表现出深切的悲悯与尊重。她可能会下令，在发现相关遗迹的区域举行庄重的纪念仪式，告慰那些远古的亡魂，并将这段历史作为警示，写入海祇岛的内部教材。她强调，海祇岛追求的未来，绝不能重蹈以牺牲无辜者换取生存的覆辙。这份对古代悲剧的共情与反思，进一步塑造了反抗军的伦理内核：他们反抗暴政，不仅是为了生存，更是为了建立一个更加尊重生命、避免历史悲剧重演的新秩序。对“太阳之子”的纪念，成为了凝聚人心、明确斗争意义的道德灯塔之一。"

 SAN_Enkanomiya_Full_Integration:0 "渊下宫的完全整合"
 SAN_Enkanomiya_Full_Integration_desc:0 "当对渊下宫的探索、研究和基础建设达到一定阶段后，心海将推动其与海祇岛本岛社会的深度融合。这不仅仅是军事和技术的整合，更是文化与身份的再融合。有步骤地组织本岛的学者、匠人甚至部分民众，在严格安保下分批进入渊下宫参观学习，让他们直观感受先祖的故土与辉煌遗产。将渊下宫的历史有选择地纳入海祇岛的正式历史叙述，重塑“我们来自何处”的集体认知。在确保安全的前提下，尝试在渊下宫环境可控的区域，建立小型的常驻研究站、特色作物试验田甚至避难社区。目标是让渊下宫从一个神秘的“他处”，逐渐转变为海祇岛文明不可分割的“另一部分”，一个承载着过去、滋养着现在、也预备着未来的战略与文化腹地。完成整合的海祇岛，将成为一个拥有“表里”双重疆域的独特政体，其根基之深，韧性之强，将远超外界想象。"

 # 阶段5：提瓦特纵横
 SAN_Secret_Diplomacy_To_Liyue:0 "至璃月的秘密外交"
 SAN_Secret_Diplomacy_To_Liyue_desc:0 "锁国令下，与外国联络难如登天。但心海从未放弃寻找外部的支持与理解。她将目光首先投向了以商贸立国、拥有成熟外交智慧且与稻妻曾有往来的璃月。利用少数敢于穿越雷暴的亡命商船或海祇水师的精英，携带以珊瑚宫印章密封的密信，尝试接触璃月七星中可能对稻妻局势感兴趣或持同情态度的成员（如天权星凝光）。信中以务实、克制的笔调阐述眼狩令的暴政、海祇岛的抗争与诉求，不寻求直接的军事介入，而是希望建立秘密的贸易渠道（以海祇特产换取粮食、药品、布匹等必需品），获取非官方的外交声援与情报交流。这是一场豪赌，一旦密信被截获或璃月方面拒绝甚至告发，后果不堪设想。但若成功，海祇岛将获得一条宝贵的物资与信息“脐带”，打破锁国令的窒息封锁，并在提瓦特大陆的棋盘上，落下第一枚属于反抗军的棋子。"

 SAN_Contact_With_Mondstadt:0 "同蒙德的接触"
 SAN_Contact_With_Mondstadt_desc:0 "自由的城邦蒙德，其精神气质似乎与反抗压迫的海祇岛有共鸣之处。心海指示外交人员，在尝试联络璃月的同时，也寻找接触蒙德的途径。与璃月的务实不同，对蒙德的接触可能更侧重于理念的共鸣与人道主义的呼吁。密信可能提及“自由”的价值被践踏，寻求西风骑士团（尤其是与璃月有往来的骑兵队长凯亚，或图书管理员丽莎）的理解。同样不寻求直接军事援助，但希望获取一些蒙德在游击战、民兵组织等方面的经验（如果能以某种形式传递的话），或者通过蒙德的中立学者获取一些通用的科技与医学知识。蒙德远离稻妻，直接帮助有限，但其作为提瓦特重要一极的道义姿态，以及其民间冒险家与吟游诗人可能带来的舆论影响，仍具有价值。与蒙德的接触，旨在为海祇岛的斗争，涂抹上一层追求“自由”的普世色彩，争取更广泛的同情。"

 SAN_Academic_Exchange_With_Sumeru:0 "同须弥的学术交流"
 SAN_Academic_Exchange_With_Sumeru_desc:0 "智慧的国度须弥，拥有提瓦特顶尖的学术资源。心海对须弥的兴趣，主要集中于知识层面。她希望通过隐秘渠道，与须弥教令院中某些对古代文明、元素学、医学或社会制度有研究的学者建立联系。交换条件可能是提供海祇岛（尤其是渊下宫）独有的历史资料、生物样本或地质信息，以换取须弥学者在农业技术、基础医学、工程技术等方面的通用知识指导，或者对某些特定难题（如祟神能量缓解、特殊材料性质）的学术见解。这种交流可能通过中间商、匿名信件或在第三国（如璃月）秘密会面进行。风险在于知识可能被滥用，或海祇岛的秘密过早泄露。但心海相信，在严格控制下，获取须弥的智慧火花，能极大加速海祇岛的技术与知识积累，这是用金钱难以衡量的宝贵援助。"

 SAN_The_Fatui_Probe:0 "愚人众的试探"
 SAN_The_Fatui_Probe_desc:0 "愚人众，这个在稻妻暗中活跃、势力庞大的外国组织，其意图诡谲难测。心海对其抱有极高的警惕，但也不得不正视其存在与影响力。她命令情报部门加强对愚人众在稻妻诸岛活动的侦察，特别是他们与天领奉行、勘定奉行的接触，以及他们在踏鞴砂等地的活动。同时，在极端谨慎的前提下，不排除通过极其间接的渠道，尝试了解愚人众对稻妻局势的态度，甚至试探其是否可能成为短暂的、互相利用的“同路人”。心海深知与虎谋皮的危险，愚人众的“帮助”必然标有昂贵的价码，且可能包藏祸心。任何接触都必须设定不可逾越的红线，并做好随时切断一切联系的准备。对愚人众的试探，是在刀尖上获取情报与可能的短期利益，核心原则是“利用而不信任，接触而不依附”，绝不能让其渗透或控制反抗运动的方向。"

 SAN_Diplomacy_With_Inazuma_Dissidents:0 "同稻妻内部异见者的外交"
 SAN_Diplomacy_With_Inazuma_Dissidents_desc:0 "敌人内部并非铁板一块。眼狩令与锁国令在稻妻内部也积累了不满。心海积极寻求与鸣神岛及诸岛上对幕府政策持批评态度的家族、商人、学者乃至低级武士建立秘密联系。这些“内部异见者”可能提供宝贵的内幕信息，在物资采购、人员隐藏、舆论造势等方面提供帮助，甚至在关键时刻成为内应。接触需要万分小心，以防幕府间谍渗透。心海指示，重点接触那些有切实利益受损、且信誉经过交叉验证的个体或小团体，避免与背景过于复杂或动机不明者深交。对内部异见者的工作，旨在扩大反抗阵线，从内部削弱幕府的统治基础，营造一种“天下苦幕府久矣”的氛围。这些分散的火星，一旦与海祇岛的火焰合流，或将形成燎原之势。"

 SAN_Kamisato_Clan_Secret_Contact:0 "同神里家的秘密接触"
 SAN_Kamisato_Clan_Secret_Contact_desc:0 "三奉行之一，社奉行神里家，以其优雅的门风与相对开明的姿态著称。坊间传闻，其年轻的家主神里绫人对眼狩令似乎持有异议。心海将神里家列为最高优先级的内部接触对象。接触必须是极度隐秘和间接的，或许通过双方都信任的中间人（如某位游走各方的商人或艺术家），传递极其含蓄的信息。目的不是寻求结盟（这目前不现实），而是建立一种“默契的理解”：让神里家明白海祇岛抗争的底线与诉求，同时试探神里家在幕府内部所能发挥的缓和或制衡作用。即使不能成为盟友，若能使其保持中立，或在关键决策时施加一些有利于缓和局势的影响，便已是巨大的成功。与神里家的接触，是外交上最精细、风险也最高的一步棋，一旦暴露，对双方都是灾难。但若成功，可能为未来的政治解决打开一扇微小的窗。"

 SAN_Crux_Fleet_Alliance:0 "南十字船队的盟约"
 SAN_Crux_Fleet_Alliance_desc:0 "横行璃月至稻妻航线、不惧雷暴的“南十字”船队及其领袖北斗，是海祇岛突破封锁的绝佳助力。心海设法与北斗取得联系。与官方的外交辞令不同，与北斗的接触更直接、更江湖气。海祇岛可以提供安全的避风港、淡水和必要的维修支持（在隐秘地点），以及稻妻诸岛的部分情报；作为回报，希望南十字船队能在其商业航行中，偶尔、秘密地为海祇岛夹带一些紧急物资，或传递信息。北斗的船队独立不羁，与璃月官方若即若离，这种非正式的、基于利益与信任的“盟约”，可能比官方关系更灵活可靠。与北斗的合作，是为海祇岛脆弱的外交网络，增加了一条充满变数但潜力巨大的海上私掠线。"

 SAN_International_Publicity_Of_Vision_Hunt:0 "眼狩令的国际宣传"
 SAN_International_Publicity_Of_Vision_Hunt_desc:0 "舆论也是战场。心海指示外交与情报人员，在对外接触中，有意识地将眼狩令的残酷性与非人道性，作为核心宣传点。通过流亡者、商人的口耳相传，甚至伪造的“漂流瓶”书信等形式，向外界传递这样的信息：雷电将军的“永恒”是建立在剥夺子民梦想与希望的暴政之上。宣传力求真实、有细节（如神之眼被夺后人的消沉案例），避免空洞的口号，以引发外国民众与有识之士的同情与愤慨。目标不是立即引来干涉，而是在国际社会塑造一种不利于幕府的道德氛围，为未来可能的正式外交介入或制裁埋下伏笔，同时鼓舞稻妻国内的反抗士气。这是一场争夺人心的隐形战争，海祇岛要用真相作为武器，在提瓦特的舆论场中，为自身的抗争争取正当性。"

 SAN_Watatsumi_Trade_Route_Expansion:0 "海祇贸易航路的拓展"
 SAN_Watatsumi_Trade_Route_Expansion_desc:0 "随着与璃月、南十字船队乃至其他潜在外国接触者建立联系，心海开始着手系统性地规划和管理海祇岛的“秘密海上贸易网络”。这包括：建立几个绝密的装卸港口和临时锚地；设计复杂的航线和接头信号以躲避幕府巡查；统一采购清单，优先获取医疗用品、金属、书籍和特殊工具；建立一套以物易物或使用外国货币的结算体系。贸易网络的管理需要极高的保密性和纪律，心海可能指派最信任的官员专门负责。这条隐形的“海上生命线”，是海祇岛经济的血管，输入不可或缺的养分，输出多余的特产以换取资源。它的顺畅与否，直接关系到海祇岛的战争潜力和民生稳定，是除军事战线外，另一条必须坚守的生死线。"

 SAN_The_Resistance_International_Support:0 "反抗事业的国际支持"
 SAN_The_Resistance_International_Support_desc:0 "持续的外交努力与舆论宣传，可能开始收获零星但珍贵的实质性国际支持。这未必是官方承认，而可能表现为：某个璃月富商“匿名”捐赠的一批粮食；某位须弥学者“遗失”的一箱医学书籍与技术图纸；蒙德的冒险家协会“无意”中流传出的一些实用战斗技巧指南；甚至是通过南十字船队运来的、来源不明的少量制式武器。这些支持虽然量少且不稳定，但政治意义重大。它意味着海祇岛的抗争不再被世界完全忽视，开始获得超越国界的同情与援助。心海会珍视每一份支持，并确保其被有效利用，同时继续谨慎地扩大这种国际同情网络。国际支持的涓涓细流，正在汇聚，虽然尚未成势，但已为海祇岛孤悬海外的抗争，注入了来自更广阔世界的微光与希望。"

 # 阶段6：心海的兵略
  SAN_War_Art:0 "珊瑚宫流战法"
  SAN_War_Art_desc:0 "心海将她从《兵书》与实战中领悟的智慧，系统化为一套独特的“珊瑚宫流”军事学说。其核心是“全算”，即基于尽可能完整的情报，进行多情境推演与预案准备，追求“未战而先胜”或“以最小代价换取最大战果”。她强调指挥系统的扁平与灵活，赋予前线指挥官在预案框架内的临机决断权。战术上，极端重视情报、地形与天气的利用，推崇“正合奇胜”，即以小股精锐部队进行欺骗、佯动、破袭，主力则用于关键点的决定性一击。后勤与心理战被提到与正面作战同等重要的位置。心海亲自编写教材，并通过沙盘推演和实战复盘，向中高级军官灌输这一思想。珊瑚宫流战法，是力量弱势一方智慧的极致体现，它不追求华丽的胜利，只追求最有效率的生存与胜利，旨在将海祇岛有限的军事力量，锻造成一把精准而致命的匕首。"

 SAN_Amphibious_Warfare_Doctrine:0 "两栖作战学说"
 SAN_Amphibious_Warfare_Doctrine_desc:0 "稻妻是群岛之国，任何大规模军事行动都离不开渡海。心海大力发展专门的两栖作战理论与训练。这包括：针对不同海滩地形（沙岸、岩岸、红树林）的登陆与抗登陆战术；浪船部队的突击、运输与火力支援协同；登陆后的快速巩固滩头、向内陆突进的流程；以及从海上撤出部队的预案。训练在严格保密的海湾进行，模拟各种复杂情况。心海强调两栖作战的突然性、协同性与灵活性，反对僵硬的“抢滩”思维。她设想中的理想两栖战，应是“如海潮般悄然涌上，达成目标后又能迅速退去无踪”。这套学说，使海祇军初步具备了跨岛投送与打击的能力，虽然规模有限，但极大地扩展了其战略选择，使其能从意想不到的海岸，对幕府控制的岛屿构成威胁。"

 SAN_Guerrilla_Warfare_Tactics:0 "游击战战术"
 SAN_Guerrilla_Warfare_Tactics_desc:0 "这是海祇军在实力对比下最主要的生存与作战方式。心海与五郎将游击战术提炼升华，总结出“海祇游击十要”：包括“敌进我退，敌驻我扰，敌疲我打，敌退我追”的机动原则；依托村落、山林、洞穴建立“鱼水”般的群众基础与补给网络；擅长设置各类陷阱与诡雷；精于伏击运输队与小股敌军；重视战果评估，避免贪功恋战。部队被编成大量灵活的小分队，深入敌后或战线间隙活动，主要目标不是歼灭敌军，而是破坏其交通、通讯、补给，消耗其士气与精力，收集情报，并伺机打击薄弱环节。游击战如同附骨之疽，让庞大的幕府军陷入人民战争的泥潭，处处受制，疲于奔命，却难以捕捉到反抗军的主力。"

 SAN_Watatsumi_Elite_Troops:0 "海祇精锐部队"
 SAN_Watatsumi_Elite_Troops_desc:0 "在普遍进行游击战的同时，心海也深知需要一支能在关键时刻执行高难度任务的“拳头”部队。她从全军选拔最出色的士兵，组建了如“海祇之牙”突击队、“逐影”狙击小队等精锐单位。他们装备最好的武器，接受最严苛的训练：包括高强度体能、精准射击、爆破、潜入、伪装、多语言基础等。他们不参与一般治安或消耗战，只执行心海或五郎直接指挥的关键任务：如斩首行动、营救重要人员、破坏核心设施、在敌后制造大规模混乱等。这些精锐是海祇军锋利的獠牙，虽然人数不多，但往往能起到四两拨千斤的战略效果。他们的存在，也成为了普通士兵奋斗的标杆，激励着全军向更高标准看齐。"

 SAN_Intelligence_Battle_Command:0 "情报战指挥体系"
 SAN_Intelligence_Battle_Command_desc:0 "心海将情报工作提升到战略核心地位，建立了高效的情报战指挥体系。在珊瑚宫下设“谋报局”，统一管理所有对外侦察、对内反谍、密码破译、舆论分析与心理战策划。心海本人是最高决策者，每日花费大量时间阅读分析情报摘要。她强调情报的时效性、准确性与分析深度，反对未经甄别的信息泛滥。建立了严格的情报分级与知密范围制度。同时，积极对幕府开展欺骗行动，散布假情报，误导其判断。这套体系使得海祇军往往能“先知先觉”，在幕府做出反应前就已调整部署。情报优势，成为了海祇岛在战场上最重要的非对称优势之一，是心海“全算”战法得以实施的基础。"

 SAN_Supply_Line_Interdiction_Strategy:0 "补给线遮断战略"
 SAN_Supply_Line_Interdiction_Strategy_desc:0 "面对总体实力占优的幕府军，正面消耗极为不利。心海制定了系统的“遮断”战略，将敌方漫长的海上与陆地补给线作为主要攻击目标。她命令海军、游击队和精锐小队，持续不断地袭击幕府的运输船队、沿海仓库、陆上辎重队。攻击讲究时机与方式：或在风暴天气后敌船队散乱时出击，或利用内应破坏仓库，或在险要路段设伏。目标不仅是摧毁物资，更是要瘫痪其运输体系，迫使前线幕府军陷入缺粮少弹的困境，从而被迫推迟或削弱其进攻行动。这项战略需要精确的情报和长期的耐心，效果不会立竿见影，但如同缓慢收紧的绞索，从根基上削弱着对手的战争能力，是海祇岛以弱制强的关键长期战略之一。"

 SAN_Psychological_Warfare_Operations:0 "心理战行动"
 SAN_Psychological_Warfare_Operations_desc:0 "心海深谙“攻心为上”。她主导的心理战行动多样而隐蔽：在幕府军控制区秘密散发传单，揭露眼狩令不公、高层腐败或战争无望；利用伪装成民间歌谣的故事，传唱海祇岛抗争的正义性与幕府士兵无谓的牺牲；通过内线，在幕府军中散布诸如“雷神已不再回应祈祷”、“某次战败损失惨重被隐瞒”等动摇军心的谣言；甚至对特定幕府将领进行个性化的恫吓或劝诱。心理战的目的在于瓦解敌方斗志，争取中间派，鼓舞己方士气。心海要求心理战必须基于事实或巧妙编织，避免低劣的辱骂，以增强可信度。这场无形的战争在战场之外展开，旨在侵蚀幕府统治的精神根基，为最终的物理胜利创造条件。"

 SAN_Watatsumi_Army_Modernization:0 "海祇军现代化"
 SAN_Watatsumi_Army_Modernization_desc:0 "随着时间推移与资源（包括渊下宫技术转化和国际贸易）的积累，心海开始推动海祇军的有限现代化。重点不在于追求最先进的武器，而在于“体系化”和“标准化”：统一并优化现有的武器装备制式，提高后勤兼容性与维修效率；建立更专业的工兵、通讯兵、医疗兵等辅助兵种；改善部队的单兵装备，如更合身的护甲、更耐用的靴子、更科学的单兵口粮；引进或仿制一些实用的技术装备，如改良的望远镜、简单的信号装置、更高效的净水器。同时，完善军队的层级编制、条令条例和训练大纲。现代化是一个渐进过程，旨在稳步提升海祇军的整体作战效能、持久作战能力和职业化水平，使其从一支优秀的“起义军”，向更正规的“国防军”方向演进。"

 SAN_Island_Hopping_Campaign_Plan:0 "越岛作战计划"
 SAN_Island_Hopping_Campaign_Plan_desc:0 "在防御稳固的基础上，心海开始构思更具主动性的战略——越岛作战。其核心思想是：不寻求一次性占领所有岛屿，而是像下棋一样，选择幕府防御链条上最薄弱、最具战略价值的岛屿节点，集中优势海陆力量，进行快速突击、占领并巩固，将其变为新的前沿基地。然后以此为基础，威胁或切断邻近岛屿幕府军的联系，迫使其收缩或孤立。计划需要周密的联合两栖作战、强大的海上掩护能力和快速构筑防御工事的能力。目标可能是进一步压缩幕府在西部诸岛的存在，或建立直接威胁鸣神岛的跳板。越岛作战计划是心海战略思维从“求存”向“谋势”转变的标志，虽然执行风险极高，但一旦成功，将彻底改变稻妻的力量对比，将战争引向幕府的核心区域。"

 SAN_The_Art_Of_War_By_Kokomi:0 "心海兵法的结晶"
 SAN_The_Art_Of_War_By_Kokomi_desc:0 "历经无数战火的淬炼与无数不眠之夜的推演，心海的军事思想最终凝结成一部属于海祇岛自己的、活的战争艺术。它没有固定的条条框框，其精髓在于“因敌变化而取胜”。它融合了古代兵法的智慧、海祇特色的地理文化、弱势者的生存哲学，以及心海个人对人性与战略的深刻洞察。这部“兵法”体现在每一次精准的伏击、每一次成功的撤退、每一份巧妙的情报欺骗、每一次对士气精妙的提振之中。它被军官们心领神会，被士兵们自觉践行。心海本人，就是这部兵法最完美的执行者与化身。她运筹帷幄之中，决胜千里之外，以超凡的智慧与坚韧的意志，指挥着一支弱小的军队，与一个庞大的国度进行着一场看似不可能的战争。“心海兵法”，已成为海祇军战无不胜的精神图腾与最高指导原则。"

 # 阶段7：正邪交锋
 SAN_Expose_The_Fatui_Conspiracy:0 "揭露愚人众阴谋"
 SAN_Expose_The_Fatui_Conspiracy_desc:0 "心海决定主动出击。在确保控制内部受影响人员并获取确凿证据后，她策划了一场精心设计的舆论战。通过秘密渠道，将邪眼工厂的部分证据、愚人众活动的线索，以及其与幕府内部某些人暧昧关系的暗示，巧妙地泄露给鸣神岛的异见者、外国商人，甚至尝试传递给社奉行。她并不指望一次就扳倒愚人众或幕府，而是要达成多重目的：在国际上和稻妻内部破坏愚人众的声誉；离间愚人众与幕府中合作者的关系；向所有关注稻妻局势的人揭露这场战争背后还有第三只黑手；同时洗刷反抗军被“愚人众操控”的污名。这是一场高风险的信息博弈，心海如同在悬崖边释放信鸽，希望它们能将真相的种子，播撒到更远的土地，即便有些种子会落入敌手。但为了反抗事业的纯洁与未来，她必须亮剑。"

 SAN_Purge_Fatui_Influence:0 "肃清愚人众影响"
 SAN_Purge_Fatui_Influence_desc:0 "舆论战之外，内部的肃清与整顿同步展开。心海以铁腕与怀柔并用的方式，处理受邪眼影响的士兵与可能被渗透的环节。对于大多数受骗使用的士兵，以治疗、教育与隔离观察为主，强调他们也是受害者，但同时明确禁止邪眼的严令。对于少数与愚人众有较深勾连或主动散布者，则进行秘密审查与处置。整个反抗军体系进行了一次保密与忠诚教育的强化。同时，心海借机整顿内部，进一步强化珊瑚宫的权威与对全军的控制力，清除任何可能的不稳定因素。过程难免有阵痛与猜疑，但心海以公开、透明（在可公开的范围内）的态度处理，最终将危机转化为强化组织凝聚力与纯洁性的契机。经此一役，反抗军对愚人众的警惕提到最高，内部更加团结，心海的领导地位也更为巩固。"

 SAN_The_Tragedy_Of_Tezuka:0 "哲平的悲剧"
 SAN_The_Tragedy_Of_Tezuka_desc:0 "邪眼并非冰冷的阴谋，它吞噬的是活生生的生命与梦想。像哲平这样满怀热血、渴望快速变强以守护同伴的年轻士兵，成为了悲剧的缩影。他的急速衰老与消逝，在海祇军内部引发了巨大的情感冲击与道德反思。心海亲自处理其后事，并以他的故事为戒，在军中进行了一场关于“力量代价”与“抗争意义”的深入讨论。她强调，反抗是为了守护生命与未来，任何以透支生命为代价换取的力量，都是对反抗初衷的背叛。哲平的悲剧被铭记，不是为了渲染悲伤，而是为了明确底线：海祇岛的战士，绝不能变成被仇恨与捷径驱使的怪物。他们必须清醒、健康地活着，去见证并建设他们所争取的未来。这份悲恸，化为了更坚定的意志与更清醒的认知。"

 SAN_Final_Offensive_To_Kannazuka:0 "向神无冢的总攻"
 SAN_Final_Offensive_To_Kannazuka_desc:0 "时机终于成熟。在长期袭扰、情报优势、以及可能的内应策动下，心海与五郎判断，盘踞神无冢的幕府军主力已显出疲态与缝隙。一场精心策划的总攻势在黎明前最黑暗的时刻发动。这不是传统的正面强攻，而是多路并进的“组合拳”：精锐小队潜入破坏关键防御设施与指挥部；两栖部队在多个次要海滩同时登陆，制造混乱；主力则从预设的隐秘通道，向九条阵屋核心区域发起迅猛突击。心海的“全算”推演在此刻发挥到极致，几乎预判了幕府军大部分的反应。战斗激烈而残酷，但反抗军准备充分，战术灵活，士气如虹。当朝阳照亮神无冢的海岸时，九条阵屋的幕府旗帜已然落下，燃烧的营寨与溃散的士兵宣告了海祇军战略上的重大胜利。通往鸣神岛的大门，被砸开了一道裂缝。"

 SAN_The_Battle_Of_Nazuchi_Beach:0 "名椎滩之战"
 SAN_The_Battle_Of_Nazuchi_Beach_desc:0 "名椎滩，这片饱经战火洗礼的滩涂，再次成为决定性的战场。溃退的幕府军一部与来自鸣神岛的援军在此汇合，试图建立防线，阻截海祇军向鸣神岛的进军。心海与五郎决心在此歼灭其有生力量。战斗在涨潮时开始，海祇军利用对潮汐的熟悉，以部分兵力正面牵制，主力则乘浪船绕至敌军侧后，在礁石区登陆，发起致命夹击。五郎身先士卒，其勇武极大鼓舞了全军。幕府军背水列阵，抵抗顽强，但被迂回部队打乱了阵脚。战斗从清晨持续到午后，鲜血染红了浅滩与海水。最终，幕府军防线崩溃，残部向鸣神岛溃逃。名椎滩之战，是海祇军从战略防御转向战略进攻的里程碑，证明了其已具备在正面野战中击败幕府正规军的能力，极大地震撼了鸣神幕府。"

 SAN_March_To_Narukami_Island:0 "向鸣神岛进军"
 SAN_March_To_Narukami_Island_desc:0 "跨越浩瀚的雷暴之海，将战火引向雷电将军座下的核心领土——鸣神岛，这是一个历史性的时刻，也是极度危险的豪赌。庞大的海祇军舰队在夜雾与风暴的掩护下启航，战士们怀抱着必死的决心与改变时代的渴望。航行充满风险，不仅要面对变幻莫测的海洋与雷暴，更要警惕幕府海军的拦截。心海坐镇中枢，通过快船传递指令，调整航向与队形。当鸣神岛模糊的海岸线出现在晨雾中时，所有人的心都提到了嗓子眼。登陆地点经过精心选择，并非防守最严密的离岛，而是更偏远的、防御相对薄弱但能快速向纵深发展的海岸。抢滩战斗依然激烈，但凭借突然性与前期准备，海祇军成功建立了稳固的滩头阵地。反抗军的旗帜，数百年来第一次飘扬在了鸣神岛的土地上。这一步，意味着战争进入了最后，也是最危险的阶段。"

 SAN_The_Fall_Of_Kujou_Encampment:0 "九条阵屋的陷落（鸣神岛）"
 SAN_The_Fall_Of_Kujou_Encampment_desc:0 "在鸣神岛建立的滩头阵地迅速扩大，兵锋直指幕府在岛上的重要军事支点——某处由九条家直属部队驻守的大型营寨（可能是游戏内“九条阵屋”在鸣神岛的对应设施）。此时幕府内部因前线连败、邪眼阴谋曝光以及海祇军登陆核心领土而陷入巨大混乱，守军士气低落。海祇军没有强攻，而是采取围困与心理攻势结合。心海派人将劝降信射入营中，列数眼狩令之弊与战争无益，并承诺优待投降者。同时，小股部队不断袭扰，切断其水源与外联。在内无粮草、外无援兵、士气崩溃的情况下，守军将领在经过短暂抵抗后，最终开寨投降。此役不仅拔除了一个关键军事据点，获得了大量补给，更产生了巨大的政治与心理影响：象征着幕府军事权威的九条家部队成建制投降，极大地打击了幕府的威信，动摇了其他守军的抵抗决心。"

 SAN_The_Shogunate_Political_Crisis:0 "幕府的政治危机"
 SAN_The_Shogunate_Political_Crisis_desc:0 "军事上的连续失败，如同重锤，敲碎了幕府统治看似坚固的外壳，其内部长期积累的矛盾与裂痕彻底爆发。天领奉行九条家因战事不利和可能与愚人众勾结的嫌疑（被心海巧妙放大）而声望扫地，内部争论不休；勘定奉行柊家只顾自保，对战争支援消极；社奉行神里家态度愈发微妙。普通民众与下级武士中对眼狩令与战争的不满情绪如野火蔓延。甚至有流言称，雷电将军本人已长久未公开现身。整个鸣神岛的统治体系陷入了功能紊乱和信任危机。心海敏锐地捕捉到这一变化，她命令部队在军事推进的同时，加强政治宣传，强调只追究上层责任，保护平民与反正人员，进一步分化瓦解幕府的统治基础。幕府，这个庞大的机器，正在从内部发出不堪重负的嘎吱声。"

 SAN_The_Duel_At_Tenshukaku:0 "天守阁前的决斗"
 SAN_The_Duel_At_Tenshukaku_desc:0 "战争的高潮，最终以最具有稻妻传统色彩的方式到来——御前决斗。当反抗军兵临稻妻城下，局势紧绷到极致时，或许是来自内部的压力，或许是将军本人的意志，一场决定战争走向的决斗在天守阁前上演。代表反抗军出战的，可能是继承了友人遗志的枫原万叶，也可能是其他心怀觉悟的勇士。而他们的对手，是代表将军威严的九条裟罗，或是其他幕府顶尖高手。决斗不再仅仅是武艺的比拼，更是两种理念、两种未来的碰撞。整个稻妻，似乎都在这场决斗中屏住了呼吸。心海在远方营帐中，通过情报密切关注着每一瞬的胜负。她知道，这一战的结果，将直接决定是需要惨烈的攻城战，还是可能迎来政治的转机。当决斗者的刀剑最后一次交击，胜负分晓的刹那，无论结果如何，稻妻的历史都已被永久改变。"

 # 阶段8：海祇终章
 SAN_The_End_Of_Vision_Hunt_Decree:0 "眼狩令的终结"
 SAN_The_End_Of_Vision_Hunt_Decree_desc:0 "决斗的余响尚未散去，一道震动全国的命令（或意志的体现）自天守阁传出：眼狩令，即刻废止。被收缴的神之眼将陆续归还。对于饱受其苦的稻妻民众和海祇反抗军来说，这无疑是黑暗中的第一道曙光，是无数牺牲换来的最直接成果。消息传开，海祇军营地与占领区爆发出震天的欢呼，许多士兵相拥而泣。心海在松了一口气的同时，保持着清醒的审慎。她立刻下令全军，严禁借此机会进行任何报复或劫掠，要表现出比幕府更佳的纪律与风度。同时，她迅速通过公开渠道，欢迎这一决定，并将其视为迈向和平的第一步。但她也深知，废止一道法令易，消除数百年的隔阂与战争创伤难。眼狩令的终结，不是终点，而是一个全新、更复杂局面的开始。海祇岛，站在了历史的十字路口。"

 SAN_Peace_Talk_With_Shogunate:0 "同幕府的和谈"
 SAN_Peace_Talk_With_Shogunate_desc:0 "在剑拔弩张的军事对峙与眼狩令废止带来的缓和气氛下，和平的窗口终于出现。在心海的积极推动与社奉行等势力的斡旋下，海祇岛与幕府的代表，在某个中立地点（或由第三方见证）开始了艰难的和平谈判。心海为谈判设定了清晰的核心目标：保障海祇岛的信仰与文化自治；追究战争责任（特别是与愚人众勾结者）；合理的战后补偿与地位安排；以及确保类似眼狩令的暴政不再发生。谈判桌上唇枪舌剑，桌下暗流涌动。心海运筹帷幄，既展现和谈诚意，也在军事上保持适度压力，以打促和。每一次条款的敲定，都伴随着激烈的博弈与妥协。这是对她政治智慧与耐心的终极考验。和谈的成功与否，将决定稻妻是走向持久的和平，还是陷入新一轮的动荡。"

 SAN_Watatsumi_Independence:0 "海祇独立"
 SAN_Watatsumi_Independence_desc:0 "经过艰苦卓绝的战斗与谈判，海祇岛赢得了其梦寐以求的地位——作为一个高度自治的政体，正式脱离幕府的直接统治，与鸣神岛在全新的、更平等的基础上构建关系。独立的宣言在珊瑚宫前广场宣读，海祇旗在万众瞩目中升起，古老的歌谣再次响彻云霄。人们欢庆自由，告慰先烈。心海站在高台上，望着欢腾的人群，心中百感交集。独立不是终点，而是更艰巨建设的起点。她立即着手组建正式的治理机构，制定宪法，整合军队为国家防卫力量，并开始规划战后的经济重建与社会融合。国际社会开始陆续承认这个新生的国度。海祇独立，是武力与智慧共同铸就的奇迹，为一个受压迫的文明赢得了自主决定命运的权利，在提瓦特的地图上，刻下了属于自己的一笔。"

 SAN_Reform_The_Inazuma_Shogunate:0 "改造鸣神幕府"
 SAN_Reform_The_Inazuma_Shogunate_desc:0 "另一种可能的选择是：海祇岛不寻求分离，而是以胜利者和改革者的姿态，深度介入并改造战败的鸣神幕府。心海可能凭借其巨大的威望、军事实力与社奉行等内部改革派的支持，推动一场自上而下的全面改革：废除陈腐的三奉行垄断体制，建立更具代表性的议会或咨询机构；清算战争罪犯与腐败官僚，提拔有能力的新人；修改法律，保障包括海祇信仰在内的各文化族群权利；将眼狩令、锁国令等错误政策彻底扫入历史垃圾堆。这意味着一场不流血的“革命”，心海可能成为摄政或类似的关键角色。这条路充满挑战，需要平衡各方利益，化解千年积怨，但其成功，将缔造一个统一、革新、更具活力的新稻妻，彻底终结内部纷争的循环。"

 SAN_The_Reconciliation_Of_Orobashi_And_Electro_Archon:0 "大蛇与雷神的和解"
 SAN_The_Reconciliation_Of_Orobashi_And_Electro_Archon_desc:0 "在最高的神话与精神层面，促成一种象征性的、超越世仇的和解。这可能需要揭示被掩埋的历史真相（或许来自渊下宫），让双方子民理解，奥罗巴斯与雷电影之间的悲剧，并非简单的正邪对立，而是源于更复杂的远古缘由或误解。心海与重拾自我的雷神（影）或许会进行一场穿越历史的对话，共同纪念逝者，抚平伤痕。在海祇岛与鸣神岛分别建立纪念遗址，将这段历史以完整、反思的姿态写入教科书。这种精神上的和解，旨在从根本上消弭两族之间基于神话叙事的精神仇恨，为未来的和平共处奠定最深的情感与文化基石。它意味着原谅，但不忘却；意味着放下，但需铭记教训。这是最为艰难，也最为崇高的一种终结纷争的方式。"

 SAN_Unify_The_Inazuma_Islands:0 "统一稻妻诸岛"
 SAN_Unify_The_Inazuma_Islands_desc:0 "以海祇岛为核心，通过军事胜利、政治联盟与人心所向，最终将分裂的稻妻诸岛重新整合为一个统一的国家。这个新国家不再以鸣神岛的“幕府”为单一中心，而是可能采用联邦或邦联制，充分尊重各岛（海祇、清籁、鹤观等）的文化独特性与自治权。心海可能成为这个新生联邦的首任执政官或精神领袖。统一的过程伴随着最后的军事行动（清剿负隅顽抗者）和复杂的政治谈判。需要制定统一的宪法，组建联合政府与国防军，协调各岛经济。这标志着“稻妻”这个概念的重生，从一个以雷电将军与鸣神文化为中心的帝国，转变为一个多元一体、共同发展的岛国联盟。海祇的抗争，最终不是为了取代一个暴君，而是为了创造一个属于所有稻妻人的、更好的新国家。"

 SAN_Watatsumi_Maritime_Hegemony:0 "海祇的海上霸权"
 SAN_Watatsumi_Maritime_Hegemony_desc:0 "凭借战争中锻炼出的强大水师、对诸岛航路的控制以及渊下宫可能带来的技术优势，战后，海祇岛致力于确立其在稻妻海域乃至更大范围内的海上主导权。大力发展造船业，建造融合了传统与古代科技的先进战舰；建立系统的海上贸易保护与航线管理体系；将海军建设为国家支柱。海祇的商船与舰队将活跃在提瓦特各条航线上，其海军基地成为地区安全的保障。这不仅是军事与经济战略，更是将海祇文明的影响力推向世界的方式。心海可能倡导基于海洋合作、自由贸易与共同安全的“海祇秩序”，与璃月、枫丹等海洋国家展开深度合作。海祇岛，将从陆缘的“边缘之地”，转变为拥抱蔚蓝、连通世界的海洋强国，其命运与浩瀚的海洋紧紧绑定。"

 SAN_The_Watatsumi_Commonwealth:0 "海祇联邦"
 SAN_The_Watatsumi_Commonwealth_desc:0 "心海可能为她所缔造的新国家，选择一条更具包容性与现代性的政治道路——建立“海祇联邦”。其政体可能结合了代议民主、精英治理与传统信仰顾问团，既保障民权，又确保决策的效率与智慧。宪法明确规定信仰自由、文化平等与司法独立。经济上鼓励创新与贸易，社会福利体系开始建立。教育系统融合了海祇、鸣神乃至提瓦特通用知识。外交上奉行和平、开放与中立。这个联邦不仅是海祇人的家园，也欢迎所有认同其理念的稻妻子民。它象征着一种不同于传统神权或军国统治的新可能，一个在战火废墟上建立的、试图兼顾秩序、自由与多元的崭新国度。心海的理想，从兵书中的谋划，变成了现实中正在生长的国家蓝图。"

 SAN_The_Legacy_Of_The_Sea_God:0 "海神的遗产"
 SAN_The_Legacy_Of_The_Sea_God_desc:0 "最终，无论走向独立、统一还是联邦，海祇岛的抗争与新生，都被视为对海祇大御神奥罗巴斯遗产最真正的继承与升华。祂带领先民走出深渊，寻找光明；而心海带领子民冲破暴政，赢得尊严与未来。奥罗巴斯的牺牲精神、守护意志，在新的时代被赋予了全新的实践内涵。海祇文化不再是被边缘化的异质文化，而是稻妻文明多元瑰宝中不可或缺的灿烂一枝。海祇的子民，可以坦然地为自己的血脉与传统自豪。这份“遗产”，是深入血脉的韧性，是追求自由的勇气，是守护家园的智慧，也是面向未来的开放胸襟。它激励着一代代海祇人，同时也成为提瓦特世界一个关于小国不屈、文明存续的永恒传奇。心海与她的同胞们，用行动为“海神的遗产”写下了最辉煌的当代注脚。"

 SAN_The_Glory_Of_Watatsumi:0 "海祇的荣光"
 SAN_The_Glory_Of_Watatsumi_desc:0 "当硝烟散尽，和平降临，重建的旗帜在废墟上扬起，海祇岛迎来了前所未有的“荣光时代”。这荣光，并非指称霸的虚荣，而是指：一个曾经贫瘠、受压的岛屿，通过不屈的抗争与卓越的智慧，赢得了自主、尊严与繁荣；其独特的文化得以弘扬，其子民安居乐业；其开创的政治 experiment 为地区带来稳定与希望；其故事激励着所有追求自由与正义的心灵。珊瑚宫在扩建后更加宏伟，成为政治与文化的中心；港口商船云集，街市充满活力；学堂里传来孩童的读书声，其中既有古老的歌谣，也有世界的知识。心海或许逐渐退居幕后，担任精神领袖，将治国重任交给新一代。海祇岛，如同一颗历经磨难终被拭去尘埃的珍珠，在提瓦特的东海上，散发着温润而坚定的光芒。这荣光，属于每一个为之奋斗过的平凡英雄，属于那位在激流中稳操舵盘的现人神巫女，也属于那片永不屈服于黑暗的、渊海与星空之间的土地。"

 #### 阶段1：海祇凝心（1-10）
 # 1. 海祇部族的团结
 SAN_Event.1.t:0 "海祇部族的团结"
 SAN_Event.1.d:0 "月光如银纱般轻柔地笼罩着珊瑚宫，海潮声在殿外规律地起伏，如同这座岛屿亘古的呼吸。殿内，鲸脂蜡烛的光晕在精致的贝雕壁面上跳动，映照着聚集于此的众多面孔——他们是海祇岛血脉的延伸，是分散在诸岛湾岬、依赖着贫瘠土地与变幻莫测的海洋为生的各部族首领与长老。有人身着简朴的渔夫短褂，指节粗大，带着海风与盐粒的痕迹；有人披着象征古老传承的巫祝长袍，眼神深邃，仿佛能看透海渊之下的过往；还有沉默的匠人代表，手中把玩着发出微光的珊瑚片。空气中弥漫着海藻的咸腥、淡淡的焦虑，以及一丝若有若无的、对未知未来的期盼。所有人的目光，最终都落在大殿尽头那位静立于海祇大御神神龛前的少女身上——珊瑚宫心海。她手中并未持握象征权柄的法器，只是轻轻拢着一卷泛黄的海图，声音不高，却清晰地穿透了细碎的议论声：‘眼狩令的雷云已压境，锁国令的壁垒隔绝了外海的微风。海祇的子民们，是继续如散落的珍珠，在各自治的浅滩中独自面对即将来临的暴风雨，还是让我们的血脉重新汇聚，如同祖先追随大御神的珊瑚枝走向光明那般，共同编织一张能抵御惊涛的巨网？’ 她摊开海图，上面不仅勾勒着海祇诸岛，还隐约标注着外海的航路与潜在的盟友。这不是一次命令，而是一场关乎存亡的盟约邀请，一个将分散的力量拧成一股绳的历史契机。团结，或是分裂，海潮将见证今夜的抉择。"
 SAN_Event.1.a:0 "以海祇血脉为纽带，呼唤古老的盟誓"
 SAN_Event.1.b:0 "以现实利益为基石，缔结全新的契约"

 # 2. 现人神巫女的智慧
 SAN_Event.2.t:0 "现人神巫女的智慧"
 SAN_Event.2.d:0 "‘现人神巫女’——这个称谓在海祇岛承载着超越世俗领袖的重量。她是大御神奥罗巴斯意志在现世的凭依，是连接深海历史与当下生活的桥梁，更是战时凝聚一切的精神图腾。心海深知，在危机迫近的当下，仅凭信仰与传统赋予的模糊权威是脆弱的。她需要将这份源自神性与民心的威望，转化为清晰、高效、且令人信服的治理能力。变革如同深海暗流，悄然却坚定地展开：古老的、基于部族习惯的仲裁方式被更成文、更公正的律例雏形所补充；珊瑚宫的巫女与文书官们被重新编组，职责明确，效率被置于首位；一套基于功绩与能力的晋升阶梯，开始在初具雏形的反抗军体系中试行，打破了旧有的门户之见。她亲自审理复杂的纠纷，裁决迅速而公正，令人口服心服；她走入最偏远的渔村，蹲在礁石边倾听老渔民对洋流变化的忧虑。渐渐地，‘心海大人’的称呼里，那份源自传统的敬畏，悄然融入了发自内心的信赖与追随。她并非以神权压人，而是以无可挑剔的勤勉、洞悉人心的智慧与对这片土地深切的担当，让每一位海祇子民确信，跟随这位巫女的引领，是在迷雾笼罩的航道上，所能找到的最可靠的灯塔。权威，在她手中，从缥缈的神谕化为了切实的希望。"
 SAN_Event.2.a:0 "强化仪典与律法，构筑神圣不可侵犯的权威"
 SAN_Event.2.b:0 "深入民间体察疾苦，以智慧与仁德赢得由衷拥护"

 # 3. 海祇大御神的遗志
 SAN_Event.3.t:0 "海祇大御神的遗志"
 SAN_Event.3.d:0 "奥罗巴斯，那位身躯蜿蜒如山峦、曾以珊瑚枝为子民照亮通往地面之路的蛇神，其陨落于无想刃狭间的悲壮史诗，从未在海祇人的记忆与歌谣中褪色。祂不仅是信仰的图腾，更是牺牲、庇护与不屈抗争的终极象征。心海敏锐地意识到，在面临外部高压与内部迷茫的时刻，重新点燃这份深植于族群灵魂深处的集体记忆，比任何物质激励都更为有力。她下令系统整理散落于各处的古老颂词、壁画与口述历史，尤其着重描绘大御神为保护子民甘愿承受雷神‘无想的一刀’的决绝。祭祀仪式被赋予了新的内涵，从单纯的缅怀，转变为战前的动员与信念的淬炼。战士们开始被教导，他们手中的刀剑与船桨，不仅是为了守护今日的家园，更是为了继承那位古老守护者‘即便身陨，亦要护得子民周全’的永恒遗志。这份源于共同神话与悲壮历史的认同感，如同深海中无声却强大的洋流，将来自不同村落、有着不同顾虑的海祇人紧紧联结在一起，孕育出远超物质条件的坚韧斗志与内部团结。大御神的遗志，不再是尘封的故事，而化作了指引现实斗争的精神火炬，照亮前路，亦温暖人心。"
 SAN_Event.3.a:0 "隆重祭祀，宣扬大御神的牺牲与守护精神"
 SAN_Event.3.b:0 "将神话遗产与当前抗争结合，塑造抗争的天然合法性"

 # 4. 海祇经济的重构
 SAN_Event.4.t:0 "海祇经济的重构"
 SAN_Event.4.d:0 "海祇岛的贫瘠是刻在骨子里的——多山少地，土壤贫瘠，农业收获时常仰赖天时；渔业虽盛，但在幕府锁国与潜在的海上封锁威胁下，出海的渔船也成了风险莫测的赌注。依赖单一产业和有限外部输入的经济结构，在战时如同建立在流沙上的堡垒。心海与她的幕僚们挑灯夜战，海图与账本铺满了珊瑚宫偏殿的长桌。一幅艰难但必须实现的蓝图逐渐清晰：利用岛上特有的发光珊瑚、珍稀珍珠贝类与海灵芝，发展高附加值的工艺品与药材加工业；鼓励在岩缝与梯田尝试种植耐盐碱的改良作物；建立一套由珊瑚宫中枢统筹的物资储备与配给制度，以应对可能的长期围困。更冒险的是，开始秘密规划几条穿越雷暴、绕开幕府巡查的非官方海上贸易线路，目标直指璃月甚至更远的港口，用海祇特产换取粮食、金属与书籍。每一项举措都伴随着巨大的阻力与不确定性，老旧的习惯、技术的匮乏、资源的短缺如同无数暗礁。但心海明白，没有经济上的自主与韧性，军事上的反抗与政治上的独立都将是空中楼阁。这场静默无声的经济重构，其战略意义不亚于任何一场轰轰烈烈的战役，它旨在为海祇岛这艘即将驶入风暴的小舟，锻造出足以抗风浪的龙骨与船帆。"
 SAN_Event.4.a:0 "集中资源，优先保障军事相关产业与战略储备"
 SAN_Event.4.b:0 "平衡发展，侧重民生经济以稳定社会根基"

 # 5. 珊瑚宫智囊团的成立
 SAN_Event.5.t:0 "珊瑚宫智囊团的成立"
 SAN_Event.5.d:0 "‘真珠之智’的美誉并未让心海陷入独断。她深知，个人的智慧终有极限，而海祇岛的未来需要汇聚众星的光芒。于是，一道不拘一格的征召令悄然发出：不仅有熟知兵法、经历过幕府军制的前武士，精通建筑、水利的工匠，还有那些记忆力惊人、能吟唱数十部古老叙事诗、其中或许藏着地理或历史线索的盲眼歌者；甚至包括少数因各种原因流落至此、对幕府内部或外国情势有所了解的异乡人。这些背景迥异、思维活跃的头脑被汇聚到珊瑚宫旁一处幽静的别院，形成了一个非正式的‘淀海之思’智囊团。他们的任务并非处理日常政务，而是进行天马行空又严谨务实的‘海图推演’：模拟幕府军可能的多线进攻路线；评估海祇岛每一处海湾、每一条暗流的防御价值与开发潜力；研究提瓦特历史上弱势势力成功周旋的案例；甚至设想与璃月七星、蒙德骑士团或须弥教令院接触的各种可能情境与预案。这里没有绝对的权威，只有思想的碰撞。心海时常悄然莅临，倾听那些大胆甚至离奇的构想，时而发问，时而引导。这座智囊团，如同为海祇岛这艘航船加装的、能望见风暴与暗礁的瞭望塔，它不直接掌舵，却能为掌舵者提供更广阔的视野与更丰富的航路选择，让每一次重大决策，都建立在无数可能性与风险评估的坚实基底之上。"
 SAN_Event.5.a:0 "广开言路，鼓励发散思维与跨领域碰撞"
 SAN_Event.5.b:0 "聚焦关键，围绕最紧迫的战略与生存问题深度研讨"

 # 6. 渔农并举的民生政策
 SAN_Event.6.t:0 "渔农并举的民生政策"
 SAN_Event.6.d:0 "望泷村的梯田里，老农在尝试混种从古籍中找到的、更耐贫瘠的薯类与豆类；海边的渔村中，新一代的船工正在改良父辈传下的帆索设计，以期在风浪中获取更稳定的收获。心海深知，无论战略蓝图多么宏伟，士兵的粮袋与民众的炊烟才是政权最坚实的基石。她派遣身边精通农事与渔政的能手，跋涉至各个聚落，并非以上位者姿态指挥，而是作为学徒与协作者，与当地老者交流古老的耕作经验，同时小心翼翼地引入从璃月商船零星带来的、或从渊下宫残卷中破译的新知识。她鼓励渔民组成合作社，共享天气信息与渔汛，尝试近海养殖以降低远航风险；指导农人在有限土地上实践轮作与堆肥，哪怕只能增产一分一毫。一套由珊瑚宫协调、以物易物为主的初级物资调剂网络开始运作，旨在平抑各村落因丰歉不均导致的物价波动，预防饥荒。这些政策琐碎而具体，没有沙场点兵的激昂，却如同涓涓细流，渗透到每个海祇岛民的日常生活中。当人们发现碗中的食物多了些许保障，出海的风险有了更周全的预案，对明日不确定的恐慌便会减轻一分，对珊瑚宫这个新生领导核心的信任与依赖，便如海岸线上的珊瑚虫，一点点沉积、加固。民生，是战争中最易被忽略却最为关键的战线，心海正以其细腻的笔触，在这条战线上默默构筑着胜利的基石。"
 SAN_Event.6.a:0 "推广增产技术，为长期备战储备物资"
 SAN_Event.6.b:0 "建立公平的分配与储备体系，保障基本生存以凝聚人心"

 # 7. 海祇岛基础设施升级
 SAN_Event.7.t:0 "海祇岛基础设施升级"
 SAN_Event.7.d:0 "海祇岛的地形，瑰丽而险峻，村落如珍珠般散落在海湾、崖壁与离岛之上，彼此间的联系依赖着蜿蜒小径与一叶扁舟。在承平时期，这是诗意与隔绝；在战争阴影下，这却是致命的弱点——兵力调动迟滞、物资输送困难、信息传递缓慢。心海启动了一项名为‘脉络疏通’的庞大计划。她动员民众，以工代赈，修缮并拓宽连接主要聚居点的道路，在深涧上架起坚固的绳桥；扩建几处关键的小型避风港，使其能停靠稍大的运输船；建立一套基于特定色彩贝壳信号、镜面反光与轻捷信鸽的应急通讯体系，确保警报与命令能跨越山水阻隔。与此同时，在战略要地，依托天然洞穴或密林，开始构筑隐蔽的物资储藏点、小型防御工事与应急避难所。这些工程耗费人力物力，但心海坚持给予参与者合理的报酬与荣誉，并将其宣传为‘共筑家园防线’。进展或许缓慢，但每一条新路的贯通，每一座码头的加固，都如同在岛屿的肌体中疏通血管、强健筋骨。它让海祇岛在潜在的风暴中，能够更迅速地将力量凝聚于一点，更灵活地调动资源，也将地理上的分散劣势，逐步转化为利用复杂地形进行纵深防御与机动游击的潜在优势。基础建设的锤声与号子，是海祇岛为生存而奏响的、最踏实的前奏曲。"
 SAN_Event.7.a:0 "优先建设军事通道、通讯节点与防御工事"
 SAN_Event.7.b:0 "侧重改善民生流通、贸易路线，兼顾防御需求"

 # 8. 内部派系的调和
 SAN_Event.8.t:0 "内部派系的调和"
 SAN_Event.8.d:0 "即便在外敌环伺的阴影下，海祇岛内部也绝非铁板一块。暗流在平静的海面下涌动：有激进的年轻一代，热血沸腾，主张立刻竖起反旗，与幕府决一死战，认为任何犹豫都是对大御神精神的背叛；有守旧的氏族长老，忧心忡忡，害怕反抗会招致灭顶之灾，倾向于隐忍甚至有限度的妥协，以保全宗族；更有广大只求平安的普通民众，对战争充满恐惧，只想守护自家屋檐下的安宁。不同的声音在村头巷尾、在私下聚会中低语、争论，形成看不见的裂痕。心海没有采用高压手段强行统一思想，而是如同一位高明的医者，主动介入进行调和。她分别秘密接见各派代表人物，耐心倾听他们的诉求、恐惧与理想。在公开场合，她则不断强调‘守护所有海祇子民的生命与未来’是最高准则，无论其选择奋战还是生存。她设计出一套精巧的初期行动方案：积极进行军事准备，但暂不公开打出反旗；暗中寻求外部可能的道义与物资支持，但不将希望完全寄托于外人；对于难以说服的极端主战派，则委派其执行不危及大局的侦察或袭扰任务，既消耗其精力，又发挥其价值。这个过程犹如在惊涛骇浪中操控一叶扁舟，需要极致的耐心、高超的技巧与不容置疑的权威。心海的目标，并非消灭所有异见，而是将这些歧见疏导、容纳进一个可控的框架内，确保在命运的关键时刻，海祇岛能够以相对统一的声音和意志，做出那个决定未来的选择。"
 SAN_Event.8.a:0 "求同存异，建立最广泛的内部统一战线"
 SAN_Event.8.b:0 "确立核心路线，团结大多数，温和边缘化极端声音"

 # 9. 海祇文化的传承
 SAN_Event.9.t:0 "海祇文化的传承"
 SAN_Event.9.d:0 "海祇的文化，是深海中孕育出的、与鸣神主流文化迥异的珍珠。它根植于对巨蛇奥罗巴斯的崇拜，蕴含着对黑暗的独特理解、对光明的别样追求，以及适应严苛海洋环境的生存智慧。心海认为，在面临幕府文化同质化压力的当下，强化这份独特的文化认同，其重要性不亚于锻造刀剑。她支持学者与巫祝们系统整理那些即将随着老者逝去而失传的古歌谣、祭祀时的踏浪舞步、以及关于海渊与星空的古老传说。她鼓励工匠们坚持使用传统的贝雕、珍珠镶嵌与珊瑚染色技艺制作器物与服饰，即使其中一些在‘实用’的尺度下显得繁复。更重要的是，她推动在聚落的集会与新兴的学堂中，讲述海祇人自己的历史——不是鸣神史书中的只言片语，而是关于大御神的指引、先民探索深渊的勇气、以及与海洋共生的古老智慧。这些举措，并非简单的怀旧，而是要在每一个海祇人心中，刻下‘我们是谁’、‘我们从何处来’的深刻印记。在战争时期，强烈的文化认同感是凝聚人心、抵御精神侵蚀的坚不可摧的堤坝。它让战士明白自己为何而战，让民众理解自己所要捍卫的，不仅仅是脚下的土地与屋舍，更是流淌在血脉中的、独特的记忆、审美与生活方式。文化，成为了海祇岛看不见的甲胄与旌旗，在无形的战场上守护着族群的灵魂。"
 SAN_Event.9.a:0 "系统抢救与复兴濒临失传的海祇古老文化遗产"
 SAN_Event.9.b:0 "推动文化创新，使其与当代海祇人的生活和抗争紧密结合"

 # 10. 海祇医疗体系的建立
 SAN_Event.10.t:0 "海祇医疗体系的建立"
 SAN_Event.10.d:0 "战争的阴云必然伴随着伤亡的阴影，而海祇岛本就医疗资源匮乏，专业的医师屈指可数。心海未雨绸缪，决心在战火燃起之前，编织一张生命的保护网。她召集岛上的医师、善于利用海生药材的巫医、以及熟悉草药的老者，将传统的海祇医术（擅长利用海藻、珍珠粉、特定珊瑚与深海生物萃取物）与所能收集到的提瓦特通用医学知识相结合，编纂成简明实用的《海祇战地救护要略》。同时，设立专门的机构，统一采购、储备与生产绷带、止血粉、消炎药剂与镇痛草药。在各大村落和计划设立的军营附近，建立初级医疗点，培训当地的妇女或聪慧的年轻人掌握最基本的清创、包扎与防疫知识。更具前瞻性的是，她开始筹划组建直属军队的‘海祇之愈’医疗小队，并着手在岛屿后方寻觅合适地点，筹建能够接收重伤员的后方医院。公共卫生也被纳入考量，预防瘟疫在人口可能聚集的战时环境下爆发。这套体系的建立，其意义远不止于降低未来的伤亡数字。它向所有可能踏上战场的海祇儿女传递了一个清晰而温暖的信息：你们的生命将被珍视，负伤后并非被遗弃，而是会得到尽可能的救治与照顾。这在无形中极大地稳定了军心，提升了战士们的勇气与归属感。一套完善的战时医疗体系，是文明与野蛮的分野，也是海祇岛决心进行一场有组织、有准备、有人道主义底线的长期抗争的鲜明注脚。"
 SAN_Event.10.a:0 "重点建设战地急救与创伤外科体系，服务军事"
 SAN_Event.10.b:0 "构建覆盖全民的初级医疗卫生网络，稳固后方"

 #### 阶段2：反抗军起（11-20）
 # 11. 眼狩令的怒火
 SAN_Event.11.t:0 "眼狩令的怒火"
 SAN_Event.11.d:0 "消息如同沾满冰霜的箭矢，穿透锁国令的壁垒，狠狠钉在了海祇岛每个人的心头——雷电将军颁布‘眼狩令’，旨在一举收缴全国民众所持的‘神之眼’。对许多稻妻人而言，这或许是永恒之路上一次严酷的试炼；但对海祇岛，这无疑是敲响了丧钟。神之眼的持有者，往往是村落的中流砥柱：是能唤来雨水滋润作物的农夫，是能驱使水流协助捕捞的渔夫，是能点燃炉火精炼矿石的匠人，更是抵御魔物、守护一方平安的勇士。剥夺神之眼，不仅仅是夺走力量，更是扼杀梦想，抽走海祇人在贫瘠环境中艰难求存的脊梁。更深层的恐惧在于，这被普遍视为雷神对海祇独特信仰与自治传统的终极否定，是彻底同化乃至清除的前奏。恐慌像瘟疫般蔓延，有人试图将闪烁着微光的‘玻璃珠’深深埋藏，有人计划携家带口冒险穿越雷暴逃亡。珊瑚宫内，空气凝固如深海寒冰。心海站在窗前，望着窗外波涛汹涌的海面，手中那份来自鸣神岛的正式通告仿佛重若千钧。她明白，这道法令已将海祇岛逼至绝壁边缘，退一步即是信仰与生存的双重深渊。反抗，不再是一个需要讨论的选项，而是生存本能发出的、不容置疑的呐喊。眼狩令的雷霆，最终点燃了海祇岛压抑数百年的、深埋于海沟之下的地火。"
 SAN_Event.11.a:0 "公开谴责暴政，誓死捍卫子民追求梦想的权利"
 SAN_Event.11.b:0 "暂敛锋芒，暗中积蓄力量，等待最佳反击时机"

 # 12. 珊瑚宫反抗军，成立！
 SAN_Event.12.t:0 "珊瑚宫反抗军，成立！"
 SAN_Event.12.d:0 "决心已如礁石般坚定，但反抗不能仅凭血气之勇。在珊瑚宫的默许与统筹下，一张精密而隐秘的军事网络开始在海祇岛的阴影中编织。征召并非大张旗鼓的宣告，而是通过可信的村落长老、隐退的退役军人、以及早已对幕府心怀不满的秘密结社，悄然吸纳那些身怀绝技、意志坚定或走投无路的男女。他们中，有被夺走神之眼后心如死灰、又被怒火点燃的原持有者；有在风浪中搏击半生、熟知每一处暗流与航路的老水手；有擅长潜伏、追踪与设置致命陷阱的深山猎人；甚至还有精于计算、能够管理后勤的落魄商人。初期的训练在月光下的偏僻海滩、雾气弥漫的丛林深处、以及废弃的采矿坑道中进行，使用的是木制武器与改良的渔具、农具。心海亲自审阅训练大纲，强调小分队协同、地形利用与游击袭扰，而非面对面的阵列冲杀。与此同时，一套简陋但有效的情报传递与后勤补给体系依托岛屿的复杂地形悄然建立。这支新生的力量，如同深海中悄然聚集的鱼群，虽然装备简陋，缺乏正规战的经验，但他们熟悉家乡的每一寸土地与波涛，胸膛中燃烧着守护家园的炽热意志。他们自称为‘珊瑚宫军’，这并非一个官职，而是一个誓言，一个承诺——海祇的子民，已握紧了捍卫自身命运的拳头。"
 SAN_Event.12.a:0 "以忠诚与勇气为标准，严格筛选，组建精锐核心"
 SAN_Event.12.b:0 "广泛动员，吸纳所有愿战者，以数量弥补经验的不足"

 # 13. 大将五郎的任命
 SAN_Event.13.t:0 "大将五郎的任命"
 SAN_Event.13.d:0 "一支军队需要灵魂指引，也需要锋利的剑刃。心海的目光，越过众多资历更深的将领，落在了那位以忠诚、勇毅和在士兵中拥有极高威望的犬族青年——五郎身上。他并非出身显赫的军事世家，但他那份在早期秘密军事准备中显露无疑的纯粹勇气、对同袍的深切关爱以及对命令的坚决执行，让心海看到了理想将领的品质。任命仪式在珊瑚宫前的广场秘密举行，没有盛大的典礼，只有海风与肃穆的士兵方阵。在心海与众多将士的注视下，五郎单膝跪地，从巫女手中接过了那枚象征着指挥权与重任的、以深海玄铁与珊瑚铸就的令牌。他明白这枚令牌的重量，它承载着无数人的性命与海祇岛的未来。上任后，五郎立刻展现出其务实与亲和的作风：他将散漫的义勇编组成有明确编制与指挥链路的小队；亲自示范战斗技巧，尤其注重弓术与近身格斗；更难得的是，他像兄长一样关心士兵的饱暖、倾听他们的烦恼。他的存在，如同为这支新生军队注入了一根定海神针。士兵们信任他，不仅因为他的武勇，更因为他的真诚。他与运筹帷幄的心海，一武一文，一外一内，如同海祇的双翼，构成了反抗军早期最坚实、最令人安心的领导核心。‘五郎大将’的名号，开始如同海潮的信风，在军队与民间迅速传颂，成为勇气、可靠与希望的象征。"
 SAN_Event.13.a:0 "明确权责，树立五郎在军中的绝对威信"
 SAN_Event.13.b:0 "强调官兵一体，以情感与榜样凝聚军心"

 # 14. 神之眼持有者的投奔
 SAN_Event.14.t:0 "神之眼持有者的投奔"
 SAN_Event.14.d:0 "眼狩令的执行如同黑暗中的狩猎，神之眼的持有者成了最醒目的猎物。幕府的‘终末番’与天领奉行的武士在诸岛活动，收缴、追捕，毫不留情。海祇岛无法坐视同胞被夺去梦想与力量，沦为空洞的躯壳。一项代号为‘渊海归途’的危险行动悄然启动。珊瑚宫精心构建的情报网络全力运转，追踪着每一支收缴队伍的动向。月黑风高之夜，海祇岛特制的、航行无声的‘浪船’如同海兽般滑出隐蔽的港湾，驶向鸣神岛、神无冢乃至八酝岛的预定接应点。这些接应点可能是荒废的神龛、偏僻的渔村码头，或是海面上约定的浮标。过程充满风险，时有遭遇幕府巡逻船的交火与牺牲。但每成功接回一名神之眼持有者及其家人，反抗军就多了一份宝贵的、蕴含着元素力量的特殊战力，海祇岛也多了一份誓死反抗暴政的、燃烧着复仇与感激之火的决心。这些被救回的‘原石’，许多怀着对幕府的刻骨恨意与对海祇的深切感恩，迅速成为了反抗军中最坚定、最勇猛的先锋，或是在后方利用其独特能力贡献于医疗、建设与情报领域。这项行动不仅保存了珍贵的有生力量，更是向整个稻妻宣告：在雷电将军的永恒威光之下，仍有一处名为海祇的岛屿，愿意成为被追猎者们最后的港湾与反抗的火种。"
 SAN_Event.14.a:0 "不惜代价，全力营救，彰显海祇的庇护决心"
 SAN_Event.14.b:0 "量力而行，优先营救战力卓越或身份关键者"

 # 15. 海祇军工的起步
 SAN_Event.15.t:0 "海祇军工的起步"
 SAN_Event.15.d:0 "竹枪与渔叉或许能对抗野兽，但绝无可能对抗幕府精锐的玉钢打刀与精良弩箭。心海清醒地认识到，军事独立的前提是装备自主。在岛屿隐蔽的峡谷深处、面朝悬崖的洞穴之中，简陋但功能齐备的作坊如同雨后的蘑菇般悄然出现。匠人们聚集于此，利用岛上特有的‘晶化骨髓’尝试冶炼比普通铁器更坚韧的合金；研究从发光珊瑚与某些深海生物分泌物中提取特殊涂层，以增强武器的抗腐蚀性与锋利度；甚至胆大妄为地尝试复现一些从渊下宫残卷中破译的、关于古代机关术的模糊记载。木材加工点开始批量生产标准化的弓身与箭杆；皮革工坊日夜不停地鞣制海兽皮，制作轻便的护甲与携行具。一切都在极端缺乏原料、设备与成熟技术的条件下艰难摸索，失败与爆炸是家常便饭。但心海给予了匠人们最大限度的支持与宽容，鼓励实用主义的创新与对现有资源的极限利用。渐渐地，第一批制式装备走下粗糙的生产线：刀剑虽无华丽纹饰，但足够锋利坚韧；弓弩射程或许不及幕府制品，但精度可靠；护甲轻便，适合海岛机动作战。这微弱的军工火种，光芒虽小，却意义非凡——它标志着海祇岛开始摆脱对外部武器输入的完全依赖，踏上了军事自主最艰难也最关键的第一步，为长期的抗争锻造着属于自己的、冰冷的獠牙。"
 SAN_Event.15.a:0 "集中资源，优先攻关刀剑、弓弩等关键武器制造"
 SAN_Event.15.b:0 "全面发展，同步推进护甲、后勤装备与简单火器研制"

 # 16. 海祇岛海岸防御
 SAN_Event.16.t:0 "海祇岛海岸防御"
 SAN_Event.16.d:0 "海祇岛四面环海，这既是天然的屏障，也是致命的软肋——来自海上的威胁可以出现在任何方向。幕府的海军力量远超海祇那孱弱的船队，被动挨打等于坐以待毙。心海与五郎亲自踏遍了全岛漫长而曲折的海岸线，在海图上标记出每一个可能登陆的海滩、每一个具有战略价值的港湾、每一处易于攀爬的崖壁。防御工事的建设随即如同珊瑚生长般铺开：在关键登陆点的水下，布设改良的、带有倒刺的渔网与隐藏的木桩阵，迟滞甚至破坏敌船船底；在视野良好的悬崖上，开凿出隐蔽的观察哨与射击孔；在沙滩后方，构筑简易却有效的沙垒、壕沟与拒马。更富有海祇特色的是，他们充分利用岛屿多雾的特点，在沿岸布设了大量由浮木、贝壳与反光材料制成的假目标，并安排小股部队频繁变换驻扎地点，制造守军众多的假象。同时，组建了快速反应的‘海祇之鳍’巡逻小队，配备轻快的船只，负责日常沿岸巡逻与预警。这道防线并非坚不可摧的城墙，其核心思想在于‘迟滞、消耗、预警’，迫使来犯之敌无法轻易建立稳固的滩头阵地，从而为内陆主力部队的集结、反击或民众的疏散转移赢得宝贵时间。每一处工事，都是海祇岛用智慧、汗水与决心，在漫长的海岸线上刻下的无声宣言：入侵者，必将为踏上这片土地付出鲜血的代价。"
 SAN_Event.16.a:0 "构筑重点防御，在关键登陆点建立坚固堡垒群"
 SAN_Event.16.b:0 "实施弹性防御，广泛布设预警与迟滞设施，诱敌深入"

 # 17. 海祇海军的建立
 SAN_Event.17.t:0 "海祇海军的建立"
 SAN_Event.17.d:0 "没有制海权，海祇岛便是一座华丽的囚笼。然而，奢望在短时间内建立一支能与幕府庞大舰队正面抗衡的海军，无异于痴人说梦。心海的策略现实而灵活：放弃建造大型战舰的幻想，转而专注于发展小型、快速、灵活且适应复杂近海环境的船只。匠人们改造大型渔船，加固船体，加装简易的护板与撞角；设计狭长低矮的突击舟，专精于夜间渗透、接舷战与快速撤离。水手的训练紧紧围绕海祇岛周边复杂的暗礁分布、变幻莫测的急流与突如其来的风暴展开，他们要学会如何驾驶小船在幕府大舰难以进入的浅水区与狭窄水道中穿梭、作战。战术上，心海推崇‘群狼’战术与海上游击，绝不以卵击石，而是以袭扰敌方运输线、攻击落单舰船、快速登陆破坏而后撤离为主要作战模式。这支小小的、被戏称为‘海祇水师’的力量，更像是海上的幽灵与刺客。他们的目标并非夺取浩瀚大洋的控制权，而是确保海祇岛与外界的脆弱联系不被完全切断，并能对幕府漫长的海岸线保持持续而不可预测的威胁，牵制其部分海军力量。每一艘在夜幕或雾霭中悄然出航的小船，都承载着海祇岛不甘被封锁的命运，在浩瀚而危险的海面上，为生存与自由寻找着一线微光。"
 SAN_Event.17.a:0 "发展高速突袭舰只，侧重接舷战与快速机动"
 SAN_Event.17.b:0 "建造兼具运输与火力的小型多功能船只，保障航线"

 # 18. 特种侦察队的组建
 SAN_Event.18.t:0 "特种侦察队的组建"
 SAN_Event.18.d:0 "战争不仅是力量与勇气的碰撞，更是信息与情报的无声博弈。心海需要一双能穿透战争迷雾、洞察敌人虚实的‘眼睛’。她从军队和民间百里挑一，选拔出最机敏、最坚韧、最熟悉外岛环境乃至鸣神文化的士兵与平民，组建了直属珊瑚宫指挥的‘海祇之眼’特种侦察队。他们的训练严酷而独特：不仅要掌握高强度的潜伏、伪装、跟踪与野外生存技能，还需学习鸣神岛的语言、习俗、军队编制、旗帜标识乃至将领特点。他们被秘密派往神无冢、八酝岛乃至鸣神岛沿岸，任务繁重而危险：精确测绘地形、记录驻军调动与换防规律、评估物资囤积点、接触当地对幕府不满的势力以建立情报网。信息通过密语、隐蔽标记、信鸽或不定期的海上秘密接头传回珊瑚宫。这是一项在刀尖上跳舞的工作，一旦被捕，几乎意味着死亡。但‘海祇之眼’们带回的零碎情报，如同拼图般逐渐勾勒出幕府军事行动的模糊轮廓、后勤线的弱点乃至内部的人事纷争，为心海那本厚重的《兵书》提供了无数关键的注解，使她能够‘庙算’先机。他们是反抗军伸向黑暗外界的无形触手，在绝对的军力劣势中，为海祇岛争取着那一点点珍贵的信息主动权与战略纵深。"
 SAN_Event.18.a:0 "侧重军事侦察，深入敌后获取布防与调动情报"
 SAN_Event.18.b:0 "侧重社会情报，接触民众与低级武士，了解人心向背"

 # 19. 战场医疗队的成立
 SAN_Event.19.t:0 "战场医疗队的成立"
 SAN_Event.19.d:0 "心海深知，在缺医少药、环境恶劣的海祇岛，一名经验丰富的老兵，其价值远胜过十个未经战阵的新兵。她将之前建立的初级医疗体系进一步专业化、军事化，成立了直属军队的‘海祇之愈’战场医疗队。成员包括经过选拔与额外培训的巫女、药师和心灵手巧、胆大心细的士兵。他们被编配到各主要作战单位，携带着统一配发的、装有海祇特色药材（如具有强效止血作用的海藻凝胶、消炎的珊瑚粉末）的急救包。医疗队重点研究战场上常见的刀剑创伤、箭矢贯穿伤、烧伤以及可能流行的疫病，并编写了更详细的战伤处理手册。同时，建立了一套从前线简易包扎点，到移动医疗站，再到后方固定医院的三级伤员后送流程，并训练普通士兵掌握最基本的止血、固定与搬运技能。心海甚至亲自参与修订了战场急救手册，用简明图示让识字不多的士兵也能理解。这支身着特殊标识的医疗队的存在，如同给前线将士服下了一颗定心丸。士兵们知道，受伤后不会像野草一样被抛弃在战场上，这份安全感转化为战斗中更坚定的勇气与更低的溃逃可能。救死扶伤，不仅最大程度地保存了宝贵的战斗力，更是海祇岛文明与人道精神的体现，即使在最残酷的战争中，也竭力守护着生命最后的尊严与微光。"
 SAN_Event.19.a:0 "强化前线急救能力，配属精锐医疗兵随队行动"
 SAN_Event.19.b:0 "完善后方医疗体系，建立稳固的伤员收容与康复网络"

 # 20. 反抗军的战术演练
 SAN_Event.20.t:0 "反抗军的战术演练"
 SAN_Event.20.d:0 "面对训练有素、装备精良、兵力占优的幕府军，初生的海祇反抗军绝不能硬碰硬。心海与五郎、以及‘淀海之思’的谋士们一起，为这支军队量身打造了一套独特的战术体系，其核心思想可概括为‘以柔克刚，以奇胜正，以空间换时间’。训练的重点从传统的阵列操演，转向了复杂地形下的快速机动与小分队协同作战：如何在茂密的丛林中设伏与反伏击，如何在崎岖的山地中保持联络与补给，如何利用夜晚与浓雾进行掩护与突袭。士兵们学习设置各种陷阱与障碍，从简单的绊索、陷坑到利用环境制作的落石与触发式警报。土木作业被高度重视，要求部队能快速构筑简易野战工事。尤为强调伏击战术与得手后的迅速脱离接触，避免恋战。训练是异常艰苦的，常常在恶劣天气下进行高强度对抗演习。心海通过《兵书》中的经典案例与沙盘推演，亲自向军官们讲解每一项战术背后的意图与变化。渐渐地，这支由渔民、农夫和工匠组成的队伍，开始褪去散兵游勇的习气，向一支拥有独特战术素养、懂得扬长避短的军队转变。他们或许永远无法在开阔地带与幕府军正面列阵对决，但在海祇岛熟悉的山林、海岸与迷雾中，他们将化身为最令敌人头疼的狩猎者与幽灵，利用每一处地形，每一分智慧，去对抗强大的敌人，为海祇岛争取生存与胜利的可能。"
 SAN_Event.20.a:0 "强化单兵与小分队作战技能，提升山地与丛林战能力"
 SAN_Event.20.b:0 "注重战术协同与指挥链路，演练多部队配合的复杂行动"

 #### 阶段3：诸岛经略（21-30）
 # 21. 八酝岛战役计划
 SAN_Event.21.t:0 "八酝岛战役计划"
 SAN_Event.21.d:0 "海祇岛不能永远困守孤岛，向外寻求战略纵深、资源与盟友势在必行。目光首先投向了饱受‘祟神’能量折磨、幕府控制相对薄弱的八酝岛。此地不仅蕴藏着对军工至关重要的‘晶化骨髓’，其地理位置更是扼守通往鸣神岛西南水域的咽喉。心海的计划并非全面占领，而是一场精密的有限军事行动——‘破晓’行动。目标是在岛内早已秘密接触的反抗组织‘破砕之志’的接应下，快速控制无想刃狭间以南的几处关键矿洞与沿海村落，建立稳固的前沿据点，获取矿产，并扶植当地抵抗力量，将战火引向幕府统治的薄弱环节。作战室内灯火通明，巨大的海图铺开，上面密密麻麻标注着敌军的哨所、巡逻路线以及‘祟神’能量的污染区。心海与五郎、以及智囊团的成员们反复推演：登陆点的选择必须隐蔽且便于防守；如何规避盘踞在无想刃狭间附近的幕府军主力；如何利用岛上复杂的山地与雨林地形进行机动作战；以及，最关键的是，如何应对那无处不在、可能侵蚀士兵心智的‘祟神’残余。每一项预案都伴随着风险，但心海的目光坚定。这场战役，将是检验海祇军成色的试金石，也是向整个稻妻宣告，反抗的意志，已如海潮般拍向鸣神的堤岸。"
 SAN_Event.21.a:0 "集中精锐，发动快速突袭，力求速战速决"
 SAN_Event.21.b:0 "稳扎稳打，步步为营，先建立稳固的防御圈"

 # 22. 踏鞴砂的悲剧
 SAN_Event.22.t:0 "踏鞴砂的悲剧"
 SAN_Event.22.d:0 "当海祇军的侦察员与医疗小队，伪装成流浪的工匠与药师，历尽艰辛潜入那片被不祥紫气笼罩的土地时，所见景象触目惊心。曾经轰鸣的‘御影炉心’如今死寂，只偶尔喷发出致命的能量流；废弃的工坊与宿舍区弥漫着绝望的气息；面色灰败、咳血不止的工人在废墟间蹒跚；仅存的技术官与幕府驻军困守一隅，对失控的炉心与蔓延的怪病束手无策，来自鸣神岛的支援却迟缓而有限。心海在听取报告后，陷入了长久的沉默。这不仅仅是一场工业灾难，更是一面映照出幕府统治冷漠与失效的镜子。她指示小队，在极端谨慎的前提下，以‘民间善士’的名义开展有限的人道援助：分发海祇岛的特制草药（对缓解某些‘祟神’症状或有奇效），分享防疫知识，并尝试接触那些心灰意冷又身怀绝技的本地匠人。目的有三：一是践行海祇信仰中‘庇护生灵’的教义，与幕府的冷漠形成鲜明对比，争取底层民心；二是尝试获取踏鞴砂独特的冶金技术，尤其是关于‘晶化骨髓’应用与祟神能量控制的零散知识；三是深入了解这场灾难的根源，这关乎整个稻妻的安危与未来。这是一次道德与政治的双重冒险，援助的规模虽小，却如同投入死水中的石子，其荡开的涟漪，将微妙地改变踏鞴砂幸存者对‘海祇’二字的认知。"
 SAN_Event.22.a:0 "以人道关怀为先，全力救治伤员，塑造仁义之师形象"
 SAN_Event.22.b:0 "在援助中侧重接触技术人员，搜集情报与知识"

 # 23. 神无冢经略战略
 SAN_Event.23.t:0 "神无冢经略战略"
 SAN_Event.23.d:0 "神无冢，稻妻的军事与工业重镇，九条阵屋巍然耸立，是幕府军楔入西部海域的前沿大本营，如同一头匍匐的巨兽，时刻威胁着海祇岛的侧翼。对于羽翼未丰的海祇反抗军而言，这里是需要正视的强敌，但绝非无懈可击。心海为神无冢定下的策略是‘遏制、窥视、分化’，而非强攻。她下令增强在神无冢周边海域的侦察与袭扰活动，由‘海祇之鳍’快速舰队执行，目标明确指向幕府的沿海运输船和外围孤立哨所，持续施加压力，牵制其兵力，使其无法全力集结进攻海祇本岛。同时，利用神无冢地域广阔、山林密布、流浪武士与海盗势力盘根错节的复杂局面，通过‘海祇之眼’秘密接触那些对幕府高压统治或重税不满的地方势力、落魄武士甚至部分商人，建立隐蔽的情报网，并尝试进行以物易物的有限物资交换，获取粮食、布匹与情报。更重要的战略目标是全面勘测神无冢的海岸线、登陆滩头、驻军分布、物资囤积点与交通枢纽，为任何可能的未来行动绘制详尽的‘舆图’。这是一场漫长而隐秘的猫鼠游戏，海祇岛是那只灵活而耐心的猫，时刻在巨兽的爪牙边缘游走，试探其反应，寻找其破绽，并让幕府军无法忽视来自海祇方向的、如芒在背的持续威胁。对神无冢的经营，是一场静默的布局，旨在平衡敌我战略态势，为海祇岛争取宝贵的喘息与发展的战略空间。"
 SAN_Event.23.a:0 "强化海上破交与袭扰，最大限度地消耗与牵制敌军"
 SAN_Event.23.b:0 "深入渗透与情报经营，瓦解敌军社会基础，绘制详尽战图"

 # 24. 清籁岛的接触
 SAN_Event.24.t:0 "清籁岛的接触"
 SAN_Event.24.d:0 "被永不停歇的狂暴雷暴与紊乱元素力永久笼罩的清籁岛，在绝大多数稻妻人眼中是生命的禁区，是上古灾厄的余烬。但心海从冒险者的只言片语、古籍的残章断简，乃至某些古老的海祇歌谣中，捕捉到一丝不寻常的可能性——那里不仅残留着与一位逝去的雷之魔神（菅名卡帕奇莉）相关的庞大遗迹与怨念，其极端的环境本身或许就蕴藏着难以想象的力量，甚至可能存在着适应了这毁灭之地的特殊族群。她派遣出一支由最勇敢的士兵、富有探索精神的学者与熟知元素理论的巫女组成的小型探险队，乘坐特制的、覆有绝缘材料的‘避雷舟’，尝试穿越外围那令人胆寒的雷暴带。他们的任务并非军事占领，而是探索与建立初步联系：清籁岛异常狂暴的雷元素环境能否被研究、理解，乃至在极端情况下被有限引导或利用？岛上是否存在因独特环境而变异的稀有矿物或生物资源？那位陨落魔神的遗产，是否隐藏着关于‘永恒’另一面的知识，或是对抗雷元素威能的启示？这是一次风险极高的赌博，探险队可能全军覆没，也可能徒劳无功。但心海认为，在绝对的实力劣势下，任何非常规的可能性，哪怕再渺茫、再危险，都可能成为未来某次破局的关键钥匙。清籁岛的雷霆，是屏障，是毁灭，但也可能，是意想不到的、充满风险的机遇。"
 SAN_Event.24.a:0 "以科学考察为主，谨慎记录环境与遗迹，避免触发危险"
 SAN_Event.24.b:0 "尝试与可能存在的岛民接触，探寻合作或利用环境之可能"

 # 25. 鹤观岛考察队
 SAN_Event.25.t:0 "鹤观岛考察队"
 SAN_Event.25.d:0 "被浓雾与奇异时空现象永恒包裹的鹤观岛，是稻妻最神秘、最令人费解的岛屿，没有之一。传说其上曾有一个名为‘知比’的、拥有高度发达祭祀文明的远古文明，却因某种不可知的原因骤然整体消失，只留下无尽的迷雾与循环的幻影。心海对鹤观的兴趣，远超过其可能蕴藏的实体资源价值。她指示派出的探险队，首要任务是考古学与历史学的研究，尝试揭开鹤观文明失落的原因，以及那笼罩全岛的‘雾’与传说中的‘雷鸟’、‘血祭’之间究竟有何关联。她相信，古代文明的经验与教训，尤其是那些涉及大型灾难、文明存续、信仰异化与时空异常的部分，可能对同样面临存亡危机的海祇岛，具有超越时代的警示与启示意义。此外，鹤观遗迹中可能保留有独特的古代历法、建筑技术或神秘学知识片段。探险队配备了最精密的记录工具、坚韧的学者与通晓古语的巫女，他们的任务是在保证生存的前提下，尽可能多地收集遗迹的布局信息、拓印壁画、记录那些奇异的石根文字，并收集具有代表性的器物碎片。这是一次穿越浓雾、与失落历史和时空异常直接对话的旅程，每一步都需慎之又慎。心海希望，鹤观远古文明那无声的回响与湮灭的真相，能为海祇岛的未来道路，投下一束来自历史深渊的、冷冽而清醒的光。"
 SAN_Event.25.a:0 "侧重历史与文明研究，试图破解鹤观毁灭之谜以史为鉴"
 SAN_Event.25.b:0 "考察地理与时空异常，探寻其可能蕴含的现实战略价值"

 # 26. 海祇本岛的要塞化
 SAN_Event.26.t:0 "海祇本岛的要塞化"
 SAN_Event.26.d:0 "在将触角伸向诸岛的同时，海祇岛的大本营必须变得如深海磐石般坚不可摧。心海启动了覆盖全岛的‘渊垒’计划，旨在将整个岛屿从一座家园，转变为一个为长期战争准备的巨型立体堡垒。防御纵深不再局限于海岸线，而是向岛屿内陆层层推进。在珊瑚宫周边的险峻山体中，依托天然洞穴开凿出隐蔽的指挥所、足以支撑数月的粮食弹药仓库以及伤病员掩蔽部；在连接各主要村落的山道隘口，预设了可快速启闭的落石机关与伏击点；将一些位置关键、民风悍勇的村落，有意识地进行要塞化改造，储备物资，训练民兵，使其成为具备自持能力的防御节点。更重要的是，建立了一套立体、多层次的预警与通讯网络：高山上的烽火台、海岸瞭望哨的信号旗、驯养的信天翁与经过特殊训练的山地信使，确保任何方向的敌情都能以最快速度传递至珊瑚宫中枢。心海甚至亲自设计了数套在极端情况下的、分批次、分路线的民众疏散与转入地下坚持的详细预案。整个岛屿，如同一只缓缓蜷缩起来、却将尖刺对准四面八方的海胆。每一处加固的工事，每一条密道，每一套预案，都是海祇岛决心的物质化体现：这里将是入侵者最难啃下、代价最为惨重的骨头，是反抗军最稳固的根基与退路，是海祇子民最后的，也是最坚强的、永不沉没的方舟。"
 SAN_Event.26.a:0 "构筑核心堡垒区域，将珊瑚宫周边打造成铜墙铁壁"
 SAN_Event.26.b:0 "实施全域要塞化，将每一个村落都变为难以拔除的钉子"

 # 27. 祟神的诅咒
 SAN_Event.27.t:0 "祟神的诅咒"
 SAN_Event.27.d:0 "八酝岛与踏鞴砂的惨状，像一面狰狞的镜子，映照出魔神战争残留的怨恨与毁灭性能量——‘祟神’的可怕。这种源自陨落魔神（奥罗巴斯）遗骸与执念的力量，能扭曲地脉，侵蚀生命，引发疯狂与灾厄。心海以最高规格重视对这一现象的研究。她召集了最博学的巫女、对元素与地脉有研究的学者，以及经验丰富的医师，成立了‘御祓’研究组。他们的任务是系统搜集、分析祟神能量的各种表现形式、传播途径、对生物肌体与精神的侵蚀过程，以及可能的缓解或净化方法。研究是危险而艰难的，初步结论表明，这种能量与强烈的情感执念、死亡时的巨大痛苦以及地脉的特定淤塞点密切相关。心海下令，所有在祟神污染区活动的部队必须配备特制的（哪怕是简陋的）防护符箓与面具，饮用经过特殊净化的水，并严格限制暴露时间，严禁士兵出于好奇或贪念接触、收集任何疑似被污染的物品。同时，她也在思考更深层的问题：雷电将军所追求的、冻结一切的‘永恒’，与这种带来腐朽、痛苦与疯狂的‘执念’，在力量的本质上是截然对立，还是某种扭曲的一体两面？对‘祟神’的深入研究，不仅是为了军事上的防护，更是让海祇岛在对抗鸣神幕府时，多了一份对‘魔神力量’、‘永恒代价’与‘执念危险’的清醒认知与深刻敬畏，避免在反抗中自身也滑入疯狂的深渊。"
 SAN_Event.27.a:0 "重点研究防护与净化手段，保障军民在污染区的安全"
 SAN_Event.27.b:0 "深入研究祟神本质，探寻其与‘永恒’、‘愿望’的哲学联系"

 # 28. 八酝岛补给线建设
 SAN_Event.28.t:0 "八酝岛补给线建设"
 SAN_Event.28.d:0 "在八酝岛初步建立据点后，如何将这片新占领的前沿阵地与海祇本岛有效地连接起来，成为维系其存在、发挥其战略价值的关键。脆弱的、暴露在广阔海面上的运输线，是这条生命线的阿喀琉斯之踵。心海的策略是海陆并进，构建一条隐蔽而富有弹性的‘海上血脉’。海上方面，她派遣水师中最精干的力量，开辟并保卫一条仅在特定潮汐、夜间或浓雾天气下通航的隐蔽航线，使用吃水浅、航速快的小型浪船，进行高频率、小批量、多批次的物资与人员运输，降低单次航行风险。陆上方面，则着手改善八酝岛占领区内部的道路与小径，修建隐蔽的物资中转站，提高岛内兵力机动与物资分发的效率。更具战略眼光的是，她尝试在八酝岛本地组织有限的生产：利用获取的晶化骨髓，就地建立小型的武器修缮与箭头打造作坊；鼓励随军工匠家庭尝试在安全区种植耐性作物；甚至尝试与岛上未受祟神严重影响的小聚落进行易货贸易。这条跨越雷暴海域的脆弱‘生命线’，是海祇岛战略外延的血管。每一次成功的航行，运去的不仅是补给和援兵，更是希望与决心；带回的不仅是矿产和情报，更是将海祇与八酝岛命运更紧密捆绑的纽带。维持这条线路，需要高超的航海技术、铁一般的保密纪律和不间断的武装护航，它是对海祇岛组织能力、后勤智慧与海洋韧性的严峻考验。"
 SAN_Event.28.a:0 "优先保障军事运输，确保兵力与武器弹药的快速投送"
 SAN_Event.28.b:0 "发展岛内生产与贸易，逐步降低对跨海补给线的绝对依赖"

 # 29. 无想刃狭间前线
 SAN_Event.29.t:0 "无想刃狭间前线"
 SAN_Event.29.d:0 "无想刃狭间——大蛇奥罗巴斯陨落之地，雷神‘无想的一刀’留下的、深不见底、弥漫着紊乱元素力的巨大峡谷。这里不仅是地理分界，更是海祇与鸣神数百年恩怨情仇的精神象征与伤口。如今，它成了军事对峙的最前沿。幕府军重兵屯集于峡谷北侧，凭险固守；而海祇军在八酝岛的控制区已延伸至峡谷南缘。双方最前沿的哨所，在弥漫的紫色雾气中隔渊相望，距离近得可以听见对方的咳嗽声。小规模的冷枪冷箭、侦察与反侦察、渗透与反渗透对抗，在这片破碎、崎岖、充满能量乱流的死亡地带每日上演。心海严令部队不得轻易进入峡谷底部那能量狂暴的核心区，但鼓励在前沿依托复杂的地形（突出的岩柱、天然的洞穴）建立坚固的观察哨、狙击阵地与隐蔽的屯兵洞，并派出最精锐的山地步兵小队，在犬牙交错的地形中进行不间断的巡逻与伏击。这里没有震天的战鼓与万人的冲锋，但紧张气氛令人窒息，每一次风吹草动都可能意味着死亡。无想刃狭间前线，是意志、耐力与细微战术的绞肉机。海祇军在此的存在本身，就是一种无声却震耳欲聋的宣言：即使面对雷神威光曾降临、先祖在此陨落之地，海祇的子民也绝不退让，他们将以血肉之躯，在这道古老的伤口上，刻下属于这个时代的、不屈的印记。"
 SAN_Event.29.a:0 "采取积极防御，以精锐小分队频繁袭扰，掌握前沿主动"
 SAN_Event.29.b:0 "构筑坚固防御工事，稳守战线，消耗敌军精力与士气"

 # 30. 鸣神岛情报作战
 SAN_Event.30.t:0 "鸣神岛情报作战"
 SAN_Event.30.d:0 "敌人的心脏在鸣神岛，在那高耸入云、威严肃穆的天守阁之中。要战胜一个强大的对手，必须了解其核心的运作、决策的脉络乃至统治者的真实状态。心海启动了针对鸣神岛最高级别的、代号‘深潜’的战略情报行动。‘海祇之眼’中最精锐、最忠诚、最善于伪装的特工，利用伪造的商人、难民、寻亲者甚至伪装成对幕府失望的投降者等多种身份，通过各种隐秘渠道渗透进入鸣神岛，乃至尝试接近稻妻城。他们的目标不再是外围的军力部署，而是更高价值、更核心的信息：天领奉行与勘定奉行高层的决策倾向与内部派系斗争；三奉行之间围绕权力与资源的微妙制衡；雷电将军（或其人偶）的真实动向与近期公开露面的细节；天守阁的日常防卫体系与换班规律；以及‘眼狩令’、‘锁国令’这些极端政策背后更深层的决策动机与推动力量。信息传递变得极度困难与危险，往往依靠单线联系、死信箱（将情报藏于特定隐蔽地点）或极其罕见的秘密海上接头。这是风险最高的任务，一旦身份暴露，等待他们的将是比死亡更可怕的结局。但传回的只言片语、模糊印象与零碎信息，开始在心海那庞大的情报分析网络中拼凑出幕府统治机器内部的裂痕、不同势力间的压力点，以及那看似铁板一块的永恒秩序之下，细微的、可能被撬动的缝隙。知己知彼，百战不殆。这场实力悬殊的对抗，容不得半分侥幸与模糊，心海正试图用智慧的丝线，穿透遥远的距离与厚重的帷幕，去轻轻触碰，那端坐于永恒王座之上的、神的脉搏。"
 SAN_Event.30.a:0 "侧重渗透统治中枢，获取高层政治与决策情报"
 SAN_Event.30.b:0 "广泛搜集社会与经济情报，了解民心向背与统治基础变化"
 #### 阶段4：渊下秘藏（31-40）
 # 31. 海祇之下的深渊
 SAN_Event.31.t:0 "海祇之下的深渊"
 SAN_Event.31.d:0 "在珊瑚宫最深处的禁地，历经数代巫女守护与解读的古老机关，终于在心海的亲自操作下，伴随着低沉如巨兽呜咽的轰鸣与千年尘埃的簌簌落下，缓缓开启。一道向下的、幽深不知几许的阶梯显露出来，扑面而来的并非清新的海风，而是一股混合着远古水汽、微弱磷光、以及某种无法言喻的、仿佛时间本身都已沉淀的寂静与压抑感。心海站在洞口，手中的明珠映照着阶梯上精美却陌生的浮雕——那并非海祇常见的蛇神纹样，而是更为古老、抽象的几何图案与星月轮回的意象。她知道，开启这扇门意味着什么。这不仅仅是探索一处被遗忘的遗迹，更是主动掀开海祇历史中被刻意掩埋、可能布满尘埃与荆棘的一页，是直面先祖在真正的、绝对黑暗的深渊中挣扎求存的原始记忆，以及可能随之而来的、被漫长时光封存的危险、禁忌与失落的知识。探险队由最忠诚的士兵、最博学的考古学者与通晓古老仪轨的巫女组成，他们怀抱着朝圣般的敬畏与开拓者的决心，步入了那片被称作‘渊下宫’、失去了阳光的国度。这一步，标志着海祇岛的抗争，不再仅仅局限于应对当下的生存危机，开始主动向历史的深处、文明的源头，甚至是神话的起点回溯，去寻求那可能改变一切的力量根源与存在答案。渊下宫的黑暗，或许蕴藏着照亮前路的、另一种星光。"
 SAN_Event.31.a:0 "以朝圣与研习之心，谨慎探索，尊重先民遗迹"
 SAN_Event.31.b:0 "以实用主义为先，聚焦寻找可立即利用的资源与技术"

 # 32. 渊下宫第一次探索
 SAN_Event.32.t:0 "渊下宫第一次探索"
 SAN_Event.32.d:0 "第一次踏入渊下宫，探险队员们仿佛瞬间被投入了一个凝固的、失重的梦境。巨大的建筑遗迹违背常理地悬浮在虚无的黑暗之中，断裂的廊桥连接着孤岛般的平台；天际，那轮被称为‘大日御舆’的苍白人造太阳黯淡地散发着冰冷无机质的光芒，将一切染上诡谲的蓝白色调。空气中弥漫着惰性的、高浓度的元素微粒，奇异的、不需要阳光的发光植物如幽灵般点缀在断壁残垣之间，而在视野的阴影边缘，似乎总有古老魔物蠕动爬行的窸窣声。队伍沿着残破的阶梯与平台小心翼翼地向深处推进，绘制着极其粗略但至关重要的地形图，记录下前所未见的建筑风格、壁画上描绘的奇异仪式、以及镌刻在墙壁与石碑上、与提瓦特通用语迥异的文字系统。他们发现了控制‘常夜’与‘白夜’转换的神秘机关，遭遇了遗迹守卫者‘龙蜥’凶猛的袭击，也找到了似乎是古代图书馆或精密工坊的废墟入口。每一件小心翼翼带回的陶器碎片、每一张拓印下的碑文残片，都让海祇岛的学者们激动战栗。然而，探索的代价同样沉重，未知的能量陷阱、狂暴的元素乱流、神出鬼没的魔物与队员因环境不适产生的幻觉，造成了不可避免的减员。但这片被时光与海水遗忘的国度，正将其神秘面纱的一角，连同着其蕴含的无上瑰宝与致命危险，一同缓缓展现在心海与所有海祇子民的面前。"
 SAN_Event.32.a:0 "系统性地测绘与记录，优先建立安全通道与据点"
 SAN_Event.32.b:0 "针对性地寻找可能与当前抗争相关的知识或技术遗迹"

 # 33. 白夜国的遗产
 SAN_Event.33.t:0 "白夜国的遗产"
 SAN_Event.33.d:0 "随着探索的深入与对带回文物的初步破译，一个失落文明的轮廓逐渐从迷雾中浮现——‘白夜国’，一个在远比尘世七神体系更古老的年代，曾于这片黑暗深渊中创造出辉煌文明的国度。其文明水平在某些方面令人震惊：他们对地脉的研究达到了匪夷所思的深度，对元素力的理解与应用呈现出与如今神之眼体系迥异的路径；精密的机关术造物即使经历千年仍在部分运转；独特的冶炼与材料学知识揭示了现已失传的合金配方；更令人震撼的是，那些残破书卷与壁画中，隐约记载着关于‘原初之人’法涅斯、‘第二王座’降临、以及日月轮回等触及提瓦特世界根基的远古神话。这些知识碎片，如同散落在无尽黑暗中的璀璨星辰，亟待被串联、解读。心海在珊瑚宫的密室内，抚摸着那些脆弱的古老卷轴，心中涌起惊涛骇浪。白夜国的遗产，其价值根本无法用世俗的摩拉或领土衡量。它不仅能潜在且革命性地提升海祇岛的科技水平与生产力，更可能提供一种全新的、完全不同于天空岛与尘世七神叙事的视角，去重新审视这个世界的历史、本质与当下正在发生的一切。消化这份沉重而伟大的遗产，需要时间、需要最顶尖的智慧、更需要无比的谨慎，因为它可能带来力量，也可能带来认知的颠覆与不可预知的危险。但它无疑为海祇岛，打开了一扇通往提瓦特远古秘密与另一种可能性的、沉重的大门。"
 SAN_Event.33.a:0 "成立最高学术委员会，系统性地翻译、整理与研究中立知识"
 SAN_Event.33.b:0 "筛选与当前军事、生存迫切相关的技术，优先尝试复原与应用"

 # 34. 大日御舆的研究
 SAN_Event.34.t:0 "大日御舆的研究"
 SAN_Event.34.d:0 "渊下宫最令人叹为观止、也最令人费解的造物，莫过于那悬浮于虚空中央、如同微型太阳般的‘大日御舆’。它曾是白夜国子民的光明之源，是维系这片地下国度生态与文明的基石，如今虽光芒黯淡，但其庞大的结构与依然隐隐流转的能量波动，无言地诉说着古代科技的巅峰伟力。心海派遣了由顶尖学者、工程师与元素理论家组成的‘御舆研察小组’，在精锐部队的严密护卫下，克服重重困难，得以近距离观察研究。他们分析其外壳上精密如星辰运行轨迹般的能量回路纹路，推测其反重力悬浮的机理，尝试理解其在‘常夜’与‘白夜’两种状态间切换的原理。初步研究发现，大日御舆的核心似乎涉及对‘光界’力量的精妙抽取、转化与束缚，其能量利用效率与稳定性，远超当代提瓦特许多依靠神之眼或地脉供能的装置。尽管以海祇岛目前的技术水平，完全修复或复制大日御舆无异于天方夜谭，但仅仅是对其原理的粗浅理解与逆向工程尝试，就已经为海祇岛的能源技术、光学应用、材料科学乃至基础元素理论带来了爆炸性的启发。尝试安全地汲取其一丝泄露的能量，或模仿其部分结构设计制造小型的照明、供能装置，都可能为海祇岛带来跨越式的发展。这颗沉寂的远古太阳，正以其残存的光辉，默默地为它的后来者，照亮着一条通往更高技术领域的、布满荆棘的道路。"
 SAN_Event.34.a:0 "侧重能量研究，尝试理解并安全利用大日御舆的残余能量"
 SAN_Event.34.b:0 "侧重工程研究，尝试破解其悬浮与结构原理，寻求仿制可能"

 # 35. 深海龙蜥的研究
 SAN_Event.35.t:0 "深海龙蜥的研究"
 SAN_Event.35.d:0 "渊下宫的原住民——深海龙蜥，是探索队面临的最大、最直接的生存威胁之一。这些古老元素生物体型庞大、力量惊人、适应黑暗环境，且对入侵其领地者抱有根深蒂固的敌意。初期，军事化清剿是保障安全的唯一手段。但心海在听取战报后认为，简单的杀戮与驱逐并非长久之计，也非智慧之举。她指示研究团队，在确保绝对安全的前提下，尝试以全新的视角观察龙蜥：记录不同种类龙蜥的生态习性、社会结构（如有）、独特的元素运用方式（如雷、冰变种），以及它们与渊下宫特殊环境、地脉乃至大日御舆之间可能存在的能量循环与共生关系。一些惊人的发现逐渐浮出水面：龙蜥的甲壳与骨骼微观结构具有超乎寻常的物理与元素抗性；它们似乎能感知甚至一定程度上引导渊下宫紊乱的地脉能量；不同龙蜥变种间存在原始的狩猎协作。研究这些生物，不仅能直接提高在渊下宫行动的生存率与效率，其生物学特性（如抗性外壳、元素器官）也可能为军事防御（仿生护甲设计）、元素抗性研究以及生物仿生学提供宝贵的灵感。更重要的是，心海开始思考一个更深远的问题：是否有可能，在未来与这些渊下宫的‘古老主人’找到某种平衡甚至有限的‘默契’，而非进行永无止境的、消耗巨大的对抗？了解你的敌人，有时也是为了找到共存的可能。"
 SAN_Event.35.a:0 "以军事应用为导向，研究龙蜥的弱点、习性以便高效猎杀或防御"
 SAN_Event.35.b:0 "以生态与进化为导向，研究其适应性与共生机理，寻求长远共存策略"

 # 36. 奥罗巴斯的秘密
 SAN_Event.36.t:0 "奥罗巴斯的秘密"
 SAN_Event.36.d:0 "在渊下宫的最深处，尘封的密室或被遗忘的图书馆角落，探险队可能触碰到海祇历史最核心、也最敏感的真相——关于大蛇奥罗巴斯的一切。它为何离开这片先祖之地，带领子民前往充满未知的地上世界？它在白夜国时期究竟扮演了何种角色——是守护者，是统治者，还是别的什么？它与天空岛之间，与后来的雷神巴尔之间，究竟发生了什么？那些被精心保存或刻意抹去的记载，或许会揭示：奥罗巴斯可能不仅是带领者，更曾是白夜国信仰的核心，甚至是某些涉及远古禁忌知识的承担者与封印者。它折下珊瑚枝为子民照亮通往地面的路，其背后是崇高的牺牲与引导，还是不得已的逃亡与放逐？它最终向雷神发起那场注定失败的挑战，是源于疯狂与野心，还是蕴含着更深层的、或许与远古契约、世界秘密相关的悲剧性动机？了解这些，可能会彻底动摇海祇信仰数百年的根基，也可能让其历经淬炼而更加坚实；可能会带来身份的迷茫，也可能完成历史的补全。心海以极其慎重、甚至庄严的态度对待这些可能被发现的秘密，她召集最信赖的巫女与学者，在绝对保密的前提下进行研读。她知道，真相往往如同深海中的双刃剑，既能赋予穿透迷雾的力量，也可能带来撕裂灵魂的伤痛。但作为‘现人神巫女’，她有责任去面对、去理解，然后以无比的智慧与担当，决定哪些真相应该在何时、以何种方式，告知她的子民，从而重塑海祇的集体记忆，指引通往未来的道路。"
 SAN_Event.36.a:0 "以信仰巩固为先，选择性解读历史，强化大御神的牺牲与守护形象"
 SAN_Event.36.b:0 "追求完整的历史真相，无论其为何，以此为基础重塑更坚韧的族群认同"

 # 37. 渊下宫防御体系
 SAN_Event.37.t:0 "渊下宫防御体系"
 SAN_Event.37.d:0 "渊下宫不仅是探索的宝库与历史的课堂，也必须被纳入海祇岛的整体战略防御体系，成为最后的避难所、秘密的研究基地，甚至是未来可能的一条出其不意的战略通道。心海下令，在确保不破坏主要遗迹结构与历史价值的前提下，于渊下宫的关键入口、连接各区域的要道、以及具有重要价值的遗址周围，建立隐蔽而高效的防御工事与预警系统。利用渊下宫独特的‘常夜’与‘白夜’环境转换机制，设计出只有掌握特定规律或机关才能安全通过的门禁与通道。部署一支精锐的、长期驻守的‘渊下戍卫队’，他们不仅要防范可能通过其他未知入口进入的外敌，还要警惕渊下宫内部原生魔物与能量异变的威胁，并负责维护研究站的安全。同时，建立一条或多条安全、隐蔽、快速的，连接海祇岛本岛与渊下宫核心区域的专用撤离与补给通道，这条通道本身就需要重重机关保护。将渊下宫建设成一个可退守、可生产、可研究的立体化战略纵深基地，是一项极其庞大复杂的工程。但一旦初步完成，海祇岛将拥有一个近乎绝对安全、自给自足且充满可能性的‘地下国度’，其战略韧性将得到质的飞跃，使其能在最极端、最恶劣的地面战况下，依然保有文明的火种、反击的希望与重启的资本。"
 SAN_Event.37.a:0 "构筑重点防御，将关键遗迹区域打造成难以攻克的堡垒"
 SAN_Event.37.b:0 "建立弹性防御网络，利用复杂地形进行机动防御与隐蔽"

 # 38. 远古文明的技术复原
 SAN_Event.38.t:0 "远古文明的技术复原"
 SAN_Event.38.d:0 "知识必须转化为切实的力量。心海成立了直属珊瑚宫的‘古技转化司’，其任务是从白夜国浩如烟海却又支离破碎的技术记载中，筛选出那些相对完整、有现实实现可能性、且对海祇岛当下生存与发展有直接助益的项目，进行极其谨慎的复原实验与试制。可能的方向包括：基于古代合金配方，尝试改进现有武器与工具的硬度、韧性；解读部分相对简单的机关术原理，用于制造更高效的陷阱、防御器械或生产工具；研究白夜国的独特农业与照明技术，尝试在渊下宫特定区域或海祇岛本岛环境恶劣处建立试验田与永续光源；甚至尝试理解某些小型的、稳定的能量储存或转换装置。整个过程充满风险与不确定性，古代技术往往依赖现代已绝迹的材料、特殊的能量环境或失传的工艺，强行复原极易导致失败甚至事故。心海反复强调安全第一与循序渐进，反对任何好高骛远、盲目追求威力而忽视稳定性的尝试。每一项成功复原的微小技术，哪怕只是一个更高效的净水滤器、一种更坚固的建筑粘合剂，或是一套改良的助产技术，都是实实在在的、能够惠及民众、增强国力的进步。古文明的技术复原，是一场与时间赛跑的精细手术，旨在将失落已久的智慧与匠心，重新锻造成支撑海祇岛走向未来的、一块块坚实的基石。"
 SAN_Event.38.a:0 "优先复原军事与防御相关技术，如材料、机关、能量应用"
 SAN_Event.38.b:0 "优先复原民生与基础工业技术，改善人民生活，稳固社会根基"

 # 39. 太阳之子的救赎
 SAN_Event.39.t:0 "太阳之子的救赎"
 SAN_Event.39.d:0 "在探索与研究中，一个令人心碎与沉痛的发现逐渐清晰：关于‘太阳之子’的传说与悲剧——那些在特定仪式中，被选拔出来，以生命维持某种秩序或换取力量的孩童。相关的冰冷记载、遗迹中残留的祭坛、甚至某些区域弥漫不散的悲伤执念，都隐约揭示出白夜国历史中曾被黑暗笼罩的一页，那是文明在极端压力下可能滋生的残酷与非理性。心海对此表现出超越政治考量的深切悲悯与历史责任。她可能下令，在发现相关遗迹的区域举行庄严而肃穆的集体悼念仪式，由巫女引领，告慰那些在远古黑暗中逝去的幼小灵魂，并将这段历史作为最沉重的警示，写入仅供高层与学者阅览的内部档案。她向核心成员强调，海祇岛所追求的未来，无论是独立、自治还是革新，其根基必须建立在对每一个生命的尊重之上，绝不能重蹈以牺牲无辜者换取族群存续的黑暗覆辙，那将是对大御神引领子民走向光明之初心的彻底背叛。这份对古代悲剧的共情、反思与明确划清界限，进一步塑造了反抗军的内在伦理与斗争哲学：他们反抗暴政，不仅是为了肉体的生存与政治的自由，更是为了建立一个更加尊重人性、珍视生命、避免历史悲剧在任何形式下重演的、真正文明的新秩序。对‘太阳之子’的纪念与超越，成为了海祇斗争事业中，一道深沉而崇高的道德底色。"
 SAN_Event.39.a:0 "举行隆重悼念，将此事作为凝聚内部、明确斗争正义性的道德旗帜"
 SAN_Event.39.b:0 "深刻反思并制度性防范，将保护弱小写入未来宪章的核心原则"

 # 40. 渊下宫的完全整合
 SAN_Event.40.t:0 "渊下宫的完全整合"
 SAN_Event.40.d:0 "当对渊下宫的探索、基础研究、防御建设与初步技术转化达到一定阶段后，心海开始有计划地推动这片失落国度与海祇岛本岛社会进行深度融合。这不仅仅是军事和科技层面的整合，更是文化、身份与集体记忆的再融合与再创造。她组织本岛优秀的学者、匠人、艺术家乃至部分经过严格筛选的民众代表，在严密安保下，分批进入渊下宫进行参观、学习与体验，让他们亲身感受先祖故土的宏伟、智慧与悲壮，直观理解海祇文明的另一重深层次根源。有选择地、以恰当的方式，将渊下宫与白夜国的历史，补充并有机融入海祇岛正式的历史叙述与教育体系，重塑‘我们来自何处、我们何以成为我们’的完整集体认知。在确保安全与可持续的前提下，尝试在渊下宫环境可控、稳定的区域，建立小型的常驻综合研究站、特色生物与作物保育区、甚至是为极端情况预备的、可长期生活的避难社区。目标是让渊下宫从一个神秘的、有距离的‘他处’与‘宝藏’，逐渐转变、内化为海祇文明不可分割的‘另一维度’，一个承载着沉重过去、滋养着创新现在、也预备着无限未来的战略、文化与精神腹地。完成整合的海祇文明，将成为一个拥有‘表’（阳光岛屿）与‘里’（深渊故土）双重疆域与记忆的独特存在，其根基之深、历史之厚、韧性之强，将远超外界乃至其自身过去的想象。"
 SAN_Event.40.a:0 "强调历史连续性与神圣性，将渊下宫塑造为海祇文明的圣地与精神源泉"
 SAN_Event.40.b:0 "强调其现实战略与资源价值，将其建设为支撑国力的核心基地与创新工坊"

 #### 阶段5：提瓦特纵横（41-50）
 # 41. 前往璃月的秘密使团
 SAN_Event.41.t:0 "前往璃月的秘密使团"
 SAN_Event.41.d:0 "锁国令与雷暴如同无形的巨墙，将稻妻与外界隔绝。但心海从未放弃寻找外部世界的理解、同情与支持。她将外交突破的第一站，选定为以商贸立国、拥有成熟政治智慧、且与稻妻曾有官方往来（尽管已中断）的邻邦——璃月。利用少数敢于穿越雷暴、背景复杂的亡命商船，或‘海祇之鳍’中最精锐的浪船，携带以珊瑚宫秘法封印、盖有心海本人印鉴的国书，尝试接触璃月七星中可能对稻妻局势感兴趣、或持务实开放态度的成员（如掌管律法与人际的‘天枢星’天叔，或信息灵通的‘天权星’凝光）。国书以克制冷峻的笔调，陈述眼狩令的实质暴虐、锁国令对贸易与人道的摧残、海祇岛的抗争诉求与现状，不寻求璃月的直接军事介入（这目前不现实），而是希望建立秘密的、非官方的贸易渠道（以海祇珍珠、发光珊瑚工艺品、渊下宫部分安全矿产样本，换取粮食、药品、布匹、书籍与基础工业品），获取有限但关键的外交声援、情报交流与国际舆论支持。这是一场外交豪赌，一旦国书被截获或璃月方面拒绝甚至告发，海祇岛将外交破产，甚至招致幕府更严厉的打击。但若成功，海祇岛将获得一条宝贵的、突破封锁的‘脐带’，打破窒息般的孤立状态，并在提瓦特大陆错综复杂的地缘棋盘上，为自己这枚微小的棋子，争取到一个潜在支点。"
 SAN_Event.41.a:0 "以道义与贸易利益为切入点，寻求璃月官方的默许与民间渠道"
 SAN_Event.41.b:0 "以隐秘与灵活为首要，通过地下渠道与璃月有实力的商会单线联系"

 # 42. 蒙德自由城邦的联络
 SAN_Event.42.t:0 "蒙德自由城邦的联络"
 SAN_Event.42.d:0 "自由的城邦蒙德，其‘风’之精神与反抗压迫、追求自由的传统，似乎与海祇岛当下的抗争有着天然的共鸣。在尝试联络璃月的同时，心海也指示外交人员，寻找一切可能接触蒙德的途径。与对璃月的务实贸易诉求不同，对蒙德的接触更侧重于理念的共鸣、人道主义的呼吁与骑士精神的感召。密信可能通过吟游诗人、冒险家或往来商旅传递，信中着重描绘眼狩令如何扼杀个人的‘愿望’与‘神之眼’所代表的自由光芒，将海祇岛的斗争形容为‘在雷暴下守护最后的风之种子’。寻求西风骑士团（尤其是与璃月有外交联系、思维灵活的骑兵队长凯亚，或学识渊博的图书管理员丽莎）的理解与道义支持。同样不寻求直接的军事援助（距离过远），但希望能获取一些蒙德在游击战、民兵组织、山地作战方面的历史经验与战术思想（如果能以某种形式传递），或者通过蒙德的中立学者与冒险家协会，获取一些通用的科学技术、医学知识或地质勘探经验。蒙德远离稻妻，其官方直接干预的可能性极低，但其作为提瓦特重要一极所持的道义立场，其民间盛行的浪漫主义冒险精神与诗歌传说，可能在国际舆论与民间形象上，为海祇岛的抗争涂抹上一层追求‘自由’与‘梦想’的、易于被广泛接受的普世色彩，争取更广泛的、超越国界的同情与关注。"
 SAN_Event.42.a:0 "通过诗歌、传说与冒险故事，塑造海祇抗争的浪漫与自由英雄叙事"
 SAN_Event.42.b:0 "通过学者与骑士团的务实交流，寻求具体的非军事知识援助与经验分享"

 # 43. 须弥的学术交流
 SAN_Event.43.t:0 "须弥的学术交流"
 SAN_Event.43.d:0 "智慧的国度须弥，拥有提瓦特顶尖的学术资源与知识储备。心海对须弥的兴趣，主要集中于纯粹的知识与技术层面，这是一场‘智慧的交易’。她希望通过极其隐秘的渠道（或许通过璃月的中介，或伪装成求学的流浪学者），与须弥教令院中某些对古代文明、元素学理论、前沿医学、工程技术或社会制度有深入研究、且不那么拘泥于政治立场的学者建立联系。交易的筹码可能是海祇岛独有的、来自渊下宫的部分非核心历史文献抄本、特殊的深海生物样本、或稻妻独特的‘晶化骨髓’与‘祟神’能量的初步观测数据（经过脱敏处理）。作为回报，希望换取须弥学者在农业技术改良、基础医学、公共卫生、工程技术、基础教育体系等方面的通用知识指导，或就某些特定难题（如祟神能量的缓解、特殊材料的性质、古代文字的破译）提供学术咨询。这种交流可能通过加密信件、匿名发表的论文或在第三国（如璃月）的秘密学术聚会进行。风险在于知识可能被滥用，或海祇岛的核心秘密在学术交流中不慎泄露。但心海相信，在严格的知识产权界定与信息过滤下，获取须弥智慧殿堂的火花，能极大加速海祇岛的技术与知识积累，这是一种用金钱难以衡量的、长期的、战略性的投资。毕竟，知识本身就是一种力量，尤其对于寻求超越现状的势力而言。"
 SAN_Event.43.a:0 "以渊下宫考古发现为敲门砖，吸引须弥学者进行对等学术交换"
 SAN_Event.43.b:0 "聚焦当前最紧迫的技术难题，寻求须弥顶尖学者的针对性指导"

 # 44. 愚人众的试探
 SAN_Event.44.t:0 "愚人众的试探"
 SAN_Event.44.d:0 "愚人众，这个在稻妻暗中活跃、势力盘根错节、意图诡谲莫测的至冬国外交/情报组织，其存在感无法被忽视。心海对其抱有最高的警惕，深知与虎谋皮的道理，但也不得不正视其巨大的能量与影响力。她命令‘海祇之眼’加强对愚人众在稻妻诸岛（特别是鸣神岛、离岛、踏鞴砂）活动的情报搜集，重点关注他们与天领奉行、勘定奉行高层的接触，以及他们在各地异常事件（如御影炉心事故）中的潜在角色。同时，在极端谨慎、设定清晰红线的前提下，不排除通过极其间接、可随时切割的渠道（如雇佣的中间人），尝试接触愚人众中下层人员，目的仅限于：试探愚人众对稻妻当前局势的整体态度，了解其是否将幕府视为可合作对象，以及……评估其是否有意向海祇岛提供一些‘短期、有条件’的援助（如情报、非制式武器、资金），并探查其背后必然标有的、昂贵的价码。心海深知，任何来自愚人众的‘帮助’都必然伴随着深远的算计与控制企图，接触必须如履薄冰。核心原则是‘利用而不信任，接触而不依附，获取而不同流’，任何可能涉及出卖主权、核心利益或道德底线的条件都必须断然拒绝，并做好一旦发现对方有渗透或控制企图，便立刻切断一切联系、甚至反制曝光的准备。对愚人众的试探，是在最危险的刀锋上获取情报与可能的短暂利益，每一步都可能坠入深渊。"
 SAN_Event.44.a:0 "谨慎接触，尝试获取短期急需的情报或物资，但保持最高戒备"
 SAN_Event.44.b:0 "明确拒绝接触，避免任何瓜葛，以绝后患，保持抗争的纯洁性"

 # 45. 稻妻异见者的联络
 SAN_Event.45.t:0 "稻妻异见者的联络"
 SAN_Event.45.d:0 "敌人的堡垒往往从内部被攻破。眼狩令与锁国令在稻妻内部也并非没有反对者，不满的情绪在商人、学者、部分低级武士乃至普通民众中滋长。心海积极指示‘海祇之眼’与外交人员，在鸣神岛及其他幕府控制岛屿，秘密寻找并接触那些对幕府政策持批评态度、利益受损、或有独立倾向的家族、商会、浪人团体乃至个别有良知的低级官员。这些‘内部异见者’可能提供极其宝贵的内幕信息（如军队调动、物资囤积、高层矛盾），在物资采购、人员隐藏、舆论造势、甚至在关键时刻作为内应方面提供意想不到的帮助。接触需要万分小心，以单线联系、匿名方式进行，以防幕府间谍渗透或对方变节。心海指示，重点接触那些有切实把柄（如被眼狩令迫害）、信誉经过交叉验证、且诉求相对清晰的个体或小团体，避免与背景过于复杂、动机不明或过于激进冒险者深交。对内部异见者的工作，旨在扩大反抗阵线的社会基础与情报来源，从内部削弱幕府的统治根基，营造一种‘天下苦幕府久矣’、海祇抗争并非孤立的氛围。这些分散在各处的火星，一旦与海祇岛的火焰形成呼应，或将悄然改变力量对比，在关键时刻成为撬动大局的支点。"
 SAN_Event.45.a:0 "侧重接触对幕府不满的武士与商人，获取军事与经济情报"
 SAN_Event.45.b:0 "侧重接触知识分子与普通民众，传播理念，争取民心与舆论支持"

 # 46. 神里家的秘密接触
 SAN_Event.46.t:0 "神里家的秘密接触"
 SAN_Event.46.t:0 "神里家的秘密接触"
 SAN_Event.46.d:0 "三奉行之一，主管祭祀与文化、门风优雅开明的社奉行神里家，其年轻家主神里绫人以其深不可测的智慧与手腕著称。坊间隐约传闻，神里家对眼狩令与锁国令的态度颇为微妙，甚至暗中有所保留。心海将神里家列为最高优先级、也最危险的内部接触对象。接触必须是极度的隐秘、间接与高度象征性的，或许通过双方都可能信任的、游走于艺术与商业之间的中间人（如一位著名的画家或茶人），传递一些极其含蓄、充满隐喻、甚至可以推诿为寻常交际的信息。目的不是寻求即刻的结盟（这在当前是妄想），而是尝试建立一种超越公开对立状态的、心照不宣的‘默契’或‘理解通道’：让神里绫人明白海祇岛抗争的底线、理性诉求与非毁灭性目的；同时，试探神里家在幕府内部所能发挥的缓和、制衡或信息传递作用。即便不能成为盟友，若能使其在关键决策会议上保持沉默、或施加一些有利于局势缓和而非极端镇压的影响，便已是巨大的战略成功。与神里家的接触，是外交上最精细、最危险、也最考验智慧的一步棋，如同在蛛网上行走，一旦暴露，对神里家与海祇岛都将是灭顶之灾。但若成功，可能为未来残酷战争结束后，无论以何种方式收场，都保留下一扇政治对话与解决的、极其微小的窗扉。"
 SAN_Event.46.a:0 "传递和平与理性的信号，强调海祇诉求的有限性与正当性"
 SAN_Event.46.b:0 "展示实力与决心，让神里家意识到海祇是不可忽视的博弈方"

 # 47. 南十字船队的同盟
 SAN_Event.47.t:0 "南十字船队的同盟"
 SAN_Event.47.d:0 "横行于璃月至稻妻航线、不惧雷暴、以豪迈船长北斗为首的‘南十字’船队，是突破锁国令海上封锁的绝佳助力，也是非官方外交的独特渠道。与官方的繁文缛节不同，与北斗的接触更直接、更江湖气、更基于实际的利益与豪杰间的赏识。心海设法（或许通过救下的船员、或璃月的中间人）与北斗取得了联系。海祇岛可以提供安全的避风港、淡水资源、必要的船只维修支持（在隐秘地点），以及关于稻妻西部海域雷暴、航道与幕府巡逻的实时情报；作为回报，希望南十字船队能在其庞大的商业航行与私人业务中，偶尔、秘密地为海祇岛夹带一些用摩拉也难以购得的紧急物资（如特种金属、精密仪器、外国书籍），或传递几封不具名的信件。北斗的船队独立不羁，与璃月官方若即若离，这种非正式的、基于互相需要与个人信誉的‘盟约’或‘交易’，可能比脆弱的官方关系更为灵活、可靠且难以追踪。与北斗的合作，是为海祇岛脆弱的外交网络，增加了一条充满变数、胆魄与江湖义气的海上私掠线，它不保证稳定，却可能在最需要时，提供意想不到的突破。"
 SAN_Event.47.a:0 "建立稳固的物资交换与情报共享渠道，将南十字作为可靠的海上盟友"
 SAN_Event.47.b:0 "保持灵活的交易关系，根据每次航行的风险与收益临时协定"

 # 48. 眼狩令的国际宣传
 SAN_Event.48.t:0 "眼狩令的国际宣传"
 SAN_Event.48.d:0 "舆论战场同样至关重要。心海指示外交与情报人员，在所有对外接触中，有意识、有策略地将眼狩令的残酷性、非人道性与对‘愿望’的扼杀，作为核心宣传点。通过流亡者的口述、商人的见闻、甚至精心设计的‘漂流瓶’与匿名小册子，向提瓦特各国传递这样的信息：雷电将军所追求的‘永恒’，是建立在剥夺子民梦想、希望与个体神性的冰冷暴政之上。宣传力求真实、有细节、有血肉：描述某个年轻工匠失去神之眼后技艺尽失、浑浑噩噩；讲述一个母亲为保护孩子的神之眼而家破人亡；揭露幕府士兵强行收缴时的暴行。避免空洞的口号，旨在引发外国民众、学者、艺术家与有识之士本能的同情、愤慨与对‘永恒’理念的质疑。目标不是立即引来外国的军事干涉（这目前不现实），而是在国际社会与舆论场中，塑造一种不利于幕府统治的道德氛围，为未来可能的外交施压、制裁或民间抵制埋下伏笔，同时也能极大地鼓舞稻妻国内的反抗士气，让更多人意识到海祇岛抗争的正当性。这是一场争夺人心与道义制高点的隐形战争，海祇岛要用真相与故事作为武器，在提瓦特广阔的舆论海洋中，为自身的生存与抗争，争取最基本的正当性与广泛的同情。"
 SAN_Event.48.a:0 "以真实个案与情感故事打动人心，引发广泛同情与共鸣"
 SAN_Event.48.b:0 "以理性论述揭露政策矛盾，引发知识界对‘永恒’理念的批判思考"

 # 49. 海祇贸易路线的扩张
 SAN_Event.49.t:0 "海祇贸易路线的扩张"
 SAN_Event.49.d:0 "随着与璃月、南十字船队乃至其他潜在外国接触者建立初步联系，心海开始着手系统性地规划、管理与拓展海祇岛的‘秘密海上贸易网络’。这项工程需要极高的组织度与保密性：在岛屿隐蔽处设立几个绝密的夜间装卸码头与临时锚地，并经常轮换；设计多套复杂的航线、接头暗号与应急方案，以躲避日益严密的幕府海上巡查；制定统一的采购清单，优先获取药品、金属、书籍、精密工具与粮食种子；建立一套以物易物为主、辅以少量外国硬通货或贵金属的结算体系，并严格审计。心海可能指派最信任的、精通算术与 logistics 的官员专门负责这条‘海上生命线’的运作。这条隐形的贸易网络，是海祇岛战时经济的血管与外循环系统，输入不可或缺的养分与技术，输出特产以换取资源。它的顺畅与否，直接关系到海祇岛的战争潜力、技术升级与民生稳定，是除军事战线外，另一条必须坚守的、关乎生死存亡的生命线。每一次成功的交易，都是对锁国令的一次微小突破，也是对自给自足能力的一次补充。"
 SAN_Event.49.a:0 "优先保障战略与军事物资的输入，一切为战争服务"
 SAN_Event.49.b:0 "平衡军民需求，确保民生基本物资的输入，维持社会运转"

 # 50. 反抗军的国际支援
 SAN_Event.50.t:0 "反抗军的国际支援"
 SAN_Event.50.d:0 "持续而巧妙的外交努力、舆论宣传与人道主义呼吁，可能开始收获零星但珍贵的实质性国际支持。这未必是官方承认或公开声明，而可能表现为：某位璃月富商‘匿名’捐赠的一批粮食与药品，通过南十字船队运抵；某位须弥学者‘遗失’的一箱医学著作、农业技术手册与基础工程学图纸；蒙德的冒险家协会‘无意’中流传出的一些实用的野外生存与小队战术指南；甚至是通过复杂渠道获得的、来源成谜的少量制式武器或特种材料。这些支持虽然数量有限、渠道不稳定、且往往附带条件或期待回报，但其政治与心理意义重大。它意味着海祇岛的抗争不再被世界完全忽视或视为地方叛乱，开始获得超越国界的、基于人道或理念的同情与实质性援助。心海会珍视并谨慎利用每一份支持，确保其被用于最关键的环节，并给予适当的、不损害主权的回报（如贸易优惠、未来承诺、荣誉头衔）。同时，她将继续谨慎地编织和扩大这种国际同情网络，寻找更多潜在的‘沉默盟友’。国际支持的涓涓细流，正在遥远的大陆上悄然汇聚，虽然尚未能改变战局，但已为海祇岛这艘在雷暴中颠簸的孤舟，注入了来自更广阔世界的、宝贵的希望之光与续命之力。"
 SAN_Event.50.a:0 "公开感谢并宣扬国际支持，以此鼓舞内部士气，塑造得道多助形象"
 SAN_Event.50.b:0 "低调处理，避免刺激幕府，确保支援渠道的隐蔽与安全"

 #### 阶段6：心海的兵略（51-60）
 # 51. 珊瑚宫兵法
 SAN_Event.51.t:0 "珊瑚宫兵法"
 SAN_Event.51.d:0 "心海将从《兵书》研习、无数战例推演与实战经验中领悟的智慧，系统化、理论化，形成了一套独特的、深深烙印着其个人风格与海祇特色的军事学说——‘珊瑚宫流’战法。其核心精髓是‘全算’，即基于尽可能完整、多维的情报，进行覆盖各种可能性的沙盘推演与预案准备，追求‘未战而庙算胜’或‘以最小代价换取最大战略成果’。她强调指挥体系的扁平化与前线指挥官在总体预案框架内的临机决断权，反对僵化的层层上报。战术上，极端重视情报、地形、天气与民心向背的综合利用，推崇‘正合奇胜’：即以少数精锐进行欺骗、佯动、破袭，制造混乱与错觉，主力则用于关键时间、关键地点的决定性一击。后勤保障、医疗救护、心理战与情报战被提升到与正面作战同等重要的战略地位。心海亲自编写教材，并通过定期的沙盘推演、战例复盘与图上作业，向中高级军官灌输这一思想。‘珊瑚宫流’战法，是力量弱势一方将智慧与资源运用到极致的体现，它不追求场面宏大的会战，只追求最有效率、最具性价比的生存与胜利之道，旨在将海祇岛有限的军事力量，锻造成一把精准、致命、且难以捉摸的匕首，直刺敌人最脆弱的要害。"
 SAN_Event.51.a:0 "强化参谋体系与沙盘推演，将‘庙算’制度化、日常化"
 SAN_Event.51.b:0 "强调战术灵活性与基层主动性，培养能独当一面的前线指挥官"

 # 52. 两栖作战学说
 SAN_Event.52.t:0 "两栖作战学说"
 SAN_Event.52.d:0 "稻妻是群岛之国，任何大规模军事行动都离不开渡海登陆。心海大力发展专门的两栖作战理论、训练与装备体系。这包括：针对不同海滩地形（沙岸、岩岸、红树林、礁石区）的专用登陆工具研发与相应的战术操典；浪船部队的突击登陆、火力支援（如投石、弩箭）、人员运输与撤离的协同演练；登陆成功后快速巩固滩头、建立防线、并向内陆纵深发展的标准化流程；以及从海上强行撤出受困部队的应急预案。训练在严格保密的偏僻海湾与模拟环境下进行，模拟各种复杂情况：敌前登陆、夜间登陆、恶劣天气登陆、抗登陆反冲击。心海强调两栖作战的突然性、协同性、灵活性与撤退的果断性，反对教条的‘抢滩’思维。她设想中的理想两栖战，应是‘如海潮般悄然涌上预定滩头，达成战术目标后又能根据形势迅速退去或转换方向，让敌人无从捉摸’。这套学说的初步形成与部队的针对性训练，使海祇军开始初步具备跨岛投送兵力、实施战略性打击的能力，虽然规模与经验有限，但极大地扩展了其战略选择空间，使其能从意想不到的海岸，对幕府控制的岛屿构成直接威胁，将战争的主动权部分掌握在自己手中。"
 SAN_Event.52.a:0 "发展专业化登陆舰队与陆战队，进行高强度、高协同性训练"
 SAN_Event.52.b:0 "立足现有船只与人员，发展灵活、多变、适应性强的泛用两栖战术"

 # 53. 游击战术体系
 SAN_Event.53.t:0 "游击战术体系"
 SAN_Event.53.d:0 "这是海祇军在实力对比下最主要的生存与作战方式，心海与五郎将其提炼升华，总结出一套系统化的‘海祇游击要略’。其核心可概括为‘敌进我退，敌驻我扰，敌疲我打，敌退我追’的机动原则，但内涵远不止于此。它强调依托村落、山林、洞穴建立‘鱼水情深’的群众基础与秘密补给网络，使军队如鱼得水；擅长设置各类陷阱、诡雷与简易障碍，最大限度迟滞消耗敌军；精于伏击运输队、巡逻队与小股敌军，积小胜为大胜；极端重视战前侦察与战后快速撤离，避免贪功恋战。部队被编成大量灵活、精干、具备独立行动能力的小分队与武工队，深入敌后或战线间隙广泛活动，他们的主要目标往往不是歼灭敌军有生力量，而是破坏其交通线、通讯线路、后勤仓库，袭扰其指挥系统，消耗其精力与士气，同时广泛收集情报，并伺机打击薄弱环节。游击战如同附骨之疽，让庞大的幕府军陷入人民战争的泥潭，处处受制，风声鹤唳，却难以捕捉到反抗军的主力，最终达到瘫痪其战争机器、扭转力量对比的战略目的。这套战术体系，是海祇岛以弱抗强的智慧结晶，也是其生命力最顽强的体现。"
 SAN_Event.53.a:0 "强化小分队敌后破袭与情报搜集能力，如同手术刀般精准打击"
 SAN_Event.53.b:0 "发展广泛的民兵与地方武装，实施全域游击，让敌人陷入汪洋大海"

 # 54. 海祇精锐部队
 SAN_Event.54.t:0 "海祇精锐部队"
 SAN_Event.54.d:0 "在普遍进行游击战与分散作战的同时，心海也深知需要一支能在关键时刻执行高难度、高风险任务的‘拳头’部队，用于斩首、营救、破坏核心节点或打开战局。她从全军中万里挑一，选拔出身手最出色、意志最坚定、忠诚最可靠的士兵，组建了直属珊瑚宫与大将指挥的几支精锐单位，如专司突击与强攻的‘海祇之牙’，精于远程狙击与侦察的‘逐影之矢’，以及擅长潜入与爆破的‘渊海之触’。他们装备最好的武器与护甲，接受最严苛、最全面的训练：包括超高强度体能、各种武器的精准使用、爆破物制作与使用、潜伏伪装、野外生存、简单急救，甚至要求掌握一些目标地区的语言或习俗基础。他们不参与一般的治安战或消耗战，只执行由心海或五郎直接下达的、关乎战略全局的关键任务。这些精锐是海祇军最锋利的獠牙、最隐蔽的匕首，虽然人数稀少，但往往能起到四两拨千斤、一举改变局部乃至整体态势的战略效果。他们的存在与传奇战例，也成为了普通士兵仰慕与奋斗的标杆，激励着全军向更高的战斗标准看齐，是海祇军魂与战斗力的集中体现。"
 SAN_Event.54.a:0 "打造一支全能型的超级精锐，能够执行任何类型的最高难度任务"
 SAN_Event.54.b:0 "打造多支功能专精的特色精锐，分别擅长突击、侦察、渗透等不同领域"

 # 55. 情报战指挥中心
 SAN_Event.55.t:0 "情报战指挥中心"
 SAN_Event.55.d:0 "心海将情报工作视为战略博弈的核心，为此建立了高效、统一、高度专业化的情报战指挥体系。在珊瑚宫下设‘谋海司’，统一管理所有对外战略侦察、对内反间谍与安全保卫、密码编制与破译、舆论分析与心理战策划。心海本人是情报战的最高决策者与核心分析师，每日耗费大量时间阅读、交叉比对来自各渠道的情报摘要，从中捕捉细微的异常与关联。她强调情报的时效性、准确性、来源交叉验证与深度分析研判，反对未经甄别的情报泛滥与主观臆断。建立了严格的情报分级、知密范围与阅后即焚制度。同时，积极对幕府开展战略欺骗与舆论引导，通过双重间谍、伪装渠道散布精心编制的假情报，误导其战略判断，离间其内部关系。这套体系使得海祇军往往能‘先知先觉’，在幕府做出决策甚至行动之前，就已调整部署，预做准备。情报优势，成为了海祇岛在战场上最重要的非对称优势之一，是心海‘全算’战法得以实施、海祇军能够以弱抗强而不犯致命错误的最根本保障。谋海司，是海祇岛在无声战场上的大脑与神经中枢。"
 SAN_Event.55.a:0 "强化情报分析整合能力，建立覆盖全域的动态情报态势图"
 SAN_Event.55.b:0 "强化主动情报获取与欺骗能力，积极塑造敌方的认知与判断"

 # 56. 补给线破袭战略
 SAN_Event.56.t:0 "补给线破袭战略"
 SAN_Event.56.d:0 "面对总体实力占优、资源动员能力更强的幕府军，正面消耗战极为不利。心海制定了系统的、长期的‘遮断’战略，将敌人漫长而脆弱的海上与陆地补给线，作为主要攻击与破坏目标。她命令海军、游击队和精锐小队，持续不断地、有计划地袭击幕府的运输船队、沿海仓库、内河码头、陆上辎重队与护粮队。攻击讲究时机、方式与效果最大化：或在风暴过后敌船队队形散乱时集中突击；或利用内应破坏仓库关键结构；或在险要山路预设伏击圈；或针对运粮队实施骚扰，拖延其行程，增加其消耗。目标不仅是摧毁物资，更是要瘫痪其运输体系，打乱其补给节奏，迫使前线的幕府军陷入缺粮少弹、装备得不到维修的困境，从而严重削弱其进攻能力与持续作战意志，甚至被迫推迟或取消既定战役计划。这项战略需要极其精确的情报支持、长期的耐心与各部队的密切协同，效果不会立竿见影，但如同缓慢收紧的绞索，从根基上持续削弱着对手的战争能力与潜力，是海祇岛以弱制强、争取战略主动的关键长期战略之一。"
 SAN_Event.56.a:0 "集中力量打击关键战略物资运输线，如军械、粮食、晶化骨髓"
 SAN_Event.56.b:0 "广泛袭扰所有后勤节点，制造全面的补给困难与恐慌情绪"

 # 57. 心理战作战行动
 SAN_Event.57.t:0 "心理战作战行动"
 SAN_Event.57.d:0 "心海深谙‘攻心为上，攻城为下’的道理。她主导的心理战行动多样、隐蔽且极具针对性。在幕府军控制区与民间，秘密散发传单与小册子，揭露眼狩令的不公、高层腐败、战争的无意义与将领的无能；利用伪装成民间歌谣、怪谈的故事，传唱海祇岛抗争的正义性、幕府士兵无谓的牺牲以及雷电将军的冷漠；通过内线与双重间谍，在幕府军中散布诸如‘某次战败损失惨重被隐瞒’、‘援军不会到来’、‘将军已不再回应祈祷’等动摇军心、激化矛盾的谣言；甚至对特定的幕府将领或官员进行个性化的匿名恫吓、劝降或离间。心理战的目的在于瓦解敌方斗志，争取中间派与动摇者，鼓舞己方士气，在敌人内部制造猜疑、恐慌与不信任的裂痕。心海要求心理战的内容必须基于事实或巧妙编织，力求真实可信，避免低劣的辱骂与空洞宣传，以增强其渗透力与说服力。这场无形的战争在战场之外静默展开，旨在侵蚀幕府统治的精神根基与军队的作战意志，为最终的物理性胜利创造有利条件，甚至可能达到‘不战而屈人之兵’的部分效果。"
 SAN_Event.57.a:0 "针对敌军士兵与低级军官，瓦解其作战意志，鼓励逃亡与投降"
 SAN_Event.57.b:0 "针对敌国民众与中上层，揭露统治弊端，争取民心，制造社会压力"

 # 58. 海祇陆军现代化
 SAN_Event.58.t:0 "海祇陆军现代化"
 SAN_Event.58.d:0 "随着战争进行、资源积累（包括渊下宫技术转化和国际贸易）以及实战经验反馈，心海开始有步骤地推动海祇军的‘有限现代化’进程。其重点不在于追求最前沿、最昂贵的武器系统，而在于‘体系化’、‘标准化’与‘专业化’。统一并优化现有的武器装备制式，提高不同部队、不同批次装备的后勤兼容性与战场维修效率；建立更专业的工兵、通讯兵、医疗兵、宪兵等辅助兵种，明确其职责与编制；逐步改善部队的单兵装备，如设计更合身、防护与灵活性兼顾的轻型护甲，配备更耐用舒适的军靴，研发便于携带、营养均衡的单兵口粮；引进或仿制一些实用的技术装备，如改良的望远镜、简单的野战通讯器材、更高效的净水器。同时，完善军队的层级编制、条令条例、训练大纲与晋升考核体系。现代化是一个渐进、务实的过程，旨在稳步、扎实地提升海祇军的整体作战效能、持续作战能力、后勤保障水平与职业化程度，使其从一支优秀的、富有特色的‘起义军’、‘游击队’，逐步向更正规、更全面、更具韧性的‘国防军’方向演进，为应对更复杂、更残酷的战争阶段，乃至战后的国防建设，打下坚实的基础。"
 SAN_Event.58.a:0 "优先提升火力与机动能力，换装更精良的武器与载具（如改良浪船）"
 SAN_Event.58.b:0 "优先提升后勤保障与指挥通讯能力，夯实军队持续作战的根基"

 # 59. 跳岛作战计划
 SAN_Event.59.t:0 "跳岛作战计划"
 SAN_Event.59.d:0 "在防御稳固、军力有所成长、并掌握一定制海权的基础上，心海开始构思更具主动性、进取性的战略——跳岛作战。其核心思想是：不寻求一次性全面占领所有岛屿，而是像下棋一样，精心选择幕府防御链条上最薄弱、最具战略价值（如资源、地理位置、政治意义）的岛屿节点，集中优势海空（海上）力量，进行快速、猛烈的两栖突击，占领并巩固，将其变为新的前沿基地、资源补给点与出击阵地。然后以此为基础，威胁或切断邻近岛屿幕府军之间的联系，迫使其收缩、孤立或投降，从而一步步压缩幕府的战略空间，将战争引向敌人的腹地。计划需要周密的联合两栖作战预案、强大的海上掩护与制海权争夺能力、以及快速构筑防御工事与建立后勤体系的能力。目标可能是进一步肃清西部诸岛的幕府势力，或建立直接威胁鸣神岛本岛的跳板。跳岛作战计划是心海战略思维从‘求存防守’向‘主动谋势’乃至‘战略反攻’转变的标志，虽然执行风险极高，对海空军协同与后勤要求苛刻，但一旦成功实施，将彻底改变稻妻诸岛的力量对比与战场态势，将战争的主动权牢牢掌握在自己手中。"
 SAN_Event.59.a:0 "选择防御薄弱、资源丰富的岛屿，以战养战，逐步扩张"
 SAN_Event.59.b:0 "选择地理位置关键、能威胁鸣神岛的岛屿，实施战略性威慑与牵制"

 # 60. 心海的战争艺术
 SAN_Event.60.t:0 "心海的战争艺术"
 SAN_Event.60.d:0 "历经无数战火的淬炼、无数不眠之夜的推演、成功与失败的洗礼，心海的军事思想与指挥艺术，最终凝结成一部独属于海祇岛与她个人的、活的战争哲学。它没有固定的教条与框框，其最高精髓在于‘因敌变化而取胜’，如水无常形，因地制流。它完美融合了古代兵法的深邃智慧、海祇特色的地理文化与海洋文明特质、作为弱势方精准的生存哲学，以及心海个人对人性、战略、时机的深刻洞察与超凡直觉。这部‘战争艺术’体现在每一次精准致命的伏击、每一次行云流水的撤退、每一份巧妙绝伦的情报欺骗、每一次对战机的完美把握、以及对全军士气精妙而持续的提振之中。它被军官们心领神会，被士兵们自觉践行，融入海祇军的血脉。心海本人，就是这部战争艺术最完美的执行者与化身。她运筹于珊瑚宫，决胜于千里之外，以超凡的智慧、冷静的头脑、坚韧的意志与对子民深切的爱，指挥着一支起初弱小的军队，与一个庞大的国度进行着一场看似不可能的战争，并不断创造着奇迹。‘心海的战争艺术’，已成为海祇军战无不胜的信念源泉、最高指导原则，以及敌人眼中最难以捉摸、最令人畏惧的迷雾。"
 SAN_Event.60.a:0 "将心海的指挥思想编纂成典，作为高级军官的必修教材，代代相传"
 SAN_Event.60.b:0 "强调心海作为精神象征与最终决策者，其艺术存乎一心，难以复刻"

 #### 阶段7：正邪交锋（61-70）
 # 61. 邪眼工厂事件
 SAN_Event.61.t:0 "邪眼工厂事件"
 SAN_Event.61.d:0 "一个惊人的、经由多重情报渠道交叉验证的消息，以及随之而来的现场发现，如同惊雷般在珊瑚宫高层炸响：在八酝岛或神无冢某处人迹罕至的隐秘山谷或地下，存在一座由愚人众秘密运营的‘邪眼’工厂。这种危险的人造器物，能以透支使用者生命与精神为代价，强行赋予其元素力量。更令人发指的是，有蛛丝马迹表明，工厂的运作可能得到了幕府内部某些势力的默许、纵容甚至合作。而最致命的毒药是，有证据显示，这种邪眼正被秘密地、有针对性地提供给海祇反抗军中那些最激进、最绝望或最渴望力量的士兵。心海立刻意识到问题的极端严重性：这不仅是愚人众阴险的阴谋，更是对海祇抗争事业纯洁性的恶毒玷污与毒害，是在从内部腐蚀反抗军的灵魂与未来。她必须立刻做出最果断的反应：揭露并摧毁这个毒瘤，彻底清理内部，但所有行动必须如外科手术般精准、谨慎且迅速，以免造成大规模恐慌、内部猜忌连锁反应，或被幕府与愚人众趁机利用，将脏水泼到反抗军头上。邪眼工厂事件，将这场战争从单纯的理念与利益对抗，引入了更加诡谲、肮脏与考验人性的多方博弈与道德深渊，海祇岛来到了一个至关重要的岔路口。"
 SAN_Event.61.a:0 "以雷霆手段，立即秘密控制相关区域与人员，内部肃清与外部调查同步"
 SAN_Event.61.b:0 "暂时隐忍，秘密搜集更多铁证，等待最佳时机一举揭露，争取最大政治效果"

 # 62. 愚人众阴谋的揭露
 SAN_Event.62.t:0 "愚人众阴谋的揭露"
 SAN_Event.62.d:0 "在确保控制内部受影响人员、获取确凿证据并完成初步内部整顿后，心海决定主动出击，打一场精心策划的舆论与政治反击战。她并未选择立即公开所有信息，而是通过秘密渠道，将邪眼工厂的部分关键证据、愚人众在稻妻活动的其他线索，以及其与幕府内部某些人暧昧关系的暗示，巧妙地、分批分量地泄露给鸣神岛的异见者、外国商人、中立学者，甚至尝试通过极其隐秘的途径，传递给社奉行或其他可能心存疑虑的幕府内部人士。她并不指望一次就扳倒盘根错节的愚人众或幕府，而是要达成多重战略目的：在国际上和稻妻内部彻底破坏愚人众‘中立执行者’的伪装，揭露其阴谋家与搅局者真面目；离间愚人众与幕府中合作者的关系，制造猜疑与内讧；向所有关注稻妻局势的力量表明，这场战争背后还有第三只危险的、意图渔利黑手；同时，彻底洗刷反抗军可能被‘愚人众操控’的污名，捍卫抗争的自主性与正义性。这是一场高风险的信息心理战，心海如同在暴风雨中释放信鸽，希望它们能将真相与怀疑的种子，播撒到更广阔的土地，即便有些种子会落入敌手或石沉大海。但为了反抗事业的纯洁、内部的团结与未来的合法性，她必须亮剑，在道义的战场上争夺制高点。"
 SAN_Event.62.a:0 "发动全面的舆论攻势，公开谴责愚人众，争取国际国内广泛同情"
 SAN_Event.62.b:0 "采取精准的秘密外交揭露，重点针对幕府内部与外国政府，施加政治压力"

 # 63. 肃清愚人众的影响
 SAN_Event.63.t:0 "肃清愚人众的影响"
 SAN_Event.63.d:0 "舆论战之外，内部的肃清、整顿与巩固同步展开，且更为关键。心海以铁腕与怀柔并用的高超手腕，处理受邪眼影响的士兵与可能被渗透的环节。对于绝大多数受骗使用、或出于绝望而使用的士兵，以治疗、隔离观察、心理疏导与深刻教育为主，强调他们同样是受害者，是阴谋的牺牲品，但同时颁布最严厉的禁令，明确邪眼为禁忌之物，任何接触、使用、传播者将受军法严惩。对于少数与愚人众有较深勾连、或主动散布邪眼的害群之马，则进行秘密而公正的审查、审判与必要处置。整个反抗军体系借此契机，进行了一次深入的保密教育、忠诚审查与组织强化，进一步巩固珊瑚宫的权威与对全军的控制力，清除任何可能的不稳定因素。过程难免伴随着短暂的阵痛、猜疑与人心惶惶，但心海以公开、透明（在可公开的范围内）、公正的态度处理善后，并借机推动了一系列强化军队思想建设与内部监督的制度。最终，这场危机被转化为强化组织凝聚力、纯洁性与向心力的契机。经此一役，反抗军对愚人众的警惕提到最高，内部更加团结，心海的领导权威与智慧也更为全军上下所深信不疑。"
 SAN_Event.63.a:0 "从严从快，以肃清内部、巩固组织为第一要务，必要时使用雷霆手段"
 SAN_Event.63.b:0 "惩前毖后，治病救人，以教育挽救为主，重塑军队思想，维护内部稳定"

 # 64. 哲平的悲剧
 SAN_Event.64.t:0 "哲平的悲剧"
 SAN_Event.64.d:0 "邪眼从来不是冰冷的阴谋工具，它吞噬的是活生生的、有温度的生命与炽热的梦想。像哲平这样，原本满怀热血、渴望快速变强以守护同伴与家园的年轻士兵，成为了这场阴谋中最令人心碎的悲剧缩影。他那超出常理的急速衰老、力量反噬与最终在病榻上枯竭消逝，不仅仅是一个个体的死亡，更在海祇军内部引发了巨大的情感海啸、道德震撼与集体反思。心海亲自处理其后事，给予其战士的荣誉，并以他的故事为最沉痛的现实教材，在全军进行了一场关于‘力量本质’、‘抗争意义’与‘生命价值’的深入讨论与思想整风。她向所有将士明确宣告：反抗，是为了守护生命、未来与希望，任何以透支生命、出卖灵魂为代价换取的捷径力量，都是对反抗初衷最彻底的背叛，是将自己变成曾经所对抗的、漠视生命的怪物。哲平的悲剧被深刻铭记，不是为了渲染悲伤与绝望，而是为了明确一条不可逾越的底线：海祇岛的战士，必须清醒、健康、心怀光明地活着，去战斗，去见证，并亲手建设他们所争取的那个珍视每一个生命的未来。这份沉重的悲恸，最终化为了全军更坚定的意志、更清醒的认知与更牢固的伦理防线。"
 SAN_Event.64.a:0 "将哲平追认为烈士，以其故事激励将士，铭记教训，化悲愤为力量"
 SAN_Event.64.b:0 "深刻反思军队思想建设，建立更完善的心理疏导与价值观引导体系"

 # 65. 神无冢总攻
 SAN_Event.65.t:0 "神无冢总攻"
 SAN_Event.65.d:0 "时机终于成熟。在长期的袭扰疲惫、情报优势掌握、可能的内部策动、以及邪眼事件导致幕府军内部信任受损等多重因素作用下，心海与五郎及参谋们判断，盘踞神无冢的幕府军主力已显出疲态、士气低落与防御缝隙。一场代号‘怒涛’的精心策划的总攻势，在黎明前最黑暗、海雾最浓的时刻骤然发动。这不是传统的正面强攻，而是心海‘全算’战法的集中体现，一套多路并进、虚实结合的‘组合拳’：精锐的‘海祇之牙’小队早已潜入，在总攻开始时同时破坏多处关键防御设施、通讯节点与指挥部；多支两栖部队在数个次要的、防守薄弱的海滩同时发起登陆佯动，制造全面登陆的假象，最大限度地分散和迷惑守军；而真正的主力，则从一条经营已久的、极其隐秘的山地通道突然涌出，直插九条阵屋核心防御区域的侧后薄弱环节。心海的推演几乎预判了守军大部分的反应模式。战斗激烈而残酷，但准备充分、战术灵活、士气如虹的海祇军逐渐占据上风。当朝阳艰难地穿透硝烟与海雾，照亮神无冢的海岸时，九条阵屋上飘扬的幕府旗帜已然落下，燃烧的营寨、溃散的士兵与成队的俘虏，宣告了海祇军在战略层面上的重大胜利。通往鸣神岛的最后一道门户，被硬生生砸开了一道裂缝。"
 SAN_Event.65.a:0 "集中绝对优势兵力，速战速决，力求全歼或击溃神无冢幕府军主力"
 SAN_Event.65.b:0 "以歼灭有生力量与夺取战略要地为主，击溃敌军后不过度追击，稳固新战线"

 # 66. 名椎滩之战
 SAN_Event.66.t:0 "名椎滩之战"
 SAN_Event.66.d:0 "名椎滩，这片饱经战火洗礼、见证无数次拉锯的广阔滩涂，再次成为了决定战争走向的关键战场。从神无冢溃退的幕府军一部，与紧急从鸣神岛驰援的部队在此汇合，试图背靠大海，建立最后一道防线，阻截海祇军向鸣神岛本土的进军。心海与五郎决心在此一举歼灭其有生力量，打掉幕府军反扑的锐气。战斗在涨潮时分开始，海祇军利用对潮汐规律的精确掌握，以部分兵力从正面发起强攻，牢牢牵制住敌军主力；与此同时，真正的杀招——由五郎亲自率领的主力精锐，乘坐浪船，利用涨潮的海水掩护，悄然绕至敌军漫长的侧翼，在一片礁石区后方成功登陆，随即向敌军阵线腰部发起迅猛的夹击。五郎身先士卒，其勇武极大鼓舞了全军。幕府军背水列阵，抵抗异常顽强，但被突如其来的侧后突击彻底打乱了阵脚，指挥陷入混乱。战斗从清晨持续到午后，鲜血染红了浅滩与近岸的海水。最终，幕府军防线全面崩溃，残部丢弃辎重，向鸣神岛内地溃逃。名椎滩之战，是海祇军从战略相持转向战略进攻的里程碑，证明了其已不仅限于游击袭扰，更具备了在正面野战中击溃幕府正规军主力的能力，这场胜利极大地震撼了鸣神幕府上下，也彻底点燃了海祇军进军鸣神岛的信心与决心。"
 SAN_Event.66.a:0 "乘胜追击，尽可能扩大战果，摧毁敌军重装备，俘获更多人员"
 SAN_Event.66.b:0 "适时收兵，巩固滩头阵地，整顿部队，为跨海进攻鸣神岛做最后准备"

 # 67. 进军鸣神岛
 SAN_Event.67.t:0 "进军鸣神岛"
 SAN_Event.67.d:0 "跨越浩瀚的雷暴之海，将战火引向雷电将军统治的核心领土——鸣神岛本土，这是一个历史性的时刻，也是一场极度危险的战略豪赌。庞大的海祇军舰队在夜雾与一场季节性风暴的掩护下，从多个港口悄然启航，战士们怀抱着必死的决心、改变时代的渴望，以及对身后家园的深沉眷恋。航行充满难以预料的危险，不仅要面对变幻莫测的海洋与依旧肆虐的雷暴，更要警惕幕府海军主力的拦截与围剿。心海坐镇中枢，通过快船与信号在各分队间传递指令，根据海况与敌情实时调整航向与队形。当鸣神岛那在晨曦微光中逐渐清晰的、陡峭而漫长的海岸线映入眼帘时，所有人的心都提到了嗓子眼。登陆地点经过反复侦察与推演，并非防守最严密的离岛或主要港口，而是选择了一处相对偏远、防御相对薄弱但地势复杂、便于登陆后向纵深发展的海岸。抢滩战斗依然激烈，幕府守军进行了顽强抵抗，但凭借战役的突然性、前期充分的准备与士兵高昂的士气，海祇军成功在数个滩头建立了稳固的桥头堡，并将它们迅速连接起来。反抗军的旗帜，数百年来第一次，真正地、牢牢地插在了鸣神岛的土地上。这一步，意味着战争进入了最后、也是最残酷、最不可预测的阶段——直捣黄龙。"
 SAN_Event.67.a:0 "巩固和扩大登陆场，建立坚固的滩头阵地，确保后勤通道安全"
 SAN_Event.67.b:0 "不等完全巩固，立即派遣精锐向纵深穿插，打乱敌军部署，扩大战果"

 # 68. 九条阵屋的陷落（鸣神岛）
 SAN_Event.68.t:0 "九条阵屋的陷落（鸣神岛）"
 SAN_Event.68.d:0 "在鸣神岛建立的桥头堡迅速巩固并扩大，兵锋直指幕府在岛上西南区域的重要军事支点——一处由九条家直属精锐部队驻守的大型营寨（可视为鸣神岛上的‘九条阵屋’）。此时幕府内部因前线连遭惨败、邪眼阴谋曝光、以及海祇军成功登陆核心领土而陷入巨大的混乱、互相指责与士气危机，守军虽据险而守，但斗志已衰。海祇军没有立即强攻，而是采取围困、心理攻势与重点突击结合的战术。心海派人将劝降信用箭射入营中，信中列数眼狩令之弊、战争无益，并承诺优待投降的将士与民众。同时，小股精锐部队不断袭扰，切断其水源与外联通道，特种小队则潜入破坏其粮仓与武器库。在内无粮草、外无援兵（援军或被阻截，或逡巡不前）、士气濒临崩溃的情况下，守军将领在经过短暂而徒劳的抵抗后，最终在保全部下性命的考量下，开寨投降。此役不仅一举拔除了一个关键军事据点，获得了大量急需的补给物资，更产生了难以估量的政治与心理影响：象征着幕府军事权威与荣耀的九条家直属部队成建制投降，极大地打击了幕府的威信，动摇了其他守军的抵抗决心，也向所有稻妻人昭示，幕府的统治并非坚不可摧，海祇军已是一支可以决定战局的强大力量。"
 SAN_Event.68.a:0 "接受投降，优待俘虏，以此彰显海祇军的仁义与气度，分化瓦解敌军"
 SAN_Event.68.b:0 "严格审查俘虏，将高级军官与顽固分子羁押，士兵经教育后酌情补充入辅助部队"

 # 69. 幕府的政治危机
 SAN_Event.69.t:0 "幕府的政治危机"
 SAN_Event.69.d:0 "军事上的连续惨败，如同沉重的铁锤，终于敲碎了幕府统治看似坚固的外壳，其内部长期积累的矛盾、派系倾轧与统治合法性危机如同高压下的熔岩，彻底爆发。天领奉行九条家因战事接连失利、损兵折将，以及与愚人众可能勾结的嫌疑（被心海巧妙放大）而声望扫地，内部主战派与保守派争论不休；勘定奉行柊家则忙于自保，对战争支援消极，试图与败局切割；社奉行神里家态度愈发暧昧难明，静观其变。普通民众与下级武士中对眼狩令的怨恨、对战争的厌倦、对物资短缺的不满情绪如野火燎原。甚至天守阁也陷入了不寻常的寂静，雷电将军长久未公开现身，流言四起。整个鸣神岛的统治体系陷入了功能紊乱、信任破产与决策瘫痪的深度危机。心海敏锐地捕捉到这一千载难逢的变化，她命令前线部队在继续军事推进的同时，加强政治宣传与攻心，强调只追究上层决策者的战争责任，保护平民与反正人员，进一步分化瓦解幕府的统治基础与社会支持。幕府，这个庞大的战争机器与统治机构，正在从内部发出不堪重负的、即将解体的嘎吱声，为海祇岛的最终胜利，铺平了道路。"
 SAN_Event.69.a:0 "利用敌方危机，加强军事压力，争取在敌方崩溃前取得决定性军事胜利"
 SAN_Event.69.b:0 "利用敌方危机，加强政治攻势，争取幕府内部开明派倒戈或民众大规模支持"

 # 70. 天守阁前的对决
 SAN_Event.70.t:0 "天守阁前的对决"
 SAN_Event.70.d:0 "战争的高潮，最终以最具稻妻传统与宿命色彩的方式到来——御前决斗。当反抗军兵临稻妻城下，局势紧绷至弦断之际，或许是来自内部的巨大压力，或许是将军本人意志的体现，一场将直接决定战争最终走向的决斗，在天守阁前那被千年雷樱木环绕的广庭上上演。代表反抗军出战的，可能是继承了友人遗志、背负着两颗闪耀神之眼的浪人武士枫原万叶，也可能是其他心怀觉悟、技艺已达化境的勇士。而他们的对手，是代表将军威严与武艺极致的‘天狗’九条裟罗，或是某位隐世的幕府剑豪。这不再仅仅是武艺的比拼，更是两种理念、两种未来、两种‘永恒’理解的激烈碰撞。是眼狩令所代表的、凝固一切的‘静止的永恒’，与万众愿望所汇聚的、不断向前的‘流动的永恒’之间的最终仲裁。整个稻妻，从珊瑚宫的谋士到街头巷尾的平民，似乎都在这场决斗中屏住了呼吸。心海在远方的军帐中，无法亲临，但她通过‘海祇之眼’最迅捷的情报网络，密切地关注着每一瞬的刀光剑影、每一次气息的变换。她手中的笔在《兵书》空白处轻轻点着，推演着每一种可能的结果。她知道，这一战的结果，将直接决定是需要惨烈的、可能付出无法承受代价的攻城战，还是可能迎来戏剧性的政治转机，抑或是……引发那位端坐于净土之中的雷电将军本尊的最终裁决。当决斗者的刀剑最后一次交击，发出清越或沉闷的鸣响，当胜负分晓、生死立判的刹那，无论结果如何，稻妻的历史都已被这凝聚了所有矛盾与希望的一击，永久地劈开了一道新的裂隙或通路。"
 SAN_Event.70.a:0 "全力支持我们的决斗者，将全部的希望与信念寄托于此役"
 SAN_Event.70.b:0 "做最坏的打算，最好的准备，无论决斗结果如何，军队都做好应对预案"
 #### 阶段8：海祇终章（71-80）
 # 71. 眼狩令的终结
 SAN_Event.71.t:0 "眼狩令的终结"
 SAN_Event.71.d:0 "决斗的余响尚未在稻妻城上空完全消散，一道震动全国、足以载入史册的命令（或可被解读为永恒意志的体现）自高耸的天守阁传出，如同驱散乌云的惊雷，瞬间传遍诸岛：眼狩令，即刻废止。所有被收缴的神之眼将陆续归还其主。对于饱受其苦的稻妻民众，特别是那些失去光芒、梦想蒙尘的持有者，以及将反抗此令作为核心旗帜的海祇岛而言，这无疑是漫长黑夜后的第一道、也是最明亮的曙光，是无数牺牲、泪水与不屈抗争换来的最直接、最宝贵的成果。消息如同海潮般涌上海祇岛，军营与占领区爆发出震天的、夹杂着哭泣的欢呼，许多士兵相拥而泣，他们知道，战友的血没有白流。心海在珊瑚宫接到密报时，长长地、无声地舒了一口气，仿佛卸下了千钧重担，但她的目光随即恢复了往日的清明与审慎。她立刻向前线与后方发布严令：全军严禁借此胜利机会进行任何报复、劫掠或侮辱行为，必须表现出比幕府鼎盛时期更佳的纪律、风度与仁恕之心。同时，她迅速通过公开渠道，以珊瑚宫的名义欢迎并赞扬这一决定，将其视为迈向真正和平、纠正历史错误的第一步。但她的内心深处无比清醒：废止一道法令易，消除数百年积累的隔阂、猜疑与战争创伤难；赢得一场战役乃至战争的阶段性胜利易，构建持久、公正、且被双方接受的未来秩序难。眼狩令的终结，不是终点，而是一个全新、更复杂、更需要智慧与勇气的政治局面的开始。海祇岛，与整个稻妻一起，站在了历史的十字路口，而心海，必须为她的子民选择前路。"
 SAN_Event.71.a:0 "以最大的诚意欢迎和平，主动释放善意，为和谈创造氛围"
 SAN_Event.71.b:0 "保持战略定力，在欢庆的同时不放松军事戒备，以实力保障谈判地位"

 # 72. 与幕府的和谈
 SAN_Event.72.t:0 "与幕府的和谈"
 SAN_Event.72.d:0 "在剑拔弩张的军事对峙因眼狩令废止而出现缓和，且幕府统治陷入内部危机的背景下，和平的窗口终于艰难地开启。在心海的积极推动、社奉行等内部势力的秘密斡旋，以及国际社会（如璃月、枫丹）可能的调停下，海祇岛与鸣神幕府的代表，最终在某个中立地点（或许是离岛，或由第三方船舰提供场所）开始了漫长、艰难而充满博弈的和平谈判。心海为谈判设定了清晰的核心目标：保障海祇岛的信仰、文化与高度自治地位；公正追究战争责任（特别是与愚人众勾结的决策者）；合理的战后重建补偿与地位安排；以及确保眼狩令、锁国令等极端政策被永久废除，并建立防止其复辟的机制。谈判桌上，双方代表唇枪舌剑，每一句措辞、每一个条款都关乎未来国运；谈判桌下，暗流涌动，情报战、心理战、利益交换与威胁恫吓从未停止。心海运筹帷幄，既通过外交渠道展现充分的和平诚意与妥协空间，也在军事上保持适度压力，以‘打’促‘和’，确保谈判桌上能拿到战场上赢得的东西。每一次条款的初步敲定，都伴随着激烈的内部争论、风险评估与对未来平衡的算计。这是对她政治智慧、耐心、决断力与战略远见的终极考验。和谈的成功与否，将直接决定稻妻是走向一个持久的、哪怕是脆弱的和平新时代，还是陷入新一轮的、更加血腥的动荡与分裂循环。"
 SAN_Event.72.a:0 "坚持核心诉求，在原则问题上不退让，确保海祇的生存与尊严"
 SAN_Event.72.b:0 "展现灵活性，在次要问题上妥协，以换取谈判成功与快速和平"

 # 73. 海祇的独立宣言
 SAN_Event.73.t:0 "海祇的独立宣言"
 SAN_Event.73.d:0 "经过艰苦卓绝的战斗与曲折的谈判，海祇岛赢得了其梦寐以求的地位——作为一个拥有完全主权、高度自治的政体，正式脱离鸣神幕府的直接统治，与鸣神岛在全新的、平等的基础上，构建未来的邦交或联邦关系。独立宣言在珊瑚宫前的广场上庄严宣读，当代表海祇意志与海洋文明的旗帜在万众瞩目下缓缓升起，古老的歌谣再次响彻云霄，与海浪声、民众的欢呼声交织成时代的强音。人们抛洒着珍珠与花瓣，欢庆这来之不易的自由，告慰长眠于海渊与大地的先烈。心海站在高台上，望着下方欢腾如海洋的人群，精致的面容沉静如水，心中却是百感交集——有胜利的欣慰，有对逝者的缅怀，更有对未来的无限责任。独立不是终点，而是更艰巨的国家建设的起点。她立即着手将战时体制平稳过渡，组建正式的、具有广泛代表性的治理机构，领导制定确立国体与民权的宪法，将英勇的反抗军整合改编为国家防卫力量，并开始全面规划战后的经济重建、基础设施修复与社会融合。国际社会开始陆续承认这个新生的海洋国度。海祇独立，是武力、智慧、牺牲与时机共同铸就的奇迹，它为一个长期处于边缘、受压迫的独特文明，赢得了自主决定命运、掌握自身未来的神圣权利，在提瓦特大陆的东海上，刻下了属于自己的一笔，宣告了一个古老文明的复兴与一个新生国度的诞生。"
 SAN_Event.73.a:0 "立即着手建国，快速建立完善的行政、立法、司法体系，稳定政权"
 SAN_Event.73.b:0 "渐进改革，在维持战时高效体制的基础上逐步民主化，避免剧烈动荡"

 # 74. 稻妻幕府的改革
 SAN_Event.74.t:0 "稻妻幕府的改革"
 SAN_Event.74.d:0 "另一种可能的历史选择是：海祇岛不寻求彻底的分离，而是以胜利者、改革者与拯救者的姿态，深度介入并主导战败的鸣神幕府的全面改造。心海可能凭借其巨大的个人威望、无可争议的军事实力、以及社奉行等内部改革派的支持，推动一场自上而下、触及根本的‘稻妻维新’。这场改革旨在：彻底废除陈腐的、由三奉行垄断的寡头统治体制，建立更具代表性、更透明的议会或全民咨政机构；清算战争罪犯、腐败官僚与无能将领，提拔有能力、有民望的新人进入领导层；修订法典，保障包括海祇信仰在内的各文化族群的平等权利与宗教自由；将眼狩令、锁国令等错误政策及其思想根源彻底扫入历史垃圾堆，重新定义‘永恒’的内涵。这意味着一场不流血的‘政治革命’，心海本人可能成为摄政、首席顾问或类似的关键角色，以其智慧与平衡力驾驭全局。这条路充满巨大的挑战，需要高超的政治手腕平衡各方利益，化解千年积怨，调和不同文化，但其成功，将缔造一个统一、革新、更具活力与包容性的新稻妻，彻底终结内部纷争与压迫的历史循环，实现真正意义上的‘一国两制’或多元一体。这不仅是对海祇的解放，也是对鸣神的重生。"
 SAN_Event.74.a:0 "采取激进改革，快速摧毁旧体制，建立以心海为核心的新领导架构"
 SAN_Event.74.b:0 "采取渐进改革，保留部分旧体制框架，逐步注入新血与理念，减少阻力"

 # 75. 海祇与鸣神的和解
 SAN_Event.75.t:0 "海祇与鸣神的和解"
 SAN_Event.75.d:0 "在最高的神话、精神与历史认知层面，促成一种象征性的、超越世仇与死者的伟大和解。这可能需要揭示被掩埋的历史真相（来自渊下宫的研究），让双方子民理解，大蛇奥罗巴斯与雷神巴尔（影）之间的悲剧，并非简单的正邪对立或侵略与反抗，而是源于更复杂的远古缘由、历史误会、命运捉弄或更高层次的理念冲突。心海与重拾自我、直面过去的雷神（影）或许会进行一场穿越时空的对话，在无想刃狭间或珊瑚宫前共同纪念所有逝者，抚平历史的伤痕。双方同意，在海祇岛与鸣神岛分别建立国家级的和平纪念馆与历史反思遗址，将这段完整、复杂、充满反思的历史写入共同的教科书。这种精神上的和解，旨在从根本上消弭两族之间基于神话叙事与历史教育形成的深刻精神仇恨与身份对立，为未来的和平共处、相互尊重乃至融合，奠定最坚实、最深层的情感与文化基石。它意味着原谅，但不忘却；意味着放下仇恨，但需共同铭记教训，防止悲剧重演。这是最为艰难、也最为崇高的一种终结纷争的方式，它追求的不仅是领土与政治的解决，更是心灵的治愈与族群关系的重生。"
 SAN_Event.75.a:0 "共同编纂权威历史，确立官方叙事，引导民众走向理解与包容"
 SAN_Event.75.b:0 "推动民间交流与文化交流，让和解在艺术、教育与日常生活中自然发生"

 # 76. 稻妻诸岛的统一
 SAN_Event.76.t:0 "稻妻诸岛的统一"
 SAN_Event.76.t:0 "稻妻诸岛的统一"
 SAN_Event.76.d:0 "以海祇岛为核心与领导力量，通过军事胜利的余威、政治联盟的构建与人心所向的大势，最终将分裂、对峙的稻妻诸岛重新整合为一个统一的新国家。这个新国家不再以鸣神岛的‘幕府’为单一、绝对的中心，而是可能采用联邦或邦联制，在统一的国防、外交与核心法律下，充分尊重各成员岛（海祇、清籁、鹤观乃至神无冢、八酝岛）的文化独特性、历史传统与高度自治权。心海可能成为这个新生‘稻妻联邦’的首任执政官、议长或精神领袖。统一的过程伴随着最后的军事行动（清剿负隅顽抗的极端势力）和极其复杂的政治谈判与利益分配。需要制定一部得到各方认可的统一宪法，组建联合政府、联邦议会与联合国防军，协调各岛经济发展，建立跨岛的基础设施与贸易网络。这标志着‘稻妻’这个概念的重生与升华，从一个以雷电将军与鸣神文化为中心的、带有帝国色彩的旧政权，转变为一个多元一体、和而不同、共同发展的现代岛国联盟。海祇的抗争，最终不是为了取代一个暴君，也不是为了独善其身，而是为了联合所有被压迫、被忽视的岛屿与人民，共同创造一个属于所有稻妻人的、更自由、更公正、更繁荣的新国家与新未来。"
 SAN_Event.76.a:0 "建立以海祇为核心的强有力联邦政府，确保统一国家的凝聚力与执行力"
 SAN_Event.76.b:0 "建立松散但平等的邦联，赋予各成员岛极大自主权，维持灵活的合作关系"

 # 77. 海祇的海洋霸权
 SAN_Event.77.t:0 "海祇的海洋霸权"
 SAN_Event.77.d:0 "凭借战争中锻炼出的强大水师、对诸岛航路的实际控制、渊下宫古代技术转化带来的潜在优势，以及战后独特的海洋地缘位置，海祇岛致力于确立其在稻妻海域、乃至更大范围内（如东海至璃月航线）的海上主导权。这不仅是军事战略，更是国本所系。大力发展先进造船业，建造融合了传统工艺与古代科技的特色战舰；建立系统的海上贸易保护、航线管理、海上救援与反海盗体系；将海军建设为国家最重要的支柱与荣耀象征。海祇的商船与护航舰队将活跃在提瓦特各条主要航线上，其海军基地与友好港口将成为地区安全与稳定的保障。心海可能倡导并尝试建立一种基于海洋合作、自由贸易、航行安全与共同开发（如渔业、矿产）的‘海祇秩序’或海洋合作组织，与璃月、枫丹等海洋国家展开深度战略合作。海祇岛，将从大陆边缘的‘化外之地’、‘边缘之岛’，彻底转变为拥抱蔚蓝、连通世界、以海立国、以海兴国的海洋强国，其命运与意志，将与浩瀚无垠的海洋紧紧绑定，其影响力也将随着航路，辐射向更遥远的大陆。"
 SAN_Event.77.a:0 "建设一支强大的远洋海军，保障航线，拓展利益，必要时展示力量"
 SAN_Event.77.b:0 "侧重发展商业船队与海上基建，通过经济与贸易合作确立海洋影响力"

 # 78. 海祇联邦的建立
 SAN_Event.78.t:0 "海祇联邦的建立"
 SAN_Event.78.d:0 "心海可能为她所缔造或主导的新国家，选择一条更具包容性、现代性与理想性的政治道路——建立‘海祇联邦’。其政体精巧地结合了代议民主（选举产生议会）、贤能政治（由考试与推举产生的精英行政官僚）与传统信仰顾问团（巫女与学者组成的咨询机构），既保障公民的基本权利与政治参与，又确保决策的效率、专业性与智慧深度。宪法明确规定信仰自由、文化平等、司法独立与人权保障。经济上鼓励创新、贸易与可持续发展，建立初步的社会福利与医疗保障体系。教育系统融合了海祇传统文化、鸣神古典精髓与提瓦特通用科学知识，培养面向未来的国民。外交上奉行和平、开放、中立与积极合作的原则。这个联邦不仅是海祇人的家园，也欢迎所有认同其宪章理念、愿在此安居乐业的稻妻子民（包括许多来自鸣神的移民）。它象征着一种不同于传统神权、军国或寡头统治的全新政治实验，一个在战火废墟上建立的、试图兼顾自由与秩序、效率与公平、统一与多元、传统与现代的崭新国度。心海的政治理想，从《兵书》中的谋划与战时领袖的担当，最终变成了现实中正在生长、充满希望的国家蓝图。"
 SAN_Event.78.a:0 "建立稳固的民主共和制度，确保权力来源于民众，运作于阳光之下"
 SAN_Event.78.b:0 "建立开明的贤能君主制或指导式民主，以心海及其继承者的智慧引领国家过渡"

 # 79. 海祇大御神的遗产
 SAN_Event.79.t:0 "海祇大御神的遗产"
 SAN_Event.79.d:0 "最终，无论海祇岛走向独立、联邦还是统一国家的核心，其抗争、新生与未来道路，都被视为对海祇大御神奥罗巴斯遗产最真正的继承、升华与超越。祂曾折下珊瑚枝，带领先民走出黑暗的渊下，寻找地上的光明与生存空间；而心海则带领子民冲破暴政的乌云，赢得尊严、自由与决定未来的权利。奥罗巴斯的牺牲精神、庇护意志与对子民深沉的眷顾，在新的时代被赋予了全新的实践内涵：从被动承受庇护到主动争取命运，从缅怀牺牲到创造新生。海祇的文化与信仰，不再是被排斥、被边缘化的‘异质’文化，而是稻妻文明多元瑰宝中不可或缺、灿烂夺目的一枝，是其深沉、坚韧、与海洋共舞的独特面向。海祇的子民，可以坦然地为自己的血脉、传统、历史与抗争而自豪，这份自豪不再伴随悲情，而是充满力量与希望。这份‘遗产’，是深入血脉的逆境韧性，是追求自由的不屈勇气，是守护家园的深沉智慧，也是面向未来的开放胸襟。它激励着一代代海祇人，同时也成为提瓦特世界一个关于小国不屈、文明存续、智慧胜强的永恒传奇。心海与她的同胞们，用鲜血、汗水与智慧，为‘海神的遗产’写下了最辉煌、最动人的当代篇章。"
 SAN_Event.79.a:0 "将奥罗巴斯信仰官方化、国教化，作为凝聚国民的核心精神纽带"
 SAN_Event.79.b:0 "将奥罗巴斯精神世俗化、哲学化，融入国民教育与公民道德之中"

 # 80. 海祇的荣光
 SAN_Event.80.t:0 "海祇的荣光"
 SAN_Event.80.d:0 "当硝烟彻底散尽，和平真正降临，重建的旗帜在废墟上高高扬起，海祇岛迎来了其历史上空前的‘荣光时代’。这荣光，并非指称霸的虚荣或征服的傲慢，而是指：一个曾经贫瘠、受压、被忽视的岛屿，通过其子民不屈的抗争、卓越的智慧、深沉的牺牲与对未来的坚定信念，赢得了完全的自主、不容侵犯的尊严、坚实的繁荣与广泛的尊重；其独特的深海文化得以保护、弘扬并与世界对话；其开创的政治实验为国家带来稳定、希望与活力；其故事激励着提瓦特所有追求自由、正义与尊严的心灵。扩建后的珊瑚宫更加宏伟庄严，成为政治决策、文化殿堂与学术研究的中心；港口千帆云集，街市充满活力与各式口音；学堂里传来孩童清朗的读书声，其中既有古老的蛇神歌谣，也有渊下的星图，还有璃月的算学与枫丹的机械原理。心海或许逐渐退居幕后，担任终身执政官、护国者或精神领袖，将治国重任平稳地交给经过考验的新一代。海祇岛，如同一颗历经黑暗深渊与惊涛骇浪磨砺、终被时光与奋斗拭去尘埃的绝世珍珠，在提瓦特大陆的东海上，散发着温润、坚定、充满希望与智慧的光芒。这荣光，属于每一个为之奋斗过的平凡英雄，属于那位在惊涛骇浪中始终稳操舵盘、指引方向的现人神巫女，也属于那片永不屈服于黑暗与压迫的、在星空与深渊之间倔强升起的土地。"
 SAN_Event.80.a:0 "心海功成身退，成为国家的象征与精神灯塔，见证并守护她的理想实现"
 SAN_Event.80.b:0 "心海继续引领国家一段时间，亲自将制度与理念夯实，确保转型平稳"





