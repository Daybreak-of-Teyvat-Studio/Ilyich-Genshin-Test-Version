 AI_MESSAGE_category3_MES8_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 噢？莫非是最近的星空轨迹发生了异常的偏斜，独独眷顾了 [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName]？若非如此，这场对决的画卷本应由不同的笔墨描绘！"
 AI_MESSAGE_category3_MES9_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 回溯尘封的魔神战争纪元，诸强对决皆凭本源伟力与无上权能，何等恢宏直接。若依彼时古法，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 绝无可能以此等…机巧之术，窃取胜机。"
 AI_MESSAGE_category3_MES10_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 诚然，在决定乾坤的时刻，命运的骰子未曾为吾停驻。故而有此对 [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 的败绩。纵有万全庙算，在无常的天理面前，亦如沙上刻文，转瞬即逝。"
 AI_MESSAGE_category4_MES1_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 在座诸位皆为明证，[?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 背弃神圣盟约，行径与资敌无异，其名当为盟约殿堂永久铭刻的污点。"
 AI_MESSAGE_category4_MES2_BOX2:"[?global.trashtalk_own_country_tag_box2.GetFlag][?global.trashtalk_own_country_tag_box2.GetLeader]: 这 [?global.trashtalk_other_country_tag_box2.GetNonIdeologyName] 可还有资格立于盟约之列？事到如今，即便是与一支明码标价的雇佣兵团「镀金旅团」协作，也比这所谓的盟友更令人感到安心与可靠。"

