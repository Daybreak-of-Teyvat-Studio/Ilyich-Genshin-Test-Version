 # ===================== 一、决议类本地化（ SAN_Decisions）=====================
 # 内政民生类
 SAN_decision:"珊瑚改新"
 SAN_decision_desc:"海祇岛的潮汐往复不休，珊瑚宫的治理却曾因权责芜杂、流程繁冗，如被暗礁牵绊的航船，难抵岛民之心。此番梳理行政体系，恰似为海祇的脉络清淤——明晰各寮各司之责，简化政令传递之途，让珊瑚宫的每一道指令，都能如洋流般顺畅淌过每一处村落的栈桥，抵达每一片渔场的渔火旁，让海祇的治理如潮起潮落般有序，如珊瑚生长般稳固。\n\n现人神巫女威望：§R[?SAN_prestige]§!\n"
 # ===================== 一、决议类本地化（ SAN_Decisions）=====================
 # 内政民生类
  SAN_decision_01:"整顿海祇岛行政"
  SAN_decision_01_desc:"海祇岛的行政体系曾如缠绕珊瑚的海草，权责交织、流程滞涩，让珊瑚宫的政令难以及时抵达望泷村的渔户、水月池的巫女。此番整顿如疏浚岛下水脉，厘清各寮署的执掌边界，简化文书流转的繁冗环节——让民生诉求如潮汐般顺畅上达，让治理指令似洋流般精准传递。从村落的渔获分配到珊瑚宫的祭祀筹备，每一项事务都有章可循，每一份诉求都有处可依。当行政效率如珊瑚生长般稳健提升，海祇岛的运转便如奥罗巴斯庇佑时那般有序，为反抗幕府的大业筑牢根基。"

  SAN_decision_02:"推行海神信仰教化"
  SAN_decision_02_desc:"海祇大御神奥罗巴斯以自身血肉创造海祇岛，以珊瑚枝点亮渊下宫的黑暗，这份创世之恩是岛民最深刻的信仰烙印。幕府铁蹄踏破鸣神海域的宁静后，这份信仰曾在战火中蒙尘。如今重启祭祀之仪，在珊瑚宫的祭台点燃千年不熄的圣火，由现人神巫女心海亲自主持祷文，向岛民传扬海神的意志——反抗幕府的抗争，不是叛逆，而是守护海神赐予的家园；坚守海祇的土地，便是回应奥罗巴斯的创世之愿。当颂歌回荡在水月池上空，当珊瑚枝护身符佩戴在每个岛民胸前，信仰便如深海珊瑚的根系，将涣散的民心紧紧凝聚，成为无坚不摧的精神屏障。"

  SAN_decision_03:"兴修水利设施"
  SAN_decision_03_desc:"海祇岛依海而生，却曾受困于水——旱季时田垄龟裂如干涸的礁岩，潮汐泛滥时淡水被咸潮浸染。兴修水利便是循着海神的指引，疏浚岛内纵横交错的天然水脉，如梳理奥罗巴斯遗落的发丝；在海岸筑起弧形堤岸，似珊瑚群礁守护浅滩的宁静。这些设施不仅为望泷村的农田引来甘洌的灌溉之水，为珊瑚宫的巫女储备纯净的祭祀之泉，更让海岛在无常的气候中站稳脚跟。当蓄水池盛满雨水，当导流渠分引流洪，海祇岛的土地便如被海神亲吻，稻浪翻滚、渔获丰饶，为反抗军提供源源不断的粮草，让生民在战乱中得以安居。"

  SAN_decision_04:"完善医疗体系"
  SAN_decision_04_desc:"反抗幕府的烽火中，刀兵无眼，疫病易生，海祇岛的医者曾如散落在海面的浮木，难以支撑起救治的重任。完善医疗体系便是搭建守护生命的港湾：在望泷村、月浴之渊增设疗愈寮舍，以渊下宫流传的古法结合海祇草药，为伤员清创止血；挑选聪慧的岛民跟随老医者学习医术，推广外伤包扎、疫病预防的常识。心海亲自主持编撰《海祇疗愈方策》，将珊瑚礁的止血黏液、海草的消炎功效尽数收录。当寮舍的药香取代战场的血腥，当医者的双手抚平战士的创伤，反抗军的战力便无需因伤病折损，平民的生命亦能在战乱中得到庇护，这份温暖如深海暖流，滋养着海祇的生机。"

  SAN_decision_05:"渔业产业升级"
  SAN_decision_05_desc:"渔业是海祇岛的命脉，是奥罗巴斯赐予岛民的生存馈赠。但旧有的捕鱼方式粗陋，渔获存储仅凭天然冰窖，难以支撑反抗大业的消耗。产业升级便是对这份馈赠的珍视：改良渔船的船身设计，效仿渊下宫海渊民的造船技艺，让船只更耐风浪；划分禁渔海域，遵循海洋的节律休养生息，保障渔获的可持续产出；建立盐渍、风干的存储工坊，让渔获能长期储备，成为反抗军的行军口粮。更将部分渔获通过秘密航线运往璃月，换取钢材与军械。当升级后的渔船满载而归，当存储的渔获堆积如山，渔业便不再仅是饱腹之需，更成为支撑战争的经济支柱，让海祇岛的每一滴海水都流淌着抗争的力量。"

  SAN_decision_06:"推行全民教化"
  SAN_decision_06_desc:"海祇岛的智慧藏在奥罗巴斯的创世传说中，刻在渊下宫的石根文字里，却曾因战乱与蒙昧难以传承。推行全民教化便是点亮岛民心中的明灯：在珊瑚宫旁开设学堂，邀请学识渊博的巫女传授文字、算数，让孩童能读懂海神的祷文，让成人能记录渔获的账目；讲解海祇岛的历史渊源，从奥罗巴斯创世到与幕府的纷争，让每个岛民知晓抗争的意义；传授航海、辨识草药的实用技能，提升生存能力。学堂的读书声与祭台的颂歌交织，知识的光芒如大日御舆的光辉，驱散蒙昧的阴霾。当岛民不再是目不识丁的渔樵，当智慧转化为生产的动力与抗争的勇气，海祇岛的反抗便有了坚实的根基，而非仅凭血气之勇。"

 # 军事建设类
  SAN_decision_07:"扩充反抗军规模"
  SAN_decision_07_desc:"鸣神海域的浪涛因幕府的眼狩令而翻涌，海祇岛的土地因暴政而震颤。扩充反抗军规模，便是汇聚每一份守护家园的力量——望泷村的渔郎放下渔网，握紧父辈传下的刀；月浴之渊的巫女收起法杖，拿起淬炼的长枪；就连渊下宫的海渊民也走出深海，以独特的水系术法支援抗争。心海亲自为新兵授勋，将珊瑚宫的纹章印在他们的铠甲上，宣告：「我们反抗的不是稻妻，而是剥夺自由的暴政；我们守护的不仅是海祇，更是每个神之眼持有者的尊严。」当反抗军的队伍如涨潮般壮大，旗帜在海风中猎猎作响，这份众志成城的气势，便足以让幕府的武士闻风丧胆。"

  SAN_decision_08:"强化剑术训练"
  SAN_decision_08_desc:"海祇岛的剑士传承着奥罗巴斯留下的战技，以灵动迅捷见长，却在幕府武士的重甲面前一度受挫。强化剑术训练便是打磨最锋利的刃：邀请岛中幸存的老武士担任教头，传授「珊瑚流」剑术，步法如潮汐进退，剑锋似珊瑚穿刺；在礁石密布的浅滩设置训练场，让士兵在海浪的冲击中锤炼平衡，在礁石的磨砺中强化臂力。心海更从《海祇兵法》中摘录实战技巧，强调「以柔克刚」，利用海岛地形克制幕府的重装部队。当每个士兵的剑锋都能劈开铁甲，当每一次挥砍都带着海风的锐势，近战搏杀中，海祇的剑士便如深海中的鲛鲨，成为幕府武士的致命克星。"

  SAN_decision_09:"组建弓箭手军团"
  SAN_decision_09_desc:"海祇岛的密林与潮间带是天然的狙击战场，组建弓箭手军团便是将地形优势转化为战力。选拔视力如鹰隼、臂力如礁岩的岛民，配备以珊瑚木为弓身、鲛筋为弓弦的特制长弓，箭头淬有海蛇毒液，见血封喉。训练中，士兵需在晃动的渔船上精准射击目标，在茂密的丛林中隐蔽潜行，模仿海渊民的伏击战术。心海亲自制定训练章程，强调「借风借潮」，利用海风调整箭矢轨迹，趁着涨潮的声响掩盖行动踪迹。当弓箭手军团潜伏在红树林中，箭矢如飞鱼般穿梭，幕府的军队便未近敌身已先遭重创，这份远程压制力，成为反抗军克敌制胜的关键。"

  SAN_decision_10:"建造近海巡逻舰队"
  SAN_decision_10_desc:"海祇岛的海岸线是抵御幕府的第一道屏障，建造近海巡逻舰队便是为这道屏障添上移动的堡垒。工匠们效仿渊下宫的造船技艺，以耐腐蚀的珊瑚木与深海矿石打造船体，船身轻便灵活，适合浅海航行；船舷架设连发弩箭与投石器，既能快速打击敌方小艇，又能震慑来犯的水师。巡逻舰队分为三班，日夜穿梭在鸣神海域与海祇岛之间，重点守卫月浴之渊的渊下宫入口与望泷村的渔港。船员们都是熟悉潮汐规律的老渔郎，能凭借海浪的声响判断船只方位，借着星光导航。当巡逻舰队的帆影出现在海平面，幕府的袭扰便如退潮般消散，海祇的渔业航线与秘密贸易通道得以畅通。"

  SAN_decision_11:"完善伏击战术体系"
  SAN_decision_11_desc:"海祇岛的地形复杂多变，红树林遮天蔽日，潮间带沟壑纵横，完善伏击战术体系便是将这片土地化为幕府的坟墓。心海依据《海祇兵法》，结合渊下宫的迷宫布局，制定出「潮涌伏击阵」——涨潮时，士兵潜伏在水下暗礁后，待敌方船只靠近便以钩镰破坏船底；退潮时，利用裸露的泥沼阻碍敌军行进，再从两侧密林发起突袭。更训练士兵模仿海妖的啼鸣，制造恐慌，扰乱敌军阵型。每个伏击点都设有珊瑚暗号，以礁石的排列、海草的摆放传递信息。当幕府军队踏入海祇岛，便如闯入迷宫的猎物，处处遭遇突袭，步步陷入绝境，在无形的战场中被逐步蚕食。"

  SAN_decision_12:"组建珊瑚宫近卫师团"
  SAN_decision_12_desc:"珊瑚宫是海祇岛的政治与信仰中心，是心海的居所，更是反抗大业的指挥枢纽。组建近卫师团，便是为这份核心筑起最坚固的守护。从反抗军中遴选百里挑一的精锐，要求不仅武艺高强，更需对海神与心海绝对忠诚。他们配备最精良的装备：铠甲以珊瑚鳞片镶嵌，轻便且防御力十足；武器是心海亲赐的「海神之锋」，剑身刻有奥罗巴斯的纹样，蕴含水系神力。近卫师团分为两部分，一部分驻守珊瑚宫，守护心海的安全；另一部分作为机动部队，在战局关键时投入战场，成为攻坚的利刃。当近卫师团的红色披风在珊瑚宫前展开，便如一道不可逾越的屏障，彰显着海祇岛的尊严与决心。"

 # 外交谋略类
  SAN_decision_13:"加强情报网络建设"
  SAN_decision_13_desc:"幕府的动向如深海暗流，稍有疏忽便可能让反抗大业陷入绝境。加强情报网络建设，便是为海祇岛装上「千里眼」与「顺风耳」。派遣机敏的细作伪装成商人、流民，潜入稻妻城、踏鞴砂等地，打探幕府的军备调配、将领部署；与璃月的南十字船队建立联系，通过海上贸易线路传递情报；甚至说服部分不满幕府暴政的海乱鬼，成为潜伏在敌人内部的眼线。情报网络的核心设在珊瑚宫的地下密室，由心海亲自负责分析整理，将零散的信息拼凑成完整的战局图景。当幕府的每一次调动、每一个阴谋都被提前洞悉，海祇岛的反抗便不再是盲目的抗争，而是精准的反击，总能在最关键的时刻占据先机。"

  SAN_decision_14:"扩大反幕府宣传"
  SAN_decision_14_desc:"眼狩令的苛政让稻妻万民身陷苦难，幕府的暴政如乌云笼罩鸣神岛，扩大反幕府宣传便是刺破这层黑暗的光。将幕府剥夺神之眼、镇压异见的暴行编撰成歌谣，让渔郎的号子、巫女的颂歌都成为反抗的传声筒；写成檄文，用海祇岛特有的珊瑚汁书写，贴满离岛的码头、稻妻城的街巷；制作印有「神之眼自由」的护身符，通过秘密渠道分发到稻妻各地。宣传的核心并非煽动仇恨，而是唤醒良知——让稻妻的民众知晓，海祇岛的反抗不是叛乱，而是为了每个拥有梦想的人；让幕府的士兵明白，他们守护的不是永恒，而是压迫。当反抗的声音如海浪般席卷稻妻，越来越多的人便会站到珊瑚宫这边，让自由的火种燎原。"

  SAN_decision_15:"寻求璃月进一步支援"
  SAN_decision_15_desc:"璃月港的岩王帝君与海祇大御神虽分属不同神明，但对契约与自由的坚守一脉相承。寻求璃月进一步支援，便是缔结跨越海域的盟约。派遣使团携带海祇岛的特产——深海珍珠、珊瑚玉雕、秘制海盐，前往璃月港面见璃月七星，以未来的贸易承诺为契，请求物资援助：坚固的钢材用于打造战船，充足的粮草用于补给军队，精湛的工匠用于修缮工事。璃月的南十字船队更答应开辟秘密航线，为海祇岛运送急需的军械与药品。当璃月的商船穿过鸣神海域的雷暴，带来的不仅是物资，更是国际社会的认可，让幕府的锁国令形同虚设，让海祇岛的反抗不再是孤军奋战。"

  SAN_decision_16:"与蒙德建立友好关系"
  SAN_decision_16_desc:"蒙德的风神巴巴托斯崇尚自由，这份理念与海祇岛反抗暴政的初心不谋而合。与蒙德建立友好关系，便是携手同路的旅人。向蒙德派遣外交使节，带去海祇岛的创世传说与反抗历程，交流游击作战的战术——蒙德的游侠擅长山林伏击，其经验对海祇岛的海岛作战极具借鉴价值；更邀请蒙德的吟游诗人来到海祇，将反抗的故事谱写成诗歌，在提瓦特大陆传唱，以此削弱幕府的舆论优势。蒙德的骑士团虽不直接参战，却承诺为海祇岛提供医疗援助与情报支持。当蒙德的风带着自由的气息吹过海祇岛的珊瑚林，便为这场抗争注入了新的力量，让稻妻的自由之路不再孤独。"

  SAN_decision_17:"心理作战升级"
  SAN_decision_17_desc:"战争的胜负，不仅在刀兵相见的战场，更在人心的博弈。心理作战升级，便是用无形的武器瓦解幕府的意志。散布真假难辨的情报，声称海祇大御神显灵，降下神罚警示幕府；制造「奥罗巴斯遗骨异动」的传闻，利用幕府士兵对魔神的敬畏之心，使其军心涣散；甚至模仿幕府将领的笔迹，伪造调兵文书，让其内部产生猜忌与混乱。心海深知，幕府的士兵多是被迫参战，对眼狩令并非全然认同。通过被俘的士兵传递海祇岛的优待政策，承诺只要放下武器，便不会追究其罪责。当心理防线先于铠甲破碎，当士气的旗帜先于刀枪倒下，幕府的军队便未战先怯，即便人数占优，也难抵内心的溃败。"

  SAN_decision_18:"整合反抗军指挥体系"
  SAN_decision_18_desc:"反抗的火种曾散落于海祇岛的各个角落，望泷村的自卫队、渊下宫的海渊民、流浪的武士，各自为战，如分散的溪流难以形成巨浪。整合指挥体系，便是将这些力量汇聚成无坚不摧的洪流。废除各自为政的山头制度，设立统一的指挥中枢，由心海担任最高统帅，五郎担任副将，统筹全局；制定标准化的军令与信号，确保指令能快速传递到每一支队伍；进行兵种调配，将擅长近战的武士、擅长远程的弓手、擅长术法的海渊民合理组合，形成互补。当指挥体系如珊瑚的骨架般稳固，反抗军的每一次冲锋都步调一致，每一次撤退都井然有序，心海的智谋便能无阻碍地贯彻，让反抗的力量发挥到极致。"

 # 决战准备类
  SAN_decision_19:"全面战备动员"
  SAN_decision_19_desc:"鸣神岛的雷暴隐隐传来，幕府的大军已在神无冢集结，决战的时刻终于来临。全面战备动员，便是将海祇岛的所有力量都投入这场自由之战。发布全民动员令：老弱妇孺负责粮草运输、伤员救治；青壮男子全部加入军队，奔赴前线；工匠们日夜不休，打造刀剑、修缮战船；巫女们在珊瑚宫持续祈祷，为反抗军加持祝福。心海站在珊瑚宫的最高处，向全岛宣告：「今日我们为自由而战，为海神而战，为稻妻的未来而战！胜，则海祇永存，自由普照；败，则以身殉国，魂归奥罗巴斯麾下！」全岛上下同仇敌忾，渔船上的帆都换成了反抗军的旗帜，农田里的稻穗都被收割作为军粮，就连孩童都在学习包扎伤口、传递消息，整个海祇岛都化作一台为决战运转的机器。"

  SAN_decision_20:"突破幕府海上封锁"
  SAN_decision_20_desc:"幕府以「锁国令」为借口，派遣水师在鸣神海域布下严密的封锁线，妄图切断海祇岛与外界的联系，将反抗军困死在孤岛上。突破封锁，便是打破这层致命的枷锁。心海制定「潮汐突袭计划」，利用海祇岛士兵熟悉潮汐规律的优势，选择在满月之夜、潮水最高时发起进攻。反抗军的战船伪装成渔船，借着夜色与海浪的掩护，悄悄靠近幕府的舰队；待抵达预定位置，突然升起战旗，以连发弩箭与火油攻击敌方船帆；同时，潜伏在水下的海渊民以水系术法破坏敌方船底，制造混乱。这场突袭如迅雷不及掩耳，幕府的舰队在毫无防备中溃散，封锁线被撕开一道缺口，璃月的物资、蒙德的援助得以顺利进入海祇岛，反抗军的士气也因此暴涨。"

  SAN_decision_21:"夺取制海权"
  SAN_decision_21_desc:"制海权是稻妻战局的关键，谁掌控了鸣神海域，谁便掌控了补给线与进攻通道。夺取制海权，便是与幕府水师展开终极对决。心海亲自率领主力舰队，以珊瑚宫为旗舰，整合了巡逻舰队与改装的渔船，组成庞大的作战编队。战前，她向士兵们讲述奥罗巴斯当年统领海渊民纵横深海的传说，鼓舞士气。战斗中，海祇舰队利用浅海地形灵活穿梭，避开幕府大型战船的冲击；以「群狼战术」围攻敌方旗舰，先用火油烧毁其帆，再以钩镰固定船只，派士兵登船肉搏。当幕府水师的旗舰在鸣神海域沉没，当海祇的旗帜飘扬在每一艘幸存的战船上，稻妻近海的制海权便彻底易主，为后续攻占港口、进攻本岛奠定了基础。"

  SAN_decision_22:"攻占幕府港口"
  SAN_decision_22_desc:"幕府控制的关键港口是其后勤枢纽，囤积着大量军械与粮草，也是进攻稻妻本岛的必经之路。攻占港口，便是斩断幕府的臂膀。心海制定「水陆夹击」战术：陆军由五郎率领，从陆路包围港口，切断其陆地增援；水师由心海亲自指挥，从海路封锁港口航道，阻止敌方撤退。港口的幕府守军凭借坚固的防御工事负隅顽抗，架设的火炮对海祇舰队造成不小威胁。心海见状，下令让部分战船伪装撤退，引诱敌军追击，再派精锐小分队趁虚而入，从港口后方的浅滩登陆，夺取火炮阵地。当陆路的反抗军攻破港口大门，海路的士兵登岸夹击，幕府守军腹背受敌，最终溃败。攻占港口后，反抗军获得了充足的物资补给，建立起前进据点，迈出了进攻稻妻本岛的第一步。"

  SAN_decision_23:"建立前进作战基地"
  SAN_decision_23_desc:"攻占的港口是深入稻妻本岛的跳板，建立前进作战基地，便是为这场持久战筑牢根基。基地的选址经过心海精心考量，背靠礁石群，易守难攻，且靠近水源与林地，便于补给。士兵们与工匠们一同劳作，修建坚固的堡垒作为指挥中心，搭建粮仓存储缴获的粮草，打造军械库修缮武器装备，挖掘战壕与掩体防御敌方反扑。基地内还设立了临时疗愈寮舍，由海祇岛的医者负责救治伤员。为了保障安全，在基地周围布置了珊瑚暗号与陷阱，安排海渊民潜伏在附近海域，监视幕府的动向。当前进基地的轮廓在海边成型，反抗军便有了稳固的后方，不再是无根的浮萍，能够从容地策划对稻妻本岛的进攻。"

  SAN_decision_24:"发起最终决战"
  SAN_decision_24_desc:"前进基地的战鼓已经擂响，鸣神岛的轮廓在海平面清晰可见，发起最终决战，便是向幕府的核心发起总攻。心海将反抗军分为三路：东路军由五郎率领，进攻天领奉行的驻地；西路军由弓箭手军团组成，负责远程支援与骚扰；中路军由珊瑚宫近卫师团担当主力，直捣天守阁，目标是废除眼狩令，推翻幕府的统治。战前，心海手持奥罗巴斯遗留的珊瑚权杖，向全军宣誓：「今日，我们将用勇气与信仰，终结暴政，让自由重回稻妻！海祇大御神与我们同在！」决战的战场遍布鸣神岛的街巷，反抗军的士兵们浴血奋战，凭借着在海祇岛练就的战术与勇气，对抗幕府的精锐部队。刀光剑影中，珊瑚宫的纹章与幕府的三重巴印碰撞，这不仅是军事的对决，更是自由与压迫的较量。"

 # 战后发展类
  SAN_decision_25:"重建稻妻基础设施"
  SAN_decision_25_desc:"战火曾燃遍稻妻的土地，鸣神岛的街巷残破不堪，踏鞴砂的工坊沦为废墟，海祇岛的码头也布满弹痕。战后重建，便是让和平的阳光重新照耀这片土地。心海下令整合全岛的人力与物资，优先修复民生设施：修补鸣神岛的道路，让商旅能够通行；重建踏鞴砂的冶炼工坊，恢复玉钢的生产；修缮海祇岛的码头，重启渔业与贸易；为流离失所的民众建造新的居所，让他们得以安居乐业。重建过程中，海祇岛的工匠与稻妻本岛的匠人携手合作，融合了海祇的珊瑚建造技艺与稻妻的传统木工，让新的建筑既坚固耐用，又充满地域特色。当道路重新贯通，当工坊恢复运转，当民居升起炊烟，稻妻的生机便如潮汐般归来，和平的秩序逐步重建。"

  SAN_decision_26:"确立新秩序"
  SAN_decision_26_desc:"眼狩令的枷锁已被打破，幕府的统治已成为历史，稻妻站在了新生的十字路口。确立新秩序，便是为这片土地制定新的规则。心海联合稻妻的有识之士——神里家的代表、反抗军的将领、各村落的长老，共同商议新的治理体系：废除眼狩令与锁国令，保障神之眼持有者的自由，开放稻妻的港口，与提瓦特各国开展贸易；保留三奉行的架构，但重新定义其职责，强调为民服务，而非压迫民众；设立议事会，让各阶层的代表都能参与决策，确保政策的公平公正。新秩序的核心是「自由与契约并存」，既传承稻妻的传统文化，又吸纳海祇岛的信仰理念，让每个稻妻子民都能在规则之下，自由地追求自己的梦想。"

  SAN_decision_27:"发展海神时代经济"
  SAN_decision_27_desc:"战后的稻妻，需要强大的经济支撑才能真正复苏。发展海神时代经济，便是依托海祇岛的海洋优势，开启稻妻的繁荣新篇章。心海提出「以海兴邦」的战略：深耕渔业，推广海祇岛的先进捕鱼技术，建立渔获加工产业链，让稻妻的海鲜成为提瓦特的知名特产；发展盐业，利用海祇岛的天然盐场，生产高品质的海盐，通过璃月的贸易网络销往各地；开拓远洋贸易，组建大型商船队，将稻妻的玉钢、丝绸、珊瑚制品运往蒙德、璃月、须弥，换取急需的物资与技术。同时，挖掘渊下宫的旅游资源，吸引提瓦特的旅行者前来探索，带动当地的餐饮、住宿发展。当海神时代的经济体系成型，稻妻便不再是封闭的岛国，而是提瓦特海上的贸易枢纽，繁荣昌盛。"

  SAN_decision_28:"提升海军实力"
  SAN_decision_28_desc:"稻妻四面环海，海军是守护国家安全、保障贸易畅通的关键。提升海军实力，便是打造一支强大的海上力量。心海下令扩建水师，在原有的巡逻舰队基础上，建造大型战船，融合璃月的造船技术与海祇岛的水系术法，让战船不仅坚固耐用，还能借助海浪的力量提升速度与攻击力；设立海军学院，培养专业的海军人才，教授航海、作战、战术指挥等知识；建立沿海防御体系，在关键港口与海峡修建炮台，形成全方位的海防网络。提升后的稻妻海军，不仅能够守护近海的安全，抵御海盗与外敌的侵袭，还能远航至提瓦特各地，彰显稻妻的国力与尊严，让海神时代的稻妻，在海上拥有绝对的话语权。"

  SAN_decision_29:"推进科技革新"
  SAN_decision_29_desc:"锁国令的实施让稻妻的科技发展停滞不前，与提瓦特各国拉开了差距。推进科技革新，便是为稻妻的复苏注入动力。心海积极引进国外的先进技术：从璃月引入工程技术，用于修建水利设施与道路；从蒙德引入机械理念，改良工坊的生产设备；从须弥引入学术知识，建立研究机构，鼓励创新。同时，挖掘稻妻自身的技术潜力，组织工匠研究渊下宫的古代机械，试图破解大日御舆的能量原理；改良玉钢的冶炼工艺，提升武器与农具的质量；研发新式的农业工具，提高粮食产量。科技革新不仅提升了生产效率，改善了民众的生活，更让稻妻在提瓦特的国际竞争中占据优势，为海神时代的繁荣提供了坚实的技术支撑。"

  SAN_decision_30:"开启新海祇时代"
  SAN_decision_30_desc:"海祇岛的危机已如退潮般消散，反抗的大业终获胜利，稻妻迎来了前所未有的和平与繁荣。开启新海祇时代，便是告别过去的战乱与纷争，以海祇岛的信仰与智慧，引领稻妻走向新的未来。这一时代的核心是「海洋共生」，尊重奥罗巴斯的创世之恩，保护海洋生态，实现人与自然的和谐共处；传承海祇岛的契约精神，让稻妻的治理基于公平与公正；秉持开放包容的态度，与提瓦特各国友好往来，共享发展成果。心海作为新海祇时代的引领者，将珊瑚宫打造为稻妻的文化与政治中心，让奥罗巴斯的传说、海祇岛的技艺、自由的理念在此传承。当新海祇时代的钟声敲响，稻妻便如一颗璀璨的珍珠，镶嵌在提瓦特的海上，光芒万丈。"

 # 危机失败决议
  SAN_decision_31:"海祇危机加剧"
  SAN_decision_31_desc:"鸣神海域的风带着绝望的气息，珊瑚宫的灯火在风雨中摇曳。心海的智谋未能扭转战局，幕府的大军步步紧逼，海祇岛的危机如涨潮般愈发深重。民心涣散如散落的珊瑚，曾经众志成城的岛民开始动摇，有的选择逃离，有的选择投降；物资匮乏如干涸的浅滩，粮草耗尽，军械短缺，反抗军的士兵只能以简陋的武器对抗装备精良的幕府军队；士气跌至谷底，战场上的伤亡不断增加，绝望的情绪在军中蔓延。更可怕的是，渊下宫的封印出现松动，祟神的力量开始外泄，部分士兵受到影响，陷入疯狂。失败的阴影如厚重的乌云，笼罩着珊瑚宫的每一处殿宇，笼罩着每一个坚守的灵魂，海祇岛的未来似乎已看不到曙光。"

 # 决议通用提示
  SAN_Decision_Les:"行政效率提升"
  SAN_Les:"海祇岛发展指数调整"
