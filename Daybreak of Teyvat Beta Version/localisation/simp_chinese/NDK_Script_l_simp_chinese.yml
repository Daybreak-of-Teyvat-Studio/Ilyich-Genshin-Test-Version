NDK_Slivermoon_actions: "银月之庭"
NDK_Slivermoon_actions_desc: "银月之庭是库塔尔的休息地，在这里我们可以获得库塔尔的月矩力支援，如果能找到更多月髓便可以使得少女力量恢复更多。\n但是请小心，狂猎的脚步已经逼近，我们需要保持月矩力的影响力比深渊力量的影响力更高，不然库塔尔将无法压制狂猎的侵袭。\n§4月矩力：§!\n§0深渊力：§!"

NDK_Nasha_actions: "那夏镇"
NDK_Nasha_actions_desc: "那夏镇作为诺德卡莱的贸易与情报枢纽，各个势力云集于此都想掌控本地宝贵的月矩力资源，或是寻找传说中的宝藏，但请小心，在看似波诡云谲的交锋下隐藏着更大的阴影。\n我们需要通过建设那夏镇企业，扶持秘闻馆，组建贸易中心，清除黑市等一系列活动掌控那夏镇。\n适当情况下需要做出一些取舍。"

